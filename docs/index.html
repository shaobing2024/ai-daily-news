/0/978/705.htm", "publishedAt": "2026-07-19T07:11:07+00:00"}, {"title": "乐道全系车型完成智能软硬件大升级，神玑 NX9031X 芯片累计出货超 30 万片", "summary": "IT之家 7 月 19 日消息，据乐道品牌营销传播负责人马磊分享，在刚过去的二季度，乐道全系车型都完成了智能软硬件的大升级，其中 Max+、Ultra+ 版型均搭载神玑 NX9031X 芯片。他表示，这颗芯片“底子非常强”：1.全球最高的车端推理算力2.546GB/s 超高内存带宽，是行业其他旗舰级芯片的 2 倍3.行业天花板级图像与多模态处理能力目前，神玑 NX9031X 芯片已经累计出货超 30 万片。值得一提的是，在本届 2026 世界人工智能大会上，蔚来芯片子公司安徽神玑技术有限公司首次独立参展。除了展出「神玑 NX9031」芯片和车载域控外，还在会展期间推出「睿动」具身智能开发平台、分布式智能体平台等 AI 新产品。蔚来官方介绍称，神玑公司致力于打造 AGI 时代最好的芯片及解决方案平台，是范围覆盖自动驾驶、具身智能、Agent 推理等领域的全域全场景芯片公司。据IT之家此前报道，在今年 4 月，蔚来助理副总裁、乐道汽车产品负责人俞斌曾介绍，纯视觉智驾的车型此次大版本更新内容包括智能座舱、智能底盘和智能辅助驾驶等。其中全新更新的智能辅助驾驶端到端模型会带来全面体验迭代，实现城区、高快领航辅助体验的大幅提升。同时，用户所期待的人机共驾、泊车位置个性化选择等功能也会上线，宣称“整体达到同级领先的水平”。而这次升级将覆盖乐道自 24 年发布以来所有的纯视觉车型。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/703.htm", "publishedAt": "2026-07-19T07:02:55+00:00"}, {"title": "不换模型，效果提升104%！上海AI Lab让Harness也能自进化了", "summary": "Harness本身也可以被搜索、验证和迭代", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/454441.html", "publishedAt": "2026-07-19T07:00:47+00:00"}, {"title": "蚂蚁集团副总裁陈亮：智能体越强，信任风险越不容忽视", "summary": "IT之家 7 月 19 日消息，2026 世界人工智能大会今天在上海举行。据新浪科技消息，蚂蚁集团副总裁、蚂蚁大安全 CTO 陈亮认为，智能体（Agent）正在成为 AI 时代的新型操作系统，需要一套与之相匹配的信任基座。据悉，蚂蚁集团为此提出了“原生安全”和“可信互联”两个方向的智能体信任基础。前者拥有不同终端形态的 Agent 运行底座，包括面向智能眼镜、耳机等轻量设备的可穿戴设备 Agent 操作系统 LingDevice OS，以及面向多用户、多任务复杂业务场景的企业级 Agent 操作系统。其中，可穿戴设备 Agent 操作系统强调端云协同、低功耗和跨设备连接；企业级 Agent 则面向复杂业务环境，为多智能体任务提供高并发、分布式的调度能力。同时，蚂蚁针对智能体任务的不确定性提出原生安全和“换挡式”编排调度机制，通过分布式运行底座兼顾执行效率、推理能力与运行成本，并将安全能力进一步下沉到操作系统层。互联网公开资料显示，陈亮花名俊义，早期在蚂蚁集团负责“双十一”支付技术保障与系统稳定性工作。此后组建蚂蚁集团 SRE 团队，负责 AI 基础设施、数据库等技术研发。他曾任支付宝事业群 CTO，期间带领团队参与 AI 大模型技术迭代，并推动 AI 技术在支付宝业务中的应用。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/701.htm", "publishedAt": "2026-07-19T06:54:46+00:00"}, {"title": "联想小新 24 英寸一体机新增“Ultra 7 256V + 16G + 512G”版本，5999 元", "summary": "IT之家 7 月 19 日消息，联想现已为旗下小新 24 英寸一体机新增“Ultra 7 256V + 16GB RAM + 512GB SSD”版本，定价为 5999 元。该机继承了家族式简约设计，配备 Harman 2.0 立体声音响、语音降噪双麦克风，支持莱茵低蓝光及无频闪认证，支持 Wi-Fi 6 无线网络。该机采用了一块 23.8 英寸 1920x1080 分辨率 100Hz IPS LCD 面板（覆盖 99% sRGB 色域），配备 2.5K“直播级摄像头”，支架支持俯仰角度可调。I/O 方面，该机侧面配备 1 个 USB-C 3.2 Gen 2 接口、1 个 3.5mm 音频接口；背面提供 1 个 HDMI 2.1 接口、1 个 USB-A 3.2 Gen 2 接口、2 个 USB-A 2.0 接口、1 个 RJ45 网口、1 个 HDMI 音频输入接口。IT之家附产品参数：京东联想小新 24 一体机电脑 Ultra 7 256V + 16G + 512G 版本 5999 元直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/700.htm", "publishedAt": "2026-07-19T06:53:16+00:00"}, {"title": "威刚推出 XPG EF750W 白牌电源：符合 ATX 3.1 规范，249 元", "summary": "IT之家 7 月 19 日消息，威刚现已在京东上架 XPG EF750W 白牌电源，定价为 269 元，首发价 249 元，提供三年质保。系列电源尺寸为 140x150x86mm，取得 80 PLUS 白牌认证，符合英特尔 ATX 3.1 规范，匹配 120mm 风扇。该电源提供过功率保护（OPP）、过压保护（OVP）、欠压保护（UVP）、过温保护（OTP）、短路保护（SCP），提供 3 年质保。IT之家附产品参数：京东威刚 XPG EF750W 白牌电源 249 元直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/699.htm", "publishedAt": "2026-07-19T06:46:09+00:00"}, {"title": "中国地震局发布“人工智能 + 防震减灾”三年行动方案，剑指 2028 年", "summary": "IT之家 7 月 19 日消息，据央视新闻报道，7 月 19 日，2026 世界人工智能大会 —— 地震人工智能论坛在上海召开。会议聚焦人工智能与防震减灾深度融合发展，集中展示了人工智能技术在防震减灾领域的最新科研成果和实际应用。2026 世界人工智能大会 —— 地震人工智能论坛，以“人工智能赋能防震减灾高质量发展”为主题，围绕地震监测、预测、预警和震害防御等核心领域，集中发布了地震科学智能体、地震领域大模型、地震智能处理系统、权威基准数据集等全链条创新成果。中国地震局在论坛上发布《“人工智能 + 防震减灾”行动方案（2026—2028 年）》。未来 3 年，将围绕地震智能监测处理系统、智能化地震预警技术研发与示范应用等九方面任务，构建起“数据 — 模型 — 平台 — 应用”四位一体的人工智能技术体系，进一步夯实数据基础、突破核心技术、打造“AI+ 地震”系列支撑平台。到 2028 年，实现人工智能技术对防震减灾业务的有效支撑，进一步巩固我国在防震减灾人工智能领域的先发优势。IT之家查询获悉，截至今年 5 月，我国地震预警公众服务覆盖规模累计已超过 3.3 亿，多渠道服务网络持续完善、覆盖面不断扩大。其中，全国地震预警终端部署量超 10 万台；广播电视地震预警服务已覆盖云南、四川、新疆等 11 个省份，服务用户规模突破 6600 万户；全国地震预警微信小程序用户达 4600 万以上；通过与社会力量协作，可以实时向超过 1 亿手机用户精准推送直达式地震预警服务，实现地震预警信息的多维度、广覆盖传递。国家地震预警工程自 2024 年 7 月顺利通过竣工验收以来，地震预警公众服务工作加速推进，目前已初步建成涵盖定制终端、广播电视、智能手机等多渠道的公众服务体系，在多次有影响的地震事件中发挥了重要社会服务作用，有效助力灾害防范应对。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/698.htm", "publishedAt": "2026-07-19T06:41:16+00:00"}, {"title": "WAIC 2026｜从纳米抗体到环肽：分子之心30天两度验证AI底层设计力，筑牢生物经济“多模态新基建”", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/454423.html", "publishedAt": "2026-07-19T06:40:12+00:00"}, {"title": "WAIC 2026 | 摩尔线程首次公开多项训练推理实践成果，三大“AI工厂”持续释放算力价值", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/454170.html", "publishedAt": "2026-07-19T06:23:00+00:00"}, {"title": "全球首款 AI 智能体手机努比亚 NaviX Ultra 亮相 WAIC，搭载豆包手机助手", "summary": "IT之家 7 月 19 日消息，全球首款 AI 智能体手机努比亚 NaviX Ultra 在 WAIC 期间正式亮相，该机搭载豆包手机助手。据财联社报道，中兴通讯高级副总裁、努比亚总裁倪飞在接受采访时表示，豆包拥有领先的大模型和智能体能力，努比亚则拥有软件、硬件、产品工程、质量管理、渠道和用户服务等方面的长期积累，从 M153 到现在的 NaviX Ultra，双方的合作即将走过完整的技术验证和产品迭代周期。新机提供蓝境、幻梦、曜黑、雪原四款配色，其中“幻梦”配色采用统一的粉色调设计，包括后置镜头 Deco 在内均呈现粉色，视觉辨识度极高。背部采用辨识度极高的横向条形跑道式镜头 Deco，内置后置三摄系统，包含潜望式长焦镜头，与主流圆形镜头岛形成区分。机身侧面配备独立的橙色 AI 按键，支持一键快速唤醒智能体功能。该机正面采用居中单挖孔直屏，配合四等边窄边框设计，整体观感简洁利落。努比亚 NaviX Ultra 围绕听得懂、能干活、记得住、够安全四大核心能力打造，支持全场景自然语义理解，可自主跨软件串联完成多步骤任务（如比价下单、行程规划等）。核心大模型运算全部在手机端本地完成，用户数据无需上传云端，叠加官方统一生成式 AI 备案资质，大幅降低信息泄露风险。据爆料，该机可能搭载骁龙 8 Elite Gen5 旗舰处理器，内置 7000mAh 超大容量硅碳负极电池，支持 90W/100W 有线快充及无线充电。影像系统方面，预计配备 5000 万像素主摄、超广角及潜望式长焦镜头，前置 5000 万像素高清镜头。截至IT之家发稿，官方暂未公布努比亚 NaviX Ultra 的正式售价与开售时间。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/694.htm", "publishedAt": "2026-07-19T06:19:24+00:00"}, {"title": "线下“四朵金花”最速：消息称华为 nova 16 系列手机开售 39 天销量破百万", "summary": "IT之家 7 月 19 日消息，据博主 @旺仔百事通 今日分享，在今年整体大盘遇冷的情况下，华为 nova 16 系列正式开售仅 39 天销量就正式破百万，是今年线下“四朵金花”（预计指 vivo S 系列、OPPO Reno 系列、荣耀数字系列和华为 nova 系列）里面最先达成这一成就的产品。博主表示，这个成绩可以说得上是相当亮眼了。据IT之家此前报道，华为 nova 16 系列手机已于 6 月 5 日首销，标准版 / Pro / Ultra 均搭载麒麟 9010S 处理器，nova 16z 搭载麒麟 8020 芯片，售价 2699 元起。系列新机重点参数配置差异已公布：型号nova 16nova 16 Pronova 16 Ultranova 16z外观颜色天际白、星空黑、幻彩贝母、晴空蓝天际白、星空黑、晴空蓝天际白、星空黑、幻彩贝母内存规格256GB / 512GB256GB / 512GB / 1TB256GB / 512GB操作系统HarmonyOS 6.1CPU 型号麒麟 9010S麒麟 8020后置摄像头摄像头个数：3 个5000 万像素超高清镜头5000 万像素 RYYB 潜望长焦镜头红枫原色镜头摄像头个数：4 个2 亿像素 RYYB 超高清大底防抖镜头5000 万像素 RYYB 潜望长焦镜头5000 万像素超广角微距镜头红枫原色镜头摄像头个数：4 个2 亿像素 RYYB 超高清大底防抖镜头5000 万像素 RYYB 大光圈潜望长焦镜头5000 万像素 RYYB 超广角微距镜头红枫原色镜头摄像头个数：3 个5000 万像素超高清镜头1200 万像素 RYYB 长焦人像防抖镜头红枫原色镜头电源与充电电池容量典型容量：7000mAh 典型容量：7000mAh 典型容量：7000mAh典型容量：6000mAh有线充电支持最大超级快充 100W (20V/5A) 兼容 11V 层前提。谈及技术挑战时，努比亚方面表示，真正困难的不只是模型能力，而是如何把模型能力转化为稳定的终端体验。团队认为，从实验室走向量产，需要依次完成四项能力建设：首先把模型能力转化为用户价值；其次让智能体真正成为系统能力，实现系统、应用和硬件之间的协同；再次保证面对不同年龄、不同网络环境和不同使用场景时仍然保持稳定体验；最后则是将安全能力从产品设计之初就作为底层架构，而非事后增加的功能。在生态合作方面，努比亚再次强调了与豆包手机助手的合作定位。这并不是简单地把大模型部署到手机上，而是双方共同定义智能体如何融入终端产品。豆包主要提供大模型与智能体能力，努比亚则负责系统、硬件、产品工程、质量管理以及终端体验，双方已经完成从技术验证到量产产品的完整迭代。随着 AI 开始拥有跨应用执行能力，用户对于权限和隐私的关注也同步提升。对此，努比亚表示，所有 AI 操作均建立在用户授权基础之上，并保持用户知情和可控。针对金融交易、社交发布等敏感场景，系统将设置明确的确认机制；同时，智能体权限采用分层管理，数据处理遵循合理必要和用户自主控制原则，并建立 Agent 防护体系。对于 AI 执行错误后的责任问题，努比亚表示，智能体并非“黑盒”，所有任务执行链路都能够追溯和理解，一个成熟的智能体产品不仅要能够完成任务，也要知道哪些场景必须停下来等待用户确认。对于越来越多手机厂商开始布局 AI 智能体，努比亚表示，行业竞争意味着市场已经形成共识，公司欢迎更多厂商加入这一赛道。按照其披露的时间线，从 M153 技术验证、智能体大模型完成备案，到 NaviX Ultra 即将量产上市，公司已经完成了技术验证、产品迭代和量产准备的完整闭环。倪飞表示，智能体手机目前仍处于产业发展的早期阶段，很多能力和场景仍需要持续完善。AI 手机先锋，不是抢先说出一个概念，而是率先把概念做成用户能够使用的产品。希望未来当用户提到努比亚时，想到的不仅是一款产品，更是将 AI 真正带入终端并服务普通用户的品牌。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/686.htm", "publishedAt": "2026-07-19T05:03:44+00:00"}, {"title": "蚂蚁数科发布商业智能体超级工厂核心平台 Agentar2.0，预置 200 个岗位级数字专家模板", "summary": "IT之家 7 月 19 日消息，今日，在 2026 世界人工智能大会，蚂蚁数科正式发布商业智能体超级工厂核心平台“Agentar2.0”。据介绍，Agentar2.0 首批预置 200 个岗位级数字专家模板，并提供数百个可订阅的 Skills 级开箱可用的智能体工具。企业可以根据具体岗位和经营需求，快速启用具备专业知识、业务流程及工具调用能力的数字专家，无需从零起步。蚂蚁数科 CTO 闫莺在演讲中表示，“企业 AI 落地，卡在四件事上。第一，模型很强，落不了地。第二，工具很多，接不上最后一公里。第三，企业要的不是零件，是整车。第四，智能体多了，没人定规矩。”这也是蚂蚁数科“商业智能体超级工厂”的解题方向。蚂蚁数科自研基座模型 LingDT，用极致的 Token 效率为企业部署 AI 省钱、提速；自研 Agentix 智能体操作系统，全流程调度智能体“下产线”。在交付与工具链端，大模型服务平台 DTMaaS 平台配合 Agentar 2.0 实现“即插即用”。通过区块链技术，为每个 Agent 赋予可信身份，将决策、协作及资金流转等全流程记录上链，促进多智能体的可信协同。以一家新能源企业海外建厂为例，管理层仅需设定目标，随后由战略、金融、供应链、法务、ESG 等数百个智能体组成的团队，便能全流程自主执行。“企业第一次真正拥有了一支全天候工作的 AI 队伍，以及规模化协作的 Agent 工厂。”闫莺说道。IT之家注意到，截至目前，蚂蚁数科依托“商业智能体工厂”方案，已落地超 300 个金融行业智能体，并在从金融向能源、出行、零售等场景拓展。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/684.htm", "publishedAt": "2026-07-19T04:43:36+00:00"}, {"title": "全国首个具身智能实训场样板点发布", "summary": "IT之家 7 月 19 日消息，据第一财经报道，在今日上午举行的 2026 WAIC 人形机器人与具身智能创新发展论坛上，国家地方共建人形机器人创新中心携手华为打造的全国首个具身智能实训场样板点发布。据IT之家了解，之前行业里不同品牌人形机器人的训练系统互不兼容，企业想要测试多款设备就得搭建多套场地，投入成本极高。这个实训场打通了不同机型的训练数据接口，不管是工业搬运、巡检还是服务类机器人，都能在这里统一完成高温、雨天、狭小通道等复杂场景仿真训练。训练场还对外开放中小机器人企业试用名额，初创团队不用自建高额测试场地就能完成产品迭代。据悉，这一样板点依托国产算力底座，搭载全球领先的具身智能 VLA 大模型，各项性能指标均位居行业前列。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/673.htm", "publishedAt": "2026-07-19T04:07:37+00:00"}, {"title": "月之暗面 Kimi K3 大模型登顶全球榜单后，彭博社称美国 AI 领先中国固有认知被打破", "summary": "IT之家 7 月 19 日消息，月之暗面 Kimi K3 大模型于周四重磅上线，拥有 2.8 万亿参数，100 万 Tokens 上下文。在 Frontend Code Arena 全球 AI 大模型榜单中，Kimi K3 以 1679 分超越 Claude Fable 5，位居第一。据彭博社今天报道，月之暗面的这款新模型正在搅动全球科技市场。此前，包括中国顶尖 AI 领军人物及美国头部企业的业内人士认为，中国的尖端 AI 模型开发仍落后于美国。一位不愿透露姓名的 Anthropic 高管还在本周说道，他们公司的技术领先中国竞品 6-12 个月。Kimi K3 发布后，美国加州大学伯克利分校计算机科学教授斯托伊卡（Ion Stoica）表示：“过去我们一直认为，中国的开源模型大约落后最先进模型 6-9 个月。而现在，这种差距可能已经缩小到 2-3 个月。”Kimi K3 的性能提升也让不少观察人士和投资者感到意外。与 DeepSeek 当年引发的讨论类似，如今市场再度质疑硅谷数千亿美元投资 AI 是否能得到相应回报、美国 AI 领先优势是否被削弱。与此同时，越来越多企业用户也开始关注 AI 使用成本。部分开发者已经用上“模型路由”（IT之家注：Model Routing）服务，根据不同任务自动选择成本最低、效率最高的 AI 模型，这其中当然包括中国模型。一位不愿透露姓名的美国 AI 公司高管表示，美国企业仍将依靠创新保持领先。但随着竞争加剧，他们必须更清楚地向客户证明自身产品价值。事实上，美国 AI 行业已经在 Kimi K3 发布之前注意到中国模型的快速进步。OpenAI 首席执行官萨姆 · 奥尔特曼曾表示：“中国的开源模型已经变得非常优秀。但我仍然认为，我们将继续拥有世界上最优秀的模型，而用户真正想要的，也是世界上最好的模型。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/670.htm", "publishedAt": "2026-07-19T03:55:48+00:00"}, {"title": "小鹏汽车：第二代 VLA 模型实现同一套模型打通中国与欧洲，目标 2027 年逐步向海外用户交付", "summary": "IT之家 7 月 19 日消息，小鹏汽车官方今日发布视频，宣布小鹏图灵第二代 VLA 开启高阶智驾全球化新阶段。小鹏汽车官方表示，自动驾驶本质是物理 AI 的问题。理解真实物理世界的运行规律，是小鹏图灵第二代 VLA 模型的起点。据介绍，世界模型与 VLA 一体两面，共同提升模型在真实世界中的理解力与行动力；即使在训练数据不足的海外市场，模型也可以通过自主生成训练数据加速泛化。目前，小鹏汽车第二代 VLA 模型已实现同一套模型打通中国与欧洲，目前正加快推进欧洲市场量产适配，目标 2027 年逐步向海外用户交付。据IT之家此前报道，在 7 月 16 日的小鹏品牌日暨 MONA L03 全球上市发布会上，小鹏宣布海外车型正式接入谷歌地图导航服务，成为亚太地区首个谷歌地图车载 SDK 合作伙伴，并将在小鹏 MONA L03 首发落地。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/655.htm", "publishedAt": "2026-07-19T03:41:20+00:00"}, {"title": "阿里开放式世界模型快乐生蚝 HappyOyster 1.0 登陆百炼平台，支持两大核心模式", "summary": "IT之家 7 月 19 日消息，阿里巴巴今天宣布，开放式世界模型 HappyOyster 1.0（快乐生蚝）现已登陆阿里云百炼，面向企业和开发者开启灰测。IT之家了解到，HappyOyster 1.0 版本围绕「用户与世界的关系」，提供世界探索（Adventure）与实时导演（Directing）两大核心模式。其中，世界探索模式支持用户输入一句话或一张图，生成可实时探索和交互的开放世界。模型能够根据用户输入创建任意角色在任意世界中探索，根据实时交互指令，预测世界的下一步发展，给出响应，支持 1 分钟以上的主体动作和环境交互体验，音画同出。而实时导演模式可让用户像拍摄电影一样，用文字指令实时操控镜头、调度角色、改变剧情走向、画面即时响应、持续演绎；你随时可以暂停、改写、回溯。当前模型能力在数字人互动陪伴、剧情与舞台演绎、POV 沉浸式模拟体验等场景中表现优异，具备较强的实时互动性。此外，HappyOyster 1.0 提供 Android / iOS / Web 三端 SDK。开发者服务端通过 Open API 管理世界，客户端 SDK 封装了 RTC 连接、视频渲染和实时交互，支持 Adventure 与 Directing 两种模式，体验结束后可导出视频。产品支持企业用户和开发者通过 SDK 快速构建可玩世界、互动剧、AI 陪伴等沉浸式应用。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/644.htm", "publishedAt": "2026-07-19T02:53:07+00:00"}, {"title": "马斯克：特斯拉 FSD 将记住驾驶员操作习惯，实现个性化自动驾驶", "summary": "IT之家 7 月 19 日消息，埃隆 · 马斯克已经确认，特斯拉 FSD（Full Self-Driving）软件正在正式从过去的“通用型、一套方案适用于所有用户”的驾驶系统，转变为真正的个性化驾驶系统。此前，搭载 FSD 的特斯拉车辆在整个车队中基本采用相同的驾驶逻辑。但未来，FSD 背后的神经网络将能够直接学习每位车主的个人驾驶习惯，并记住用户的偏好。这一消息来自马斯克本人。近日，一名特斯拉 FSD 用户在 X 平台上抱怨了一个长期存在的问题。用户 @wholemars 表示，车辆经常会在不该离开的位置驶出高载客车道（IT之家注：指在交通高峰时段专门预留给那些除司机外还搭乘有一名或多名乘客的机动车行驶的车道）或快速车道。他认为，这种情况非常令人烦恼：FSD 有时会主动退出左侧的高效车道，结果却进入拥堵车流，而旁边最左侧车道上的车辆仍然畅通无阻。对此，马斯克回应称：“车辆将开始记住你具体的人工干预行为，并根据每个人的个人偏好进行调整。”人类驾驶员并不会在所有情况下做出完全相同的选择，但过去的 FSD 更倾向于学习一种统一的驾驶方式。未来，FSD 很可能会针对同一种场景，学习多种不同的处理方式。最明显的例子就是停车。不同人停车习惯完全不同。有些人喜欢倒车入库，有些人习惯车头朝前驶入。显然，不同用户的需求并不一样。未来，FSD 可能会学习这些不同的停车行为。当系统掌握多种停车模式后，它可以观察用户平时的操作习惯，并匹配最接近用户偏好的驾驶模型。这种个性化能力不仅会应用于停车，也会覆盖更多常见驾驶场景，让 FSD 能够适应不同驾驶风格。FSD 自动退出高载客车道、进入普通车流的问题，多年来一直受到车主抱怨。实际上，特斯拉车辆目前已经提供了高载客车辆（HOV）车道偏好设置，用户可以在：“控制 &gt; 导航 &gt; 使用 HOV 车道”中进行调整。用户也可以通过语音指令快速开启或关闭该功能，例如说“打开 HOV 车道”。而近期更新进一步简化了这一设置，将其分为三个选项：“自动（Auto）”会通过车内摄像头判断用户是否满足时间、地点以及乘员数量要求；“是（Yes）”会强制车辆在存在 HOV 车道时使用该车道；“否（No）”则完全禁止车辆进入 HOV 车道。未来，如果 FSD 能够根据用户行为进行调整，那么当驾驶员多次在类似情况下接管方向盘时，系统就可以从这些行为中学习，并在之后采取不同策略。这一方向也延续了马斯克此前透露的信息：未来版本的 FSD 将学习用户的停车习惯，让车辆在日常地点，例如家里、办公室或孩子学校附近，总能停到用户喜欢的位置。最近，特斯拉推出了一个略显“固执”的 FSD 接管反馈菜单。每当驾驶员从 FSD 手中接管车辆时，该菜单都会出现，让用户反馈接管原因。这些反馈数据可能正在帮助特斯拉判断，哪些问题最需要优先解决。通过学习驾驶员为何接管车辆，FSD 可以逐渐减少这些错误行为。目前，停车是导致 FSD 被用户接管的最常见原因之一。因此，马斯克正在暗示的新能力，很可能首先会改善停车体验。预计特斯拉将在今年晚些时候或明年初推出下一代消费者版 FSD 大版本 ——FSD v15。该版本预计将带来约 10 倍规模的模型参数提升，进一步增强自动驾驶能力。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/642.htm", "publishedAt": "2026-07-19T02:36:34+00:00"}, {"title": "安谋科技发起“开源 AIOS 联盟”，合作伙伴包含瑞芯微、紫光展锐、全志等", "summary": "IT之家 7 月 19 日消息，安谋科技在 2026 世界人工智能大会期间宣布发起“开源 AIOS 联盟”，目前已吸引超 20 家生态伙伴入驻，涵盖芯片与 IP、大模型、AI 硬件、具身本体、软件方案、高校、科研等国内 AI 产学研全链路。IT之家从安谋科技公众号了解到，开源 AIOS 系统聚焦 AI 模型能力、传感与运控、AI 任务编排、记忆系统四大技术模块，有望重塑基于感知的生成式交互和具身互动体验，面向新一代 AI 产品。目前，“开源 AIOS 联盟”已有 20 家生态合作伙伴，其中牵头单位包括芯发科技、紫光展锐、瑞芯微、辉羲智能、此芯科技、全志科技等国内领先的芯片厂商，以及面壁智能、RT-Thread、AutoCore 等本土模型及软硬件方案提供商。此外，清华大学智能产业研究院、香港科技大学物理 AI 研究中心等顶尖高校及科研机构也作为学术伙伴同步加入联盟。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/628.htm", "publishedAt": "2026-07-19T01:19:32+00:00"}, {"title": "火速上架！空降即登顶Arena，Kimi K3当日登陆「模型广场」", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/NtfFE25blBHubhNNTmkJ?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T17:14:05+00:00"}, {"title": "为什么 AI Agent 拿到数据却不会推理？可观测对象图语义层的设计与开源实践｜AICon深圳", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/KPd6YwU0Y1iCMGMakSmE?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T10:00:00+00:00"}, {"title": "豆包视频通话背后，火山引擎重构 Agent 时代多模态传输底座", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/GICIrEsTJwEgGsDYFvCM?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T08:54:38+00:00"}, {"title": "6 台机器人拼长城、首款智能体手机首秀：阶跃把 AI 塞进了现实世界｜WAIC 2026", "summary": "大模型的下一站，是走出屏幕，自己动手#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672344?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T04:01:07+00:00"}, {"title": "WAIC 2026 | 混元Hy3大模型首秀，腾讯上线AI技能支付体系", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/FeWLPKLYDjWko8rJjxKq?utm_source=rss&amp;utm_medium=article", "publish ": "东方 Project 同人视觉小说《东方：超越幻想乡》上架 Steam，35.7 元", "summary": "IT之家 7 月 19 日消息，基于知名同人 IP“东方 Project”打造的视觉小说《东方：超越幻想乡》（Touhou: Beyond Gensokyo）现已在 Steam 平台上架，由 FUF Games 负责开发与发行，国区首发享 -15% 折扣，折后售价为 35.7 元，原价 42 元，首发优惠截止至 7 月 31 日。游戏支持简体中文界面与字幕，目前已开放试玩 Demo。IT之家附游戏商品页（https://store.steampowered.com/app/4489700/Touhou_Beyond_Gensokyo/?l=schinese&amp;cc=cn）。欢迎来到幻境之地！《东方：超越幻想乡》是一款视觉小说，邀请你从一个全新且充满悬疑的视角来体验“东方 Project”的迷人世界。你将扮演 Shin，一位来自外界的热情摄影师，意外穿过结界来到了幻想乡。只有手中的相机和智慧作为武器，Shin 必须在这个魔法与妖怪司空见惯的世界中生存下来，而此时，一场新的“异变”正威胁着这里的和平。这场混乱的中心是黑花（Kurohana），一个将真实意图隐藏在阴影中的神秘人物。为了揭开真相并阻止她，你最初的唯一选择就是与博丽神社的巫女 —— 博丽灵梦结盟。你所做的每一个决定，拍下的每一张照片，都可能改变你的命运。主要特色：幻想乡的新谜团：透过 Shin 的双眼体验原创故事，对抗黑花的计划，这位反派将把一切都搅得天翻地覆。与巫女的邂逅：在丰富且充满个性的对话中，与博丽灵梦互动并建立羁绊。沉浸式的艺术与氛围：欣赏美丽的背景和立绘，它们捕捉了魔法世界的精髓，并伴有充满怀旧和细节的唯美画风。你的选择至关重要：谨慎选择你的回答，解锁不同的结局…… 也许还能揭露潜伏在阴影中的其他幻想乡居民。游戏预计主线游玩时长约 5.5 小时，包含谜题探索以及多条可解锁路线；试玩版提供 20 分钟序章内容，可抢先体验主角 Shin 与灵梦的初次相遇。开发商披露，该游戏使用生成 AI 工具创建静态角色精灵和背景图像。最低配置：需要 64 位处理器和操作系统，Windows 10 或更高版本系统，处理器 1.0 GHz 或更高，内存 2 GB RAM，显卡为支持 DirectX 或 OpenGL 的卡，DirectX 版本 9.0c，存储空间需要 2 GB 可用空间，声卡支持 DirectX 兼容。推荐配置：需要 64 位处理器和操作系统。游戏图赏：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/327.htm", "publishedAt": "2026-07-19T06:44:47+00:00"}, {"title": "百度对话式应用开发平台秒哒 3.5 发布：支持 iOS App 一键打包、多应用共享后端等功能", "summary": "IT之家 7 月 19 日消息，据新浪科技消息，百度今天在 2026 世界人工智能大会上发布秒哒 3.5 版本，新增 SEO Agent 智能流量优化、iOS App 一键打包、多应用共享后端、一句话生成 Skill、数据库多环境隔离、后端资源分级等六大能力，让用户无需代码基础，即可完成应用开发、部署、运营。作为参考，秒哒是一款对话式应用开发平台，采用“无代码编程 + 多智能体协作 + 多工具调用”的技术组合，用户仅需通过自然语言描述需求，即可自动生成完整功能代码。截至目前，秒哒已累计服务超 3500 万用户，创造 350 万个具有商业价值的应用，每天有近 20 万人使用这些应用解决真实问题。此外，百度秒哒还在 WAIC 现场展示了产品设计、应用落地的制作流程。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/693.htm", "publishedAt": "2026-07-19T06:13:48+00:00"}, {"title": "SK 集团会长崔泰源：内存应该降价，如果一直高价消费电子行业可能受到冲击", "summary": "IT之家 7 月 19 日消息，据韩媒 EtNews 今天报道，SK 集团会长、大韩商工会议所会长崔泰源表示，目前持续高企的内存价格并不正常。过高的半导体价格不仅会抑制市场需求，未来还可能引发地缘政治层面的矛盾。崔泰源表示：“内存价格应该下降。这句话听起来可能有点奇怪，但现在的价格并不正常。如果高价一直维持下去，PC 和智能手机只能不断涨价，最终出现所谓的‘芯片通胀’。”他认为，如果高昂的内存价格最终传导到消费电子市场，那么整个行业的基础需求都可能受到冲击，愿意换手机、电脑的人只会越来越少。同时崔泰源认为，企业应该主动降低利润、扩大供应，在保护市场的同时推动市场继续增长。他对此比喻道：“只有这样，韩国半导体产业才能持续增长。只想着把眼前树上的苹果全部摘下来吃掉，不是战略。”不过他认为，即使半导体行业全力扩产，也赶不上 AI 需求猛增：“市场已经提出，明年的需求至少会增长 60%-100%，但几乎没有任何一家厂商能够在明年实现相应幅度的产能提升。目前的供应竞争已经可以用‘阿鼻叫唤’（IT之家注：比喻十分悲惨、呼唤求救的声音）来形容。”此外崔泰源预测，即使未来内存供应紧张的情况有所缓解，AI 产业的发展瓶颈仍会转移至能源、电力等基础设施：“用于能源领域的电力设备，目前基本都已经进入供应短缺状态。随着 AI 的不断发展，数据中心所需的电缆，以及制造电缆所需的各种材料，也都会出现供不应求的情况。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/683.htm", "publishedAt": "2026-07-19T04:17:53+00:00"}, {"title": "三星推出 Freestyle+ 便携式投影仪：支持 360 度环绕音效、最大可投射 100 寸 FHD 画面", "summary": "IT之家 7 月 19 日消息，三星前天在美国市场推出 Freestyle+ 便携式投影仪，新品最大可投射 100 英寸的 Full HD（1080P）画面，支持流媒体服务、云游戏和无线投屏，还能通过 USB-C 移动电源供电，适合露营等场景。IT之家在此援引官方新闻稿，这款投影仪拥有 3D 自动梯形矫正、墙面校准和画面适配等 AI 优化技术，可帮助投影仪在不平整墙面下投射出正确画面。规格方面，这款投影仪的最高亮度可达 430 ISO 流明，支持 PurColor 色彩技术和 HDR10+。内置 360 度扬声器，配备双无源低音单元。用户还可通过 Q-Symphony 连接兼容的 Wi-Fi 扬声器或回音壁，提升音质表现。此外，这款投影仪搭载 Tizen 操作系统，支持各种流媒体服务和云游戏平台，售价 1199.99 美元（IT之家注：现汇率约合 8147 元人民币）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/640.htm", "publishedAt": "2026-07-19T02:29:00+00:00"}, {"title": "全球市占第一后，普渡在WAIC开始回答机器人下一场战争", "summary": "PuduFM+PuduAgent，一并在不同本体上持续落地，共同构成了普渡机器人的顶层战略「一脑多形」。", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453802.html", "publishedAt": "2026-07-19T01:01:46+00:00"}, {"title": "AI 智能体算力消耗过快，传统账单风控跟不上速度", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/secM60Za0CNxIYvQO47m?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T09:00:00+00:00"}, {"title": "iOS 27 公测版上手：国行 AI 准备好了，但系统流畅更值得升级", "summary": "有可能成为新一代「钉子户」系统。#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672364?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T06:47:24+00:00"}, {"title": "搭载全球首个智能体原生操作系统 Step AOS，STEPX Neo 亮相 2026 WAIC", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceU 个交流作用，所以无论是后期 PS 还是 AI，我们以前是一个开放的态度”。郑壬杰表示，在网络上出现质疑后，《大众摄影》方面及时联系了作者，作者承认这是他使用 AI 之后的一个失误，“线上的我们可以撤，我们早就撤掉了，当我发现这个问题以后就撤掉了。撤掉以后，当然有一些比如说复制走了，这个东西那我们就没有办法控制了。”对于后续，郑壬杰介绍，“我们没有再做进一步的处理，因为本身它也不是比赛，我们也没有发奖金”。郑壬杰还提到，《大众摄影》有一个栏目叫“双周争胜”，这个栏目一开始接受 AI 影像作品的投稿，而栏目本身也不是摄影比赛，是一个接受方方面面投稿、以技术性为核心的小型栏目，由一名编辑负责，不存在比赛或者分层级问题。IT之家参考《大众摄影》2026 年第 11 期“双周争胜”征稿公告，杂志方标明，“投稿者投送 AI 生成影像时，应当主动声明并在影像上明显、清晰地展示 AI 标识。不得删除、篡改、伪造、隐匿 AI 内容标识，本栏目不接受纯粹文生图 AI 影像”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/702.htm", "publishedAt": "2026-07-19T06:59:05+00:00"}, {"title": "以场景为牵引，推动工业AI从单点实效迈向生产力跃迁", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/454419.html", "publishedAt": "2026-07-19T06:34:28+00:00"}, {"title": "魔法原子Magic-VLA K02攻克叠盒封胶长程任务，成功率超90%", "summary": "WAIC现场叠箱封胶，解锁物理AI新技能", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/454155.html", "publishedAt": "2026-07-19T02:36:39+00:00"}, {"title": "中国 AI 产业核心要素出海发展白皮书", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/minibook/GSbtyU9968lerf5gwPpU?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T12:02:12+00:00"}, {"title": "AI从“能对话”走向“能办事”，蚂蚁集团WAIC展示三层布局", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/xtEyfZsTRA3FFW4dzCah?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T22:08:06+00:00"}, {"title": "我在 WAIC 暴走两万步，看到了中国 AI 的三件套", "summary": "今年开始，可以看一整条链了。#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672335?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-17T10:30:07+00:00"}, {"title": "实测灵犀专业版，AI 成为下一代办公入口", "summary": "办公 AI，能真交付才算数#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672096?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-16T13:51:20+00:00"}, {"title": "百公里 8.2 度电，吉利发布雷霆 16 const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.parentNode.removeChild(box); return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top"><span class="dot" style="background:#94a3b8"></span>顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '"><span class="dot" style="background:' + accentVar(i) + '"></span>'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
