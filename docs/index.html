 款 ThinkPad T14p 笔记本新增了“Ultra 7 356H + 32GB RAM + 1TB SSD + RTX5060”版本，定价为 19999 元，7 月 27 日首销。京东 ThinkPad T14pUltra 7 356H + 32GB RAM + 1TB SSD + RTX506019999 元直达链接该机使用经典商务黑配色，整体厚度 10.4mm，重量 1.6Kg，A 面采用金属材质，B 面配备一块 14.5 英寸 3K 120Hz 面板（亮度 500 尼特，覆盖 100% DCI-P3 色域）。机身搭载英特尔酷睿 Ultra X7 356H 处理器，匹配 32GB RAM、1TB SSD 和 RTX5060 显卡，使用 75Wh 电池，至高提供 14 小时续航。I/O 方面，该机左侧提供 1 个 HDMI 2.1、2 个雷电 4、1 个 USB-A 3.2 Gen 1、1 个 3.5mm 音频接口；右侧提供 1 个 RJ45 网口、1 个 USB-A 3.2 Gen 1 接口。IT之家附参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/087.htm", "publishedAt": "2026-07-20T08:20:28+00:00"}, {"title": "迈从预热 God 60《凡人修仙传》动画联名款磁轴键盘：“青纹鎏金”配色、三面环绕光效", "summary": "IT之家 7 月 20 日消息，据 MCHOSE 迈从官方微博，迈从宣布将推出一款 God 60《凡人》动画联名款磁轴键盘，将于 7 月 21 日（明天）10:00 开启预约。目前官方尚未公布该键盘完整参数信息，参考官方预热，该键盘联名设计灵感来自动画《凡人修仙传》，整体采用“青纹鎏金”配色，使用“八斜面剑锋形态”，外观融入“剑锋”、“法阵”等元素，造型锋利硬朗，呼应“本命剑”主题。同时拥有“三面惊鸿，神光环绕”环绕光效。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/072.htm", "publishedAt": "2026-07-20T08:02:03+00:00"}, {"title": "中软国际与月之暗面签署协议，达成 Token 分成及联合创新合作", "summary": "IT之家 7 月 20 日消息，中软国际今日发布公告，近日，公司已与北京月之暗面科技有限公司（以下简称“月之暗面”）正式签署“登月计划”之 Token 分成及联合创新合作协议，此举是公司面向高专业价值 Token 运营商转型的关键战略举措。据介绍，本次合作中，中软国际充分发挥自身在企业服务领域深厚的场景积累、行业 knowhow 及规模化落地交付能力，以及行业及代码生成与开发工程（coding）实践能力；月之暗面依托其在通用大模型领域领先的算法体系与前沿技术研发能力，形成强强协同、优势互补的合作格局。双方将以中软国际自主研发的企业智能操作系统 AllMeta 平台 + 月之暗面 K2.7 Code 及 K3 模型及后续迭代版本为核心技术底座，共同推进企业级智能体技术、产品与解决方案在能源电力、金融等行业的创新及规模化商用。双方将共建 FDE 创新实验室，集结顶尖行业专家与技术研发力量，共同开展企业级 Agent 产品的定义、研发、交付、打磨、测试与持续迭代。首期合作将优先聚焦能源电力关键行业，围绕行业核心业务场景开展技术攻关与场景创新。月之暗面将为该公司提供大模型技术支撑，助力能源电力等关键基础行业的专属知识库建设、模型微调与定制化训练，联合打造智能电力 AOS、行业专属智能体及一体化数智解决方案。在专有云部署方面，双方将长期共同推进国产算力适配与兼容改造，确保关键基础设施自主可控。同时，双方将在品牌共建、标杆案例打造、行业生态拓展及人才队伍建设等方面深度协同，共同扩大行业影响力，加速推进 Agentic AI 在关键行业的落地普及。商业模式方面，双方将探索落地中国版“模型 + 企业服务”协同新范式，采用 Token 分成机制实现共赢发展。针对合作落地过程中基于 Kimi 大模型产生的 Token 消耗收益及其他合作衍生收入，双方将按照协议约定比例进行分成。此外，该公司将全力推进算力业务布局，自建行业算力中心将优先满足月之暗面的算力需求。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/065.htm", "publishedAt": "2026-07-20T07:52:49+00:00"}, {"title": "达尔优推出 AE6 V2 P3955 传奇版电竞鼠标：原相 AIM-3955 PRO 传感器，329 元", "summary": "IT之家 7 月 20 日消息，达尔优今日宣布推出新款 AE6 V2 传奇版电竞鼠标，搭载与原相联合定制 AIM-3955 PRO 传感器，定价 329 元。这款鼠标搭载全新 AIM-3955 PRO 传感器，可达 50000DPI、750IPS 追踪速度、60G 加速度；搭载 Nordic 54L15 主控芯片；支持原生级双 8000Hz 回报率。这款鼠标内置 500mAh 电池，2.4G 模式下 1KHz 回报率可实现约 330 小时续航，8KHz 回报率约 50 小时续航；这款鼠标采用全覆盖龙骨内骨骼设计，大幅提升壳体强度，表面采用准分子肤感 UV 工艺，重约 59g。IT之家附详细参数如下：京东达尔优 AE6 V2 电竞游戏鼠标 传奇版 疾速白 (P3955 版)329 元直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/062.htm", "publishedAt": "2026-07-20T07:52:01+00:00"}, {"title": "vivo S2 手机曝光，预计下月初海外发布", "summary": "IT之家 7 月 20 日消息，据 X 平台消息人士 Yogesh Brar 前天透露，vivo S2 手机将于 8 月初在印度发布，并在 8 月 15 日前后开售。据介绍，这款手机的型号是 V2576，目前已经出现在蓝牙技术联盟（IT之家注：Bluetooth SIG）数据库中，并明确标注为 vivo S2。不过，目前该机的详细参数还没有公布，预计该机将主打影像拍摄和外观设计。作为参考，vivo 曾于 2019 年在印度市场推出 S1 手机。该机配备 6.38 英寸 FHD+ Super AMOLED 屏幕，搭载联发科 Helio P65 八核处理器。拥有 4GB 内存和 128GB 存储空间，采用三摄设计，出厂预装基于 Android 9.0 Pie 的 Funtouch OS 9 系统。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/059.htm", "publishedAt": "2026-07-20T07:44:29+00:00"}, {"title": "微星“MAG 341CQP QD-OLED X28”34 英寸带鱼屏显示器发售：1440P 280Hz QD-OLED，5499 元", "summary": "IT之家 7 月 20 日消息，微星旗下“MAG 341CQP QD-OLED X28”34 英寸带鱼屏显示器目前已在京东发售，该机主打 1440P 280Hz，定价为 5499 元。京东微星“MAG 341CQP QD-OLED X28 流光”显示器券后 5499 元领 500 元券该机配备一块 3440x1440 分辨率 280Hz QD-OLED 面板，曲率 1800R，SDR 亮度 300 尼特，HDR 峰值亮度 1300 尼特，显示器支持 10-Bit 色彩，覆盖 99% DCI-P3 色域。该机支架支持升降 / 倾斜 / 俯仰，显示器本体支持 VESA 100x100mm 壁挂，背壳带有龙纹图腾，提供 2 个 HDMI 2.1 接口、1 个 USB-C 15W 接口、1 个 DP 1.4a 接口、1 个 3.5mm 音频接口。IT之家附显示器参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/055.htm", "publishedAt": "2026-07-20T07:39:34+00:00"}, {"title": "李开复：零一万物计划 2027 年赴港 IPO", "summary": "IT之家 7 月 20 日消息，据彭博社报道，在上海举行的世界人工智能大会（WAIC）上，由人工智能专家、曾任谷歌全球副总裁的李开复创立的北京人工智能初创公司零一万物（01.ai）表示，公司计划于 2027 年在香港进行首次公开募股（IPO）。李开复表示，“我们的目标是在 2027 年，也就是财年结束之后”。该公司财年于 12 月结束。李开复透露，零一万物还计划在首次公布年度业绩期间，寻求上市前融资（Pre-IPO 融资）。零一万物于 2023 年成立，仅 8 个月后估值便超过 10 亿美元（IT之家注：现汇率约合 67.81 亿元人民币），投资方包括阿里巴巴旗下云业务部门等。李开复表示，随着越来越多中国 AI 企业寻求赴港上市，零一万物正在调整其境外控股架构，以适应未来上市计划。香港针对科技企业推出的特殊上市规则允许人工智能公司在尚未实现盈利的情况下上市，但企业需要满足一系列条件，包括具备一定运营历史、持续投入研发、获得专业投资者支持，以及拥有清晰可行的商业化路径。此次上市计划是在零一万物调整业务方向之后提出的。公司此前主要研发前沿大语言模型，如今则转向构建面向企业的 AI 基础设施。李开复表示，目前零一万物主要基于中国开源权重模型进行微调和定制，包括 DeepSeek、阿里巴巴千问以及智谱 AI 的 GLM 模型。他透露，目前零一万物约有一半业务收入来自中国以外市场。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/051.htm", "publishedAt": "2026-07-20T07:35:31+00:00"}, {"title": "实测千问 Qwen3.8 预览版，国产模型开始围攻 Fable 5", "summary": "还有 DeepSeek、智谱、MiniMax……#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672515?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-20T07:31:53+00:00"}, {"title": "宇树发布 UnifoLM-OminiA-0.3 模型，支持全模态交互理解", "summary": "IT之家 7 月 20 日消息，今日宇树科技发布宇树 UnifoLM-OminiA-0.3，单模型统筹家居康养多任务，支持全模态交互理解，全程自主，稳定执行抗干扰。 IT之家注意到，根据宇树科技发布的演示视频，该模型能够完成多种实际任务，例如：物品搬运：将地上的抱枕放到沙发上。视觉识别与回答：识别抱枕颜色（如白色）、药盒颜色和数量（如三盒药，红、蓝、黄）。精细操作：将第三层蓝色药盒拿到上面来、把衣服放进脏衣篓、将盘子放入洗碗机。设备控制：调节病床高度，并在用户说“停”时立即停止运动。该模型是宇树科技在人形机器人 G1 上应用 AGI（通用人工智能）和物理 AI 技术的重要进展，实现了机器人从感知到行动的闭环。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/032.htm", "publishedAt": "2026-07-20T07:22:09+00:00"}, {"title": "芒米 Air Y 系列掌机核心参数公开：标准版骁龙 662、Pro 版骁龙 865", "summary": "IT之家 7 月 20 日消息，芒米官方今天在 X 平台发文，公布 Air Y 系列掌机的核心参数。其中，芒米 Air Y 标准版将搭载骁龙 662 芯片；Air Y Pro 则配备骁龙 865 芯片。IT之家了解到，骁龙 662 发布于 2020 Q1，采用 11nm 制程工艺，拥有 8 核 Kryo 260 CPU（4*2.0GHz A73+4*1.8GHz A53），性能相比上一代提升 20%。集成 Adreno 610 GPU，支持 UFS 2.1 闪存和 LPDDR3/LPDDR4X 内存，小米 Redmi Note 9 4G 和华为 nova 8i 曾使用这枚芯片。而骁龙 865 则发布于 2019 年 12 月，采用 7nm 制程工艺，搭载高通三丛集设计的 8 核 64 位 Kryo 585 架构，最高主频达 2.84GHz，集成 Adreno 650 GPU，主要搭载机型包括小米 10、三星 Galaxy S20 等。此外，芒米 Air Y 标准版将采用黑色外观，配备十字键、ABXY 按键和单摇杆，机身左侧带有橙色按键、滚轮，以及一颗黑色按键。而 Air Y Pro 的外观则是改为米色，其他与标准版大致相同，但拥有对称的双摇杆。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/031.htm", "publishedAt": "2026-07-20T07:22:03+00:00"}, {"title": "全新一代 smart 精灵 #1 官图发布：搭千里浩瀚 H5 高阶驾驶辅助系统、15.4 英寸 2.5K 中控", "summary": "IT之家 7 月 20 日消息，smart 现已发布全新一代 smart 精灵 1 号（精灵#1）官图，新车针对电子电气化底层架构、智能座舱、高阶智驾与动力补能体系等超 200 项整车产品体验进行了升级。该车新增蓝色 / 白金色车漆方案，整体造型延续现款车型标志性设计语言，车顶加装激光雷达，为高阶辅助驾驶提供硬件支撑；车身前翼子板新增环境感知摄像头，车门把手更换为国标半隐藏式结构。该车座舱升级为一块 15.4 英寸 2.5K 分辨率中控，搭载龙鹰 6P 座舱专用芯片，系统基于 smart OS 深度定制 Flyme Auto，全链路支持自然 AI 语音交互。官方强调，该车搭载全球首个量子级 AI 电子电气架构 EEA4.0，为全车智能功能提供底层算力支撑，配套千里浩瀚 H5 高阶驾驶辅助系统。智驾硬件搭载英伟达 Orin Y 芯片，峰值算力 200TOPS；全车布置 31 颗高精度感知硬件，包含车顶激光雷达、翼子板摄像头等设备。依托全新迭代的 G-ASD 4.0 算法模型，车辆可实现全场景自动泊车，覆盖各类城市复杂停车场景。规格方面，该车尺寸长宽高为 4270/1822/1636mm，轴距 2750mm。车辆基于 800V 碳化硅高压平台打造，匹配 16 合 1 高性能集成电驱。根据工信部申报信息，后置单电机峰值功率 245kW，搭载 61.52kWh 动力电池，CLTC 工况纯电续航 535km。整车支持 6C 超快充技术，电量从 10% 充至 80% 仅需 12 分钟。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/029.htm", "publishedAt": "2026-07-20T07:21:30+00:00"}, {"title": "飞傲推出 DM15 便携立体声 CD 播放器：双 AKM AK4493S DAC 芯片，1599 元", "summary": "IT之家 7 月 20 日消息，飞傲官方今日宣布推出 DM15 便携立体声 CD 播放器，售价 1599 元，银色版现已发售，黑色、红色、白色版预计于 8 月陆续开售。这款新品尺寸约 144×137×25.5mm，采用全铝合金机身，重约 471.5g；电池容量 4700mAh，续航超 6 小时，也可隔离电池作为台机使用；搭载一块 0.96 英寸的 LCD 显示屏；耳机输出支持 3.5mm 单端和 4.4mm 平衡，平衡输出功率最高 L+R≧1100mW+1100mW（32Ω，THD+N&lt;1%/台机模式，6Vrms）。这款新品搭载两颗 AKM AK4493S DAC 芯片；采用高通蓝牙芯片 QCC3086，支持 aptX Lossless 无损蓝牙；实现 HiFi 级 USB 声卡功能，支持 384kHz/32bit 以及 DSD256 高采样率。IT之家附这款新品详细参数如下：京东飞傲（FiiO）DM15 银色 1599 元直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/025.htm", "publishedAt": "2026-07-20T07:12:17+00:00"}, {"title": "小米米家中央空调巨省电 Pro 风管机预售：智能空气管理面板，国补价 5609.2 元起", "summary": "IT之家 7 月 20 日消息，小米米家中央空调巨省电 Pro 风管机今日开启预售，提供大 3 匹、4 匹版本，标配智能空气管理面板，首发价分别为 6599 元、7599 元，国补价分别为 5609.2 元、6459.2 元起。新品搭载米家灵云节能技术，在开启米家灵云智控引擎情况下，AI 节能率可达 30%，相比普通米家中央空调风管机 3 匹更省电。配置方面，该产品采用三排蒸发器 + 大双排冷凝器设计，换热面积相比前代提升 +18%，换热效率更高更省电；配备高效双缸压缩机，运行下限频率低至 8Hz，低频运行更省电；搭载 556mm 超大直径风轮，外机风量提升 11%，散热效果更出色。制冷制热能力方面，该产品最大制冷量 9800W，额定制冷量 7580W，最大制热量 13800W，额定制热量 10000W，可覆盖 30-40㎡ 房间，实现快速冷暖。外机支持宽温域运行，可在 -35℃ 低温下制热、 65℃ 高温下制冷，无惧酷暑严寒。该产品标配智能空气管理面板，支持一键全屋空气管理，可联动接入米家的智能设备，打造全屋健康好风。同时支持 AI 智能检测，可对内外机脏堵、系统加氟、软硬件故障等 122 项问题进行智能诊断，主动提醒异常。智能体验方面，该产品支持小米澎湃智联，可以接入米家 App，实现全屋智能互联，支持车内语音提前控制、超级小爱控制、米家 App 远程控制，并且支持全链路 OTA 升级，可以持续优化功能体验。该产品提供多种可选配件，用户可单独购买米家人感智能控风面板，支持风吹人、风避人、人近柔风、人走节能等智能功能，也可根据需求额外购买新风模块、MIFD 健康滤网、除醛滤网等健康配件，打造全屋好空气。IT之家附详细参数如下：2026 年数码家电政府补贴持续进行中，IT 之家为大家汇总国补领券地址，买数码家电之前记得领取。数码补贴：点此领券手机 / 平板 / 3C 数码支持 8.5 折政府补贴，不超过 6000 元的产品至高立减 500 元。家电补贴：点此领券多类家电支持 8.5 折政府补贴，单品至高补贴 1500 元。京东小米米家中央空调巨省电 Pro 风管机 6599 元起（国补价 5609.2 元起）直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/024.htm", "publishedAt": "2026-07-20T07:10:39+00:00"}, {"title": "多模态 AI 模型“神珍”开放，能处理蛋白质、天气等六类科学信息", "summary": "IT之家 7 月 20 日消息，据上海科学智能研究院官方微信公众号消息，近日，上海科学智能研究院（下称“上智院”）开放科学多模态基础模型“神珍”（Monkey King Bang, MKB）。模型总参数约 110 亿，面向 DNA、RNA、蛋白质、小分子、地球系统和医学影像六类科学数据，在一个统一模型中支持科学理解与多类结果生成。在扩展科学能力的同时，模型在相关评测中整体保持了基础模型的文本与通用图像能力。据IT之家了解，在科学智能（AI for Science）领域，蛋白质、分子、气象和医学影像等方向已形成一批性能出色的专用模型。但不同科学对象背后的规律并不相同：序列强调前后依赖，分子强调原子之间的连接，气象场强调时空演化，医学影像强调局部结构。如何既保留这些差异，又让一个模型学习其中可共享的规律，并同时支持科学理解与结果生成，仍是科学智能基础模型需要回答的问题。“神珍”正是对这一问题的一次系统探索。“神珍”以 Qwen3-VL-8B 为共享主干，为六类科学数据设置专门的数据处理通路。区别于把所有数据转换成同一种格式，“神珍”在进入共享模型前，分别保留序列的先后关系、分子的连接结构、气象场的空间分布和医学影像的局部细节。蛋白质和核酸仍按序列处理，小分子仍按结构处理，气象数据仍保留空间分布，医学影像仍保留图像细节。这些能力被集成在同一个模型中，使用时按任务调用相应功能。除文本回答外，“神珍”还能直接生成 RNA 序列、可供计算机读取的分子表示（SMILES）、全球气象场和医学影像分割结果。图 1｜“神珍”总体架构｜多种科学数据从各自入口进入同一个模型，并根据任务输出文本、RNA 序列、SMILES 分子表示、全球气象场或医学影像分割结果。在约 110 亿参数的规模下，“神珍”在生物序列、小分子、气象和医学影像等任务中展现出竞争力。在覆盖 DNA、RNA、蛋白质以及不同生物序列关系判断的 20 项任务中，“神珍”有 9 项取得三款参评模型中的最优结果，17 项位列前二。逐项比较，“神珍”在 16 项任务上得分高于同量级的 Biology-Instructions；与总参数约 1 万亿的 Intern-S1-Pro 相比，两款模型各在 10 项任务上得分更高。这组结果表明，参数规模并不是衡量科学模型能力的唯一维度；如何面向不同科学对象设计有效的建模方式，是科学基础模型仍需持续探索的问题。图 2｜生物序列理解任务的结果对比。加粗为三款参评模型中的最优结果，下划线为次优结果。除生物序列外，“神珍”还在小分子、气象和医学影像任务中进行了验证。小分子：在公开基准 SMolInstruct 的 6 项小分子属性理解任务中，“神珍”在三款参评模型中有 4 项取得或并列取得最优结果。图 3｜小分子理解任务的结果对比｜加粗为三款参评模型中的最优结果，下划线为次优结果。气象：在离线评测中，给定一帧初始大气场，模型每 6 小时滚动预报一步，持续推演至第 10 天；在第 10 天的预报中，500hPa 位势高度、2 米温度、海平面气压等多项指标达到或优于业务级数值预报的水平。图 4｜“神珍”与 ECMWF HRES 在全球 ERA5 预报上的比较医学影像分割：在覆盖 CT、MRI、病理等九种影像模态、逾十万个图文样本的评测中，“神珍”衡量预测区域与人工标注重合程度的平均 Dice 得分为 91.20，在 7 种参评方法中最优。分 9 类影像看，5 类排名第一，其余 4 类排名第二。图 5｜9 类医学影像的文本提示分割案例“神珍”将四类代表性能力汇集在同一个统一模型中：理解生物序列，预测小分子性质或生成 SMILES，滚动生成最长 10 天的全球气象场，以及根据文字提示完成医学影像分割。不同任务会调用相应的处理组件，但共享同一模型主干和联合训练的权重，研究者无需在多个彼此独立的领域模型之间切换。对科学模型的开发共享而言，开放权重只是第一步。是否同时提供可运行的代码、示例和清晰的输入输出说明，也会直接影响模型能否被验证和复用。此次发布同步提供模型权重、推理代码、示例脚本、输入说明和使用文档，并补充气象预报与医学影像分割所需的配置，支持研究者开展本地部署或接入已有科研流程。研究者可以通过星河启智科学智能开放平台下载模型或调用 API，与平台汇聚的 1500 余个科学模型和工具一起组合与再创造；也可在 Hugging Face 下载模型权重，在 GitHub 获取推理代码和示例。作为今年 3 月初面世的系统级科研智能体“大圣”的超级大脑，“神珍”之名，取意于《西游记》中的“天河定底神珍铁”。团队希望这套开放模型以相对精炼的形态承载多样的科学任务，也让更多研究者参与检验、使用与共建。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/017.htm", "publishedAt": "2026-07-20T07:00:15+00:00"}, {"title": "Cleer Bridge 鹊桥开放式蓝牙耳机发售：12mm 动圈、23 小时续航，1199 元", "summary": "IT之家 7 月 20 日消息，Cleer 旗下 Cleer Bridge 鹊桥开放式耳机现已在京东发售，该耳机支持杜比音效，内置 AI 翻译功能，首发价 1199 元。京东 Cleer Bridge 鹊桥耳机 1199 元直达链接该耳机采用极夜黑配色，整体使用人体工程学“鹊桥弧”设计，拥有 IPX5 认证，耳机单耳重量 7.8g。该耳机配备 12mm 动圈，支持杜比音效技术、Cleer DBE 5.0 动态低音增强技术及双源拾音架构通话技术，同时耳机内置了 AI 智能体，可快速唤醒语音助理、AI 翻译、语音转写等特性。耳机单耳续航 7 小时，在配合充电盒的情况下至高拥有 23 小时续航。IT之家附耳机参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/013.htm", "publishedAt": "2026-07-20T06:54:11+00:00"}, {"title": "航嘉推出灵动 F60 奶茶充电头：配单 USB-C 60W 接口、支持 AVS 协议，109 元", "summary": "IT之家 7 月 20 日消息，航嘉宣布推出一款“灵动 F60 奶茶充”单 USB-C 60W 充电头，不过目前仅有第三方经销商有售，搭配 1.2 米 USB-C 充电线定价为 109 元。该产品造型圆润，尺寸为 36x36x41mm，重量 62g，外覆准分子肤感材质，提供奶茶粉、奶霜白、抹茶绿三种配色可选。充电头使用可折叠插脚，匹配单 USB-C 60W 接口，支持 PD（AVS）、QC、PPS、SCP、UFCS 协议。IT之家附产品参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/011.htm", "publishedAt": "2026-07-20T06:52:03+00:00"}, {"title": "字节发布 Seed Audio 1.0 音频创作模型：支持精细时间控制，音色风格可控、长时稳定", "summary": "IT之家 7 月 20 日消息，字节跳动 Seed 官方今日发布了音频创作模型 Seed Audio 1.0，面向完整声音场景，在统一框架下联合建模人声、音效和环境声等多种音频要素，端到端完成影视级音频创作。官方宣称，声音不再只是画面的补充，而是可以直接参与叙事，在听者脑海中直接形成画面感，做到“听见”即“看见”，其核心能力主要体现在以下方面：多要素统一编排，支持精细的时间控制：一条 prompt 即可统一编排带有特定情绪的对白、关键音效和环境声，并可按时间线精准控制声音进场。音色风格可控，长时稳定：支持文本与参考音频输入，在长音频和多次延长场景下保持角色一致性，同一音色也能自然呈现不同语气和情绪。多语种自然生成：支持 联系客户经理协助评估。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/103.htm", "publishedAt": "2026-07-20T08:37:22+00:00"}, {"title": "先封介绍国内首款 AI 算力芯片玻璃基 CoPoS 样品，联合燧原开发", "summary": "IT之家 7 月 20 日消息，燧原科技 (Enflame) 本月 18 日在 WAIC 2026 上携手先封科技联合发布国内首款面向 AI 算力芯片的玻璃基板 CoPoS 先进封装样品。这同样是燧原自研高端 AI 算力芯片首次与国产化 CoPoS 先进封装核心技术相结合的解决方案。IT之家注意到，先封科技 (Advanced Packaging) 也对这款样品进行了介绍。其综合应用了多种材料 / 工艺 / 技术，包括玻璃基板、PVD（物理气相沉积）、面板级光刻图案化、精密电镀增层、化学蚀刻金属牺牲层、面板级 RDL（重布线层）、绝缘层狭缝涂覆、微米级贴片、翘曲控制低应力塑封、表面研磨成型切割。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/096.htm", "publishedAt": "2026-07-20T08:34:36+00:00"}, {"title": "工信部：截至 6 月底，5G 基站总数达 510.2 万个，加快推进第二阶段 6G 技术试验", "summary": "IT之家 7 月 20 日消息，在国务院新闻办公室今天举行的新闻发布会上，工业和信息化部新闻发言人、信息通信管理局局长谢存透露，上半年，电信业务总量同比增长 7.9%，信息通信业总体呈现四个“稳步提升”的良好态势。IT之家从发布会获悉，截至 6 月底，我国 5G 基站达到 510.2 万个，具备千兆网络服务能力的 10GPON 端口达 3286 万个。积极推进 5G-A 商用网络建设，万兆光网在小区、工厂、园区等场景实现试点部署。我国智能算力规模达 2185EFLOPS，同比增长 177%。信息通信技术深度赋能实体经济，建成 5G 行业虚拟专网超 8 万个，5G、千兆光网应用已融入 94 个国民经济大类，全国“5G+ 工业互联网”在建项目超 2.6 万个，建成 1260 家分类分级、特色鲜明的 5G 工厂。发布会还提到，基于 5G 的智能终端类型不断丰富，人工智能手机和电脑、智能机器人、AI 眼镜、AI 玩具等产品成为信息消费新热点。批复 6GHz 频段 6G 试验频率使用许可，加快推进第二阶段 6G 技术试验。开放发展水平稳步提升。实施增值电信业务扩大对外开放试点，吸引和利用外资成效凸显。截至目前，外商投资电信企业累计达 3219 家，较去年同期增长 23.9%。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/093.htm", "publishedAt": "2026-07-20T08:28:20+00:00"}, {"title": "王祖贤息影 22 年后授权 AI 形象，网易《天下》合作首个 AI 短片《倩影》上线", "summary": "IT之家 7 月 20 日消息，网易《天下》上周发布了一条 AI 短片，引发网友关注。演员王祖贤息影 22 年后，授权 AI 形象给网易《天下》，推出了这部《倩影》短片。从视频可以看到，短片中出现了王祖贤年轻时的经典荧幕形象，该短片由网易互娱 DM Monet 画布、火山引擎提供支持。今年 6 月，在《天下》18 周年之际，游戏官方宣布王祖贤成为网易《天下》IP 18 周年品牌代言人。据IT之家今年 6 月报道，62 岁的香港演员吴启华自曝最近卖了肖像权拍 AI 电影。“他们用我 20 岁的样貌去制作一部电影，我本人不用亲自演出。我看过成品，很满意，也正好重温一下当男主角的感觉。”吴启华表示已经签了合同，所以不怕对方拿自己的肖像来拍其他电影，更透露酬劳不错，认为 AI 发展未必会冲击演员工作，反而替自己开拓出另一条新的发展路线。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/089.htm", "publishedAt": "2026-07-20T08:21:38+00:00"}, {"title": "新型勒索木马 ClickLock 曝光，瞄准苹果 macOS 下手", "summary": "IT之家 7 月 20 日消息，安全公司 Group-IB 发文，披露了一款名为 ClickLock Stealer 的新型 macOS 勒索木马。相应木马最初于今年 5 月开始，目前已导致全球 33 个国家至少 100 名用户受到影响，其中超过一半受害者位于欧洲地区。Group-IB 表示，ClickLock 通常会伪装成验证页面（例如山寨 Cloudflare 页面），诱导用户复制恶意命令到 macOS 终端运行，进而在受害者设备上下载运行木马。在木马运行后，受害者设备上会弹出一个伪造的 macOS 系统密码输入窗口。该窗口会显示受害者真实账户名称以及苹果 Logo，以增强可信度。当用户输入密码后，ClickLock 会通过 macOS 本地目录服务验证密码是否正确。只有输入正确密码后，密码才会被发送至黑客控制的 Telegram 机器人；如果密码错误，ClickLock 则会继续要求用户重新输入。如果用户尝试关闭密码窗口，ClickLock 会进一步建立两个 LaunchAgent 持久化组件，使恶意木马能够在用户下次登录时自动运行。具体来看，第一个模块会以每 0.21 秒一次的频率强制关闭 Finder、Dock、终端、活动监视器、系统设置、Spotlight 以及浏览器等应用程序，只保留密码输入窗口。该行为最长可持续约 83 小时，使用户难以正常操作设备。第二个模块则会不断触发 macOS 真实的钥匙串授权窗口，诱导用户验证凭据，从而获取浏览器保存的密码、Cookie 以及自动填充数据。安全公司表示，除了窃取系统密码外，ClickLock 还具备大规模信息收集能力。该木马能够针对 8 款浏览器、31 个加密货币钱包浏览器扩展、7 款密码管理工具进行数据窃取，同时还会搜索 Shell 历史记录、FileZilla 配置文件以及加密货币地址等敏感信息。安全公司提醒，任何要求用户打开终端并粘贴陌生命令的网站，都存在潜在风险。若 Mac 设备突然只剩密码窗口可操作，用户应立即强制关机，并通过安全模式重新启动系统，再由专业人员检查和清理恶意程序。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/086.htm", "publishedAt": "2026-07-20T08:15:52+00:00"}, {"title": "《漫威斗魂》游戏 PC 版配置公布：最低 RTX 2060 显卡、推荐 RTX 3070", "summary": "IT之家 7 月 20 日消息，Arc System Works 工作室与索尼互娱近期公布《漫威斗魂》游戏的 PC 版配置要求，本作将于 8 月 6 日发售，目前已在 Steam 平台开启预购，定价 298 元（商店页链接：https://store.steampowered.com/app/3787240/MARVEL_Tkon_Fighting_Souls/）。IT之家附本作具体配置要求如下：最低配置推荐配置操作系统Windows 11Windows 11处理器英特尔酷睿 i5-8400/AMD 锐龙 5 1600X英特尔酷睿 i7-8700/AMD 锐龙 5 3600X内存16GB16GB显卡英伟达 RTX 2060 6GB / AMD Radeon RX 6600 XT 8GB英伟达 RTX 3070 8GB / AMD Radeon RX 7600 XT 16GB作为参考，《漫威斗魂》主打“全民皆可上手”的体验。与传统格斗游戏要求熟记各角色连招不同，《斗魂》全角色采用统一的操作方式，玩家无需逐一学习技能即可上阵对战。目前官方确认的可用角色包括美国队长、钢铁侠、蜘蛛侠、毁灭博士、暴风女、惊奇女士、星爵以及恶灵骑士（罗比・雷耶斯）等，每位角色的造型都融入了日式元素，譬如钢铁侠的战甲就借鉴了高达风格。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/064.htm", "publishedAt": "2026-07-20T07:52:28+00:00"}, {"title": "红魔游戏平板 5 PRO 下一轮发售定档 7 月 24 日，国补价 4499 元起", "summary": "IT之家 7 月 20 日消息，红魔游戏平板 5 PRO 已于 6 月 30 日正式发布，采用透明水冷设计，号称“口袋里的游戏神器”，首销 4999 元起、国补价 4499 元起。该机下一轮发售定档 7 月 24 日 10 点。京东红魔游戏平板 5PRO 国补价 4499 元起直达链接据介绍，红魔游戏平板 5 PRO 搭载第五代骁龙 8 至尊版处理器 + 红芯 R4，匹配 ICE 魔冷散热架构。平板内置 8300mAh 电池，搭载双 USB-C 接口，支持 80W 有线充电，支持旁路充电 PRO。该平板还搭载全新 PC 模拟器 Steam 直连模式，低门槛畅玩 PC 大作。同时内置了 AI 战术教练和 AI 魔姬嘴替两大功能，前者支持赛前赛中提供选英雄、出装战术等游戏指导，后者支持 DeepSeek 自然回复交流，让对手“破防”。京东红魔游戏平板 5PRO 国补价 4499 元起直达链接2026 年数码家电政府补贴持续进行中，IT 之家为大家汇总国补领券地址，买数码家电之前记得领取。数码补贴：点此领券手机 / 平板 / 3C 数码支持 8.5 折政府补贴，不超过 6000 元的产品至高立减 500 元。家电补贴：点此领券多类家电支持 8.5 折政府补贴，单品至高补贴 1500 元。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/034.htm", "publishedAt": "2026-07-20T07:27:38+00:00"}, {"title": "Linux 基金会推出 x402 基金会", "summary": "Linux 基金会宣布 x402 基金会正式启动运营，一个新成立的开放治理机构，旨在管理 x402 协议 —— 基于 HTTP 的互联网原生支付开放标准。 x402 协议最初由 Coinbase 开发，将安全支付功能直接嵌入到 Web 交互中，使 AI 智能体、API 和应用程序能够像交换数据一样无缝地发送和接收付款，并支持从传统银行卡到稳定币的各种...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475087/linux-foundation-x402-foundation", "publishedAt": "2026-07-20T07:14:21+00:00"}, {"title": "台积电追加千亿美元扩建美国工厂，称 AI 芯片需求将持续多年", "summary": "IT之家 7 月 20 日消息，据路透社报道，台积电表示，未来多年 AI 芯片需求依然强劲，公司正追加 1000 亿美元（IT之家注：现汇率约合 6780.91 亿元人民币）投资扩建美国亚利桑那州工厂，但也必须解决当地建筑工人短缺等挑战。在周四公布创纪录的第二季度业绩后，台积电首席财务官黄仁昭（Wendell Huang）表示，公司对亚利桑那州项目的进展“非常满意”，这也是台积电决定将当地投资总额提高至 2650 亿美元（现汇率约合 1.8 万亿元人民币）的原因。“我们将继续投资。”黄仁昭在接受采访时表示，并补充称，公司非常感谢美国政府提供的支持，“我们持续看到客户需求十分强劲，而且这种需求具有持续多年的结构性特征。”作为全球最先进 AI 芯片的主要制造商，也是英伟达的重要供应商，台积电持续加大资本支出、利润率不断攀升，被视为全球半导体行业需求的风向标。扩大亚利桑那州工厂规模，也被视为美国总统唐纳德 · 特朗普推动芯片制造回流美国的一项成果。特朗普曾表示希望在自己卸任前，美国能够拥有全球 50% 的半导体制造产能。黄仁昭表示，台积电位于亚利桑那州的第一座晶圆厂已经投入运营，良率已达到与台湾地区旗舰工厂“同样优秀”的水平。第二座晶圆厂即将开始设备进驻，第三座晶圆厂正在建设中，第四座晶圆厂以及当地首座先进封装工厂的前期准备工作也已经启动。按照目前已建成和规划中的项目，未来台积电在亚利桑那州将拥有 12 座晶圆制造及先进封装设施，并设立一座研发中心。不过，他并未透露新增投资项目的具体时间表。不过，黄仁昭也坦言，扩建仍面临现实限制。“目前存在一些物理条件上的限制，比如可用建筑工人的数量，以及基础设施建设能力。”他说，“我们会与政府密切合作，共同解决这些问题。”与此同时，台积电仍在持续扩大台湾地区本土投资，未来几年将在台湾地区新建 13 座先进制程及先进封装工厂。“台湾地区的土地资源非常有限。”黄仁昭表示，“因此，只要有可开发的土地，我们都会优先用于部署最先进的制程技术。”他进一步解释称，最先进工艺的大规模量产需要研发团队与制造团队保持高度协同，因此必须首先在台湾地区完成技术成熟和稳定运行，之后才会考虑将相关技术转移至海外生产。对于未来是否会考虑通过在美国发行新股融资，黄仁昭回应称，如果市场环境合适，公司“不会排除发行新债券”的可能性。近期，随着全球企业持续投入巨额资金建设 AI 基础设施，投资者再次开始担忧 AI 热潮能否长期持续。尽管台积电交出了历史最佳季度业绩，其在台北上市的股票周五仍下跌 7.3%。不过，今年以来，公司股价累计仍上涨接近 Q 中文", "sourceUrl": "https://www.infoq.cn/article/PVEe5yav0IC8MygcVeOM?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T11:32:56+00:00"}, {"title": "AI 热潮重塑美国就业市场格局：计算机专业失业率走高，数据中心电工年薪高达 28 万美元", "summary": "IT之家 7 月 20 日消息，如果全球众多分析师的判断没有出现严重偏差，那么这场持续升温的 AI 热潮几乎注定会像千禧年前后的互联网革命一样，重塑我们生活的方方面面。如今，这种变化也开始迅速影响就业市场。一场由 AI 推动的职业分化正在形成：有人迎来新的机遇，也有人面临更大的竞争压力。曾经被视为“黄金赛道”的计算机工程专业逐渐失去光环，而电工等技术工种则因 AI 基础设施建设迎来新的发展机会。根据纽约联邦储备银行（New York Fed）统计的劳动力市场数据，目前失业率最高的大学专业是人类学，达到 7.9%；紧随其后的是计算机工程专业，失业率为 7.8%。当然，人类学专业的就业市场低迷已经持续多年，而计算机工程专业直到不久前仍被认为是科技人才最理想的职业选择之一。不过，随着 AI 编程助手（AI Coding Agent）的快速普及，这一职业的发展前景正受到越来越大的冲击。与此同时，参与 AI 数据中心建设的电工收入却水涨船高。报道称，新入行、从事 AI 数据中心项目的电工，年收入最高可达 28 万美元（IT之家注：现汇率约合 189.9 万元人民币）。当然，这份工作并不轻松。想成为持证电工，通常需要经历 4 至 5 年的学徒培训，包括约 8000 小时的带薪现场实践以及 500 至 900 小时的课堂学习，才能获得正式执照。不过，在学徒期间，还可以进一步取得与数据中心相关的专业资格认证，例如中压供电系统、美国国家消防协会（NFPA）标准等专业技能，从而提升竞争力。相比之下，计算机工程从业者如今却面临越来越离谱的招聘要求。例如，雅虎（Yahoo）一则高级软件开发工程师招聘启事要求应聘者拥有“10 年以上 Claude Code 使用经验”，然而这款 AI 编程工具问世至今仅约 1 年时间。这或许只是招聘人员工作失误造成的个别案例，但它也反映出当前 AI 时代技术岗位招聘日益混乱、要求不断提高的现实。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/066.htm", "publishedAt": "2026-07-20T07:53:43+00:00"}, {"title": "当人人都有 AI，品味为什么更加重要？", "summary": "6 月，我们在上海的源创会，大家分享了很多 AI 相关的创新。 那场之后我们一直在想，代码正在变得越来越充裕，而品味依旧稀缺；工具正在变得越来越强大，而人与人之间真正的差异，似乎开始回到那些无法被复制的东西——品味、判断，以及你相信什么值得被创造。 所以，7 月 25 日，源创会到北京。 围绕主题 「Taste Drive...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/474841", "publishedAt": "2026-07-20T02:18:27+00:00"}, {"title": "AI 编码实战 | 0 行手写代码，2 天重构 2 万行 Vue 项目", "summary": "文章的核心观点是：AI 辅助开发的关键不在 AI 本身的能力，而在于人为 AI 建立的约束体系 —— 通过 Skills 技能包注入领域知识、AGENTS.md 沉淀项目规范、飞轮效应让错误只犯一次，将模糊目标转化为 AI 可精确执行的高质量指令，从提出需求到代码合入，甚至本篇分享也是 AI 生成。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/vivotech/blog/19722516", "publishedAt": "2026-07-16T08:52:00+00:00"}]}]};

const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.parentNode.removeChild(box); return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top"><span class="dot" style="background:#94a3b8"></span>顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '"><span class="dot" style="background:' + accentVar(i) + '"></span>'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
