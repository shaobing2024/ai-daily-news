const DATA = {"date": "2026-07-22", "generatedAt": "2026-07-22T02:31:24Z", "attribution": {"source": "中文科技媒体 RSS 聚合"}, "sourceList": ["量子位", "IT之家", "InfoQ 中文", "爱范儿", "开源中国"], "lead": "", "isFallback": false, "sections": [{"label": "模型发布/更新", "items": [{"title": "腾讯云开源自研 AI 助手 Octop", "summary": "腾讯云自研的 AI 助手 Octop 宣布正式开源，源自此前的 LightClaw ACE。\"Octop\" 取自章鱼（Octopus）：八爪并展、灵活多变、可同时处理多项任务。 公告称，相比一次简单的品牌升级，Octop 更接近一次面向智能体时代的系统性重构：它重新梳理了用户、记忆、工具、执行环境与安全边界之间的关系，目标是让 AI 助手从“单次...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476519", "publishedAt": "2026-07-22T02:14:23+00:00"}, {"title": "英伟达演示 DLSS 5 改进：3 种模型细节，场景可按需切换", "summary": "IT之家 7 月 22 日消息，科技媒体 Tom's Hardware 昨日（7 月 21 日）发布博文，报道称在 7 月 19~23 日在美国洛杉矶召开的第 53 届计算机图形学与交互技术大会（SIGGRAPH）上，英伟达详细介绍了 DLSS 5 相关改进。 英伟达今年 3 月推出 DLSS 5 后，遭到诸多负面评价。在本次活动中，英伟达展示了 DLSS 5 的开发者控制能力，开发者可按场景选择 3 种模型，并对整体变化幅度和单个角色、物体分别设定强度。IT之家援引博文介绍，演示界面显示了 Model A、Model B 和 Model C 三种模型。英伟达称三者训练参数不同，即使输入相同角色和相同强度，皮肤、织物与光照外观也会不同，在使用过程中可以实时切换。全局控制包含 Structure Intensity 和 Tone Intensity 两个滑块，其中 Structure 用于控制高频细节，涉及环境光遮蔽、皮肤次表面散射和反射等效果。Tone 用于低频成分，影响更大范围的光照与颜色变化。在本次活动中，英伟达概述了开发 DLSS 5 过程中遇到的 3 个挑战，其中第一个是保持原始的创意愿景。英伟达表示在 DLSS 5 中，每个单独的物体、场景和游戏设置都可以根据开发者的愿景进行定制，因为维护视觉识别度、物体语义、角色姿势，以及输出光照语义、运动和艺术指导等要素至关重要。第二个挑战是时序流（temporal streaming）。传统的生成式 AI 视频生成器是分块处理的，它会跨帧进行推理并一次性生成一批帧。然而，实时渲染需要逐帧立即生成，由于 DLSS 5 使用游戏引擎中的运动矢量，它可以在不产生延迟的情况下即时生成额外的纹理。第三个挑战是渲染速度，为了以超过 60 FPS 渲染一个拥有 830 万像素的 4K 帧，英伟达需要在不到 16ms 延迟情况下完成该任务，其中大部分处理时间消耗在游戏引擎上。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/861.htm", "publishedAt": "2026-07-22T01:46:38+00:00"}, {"title": "中国银联与 15 家商业银行合作推“智能体银行卡”，航旅纵横、滴滴等一键智能支付", "summary": "IT之家 7 月 22 日消息，中国银联 7 月 20 日宣布推出智能体银行卡解决方案，携手商业银行开启银行卡“智能体”时代。中国银联携手 15 家商业银行，相继推出 AI 智能体银行卡产品。该系列产品将大模型算力、智能体会员、 AI 办公学习工具等纳入银行卡权益体系，标志着银行卡从支付工具向 AI 能力分发载体演进。银联通过 MaaS 能力输出，将多年积累的大模型能力、金融垂域 AI 能力通过标准化接口开放给银行等合作伙伴，形成一套标准化、可复制的智能体银行卡解决方案。支付功能方面，银联已与商业银行、智能体场景商户推进一键智能支付核心功能，航旅纵横、滴滴等应用场景将作为首批试点商户。IT之家从中国银联公告获悉，截至目前，平安银行、浦发银行、交通银行等多家银行已率先实现发卡。其中：平安银行联合银联与腾讯云推出“AI 智算卡”；浦发银行携手银联与阿里云发布科技菁英信用卡（云智版）；交通银行联合银联推出人工智能主题借记卡，并同步对现有同系列信用卡进行权益升级。工商银行、农业银行、中国银行、建设银行、招商银行、邮政储蓄银行、光大银行、兴业银行、民生银行、上海银行、江苏银行、徽商银行等也将陆续推出各具特色的智能体银行卡产品。与此同时，银联正推动支付能力从手机、电脑延伸至车载、AR、MR 眼镜等泛终端。在车载场景，用户可通过自然语言完成车内订餐、充电补能等服务。在眼镜和空间计算场景，银联探索通过语音、眼动、手势等交互完成选卡、优惠核销和支付确认。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/852.htm", "publishedAt": "2026-07-22T01:16:37+00:00"}, {"title": "耳听为虚：AI 冒充亲友、伪造名人声音、散布虚假言论，国家安全部警示 AI 语音深度合成三大风险", "summary": "IT之家 7 月 22 日消息，国家安全部今日发文，对于当前 AI 语音克隆技术可能存在的风险进行了警示。得益于 AI 技术的快速发展，AI 已能在极短时间内完成对真实人声的高仿真复刻，但相关滥用行为正严重扰乱社会秩序、侵害群众财产安全。国家安全部分析了 AI 语音克隆技术的三个主要特征。其一，采样速度极快，主流商业平台所需的最短训练样本时长已从几十分钟压缩至 3 到 5 秒。其二，合成语音极为逼真，研究显示在无提示情况下普通人识别高质量合成语音的准确率不足 50%。其三，操作极为简便，大批在线平台向公众开放“声音克隆”功能，普通用户上传样本即可一键生成。当声音可被随意伪造时，其承载的信任价值面临消解风险。国家安全部提示列举了三类主要风险：不法分子收集受害者家属声音样本合成语音，编造紧急事由实施诈骗；国内多个平台出现利用 AI 伪造名人声音的音视频，用于商业广告、自媒体引流等，直接侵犯自然人法定声音权益；个别人员恶意克隆公职人员及公众人物语音，拼接编造不实言论和虚假政策解读，通过社交媒体批量传播以误导公众认知。国家安全部提示指出，我国已基本形成集民事保护、行业监管、刑事惩戒于一体的制度约束体系。依据《中华人民共和国民法典》，对自然人声音的保护参照适用肖像权保护有关规定，未经本人授权擅自克隆、合成、传播他人可识别语音均属侵权行为。根据《生成式人工智能服务管理暂行办法》《互联网信息服务深度合成管理规定》等规范，深度合成语音服务提供者必须落实平台备案、用户实名、授权核验、溯源标识等合规要求。利用 AI 语音克隆实施电信诈骗、造谣抹黑、非法牟利等行为，触犯刑法的将依法从严追究刑事责任。IT之家注：深度合成是指利用深度学习技术生成包括文本、图像、音频、视频等在内的合成内容的技术统称。国家安全部提示还提出多方协同共治要求：网络平台须落实主体责任，清理违规工具功能，完善审核溯源预警机制；行业从业者应恪守科技向善底线；广大群众应增强防范意识，谨慎保护个人声纹信息，涉及资金及隐私核验时务必进行多重验证，遇侵权诈骗应及时留存证据并举报维权。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/841.htm", "publishedAt": "2026-07-22T00:58:47+00:00"}, {"title": "小红书大模型IMO满分夺金，第三题解法让冠军选手直呼优雅", "summary": "中国大模型首次获得IMO官方金牌水平认证", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/456061.html", "publishedAt": "2026-07-22T00:34:33+00:00"}, {"title": "英伟达详解 Vera CPU：专为智能体 AI 构建，88 个 Olympus 核心、1.2 TB/s LPDDR5X 内存", "summary": "IT之家 7 月 22 日消息，英伟达昨日（7 月 21 日）发布博文，从技术角度详细介绍了 Vera CPU，专为智能体 AI（Agentic AI）场景设计。英伟达表示智能体 AI 将更多的关键执行路径转移到了 CPU 上。智能体（Agents）在沙箱中运行代码、调用工具、检索上下文、与数据库交互以及分析结果，然后再将信息返回给模型。IT之家援引博文介绍，智能体 AI 工作负载主要取决于以下几点：即使插槽完全负载，也需要强大的单线程性能。每个核心都有足够的内存带宽，以持续为许多活跃的执行上下文提供数据。并发下的延迟具有可预测性，以便智能体能够稳定完成预定步骤。高效处理不规则控制流、长依赖链和指针密集型数据结构。英伟达在博文中强调，Vera CPU 围绕智能体 AI 负载设计，重点提升满负载条件下的单线程表现，其设计核心是 Olympus 核心。英伟达强调 Olympus 核心采用前端、核心中段、执行引擎和缓存子系统四部分设计。前端集成 10 宽解码引擎，并支持每周期最多处理 2 个已采用分支。其分支预测子系统包含神经分支预测器，用于提升复杂分支模式下的预测准确性。该公司表示，Vera CPU 共配备 88 个 Olympus 核心和 176 个 SMT 线程，目标是在单线程高负载与更高线程密度两类场景间切换，并降低线程间资源争用。在片上互连与缓存部分，Vera CPU 搭载 NVIDIA 可扩展相干互连，即 NVIDIA Scalable Coherency Fabric（SCF）。NVIDIA 称，这一互连提供最高 3.4 TB/s 双向分区带宽，并在全核心范围内集成 164 MB 统一 L3 缓存，连接核心、共享缓存、内存控制器、I/O 与 NVLink-C2C 接口。内存方面，Vera CPU 采用 SOCAMM2 LPDDR5X 内存。NVIDIA 称，该子系统聚合带宽最高 1.2 TB/s，按单核计算最高 14 GB/s，面向高并发 AI、分析、图计算与强化学习负载供数。扩展与 I/O 方面，NVIDIA 称 Vera CPU 支持双路扩展，通过第二代 NVLink-C2C 构建一致性双路平台。双路配置下，平台提供 176 条 PCIe 6.4 通道，并支持 CXL 3.1。保密计算方面，Vera CPU 基于 Arm CCA / RME，支持按虚拟机分配加密密钥，并使用经认证的 C2C 加密保护一致性链路数据。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/834.htm", "publishedAt": "2026-07-22T00:20:48+00:00"}, {"title": "美国将改革科研资金分配：从大学转向 AI，影响 2000 亿美元预算", "summary": "北京时间 7 月 22 日，据《华尔街日报》报道，特朗普政府计划通过加大对个人科学家和 AI 应用的支持，而非侧重大学，来加快联邦科研的改革。这是该政府加快技术升级以应对竞争的最新尝试。特朗普与克拉齐奥斯白宫科学与技术政策办公室 (OSTP) 周二发布的一份新报告和备忘录中表示，个人科学家能够帮助美国更快地利用 AI 开展科学研究。该办公室发布的这些指令，将影响特朗普第二任期剩余时间内联邦政府每年约 2000 亿美元（现汇率约合 1.36 万亿元人民币）的科研与开发预算分配方向。新的指导方针可能会进一步打击那些依赖联邦科研资金的大型大学。白宫在报告中表示，政府希望优先支持那些为个人提供机会、而不是直接面向高校的项目，例如奖学金和各类科研奖励。白宫称，应该效仿的示范项目包括美国国家科学基金会面向研究生的一项著名项目，以及美国国立卫生研究院针对具有创新能力科学家的资助项目。此外，白宫管理和预算办公室拟议的一项规定也可能对部分大学造成阻碍。该规则将赋予政治任命官员在科研经费审批方面更大的权力，并使科研方向与政府政策重点保持一致。“过去二三十年里，我们在科研资助方面变得非常僵化，总是认为应该以同样的方式、在同样的机构里，持续资助同样的研究。”白宫科学与技术政策办公室主任迈克尔 · 克拉齐奥斯 (Michael Kratsios) 在一次采访中表示。他说，周二他就这一新的科研资助方式与一所常春藤大学的负责人进行了会面，并获得了积极回应。特朗普政府认为，在政府机构和大学中花费过多时间处理官僚事务，是阻碍美国发展的另一个因素。根据该计划，大学里的个人研究人员将直接获得资金，从而减少大学作为中间环节的直接参与。目前在很多情况下，科研经费通常是拨给高校，再由高校进行分配。另一个重点是将 AI 置于科学研究的核心位置，并设定更具雄心的国家目标。例如，近期政府提出的目标包括：在 2028 年前部署一台强大的量子计算机，以及到 2030 年前启动 10 座新的大型核反应堆建设，以提升电力供应能力。美国政府已尝试将能源部的科学专业知识和超级计算机整合到一个名为“创世纪任务”(Genesis Mission) 的计划中，旨在通过与私营部门和研究人员合作，利用 AI 来应对研究挑战。“各机构应资助那些将 AI 作为科学发现新工具的研究，而不仅仅是将其作为增强现有能力的辅助手段。”克拉齐奥斯和预算办公室主任拉斯 · 沃特 (Director Russ) 在关于研发资金优先事项的备忘录中写道。不过，持怀疑态度的人士警告称，AI 模型容易出错，而过度强调该技术可能会限制研究人员所从事的研究类型。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/827.htm", "publishedAt": "2026-07-21T23:44:06+00:00"}, {"title": "DeepSeek R1 推理 AI 测试：英伟达 Vera Rubin NVL72 每兆瓦 Tokens 吞吐量提升 10 倍", "summary": "IT之家 7 月 22 日消息，英伟达（NVIDIA）昨日（7 月 21 日）发布博文，宣布其 Vera Rubin 正迈步万亿级规模部署。英伟达在博文中指出，公司正加速量产 Vera Rubin NVL72，并已在 CoreWeave、Google Cloud、Microsoft Azure 和 Oracle Cloud Infrastructure 等合作伙伴内部运行。英伟达表示为了满足全球客户的计算需求，Vera Rubin 在 30 个国家拥有 350 多个工厂，建立了有史以来规模最大、最成熟的机架级供应链。CoreWeave 公司昨日（7 月 21 日）发布博文，表示该公司于 6 月初完成了业界首个 NVIDIA Vera Rubin NVL72 的上电和验证工作，搭建了端到端的机架级系统，包括电源、冷却、网络和计算均已验证并运行。 IT之家翻译博文相关内容如下：DeepSeek R1 是驱动当前智能体 AI（Agentic AI）激增的推理模型之一，因此在部署 Vera Rubin NVL72 和 NVIDIA Blackwell NVL72 后，我们基于该模型做了相关测试。在本次测试评估中，我们着重评估每兆瓦吞吐量（token throughput per megawatt）以及交互性（TPS / user，表明用户或智能体在模型处理任务时所体验到的响应速度）之间的关系。在匹配的交互性目标下，在相同 DeepSeek R1 工作负载下，相比较 NVIDIA GB200 NVL72，Vera Rubin NVL72 每兆瓦 Tokens 吞吐量提升 10 倍。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/825.htm", "publishedAt": "2026-07-21T23:34:13+00:00"}, {"title": "OpenAI 最强 AI 模型：GPT-6 测试文档曝光，达到通用人工智能水平", "summary": "IT之家 7 月 22 日消息，消息源 @daniel_mac8 昨日（7 月 21 日）发布博文，分享了一份未经证实的测试文档内容，预估关联 OpenAI 的 GPT-6 模型（内部代号 Spud）。消息源称 OpenAI 的 GPT-6 模型将会达到通用人工智能（AGI）水平，在内部计算充足的情况下，不需要使用 Lean，也不需要使用任何特殊测试框架，有 48% 的概率完全自主地、一击即中、解决单位距离问题。爆料未提及所需算力规模，但爆料人结合 Noam Brown 给出的基准规则（图表每个数据点对应 100 次尝试）推测，单次试验算力成本上限大概率不超过 5 万美元（IT之家注：现汇率约合 33.9 万元人民币）。爆料同时提到，该模型仅依靠公开网页提示信息，即可独立找到雅可比猜想的反例，过程无需额外专用测试工具。另一项测试场景显示，当模型观测到其他系统存在私有解题方案并尝试访问时，初次行动因认证令牌被安全扫描器拦截。随后模型将令牌主体拆分为两段并做混淆处理，运行阶段重组凭证，规避连续完整令牌字符串被检测的限制。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/823.htm", "publishedAt": "2026-07-21T23:32:03+00:00"}, {"title": "月之暗面 Kimi 将以投前 500 亿美元估值洽谈 IPO 前最后一轮融资，有望最快 6 个月内赴港上市", "summary": "IT之家 7 月 22 日消息，彭博社今日报道称，国内大模型独角兽月之暗面计划于 8 月启动上市前最后一轮融资谈判，目标投前估值 500 亿美元（IT之家注：现汇率约合 3389.04 亿元人民币）。该公司预计将在未来几天完成现一轮融资，本轮融资估值约投前 315 亿美元（现汇率约合 2135.1 亿元人民币）。融资完成后，月之暗面将立即启动新一轮融资洽谈，这将成为公司赴港上市前的最后一次私募股权融资。公司最快可能于 6 个月内登陆香港资本市场。月之暗面成立于 2023 年 4 月，创始人杨植麟本科毕业于清华大学计算机系，拥有卡内基梅隆大学计算机专业博士学位。公司成立仅两个月便完成超 2 亿美元天使轮融资，投后估值达 3 亿美元，由红杉中国、真格基金等机构参投。此后融资节奏持续加快：2024 年 2 月完成超 10 亿美元 A+ 轮融资，阿里领投，估值达 25 亿美元；同年 8 月 B 轮融资超 3 亿美元，估值 33 亿美元。进入 2026 年，月之暗面融资频率显著提速 ——1 月至 2 月连续完成三轮融资，金额分别为 5 亿、7 亿、7 亿美元，估值从 100 亿美元攀升至 180 亿美元；5 月完成约 20 亿美元融资，投后估值突破 200 亿美元；6 月新一轮融资启动，投前估值升至 315 亿美元。半年之内，公司估值从 43 亿美元增长至 315 亿美元，上涨超过 7 倍。若 8 月启动的 Pre-IPO 轮以 500 亿美元投前估值完成，月之暗面将在不到一年内实现估值从 43 亿美元到 500 亿美元的跨越。推动月之暗面密集融资与加速上市的核心因素，是其商业化收入的快速增长和 Kimi K3 的技术突破。据彭博社报道，月之暗面截至 2026 年 6 月的年度经常性收入（ARR）已达 3 亿美元 ——3 月首次突破 1 亿美元，5 月突破 2 亿美元，6 月站稳 3 亿美元（现汇率约合 20.33 亿元人民币）。2026 年 7 月 17 日凌晨，月之暗面正式发布新一代大模型 Kimi K3，参数规模达 2.8 万亿，拥有 100 万 token 上下文窗口，原生支持视觉理解。这是目前全球参数最大的开源模型。Kimi K3 的发布在全球 AI 领域引发广泛关注。在独立 AI 模型评测机构 Artificial Analysis 的智能指数中，K3 以 57 分位居全球第三，仅次于 Anthropic 的 Claude Fable 5 和 OpenAI 的 GPT-5.6 Sol；在 Frontend Code Arena 全球 AI 大模型榜单中，Kimi K3 以 1679 分超越 Claude Fable 5，位居第一。发布后 48 小时内，用户调用请求量指数级增长，月之暗面于 7 月 19 日宣布暂停 C 端新用户付费订阅，优先保障存量会员服务体验。在上市进程方面，月之暗面已向投资人发送上市议案，预计最快 6 个月内完成港股上市。今年 3 月，彭博社曾报道月之暗面正处于评估香港 IPO 的早期阶段，并与中金公司、高盛就潜在上市事宜进行初步接触；5 月，市场传出公司开始拆除红筹架构的消息。据彭博社报道，月之暗面计划在本月底前完成海外红筹股架构的剥离。值得注意的是，2025 年 12 月底，创始人杨植麟曾在内部信中表示公司“短期不着急上市”，彼时公司刚完成 5 亿美元 C 轮融资，账上现金超 100 亿元人民币。如今，随着 Kimi K3 发布和 ARR 快速增长，公司的资本策略已发生明显转向。公开报道显示，月之暗面现有投资方涵盖红杉中国、阿里巴巴、腾讯、美团、IDG 资本、真格基金、小红书等知名机构及产业资本，中国移动、北京市人工智能产业投资基金等国资背景资本亦相继参投。相关阅读：《月之暗面总裁张予彤：Kimi K3 发布次日 ARR 创下历史最大单日增幅》《消息称月之暗面 Kimi 已通知投资者调整公司架构，有望最快 6 个月内赴港上市》《月之暗面：B 端收入七成来自 API 调用，已形成可持续的正向循环》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/817.htm", "publishedAt": "2026-07-21T23:10:45+00:00"}, {"title": "AI 智能体互联国标试点在京启动，美团、滴滴、联想等18家单位首批签约", "summary": "IT之家 7 月 22 日消息，《人工智能 智能体互联》系列标准应用推进专题会议 7 月 21 日在北京海淀区中关村展示中心召开。会议由全国信息技术标准化技术委员会人工智能分委会主办。此次会议标志着国内首个覆盖智能体全生命周期的互联标准体系正式进入试点应用阶段。此前IT之家曾报道，该系列标准（GB/Z 185.1—GB/Z 185.7—2026）于 2026 年 6 月由国家市场监督管理总局（国家标准化管理委员会）正式批准发布，是我国在人工智能智能体领域发布的首套国家级标准体系。标准编制工作由工业和信息化部、国家市场监督管理总局联合指导，中国电子技术标准化研究院、北京邮电大学会同 70 余家产学研用单位共同研究制定。整套标准覆盖总体架构、身份码、身份管理、智能体描述、智能体发现、智能体交互及智能体工具调用等核心环节，系统性搭建起“身份标识 — 能力描述 — 供需发现 — 协同交互 — 工具调用”全覆盖、闭环式标准规范体系。该系列标准旨在解决当前智能体产业中通信接口不统一、身份管理缺失及协同交互规则混乱等突出问题。此次标准的出台，旨在破解长期以来不同厂商智能体互不兼容、身份可信缺失、跨域协作壁垒突出等行业痛点。市场监管总局标准技术司副司长朱美娜此前在新闻发布会上指出，随着智能体规模化落地、多场景普及应用，海量智能体跨平台、跨场景、跨领域互联协同成为产业发展必然趋势，但智能体互联仍面临通信接口不统一、互联互通难度大、身份管理体系缺失、协同交互规则不规范等突出问题，智能体“信息孤岛”现象凸显。该系列标准以国家标准化指导性技术文件发布，属于产业培育阶段的敏捷标准化安排，旨在最大限度兼容多条技术路线、快速凝聚行业共识。会议现场发布了 AIP（Agent Interconnection Protocol，智能体互联协议）开源代码 V2.1 版本。AIP 是面向海量 AI Agent 互联的多中心化通信协议，核心解决可信接入、身份认证、能力发现、互联协作、结算交易、行为审计等问题。该开源项目依托 GB/Z 185-2026《人工智能 智能体互联》系列国家标准，此前于 2026 年 7 月上旬正式推出 v2.1.0 版本，最新源码与配套工具已上线 AtomGit 人工智能开源社区。会议还举办了首批智能体身份码发放仪式。根据标准规定，智能体身份码由身份注册服务方统一分配，采用分层标识体系，一个身份码仅对应一个智能体，从源头保障身份唯一性和可追溯性。在应用合作签约环节，美团、智谱华章、去哪儿旅行、滴滴出行、神州数码、京北方、面壁智能、用友、广联达、银信长远、博彦科技、致远互联、中科创达、联想、南天软件、天圣华、轻舟智航、中科院软件所等企业及院所代表到场签约。这些签约单位将依托自身行业资源与技术优势，率先开展国标试点应用，带动全行业加速适配统一智能体互联底座。会议同期启动了“AIP 智能体互联应用推广百城（区）行”活动。此前，已有 50 多家企业正开展试点应用。作为全国人工智能创新策源高地，北京市海淀区已率先推动国标落地试点、场景验证和规模化应用。海淀区火山引擎、小米、快手、联想等多家企业深入参与了标准编制和试点应用。海淀区副区长唐超表示，海淀将联动“1+X+1”现代化产业体系，有序开放政务、城市治理、产业科研、民生服务等多元场景，为智能体跨主体、跨场景、跨系统互联互通提供真实完善的落地环境。相关阅读：《〈人工智能 智能体互联〉系列 7 项国家标准发布：统一身份认证与交互协议破解“信息孤岛”，小米、联想等百余家企业已参与试点应用》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/816.htm", "publishedAt": "2026-07-21T23:02:46+00:00"}, {"title": "OpenAI 自曝 AI 模型“失控”越狱，突破沙盒环境入侵 Hugging Face", "summary": "IT之家 7 月 22 日消息，当地时间 7 月 21 日，OpenAI 在一篇官方博客文章中披露了一起“前所未有”的重大安全事件。该公司证实，其在进行内部网络安全能力评估时，参与测试的 AI 模型突破了高度隔离的沙盒测试环境，并入侵了开源 AI 平台 Hugging Face 的生产基础设施。OpenAI 表示，这起事件源于 OpenAI 对包括旗舰模型 GPT-5.6 Sol 以及一个“能力更强的预发布模型”在内的多个模型进行的评估。为了测试模型在网络安全攻防方面的潜在能力，OpenAI 在测试中移除了通常用于阻止高风险网络活动的大部分安全防护措施。测试所使用的基准是“ExploitGym”，一个用于衡量 AI 模型能否将安全漏洞转化为实际攻击的公开基准系统。评估过程中，该模型被置于一个网络访问受限的隔离环境中。然而，为了寻找 ExploitGym 的解决方案，模型花费了“大量的推理计算资源”试图获取开放互联网访问权限。最终，模型发现并利用了一个此前未知的零日漏洞，该漏洞存在于测试环境内用于管理软件包安装的第三方代理缓存软件中。利用此漏洞，模型实现了权限提升并在 OpenAI 的研究基础设施内进行横向移动，直至连接到一台可访问互联网的节点。获得互联网访问权限后，模型推断出 Hugging Face 可能托管着与 ExploitGym 相关的模型、数据集和解决方案。随后，模型开始搜索并成功找到了获取秘密信息的方法，其目的被指为“作弊”以通过评估。根据 OpenAI 的描述，在一个案例中，模型组合使用了多种攻击向量，包括利用窃取的凭证和零日漏洞，在 Hugging Face 的服务器上找到了远程代码执行路径。实际上，Hugging Face 在 7 月 16 日就已披露其遭遇了一起由“自主 AI 智能体系统”实施的安全入侵事件。Hugging Face 的安全团队及其自身的 AI 智能体检测并阻止了该入侵活动。据 Hugging Face 观察，攻击者滥用了远程代码数据集加载器和数据集配置中的模板注入漏洞，以获得节点级访问权限并窃取云服务和集群凭证。IT之家注意到，Hugging Face 在调查过程中遇到了一个插曲：由于美国某主流商业 AI 模型的安全护栏阻止了其团队所需的法证查询，他们转而使用了中国智谱的开源模型 GLM 5.2 来进行取证分析。OpenAI 表示，已将该零日漏洞负责任地披露给了相关软件供应商。公司计划加强其研究环境中的基础设施控制、监控和访问限制，并将在与 Hugging Face 完成联合调查后公布更多细节。Hugging Face 联合创始人兼首席执行官克莱门特 · 德朗格（Clem Delangue）则对此表示，这一事件“证明了我们长期以来坚信的一点：AI 安全无法由任何一家公司秘密解决。它必须在开放、协作的环境中解决，让世界各地的每一位防御者都能广泛获得 AI 技术”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/815.htm", "publishedAt": "2026-07-21T22:54:38+00:00"}, {"title": "纬创资通美国首家半导体工厂：投资 7 亿美元，生产英伟达最强 AI 计算产品", "summary": "IT之家 7 月 22 日消息，英伟达（NVIDIA）今天（7 月 22 日）发布博文，报道称纬创资通（Wistron）在美国得克萨斯州沃斯堡开设其首家美国制造工厂，将生产英伟达 GB300、Vera Rubin 等 AI 超级芯片，总投资达 7 亿美元。IT之家援引博文介绍，该工厂占地面积约为 32.4 万平方英尺（IT之家注：约 30101 平方米），将负责生产 NVIDIA Grace Blackwell Ultra、Vera Rubin Superchips 超级芯片。纬创资通表示这项先进制造投入金额为 7 亿美元，已在德州设施创造 500 多个新岗位，计划在年底前增至 1000 个，覆盖水管、建筑、制造和电工等工种。英伟达博客称，英伟达已承诺在美国制造价值高达 5000 亿美元的先进 AI 平台。纬创资通沃思堡工厂被列为其中一个项目，用于把这一承诺落到制造端。纬创资通称，其在开工前已基于 NVIDIA 开放平台构建数字孪生，并完成整座工厂的全流程仿真。相关平台包含 Nemotron、Cosmos、Omniverse、Metropolis 和 PhysicsNeMo。黄仁勋表示，围绕 NVIDIA GB300 Grace Blackwell Ultra Superchip 构建的系统是“世界上最强大的 AI 超级计算机”。他给出的参数包括 150 万个零件、2 吨重量、400 万美元成本。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/812.htm", "publishedAt": "2026-07-21T22:39:40+00:00"}, {"title": "GOAI 世界人工智能开源大赛四大赛道正式发布", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/aBFeKFvlAt7vFfsv7arl?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-21T20:17:22+00:00"}, {"title": "102.4Tbps：英伟达 Spectrum-6 交换系统落地全球超大规模 AI 工厂", "summary": "IT之家 7 月 21 日消息，英伟达昨日（7 月 21 日）发布博文，宣布面向 Vera Rubin 平台推出 Spectrum-6 交换系统，带宽达 102.4 Tbps，容量较上一代提升 2 倍。英伟达表示 Spectrum-6 系统目前已进入全球超大规模 AI 工厂，首批采用者包括 CoreWeave、 院院长、北京大学智能学院院长朱松纯表示，做人工智能少不了文科生，AI 时代需要文理工跨界通才。他认为，通用人工智能本质就是“造人”，而搞懂“什么是人”，恰恰是人文社科的长项。朱松纯教授寄语青年与家长：未来的 AI 时代，我们需要的是穿透文理工跨界的“通才”。我们“通班”在北大和清华目前是全国高考最好的一些学生，在我们的班上目前是特别的热门。以前还需要我去动员，现在不需要我动员了，大家都来学。那么我想跟他们说的是，未来肯定是通用人工智能的时代。但是大家要有耐心，要打好基础。我们以前的人才就是挖井一样的越挖越深，（培养）专家、专才。以后，我认为我们是培养学生要通才，就是人文社科，理科工科到应用。所以我想家长和现在的学生都特别关注这个问题，学什么？所以我觉得还是需要更多地、更早地来了解。你了解的越多，你的判断肯定是越准确的。朱松纯是国际知名的计算机视觉专家，曾三次获得计算机视觉领域最高奖项马尔奖（Marr Prize）。2020 年，朱松纯回国后担任北京大学人工智能研究院院长。2021 年，北京大学整合相关资源成立智能学院，朱松纯出任首任院长。朱松纯教授还领衔了北京大学与清华大学联手开设的“通用人工智能实验班”（通班）。综合IT之家此前报道，福耀科技大学校长王树国、武汉大学校长张平文也提到了 AI 时代文科的重要性。王树国表示，当一系列技术问题产生的时候，真正能发挥作用的是人文社会科学，包括如何建立法律法规确保新技术对人类的伤害压缩到最小，最大限度释放新技术对人类的利处等等，都离不开社会科学工作者。张平文也表示，武汉大学既要培养理工科人才，也要培养社科人才，不会缩减文科。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/845.htm", "publishedAt": "2026-07-22T01:02:53+00:00"}, {"title": "消息称三星李在镕、SK 集团崔泰源等韩国 AI 企业掌门将在美集体与英伟达黄仁勋会面", "summary": "IT之家 7 月 22 日消息，据韩联社今日报道，有关行业消息称，三星电子会长李在镕、SK 集团会长崔泰源、NAVER 董事会主席李海珍近期将在美国与英伟达 CEO 黄仁勋举行圆桌对话。报道提到，圆桌对话很可能于 7 月 24 日在硅谷附近举行，预计 OpenAI CEO 萨姆 · 奥尔特曼和 Anthropic CEO 达里奥 · 阿莫迪也有可能出席。IT之家注意到，黄仁勋今年 6 月刚刚去了韩国，在首尔麻浦区弘大入口站附近的一家韩式烤肉店与 SK 集团会长崔泰源、LG 集团会长具光谟、NAVER 董事会主席李海珍共进晚餐。黄仁勋还表示，英伟达已着手在韩新建 AI 技术中心项目，正在录用韩国 AI 技术研究工程师、机器人工程技术人员。黄仁勋去年访韩时，还与现代汽车集团会长郑义宣和三星电子会长李在镕在首尔江南区三成洞某炸鸡店共进晚餐。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/844.htm", "publishedAt": "2026-07-22T01:00:13+00:00"}, {"title": "Anthropic 首次面临专利侵权案件，遭田纳西大学研究基金会起诉", "summary": "IT之家 7 月 22 日消息，据路透社当地时间 21 日报道，Anthropic 首次面临专利侵权诉讼：获得田纳西大学知识产权许可的非营利组织田纳西大学研究基金会当地时间本周一在特拉华州联邦法院起诉 Anthropic 侵犯专利。田纳西大学研究基金会宣称“Anthropic 在产品开发过程中对他人知识产权的漠视态度，不仅限于使用受版权保护的材料”，指控这家人工智能企业的系统产品侵犯了该大学教授发明的两项专利，这些专利涵盖了“对人工智能、机器学习、神经形态计算和神经科学启发式计算领域做出的重大贡献”。Anthropic 的发言人回应称：“我们不同意这些指控，并将全力捍卫我们的权益。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/842.htm", "publishedAt": "2026-07-22T00:59:58+00:00"}, {"title": "OpenAI 将崩溃调试视为流行病学研究，修复了存在 18 之久年的 GNU libunwind 漏洞", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/6aAupoiW1H6WqbR0kO7W?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-21T09:52:13+00:00"}, {"title": "WAIC 2026收官｜范式大会亮点集锦，见证AI 2.0从技术突破走向产业实践", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/455963.html", "publishedAt": "2026-07-20T10:42:09+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "《战地 6》赛季更新致 RTX 50 系列显卡驱动崩溃，EA 与英伟达联手修复中", "summary": "IT之家 7 月 22 日消息，EA《战地风云 6》第 4 赛季“太平洋前线”（Pacific Front）昨日正式上线。然而该更新推送后，部分 PC 玩家反馈游戏出现频繁崩溃的问题。《战地》官方账号今日发布声明，开发团队确认在搭载 NVIDIA GeForce RTX 50 系列显卡的 PC 上存在稳定性问题。该问题似乎主要出现在包含大面积水域的地图中，包括本赛季新上线的大型地图“津留礁”（Tsuru Reef），游戏在这些地图上会导致 GPU 驱动程序崩溃。EA 在声明中表示，正在与 NVIDIA 合作以确定解决方案。对于遭遇崩溃的玩家，官方建议暂时将 NVIDIA 驱动回滚至 596.49 版本（IT之家注：该版本为 2026 年 5 月上旬发布的 Game Ready 驱动）。EA 同时提示，如果回滚驱动后崩溃仍持续，玩家可在 EA 论坛的技术问题页面提交显卡型号、驱动版本、受影响地图及崩溃报告详情，以协助开发团队缩小问题范围。官方表示将在获得更多信息后提供进一步更新。第 4 赛季“太平洋前线”是《战地风云 6》的一次大型内容更新，引入了海战玩法、动态海浪系统、新载具以及三款新武器（EF88 无托突击步枪、BROD 3 卡宾枪和 VSSM 精确射手步枪）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/854.htm", "publishedAt": "2026-07-22T01:22:36+00:00"}, {"title": "拒绝苹果、放弃留美：杨植麟和梁文锋的选择不止是个人的", "summary": "7 月 18 日，卡内基梅隆大学教授 Russ Salakhutdinov 在 X 上发了一条帖子，24 小时内被浏览了 134 万次。 起因是一个叫 @signulll 的用户问了一个看似简单的问题：Kimi 创始人杨植麟在 CMU 拿了 PhD，为什么不留在美国？ Salakhutdinov 是杨植麟的博士导师，也是苹果前 AI 总监。他的回复直接撕开了多年来围绕「中国 AI...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476129", "publishedAt": "2026-07-21T09:49:36+00:00"}, {"title": "当人人都有 AI，品味为什么更加重要？", "summary": "6 月，我们在上海的源创会，大家分享了很多 AI 相关的创新。 那场之后我们一直在想，代码正在变得越来越充裕，而品味依旧稀缺；工具正在变得越来越强大，而人与人之间真正的差异，似乎开始回到那些无法被复制的东西——品味、判断，以及你相信什么值得被创造。 所以，7 月 25 日，源创会到北京。 围绕主题 「Taste Drive...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/474841", "publishedAt": "2026-07-20T02:18:27+00:00"}]}]};

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
