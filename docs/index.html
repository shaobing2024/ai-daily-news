const DATA = {"date": "2026-07-21", "generatedAt": "2026-07-21T02:32:12Z", "attribution": {"source": "中文科技媒体 RSS 聚合"}, "sourceList": ["量子位", "IT之家", "InfoQ 中文", "爱范儿", "开源中国"], "lead": "", "isFallback": false, "sections": [{"label": "模型发布/更新", "items": [{"title": "QuestMobile：国内手游 App 月活跃用户规模达 6.72 亿同比增长 4%，《王者荣耀》稳居第一", "summary": "IT之家 7 月 21 日消息，QuestMobile 今日发布 2026 手机游戏行业半年报告，截止到 2026 年 5 月：手机游戏 App 行业月活跃用户规模达到 6.72 亿，同比增长 4.0%；微信小游戏月活跃用户规模达到 6.54 亿，同比增长 32.7%；抖音小游戏月活跃用户规模达到 0.85 亿。整体上来看，2026 年上半年，国产游戏版号获批总量达到 917 个，同比增长了 21.1%，多元化新游戏供给旺盛，涌现出了多款热门游戏。截止到 5 月份，《洛克王国：世界》、《鹅鸭杀》、《乱涂彩世界》、《逆战：未来》位居新上线手机游戏 App 前四位，月活跃用户规模分别为 1748.2 万、904.0 万、716.2 万、630.9 万。2026 年 5 月，手机游戏 App 行业月人均单日使用次数同比增长 12.7%，达到 23.8 次，月人均单日使用时长同比增长 6.9%，达到 111.2 分钟；微信小游戏行业月人均单日使用时长达到 23.6 分钟，同比增长 10.3%。不过，从用户画像上看，手机游戏 App 和微信小游戏差异化越来越明显：手机游戏 App 用户 35 岁及以下用户占比 63.7%，且三线及以下城市用户占比近 5 成，显示出手游的重度娱乐性质和用户特性；微信小程序游戏则与之相对，36 岁及以上用户 54.7%，一线、新一线、二线城市用户占比达到 57%。QuestMobile 数据显示，2026 年 5 月手机游戏 App 行业中 AIGC App 行业活跃渗透率已达 38.7%，同比增长 14.6 个百分点。手游行业竞争从流量抢夺，转向核心高粘性用户的深耕运营；典型手机游戏核心用户渗透率普遍超 20%，其中《王者荣耀》核心用户渗透率超 35%。IT之家附 2026 年 5 月手机游戏 App 月活跃用户规模 Top10 如下，前三分别为《王者荣耀》《开心消消乐》《三角洲行动》。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/330.htm", "publishedAt": "2026-07-21T02:08:43+00:00"}, {"title": "美国版权案件最高金额：Anthropic 与作家群体 15 亿美元和解获批", "summary": "IT之家 7 月 21 日消息，参考路透社报道，美国旧金山联邦法官 Araceli Martinez-Olguin 当地时间本周一批准了人工智能企业 Anthropic 与作家群体达成的 15 亿美元（现汇率约合 101.67 亿元人民币）巨额和解协议。这不仅是美国历史上已知金额最大的版权赔偿案，也是一系列版权所有者针对科技公司训练大型语言模型而提起的诉讼中首起在美国达成和解的重大案件。Anthropic 副总法律顾问 Aparna Sridhar 在一份声明中表示：我们在 2025 年达成了这项和解协议，此前法院做出了一项具有里程碑意义的裁决，即根据版权法对人工智能进行书籍训练属于合理使用 —— 这一裁决至今仍然有效。我们很高兴看到，超过 91% 的受和解协议约束的作者和出版商已经领取了他们应得的赔偿金，我们期待着此事早日结束。IT之家了解到，控方作家团体在 2024 年起诉 Anthropic，指控其未经许可将他们书籍的盗版版本用于人工智能模型训练。而在 2025 年 6 月，现已退休的法官 William Alsup 裁定 Anthropic 合理使用了作者的作品来训练 Claude 模型，但该公司确实保存了超过 700 万本盗版书籍，尽管这些资料未必会用于人工智能训练但也侵犯了作者的权利。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/324.htm", "publishedAt": "2026-07-21T01:57:54+00:00"}, {"title": "三体宇宙展望“智子”智能体：有共识、有记忆、有人格，持续陪伴", "summary": "IT之家 7 月 21 日消息，在 7 月 20 日的 2026 世界人工智能大会（WAIC）无问芯穹“Token 涌现，万物生长 ——Agentic AI 产业生态论坛”上，三体宇宙 CEO 赵骥龙表示，今年，三体宇宙持续与 Google Cloud、哔哩哔哩、PICO 等伙伴开展合作，通过内容共创、AI 创作、空间计算等实践，探索科幻 IP 与前沿科技融合的新可能，让抽象的技术拥有更具象的表达。面对 Agentic AI 时代，三体宇宙分享了关于“智子”智能体的最新设想：一个有共识、有记忆、有人格的智能体形象，让用户面对的不只是技术能力，更是一个能够长期互动、持续陪伴的智能伙伴。IT之家注：智子（Sophon）是刘慈欣科幻小说《三体》系列及其衍生作品中的智能粒子及机器人，由三体人制造，该实体包含微观粒子与拟人机器人双重形态：前者通过量子纠缠实现超距通信，干扰地球高能加速器以锁死人类基础科学；后者担任三体文明驻地球大使，平时形态为身穿和服的优雅少女。不过，演讲中并未提及“智子”智能体的推出时间，目前来看还处于概念规划阶段。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/322.htm", "publishedAt": "2026-07-21T01:50:52+00:00"}, {"title": "小米 REDMI 儿童手表 Pro 开售：支持无网络定位、AI 楼层识别，国补价 888.25 元起", "summary": "IT之家 7 月 21 日消息，小米 REDMI 儿童电话手表 Pro 今日正式开售，官方定价为 1199 元，首发 1045 元起，叠加国家补贴后到手价 888.25 元起，提供活力红、元气紫双配色。京东小米（MI）REDMI 儿童电话手表 Pro 活力红 无网络定位 心率监测 4G 视频拍照双摄 红米学生智能儿童电话男女手表 1045 元直达链接2026 年数码家电政府补贴持续进行中，IT 之家为大家汇总国补领券地址，买数码家电之前记得领取。数码补贴：点此领券手机 / 平板 / 3C 数码支持 8.5 折政府补贴，不超过 6000 元的产品至高立减 500 元。家电补贴：点此领券多类家电支持 8.5 折政府补贴，单品至高补贴 1500 元。欢迎下载最会买 App - 好货好价，高额返利，1 毛钱也能提现！扫描二维码或点击此处下载最新版（自动识别平台）。这款手表支持无网络环境在线定位，采用双芯设计，在断网、低电量关机场景下仍可触发此功能，关机后最高可支持约 5 天无网络定位。依托小米查找协议，海量设备共同构成定位网络，实现手表在关机、无网络条件下的辅助定位。手表配备 3D 楼层定位，搭载 AI 楼层定位算法 3.0，升级秒级连续定位、智能锁楼技术，可快速锁定楼栋与楼层，家长可通过手机实时查看孩子位置。手表支持地铁定位，可实现地铁站点精准定位与乘车轨迹记录，家长能实时掌握孩子乘车动态，出行轨迹自动留存、远程可查。手表搭载高清翻转双摄，前置 + 后置均为 500 万像素，翻起摄像头即可满足自拍或拍摄风景需求，覆盖孩子全天活动场景。手表支持全天候心率血氧监测，可全天候持续监测孩子心率、血氧数据，贴心关注孩子身心变化；同时配备 18 种运动模式 + 5 项体测模式。手表具备水域提醒功能，开启该功能后，孩子靠近水域时手表会自动推送提醒消息给家长，让家长及时知晓，提升孩子外出游玩安全性。手表内置儿童社交系统，支持“碰一碰”添加好友，还可与其他品牌儿童手表互加好友，打破社交壁垒；同时支持儿童手表版微信、QQ，可实现语音聊天、视频通话。手表支持家长智能管控，家长可查看孩子一天的佩戴状态、使用状态、运动状态、行为状态、心率等信息；还可管控应用使用时长，设置自定义禁用时段，支持识别校园区域自动禁用手表功能，帮助孩子专心学习。IT之家附详细参数及包装详情如下：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/318.htm", "publishedAt": "2026-07-21T01:43:26+00:00"}, {"title": "导演陆川称 AI 生成像预制菜，自己正利用 AI 同时推进五部电影筹备", "summary": "IT之家 7 月 21 日消息，据新浪财经报道，美国当地时间 7 月 20 日，新浪财经联合美国中国总商会举办的“超越赛场 —— 中美商业、人工智能与全球协作”私享会在纽约举行。导演、编剧、制片人陆川表示，AI 让他更珍惜现在的工作机会，还能够用传统方式做电影这样一个窗口的时间。他表示，AI 生成的影像更像是一种预制菜。由于大部分模型是基于已知数据训练的，其产出的画面非常精准、漂亮，能够有效弥补新手与 20 年老手之间的技术代差。然而，他认为做电影最美妙的部分实际上是“错误”。人类在现场的失控、演员最棒的表演往往来源于失控，这些无法复制的瑕疵才是艺术创作最迷人的地方，而 AI 恰恰可能会抹杀这些错误。陆川指出，他曾以“慢”著称，但如今他正利用 AI 同时推进五部电影的筹备工作。AI 已经替代了电影工业中概念设计、分镜甚至部分剪辑等大量环节，其核心价值在于极大地降低了试错成本。过去剧本开发充满不确定性，而现在只需花费几十万到一百万，就能快速将艺术家的想法视觉化，从而让营销团队提前介入并进行观众测试。他透露，在视觉商业领域，目前短片和广告已有 95% 以上被 AI 替代。据IT之家此前报道，陆川曾在去年底宣布，由其创办的猿动力正与 MiniMax 开展紧密的 AIGC 技术上合作，联手开发电影质感级 AI 漫剧项目，并且后续会持续合作落地院线电影和剧集。陆川也曾在去年 5 月的微博电影之夜的短片中透露，AI 已经深度介入到他的创作和工作中间。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/311.htm", "publishedAt": "2026-07-21T01:18:17+00:00"}, {"title": "消息称智谱建成大型 AI 数据中心：全部采用国产芯片", "summary": "北京时间 7 月 21 日，据彭博社报道，智谱已经完成了一座大型数据中心的建设，该数据中心全部采用中国国产芯片。这是中国在未来 AI 发展中替代受限的英伟达芯片所采取的重要一步。据知情人士透露，智谱已开始部分运营这座 1 吉瓦的数据中心，该中心旨在帮助这家中国公司开发其前沿的 GLM 平台。1 吉瓦的电力足以在任何时刻为约 75 万户家庭供电。该人士表示，智谱现已建成或运营多个计算集群，每个集群均配备超过 1 万块芯片。按照这一规模，智谱的数据中心将成为中国 AI 公司所建设的最大规模服务器枢纽之一。目前，阿里巴巴和中国电信等云服务提供商被公认为计算基础设施的最大建设方，因为这不仅需要投入数十亿美元用于批量采购高端服务器，还需要确保稳定的电力和水供应。目前，智谱正与月之暗面展开激烈竞争。月之暗面上周五发布了 Kimi K3 模型，该模型挑战了 OpenAI 和 Anthropic PBC 的顶尖前沿模型，令全球为之震惊。由于需求庞大，月之暗面在上周日被迫暂停新用户订阅，以“优先保障现有会员的计算资源”。为应对算力瓶颈，中国计划在未来五年内投入约 2 万亿元人民币 (约合 2950 亿美元)，在全国范围内建设数据中心。智谱近期通过在香港进行 IPO 及后续股票发行，为其自身储备筹集了数十亿美元资金。据知情人士此前向彭博社透露，该公司在今年 7 月就提前实现了全年销售额目标后，年度经常性收入有望达到 10 亿美元。这座数据中心的建成，标志着智谱发展历程中的一个重要里程碑。智谱正试图将自己定位为面向企业和机构客户的 AI 服务提供商，其发展路径也因此被拿来与 Anthropic 相提并论。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/301.htm", "publishedAt": "2026-07-21T01:00:37+00:00"}, {"title": ":fire::fire: 2026 年，Java Agent 的最后一块拼图，终于被补齐了!", "summary": "过去两年，Java AI 生态的发展非常快。 Spring AI、LangChain4j 等优秀框架，让 Java 开发者可以轻松接入 GPT、Claude、Gemini、DeepSeek 等各种大模型。 Chat、Prompt、Memory、RAG、Tool Calling、MCP、Agent…… 这些能力越来越成熟。 Java Agent，终于开始走进真实业务。 但当越来越多企业开始把 Agent 投入生产环境...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475598", "publishedAt": "2026-07-21T00:16:34+00:00"}, {"title": "英伟达被曝大规模收购美国暗光纤资源，潜在带宽达 7.6 Pb/s", "summary": "IT之家 7 月 21 日消息，Wolfe Research 最新报告披露称，英伟达正在美国推进大规模长途光纤网络资源布局，收购了大量“暗光纤”（Dark Fiber）容量，用于支持未来 AI 基础设施建设。此前，分析机构 Needham 今年 6 月发布报告称，英伟达可能正在规划一项规模庞大的通信网络项目，未来三年投资规模或达到 50 至 100 亿美元（IT之家注：现汇率约合 339.05 亿至 678.09 亿元人民币）。所谓暗光纤，是指已经铺设完成但尚未启用的光纤线路，用户可以租用或购买这些线路，并根据自身需求部署传输设备。与直接购买运营商提供的网络服务相比，掌握暗光纤资源能够让企业自行控制网络容量、协议和扩展方式，常被大型云计算企业、数据中心运营商用于建设专用高速互联网络。按照 Wolfe Research 的说法，英伟达此次涉及的光纤规模可能达到每条线路 100 对光纤。由于一条光纤通常只能进行单向传输，实现双向通信需要成对部署，因此 100 对光纤意味着约 200 根独立光纤线路。如果按照先进光通信系统进行估算，这类网络的潜在传输能力可能达到 Pb/s 级别。当前长距离光纤通信通常会采用密集波分复用（DWDM）技术，通过不同波长的光信号在同一根光纤中传输多个独立数据通道。以单根光纤支持 80 至 96 个波长通道、每个通道速率达到 800Gbps 计算，100 对光纤理论总容量可达到约 768 万 Gbps，即约 7.6Pb/s。不过，实际网络容量还会受到设备规格、线路距离、信号质量以及运营部署方式等因素影响。目前，英伟达尚未公开确认这一通信网络项目的具体用途。不过，市场分析认为，该项目可能与英伟达正在扩大的 AI 基础设施业务有关。随着生成式 AI 模型训练和推理规模持续增长，GPU 集群已经不再局限于单一数据中心内部，跨数据中心高速互联成为 AI 工厂建设的重要组成部分。光网络企业 Ciena 也曾表示，随着 AI 计算集群规模扩大，连接多个数据中心的高容量光互联需求正在增长。Needham 分析师 Ryan Koontz 指出，英伟达可能希望通过建设自有骨干网络，减少对大型云计算服务商的依赖，并为其合作的“新型云服务商”（NeoCloud）以及未来企业客户提供更直接的 AI 基础设施连接能力。报告提到，微软、亚马逊 AWS、谷歌、Meta 等大型云服务商长期拥有大量数据中心和网络资源，而部分专注 AI GPU 租赁的新兴云厂商在网络基础设施方面相对不足。另一种可能方向是，英伟达未来可能借助该网络进一步发展 GPU 云服务模式，将 GPU 算力、网络连接以及 AI 软件生态整合为更完整的 AI 基础设施服务。不过，目前这些用途仍属于市场分析人士的推测，英伟达尚未公布相关战略细节。在供应链方面，分析机构认为光通信设备厂商可能成为该项目的潜在受益者，其中 Ciena 被 Wolfe Research 和 Needham 多次提及。Ciena 长期提供光网络设备和数据中心互联解决方案，其产品覆盖高速光传输、网络自动化等领域。英伟达近年来也持续加强 AI 网络基础设施布局，包括推出面向 AI 集群的网络产品，并投资光通信产业链企业，以支持下一代 AI 数据中心架构发展。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/290.htm", "publishedAt": "2026-07-21T00:08:25+00:00"}, {"title": "上任仅 3 个月，美国 AI 测试机构负责人克里斯 · 福尔宣布辞职", "summary": "IT之家 7 月 21 日消息，据路透社 21 日（今天）报道，美国商务部下属 AI 测试机构 —— 美国人工智能标准与创新中心再次出现人事变动，中心主任克里斯 · 福尔上任仅 3 个月便宣布辞职。美国商务部发言人表示，负责管理中心的商务部办公室负责人、前普渡大学工程学院院长阿尔温德 · 拉曼将暂时接替福尔。福尔离任反映出美国政府的 AI 政策仍在不断转向。特朗普 2025 年再次就任美国总统时曾提出，联邦政府应尽量减少对科技行业的干预。此后，美国政府开始更加主动地监管 AI，然而特朗普的公开言论和政策方向几乎每周都可能发生变化。美国人工智能标准与创新中心负责与 Anthropic、谷歌 DeepMind 和 OpenAI 等领先 AI 实验室合作，在模型正式发布前测试安全漏洞。中心官网显示，科学家和工程师主要负责评估先进 AI 模型带来的“可证明风险”，防止美国对手利用 AI 开发化学或生物武器，或破坏美国 AI 模型使用的训练数据。据IT之家了解，中心也与微软和埃隆 · 马斯克旗下 xAI 合作，对双方的 AI 模型进行测试。中心主任克里斯 · 福尔，图源：美国能源部", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/288.htm", "publishedAt": "2026-07-20T23:58:47+00:00"}, {"title": "OpenAI 董事会主席布雷特 · 泰勒大胆预测：一年后企业将不再担心 Token 成本", "summary": "IT之家 7 月 21 日消息，AI 的 Token 成本已经成为许多首席财务官重点关注的问题，但 OpenAI 董事会主席兼 AI 初创公司 Sierra 联合创始人布雷特 · 泰勒认为，一年后，企业可能根本不必再操心 Token。围绕 Token 计费和管理产生的许多问题，主要因 AI 市场仍处于早期阶段，且商业模式尚未成熟而生。当地时间 20 日，泰勒接受 CNBC 采访时表示，未来将有其他服务商接手 Token 管理负担，企业客户无需再自行处理复杂的 Token 用量和成本问题。“我认为，未来的收费方式将以实际成果为依据。”IT之家注：Token 是 AI 模型处理文本时使用的基本单位，也是服务商计算 AI 用量和费用的依据。今年早些时候，Token 成本迅速上涨，促使不少企业削减 AI 支出，并重新评估 AI 投资能否产生足够回报。目前，越来越多企业高管也开始把投资回报率放在首位。泰勒认为，目前的 AI 市场与互联网刚刚兴起时相似。当年建设一个网站所需的成本，远高于后来的成熟阶段。“技术才刚刚起步，创业者应当开发相应解决方案，让企业不必亲自处理 Token 管理等问题。”泰勒举例称，Ramp 最近推出了 Token 支出管理工具，法律 AI 初创公司 Harvey 等垂直行业 AI 企业也会直接替客户管理 Token。“12 个月后，IT 部门将非常擅长部署不同场景下的 AI 工具。营销部门可能使用一套产品，软件工程师则使用另一套产品。因此，企业根本不必再考虑 Token 这个概念。”据此，随着模型运行效率提高，Token 成本预计会持续下降。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/279.htm", "publishedAt": "2026-07-20T23:30:50+00:00"}, {"title": "169 元绿联 Max5s 头戴式耳机开售：号称 AI 功能终身免费，续航 112 小时", "summary": "IT之家 7 月 21 日消息，绿联 Max5s 头戴式蓝牙耳机现已开售，定价为 169 元。该耳机获得国家 A 级降噪认证，号称 AI 功能终身免费，拥有双金标音质，深度降噪可达 -45dB，续航 112 小时。京东绿联 Max5s 头戴式蓝牙耳机 169 元直达链接2026 年数码家电政府补贴持续进行中，IT 之家为大家汇总国补领券地址，买数码家电之前记得领取。数码补贴：点此领券手机 / 平板 / 3C 数码支持 8.5 折政府补贴，不超过 6000 元的产品至高立减 500 元。家电补贴：点此领券多类家电支持 8.5 折政府补贴，单品至高补贴 1500 元。欢迎下载最会买 App - 好货好价，高额返利，1 毛钱也能提现！扫描二维码或点击此处下载最新版（自动识别平台）。音质方面，这款耳机获得 Hi-Res 双金标认证，支持 LDAC 高清解码，拥有高清传输 + 超宽频响。其拥有 40mm 双层定制振膜大单元，PET 高分子定制振膜，可有效优化三频表现，113dB 声压灵敏度，小音量也能出好细节，兼容苹果、华为、小米等主流设备。该耳机支持 3D 立体空间音效，搭载 ANC 自适应降噪，深度降噪突破 -45dB，每秒 375000 次实时检测环境噪音，动态调整降噪深度，可有效隔绝外界 99%+ 噪音，支持 5 级可调降噪等级，拥有抗风噪算法。这款耳机提供全链路削噪，不同场景对应不同降噪模式：降噪模式：20Hz-2000Hz 降噪频宽，全域捕噪剥离杂音抗风模式：抗风噪算法，瓦解风声，户外无扰通话模式：5 麦 AI 智能通话降噪，人声提纯精准滤音隔音模式：升级隔音腔体，残响拦截物理对消这款耳机内置 800mAh 电池，普通模式续航可达 112 小时，降噪模式续航可达 74 小时，普通模式下按每天使用 3.7 小时计算，可以持久畅听约 30 天。这款耳机内置绿联 AI 助手，终身免费使用，支持多种 AI 功能：录音转写：实现及时录音转写文字，录制后能对内容进行多语言翻译与总结同声传译：开启后将实时转写与翻译，并通过耳机播报出翻译的内容对话翻译：不同语种对话时，通过手机与耳机实时转写翻译并语音翻译的内容佩戴体验方面，这款耳机整体重量约 238g，耳罩采用轻柔蛋白皮材质，支持可伸缩支臂适配不同头型，耳罩支持 90° 旋转，方便收纳携带。这款耳机搭载新一代蓝牙 6.0 芯片，支持可同时连接两台设备，无需重新配对，手机 /平板 /笔记本可自在流转，声音无缝切换；支持 App 智联，可以通过 App 预设 EQ 音效，一键打造专属声场，耳机自身支持单手操控，使用方便。IT之家附详细参数如下：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/274.htm", "publishedAt": "2026-07-20T23:05:38+00:00"}, {"title": "Adobe 相机应用 Project Indigo 测试新功能：AI 指导你怎么拍更出片", "summary": "IT之家 7 月 21 日消息，过去一年里，Adobe 持续测试了一款名为 Project Indigo 的相机应用。据外媒 Neowin 今天（21 日）报道，最新推出的 Project Indigo 1.1 版新增多项生成式 AI 照片编辑功能，用户可以一键清除画面中的干扰元素、营造浅景深效果、套用摄影或艺术风格、调整光线等。AI Playground 还能分析照片并提出改进建议，可告诉用户应该怎样重新拍摄，或如何进一步编辑。Custom Edit 区域则支持编写、修改、保存和删除自己的提示词。Adobe 介绍称，Project Indigo 本身并不是照片编辑器，不过将会通过 AI Playground 探索一种可能性：利用生成式模型，直接在相机应用中完成基础编辑。AI Playground 目前采用谷歌 Nano Banana，后续有望支持选择其他模型。AI Playground 仍处于小规模试验阶段，未来几周只会免费开放给少量用户。据IT之家了解，Adobe 将观察用户反应，再决定是否扩大测试范围或延长试验时间。如果功能受到欢迎，AI Playground 最终会改为收费服务。获得测试资格的用户更新应用后，可能会在启动画面看到提示。AI Playground 的入口是屏幕底部的闪光按钮。用户同意参加试验后，系统只会收集匿名使用数据。Adobe 承诺，公司不会查看用户输入的提示词或照片，不会把内容上传到服务器，也不会用于训练 AI 模型。应用无需登录，因此收集到的分析数据同样无法对应到具体用户。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/273.htm", "publishedAt": "2026-07-20T23:04:24+00:00"}, {"title": "苹果 visionOS 27.0 开发者预览版 Beta 4 发布，带来 Siri AI 与冰岛新环境", "summary": "IT之家 7 月 21 日消息，苹果今日向 Vision Pro 用户推送了 visionOS 27.0 开发者预览版 Beta 4 更新（内部版本号：24M5326g），本次更新距离上次发布 Beta / RC 间隔 14 天。开发者可以通过打开 Vision Pro 上的“设置”应用，进入“软件更新”并选择加入 Beta 更新来安装 visionOS 27。visionOS 27 引入了 Siri AI，其能力可与 ChatGPT 和 Claude 等聊天机器人相媲美。在 Vision Pro 上，Siri 可以回答佩戴者正在注视的任何内容的相关问题，并且新增了一个 Siri 球体，佩戴者可将其放置在虚拟空间中的任意位置。全景照片现在可以被转化为空间环境，系统还新增了冰岛索斯莫克环境，呈现壮丽的山脉、山谷、冰川以及北极光。Web 环境支持功能允许开发者在 Safari 中创建 360° 环境，从而带来更像原生 Vision Pro 的浏览体验。应用窗口现在变为弯曲形态，以提供更具沉浸感的工作空间，控制中心也经过重新整理，让系统控制项更容易被找到。此外，苹果还加入了一种更小的桌面小组件尺寸，并且当佩戴者注视通知时，通知会自动展开。附 visionOS 27 发布历史：2026-07-07：visionOS 27.0 Beta 3 (24M5316k)2026-06-23：visionOS 27.0 Beta 2 (24M5306i)2026-06-09：visionOS 27 Beta (24M5291p)IT之家小伙伴如果找到更多新内容，可以在投稿或评论区中提出你的发现 ~[微笑]", "sourceNa 置”应用的“照片”部分有一个“放大照片以填充”（Zoom Photos to Fill）的开关。它会轻微放大那些接近屏幕宽高比的照片，并且默认是开启的。3、壁纸苹果已移除了在 Beta 3 中添加到通知中心（Notification Center）的壁纸功能。用户滑动后，会在主屏幕上看到壁纸主题的剪裁效果，但该功能在 Beta 4 中不再可用。4、Siri Voices苹果在 Beta 4 更新中调整 Siri Voices 选择界面。在没有可设置自定义声音选项的设备上，它显示了带有声音和口音的自定义声音选择界面。在支持自定义 Siri 选择的设备上，有更多的声音选项，苹果表示这些功能即将推出。Siri Voices 仅限于 iPhone 17 Pro、iPhone 17 Pro Max 和 iPhone Air 等机型。5、Siri Search用户向下轻扫以进入 Siri 搜索或询问界面后，现在会有一个解释该界面的启动屏幕。“设置”应用的 Siri 部分，有一个新的选项可以调整 Siri 应用中预览的长度。用户可以选择最多五行，或者不显示。6、ProRes Log 格式IT之家援引博文介绍，在“设置”应用的“相机”部分，如果用户开启 Apple ProRes，则可以选择 ProRes 日志格式。用户可以点击“ProRes 日志视频编码”并选择 Log 或 Log 2。7、Wi-Fi 辅助无论“连接辅助”主开关是开启还是关闭，都可以在每个 Wi-Fi 网络中启用或禁用“连接辅助”。8、AirPods苹果更改了控制中心中 AirPods 选项的外观，包括为自适应模式增加了更多选项。9、双电池iOS 27 Beta 4 代码引用了一款带有双电池的 iPhone，其中包含诸如“这款 iPhone 中的电池运行正常”之类的字符串。10.国行 Siri AI 暂时缺席根据IT之家网友 @思皞 反馈，在升级 iOS 27 Beta 4 更新之后，暂未发现 Apple 智能（Apple Intelligence）和 Siri AI 的踪迹。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/272.htm", "publishedAt": "2026-07-20T22:57:01+00:00"}, {"title": "神州数码发布企业AI流程系统与智算产品，尝试打通应用和算力两端", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/jc1vll7xctqYlopcwIKe?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T19:59:20+00:00"}, {"title": "无问芯穹夏立雪：数字世界与物理世界的所有AI生产力运行，都需要 Agentic Infra", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/AWhEVVgvNquuiKZdRQ0H?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T16:41:21+00:00"}, {"title": "一句话上线 AI Agent 应用：火山 Supabase + IGA Pages 全栈部署实践", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/ZG1ipDQr8pjjHUQe7gbF?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T14:47:38+00:00"}, {"title": "企业级 Harness Engineering 实践：运营、数据、Coding 与办公智能体工程化落地｜AICon深圳", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/mbMDGFkUMj9oCaj2ICUq?utm_source=rss&amp;utm_medium=article", "publishedAt": " 00"}, {"title": "WAIC 2026收官｜范式大会亮点集锦，见证AI 2.0从技术突破走向产业实践", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/455963.html", "publishedAt": "2026-07-20T10:42:09+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "苹果 41 页指控 OpenAI“偷师”：古尔曼剖析未点名前 Apple 设计师伊夫原因", "summary": "IT之家 7 月 21 日消息，在上周末（7 月 19 日）的 Power On 时事通讯中，彭博社的马克 · 古尔曼（Mark Gurman）指出，苹果出于多方面因素考虑，在指控 OpenAI 的 41 页诉状中，并未点名前苹果公司设计师乔纳森 · 伊夫（Jony Ive）。苹果公司于 7 月 12 日向美国加利福尼亚北区联邦地区法院提起诉讼，指控 OpenAI 及其硬件子公司 io Products 通过挖走苹果员工、获取内部文件和接触供应商等方式，盗用苹果商业秘密。IT之家援引博文介绍，在诉讼文件中，苹果公司将矛头对准了以下几人：Tang Tan：指控其在苹果任职期间（前 iPhone 产品设计副总裁）提前泄露供应商信息及机密，离职后诱导应聘者携带原型机、CAD 图纸等加入 OpenAI，并系统性转移供应链资源。Chang Liu：指控其在职期间指导现任苹果同事规避安全审查复制机密文件，面试前传授未发布项目复习要点，并建议改用私人通讯工具（如 LINE）进行违规交流。Yu-Ting “Alyssa” Peng：在仍任职苹果期间，持续向已跳槽至 OpenAI 的刘畅泄露苹果内部保密硬件项目的核心信息，包括项目进展、供应商决策、工程细节等关键保密内容古尔曼认为，苹果在诉状中未点名伊夫，其中最主要的原因是苹果公司认为关联性有限。伊夫通过设计公司 LoveFrom 参与 OpenAI 硬件项目，但不负责招聘，也不处理日常运营。第二个原因是伊夫和乔布斯遗孀 Laurene Powell Jobs 私交甚好，古尔曼指出 Powell Jobs 曾投资于 io Products，并且仍然支持 LoveFrom。Powell Jobs 虽然不是苹果董事会成员，也不是公司最大股东之一，但“Jobs”这个姓氏在库比蒂诺仍具影响力。消息称苹果公司在起诉 OpenAI 时，曾考虑是否要把伊夫写入其中，最终因为这一层关系而放弃。第三个原因是舆论观感。伊夫于 2019 年离开苹果，并在 2022 年前担任付费顾问。报道指出在库克执掌苹果公司后，库克更重视运营效率、制造和成本纪律，设计不再居于核心位置。古尔曼认为如果苹果把伊夫拉入本次诉讼争议中，在法庭作证环节中，法官或者对方律师可能要求其回答对苹果设计地位变化的看法。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/292.htm", "publishedAt": "2026-07-21T00:27:06+00:00"}, {"title": "苹果 macOS 27 隐藏新特性：调用 Siri AI 内容创作", "summary": "IT之家 7 月 21 日消息，科技媒体 AppleInsider 昨日（7 月 20 日）发布博文，报道称在 macOS 27 Golden Gate Beta 更新中，苹果正在测试隐藏 AI 功能，让用户调用 Siri 内容创作。触发方式方面，该媒体测试指出用户选中文本后，屏幕上会出现一个微型 Siri AI 图标，点击图标后，会弹出一个精简菜单。该媒体测试表明该功能目前尚未完善，最长可能需等待 10 秒才会出现 Siri AI 图标。IT之家援引博文介绍，在跳出的菜单中共有以下 4 种选项：校对（Proofread）重写（Rewrite）：展开选项包括友好（Friendly）、专业（Professional）、简洁（Concise）三种风格。读起来怎么样？（How does this sound?）使用 Siri 编辑（Edit with Siri）用户如果想要启用此隐藏功能，请打开“终端”App，然后按顺序粘贴以下两条命令：sudo&nbsp;mkdir&nbsp;-p&nbsp;/Library/Preferences/FeatureFlags/Domain&nbsp;&amp;&amp;&nbsp;\\ sudo&nbsp;defaults&nbsp;write&nbsp;/L const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
