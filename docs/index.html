isplayPort 1.4a 接口、两个 HDMI 2.0b 接口、以及一个 3.5mm 耳机接口。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/804.htm", "publishedAt": "2026-07-19T14:23:47+00:00"}, {"title": "千里科技在 WAIC 公布多项进展：阶跃 Step AOS 将应用于汽车，年底推 ASD 5.0", "summary": "IT之家 7 月 19 日消息，在 2026 世界人工智能大会（WAIC 2026）举办期间，千里科技公布多项项目进展。千里科技公布了未来 ASD 4.1 版本技术预览，聚焦三项突破：其一，实现零断点的全场景 D2D 通行 —— 从地库到地面、从城区到乡镇，一键导航直达；其二，依托物理 AI 大模型，深度语义理解带来识别能力的全面升级，对小动物、特殊车辆及需特别关注人群采取更优交互策略；其三，舱驾深度融合，语音直接控车，车辆主动理解意图并执行。千里科技进一步透露，计划于年底推出的 ASD 5.0 版本。在操作系统层面，阶跃星辰日前发布智能体原生操作系统 Step AOS，千里科技同步宣布将其应用于汽车领域。Step AOS 具备记忆、决策与执行、安全三大核心特征，将模型能力与终端能力深度打通，能将包括汽车在内的硬件与原有系统的全部能力，转化为智能体可直接调用的算力、可理解的数据和可调用的资源，用户只需表达任务意图，全链路由智能体自主完成。IT之家注意到，本次 WAIC，千里科技联合吉利、阶跃星辰共同研发的汽车“超级智能体”—— 超级 Eva 亮相阶跃展台，该超级智能体以阶跃星辰最新发布的 Agentic 模型 Step 3.7 Flash 为核心执行大脑。千里科技联合阶跃星辰共同研发的超级智能体，具备类人自然交互、多语种支持能力，可将用户提出的模糊出行需求自动转化为导航路径规划，并打通智驾全程。同时，在通用交互、出行场景打通的基础上，新增视觉交互模块，支持本地生活服务调用，可自动唤起对应小程序完成点单订票等操作。据悉，这款搭载在极氪 8X 上的汽车智能体已于今年 3 月上线，后续还将逐步拓展至其他合作品牌的适配车型。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/803.htm", "publishedAt": "2026-07-19T14:18:48+00:00"}, {"title": "HKC 猎鹰“27U165A”27 英寸显示器发售：4K 165Hz/1080P 320Hz 双模，1899 元", "summary": "IT之家 7 月 19 日消息，HKC 旗下猎鹰“27U165A”27 英寸双模显示器将于明天 0 点在京东开启首销，定价 1899 元，部分地区国补后到手价低至 1599 元。这款显示器支持 4K 165Hz / 1080P 320Hz 双模切换，搭载了一块 27 英寸 Fast IPS 电竞面板，通过 VESA HDR 400 认证，色域覆盖 95% DCI-P3，色准 ΔE≤2。HKC 猎鹰 27U165A 配备 1 个 DP 2.1 接口（ 54Gbps 带宽）+ 2 个 HDMI 2.1 接口；配备人体工学支架，支持 100mm 升降、-5°~20° 俯仰调节、±90° 垂直旋转；底座采用六边形小巧设计，占地面积更小。IT之家附详细参数如下：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/800.htm", "publishedAt": "2026-07-19T14:00:14+00:00"}, {"title": "总部设上海，世界人工智能合作组织未来将鼓励共建开源生态", "summary": "IT之家 7 月 19 日消息，据央视新闻今日报道，《关于成立世界人工智能合作组织的协定》签署仪式 16 日在上海举行，来自亚洲、非洲、拉美和欧洲的 29 个国家现场签署协定，成为创始成员国。记者从有关方面获悉，这标志着中方倡导推动成立世界人工智能合作组织取得重要阶段性进展。下阶段，中方将会同合作组织创始成员国推动组织尽早启动运转。未来合作组织将重点开展三方面工作。一是把加强人工智能能力建设国际合作作为优先事项，通过政策交流、技术合作、人员培训、联合研究等方式，促进人工智能技术和服务的可及性，持续释放智能红利，确保发展中国家在新一轮智能浪潮中平等受益。二是在开展沟通对话、建立政策共识、分享最佳实践的基础上，切实发挥供需对接平台作用，推动各国优势资源深度融合互补，结合各国国情推进“人工智能 +”行动，加强科技和产业合作，鼓励共建开源生态，打造一批接地气、可触达的务实合作成果。三是致力于坚定捍卫联合国宪章宗旨和原则，支持更好地发挥联合国作用，落实《全球数字契约》和联合国可持续发展目标，在人工智能领域推动构建公正合理的全球治理体系。据了解，16 日签署的协定包括组织宗旨、基本原则、职能、组织架构、决策程序、成员资格等具体内容，为组织正式成立和后续运转奠定坚实政治共识和法律基础。合作组织是国际交流合作平台，加入合作组织不影响各国与第三方开展合作，也不会给各国人工智能发展带来不必要的约束和限制。合作组织成员国将秉持主权平等、相互尊重、协商共建原则，未来将与联合国等国际和区域组织探讨合作，共同推动人工智能向善普惠发展。IT之家注意到，2025 年 7 月 26 日，中国政府倡议成立世界人工智能合作组织。这是中方坚持践行多边主义、推动共商共建共享全球治理的重要举措，也是中方响应全球南方呼声、助力弥合数字和智能鸿沟、促进人工智能向善普惠发展的实际行动。值得一提的是，世界人工智能合作组织总部设在中国上海。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/797.htm", "publishedAt": "2026-07-19T13:50:45+00:00"}, {"title": "面壁智能发布端侧模型 MiniCPM5-2B，AA-Index 榜单 4B 以下性能第一", "summary": "IT之家 7 月 19 日消息，面壁智能今日联合 OpenBMB 在 2026 世界人工智能大会上发布了最新端侧模型 MiniCPM5-2B，并完成多款芯片适配。官方表示，在最新的 Artificial Analysis（AA）榜单评测中，MiniCPM5-2B 以 17 分的成绩占据榜首，取得了全球 4B 以下模型的最高得分。据介绍，MiniCPM5-2B 模型原生支持混合思考，可在快速响应与深度推理之间灵活切换，同时提供 512K 超长上下文窗口，单次可处理整本长篇小说或数十万行代码。能力维度覆盖通用知识、数学与代码推理、复杂指令遵循、多语言理解与生成、长文本处理、工具调用及深度搜索，形成当前 4B 以下最为完整的任务覆盖。MiniCPM5-2B 原生具备工具调用、深度搜索和代码生成等智能体核心能力。训练阶段先后执行 200B 规模的 Agent Midtraining、百万条高质量轨迹的 Agent SFT 以及可扩展的 Agent RL 对齐优化，确保智能体行为稳定可靠。这一设计使得模型可直接作为端侧智能体基座，为手机、PC、智能座舱等设备上的本地化 AI 助手构建提供支撑。IT之家获悉，面壁智能已完成对 AMD、英特尔、联发科、高通（按英文首字母排序）等全球主流芯片厂商的端侧模型适配。此外，MiniCPM5-2B 联合众智 FlagOS 社区，完成了 9 款芯片的 Day0 适配；覆盖华为昇腾、海光、昆仑芯、沐曦、摩尔线程、平头哥、清微智能、天数智芯、英伟达，并延伸至 ARM 端侧平台。官方表示，在不久的将来，MiniCPM5-2B 将正式开源，开发者可通过 Hugging Face、魔搭等平台获取模型权重，同时可获取针对各芯片平台的适配镜像与部署指南。相关阅读：《面壁智能开源 MiniCPM5-1B：在 AA-Index 上超越所有 2B 参数以下模型，能跑在手机、浏览器上》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/796.htm", "publishedAt": "2026-07-19T13:40:52+00:00"}, {"title": "先办牌照再造车，央视曝光非标电动车黑灰产链条", "summary": "IT之家 7 月 19 日消息，据央视新闻今日报道，去年 9 月，电动自行车安全技术新国标正式落地实施。新国标通过防篡改等多重硬件设计，从源头上最大限度限制了车辆违规改装和提速，目的是减少交通意外事故的发生。然而近期，记者接到线索，部分电动自行车专卖店、生产企业依然在暗中违规生产、销售超出国家标准的电动自行车。报道称，浙江台州是我国电动自行车核心生产基地之一，这里聚集了四十多家制造企业，各种品牌专卖店随处可见。在台州的一家绿佳电动自行车专卖店，记者发现，一辆辆外观崭新、仪表盘显示里程为“零公里”的新车却摆放在二手电动车区域，进行公开销售。浙江省台州市绿佳电动自行车某专卖店销售人员介绍，去年把车都上好了牌照，车子都是新的。每辆车都有牌照了，所以是二手车。记者还走访了爱玛、钻豹等多家电动自行车品牌专卖店，发现这种将“零公里”新车挂牌作为“二手车”销售的情况，在当地并非个别现象。多位销售人员透露，赶在新国标实施前，各家专卖店利用各种渠道搜集到的身份证信息，提前办理了大量电动自行车车牌。记者在一家钻豹专卖店调查时发现，电动自行车的产品合格证上，赫然注明的生产日期是今年 3 月 17 日。然而，该车车牌早在去年就已经办理完毕。也就是说，在车辆实际生产之前，它就已经拥有了车牌。原来，这些所谓的二手车很多不是“库存积压车”，而是经销商和生产厂家约定，先制作出电动自行车的车架号、合格证，然后再按需生产的新车。记者在这家钻豹专卖店调查时发现，这辆电动自行车暗藏着三个速度挡位。记者发现，这辆电动车虽然时速可以达到 50 公里以上，但仪表盘上始终显示为 25 公里每小时。销售人员透露，这些车辆在业内被称为“非标车”。速度、电压、重量等技术参数均不符合现行新国标，出厂时就预留了改装“后门”。记者发现，这些所谓“二手车”的价格反而比同厂同款、合乎国标要求的新车还要贵了 400 多元。记者先后对浙江台州三十多家电动自行车专卖店调查发现，绿佳、钻豹等主流品牌普遍存在限速超标、超重以及其他改装等问题。在浙江台州一家钻豹专卖店，一位消费者花 2000 多元钱购买了一辆“零公里二手车”，记者记录了整个办理牌照的过程。销售人员介绍，这辆电动自行车时速能够达到 50 公里、电压可以同时兼容 48 伏、60 伏和 72 伏，但他们仍可以通过一些“特殊”的办法，正常上牌、过户。按照国家标准，使用铅酸蓄电池的电动自行车整车质量不得超过 63 公斤。记者看到，销售人员登记核验时使用的并不是消费者购买的车辆，而是换了一辆颜色、款式相同的车辆，推到地秤上进行核验。记者发现，这辆用来核验的车，只有 4 块电池，没有尾架尾箱等配件，秤上显示为 62 公斤，完全符合核验要求。销售人员介绍，实际上消费者购买的这辆车使用的是 5 块电池，电压可以达到 60 伏，还包含尾箱尾架等配件。通过以上操作，这辆原本禁止上路的超标电动自行车堂而皇之地完成了档案录入，顺利卖给消费者。提前做出车架号、合格证，办理电动自行车牌照，再根据市场需要安排生产超出国家标准的电动自行车，这种逆向操作给行业监管埋下极大的隐患。那么，超出标准的电动自行车究竟是怎样制造出来的？记者对浙江台州的电动自行车生产企业展开调查。记者随后来到浙江钻豹电动车股份有限公司，这家企业年产电动车超 100 万辆，全国门店达 6300 多家。记者调查发现，这家大型车企生产的不少电动自行车，时速都达到 50 公里以上，行业内把这种车型称作“外卖车”。名为电动自行车，核心配置却与电动摩托车几乎一样。出于安全考量，国家标准严格限定电动自行车标称电压不得超过 48 伏，目的是从硬件层面限制整车动力输出，限制车速，减少安全隐患。但当地不少车企普遍推出 48 伏、60 伏、72 伏通用车型，业内俗称“三通”。记者调查发现，这家企业目前还在生产“非标”电动自行车。据了解，60 伏、72 伏车型已经属于电动轻便摩托车和电动摩托车范畴。由于电机功率与转速更大，车辆行驶速度更快，必须按机动车进行管理，驾驶人必须持机动车驾照才能上路行驶。记者随后又来到浙江台州的另外一家电动自行车企业 —— 绿佳车业科技股份有限公司，这家企业电动自行车年销量约 200 万辆，位列行业前十强。然而，记者调查发现，虽然“非标车”早已被禁止生产销售，但他们仍能接到“非标车”订单。调查中记者发现，一些非标车所使用的较高功率的电机均来自当地知名的电机制造企业。这家企业相关负责人介绍，适配 60 伏、72 伏的高压电机成了不少电动自行车产品的标配。据业内人士透露，电机是动力核心，控制器则是速度开关。记者随后走访了当地多家控制器生产厂家，发现他们都是根据电动自行车企业的需求，专门生产可破解限速的产品。IT之家注意到，《电动自行车安全技术规范》（GB 17761—2024）自 2025 年 9 月 1 日正式实施。2025 年 9 月 1 日起，不得生产、出厂不符合新国标要求、未依据新国标取得 CCC 认证的电动自行车。本次发布的新标准主要从以下几方面进行了修改和完善：一是强化了非金属材料防火阻燃要求，针对弹性软垫材料、纺织品、皮革、电气回路导线等不同类别非金属部件分别规定了防火阻燃指标。二是明确了电动自行车使用塑料的总质量不应超过整车质量的 5.5%。三是增加了电动机低速运行转矩、空载反电动势、电感值差异系数的要求。四是完善了电池组、控制器、限速器的防篡改要求，增加了 6 类防篡改检查方法示例。五是提升了制动性能要求，减小了车辆最大制动距离。六是将使用铅酸蓄电池的电动自行车整车质量上限由 55kg 提升到 63 kg。七是新增了企业质量保证能力和产品一致性要求，明确了生产企业应具有与电动自行车整车产能相匹配的整车及车架等主要零部件的生产能力、检测能力和质量控制能力。八是要求电动自行车具备北斗定位，通信与动态安全监测功能，其中对于除城市物流、商业租赁等经营性用途之外的电动自行车，在销售时可由消费者选择是否保留北斗定位模块。九是不再强制要求所有车型均安装脚踏骑行装置，改为由生产企业根据车型的实际需要设计和安装。十是明确了电动自行车鼓励安装后视镜。十一是要求生产企业明确电动自行车的建议使用年限，并在铭牌、产品合格证上进行标注。根据相关规定，2025 年 8 月 31 日及之前按照旧标准生产的车辆 3 个月的销售过渡期，允许销售至 2025 年 11 月 30 日；2025 年 12 月 1 日之后，所有销售的电动自行车产品均必须符合新标准规定。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/795.htm", "publishedAt": "2026-07-19T13:28:58+00:00"}, {"title": "重力星球推出瓦 75 LITE 夜隐电竞磁轴键盘，422 元", "summary": "IT之家 7 月 19 日消息，重力星球瓦 75 LITE 夜隐电竞磁轴键盘今晚正式开售，售价 422 元。这款键盘采用镂空骨骼设计，为单模有线键盘；全键支持 8K 扫描率、单键支持 64K 扫描率，输入延迟 0.25ms；搭载星磁轴，号称专为电竞实战调校，RT 精度 0.01mm。这款键盘拥有 16 种 RGB 动态灯效、约 1600 万色全彩 RGB 灯光；采用铝定位板、PORON 夹心棉、IXPE 棉轴下垫、PCB、PORON 底棉、硅胶底棉等多层填充。IT之家附详细参数如下：京东重力星球瓦 75 LITE 夜隐磁轴键盘 422 元直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/794.htm", "publishedAt": "2026-07-19T13:28:09+00:00"}, {"title": "国内首台水下布料刮平一体化整平设备投入使用", "summary": "IT之家 7 月 19 日消息，据中国水运报消息，由中交二航局自主研发的国内首台水下布料刮平一体化整平设备在广东深汕特别合作区小漠国际物流港防波堤一期工程投入使用，标志着我国基床整平装备正从大型整平船、自升式平台向轻量化、模块化的一体化水下整平设备转型。深汕特别合作区小漠国际物流港防波堤一期工程是国内在建最长单体沉箱直立式防波堤，总长近 3.7 公里，需完成约 70 万立方米抛石作业，水下基床整平面积超过 10 万平方米。基床表面平整度直接决定沉箱安装精度与稳定性，是防波堤施工的关键工序。IT之家从报道获悉，传统人工整平工艺需吊机辅助、潜水员水下作业，存在操作繁琐、耗时长、安全风险高等问题。同时，项目地处开敞涌浪海域，平均波高 1 米以上，台风、强对流、寒潮等极端天气频发，施工窗口严重受限。此次小漠港项目投用的水下整平设备总长 28.3 米、总宽 12.3 米，重约 48 吨，配备四台液压油缸支腿、高精度倾角仪及基于实时动态载波相位差分技术的水下测量装置。设备通过输料螺旋将石料均匀铺满，再由行走小车底部刮刀将碎石垫层刮平；配套专属数智化操控平台，预设施工基准参数与自动化作业路径，整平设备入水后即可全自动行走、精准刮平作业面，其工效相较于传统人工作业实现翻倍提升，施工允许作业波高提升 60%。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/790.htm", "publishedAt": "2026-07-19T13:06:43+00:00"}, {"title": "艾湃电竞推出新款 MST 系列白金全模组电源：提供 850/1200W 版本，639 元起", "summary": "IT之家 7 月 19 日消息，艾湃电竞现已在京东上架新款 MST 系列白金全模组电源，目前在售 850W 和 1200W 版本，定价为 639 元起，IT之家整理价格信息：850W 黑色：639 元850W 白色：659 元1200W 黑色：879 元1200W 白色：899 元京东艾湃电竞 MST 系列白金全模组电源 639 元起直达链接系列电源取得 80 PLUS 白金认证，配备 12V-2x6PCIe 接口，符合标准英特尔 ATX 3.1 与 PCIe 5.1 电源设计规范，电源整体使用“LLC 谐振 + DC - DC 设计”，采用全日系电容，匹配 120mm 双滚珠轴承风扇。系列电源附带扁平线材，提供风扇智能 ECO 模式开关，提供过功率保护（OPP）、过压保护（OVP）、欠压保护（UVP）、过电流保护（OCP）、过温保护（OTP）、短路保护（SCP），提供 10 年质保。IT之家附产品参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/784.htm", "publishedAt": "2026-07-19T12:30:31+00:00"}, {"title": "长城全新坦克 300 上市：提供 Hi4-T/Hi4-Z 混动、汽油、柴油版，19.98 万元起", "summary": "IT之家 7 月 19 日消息，在今晚举行的发布会上，全新坦克 300 正式上市，共推出 5 款车型，售价 19.98 万元起：全新坦克 300 挑战者（汽油版）：19.98 万元全新坦克 300 征服者（汽油版）：21.68 万元全新坦克 300 柴油版：23.48 万元全新坦克 300L Hi4-T：24.98 万元全新坦克 300L Hi4-Z：25.98 万元外观方面，全新坦克 300 车头整体延续了现款方盒子造型与复古圆灯设计，但中网处的车标 Logo 改为了黑化的“TANK”英文标识，进一步提升品牌辨识度。在车身尺寸方面，全新坦克 300 燃油版长宽高分别为 4750×1930×1903mm，轴距为 2750mm。IT之家获悉，全新坦克 300L 长宽高分别为 4886×1984×1927mm，轴距为 3010mm，相较老款轴距加长 260mm。新车提供 Hi4-T/Hi4-Z、汽柴多动力可选：Hi4-T 版本配备非解耦四驱结构（电池布置在后备厢），配备 130kW 前电机 +37.1kWh 电池 + 电控分时四驱，WLTC 纯电续航 105km、WLTC 综合续航 913km、0-100km/h 加速时间为 6.1 秒；Hi4-Z 版本配备解耦四驱结构（电池布置在底盘），配备 180kW 前电机 +200kW 后电机 +59.6kWh 电池 + 电四驱，WLTC 纯电续航 200km、WLTC 综合续航 1122km、0-100km/h 加速时间为 4.3 秒；标轴的燃油版本提供汽油与柴油版本，其中 2.0T 汽油发动机 +9AT 变速箱的组合，最大净功率 162kW，最大净扭矩 380N·m；2.4T 柴油发动机 +9AT 变速箱，最大净功率 135kW，最大净扭矩 480N·m。辅助驾驶方面，混动版车型全车提供 27 个感知硬件，搭配 1 个激光雷达、3 个毫米波雷达、11 个高清摄像头、12 个超声波雷达、以及高精度定位感知单元，搭载 Coffee Pilot 3 辅助驾驶，可支持全场景 NOA 智能辅助驾驶和哨兵模式，另外还支持选装 Coffee Night Vision 2.0 远红外夜视系统。燃油版车型则采用纯视觉辅助驾驶方案。座舱方面，前排配备 12.3 英寸液晶仪表 +15.6 英寸 2.5K 悬浮屏的组合，内置 Coffee OS 3 AI 智能座舱，支持 Coffee GPT 车载 AI 语音大模型，以及 Coffee Air-Hicar、ICCOA 等多个车手互联。针对户外出行，该车提供了原厂 IoT 车联设备，包括手台 / 冰箱 / 射灯 / 帐篷 / 麦克风 / 香氛等。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/783.htm", "publishedAt": "2026-07-19T12:22:27+00:00"}, {"title": "天数智芯发布新一代通用 GPU 旗舰产品天垓 300，具备规模化应用条件", "summary": "IT之家 7 月 19 日消息，2026 世界人工智能大会正在举行，天数智芯今日发布新一代通用 GPU 旗舰产品天垓 300，基于 SIMT 通用计算架构，可支持标量、矢量和张量等多种计算类型，并围绕 Attention、MoE、AF 分离、PD 分离及大规模系统扩展等技术进行优化。据介绍，该产品 Attention 效率超过 90%，64k 上下文 Attention 效能高于 Hopper 方案 10%，更充分利用计算资源，提升长序列任务的训练与推理效率；MoE 平均效能高于 Hopper 方案 10%，相同算力投入，完成更多推理任务。首字延迟较 Hopper 架构方案降低约 20%，平均通信延迟降低约 13%，面向 Decode 阶段高频、多卡、小数据量通信，降低协议开销，优化链路路径和数据流转机制。Decode 效能较 an 体验地址如下：https://platform.qianwenai.com/pricing/token-plan", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/775.htm", "publishedAt": "2026-07-19T11:17:11+00:00"}, {"title": "蔡磊获“2026 年度 AI 特别贡献人物”：搭建渐冻症“AI 科研大脑”，大幅度提升研发效率", "summary": "IT之家 7 月 19 日消息，据央视新闻报道，蔡磊在 2026 中国 AI 盛典中获“2026 年度 AI 特别贡献人物”，他和团队搭建渐冻症“AI 科研大脑”，大幅度提升研发效率，并在动物模型验证了渐冻症治愈的可能路径。作为蔡磊团队推动的新药 RAG-17 的受试者，29 岁渐冻症女孩小刘来到了 AI 盛典现场，她在主持人朱迅的搀扶下，缓缓从轮椅上站了起来。两年前还靠轮椅出行的她，如今已能站立、完成日常活动。 小刘邀请蔡磊现场连线，与大家分享近况。蔡磊用“眼睛打字”与观众交流，他写道：身体确实比较艰难，但心中却希望越来越大，因为在这个科技爆发、AI 跃迁的伟大时代。 蔡磊表示，“六年多来，我的决心和行动从未改变，哪怕最后穷尽一切办法，依然失败，我也要‘打光最后一颗子弹’…… 当人类向善的初心遇上科技的力量，必将燃起不可磨灭的火炬，凿穿渐冻症两百年的坚冰。”2025 年，蔡磊团队通过与全球 60 多个顶尖科研团队深入交流，与 50 多家生物科技公司以及十余家医院深度合作，推动了近百个渐冻症科研合作项目，助力 15 个药物管线及治疗技术实现临床转化突破。此外，蔡磊团队还借助人工智能，首次发现并通过临床前实验合作重复验证，确认存在临床前动物模型上治愈渐冻症的可能路径，包括通过骨髓移植彻底免疫重建等办法。该活动还揭晓了 10 位“年度 AI 人物”，IT之家附名单如下（按姓氏笔画排序）：王兴兴：宇树科技股份有限公司创始人兼首席执行官王鹤：北京银河通用机器人股份有限公司创始人兼首席技术官朱秋国：云深处科技股份有限公司创始人兼首席执行官闫俊杰：上海稀宇极智科技有限公司创始人兼首席执行官李宏伟：雷鸟创新技术（深圳）有限公司创始人兼首席执行官汪玉：无问芯穹智能科技股份有限公司发起人沈亦晨：上海曦智科技股份有限公司创始人兼董事长张林峰：北京深势科技股份有限公司创始人兼首席科学家曾国洋：北京面壁智能科技有限责任公司联合创始人兼首席技术官魏少军：上海东方算芯科技有限公司董事长兼首席执行官相关阅读：《蔡磊“牵线”研发，首款国产渐冻症药完成二期临床试验、明年有望上市》《蔡磊发布主题演讲〈倒计时〉：医疗技术和科学水平发展日新月异，我们终将见证渐冻症的终结》《“装病”“诈捐”谣言不攻自破，蔡磊二审胜诉并宣布将全部赔偿款捐赠给困难病友》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/773.htm", "publishedAt": "2026-07-19T10:52:00+00:00"}, {"title": "OPPO 与 AI 版支付宝实现智能体跨端互联，一句话调用“阿宝”实现“智能办事”", "summary": "IT之家 7 月 19 日消息，支付宝发文，宣布 AI 版支付宝“阿宝”与 OPPO 系统智能体“小布助手”正式实现“跨端”互联，“小布”接入“阿宝”近 200 项民生及生活服务，用户一句话即可调用。据介绍，此次合作面向手机 AI 场景，一次性上线“服务直达、复杂任务代办和安全履约”三项标准化能力，并接入出行、观影、餐饮、民生缴费、政务查询、本地生活等近 200 项服务。用户通过电源键、语音唤起、导航长按等调起小布说出需求，即可由小布唤起“阿宝”，推进服务直达或代办流程，完成智能办事。如查公积金、申领育儿补贴、办理临时身份证、计算退休金等民生及政务事项，小布唤起阿宝即可直接触达服务，无需切换 App 或反复寻找入口，节省多步办事流程。针对购票、寄件、缴费、租赁、点餐等 18 类个性化程度较高、流程更复杂的生活服务，可小布把需求交办给阿宝，阿宝推进后续办理，自动完成筛选、填单、预约等流程，关键授权和支付环节由用户确认，真正做到“一句话办成一件事“。例如，用户在浏览短视频时看到某电影相关内容，只要说“小布，帮我买一张 XXX 电影票”，阿宝会根据指令继续完成影片、影院、场次等操作步骤，并进行预订。期间，不需要退出短视频 App，任务还可转至后台继续执行。支付宝表示，支撑这一协作的，是平台与 OPPO 首创落地的跨厂商、跨应用多智能体协同模式。其中小布作为手机系统侧智能体，负责系统入口、场景感知、上下文承接和设备协同；“阿宝”作为办事智能体，依托支付宝服务生态、账户支付和安全体系，负责服务理解、任务组织、流程执行和可信履约。任务进入阿宝后，阿宝会通过自研生活服务大模型理解需求，并匹配相应办事方式：简单事项通过服务直达完成；需用户补充信息、选择方案或确认内容的，通过 Skill 或 A2UI （智能交互界面）引导用户选择与确认；涉及查找、填写、下单等多步骤流程的，则由 XUI （自动操作引擎）推进。支付宝表示，与 OPPO 小布的合作，是阿宝推进跨端互联的重要一步。此前，平台已围绕智能体商业生态持续完善 AI 底层基建与开放通道：5 月推出面向智能体的 AI 支付全栈体系；6 月正式上线 AI 版支付宝，完成全端 AI 化改造；7 月初发布支付宝 AI 开放平台，面向全行业开放标准化接入通道。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/772.htm", "publishedAt": "2026-07-19T10:38:41+00:00"}, {"title": "海信墨水屏手机 A10 配置揭晓：高通跃龙 QCM6690 处理器、安卓 16 原生适配，8 月发布", "summary": "IT之家 7 月 19 日消息，海信墨水屏官方今日公布了墨水屏手机 A10 的细节配置参数。据介绍，海信墨水屏手机 A10 搭载 4nm 高通跃龙 QCM6690 八核处理器，相较前代性能有所提升，支持 PDF 翻页、多文档分屏、长时间手写批注不卡顿；支持智能控温调度，可减少残影；支持静态阅读自动降频，续航相比旗舰芯有所提升。该机还原生适配安卓 16 系统，支持长期系统更新 + 安全补丁。该机还支持六大原生实用功能，包括：NFC、红外遥控（离线可控空调 / 电视 / 投影 / 机顶盒）、原生应用分身（主流应用软件均支持分身）、原生通话录音（系统自带，可一键录制通话）、磁吸无线充电（自动吸附）、专业快刷模式（专攻墨水屏卡顿拖影）。据IT之家此前报道，海信墨水屏手机 A10 正面搭载 6.13 英寸纸质观感墨水屏，适合长时间看书、批注笔记等场景；背面可选装 LCD 彩屏，支持自由切换，适合刷图文、看彩漫、浏览图表、日常影音社交等场景。根据规划，这款墨水屏新机将在 8 月发布（预计会在 8 月底开售）。相关阅读：《海信墨水屏手机 A10 预热：背面可磁吸 LCD 彩屏，支持 5G 全网通》《“三年磨一剑”：海信预热 A10 墨水屏手机，8 月亮相》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/764.htm", "publishedAt": "2026-07-19T10:16:25+00:00"}, {"title": "QCY 推出 Heroad V200 有线头戴式耳机：50mm 动圈、可插拔麦克风，79.9 元", "summary": "IT之家 7 月 19 日消息，QCY 现已在天猫上架一款 Heroad V200 有线头戴式耳机，定价为 79.9 元。天猫 QCY Heroad V200 耳机 79.9 元直达链接该耳机使用午夜黑配色，整体重量 252g，头梁采用人体工程学设计，匹配亲肤蛋白皮耳罩，配备了可插拔麦克风，带有“一键闭麦”按钮。耳机配备 50mm 动圈单元，支持电竞音效，IT之家附产品参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/752.htm", "publishedAt": "2026-07-19T10:09:33+00:00"}, {"title": "限时 1 折，夜间 0.2 折起：阿里 Qoder 上线 Qwen3.8-Max-Preview 模型", "summary": "IT之家 7 月 19 日消息，通义千问系列最新一代基座模型 Qwen3.8-Max-Preview 今日上线阿里 Qoder ，参数量 2.4T。IT之家获悉，7 月 19 日起，阿里 Qoder 将提供限时活动福利（结束时间暂未公布，将提前通知）：限时活动福利：Qwen3.8-Max-Preview 模型调用 Credits 1 折消耗，相当于增加 10 倍用量；夜间专属福利：Qwen3.8-Max-Preview 享受夜间（每日 22:00 至次日 08:00）专属福利，0.2 折起。官方表示，较不久前发布的旗舰模型 Qwen3.7-Max，Qwen3.8-Max-Preview 预览版模型能力又有显著提升。在内部真实任务的测评中，如全栈开发、数据分析、Office 办公工作流等多种复杂、多 Agent、长程任务，Qwen3.8-Max-Preview 展现出匹敌世界前沿模型的实力水平。相关阅读：《阿里千问 Qwen3.8 预览版模型上线：2.4T 参数量，宣称“可能是除了 Fable 5 外最强大的模型”》《参数量达 2.4T，阿里千问 PC 端接入 Qwen3.8-Max-Preview》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/747.htm", "publishedAt": "2026-07-19T10:01:59+00:00"}, {"title": "从大模型到 AI 执行系统：构建企业级可控 Agent 体系｜AICon深圳", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/eTGhBWBHXum6AuVU45Ab?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-19T10:00:00+00:00"}, {"title": "危！GPT-5.6会自动删文件，AI初创老板痛失整台Mac", "summary": "黎曼动力正式发布Rienmann-1.0", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/454689.html", "publishedAt": "2026-07-19T09:39:02+00:00"}, {"title": "小鹏汽车：MONA L03 带动全系车型试驾量创历史新高", "summary": "IT之家 7 月 19 日消息，小鹏汽车今日发文称，小鹏 MONA L03 上市后的首个周末迎来客流高峰，MONA L03 单日试驾量创小鹏历史车型上市同期新高，同时随着 MONA L03 的试驾量暴增也带动了小鹏全系车型的试驾量创历史新高。小鹏 MONA L03 车型于 7 月 16 日晚正式上市，分为纯电、增程版本，售价 12.38 万元起。其中，增程版将于 8 月下旬交付。MONA L03 尺寸为 4650 或 4672 x 1920 x 1600mm，轴距 2850mm，提供极光紫、新月银、暗夜黑、星暮紫、乌梅子酱、尤加利灰六种车身颜色，车漆采用巴斯夫高亮清漆与 3C2B 涂装工艺。MONA L03 座舱提供深空灰、气宇灰两种配色，配备 256 色环抱式柔波氛围灯、MOMENTA 磨砂软包仪表台、天鹅绒顶棚、真金属拉丝音响面罩。搭载 26.8 英寸超大 W-HUD 及带双卫星按键运动方向盘。智能驾驶方面，MONA L03 搭载小鹏自研图灵 AI 芯片，Max 版搭载单颗芯片，750TOPS 算力，配置第二代 VLA 蒸馏版；Ultra SE 版搭载双芯片，1500TOPS 算力，支持满血版第二代 VLA。动力与续航方面，纯电版提供 525km、625km 两种 CLTC 续航，电耗 11.9kWh/100km，零百加速 6.6 秒，支持 3C 快充，10%-80% 充电时间 19.1 分钟。超级增程版 CLTC 综合续航最长 1330km，纯电续航 315km，WLTC 综合油耗 5.16L/100km，零百加速 6.8 秒。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/742.htm", "publishedAt": "2026-07-19T09:33:19+00:00"}, {"title": "参数量达 2.4T，阿里千问 PC 端接入 Qwen3.8-Max-Preview", "summary": "IT之家 7 月 19 日消息，阿里千问今日宣布，Qwen3.8-Max-Preview 首发上线千问 PC 端及 Web 端。据介绍，用户在模型列表勾选，即可第一时间体验最顶级的千问新模型。千问 3.8-Max 参数量达 2.4T，正式版将于近期发布，届时千问 PC 端及 App 将同步上线。据IT之家此前报道，今日，Qwen3.8-Max 预览版模型（Qwen3.8-Max-Preview）已首发上线阿里 Token Plan、Qoder 及 QoderWork。据介绍，较不久前发布的旗舰模型 Qwen3.7-Max，Qwen3.8-Max-Preview 预览版模型能力又有显著提升。在内部真实任务的测评中，如全栈开发、数据分析、Office 办公工作流等多种复杂、多 Agent、长程任务，Qwen3.8-Max-Preview 展现出匹敌世界前沿模型的实力水平。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/738.htm", "publishedAt": "2026-07-19T09:12:53+00:00"}, {"title": "上海人形机器人中试服务平台发布，兼容轮臂机器人、四足机器人试制", "summary": "IT之家 7 月 19 日消息，7 月 18 日，2026 世界人工智能大会（WAIC），上海人形机器人中试服务平台正式发布。据介绍，上海人形机器人中试服务平台坐落于浦东机器人谷一期 3 号楼，总建筑面积约 6800 平方米，划分装配区、专业测试区、智能仓储三大核心功能楼层。IT之家注意到，平台搭建两条模块化柔性整机试制产线，兼容人形机器人、轮臂机器人、四足机器人等异构机器人的试制，整机年试制产能达 2000 台；同步配套一条精密零部件装配线，配套 ISO7 级洁净车间，每年可完成 2000 套关节、灵巧手等核心模组试制。平台建设有专属检测试验区，配齐行业首创灵巧手综合测试台、高速人形专用跑步机、步入式高低温环境箱等专业设备，可完成 400+ 项零部件、整机全维度性能验证。平台核心技术团队 40 余人，硕博人才占比 50%，覆盖机械、电控、AI 算法多学科；创新搭建双线独立数字化管控系统，搭建四层知识产权隔离保障机制，对内自研产品、对外客户项目分区管控、数据隔离，全方位保护合作企业图纸、算法等核心商业机密。中试服务平台依托 480 余家上下游供应商资源，匹配国产化核心零部件；联合行业机构、高校共同编制人形机器人团体、行业标准，开放开源软硬件底座提供二次开发支持；对接浦东创新券、首台套、成果转化补贴政策，中试服务最高可享 50% 费用补助；联动银行、保险机构推出专项研发贷款、中试全周期责任险。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/735.htm", "publishedAt": "2026-07-19T08:54:47+00:00"}, {"title": "月之暗面总裁张予彤：Kimi K3 发布次日 ARR 创下历史最大单日增幅", "summary": "IT之家 7 月 19 日消息，据科创板日报报道，7 月 17 日，月之暗面正式发布新一代大模型 Kimi K3。Kimi 总裁张予彤昨日（7 月 18 日）在朋友圈表示，该模型拥有 2.8 万亿参数，并将于近日开放权重。数据显示，在 7 月 17 日 K3 发布节点，年化收入（ARR）从平缓波动区间陡然冲高，创下历史最大单日增幅。张予彤称，全球开发者对 K3 的反馈中，“taste（口味）”一词最令团队触动，“开源模型并非只有卷价格这一条路”。Scaling Law（规模化法则）依然有效，K3 相比 K2.6 的跨越式提升让她确信“模型的智能极限还远未被触及，Kimi K3 还不是最强模型。”据IT之家此前报道，Kimi K3 模型原生支持视觉理解，并拥有 100 万 token 上下文窗口；是首个达到 2.8 万亿参数规模的开源模型。价格方面，基于 Kimi 开放平台公示的信息，Kimi K3 模型采用按量计费标准：每 100 万 Tokens 输入费用为 2 元（缓存命中）每 100 万 Tokens 输入费用为 20 元（缓存未命中）每 100 万 Tokens 输出费用为 100 元Kimi K3 在 Frontend Code Arena 榜单（测试前端代码生成能力）上超过了 Claude Fable 5 和 GPT-5.6 Sol。相关阅读：《月之暗面 Kimi K3 大模型登顶全球榜单后，彭博社称美国 AI 领先中国固有认知被打破》《消息称月之暗面 Kimi 已通知投资者调整公司架构，有望最快 6 个月内赴港上市》《Kimi K3 展示“AI 为 AI 设计芯片”能力：2 天完成构建、优化、验证》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/734.htm", "publishedAt": "2026-07-19T08:44:39+00:00"}, {"title": "阿里千问 Qwen3.8 预览版模型上线：2.4T 参数量，宣称“可能是除了 Fable 5 外最强大的模型”", "summary": "IT之家 7 月 19 日消息，阿里千问官方今日宣布，Qwen3.8 很快将发布并开源，新模型参数 2.4T，正在以“天”为单位持续进化，可能是除了 Fable 5 外最强大的模型。目前，Qwen3.8-Max 预览版模型（Qwen3.8-Max-Preview）已首发上线阿里 Token Plan、Qoder 及 QoderWork。据介绍，较不久前发布的旗舰模型 Qwen3.7-Max，Qwen3.8-Max-Preview 预览版模型能力又有显著提升。在内部真实任务的测评中，如全栈开发、数据分析、Office 办公工作流等多种复杂、多 Agent、长程任务，Qwen3.8-Max-Preview 展现出匹敌世界前沿模型的实力水平。官方暂未公布新模型的更多信息，IT之家附千问 AI 平台链接：https://platform.qianwenai.com/pricing/token-plan", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/730.htm", "publishedAt": "2026-07-19T08:26:27+00:00"}, {"title": "一句话生成可互动 AI 数字世界，阿里云百炼 HappyOyster 1.0 演示视频公布", "summary": "IT之家 7 月 19 日消息，今日，阿里云百炼正式上线可实时构建和交互的开放式世界模型产品 HappyOyster 1.0（快乐生蚝 1.0），更多消息现已公布。据官方介绍，该模型深度学习物理世界状态转移规律，能主动推演从动作到反馈的因果链，并保持人物和环境的长程一致性。HappyOyster 1.0 具备世界探索（Adventure）和实时导演（Directing）两大模式，用户输入一句话或一张图即可生成可互动、可探索的 AI 数字世界。目前已提供 Android / iOS / Web 三端 SDK，在阿里云百炼开启灰测。 文生视频模型的学习目标是文本到视频的单向映射，而 HappyOyster 1.0 的学习目标是从“当前状态 / 动作”到“下一状态 / 动作”的转移规律，因此支持用户在任意节点介入并改变数字世界走向。相较于大语言模型日趋成熟的架构与范式，世界模型仍属于新兴赛道，而 HappyOyster 1.0 已在探索该赛道的前沿，它从海量自然视频中学习现实里人物、事物和环境的演变，自主推演从动作到反馈的因果链，从而能自然迁移到没见过的场景，根据用户指令推理出新的因果，并维持数字世界的长程稳定和音视频的长时协同。世界探索模式：支持 1 分钟连续实时交互用户输入文字或上传图片即可生成可探索的数字世界，通过前冲、下蹲、跳跃、攻击等操控按键丰富人物运动轨迹，支持载具驾驶与武器战斗等物理交互。世界探索模式支持长达 1 分钟的连续实时位移与镜头控制，生成内容可导出原片。 实时导演模式：支持暂停、回溯与分支叙事实时导演模式下，用户可在任意节点暂停，回跳至剧情关键节点，输入新提示词改变剧情走向。支持生成 3 分钟以上的 480p 或 720p 实时画面，生成内容可导出原片。 阿里云方面称，HappyOyster 1.0 正在探索下一代多模态的互动内容形态。在交互式游戏领域，开发者通过上传图片和输入提示词，可快速生成开放世界原型、角色交互和战斗场景。在互动短剧和虚拟陪伴场景中，用户通过自然语言指令构建人物和剧情，并可在任意节点改写走向。在文旅领域，可为游客提供沉浸式探索体验。目前，开发者服务端通过 Open API 管理世界，客户端 SDK 封装了 RTC 连接、视频渲染和实时交互，支持 Adventure 与 Directing 两种模式，体验结束后可导出视频。产品支持企业用户和开发者通过 SDK 快速构建可玩世界、互动剧、AI 陪伴等沉浸式应用。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/729.htm", "publishedAt": "2026-07-19T08:16:45+00:00"}, {"title": "国家数据局：全国已建成高质量数据集 12 万个、总体量超 1565 PB，为 AI 发展提供有力支撑", "summary": "IT之家 7 月 19 日消息，据央视新闻从国家数据局了解到，我国持续加大优质数据供给，已建成高质量数据集 12 万个。IT之家获悉，截至今年 6 月底，全国已建成科学研究、工业制造、医疗卫生、教育教学等行业领域的高质量数据集总体量超 1565 拍字节（PB、1PB=1024TB），较一季度末增长超 60%，现有体量相当于中国国家图书馆数字资源总量的 547 倍左右，为人工智 500 至 800 公里主流商用遥感卫星作业范围的兼容覆盖。官方公布了五步的演进路径，将经历从验证星座、互联协同、节点成环到算力扩容的连续过程，未来可拓展至数千至数万颗卫星规模：建设先期通遥算（通信、遥感、算力）规模化验证星座实现跨层卫星算力互联协同通过智算卫星持续发射补充，让太空算力节点逐步组网成环推动智算轨道星环逐步扩展，太空智能算力持续扩容形成晨昏算力轨道协同覆盖", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/806.htm", "publishedAt": "2026-07-19T14:44:50+00:00"}, {"title": "科幻 Roguelike 卡牌游戏《穿雾列车》登陆 Steam，首发价 44.25 元", "summary": "IT之家 7 月 19 日消息，由 Mad Cookies Studio 开发、独立游戏发行商 Hooded Horse 发行的科幻类 Rogue 卡牌构筑游戏《穿雾列车（Fogpiercer）》今日正式登陆 Steam 平台。IT之家附游戏商品页（https://store.steampowered.com/app/3219010/_Fogpiercer/?l=schinese&amp;cc=cn）。本作国区原价 59 元，目前 25% 折扣，折后价为 44.25 元，首发优惠截止至 7 月 31 日；同时官方还提供捆绑包优惠，购买对应捆绑包可享额外折扣。游戏支持简体中文界面与字幕，同时提供 Steam 成就、云存档、集换式卡牌等功能，完整支持控制器操作。致命的迷雾压城而来，人们的未来就掌握在你的手中了！组装属于你的火车，选择铺路火车头，在强盗肆虐的世界里，铺设未来轨道，与此同时还要投身火爆的回合制战术战斗，强力协同作用、绝佳的战略位置、亦步亦趋的连锁反应都是决胜的关键。《穿雾列车》是一款科幻题材类 Rogue 回合制卡牌构筑游戏，核心玩法围绕回合制战术战斗展开：玩家需要策划牌组，从各式火车头、车厢还有司机中率领远征队伍，不同选择会带来不同卡牌，影响轮次选项跟能力，收集资源更新或购买额外车厢，为牌组带来更多战术工具。战斗方面主打高速回合制战术，玩家需要巧妙安排车厢位置，制造连锁爆炸才能在迷雾中杀出重围，还可以部署诱敌、夺控敌方载具等多种战术手段，对抗各有特色的敌人。灵感方面，本作灵感来源包括《FTL: Faster Than Light》等经典游戏，同时增添了自身特色，玩家需要在严酷的迷雾环境中维持资源并击退袭击。最低配置：需要 64 位处理器和操作系统，Windows 10 (64-bit) 系统，Intel Core i5-4670 处理器或 AMD FX-8300，4 GB 内存，NVIDIA GTX 960 (4 GB) 显卡或 AMD RX 570 (4 GB)，DIRECTX 版本 12，存储空间需要 2 GB 可用空间。推荐配置：需要 64 位处理器和操作系统，Windows 10 (64-bit) 系统，Intel Core i5-7700K 处理器或 AMD Ryzen 5 1500X，8 GB 内存，NVIDIA GTX 1060 (6 GB) 显卡或 AMD RX 5500 XT (8 GB)，DIRECTX 版本 12，存储空间需要 2 GB 可用空间。游戏图赏：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/326.htm", "publishedAt": "2026-07-19T14:34:22+00:00"}, {"title": "阿里推出“高德问店”服务：面向实体店面创业者、利用 AI 一键“看对手”“数客流”", "summary": "IT之家 7 月 19 日消息，近年来许多实体店面创业者在开店前急于求成，忽视当地人流量及经营成本重要性，最终未能达成“保本线”，迎来惨淡收场结局。为此阿里巴巴宣布推出一项“高德问店”AI 服务，该产品主要面向此类实体店面创业者，整合了钉钉悟空、Qoderwork、阿里云 JVS Claw 等数据，可以帮助创业者更好地评估店面当地营商环境，创业者直接利用自然语言，即可获得从选址到经营决策的参考见解。例如，某位创业者如果想在四川成都某街道开一家肉饼店，就可以利用该工具询问“1 公里范围内有多少家肉饼店”，之后就可以轻松获得见解，当然相应数据更多只是参考性质，仍然需要经营者自行从多角度多方面收集当地数据。阿里表示，“高德问店”支持电脑端工作台和移动端双端使用，其中电脑端适合多店经营和区域规划等需要深度分析的场景，可自动生成专业报告；移动端通过高德地图 App 搜索“高德问店”即可使用，适合实地调研和现场判断。商户亦可通过生态合作伙伴调用高德问店能力。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/774.htm", "publishedAt": "2026-07-19T10:56:36+00:00"}, {"title": "DJI 大疆 Osmo Pocket 影像大赛开启：设置六大创作方向、最高奖 Mavic 4 Pro 512GB 无人机创作者套装及 3 万元现金", "summary": "IT之家 7 月 19 日消息，DJI 大疆宣布 Osmo Pocket 系列影像大赛正式启动，即日起至 8 月 30 日，创作者可通过小红书及抖音平台提交参赛影像作品，最高可获价值 5.4 万元的 Mavic 4 Pro 512GB 创作者套装及 3 万元现金奖励。投稿截止时间：2026 年 8 月 30 日（北京时间）评委评审时间：2026 年 9 月 11 日（北京时间）获奖公布时间：2026 年 9 月 24 日（北京时间）据介绍，本届大赛以“做自己的生活导演”为主题，设置六大创作方向，创作者使用 Osmo Pocket 系列产品创作投稿到指定平台，并将作品链接发送至官方邮箱即可参与，参赛视频时长不低于 15 秒，实况照片不少于 3 张。官方表示作品的主体素材须由 Osmo Pocket 系列产品拍摄，鼓励在 DJI Mimo App 中使用调色、剪辑等后期处理，但不得使用 AIGC 工具生成主体内容。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/771.htm", "publishedAt": "2026-07-19T10:34:28+00:00"}, {"title": "上汽 Robotaxi 量产定制车项目发布，新车计划 2027 年亮相", "summary": "IT之家 7 月 19 日消息，在 2026 世界人工智能大会“数智驱动模速智行”高级别自动驾驶创新发展论坛上，享道出行宣布启动上汽 Robotaxi 量产定制车项目。IT之家注：享道出行是上汽集团旗下的移动出行战略品牌，布局专车，出租车，顺风车，个人租车，代驾，企业租车等产品线。享道出行 CEO 倪立诚、上汽研发总院副院长谢嘉悦、智己汽车副首席技术官兼智能驾驶首席科学家郭辉共同宣告项目进入实质阶段。新车计划于 2027 年亮相。官方表示，这款 Robotaxi 定制车，将是上海首款高级别自动驾驶前装量产定制车，也是首款由全国唯一“亿级车企”打造的前装量产 Robotaxi 车型。项目由享道出行联合上汽集团及头部智驾厂商共同推进：上汽集团负责生产整车头部智驾厂商负责智驾系统享道出行主导产品定义和负责落地运营", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/760.htm", "publishedAt": "2026-07-19T10:14:24+00:00"}, {"title": "国产建造游戏《千里山河录》上架 Steam，国区首发特惠 37.8 元", "summary": "IT之家 7 月 19 日消息，融合东方青绿美学与轻度策略的板块拼筑建造游戏《千里山河录》现已在 Steam 平台发售，本作由 Betobe Studio 开发，2P Games 发行，国区原价 42 元，首发享受 -10% 折扣，折后售价 37.8 元，优惠截止至 7 月 30 日。游戏全程支持简繁中文，包含完整简体中文字幕与界面。IT之家附游戏商品页（https://store.steampowered.com/app/4358380/）。《千里山河录》是一款融合东方青绿美学与轻度策略的板块拼筑建造游戏。在这里，你无需顾虑严苛的地形限制，只需在随玩随停的禅意氛围中自由拼接板块。唤醒拥有奇妙能力的“景灵”，巧妙改变地貌规则，在指尖重绘属于你的千里江山图。游戏以中国名画《千里江山图》为灵感，主打无时间限制、无资源压力的休闲体验，玩家只需随心落砖，就能将心中的国风青绿山水长卷拼筑出来。本作核心特色包括：美术风格采用东方青绿美学，全程色调柔和雅致，营造舒展的东方意境区别于传统城市拼图游戏，板块拼接不受任何地形强制限制，玩家可自由创造可唤醒拥有特殊能力的“景灵”，改变地貌规则，丰富玩法策略性包含 30 项 Steam 成就，支持单人游玩、Steam 排行榜与家庭共享开发者披露，本作全程由原创团队把控核心创作脉络，AI 仅用于素材细化、背景填充等重复性机械工作，未参与任何核心创意决策。最低配置：需要 64 位处理器和操作系统，Windows 10 系统，2 GHz Dual Core (Intel / AMD) 处理器，3 GB RAM 内存，Nvidia GT550M | AMD Radeon R7/HD 5650 | Intel HD 520 显卡，需要 3 MB 可用空间。推荐配置：需要 64 位处理器和操作系统，Windows 10 系统，2.5 GHz Dual Core (Intel / AMD) 处理器，4 GB RAM 内存，需要 3 MB 可用空间。游戏图赏：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/977/919.htm", "publishedAt": "2026-07-19T09:37:23+00:00"}, {"title": "SK 集团会长崔泰源：明年全球半导体需求至少增长五成，AI 领域预计增加 60%-100%", "summary": "IT之家 7 月 19 日消息，据韩联社报道，SK 集团会长崔泰源在济州论坛期间举行的媒体座谈会上表示，明年全球半导体需求将大幅增长，其中 AI 领域需求预计较今年增加 60% 至 100%，整体半导体产品需求也将增长至少 50% 至 60%。但明年新增供应量几乎为零，供需缺口恐进一步扩大。崔泰源将当前全球存储芯片供需局面形容为近乎“一片混乱”。他表示，随着各方争相确保供应，企业正承受大量游说和巨大压力。存储芯片供应已不只是企业经营问题，还关系到国家安全。各国政府必须设法为本国企业获取芯片，才能维持生产运转。当前压力主要集中在企业层面，今后韩国也可能会面临来自其他国家的压力。IT之家注意到，针对美国商务部长卢特尼克近期要求韩国半导体企业扩大对美投资，崔泰源表示，美方一直提出类似要求，并非新的动向。他强调韩国企业必须加快扩产、扩大规模，无论是韩国本土还是美国，只要条件允许，都应考虑建设生产设施。韩国企业需要放眼全球，比较各地建设速度和产能规模，尽快确定优先顺序并推进工厂建设项目，这已经成为“韩国半导体产业的生命线。”对于扩产可能导致半导体“超级周期”提前结束的担忧，崔泰源认为，当前芯片价格已处于非正常高位，本应有所回落。若价格继续上涨进一步加剧“芯片通胀”，半导体行业必然遭到反噬。增加供应、推动价格回落并不意味着企业无法盈利，只有在保护市场的同时扩大市场规模，韩国半导体产业才能持续发展。崔泰源预测，继能源和电力设备之后，材料供应和设施建设或成为制约产业发展的新瓶颈。他表示，随着 AI 产业发展，电线及相关材料可能出现短缺，目前相关产品价格已经上涨，海底电缆也供不应求。由于建设规格每隔一两年就会发生变化，施工难度也在加大。相关阅读：《美国向韩国施压：提议分享三星、SK 海力士“超额利润”，主张“美企大量采购应获分成”》《SK 集团会长崔泰源：内存应该降价，如果一直高价消费电子行业可能受到冲击》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/744.htm", "publishedAt": "2026-07-19T09:36:07+00:00"}, {"title": "腾讯云发布ADP 4.0海外版：集成Google Workspace、Jira，定位AgentOps全生命周期管理", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/r6m3xASYYfM81h9dNBRE?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-19T08:01:41+00:00"}, {"title": "《冲就完事模拟器 2》星球大战 IP 联名游戏 DLC 上架 Steam，国区售价 39 元", "summary": "IT之家 7 月 19 日消息，知名模拟清洁游戏《冲就完事模拟器 2》与《星球大战》的联动 DLC《PowerWash Simulator 2 - STAR WARS Pack》现已登陆 Steam 平台，国区售价 39 元，需要拥有本体游戏《冲就完事模拟器 2》才能游玩。IT之家附游戏商品页（https://store.steampowered.com/app/4229450/PowerWash_Simulator_2__STAR_WARS_Pack/）。扮演 P0-W2，亲历原版《星球大战™》三部曲的多个传奇事件 —— 这位 "2026-07-19T09:20:33+00:00"}, {"title": "长鑫科技中签号出炉：共约 770.22 万个，中签率约为 0.4714%", "summary": "IT之家 7 月 19 日消息，长鑫科技今日披露首次公开发行股票网上中签结果，中签号码共有 7702207 个，每个中签号码只能认购 500 股长鑫科技 A 股股票。IT之家查询获悉，凡参与网上发行申购长鑫科技股票的投资者持有的申购配号尾数与上述号码相同的，则为中签号码。公告称，发行人和联席主承销商于 2026 年 7 月 17 日（T+1 日）上午在上海市浦东新区浦东南路 528 号上海证券大厦北塔 707 室进行本次发行网上申购的摇号抽签仪式。摇号抽签仪式按照公开、公平、公正的原则进行，摇号过程及结果已经上海市东方公证处公证。据官方公告，本次发行价格为 8.66 元 / 股，网上发行有效申购户数为 9,428,778 户，有效申购股数为 8169.20 亿股。网上发行初步中签率为 0.40995452%，配号总数为 1,633,840,250 个，号码范围为 100,000,000,000-101,633,840,249。回拨机制启动后，网上最终发行数量为 385,110.35 万股，网上发行最终中签率约为 0.47141739%。IT之家注意到，长鑫科技成立于 2016 年 6 月 13 日，总部位于安徽省合肥市。该公司是国内规模最大、技术最先进、布局最全的动态随机存取存储器（DRAM）研发设计制造一体化企业，采用 IDM（垂直整合制造）业务模式。公司在合肥、北京两地共拥有三座 12 英寸 DRAM 晶圆厂。在经营层面，受益于 AI 驱动的存储行业需求增长，长鑫科技业绩呈现显著增长。根据业绩预告，公司预计 2026 年上半年实现营业收入 1100 亿元至 1200 亿元，同比增长 612.53% 至 677.31%；归属于母公司所有者的净利润预计为 500 亿元至 570 亿元，同比增长 2244.03% 至 2544.19%。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/721.htm", "publishedAt": "2026-07-19T07:48:43+00:00"}, {"title": "中国 AI 产业核心要素出海发展白皮书", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/minibook/GSbtyU9968lerf5gwPpU?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T12:02:12+00:00"}, {"title": "AI从“能对话”走向“能办事”，蚂蚁集团WAIC展示三层布局", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/xtEyfZsTRA3FFW4dzCah?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T22:08:06+00:00"}, {"title": "我在 WAIC 暴走两万步，看到了中国 AI 的三件套", "summary": "今年开始，可以看一整条链了。#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672335?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-17T10:30:07+00:00"}, {"title": "实测灵犀专业版，AI 成为下一代办公入口", "summary": "办公 AI，能真交付才算数#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672096?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-16 const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.parentNode.removeChild(box); return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top"><span class="dot" style="background:#94a3b8"></span>顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '"><span class="dot" style="background:' + accentVar(i) + '"></span>'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

function renderCards(){

    s.items.forEach(function(it){

      const sumHtml = it.summary

        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
</body>
</html>
