对语气、情绪和 breath 类细节进行精准调控。此外，该模型配套开箱即用的精品音色库，将模型在多语种、多方言、指令控制和细粒度表达上的能力沉淀为可直接调用的音色资源，将陆续上架指令风格音色、20 种方言音色、细粒度控制音色以及 14+ 小语种音色。并将音频输出从提升 24KHz 到 48KHz，相当于从电话和普通语音助手的品质提升到录音棚、影视配音的规格，单次语音合成可达 3 分钟。面向全球多语种场景，Qwen-Audio-3.0-TTS-Plus 进行了专项优化，覆盖中、英、日、韩、德等 16 种语言，新增阿拉伯、越南、马来、菲律宾语；并支持广东、重庆、东北、陕西、上海、四川、云南等 20 种方言。Qwen-Audio-3.0-TTS 现已全面开放，IT之家附链接：Plus 版本：https://bailian.console.aliyun.com/cn-beijing?tab=model#/model-market/detail/qwen-audio-3.0-tts-plusFlash 版本：https://bailian.console.aliyun.com/cn-beijing?tab=model#/model-market/detail/qwen-audio-3.0-tts-flash", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/128.htm", "publishedAt": "2026-07-20T08:55:05+00:00"}, {"title": "美科首款 4433 中画幅相机镜头 85mm F1.8 G 发售：富士 GFX 卡口，2299 元", "summary": "IT之家 7 月 20 日消息，美科旗下首款 4433 中画幅相机镜头 85mm F1.8 G 现已正式发售，该产品为富士 GFX 卡口，定价为 2299 元。京东美科 85mm F1.8 G 镜头 2299 元直达链接美科表示，该镜头专为富士 GFX 系统打造，集 F1.8 大光圈、高解析成像、自然焦外、快速对焦与便携机身于一体。它为中画幅摄影提供兼顾画质、效率与成本的全新选择，既能满足专业摄影师对于成像品质的要求，也降低了中画幅人像镜头的使用门槛，具有较高性价比。规格方面，该镜头重量 406g，采用 7 组 11 片结构，配备 11 片光圈叶片，最近对焦距离 0.65 米，使用 STM 步进马达，滤镜尺寸 62mm。IT之家附产品参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/126.htm", "publishedAt": "2026-07-20T08:49:06+00:00"}, {"title": "国家具身智能应用中试基地发布首个合作世界模型 魔芯科技MoWorld 3D正式亮相", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/455517.html", "publishedAt": "2026-07-20T08:44:24+00:00"}, {"title": "2026 款联想 ThinkPad T14p 笔记本新增“Ultra 7 356H + 32G + 1T + RTX5060”版本，19999 元", "summary": "IT之家 7 月 20 日消息，联想现已为旗下 2026 款 ThinkPad T14p 笔记本新增了“Ultra 7 356H + 32GB RAM + 1TB SSD + RTX5060”版本，定价为 19999 元，7 月 27 日首销。京东 ThinkPad T14pUltra 7 356H + 32GB RAM + 1TB SSD + RTX506019999 元直达链接该机使用经典商务黑配色，整体厚度 10.4mm，重量 1.6Kg，A 面采用金属材质，B 面配备一块 14.5 英寸 3K 120Hz 面板（亮度 500 尼特，覆盖 100% DCI-P3 色域）。机身搭载英特尔酷睿 Ultra X7 356H 处理器，匹配 32GB RAM、1TB SSD 和 RTX5060 显卡，使用 75Wh 电池，至高提供 14 小时续航。I/O 方面，该机左侧提供 1 个 HDMI 2.1、2 个雷电 4、1 个 USB-A 3.2 Gen 1、1 个 3.5mm 音频接口；右侧提供 1 个 RJ45 网口、1 个 USB-A 3.2 Gen 1 接口。IT之家附参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/087.htm", "publishedAt": "2026-07-20T08:20:28+00:00"}, {"title": "迈从预热 God 60《凡人修仙传》动画联名款磁轴键盘：“青纹鎏金”配色、三面环绕光效", "summary": "IT之家 7 月 20 日消息，据 MCHOSE 迈从官方微博，迈从宣布将推出一款 God 60《凡人》动画联名款磁轴键盘，将于 7 月 21 日（明天）10:00 开启预约。目前官方尚未公布该键盘完整参数信息，参考官方预热，该键盘联名设计灵感来自动画《凡人修仙传》，整体采用“青纹鎏金”配色，使用“八斜面剑锋形态”，外观融入“剑锋”、“法阵”等元素，造型锋利硬朗，呼应“本命剑”主题。同时拥有“三面惊鸿，神光环绕”环绕光效。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/072.htm", "publishedAt": "2026-07-20T08:02:03+00:00"}, {"title": "中软国际与月之暗面签署协议，达成 Token 分成及联合创新合作", "summary": "IT之家 7 月 20 日消息，中软国际今日发布公告，近日，公司已与北京月之暗面科技有限公司（以下简称“月之暗面”）正式签署“登月计划”之 Token 分成及联合创新合作协议，此举是公司面向高专业价值 Token 运营商转型的关键战略举措。据介绍，本次合作中，中软国际充分发挥自身在企业服务领域深厚的场景积累、行业 knowhow 及规模化落地交付能力，以及行业及代码生成与开发工程（coding）实践能力；月之暗面依托其在通用大模型领域领先的算法体系与前沿技术研发能力，形成强强协同、优势互补的合作格局。双方将以中软国际自主研发的企业智能操作系统 AllMeta 平台 + 月之暗面 K2.7 Code 及 K3 模型及后续迭代版本为核心技术底座，共同推进企业级智能体技术、产品与解决方案在能源电力、金融等行业的创新及规模化商用。双方将共建 FDE 创新实验室，集结顶尖行业专家与技术研发力量，共同开展企业级 Agent 产品的定义、研发、交付、打磨、测试与持续迭代。首期合作将优先聚焦能源电力关键行业，围绕行业核心业务场景开展技术攻关与场景创新。月之暗面将为该公司提供大模型技术支撑，助力能源电力等关键基础行业的专属知识库建设、模型微调与定制化训练，联合打造智能电力 AOS、行业专属智能体及一体化数智解决方案。在专有云部署方面，双方将长期共同推进国产算力适配与兼容改造，确保关键基础设施自主可控。同时，双方将在品牌共建、标杆案例打造、行业生态拓展及人才队伍建设等方面深度协同，共同扩大行业影响力，加速推进 Agentic AI 在关键行业的落地普及。商业模式方面，双方将探索落地中国版“模型 + 企业服务”协同新范式，采用 Token 分成机制实现共赢发展。针对合作落地过程中基于 Kimi 大模型产生的 Token 消耗收益及其他合作衍生收入，双方将按照协议约定比例进行分成。此外，该公司将全力推进算力业务布局，自建行业算力中心将优先满足月之暗面的算力需求。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/065.htm", "publishedAt": "2026-07-20T07:52:49+00:00"}, {"title": "达尔优推出 AE6 V2 P3955 传奇版电竞鼠标：原相 AIM-3955 PRO 传感器，329 元", "summary": "IT之家 7 月 20 日消息，达尔优今日宣布推出新款 AE6 V2 传奇版电竞鼠标，搭载与原相联合定制 AIM-3955 PRO 传感器，定价 329 元。这款鼠标搭载全新 AIM-3955 PRO 传感器，可达 50000DPI、750IPS 追踪速度、60G 加速度；搭载 Nordic 54L15 主控芯片；支持原生级双 8000Hz 回报率。这款鼠标内置 500mAh 电池，2.4G 模式下 1KHz 回报率可实现约 330 小时续航，8KHz 回报率约 50 小时续航；这款鼠标采用全覆盖龙骨内骨骼设计，大幅提升壳体强度，表面采用准分子肤感 UV 工艺，重约 59g。IT之家附详细参数如下：京东达尔优 AE6 V2 电竞游戏鼠标 传奇版 疾速白 (P3955 版)329 元直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/062.htm", "publishedAt": "2026-07-20T07:52:01+00:00"}, {"title": "vivo S2 手机曝光，预计下月初海外发布", "summary": "IT之家 7 月 20 日消息，据 X 平台消息人士 Yogesh Brar 前天透露，vivo S2 手机将于 8 月初在印度发布，并在 8 月 15 日前后开售。据介绍，这款手机的型号是 V2576，目前已经出现在蓝牙技术联盟（IT之家注：Bluetooth SIG）数据库中，并明确标注为 vivo S2。不过，目前该机的详细参数还没有公布，预计该机将主打影像拍摄和外观设计。作为参考，vivo 曾于 2019 年在印度市场推出 S1 手机。该机配备 6.38 英寸 FHD+ Super AMOLED 屏幕，搭载联发科 Helio P65 八核处理器。拥有 4GB 内存和 128GB 存储空间，采用三摄设计，出厂预装基于 Android 9.0 Pie 的 Funtouch OS 9 系统。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/059.htm", "publishedAt": "2026-07-20T07:44:29+00:00"}, {"title": "微星“MAG 341CQP QD-OLED X28”34 英寸带鱼屏显示器发售：1440P 280Hz QD-OLED，5499 元", "summary": "IT之家 7 月 20 日消息，微星旗下“MAG 341CQP QD-OLED X28”34 英寸带鱼屏显示器目前已在京东发售，该机主打 1440P 280Hz，定价为 5499 元。京东微星“MAG 341CQP QD-OLED X28 流光”显示器券后 5499 元领 500 元券该机配备一块 3440x1440 分辨率 280Hz QD-OLED 面板，曲率 1800R，SDR 亮度 300 尼特，HDR 峰值亮度 1300 尼特，显示器支持 10-Bit 色彩，覆盖 99% DCI-P3 色域。该机支架支持升降 / 倾斜 / 俯仰，显示器本体支持 VESA 100x100mm 壁挂，背壳带有龙纹图腾，提供 2 个 HDMI 2.1 接口、1 个 USB-C 15W 接口、1 个 DP 1.4a 接口、1 个 3.5mm 音频接口。IT之家附显示器参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/055.htm", "publishedAt": "2026-07-20T07:39:34+00:00"}, {"title": "李开复：零一万物计划 2027 年赴港 IPO", "summary": "IT之家 7 月 20 日消息，据彭博社报道，在上海举行的世界人工智能大会（WAIC）上，由人工智能专家、曾任谷歌全球副总裁的李开复创立的北京人工智能初创公司零一万物（01.ai）表示，公司计划于 2027 年在香港进行首次公开募股（IPO）。李开复表示，“我们的目标是在 2027 年，也就是财年结束之后”。该公司财年于 12 月结束。李开复透露，零一万物还计划在首次公布年度业绩期间，寻求上市前融资（Pre-IPO 融资）。零一万物于 2023 年成立，仅 8 个月后估值便超过 10 亿美元（IT之家注：现汇率约合 67.81 亿元人民币），投资方包括阿里巴巴旗下云业务部门等。李开复表示，随着越来越多中国 AI 企业寻求赴港上市，零一万物正在调整其境外控股架构，以适应未来上市计划。香港针对科技企业推出的特殊上市规则允许人工智能公司在尚未实现盈利的情况下上市，但企业需要满足一系列条件，包括具备一定运营历史、持续投入研发、获得专业投资者支持，以及拥有清晰可行的商业化路径。此次上市计划是在零一万物调整业务方向之后提出的。公司此前主要研发前沿大语言模型，如今则转向构建面向企业的 AI 基础设施。李开复表示，目前零一万物主要基于中国开源权重模型进行微调和定制，包括 DeepSeek、阿里巴巴千问以及智谱 AI 的 GLM 模型。他透露，目前零一万物约有一半业务收入来自中国以外市场。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/051.htm", "publishedAt": "2026-07-20T07:35:31+00:00"}, {"title": "实测千问 Qwen3.8 预览版， 网易《天下》，推出了这部《倩影》短片。从视频可以看到，短片中出现了王祖贤年轻时的经典荧幕形象，该短片由网易互娱 DM Monet 画布、火山引擎提供支持。今年 6 月，在《天下》18 周年之际，游戏官方宣布王祖贤成为网易《天下》IP 18 周年品牌代言人。据IT之家今年 6 月报道，62 岁的香港演员吴启华自曝最近卖了肖像权拍 AI 电影。“他们用我 20 岁的样貌去制作一部电影，我本人不用亲自演出。我看过成品，很满意，也正好重温一下当男主角的感觉。”吴启华表示已经签了合同，所以不怕对方拿自己的肖像来拍其他电影，更透露酬劳不错，认为 AI 发展未必会冲击演员工作，反而替自己开拓出另一条新的发展路线。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/089.htm", "publishedAt": "2026-07-20T08:21:38+00:00"}, {"title": "新型勒索木马 ClickLock 曝光，瞄准苹果 macOS 下手", "summary": "IT之家 7 月 20 日消息，安全公司 Group-IB 发文，披露了一款名为 ClickLock Stealer 的新型 macOS 勒索木马。相应木马最初于今年 5 月开始，目前已导致全球 33 个国家至少 100 名用户受到影响，其中超过一半受害者位于欧洲地区。Group-IB 表示，ClickLock 通常会伪装成验证页面（例如山寨 Cloudflare 页面），诱导用户复制恶意命令到 macOS 终端运行，进而在受害者设备上下载运行木马。在木马运行后，受害者设备上会弹出一个伪造的 macOS 系统密码输入窗口。该窗口会显示受害者真实账户名称以及苹果 Logo，以增强可信度。当用户输入密码后，ClickLock 会通过 macOS 本地目录服务验证密码是否正确。只有输入正确密码后，密码才会被发送至黑客控制的 Telegram 机器人；如果密码错误，ClickLock 则会继续要求用户重新输入。如果用户尝试关闭密码窗口，ClickLock 会进一步建立两个 LaunchAgent 持久化组件，使恶意木马能够在用户下次登录时自动运行。具体来看，第一个模块会以每 0.21 秒一次的频率强制关闭 Finder、Dock、终端、活动监视器、系统设置、Spotlight 以及浏览器等应用程序，只保留密码输入窗口。该行为最长可持续约 83 小时，使用户难以正常操作设备。第二个模块则会不断触发 macOS 真实的钥匙串授权窗口，诱导用户验证凭据，从而获取浏览器保存的密码、Cookie 以及自动填充数据。安全公司表示，除了窃取系统密码外，ClickLock 还具备大规模信息收集能力。该木马能够针对 8 款浏览器、31 个加密货币钱包浏览器扩展、7 款密码管理工具进行数据窃取，同时还会搜索 Shell 历史记录、FileZilla 配置文件以及加密货币地址等敏感信息。安全公司提醒，任何要求用户打开终端并粘贴陌生命令的网站，都存在潜在风险。若 Mac 设备突然只剩密码窗口可操作，用户应立即强制关机，并通过安全模式重新启动系统，再由专业人员检查和清理恶意程序。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/086.htm", "publishedAt": "2026-07-20T08:15:52+00:00"}, {"title": "《漫威斗魂》游戏 PC 版配置公布：最低 RTX 2060 显卡、推荐 RTX 3070", "summary": "IT之家 7 月 20 日消息，Arc System Works 工作室与索尼互娱近期公布《漫威斗魂》游戏的 PC 版配置要求，本作将于 8 月 6 日发售，目前已在 Steam 平台开启预购，定价 298 元（商店页链接：https://store.steampowered.com/app/3787240/MARVEL_Tkon_Fighting_Souls/）。IT之家附本作具体配置要求如下：最低配置推荐配置操作系统Windows 11Windows 11处理器英特尔酷睿 i5-8400/AMD 锐龙 5 1600X英特尔酷睿 i7-8700/AMD 锐龙 5 3600X内存16GB16GB显卡英伟达 RTX 2060 6GB / AMD Radeon RX 6600 XT 8GB英伟达 RTX 3070 8GB / AMD Radeon RX 7600 XT 16GB作为参考，《漫威斗魂》主打“全民皆可上手”的体验。与传统格斗游戏要求熟记各角色连招不 研究", "items": [{"title": "AI 红利分层，“底座夯实”的团队获益最高——《DevData 2026 研发效能基准报告》正式发布！", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/qgQoeipS5mb1feHBpTpp?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T14:27:17+00:00"}, {"title": "市场监管总局推动平台企业降低佣金等费用，为新入驻个体工商户提供更多曝光机会", "summary": "IT之家 7 月 20 日消息，市场监管总局办公厅今日印发《推动平台企业赋能个体工商户发展行动方案》的通知。主要目标是：2027 年年底前，滚动形成“五个一批”工作成果，即推出一批精准“滴灌”、直达快享的帮扶举措，培育一批特色鲜明、转型发展的优质商户，定制一批“解渴”管用、生动务实的培训课程，搭建一批数字赋能、有形有感的应用场景，选树一批创新融合、可学可鉴的典型案例，探索构建平台企业赋能个体工商户发展的长效实践路径，进一步降低个体工商户数字化转型成本，优化发展环境，提升可持续增收能力。《方案》提到，鼓励平台企业简化经营者入驻流程，优化智能辅助功能，缩短填报和审核时间。支持平台企业采取有效激励措施，鼓励、督促平台内自然人网店依法办理个体工商户等经营主体登记。拓展电子营业执照应用场景，提升平台企业验证入驻经营主体营业执照的审核效率。支持平台企业结合自身经营特点和优势，为新入驻个体工商户提供更多曝光机会。鼓励平台企业将扶持举措、获取方法等基础性内容纳入新入驻经营主体培训。引导平台企业为新入驻个体工商户提供让利服务，合理降低佣金、抽成、会员费、技术服务费、信息服务费、营销推广费等费用，减轻个体工商户运营初期成本压力。落实《网络交易平台收费行为合规指南》，规范和引导平台企业收费行为。聚焦个体工商户平台经营特点，加强广告宣传、食品安全、知识产权保护、税费申报缴纳等方面政策培训，引导个体工商户守法合规经营。办好“个体网大讲堂”系列活动，不断丰富培训内容，积极扩大活动参与度和影响力。支持平台企业参与标准化工作，加快直播电商等新产业新业态标准的研究制定，引导规范平台企业和平台内经营者的生产经营活动。鼓励平台企业加大对平台内个体工商户培训力度，强化经营指导，帮助个体工商户了解掌握市场行情动态、电商运营策略、数字化工具使用等方面技巧知识，为个体工商户成长提供专业化、体系化指引。发挥质量基础设施“一站式”服务效能，在计量、标准、认证认可、检验检测等方面加大支持力度，助力个体工商户持续提升产品和服务质量，赢得市场竞争主动。鼓励平台企业运用大数据、人工智能等技术帮助个体工商户精准定位客群，在选址选品、产品素材制作、运营数据分析、智能客服等方面推出更多轻量化、低成本数字化运营工具，帮助个体工商户突破经验盲区，规避经营风险，提升经营效率。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/170.htm", "publishedAt": "2026-07-20T09:38:34+00:00"}, {"title": "用火车运输动力锂电池“常态运行”关键一步，100 吨宁德时代产品从宜宾发往上海", "summary": "IT之家 7 月 20 日消息，据宜宾市商务局 7 月 16 日消息，5 车满载 100 吨宁德时代 CB6H0 型动力锂电池的铁路货运专列，于 7 月 12 日 18 时从四川宜宾进港铁路平稳驶出，一路向东奔赴上海金山卫西站，标志着动力锂电池铁路运输从“试点破冰”迈向“常态运行”的关键一步。IT之家从官方公告获悉，宜宾作为“中国动力电池之都”，全球每 10 块动力锂电池就有 1 块产自宜宾基地。宁德时代在宜已建成产能 270GWh，另有在建 80GWh 项目即将投产，运输需求持续攀升。此前动力锂电池因属第九类危险货物，长期依赖公路运输，成本高、运力受限。在 2024 年国铁集团出台相关试运条件后，成都局集团公司、宜宾市商务局、三江通达公司迅速协调形成前置许可、包装检测、场站安全论证等全过程管理模式，并推动于当年 11 月 19 日成功开行全国首趟动力锂电池专列。此次发运进一步优化流程，联合复盘首运经验，推动流程再造和标准固化；升级采用钢质材料护角，有效提升加固强度；落实“五优”服务，采用 5 个不同规格专用集装箱，在提升运输安全性能的同时，实现全程时效与公路运输基本持平，碳排放减少近三成，为下一步常态化开行动力锂电池铁路运输班列奠定了坚实基础。宜宾市商务局相关负责人表示，下一步将持续推动动力锂电池铁路运输规模化运行，推动物流与产业融合发展，助力“宜宾造”产品高效出川，为打造四川南向开放枢纽门户提供有力支撑。此外，航空货运动力锂电池也有了新突破，2025 年 11 月，一架搭载新型安全防护装备的动力锂电池货运航班从湖北鄂州花湖机场顺利起飞，飞向深圳宝安机场。顺丰集团表示，此次飞行实现了我国首次单包装多组三元动力锂电池的连续性、商业化航空运输，也是 AI 预警与主动防控技术在顺丰航空货运飞机中的首次应用，标志着我国动力电池航空运输安全保障与供应链优化迈入高质量发展新阶段。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/070.htm", "publishedAt": "2026-07-20T07:59:15+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "GMI Cloud联合InfoQ、10+企业重磅发布《中国AI产业核心要素出海发展白皮书》，汇聚 AI 产业共识，盘点出海方法论", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/cm9JyEjFfV4toUJabQ80?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T14:30:40+00:00"}, {"title": "企业 AI：方法论易得，交付力难求", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/PVEe5yav0IC8MygcVeOM?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T11:32:56+00:00"}, {"title": "斥资 5.87 亿美元，Netflix 收购本 · 阿弗莱克创办的 AI 初创公司 InterPositive", "summary": "IT之家 7 月 20 日消息，Netflix 在最新提交的监管文件中披露，公司支付 5.87 亿美元（IT之家注：现汇率约合 39.8 亿元人民币）现金，收购了由演员兼导演本 · 阿弗莱克（Ben Affleck）共同创办的人工智能初创公司 InterPositive。今年 3 月，Netflix 曾宣布这项收购。当时，Affleck 在声明中表示，他希望“保护人类创造力的力量”。据 Affleck 介绍，InterPositive 开发的 AI 工具主要用于帮助电影制作人员改善后期制作流程，尤其是在解决一些“现实拍摄过程中遇到的问题”方面发挥作用，例如补拍缺失镜头、替换背景以及修正错误的灯光效果等。在收购宣布时，Netflix 表示，InterPositive 的整个团队都将加入 Netflix，Affleck 则会以高级顾问身份参与工作。不过，当时 Netflix 并未公布这笔交易的具体金额。在最近一次财报中，Netflix 还表示，目前已经有约 300 部影视作品使用了生成式人工智能技术。随着 AI 工具逐渐进入影视制作流程，Netflix 正在探索如何利用人工智能提升制作效率，同时降低部分后期制作环节的成本。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/175.htm", "publishedAt": "2026-07-20T09:49:05+00:00"}, {"title": "Mac 用户称 OpenAI Codex 导致电脑卡顿，关闭应用后也无法恢复", "summary": "IT之家 7 月 20 日消息，就在 OpenAI 宣布解决了一个会疯狂消耗开发者 SSD 寿命的日志写入漏洞几周后，Mac 用户再次反馈，Codex 桌面应用依然在“折磨”他们的硬件。而这一次，问题不仅仅表现为大量磁盘写入。IT之家注意到，近日 Reddit 的 r/codex 社区出现一篇帖子，并在周末获得超过 400 个赞。发帖用户表示，在 Mac 上运行 Codex 应用后，整个系统会出现明显卡顿，即使关闭应用，卡顿现象仍然持续，唯有彻底重启电脑才能有效解决。值得注意的是，该用户强调，这种性能下降并不是由常见的 CPU 或内存占用过高导致的。而当他让 Codex 自己分析问题时，AI 智能体反而将原因归结为自身存在“过度 I/O 操作”和图形处理负载过高。Reddit 上另一篇帖子也证实了多个用户出现的相同情况，不过严重程度似乎因设备而异。这场争议最早可以追溯到今年 6 月。当时 GitHub issue #28224 揭露，Codex 的本地诊断日志记录器存在严重问题，它会以最高级别的 TRACE 日志模式运行，并将大量数据写入位于 ~/.codex/ logs_2.sqlite 的 SQLite 数据库，同时完全忽略 RUST_LOG 环境变量设置。Apache Flink PMC 成员 Rui Fan 曾对这一问题进行测算。他表示：“运行大约 21 天后，主 SSD 已经写入约 37 TB 数据。”按照这一速度推算，一年写入量将达到约 640 TB，足以在不到 12 个月内消耗掉普通消费级 SSD 的全部写入寿命保修额度。针对这一问题，OpenAI 在 6 月 22 日发布的 0.142.0 版本中加入了两项修复。根据问题报告者自己的测试，新版本将日志写入量降低了约 85%，同时 OpenAI 还计划在 0.143.0 版本中加入第三项修复。随后，该漏洞被官方关闭。然而，问题似乎并没有真正结束。仅两天后提交的后续报告（issue #29876）显示，一台搭载 M4 芯片的 MacBook Air 在 Codex 基本处于空闲状态时，仍然保持约每分钟 207 MB 的写入速度，同时 code_sign_clone 缓存文件夹膨胀到了 12 GB。对于采用焊接式存储芯片的现代 MacBook 来说，这类 SSD 磨损是不可逆的，因为用户无法直接更换存储设备。持续性的系统卡顿可能来自另一个独立问题。GitHub 上仍未关闭的 issue #25719 显示，自 6 月 1 日以来，Codex 桌面应用可能会反复触发 macOS 自带的 Gatekeeper 守护进程异常运行。具体表现为，系统进程 syspolicyd 在启动 Codex 后 CPU 占用飙升至 125%～200%，内存使用量甚至超过 8 GB。由于 syspolicyd 是 macOS 中负责验证应用安全性的系统进程，它会检查用户打开的各种程序。如果该进程进入异常状态，即使 Codex 和相关辅助进程已经退出，整个系统依然可能持续受到影响。这一现象与 Reddit 用户描述的情况高度吻合：Codex 关闭后电脑仍然卡顿，只有重启才能恢复。报告者还确认，Codex 内置的“Computer Use”辅助程序本身已经完成正确签名和公证，这意味着问题可能出在应用反复启动或重新验证自身组件的方式上。据称，即使用户在配置文件中关闭相关功能，这种行为仍可能发生。目前尚未出现明确的 SSD 彻底损坏案例，但持续性的写入磨损确实存在，并且会不断累积。Mac 和 Linux 用户可以通过 smartctl-a/dev/ nvme0n1 命令（可通过 Homebrew 安装 smartmontools）查看 SSD 的累计写入量；Windows 用户则可以使用 CrystalDiskInfo 查看“Total Host Writes（总主机写入量）”数据。用户应升级到最新 Codex 版本，以获得 0.142.x 系列中的日志写入修复。如果发现写入量仍然异常，社区目前仍推荐一种临时解决方案：将 ~/.codex/logs_2.sqlite 符号链接到基于内存的存储路径，让大量日志写入不会直接触碰 SSD 闪存。在 OpenAI 解决 Codex 与 macOS syspolicyd 之间的兼容问题之前，如果用户遇到关闭 Codex 后系统仍然卡顿的情况，最有效的方法可能是直接退出应用并重启电脑，而不是继续等待异常的 Gatekeeper 进程自行恢复。截至目前，OpenAI 尚未针对这些最新反馈公开发表评论。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/146.htm", "publishedAt": "2026-07-20T09:08:45+00:00"}, {"title": "AI 热潮重塑美国就业市场格局：计算机专业失业率走高，数据中心电工年薪高达 28 万美元", "summary": "IT之家 7 月 20 日消息，如果全球众多分析师的判断没有出现严重偏差，那么这场持续升温的 AI 热潮几乎注定会像千禧年前后的互联网革命一样，重塑我们生活的方方面面。如今，这种变化也开始迅速影响就业市场。一场由 AI 推动的职业分化正在形成：有人迎来新的机遇，也有人面临更大的竞争压力。曾经被视为“黄金赛道”的计算机工程专业逐渐失去光环，而电工等技术工种则因 AI 基础设施建设迎来新的发展机会。根据纽约联邦储备银行（New York Fed）统计的劳动力市场数据，目前失业率最高的大学专业是人类学，达到 7.9%；紧随其后的是计算机工程专业，失业率为 7.8%。当然，人类学专业的就业市场低迷已经持续多年，而计算机工程专业直到不久前仍被认为是科技人才最理想的职业选择之一。不过，随着 AI 编程助手（AI Coding Agent）的快速普及，这一职业的发展前景正受到越来越大的冲击。与此同时，参与 AI 数据中心建设的电工收入却水涨船高。报道称，新入行、从事 AI 数据中心项目的电工，年收入最高可达 28 万美元（IT之家注：现汇率约合 189.9 万元人民币）。当然，这份工作并不轻松。想成为持证电工，通常需要经历 4 至 5 年的学徒培训，包括约 8000 小时的带薪现场实践以及 500 至 900 小时的课堂学习，才能获得正式执照。不过，在学徒期间，还可以进一步取得与数据中心相关的专业资格认证，例如中压供电系统、美国国家消防协会（NFPA）标准等专业技能，从而提升竞争力。相比之下，计算机工程从业者如今却面临越来越离谱的招聘要求。例如，雅虎（Yahoo）一则高级软件开发工程师招聘启事要求应聘者拥有“10 年以上 Claude Code 使用经验”，然而这款 AI 编程工具问世至今仅约 1 年时间。这或许只是招聘人员工作失误造成的个别案例，但它也反映出当前 AI 时代技术岗位招聘日益混乱、要求不断提高的现实。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/066.htm", "publishedAt": "2026-07-20T07:53:43+00:00"}, {"title": "当人人都有 AI，品味为什么更加重要？", "summary": "6 月，我们在上海的源创会，大家分享了很多 AI 相关的创新。 那场之后我们一直在想，代码正在变得越来越充裕，而品味依旧稀缺；工具正在变得越来越强大，而人与人之间真正的差异，似乎开始回到那些无法被复制的东西——品味、判断，以及你相信什么值得被创造。 所以，7 月 25 日，源创会到北京。 围绕主题 「Taste Drive...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/474841", "publishedAt": "2026-07-20T02:18:27+00:00"}, {"title": "AI 编码实战 | 0 行手写代码，2 天重构 2 万行 Vue 项目", "summary": "文章的核心观点是：AI 辅助开发的关键不在 AI 本身的能力，而在于人为 AI 建立的约束体系 —— 通过 Skills 技能包注入领域知识、AGENTS.md 沉淀项目规范、飞轮效应让错误只犯一次，将模糊目标转化为 AI 可精确执行的高质量指令，从提出需求到代码合入，甚至本篇分享也是 AI 生成。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/vivotech/blog/19722516", "publishedAt": "2026-07-16T08:52:00+00:00"}]}]};

const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
