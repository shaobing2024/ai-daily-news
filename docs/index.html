m \"Requirements and reference framework for data fabric system in multimedia\"（《多媒体数据编织系统要求与参考框架》）正式立项。IT之家注意到，随着数字经济与人工智能加速发展，数据资源呈现来源多样化、模态多样化、存储分布化和应用智能化等特征。文本、图像、音频、视频、三维内容、网络遥测数据、业务交互数据以及人工智能训练和推理数据广泛分布于本地系统、云平台、边缘节点、内容平台和合作伙伴环境中。传统以集中汇聚为主的数据管理方式，在跨系统数据发现、异构数据集成、语义统一、访问控制、数据治理和智能供数等方面面临新的挑战。数据编织（Data Fabric）作为“逻辑统一、物理分布”的新型数据管理架构，具有分布式、自动化和智能化的特征。其能够在数据不必全部集中迁移的情况下，实现对多源异构数据的统一发现、理解、访问、集成、治理和服务化供给。该标准拟系统规定多媒体数据编织系统的总体定位、基本概念、参与角色、功能要求、参考框架、功能组件及关键业务流程。该标准的立项有助于推动国际产业界形成对数据编织系统的统一认识，降低不同数据源、平台和服务之间的集成复杂度，提升多模态数据发现、访问、治理和供给效率。该标准将重点解决分布式数据发现、连接、语义管理、服务编排和治理控制等共性技术架构问题，为数据开发利用和人工智能高质量数据供给提供标准化支撑。同时，该标准的立项标志着中国信通院在数据领域标准化研究方面取得积极进展，进一步推动我国数据领域标准化研究在国际上的走深向实。下一步，中国信通院将联合各方推进数据领域标准化研究，推动标准成果与产业实践相结合，加强与有关国际标准化组织的协同，夯实我国在国际标准化工作中的影响力。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/366.htm", "publishedAt": "2026-07-24T11:52:56+00:00"}, {"title": "菲尔兹奖得主邓煜谈 AI：已能帮助数学证明，但不能替代独立思考", "summary": "7 月 24 日，2026 年菲尔兹奖得主、芝加哥大学教授邓煜近日在接受采访时透露，他在数学研究中会使用 AI 辅助工具，GPT 曾帮助解决一个连续几天未能突破的数学特例。邓煜表示，他使用 AI 的感受是“已经让很多研究环节方便了不少”。对于一些基本确定为真的简单结论，他会让 AI 给出证明后再进行检查；AI 有时也能补充他不知道的知识，例如某个组合计数问题所对应的已有结构或标准结论。邓煜透露，在近期一项工作中，有一个主要命题的特殊情形，他连续几天没有解决，GPT 给出了一个非常简单的证明，很快处理了那个特例。虽然该证明无法推广到一般情形，未写入最终论文，但提供了有价值的思路。邓煜表示，AI 即使不能直接完成最终证明，也可能帮助研究者迅速探索局部路线。他期待未来出现一种更成熟的协作方式：人类研究者负责总体框架和核心思路，AI 帮助完成部分技术性推导。但他也强调，对刚进入科研的学生而言，使用时仍要保持判断力，“不能因为 AI 给出了一段看似完整的论证，就跳过独立判断和严格核验这些必要的步骤”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/356.htm", "publishedAt": "2026-07-24T10:38:38+00:00"}, {"title": "亚马逊升级 Alexa+ AI 助手，可完成购物、餐厅预订、叫车等任务", "summary": "IT之家 7 月 24 日消息，亚马逊官方今日宣布升级 Alexa+ AI 助手，Alexa+ 支持自然对话、信息记忆和任务执行，可帮助用户管理日程、总结邮件、生成播客、控制智能家居，并完成购物、餐厅预订、叫车等日常任务。Alexa+ 已从单纯的语音助手升级为一个具备多模态能力（视觉识别、生成式 AI 创作）、超强记忆力，并打通了众多第三方现实服务接口（打车、订餐、家政、票务）的全方位人工智能生活助理。官方表示，只需唤醒一次，即可与 Alexa+ 就像和朋友一样进行多轮自然对话，涵盖几乎任何话题。亚马逊与美联社、路透社等 200 多家顶级新闻机构合作，Alexa+ 可提供实时的个性化新闻摘要。此外，用户无需动手，可直接通过语音叫 Uber（可在屏幕上显示车费和等待时间）、在 OpenTable 预订餐厅，或在 Grubhub 语音点外卖，并随时调整订单。IT之家获悉，Alexa+ 可以记住用户偏好，并在 Echo 音箱、手机 App、车载设备和网页端之间无缝同步对话上下文，同时整合购物、音乐、FireTV 等生态服务，提供个性化推荐和 AI 辅助购物体验。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/338.htm", "publishedAt": "2026-07-24T10:16:28+00:00"}, {"title": "ServiceNow 首席执行官：我家平台设有终止开关，AI 模型不会失控越狱", "summary": "IT之家 7 月 24 日消息，SaaS（软件即服务）企业 ServiceNow 首席执行官 Bill McDermott 表示，该企业的平台设有终止开关，可以阻止失控的 AI 智能体，因此不会发生类似 OpenAI 内部模型逃逸容器并攻击 Hugging Face 基础设施情况；客户使用 ServiceNow 服务时也不会出现此类问题。Bill McDermott 认为人工智能的快速普及正在增强 ServiceNow 的竞争地位，其控制系统为客户一个集中监控、管理、保护日新月异 AI 智能体的平台，帮助客户“从 AI 混乱走向 AI 纪律”。这位首席执行官并不赞同人工智能会对该企业的盈利前景带来负面影响的观点：随着人工智能的普及，对 ServiceNow 软件的需求也将提升。他正看到合同期限的进一步延长。ServiceNow 在 2026Q2 季度实现 38.77 亿美元订阅收入，同比增长 24.5%；剩余履约义务 132 亿美元，同比增长 21%；达成 123 笔价值超过 100 万美元的新合同。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/328.htm", "publishedAt": "2026-07-24T09:48:24+00:00"}, {"title": "Token 调用量涨 6 倍！华为：运力成 AI 算力最大瓶颈，不该执着单芯片制程", "summary": "7 月 24 日下午消息，近日，华为中国政企互联网系统部举办互联网行业媒体沟通会，系统阐述了互联网 AI 算力产业痛点、算存网一体化底座技术方案、昇腾开源生态建设、分层算力落地路径及长期产业生态布局。当前，AI 大模型正式从技术验证阶段迈入规模化商用新阶段，AI Agent 已然成为互联网业务核心增长引擎。但行业智能化升级仍深陷多重困境，底层算力支撑不足、跨场景适配成本高昂、技术开发门槛偏高等难题，持续制约产业智能化转型速度与落地效率。在与新浪科技等媒体沟通中，华为中国政企互联网行业总经理黄健坦言，相较于电器时代循序渐进、适配性较强的产业迭代节奏，当下 AI 领域 Token 用量的爆发式增长，已经远超社会与行业的适配速度，催生了各行业普遍的 AI 转型焦虑。“预计 2027 年至 2030 年间，token 经济将全面影响所有作业行为及工作框架，短短三年内消化如此巨大的转变，给整个行业带来了巨大压力与挑战。”黄健直言。他援引机构数据表示：过去半年内，token 消耗量增长了 6 倍，模型调用次数增加了约 50 至 100 倍。这一增长趋势必将拉动算力服务、数据存储、网络服务等上下游配套需求的上升。在黄健看来，“在算力、存力和运力三者中，运力是目前最突出的瓶颈，与其执着于单芯片制程，不如通过网算存协同一体化将‘高速公路修得更宽’。”据他介绍，“华为已将 NPO 带宽提升八倍以上，Token 产生效率提升五倍。”他进一步介绍道，大模型训练和推理对通信时延与集群互联要求急剧上升，华为依托星河 AI 数据中心网络和昇腾超节点，从硬件、软件、调度、生态四层协同，大幅降低了分布式通信损耗，并通过弹性调度适配业务波峰波谷和多并发场景。回到互联网行业，针对这一行业高并发、高稳定的特殊需求，黄健介绍了华为搭建的三层专属服务体系，覆盖不同规模企业全生命周期交付运维。针对头部互联网大厂，搭建专属服务团队，配备百余人研发与行业复合型工程师，提供贴身管家式服务；面向中小互联网企业，联合生态伙伴提供标准化服务，涵盖前期算力架构规划、网络优化部署，日常 7×24 小时远程和现场运维，同时持续提供开源框架适配、版本迭代配套等服务。据悉，面向互联网与云厂商的等高要求客户群体，华为不仅可提供昇腾超节点技术、灵渠、高可靠等产品，更投入几千人在主流开源软件适配，进行联合创新，支撑好模型进而支撑好业务使用；同时与业界主流开源社区协同，参与开源社区的贡献、治理、路标规划等，并将优质特性上传社区，为开发者提供高效、高品质的算力底座与易用开发工具，大幅降低大模型训推、迁移落地门槛，通过这些努力，华为有信心支撑互联网或大模型厂商的发展。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/320.htm", "publishedAt": "2026-07-24T09:28:19+00:00"}, {"title": "我国成功发射两颗 AI 卫星：一颗能自己管自己，一颗在天上做气象预报", "summary": "IT之家 7 月 24 日消息，力箭一号遥十五运载火箭今日在东风商业航天创新试验区成功发射，以“一箭 5 星”方式将 5 颗卫星送入预定轨道。据央视新闻报道，吉天星 A-04 星是今天成功发射的一颗卫星，它也叫“云尖沐曦号”，这是一颗以人工智能为基本属性的卫星，运行靠 AI 驱动，并采用 AI 设计。这颗卫星主要搭载红外传感器，用于林火等地面异常监测。但它最特别的地方不在于拍什么，而在于它怎么工作。这颗卫星搭载了之江实验室自研的具身智能模型，能“自己管理自己”。不管是卫星自身健康状态的监测，还是单星甚至多星星上任务的自主规划与执行，都能通过该模型在轨自主完成。传统卫星的控制和运行、任务调度，全都要靠人在地面编好指令，然后通过地面站发给卫星，卫星来执行一系列工作。现在人只需要向模型提出需求，它就会自动工作。但真正让这颗卫星更聪明的是，它可以实时上注 AI 大模型。中国工程院院士、之江实验室主任王坚表示：传统卫星制造就是卫星在地面制造完以后，所有东西都固化好了，到天上就是用而已。人工智能模型发展太快了，我们这个模型不是在卫星在地面的时候就把它放上去了，我们是从地面把模型实时上注到天上去，所以我们今天训好的模型，明天就能送到太空去。此外，这颗卫星的部分结构也是由 AI 模型生成的，并使用 3D 打印一体制造，比传统设计组件更少，整体更加轻量化。同样搭载 AI 大模型的还有另一颗卫星 —— 西光贰号 03 星，它也叫“星火传明气象卫星”，这颗卫星搭载了三个 AI 气象模型，任务是变革天气预报的生成方式。传统气象卫星预报天气的流程，是卫星在天上记录下数据后，经过 90 分钟时间传回地面，地面再经过解析、修正，最终发布，时效性相对较低，数据更新较慢，日常预报完全够用，但遇到短时暴雨、大风这样的突发天气，就心有余而力不足了，这种短临预报对时效性要求极高。这颗卫星搭载了三个 AI 模型，每个模型都打通了从数据接收、融合处理到预报生成、产品下传的端到端全链路。卫星在星上直接产出预报结果，只下传轻量化的结论 —— 从观测到预警，实现分钟级响应，未来台风路径预判、城市内涝预警、电网防灾调度，都可能因为星上 AI 预报而变得更准、更快。刚才我们提到的这两颗卫星，都是我国正在建设的三体计算星座创新生态的一员。这两颗卫星，一颗自己管自己，一颗在天上做气象预报。它们的能力指向同一个方向 —— 把人工智能从地面搬到太空。IT之家从报道获悉，三体计算星座是之江实验室发起，全球合作伙伴共同建设的千星规模太空计算基础设施。核心思路是把成百上千颗卫星连成一张网，让“天上的事情在天上干”。按照规划，到 2027 年，三体计算星座将达到 100 颗卫星，到 2032 年将达到 1000 颗。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/300.htm", "publishedAt": "2026-07-24T09:19:08+00:00"}, {"title": "对话腾讯副总裁林松涛：意图正在代替入口，Agent 需要一颗「小脑」", "summary": "大模型是「大脑」，Marvis 想补上「小脑」#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1673039?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-24T07:43:20+00:00"}, {"title": "中科宇航：力箭一号圆满完成“一箭 5 星”任务，开启下半年逐月常态化发射", "summary": "IT之家 7 月 24 日消息，中科宇航今日宣布，7 月 24 日 07 时 33 分，中科宇航力箭一号遥十五运载火箭在东风商业航天创新试验区发射，采用“一箭 5 星”的方式，将“辰光一号卫星”等 5 颗卫星精准送入预定轨道，发射任务取得圆满成功，开启下半年逐月常态化发射，形成可靠高效的密集发射能力。据介绍，此次任务力箭一号遥十五运载火箭共同为 5 家客户提供拼车发射服务，依托成熟稳定的一箭多星布局与精准分离技术，实现多星共轨搭载、共享发射运力。力箭一号运载火箭构建专车、拼车、顺风车发射服务体系，全方位适配微小卫星差异化、定制化入轨需求，迄今力箭一号已累计服务国内外客户超 30 家，其中国际客户 6 家，成功发射低成本商业光学遥感、高分辨率光学遥感、X-SAR 遥感、量子通信、太空制造、空间环境探测、气象探测、太空算力、空间态势感知、地磁场探测等超 10 类卫星应用载荷。辰光一号卫星用户为北京轨道辰光科技有限公司，由该公司总体设计，卫星主要验证太空数据中心新型空间能源、散热技术，搭载商用算力服务器和小型遥感相机，在轨进行星上计算关键核心技术试验，兼顾提供在轨试应用服务及对地观测成像。甘德一号 01 星是梁溪空天科技集团与遨天科技 (北京) 有限公司合作共建的 LX630 星座系统首发星，也是国内首颗商业空间碎片监测专用卫星。卫星配置 1 台宽视场普查相机和 1 台高分精测相机，可实现对微小空间碎片的有效探测，支撑建立并动态更新微小空间碎片编目库。卫星兼具大视场高时效和高灵敏高分辨观测能力，星载 AI 计算机部署星象提取和关联定位智能算法，通过整星自主任务规划实现常态巡查、应急响应、快速跟踪等多样化任务需求。同时，首发星配置多款新型推进系统，具备在轨大范围灵活轨道调整能力，支持开展多轨道观测试验、碎片抵近等多模式试验任务。西光贰号 03 星是星火传明 (北京) 技术有限公司研制的三波段高分辨率红外智能遥感卫星，搭载有长波、中波、短波高分辨率红外载荷和大幅宽中波红外遥感载荷 (核心中长波大阵列红外探测组件由中航凯迈 (上海) 红外科技有限公司研制)，搭载有智能 AI 计算载荷并在轨部署多个星载智能大模型，主要任务是提供高分辨率红外视频数据及执行星上智能计算工作，主要应用在态势安全、应急、航运航空、电网防灾、精细化气象等方面。吉天星 A-04 星是由之江实验室联合云尖信息、沐曦股份、巡天千河、浙大城市学院等合作单位共同研制的智能计算卫星，该卫星实现了从设计制造到卫星运行、管控的全链路智能。卫星部署具身智能模型，能自主管理健康状态，独立完成任务规划、指令生成及在轨数据处理。卫星还搭载了基于沐曦 GPU 芯片的智算载荷，以及星载路由器和激光通信机，作为国产算力行业的领军企业，沐曦股份通过与云尖信息等产业链合作伙伴紧密协作，助力三体计算星座实现“算力上天、卫星互联和模型上天”。应龙风光一号卫星是由上海巡天千河空间技术有限公司研制的商业气象卫星，用户是江苏应龙卫星科技有限公司，主要搭载微波温湿度计和红外相机载荷，具备大气温湿度垂直廓线探测、地表高温目标识别成像和地表温度变化监测能力，可服务于气象预报、灾害预警、资源环境监测和新能源发电功率预测等应用，为光伏、风电等新能源发电气象条件分析及风光发电功率预测提供气象遥感数据支撑。此次任务是力箭一号运载火箭的第 15 次飞行，也是力箭系列运载火箭第 16 次发射。截至目前，力箭一号运载火箭已成功将 110 颗卫星送入太空，入轨载荷总质量超 16 吨，是国内唯一实现发射卫星总数超百颗的民商火箭型号。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/173.htm", "publishedAt": "2026-07-24T07:35:19+00:00"}, {"title": "200 家硅谷初创联名反对白宫政府封禁中国开源 AI 模型", "summary": "\"这对 Anthropic 来说太好了，因为我们所有人都不得不花钱买 Anthropic 的服务。\" 7 月 22 日，近 200 家硅谷初创企业联名致信白宫，呼吁不要切断美国开发者获取中国开源 AI 模型的渠道。Particle 创始人 Suhail Doshi 在接受 POLITICO 采访时把话说得最直白：\"将会有数百家公司瞬间死掉。\" 这封信来自一个刚刚成立的叫\"...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/478417", "publishedAt": "2026-07-24T06:39:45+00:00"}, {"title": "德国黑森林实验室发布 Flux3 多模态模型", "summary": "德国人工智能初创公司黑森林实验室（Black Forest Labs）正式发布多模态基础模型 Flux3。该模型基于Self-Flow架构打造，配备专用的图像、视频、音频及动作编解码器，实现了对物理与数字环境的统一理解与生成。 作为首款支持原生音频生成的模型，Flux3可一次性输出长达20秒的音视频同步片段，并涵盖文本/图像/视频 const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
