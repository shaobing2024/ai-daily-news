预计，这一效率提升未来几年有望进一步扩大至 50%。他还表示，公司目前一款处于临床早期开发阶段的镰状细胞病实验性疗法，如果没有 AI 辅助研究，很可能根本不会被发现。百时美施贵宝首席数字与技术官 Greg Meyers 表示，此次投资的一个重要原因，是随着公司在研发体系中部署越来越大的 AI 模型，对算力的需求正在快速增长。目前，公司已经在所有小分子药物项目以及绝大多数大分子药物研发项目中应用 AI 技术。Meyers 还表示，新一代系统在能效方面也更加出色，他说：“运行这些系统需要支付电费。可以把它理解为，每消耗同样一瓦电力，就能获得大约 10 倍的计算能力…… 而电价并不会越来越便宜。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/611.htm", "publishedAt": "2026-07-21T07:50:05+00:00"}, {"title": "全新迈巴赫 GLS 首秀：中国版支持车位到车位辅助驾驶，还能“读心”", "summary": "IT之家 7 月 21 日消息，在旗舰三排座 GLS SUV 升级后，奔驰今天（21 日）正式发布了豪华定位更高的新款迈巴赫 GLS 680。新车将于今年晚些时候上市，主要变化包括重新设计的外观、更强的 V8 发动机和全面升级的座舱。动力系统换装最新的 M1770 Evo 4.0 升 V8 双涡轮增压发动机，最大功率为 450 千瓦，峰值扭矩达到 850 牛 · 米，分别比上一代车型提高 40 千瓦和 121 牛 · 米。新车还搭载了第二代启动发电机，为 V8 发动机提供电气化辅助。新车的转向系统经过重新调校，标配 AIRMATIC 空气悬挂，可选新款 E-ACTIVE BODY CONTROL 智能主动魔术车身控制系统。该系统可分别调节弹簧和减振器的作用力，主动抑制侧倾、俯仰及车身上下起伏。外观升级集中在全新前脸。进气格栅外围加入发光边框，首次采用可点亮的迈巴赫格栅徽标与车头三叉星立标。标配 22 英寸轮毂采用 20 孔造型，另有 23 英寸锻造轮毂可选。选装轮毂内置精密滚珠轴承机构，无论车轮如何转动，中央三叉星徽标都能保持昂然正立。车内配备由三块显示屏组成的 MBUX 超级屏，内置最新一代信息娱乐软件。此外，新车还带来了玫瑰金色仪表界面、带氛围照明的外侧空调出风口，前两排乘客还能获得效果更好的座椅按摩功能，可延展至小腿区域。新车还标配升级版 Burmester 3D 环绕立体声音响系统和杜比全景声，扬声器数量由 13 只增加至 15 只，放大器输出功率提高到 710 瓦。IT之家获悉，新车搭载奔驰自研 MB.OS 架构，深度融合 AI 技术，搭载中国团队主导研发的全新高端后排娱乐系统，应用端侧多模态 VLM 大模型，化身主动服务的“读心”管家，无需唤醒即可“察言观色”。此外，全新城区及高速领航辅助驾驶系统将在中国实现“车位到车位”的智能出行体验。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/585.htm", "publishedAt": "2026-07-21T07:30:37+00:00"}, {"title": "Unity 7 引擎发布：可无缝继承 Unity 6 项目，早期 Beta 测试今年 12 月启动", "summary": "IT之家 7 月 21 日消息，Unity Technologies 公司今天在韩国首尔推出 Unity 7 引擎，新品将于今年 12 月开启早期 Beta 测试，并计划 2027 年第一季度正式发布。据官方介绍，Unity 7 主打“无破坏性变更”，直接继承 Unity 6 的架构。开发者从 Unity 6 迁移至 Unity 7 时无需重构项目、不必学习新的编程语言，也不需要担忧升级过程中出现兼容性问题。性能方面，Unity 7 引擎基于 CoreCLR 实现更高的运行效率，使 Play Mode 几乎可以瞬时启动。新版本引入仅针对已修改代码执行的 Domain Reload（IT之家注：域重载）机制，着色器编译速度最高可提升 90%。同时，Unity 7 进一步升级了渲染技术，引入全局光照方案 Surface Cache GI 等新技术，可在各大平台呈现更真实的光照效果和视觉表现。Unity 7 还通过全新 CLI 和公开 API，打造更加开放、便于协作的开发生态。开发者可借助免费提供的 MCP（模型上下文协议），将代码智能体接入 Unity。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/576.htm", "publishedAt": "2026-07-21T07:25:41+00:00"}, {"title": "Kimi K3 到底有多强？国产模型超越 Claude Fable 5，半天实战编码测评", "summary": "JeecgBoot AI 专题研究 | Kimi K3 编程能力深度实测：复杂前后端改造任务实战复盘 这两天 AI 编程圈有点疯狂，Kimi K3 的表现开始频繁引起关注。带着好奇，我没有去看参数对比，而是直接把它丢进真实开发场景中进行压力测试：一个涉及复杂前后端改造的实际任务。经过一个下午的深度体验，结果有些超出预期 —— 它不仅完...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475974", "publishedAt": "2026-07-21T07:16:01+00:00"}, {"title": "全球首款机器人手机：荣耀 Robot Phone 首日预约量超荣耀历代旗舰产品", "summary": "IT之家 7 月 21 日消息，荣耀手机官方今日宣布，全球首款机器人手机 —— 荣耀 Robot Phone 首日预约量超荣耀历代旗舰产品。据IT之家此前报道，荣耀 Robot Phone 已正式开启预约，该机搭载第五代骁龙 8 至尊版芯片，其核心创新在于机身顶部集成了一套行业最小的四自由度（4DoF）钛合金机械云台系统。云台系统配备微型电机，体积比主流方案缩小 70%。消息称，该机 200Mp 云台影像是基础，核心机构件、电机、模组全部是荣耀自研和独立定制，整套云台及翻转机构新增了近 100 个零部件。而在内存涨价的大背景下，行业预测 1TB 版本的价格要到 15999 元左右。该机预计会在今年 8 月发布，并将首发荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 的内核（AgenticOS 尝鲜版将由荣耀 Magic9 系列手机发布）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/555.htm", "publishedAt": "2026-07-21T07:07:46+00:00"}, {"title": "月之暗面：用户需求远超预期，正通过模型效能优化、算力补充缓解资源压力", "summary": "IT之家 7 月 21 日消息，据《科创板日报》报道，今日，月之暗面（Moonshot AI）B 端企业业务负责人黄震昕透露，K3 上线后用户需求远超此前的预期，出现全平台资源紧张、新用户注册受限的情况，团队已做足前期准备仍未匹配需求。团队明确优先保障付费老用户的使用体验，暂不全面放开新用户注册，不通过牺牲老用户体验换取短期用户规模增长。当前正通过模型效能优化、算力补充的方式逐步缓解资源压力，具体恢复时间将根据资源储备情况另行通知。月之暗面于 7 月 16 日推出了 Kimi K3 模型，是 Kimi 迄今能力最强的模型，拥有 2.8 万亿参数，100 万 Tokens 上下文，主要面向长程编程与端到端知识工作。IT之家注意到，月之暗面 Kimi 于 7 月 19 日发布公告，为了保障已有订阅用户的体验，决定即日起，暂停 C 端新用户订阅，将已有算力全部投入于服务已订阅用户，保障已订阅用户的全部权益不受影响。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/536.htm", "publishedAt": "2026-07-21T07:00:42+00:00"}, {"title": "谷歌 DeepMind 发布 GenCeption：基于阿里 Wan2.1，打破计算机视觉桎梏", "summary": "IT之家 7 月 21 日消息，科技媒体 The Decoder 昨日（7 月 20 日）发布博文，报道称谷歌 DeepMind 发布 GenCeption 模型，将预训练的视频生成器重新用于深度估计和分割等经典计算机视觉任务。IT之家援引博文介绍，大语言模型在学习预测下一个 Token 的时候，在训练过程中往往需要吸收语法、世界知识和上下文关系等内容。但是在计算机视觉领域，视觉模型缺少等效的训练方法，主要由专业模型主导，包括用于分割的“Segment Anything”和用于深度估计的“Depth Anything”，每个模型都使用其特定的架构。谷歌 DeepMind 团队为此提出 GenCeption 模型方案，尝试将一个“生成视频”的 AI 模型逆向改造成一个能“理解世界”的视觉分析引擎。GenCeption 打破了传统计算机视觉“一个任务一个专用模型”的格局，仅凭单一模型就能同时做好深度估计、图像分割、3D 姿态估计、表面法线预测和相机姿态估计等核心视觉任务。GenCeption 基于阿里巴巴开源视频模型通义万相 Wan2.1 系列训练，与传统扩散模型需多步去噪不同，GenCeption 在一次前向传播中完成预测，从而提升视觉任务处理速度。模型通过文本提示指定任务，可输出深度图、表面法线图、分割掩码，并可处理相机运动表示。训练数据以合成为主。论文称，数据集仅包含 7500 段视频，由 800 个数字人体模型与 200 段动作捕捉序列组合生成，再通过 Blender 在不同背景和镜头角度下渲染。泛化方面，GenCeption 几乎只在单人合成视频上训练，但可处理真实多人视频，也可迁移到动物和类人机器人类别。论文称，部分输出细节甚至超过训练时 Blender 渲染结果，可保留猫胡须和单根发丝边缘。性能方面，论文给出两组处理时间数据：小模型处理 81 帧视频约需 6 秒；大模型参数量为 140 亿，处理同样长度视频约需 10 秒。参考Video Generation Models are General-Purpose Vision Learners", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/535.htm", "publishedAt": "2026-07-21T07:00:10+00:00"}, {"title": "Fable 5 比开源模型贵三倍，Anthropic 的账怎么算？", "summary": "同一周，两个中国模型追平了 Anthropic 的 Fable 5。Moonshot 的 Kimi K3 在 7 月 16 日发布，阿里巴巴的 Qwen 3.8 在 7 月 19 日宣布。两个都会开源权重。 但 Wojciech Gryc 不打算聊技术对比。 他在 Emerging Trajectories 上发的这篇分析，做了一件事：把几家 AI 公司的账本拆开看。结论对 Anthropic 不太友好。 训练...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475956", "publishedAt": "2026-07-21T06:58:38+00:00"}, {"title": "阿里千问发布 Qwen-Image-3.0 图像生成基础模型：落字成画，字字如印", "summary": "IT之家 7 月 21 日消息，阿里发布最新图像生成基础模型 Qwen-Image-3.0。新模型支持最大 4.5k token 超长输入，可一次生成涵盖公式符号、几何图形、逻辑推导步骤等多元素融合的知识图解、复杂 UI 界面，同时支持 12 国语言和 20 多款字体原生渲染，字字清晰，大幅降低多语言产品海报、影视 / 漫画分镜等“可读可用”商业素材的生产成本。IT之家附官方详细介绍如下：AI 图像生成模型的进步有目共睹 —— 画面越来越精致，风格越来越多元。但当需求从 \" 生成一张好看的图 \" 转向 \" 完成一项实际工作 \" 时，局限随之显现：模型能生成一张惊艳的写实人像，却难以渲染一份排版精确的数学试卷、一页公式复杂的学术论文，或是去修复破损的古画。一张图，能不能从 \" 好看 \" 真正走向 \" 好用 \"？今天，给出我们的答案。我们正式推出 Qwen-Image-3.0，Qwen-Image 系列的第三代图像生成基础模型。如果说 Qwen-Image-1.0 的关键词是 \" 准 \"，Qwen-Image-2.0 的关键词是 \" 准多齐美真 \"，那么 Qwen-Image-3.0 的核心主线只有一个字 ——\" 实 \"。这个 \" 实 \" 体现在三个维度：内容丰实：支持最大 4.5k token 输入，轻松生成报纸、分镜、试卷等复杂版面。细节真实：支持 10px 小字精准渲染，毛孔、发丝细节生动还原，逼真的微观级刻画。知识厚实：支持 12 国语言原生渲染，主流网页、游戏、直播等界面仿真，拥有丰富的世界知识。一言以蔽之，Qwen-Image-3.0 不只是在追求 \" 好看 \"，更在追求“好用”—— 让图像生成真正成为可落地的生产力工具。现在，阿里云百炼、千问 AI 平台已开通 API 邀测，Qwen Studio 和千问 APP 也即将上线供免费体验。内容丰实：能画多复杂？内容可横展：知识九宫格这是一张由 Qwen-Image-3.0 准确渲染的数学 PPT，包括空间关系、数学符号、定理描述等等这些丰富的视觉内容，有着合理的排版和相对位置关系。而这只是 Qwen-Image-3.0 真实能力的“1/9”，因为这张图事实上只是 Qwen-Image-3.0 生成的一个复杂 9 宫格图片中的一个格子。让我们看原图：上面整张图是 Qwen-Image-3.0 一次性生成的，而非多个图片拼接而成。这张图片难度在于，每个格子都是一张复杂信息图，如果要精准的描述完整的九宫格，整整需要 3.7k 个 token。这 3.7k token 需要完整的刻画隧道安全漫画、空间几何教学、《出师表》文体分析、物理抛体运动、生物寄生虫科普、右胸疼痛医学图解、群论 Sylow 定理、银行内控管理信息图、以及细胞 DNA 结构对比 —— 每一格都包含精确的中英文文字、公式、图表和漫画人物等等。而这对于 Qwen-Image-3.0 来说依然轻松，因为 Qwen-Image-3.0 将可接受的指令长度提升至 4.5k token，这意味着模型可以理解和渲染极其复杂、信息密集的视觉版面。这就是 Qwen-Image-3.0\" 内容丰实 \" 的一个重要特点：内容可横展（横向扩展）。横展能力反映了模型语义并置与空间控制的实力 —— 能够让多种概念在同一画面中有序布局、互不干扰地渲染。内容有纵深：界面嵌套横展能力考验的是 \" 在一张画布上摆放多少个并列元素 \"，纵深能力则考验模型的语义解构与逻辑嵌套 —— 能否在一幅图中层层递进地渲染多个嵌套的界面。以下示例用一条指令在一幅图中从外到内依次展示了：VSCode 编程界面 → 千问聊天界面 → 社交媒体聊天界面 → 手冲咖啡海报。每一层都保持了各自 UI 的真实风格与细节，形成了 \" 画中画中画 \" 的视觉纵深。细节真实：能画多逼真？如果说 \" 内容丰实 \" 解决的是 \" 画多少 \" 的问题，那么 \" 细节真实 \" 解决的是 \" 画多细 \" 的问题。Qwen-Image-3.0 在微观细节上的渲染精度达到了新的高度：10px 小字清晰可辨，毛孔与发丝纤毫毕现，肌肤质感逼近摄影级真实。鲸鲨的知识图解这是一张关于鲸鲨的知识图解，包含大量的文字和插图，而 Qwen-Image-3.0 能够准确渲染每个区域。学术论文 PDF学术论文是小字渲染的极限测试场，模型完整渲染了一整页代数几何领域的学术论文，包含多行复杂公式推导。上标、下标、花括号、分数线、多行对齐等 LaTeX 排版元素均准确呈现，小字号下依然保持了极高的可读性。笔记批注模型在书页上叠加了逼真的红色手写批注 —— 下划线、波浪线、圈画、箭头和简短评语，字迹自然流畅，完美模拟了高中生课堂笔记的风格。人像摄影在人像摄影中，模型也能够刻画非常细腻的纹理。物体纹理除人像之外，模型也能刻画其他物体的纹理细节。古画修复给定一幅破损或不完整的传统绘画，模型能够修复缺失的部分，同时保持原有的艺术风格和笔触。模型以与原画一致的笔法完成了鹰搏图的修复，保持了水墨渐变、羽毛质感和构图平衡，同时去除了霉斑和破损痕迹。知识厚实：理解的知识边界有多广？\" 内容丰实 \" 回答了 \" 能画多复杂 \"，\" 细节真实 \" 回答了 \" 能画多逼真 \"，而 \" 知识厚实 \" 回答的是 \" 能画多广 \"。Qwen-Image-3.0 拥有覆盖 12 国语言、多种字体、100+ 艺术风格和多种 UI 界面的渲染能力，其背后是模型对世界知识的深度理解。西班牙语渲染仿真 UI 界面复杂信息图模型结合强大的世界知识，基于真实图像生成一个复杂的信息图。模型在保留原始昆虫照片主体的同时，添加了分类学信息、形态标注、放大细节视图和比例尺等专业元素，生成了一张可以直接用于学术发表的研究配图。总结Qwen-Image-3.0 以 \" 内容丰实、细节真实、知识厚实 \" 三大特色为支撑，在多语言产品海报、复杂 UI 界面等高价值生产力场景中取得了显著突破。我们相信，随着图像生成模型能力的持续提升，它将在设计、内容创作、教育、电商等更多领域中释放出真正的生产力价值。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/530.htm", "publishedAt": "2026-07-21T06:56:42+00:00"}, {"title": "月之暗面：B 端收入七成来自 API 调用，已形成可持续的正向循环", "summary": "IT之家 7 月 21 日消息，据《科创板日报》报道，今日，月之暗面（Moonshot AI）B 端企业业务负责人黄震昕透露，公司即将上线 Kimi Hosted Agent 平台，面向 ToB 客户开放沙箱与 Harness 能力，打造标准化的企业级能力输出接口。据介绍，该平台提供 PPT 生成、投研系统搭建等标准化 API，支持客户自定义输出风格，可直接嵌入企业内部办公系统使用。黄震昕还表示，当前 B 端收入中，API 调用业务占比达到 70%，整体商业化路径清晰，已形成可持续的正向循环。月之暗面于 7 月 16 日上线推出 Kimi K3 模型，是 Kimi 迄今能力最强的模型，拥有 2.8 万亿参数，100 万 Tokens 上下文，主要面向长程编程与端到端知识工作。IT之家注意到，月之暗面 Kimi 于 7 月 19 日发布公告，为了保障已有订阅用户的体验，决定即日起，暂停 C 端新用户订阅，将已有算力全部投入于服务已订阅用户，保障已订阅用户的全部权益不受影响。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/527.htm", "publishedAt": "2026-07-21T06:51:30+00:00"}, {"title": "OpenAI：若青少年因使用 ChatGPT 网暴他人而被封号，系统将告知家长", "summary": "IT之家 7 月 21 日消息，据外媒 Engadget 当地时间 18 日报道，OpenAI 将进一步扩大 ChatGPT 家长通知功能。若青少年因违反暴力威胁或网络暴力行为政策而被封号，已完成账号关联的父母和监护人将收到提醒。OpenAI 去年推出家长控制功能，允许父母关联未成年子女的 ChatGPT 账号，设定禁用时段、减少敏感内容，并在系统发现子女可能有自残倾向时收到警示。通知范围扩大后，系统发现青少年可能危害他人时，也会提醒家长。OpenAI 公布的界面示例显示，家长会先收到一则有关子女账号“重要更新”的通知。点击“了解更多”后，页面将说明账号因违反“暴力行为”使用政策而被停用。新功能由 OpenAI 与网络暴力监测和应对机构 Moonshot 共同开发。Moonshot 创始人维迪娅 · 拉马林甘表示：“出现严重风险时及时通知父母，并让他们进一步了解情况，是帮助家庭尽早介入和寻求援助的关键第一步。要让年轻人更安全地使用 ChatGPT，未来还需要配合更多保护措施。”2025 年加拿大不列颠哥伦比亚省坦布勒岭发生大规模枪击案，调查发现嫌疑人曾使用 ChatGPT，OpenAI 随后承诺强化安全机制。有报道称，OpenAI 虽然封禁了枪手的账号，却没有向执法部门发出警报，加拿大当局因此传唤 OpenAI，CEO 奥尔特曼之后也为疏漏道歉。OpenAI 还在家长控制页面加入“学习模式”开关。开启后，ChatGPT 不会立即给出完整答案，而会先提供提示，引导学生思考和学习。青少年若长时间使用 ChatGPT，也会更频繁地看到休息提醒，以便养成更健康的数字设备使用习惯。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/520.htm", "publishedAt": "2026-07-21T06:40:54+00:00"}, {"title": "Gartner：全球 AI 模型与平台市场 2026 年规模将达 640 亿美元", "summary": "Gartner 最新预测指出，全球终端用户在人工智能模型和平台上的支出将迎来爆发式增长。预计到 2026 年，该领域的市场规模将达到640. 52 亿美元，相比去年大幅增长63.4%。 在各项细分支出中，生成式AI模型的投资增速尤为强劲，其增幅高达117%。与此同时，企业对AI平台的支出也在持续扩大，预计将实现36.9%的稳健增长。 随着...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475932", "publishedAt": "2026-07-21T06:22:40+00:00"}, {"title": "Sakana AI 推出网络安全模型 Fugu Cyber：领域基准测试表现优于 GPT-5.5-Cyber", "summary": "IT之家 7 月 21 日消息，日本人工智能初创企业 Sakana AI 当地时间今日发布了其专为应对现代网络防御的复杂性而打造的 Fugu Cyber 模型。这一模型在业界最具挑战性的安全基准测试中均取得了卓越的性能：CyberGym 成功率达 86.9%、CTI-REALM 测试成功率达 72.1%，表现甚至优于 OpenAI GPT-5.5-Cyber 和 Anthropic Claude Mythos-Preview。与标准 Fugu 类似，Fugu Cyber 是一个封装为单一 API 的多智能体系统，系统可针对用户请求动态编排专业智能体以处理复杂的多步骤任务。除简单的 API 外，Sakana AI 还提供由其应用企业团队支持的人工智能驱动网络安全解决方案实地部署服务。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/495.htm", "publishedAt": "2026-07-21T06:19:53+00:00"}, {"title": "用字节 Seedance 2.0 生成，《第九区》导演发布其首部 AI 短片《阴兵》", "summary": "IT之家 7 月 21 日消息，科技媒体 The Decoder 今天（7 月 21 日）发布博文，报道称曾执导《第九区》的导演尼尔 · 布洛姆坎普（Neill Blomkamp）发布其首部 AI 短片《阴兵》（Nightborne）。 该短片时长约为 13 分钟，完全由 AI 生成，使用字节跳动的 Seedance 2.0 模型生成，布洛姆坎普通过文本提示逐帧执导。IT之家查询公开资料，南非导演尼尔 · &nbsp;布洛姆坎普（Neill Blomkamp）以其标志性的纪录片风格与硬核科幻设定在影迷中备受瞩目。在豆瓣平台上，他最受好评的作品是处女作《第九区》（豆瓣评分 8.4）。《Nightborne》采用纪录片风格拍摄，相关介绍如下：本片由《第九区》导演尼尔 · 布洛姆坎普执导、编剧，每一帧画面均由 Seedance 2.0 生成，仅授权使用了 32 位真人演员的外貌和声音，另有电影概念设计师参与制作。本片的故事很像坎普在燕麦工作室制作的系列科幻短片及其过往电影作品，讲一位美国陆军航空兵“阿帕奇”攻击直升机飞行员阵亡后被美国军方用于秘密超级士兵计划。图源：视频截图布洛姆坎普在 X 上表示，他现在计划以相同的方式拍摄一部长篇电影。他还创立了 Barley Studios，这是一家新的 AI 电影工作室，旨在取代制作传统电影的 Oats Studios。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/459.htm", "publishedAt": "2026-07-21T05:33:35+00:00"}, {"title": "Momenta Robotaxi 获深圳智能网联汽车道路测试许可", "summary": "IT之家 7 月 21 日消息，智能驾驶公司 Momenta 今日宣布，其 Robotaxi 已正式获得深圳市智能网联汽车道路测试许可，并将于近期在深圳开展实地测试。至此，深圳成为 Momenta Robotaxi 在中国境内继上海、苏州、无锡之后落地的又一核心城市。从全球布局来看，Momenta Robotaxi 的测试与运营网络已覆盖多个国内外城市。国内方面，继上海、苏州之后，公司于 2026 年 1 月正式获得无锡市智能网联汽车道路测试与示范应用许可并启动测试。海外方面，Momenta 已在德国慕尼黑、阿联酋阿布扎比等城市落地，并积极拓展欧洲其他地区、新加坡及日本等市场。在国际化生态合作层面，Momenta 已与 Uber、Grab、Lumo、享道出行等全球头部出行平台，以及梅赛德斯-奔驰等汽车制造商建立了战略合作。其中，与 Uber 联合的 Robotaxi 项目已确定德国慕尼黑为首发城市，预计于 2026 年在当地正式启动运营服务。据企业发布的信息，Momenta 计划在 2026 年内于全球多个新城市及区域落地高阶自动驾驶，稳步推进技术场景验证与民生出行服务探索。技术层面，Momenta 于 2026 年 4 月正式发布 R7 强化学习世界模型，并已投入 L4 级自动驾驶实际应用。该模型采用三层架构设计：世界模型预训练层压缩物理规律，世界模型仿真层推演长尾场景，强化学习层实现自主决策优化。其核心能力在于对物理世界的深度认知 —— 可理解物体的物理属性、运动因果关系及潜在交互可能，从而实现更精准的预测与规划。这一能力让车辆在博弈、选道及复杂狭窄空间中的灵活通行，以及罕见极端场景下的表现得到提升。IT之家此前报道，Momenta 合伙人、研发 SVP 夏炎曾在今年 4 月的发布会上对 R7 的技术架构进行了深度拆解。2026 年 7 月 8 日，上汽大众 ID.ERA 9X 成为全球首款搭载 Momenta R7 世界模型的量产车型，标志着该模型从概念仿真阶段正式进入实车规模化搭载阶段。在量产数据积累方面，Momenta 的量产智驾方案搭载量在过去一年间已超过 80 万台，已交付量产车型超 70 款，累计定点车型超 200 款，量产落地覆盖十余个国家和地区。公司采用“量产车与无人车协同迭代”的策略 —— 量产车收集的海量低频困难场景数据可直接用于无人业务算法验证，以提升安全性并加速迭代。Momenta 方面表示，公司致力于打造物理 AI 的基座平台，支撑乘用车、Robovan、Robotruck 和 Robotaxi 的规模化落地，未来也将扩展至机器人等领域。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/458.htm", "publishedAt": "2026-07-21T05:18:29+00:00"}, {"title": "OpenAI 新高管一句话点炸了硅谷，中国开源权重模型是倾销？", "summary": "7 月 18 日，Haseeb Qureshi 在 X 上发了一条长帖，用一套倾销经济学来拆解一个正在撕裂硅谷的问题：中国开源权重模型到底意味着什么？ Haseeb 是 crypto 基金 Dragonfly 的合伙人，平常不怎么聊 AI。但这次他被卷入了一场论战，源头是 Dean Ball。 Ball 这个名字可能很多人还不熟。他此前是特朗普政府的 AI 高级顾问，大...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475813", "publishedAt": "2026-07-21T03:43:32+00:00"}, {"title": "Anthropic 获批 15 亿美元版权和解协议，向 50 万部作品支付赔偿", "summary": "据路透社报道，美国联邦法院周一正式批准Anthropic公司与作家、出版商达成的15亿美元集体诉讼和解协议。该协议用于解决Anthropic因训练AI模型过程中涉嫌侵犯版权引发的诉讼，公司随后将开始向相关版权方支付赔偿。 美国加州北区地方法院法官Araceli Martinez-Olguin签署了最终批准文件。此前，已退休法官威廉·阿尔苏普曾...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475785", "publishedAt": "2026-07-21T03:22:22+00:00"}, {"title": "谁在害怕中国 AI 模型？硅谷科技分析师用一门 MBA 课把账算清楚了", "summary": "Kimi K3 发布那天，美股 AI 板块又经历了一次集体跳水。Moonshot 暂停了新用户订阅——GPU 容量被打到了上限。阿里巴巴紧接着发布了 Qwen3.8 Max 预览版，2.4 万亿参数，号称仅次于 Anthropic 的 Fable 5，股价当天涨了 5.4%。 市场的反应模式已经让人有些眼熟。上一次是 DeepSeek R1，再上一次是 Qwen 的开源版本。中国...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475755", "publishedAt": "2026-07-21T03:12:43+00:00"}, {"title": ":fire::fire: 2026 年，Java Agent 的最后一块拼图，终于被补齐了!", "summary": "过去两年，Java AI 生态的发展非常快。 Spring AI、LangChain4j 等优秀框架，让 Java 开发者可以轻松接入 GPT、Claude、Gemini、DeepSeek 等各种大模型。 Chat、Prompt、Memory、RAG、Tool Calling、MCP、Agent…… 这些能力越来越成熟。 Java Agent，终于开始走进真实业务。 但当越来越多企业开始把 Agent 投入生产环境...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475598", "publishedAt": "2026-07-21T00:16:34+00:00"}, {"title": "不同模型厂同一家Agentic Infra，AGI时代的地基终于浮出水面", "summary": "大模型时代的共同选择", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/455805.html", "publishedAt": "2026 const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
</body>
</html>
