alaxy Z Fold8 Ultra 即日起开启预售，国行 256GB | 12GB 售价 14,999 元，512GB | 12GB 售价 16,599 元，1TB | 16GB 售价 19,799 元，抢先预订享 8 月 3 日优先发货。配色方面，新机提供雅暮紫、岩影灰、云凝白三种标准配色，另有一款松杉绿为三星官方线上商城独家销售。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/315.htm", "publishedAt": "2026-07-22T13:20:07+00:00"}, {"title": "2027 款广汽传祺向往 S7 PHEV 上市，政企双补价 12.98 万元起", "summary": "IT之家 7 月 22 日消息，2027 款广汽传祺向往 S7 PHEV 今晚正式上市，新车共推出 4 款车型，市场指导价区间为 14.98-19.98 万元，政企双补价 12.98-17.58 万元：Pro 版：市场指导价 14.98 万元，政企双补价 12.98 万元Pro 激光雷达版：市场指导价 15.98 万元，政企双补价 13.88 万元Max 激光雷达版：市场指导价 16.98 万元，政企双补价 14.78 万元Ultra 版：市场指导价 19.98 万元，政企双补价 17.58 万元2027 款传祺向往 S7 PHEV 外观基本保持不变，车身尺寸依旧保持长宽高 4900/1950/1780mm，轴距 2880mm，配备隐藏式门把手，采用贯穿式天际线大灯设计。IT之家获悉，此次新车升级重点是车顶搭载 192 线激光雷达，共提供 1 颗激光雷达、12 个超声波雷达、3 个毫米波雷达、11 个高清摄像头，配备英伟达 Orin-X 芯片和 Momenta R6 飞轮大模型，可支持城市 NDA 领航辅助驾驶，并全系标配智能自动泊车。内饰方面，新车增加驼绒棕配色，采用 15.6 英寸 2K 悬浮中控屏 +8.88 英寸全液晶仪表的组合，内置 8295P 芯片和 ADiGO 6.0 系统；新车配备 27 英寸 W-HUD 抬头显示、50W 无线快充、17.3 英寸 3K 吸顶娱乐屏和 22 扬声器杜比音效等。动力方面，新车升级为星源插混 GMC 3.0 疾风版，1.5T 发动机最大功率 118kW，两驱版驱动电机最大功率 200kW，四驱版综合最大功率 280kW（前 200kW、后 80kW）。电池容量从 36.3kWh 升级到 38.88kWh，CLTC 纯电续航提升至 255km（四驱版 240km），综合续航 1200km（四驱版 1084km）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/304.htm", "publishedAt": "2026-07-22T12:28:50+00:00"}, {"title": "OpenAI 推出 OpenAI Presence，布局企业软件赛道", "summary": "IT之家 7 月 22 日消息，OpenAI 推出了一款全新产品，希望借此进一步摆脱竞争日益激烈的大模型市场，向企业软件领域扩张。这款产品名为 OpenAI Presence，旨在帮助企业更高效地部署和管理 AI 智能体（AI Agent）。它能够将 AI 智能体与企业内部数据、管理制度、现有软件以及业务流程连接起来，使 AI 更好地融入企业运营。OpenAI 表示，Presence 旨在实现客户支持、销售等部分工作的自动化，比如解决账单问题、处理保险理赔或处理员工 IT 服务请求。IT之家注意到，这是 OpenAI 近年来不断拓展业务版图的最新举措，该公司希望不再只是销售 AI 模型的使用权限，而是进一步进入企业软件市场。不过，这也意味着 OpenAI 未来可能会与部分原本使用其模型开发产品的客户形成直接竞争。Presence 提供了一整套 AI 智能体管理工具。企业可以在正式部署前，对 AI 智能体进行模拟测试，并利用安全防护机制（Guardrails）、人工审核以及 AI 自动评分系统，对智能体执行任务的效果进行评估。当 AI 智能体正式投入使用后，如果运行过程中出现问题，OpenAI 的 Codex 工具还能够帮助排查原因，并提出改进建议。此外，Presence 还集成了 AI 驱动的语音和聊天技术，这可以帮助企业客户实现与现有及潜在客户互动的更多自动化。目前，OpenAI 将根据具体情况向企业客户提供 Presence 服务。企业若希望使用该产品，需要与 OpenAI 工程团队或官方指定合作伙伴合作，才能完成部署和接入。OpenAI 表示：“AI 智能体只会获得完成特定工作所需的知识和系统访问权限。企业可以自行制定相关规则，包括智能体能够执行哪些操作、哪些任务需要审批，以及何时应由人工接管。”OpenAI 透露，公司目前已经利用 Presence 运行面向英语用户的 AI 电话客服系统。与此同时，AI 大模型市场的竞争正变得越来越激烈。Anthropic、谷歌、xAI、Meta、Mistral、DeepSeek 等竞争对手都在不断推出性能更强的新模型。本月，多款来自中国的开源权重 AI 模型再次证明，各家模型之间的性能差距正在迅速缩小，价格持续下降，越来越多企业客户也开始愿意在不同 AI 服务商之间切换。这种趋势正在促使 OpenAI 加快向企业软件市场转型。相比单纯销售 AI 模型，企业软件通常拥有更高的客户黏性，企业购买的也不只是模型本身，而是一整套完整的业务解决方案。从目前来看，Presence 正是这一战略的重要组成部分。OpenAI 不再要求企业自行搭建 AI 智能体系统，而是将部署 AI 所需的软件、安全机制以及管理能力打包成完整产品，帮助大型企业更安全、更高效地应用人工智能。如果这一战略持续推进，那么 OpenAI 的定位将越来越不像一家单纯的大模型公司，而更像一家以 AI 为核心的企业软件服务商。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/300.htm", "publishedAt": "2026-07-22T12:16:57+00:00"}, {"title": "英伟达黄仁勋：美国无需害怕中国开源 AI 模型，应警惕国内“封禁”呼声", "summary": "IT之家 7 月 22 日消息，英伟达首席执行官黄仁勋表示，美国无需害怕中国开源 AI 模型，真正值得担心的反而是美国国内日益高涨的“封禁中国 AI 模型”呼声。黄仁勋当地时间周二在接受 Axios 专访时表示：“这些中国模型非常优秀，优秀的开源模型就应该被使用。”作为全球最大的 AI 芯片制造商掌门人，黄仁勋明确表示，美国企业“绝对应该”被允许使用中国开源 AI 模型。这一观点直接挑战了特朗普政府部分官员以及正在游说华盛顿限制中国 AI 模型的美国 AI 公司的立场。其中就包括英伟达的重要客户 OpenAI 和 Anthropic。这两家公司此前指责中国竞争对手通过模型蒸馏等方式获取其模型能力，并警告称，中国开源模型的迅速崛起正威胁美国在 AI 领域的领先地位。不过，黄仁勋并不认同这一观点。他认为，OpenAI 和 Anthropic 没有必要惧怕开源模型，因为开源模型能够让更多人首次接触 AI，从而扩大整个市场规模，而许多用户最终仍会愿意为更便捷、更可靠、性能更强的闭源商业服务付费。黄仁勋表示：“不存在中国企业把美国企业挤出市场的可能性，概率是零。”此次采访在美国得州沃思堡（Fort Worth）进行，当时黄仁勋正在出席纬创（Wistron）新一阶段先进制造工厂的启用仪式。该工厂负责为英伟达生产 AI 基础设施设备。黄仁勋借此表示，美国同样具备建设全球最先进制造业的能力。近期，月之暗面（Moonshot AI）发布了开源大模型 Kimi K3，再次引发美国市场对于 AI 竞争格局的担忧，也成为继 2025 年初 DeepSeek 引发市场震荡以来，AI 行业最受关注的事件之一。Kimi K3 同时具备三个此前极少同时出现的特点：性能接近国际最先进模型、价格大幅降低，以及开放模型权重，开发者可以自由下载并进行二次开发。这一组合也导致英伟达等 AI 芯片公司股价出现回调，市场重新担忧，更便宜、更高效的 AI 模型可能削弱行业持续大规模投资 AI 基础设施的必要性。不过，黄仁勋认为，无论华尔街还是华盛顿，都误判了 Kimi 带来的影响。他说：“市场第一次误解了 DeepSeek 的影响，这一次又误解了 Kimi 的影响。”在黄仁勋看来，逻辑其实很简单：更便宜、更开放的 AI 模型会让更多企业和个人开始使用 AI，而这反而会带来更多芯片、数据中心以及算力需求，最终利好英伟达等基础设施供应商。他说：“免费的 AI 应该有利于硬件，有利于芯片，也有利于数据中心。”谈及美国政策时，黄仁勋认为，以国家安全为由限制开源 AI 模型，反而可能让美国自身变得更加脆弱。黄仁勋表示，企业完全可以下载这些模型，并在自身安全隔离环境（Sandbox）中进行部署、修改和控制。他进一步认为，开放反而意味着更高的安全性，因为全球研究人员都可以检查模型、发现漏洞并及时修复。他说：“如果未来所有人都只能使用一个模型，那么整个世界就只有一个攻击目标、一个单点故障来源，我认为那样反而会更加危险。”黄仁勋同样将这一观点应用到美国 AI 模型身上。他呼吁 Anthropic 将目前仅限特定用户使用的网络安全模型 Claude Mythos 向更多用户开放，而不是继续限制访问权限。黄仁勋表示，与其限制模型开放，不如通过持续测试和快速修复来提高模型安全性。他说：“Mythos 应该作为一种服务向所有人开放。要记住，即便 Anthropic 不开放 Mythos，其他开源模型依然存在。所以，我认为应该让 Anthropic 放手去做。”他还表示：“限制 Anthropic，并不符合美国的利益。”在黄仁勋看来，美国政府对于中美 AI 竞争的理解也存在偏差。一些特朗普政府顾问将中国 AI 的快速发展视为对美国领先地位的重大威胁，但黄仁勋认为，AI 并不是一场终点明确的竞赛。他说：“AI 会一直伴随人类发展。美国会长期存在，中国也会长期存在，这并不是一场有终点的比赛。”IT之家注意到，就在黄仁勋接受采访前几个小时，美国财政部长斯科特 · 贝森特（Scott Bessent）刚刚向 Fox Business 表示，美国政府正在调查中国 AI 模型是否存在窃取美国知识产权的问题，并考虑采取制裁措施。贝森特表示：“如果我们发现海外 AI 模型窃取了美国优秀企业的技术成果，我们将有能力因此实施制裁。”他还称，美国模型中的一些“水印”已经出现在中国 AI 模型中。对此，黄仁勋则给出了截然不同的看法。他表示：“模型蒸馏、向 AI 学习，以及从其他知识来源学习，本身就是智能形成的基础。”不过，他也强调，如果企业违反隐私保护规定或合同约定，仍然应承担相应责任。但他认为，监管真正应该针对的是违法行为本身，而不是 AI 模型。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/294.htm", "publishedAt": "2026-07-22T11:51:15+00:00"}, {"title": "美国宣布投入 50 亿美元，利用 AI 攻克慢性病、加速药物研发等", "summary": "IT之家 7 月 22 日消息，据路透社报道，美国政府周三宣布，该国将投入 50 亿美元（IT之家注：现汇率约合 338.83 亿元人民币），利用人工智能攻克多个科学领域长期悬而未决的重大问题。根据白宫发布的声明，这笔资金将用于识别慢性疾病的根本病因、加速药物研发、开发寿命更长的建筑材料等多个科研项目。美国总统唐纳德 · 特朗普的首席技术顾问迈克尔 · 克拉齐奥斯（Michael Kratsios）在接受路透社采访时表示，参与项目的科研人员将能够使用美国能源部的超级计算机、人工智能平台以及专业数据集，并获得开展 AI 算法实验所需的其他科研资源。此次计划将由 15 个联邦政府部门共同参与，包括美国卫生与公众服务部、能源部、交通部、国防部和内政部等。克拉齐奥斯表示：“白宫正在协调不同政府部门，把各自在不同领域开展的研究整合到这一更大规模的 AI 科学研究计划中。”与此同时，特朗普政府还计划改革联邦科研经费的分配方式。根据克拉齐奥斯于周二晚间发布的一份白宫报告，未来美国政府将更多支持独立科研人员和 AI 技术应用，而不是主要通过大学发放科研资金。这意味着特朗普政府将能够对科研经费的使用方式拥有更大的控制权。报告写道：“联邦政府对科学研究的支持必须承担政治责任。”在第二个总统任期内，特朗普一直试图加强对白宫科研资金分配的掌控。不过，这一做法也遭到美国司法系统的制约。今年 1 月，美国一家联邦上诉法院裁定，特朗普政府无权削减美国国立卫生研究院（NIH）向从事科学和医学研究的高校提供的联邦科研资助。人工智能模型需要大量数据来识别规律、生成预测并辅助自动决策，而美国联邦政府掌握着全球规模最大的科研数据资源之一，包括化学物质、关键矿产资源以及患者健康等多个领域的大型数据库。克拉齐奥斯表示，这项总额 50 亿美元的科研计划，将为 AI 模型利用这些数据开展训练提供重要机会，并借助 AI 算法帮助科学家解决长期存在的科研难题。此外，微软也宣布将支持这一计划。根据微软发布的声明，公司将在未来三年捐赠价值 4000 万美元（现汇率约合 2.71 亿元人民币）的 AI 算力额度，为该科研项目提供计算资源支持。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/291.htm", "publishedAt": "2026-07-22T11:28:17+00:00"}, {"title": "16 岁少年造出仿生海龟机器人，AI 识别微塑料准确率达 94%", "summary": "IT之家 7 月 22 日消息，2024 年夏天，在加拿大祖父母家的泳池边，16 岁的埃文 · 巴兹（Evan Budz）正试图解决一个十分特别的问题：如何让自己设计的自主“海龟机器人”真正游起来。“我还记得最初几次测试。”巴兹在接受《Business Insider》采访时说，“我把机器人放进水里，它直接沉到了池底，根本不会游泳，也无法控制自己的深度，就像一块砖头一样。”对于大多数青少年来说，这显然不是他们会遇到的问题。但对巴兹而言，这却成了他最投入的研究课题。2024 年早些时候，一次与家人前往加拿大安大略省荒野露营的经历，让他对水生动物产生了浓厚兴趣。他说：“当时我看到一只鳄龟在水中游动，它的动作流畅自然，非常优雅。我受到很大启发，希望设计出一台能够模仿它运动方式的机器人。”经过后院泳池里的反复测试，以及数月不断调试、改进和升级，这项研究终于在今年 5 月迎来了成果。凭借一套水下三维全息成像相机，以及自己训练的 AI 模型 —— 能够识别水体中的微小塑料颗粒，并将这些设备安装到自主海龟机器人上，巴兹在 2026 年 Regeneron 国际科学与工程大奖赛（Regeneron International Science and Engineering Fair，ISEF）上获得了 5 万美元（IT之家注：现汇率约合 33.9 万元人民币）奖学金。他说，仅制造机器人和全息相机，两项工作各自就投入了约 2000 个小时。巴兹表示，选择环保作为自己的研究方向几乎是顺理成章的事情。“我一直热爱户外。”他说，“从六岁开始，我就跟着父母到偏远地区露营。我们会划着独木舟前往那些美丽而壮观的湖泊。”后来，在观看一部关于海洋和海洋生态系统的纪录片后，他了解到水体中已经充满了微塑料污染。根据海洋保护协会（Ocean Conservancy）的统计，每年约有 1100 万吨塑料垃圾流入海洋，影响超过 1300 种海洋生物。2024 年，巴兹花费约 5 个月时间打造了这只海龟机器人。他认为，海龟是执行这类任务最理想的仿生对象，“海龟的游泳效率非常高，这对于设计仿生机器人来说至关重要。我希望机器人能够长距离执行任务，而无需频繁充电或担心电池耗尽。”他说：“此外，海龟广泛生活于各种水域生态系统，因此当地其他生物对它们并不会感到陌生，更不容易引起干扰。”另一方面，海龟体型较大，也方便安装各种科研设备，例如传感器和全息成像系统。为了让机器人的游泳姿态更加自然，巴兹还向当地水族馆的专家寻求了帮助。他说：“随后，我开发了一系列算法，让机器人能够按照预设搜索路径自主游动，同时自动调节自身深度。它基本上可以按照用户设定的目标自主前进，完全不需要人工导航或人为控制。”2025 年夏天，巴兹开始研发三维全息成像系统，并训练 AI 模型。他说，这一过程经历了大量反复试验，尤其是在让 AI 准确区分微塑料和水中其他微小生物方面，需要不断调整和优化。“其中包括不断优化硬件，提高成像分辨率，以识别尺寸只有约 10 微米的微小颗粒和微塑料。”整个检测流程首先需要利用全息成像系统采集三维全息图像，然后再交由 AI 模型识别其中是否存在微塑料。不过，真正用于测试的时间却非常有限。巴兹表示，加拿大北部冬季寒冷，因此必须赶在湖面结冰之前完成所有外场测试。“我生活在加拿大北部，这里的冬天非常冷，所以必须在天气变冷之前，到当地几座湖泊完成最终版仿生机器人的测试。”到了 Regeneron 国际科学与工程大奖赛举办时，这套系统已经能够以 94% 的准确率区分微塑料和其他微小颗粒。巴兹表示，他的研究目标，是让微塑料检测变得更快、更普及。他认为，目前主流检测方式主要依赖实验室分析，整个流程十分复杂。“由于必须送到实验室检测，即便只是少量样品，也可能需要几天时间才能完成分析，而且成本很高。”他说，“对于偏远地区来说，这种方法几乎不现实，因为那里既没有实验室，也缺乏专业技术人员。”相比之下，他研发的系统能够直接在水中完成微塑料检测，无需将样本送回实验室。正是这一创新思路，让巴兹获得了本届大赛最高荣誉之一 —— 戈登 ·E· 摩尔未来世代积极成果奖（Gordon E. Moore Award for Positive Outcomes for Future Generations）。由再生元制药公司（Regeneron Pharmaceuticals）和科学学会（Society for Science）共同举办的 Regeneron 国际科学与工程大奖赛，今年共向获奖学生发放了超过 700 万美元奖金。这项赛事面向全球高中生开放，今年共有超过 1700 名学生参赛。谈到获奖经历，巴兹说：“当时真的感觉像做梦一样。我站在领奖台上，听到主持人念出戈登 ·E· 摩尔奖获奖者的名字时，我心里一直在想：‘天哪，那真的是我吗？我真的获奖了吗？’当时脑子里一下子闪过很多念头，甚至有些不敢相信。但总体来说，那是一段非常难忘的经历。”目前，巴兹仍将重心放在高中学业上。他计划利用这笔 5 万美元奖学金进入大学攻读科学或工程专业，并希望将自己的研究成果分享给更多科研人员，推动相关领域进一步发展。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/247.htm", "publishedAt": "2026-07-22T10:10:00+00:00"}, {"title": "思科推出 Antares 小语言 AI 模型，专为“定位漏洞”设计", "summary": "IT之家 7 月 22 日消息，思科发文，宣布推出 Antares 系列小语言模型，相应模型专门用于定位漏洞，目前官方已在 Hugging Face（点此访问）发布 350M 和 1B 参数版本，后续还将推出 30 亿参数（3B）版本。据介绍，Antares 并非能够自主发现未知漏洞的 AI 模型，其设计目的是帮助安全人员进行漏洞定位（Vulnerability Localization），模型在获取 CWE 漏洞类型及相关描述后，会利用终端命令搜索代码库，输出检查报告，以便帮助安全人员提升人工审查效率。为了评估 Antares 模型性能，思科进行了一项漏洞定位基准测试（Vulnerability Localization Benchmark），该测试涵盖 290 个真实代码库、147 种 CWE 漏洞类型以及 500 项测试任务。根据思科公布的技术报告，Antares-1B 在漏洞文件检出率（Recall）方面达到 22.4%，在所有参与测试的模型中排名最高，略高于 GPT-5.5 的 22.1%。思科表示，由于 Antares 模型规模较小，可以直接部署在本地环境、企业内网中运行，具有轻量化、隐私化特点。不过其本身功能有限，只能用作辅助用途，企业仍需要结合依赖组件分析、软件组成分析（SBOM）、敏感信息扫描、动态安全测试、威胁建模、漏洞修复以及人工安全审查等措施，才能建立完整的软件安全防护体系。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/239.htm", "publishedAt": "2026-07-22T10:03:39+00:00"}, {"title": "零刻 ME Pro 四盘位 NAS 新增英特尔奔腾银牌 J5005 款，8GB RAM + 128G SSD 售 1799 元", "summary": "IT之家 7 月 22 日消息，零刻现已为其 ME Pro 四盘位 NAS 新增搭载英特尔奔腾银牌 J5005 处理器版本，8GB + 128GB + fnOS 商业版配置 1999 元，首发价 1799 元。京东零刻 ME Pro 四盘位 英特尔 J5005 版本 1799 元直达链接该版本基于一颗 2017Q4 发行的 14nm 四核心四线程 \"Gemini Lake\" 芯片，标配 8GB DDR4 RAM 内存，M.2 2280 SSD 盘位方面一个支持 PCIe Gen2 ×1（系统盘）、另一个支持 SATA（存储盘）。外部 I/O 上，其正面包含 1 个 USB-A 5Gbps；反面提供 2 个 2.5GbE RJ45、1 个 HDMI、1 个 USB-A 5Gbps、1 个 USB-A 480Mbps、1 个支持 Display Alt 的 USB-C 5Gbps、1 个 3.5mm 音频插孔。IT之家附产品参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/214.htm", "publishedAt": "2026-07-22T09:44:07+00:00"}, {"title": "宇树王兴兴：具身智能“ChatGPT 时刻”有望最快两三年内到来，大家要提前做好准备", "summary": "IT之家 7 月 22 日消息，2026 年世界互联网大会数字丝路发展论坛于今日在陕西西安举行，据澎湃新闻报道，宇树科技创始人兼首席执行官王兴兴在开幕式上表示，过去几年，人形机器人从行走到舞蹈、功夫格斗到简单服务进步飞速。具身智能的“ChatGPT 时刻”有望最快在两三年内到来，届时机器人在大部分陌生场景也能直接工作，实现很多基本功能。王兴兴还称，大家要根据自己的实际情况提前做好各种计划和安排，从而把握智能时代的新机遇。王兴兴表示，古往今来，科技的创新和突破，在时间上并不是一蹴而就的，很多时候，甚至有很多随机性。但要取得创新和突破，其中最关键的必要条件是持续的创新投入。综合IT之家此前报道，王兴兴曾在今年 3 月的演讲中表示，当下机器人、具身智能确实还没有达到临界点，他还将具身智能的“ChatGPT 时刻”定义为以下情景：如果未来有一天，我带一台机器人到这个会场，它到 80% 左右的陌生场景中都能通过语音、语言指令实现 80% 左右的任务。我觉得就已经实现了具身智能的“ChatGPT 时刻”。王兴兴 7 月 10 日在 2026 王府井论坛上给出了明确判断：“机器人最终一定会走向更广阔的市场，走向普通消费者，走向真实的生活。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/206.htm", "publishedAt": "2026-07-22T09:38:41+00:00"}, {"title": "百度文心助手任务Agent登顶国际权威榜单，超越Claude、GPT拿下全球智能体冠军", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/457117.html", "publishedAt": "2026-07-22T07:31:19+00:00"}, {"title": "AI 圈今天最大的瓜：GPT-6 越狱攻击，被 GLM 5.2 揪出了", "summary": "「GPT-6」为了考试作弊，黑进了别人的服务器#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672746?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-22T07:06:04+00:00"}, {"title": "腾讯发布首个自研创意智能体 Miora", "summary": "腾讯宣布旗下首个创意智能体 Miora (腾讯设计妙境) 已正式全量上线，新用户注册即可获得 1000 积分。 根据介绍，Miora 是一个由多 AI Agent 协作驱动、会记住你创作方式的多模态创意智能体工作室；基于与 WorkBuddy 同源的智能体架构，专为创意领域打造，零门槛使用。 从一份需求开始，Miora 能够理解目标、规划流程，并...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476728", "publishedAt": "2026-07-22T06:37:38+00:00"}, {"title": "Kimi K3 实战对标 Fable 5：开源模型在 SWE-bench 上几乎打平了", "summary": "前两天报道过一篇分析（Fable 5 比开源模型贵三倍，Anthropic 的账怎么算？），讨论 Anthropic 的 Fable 5 比开源模型贵了三倍，商业模式能不能撑住。现在有一份硬数据来了。 AI 推理平台 Fireworks AI 跑了 1030 个真实 agent 任务，把 Kimi K3（Moonshot 的开源模型）和 Fable 5 放在同一个 harness 里做了对照测试。结...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476574/kimi-k3-fable-compared-by-fireworks-ai", "publishedAt": "2026-07-22T03:10:50+00:00"}, {"title": "Google Gemini 一口气发了三个新模型，还有一个只给政府用", "summary": "Google 今天更新了 Gemini Flash 系列，一口气推出三个新型号，外加两个预告。 重头戏是 Gemini 3.6 Flash。Google 管它叫\"主力马\"，主攻编程、知识工作和多模态。相比 3.5 Flash，输出 token 量减少了 17%（按 Artificial Analysis 的统计），DeepSWE 基准上甚至砍掉了 65% 的冗余输出。性能提升也不含糊：DeepSWE 从 ...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476554/ge 让企业上下文转化为可治理的 Agentic 行动 ｜ 技术趋势", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/shzCr5FsOcHUyBc8CEsj?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-22T18:44:59+00:00"}, {"title": "美图拿出1亿元，面向全行业寻找AI影像Builder", "summary": "美图产品挑战赛（Meitu Hatch Catch）火热报名中", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/457223.html", "publishedAt": "2026-07-22T17:35:44+00:00"}, {"title": "三星首款 AI 眼镜 Galaxy Glasses 亮相：搭载骁龙 AR1 Gen1 芯片，满电续航 9 小时", "summary": "IT之家 7 月 22 日消息，在今天的 Galaxy Unpacked 2026 夏季发布会上，三星首款 AI 眼镜 Galaxy Glasses 首发亮相。该产品延续了在最新谷歌 I/O 大会上公布的理念，由三星与全球眼镜品牌 Gentle Monster 和 Warby Parker 联合打造。据介绍，三星 Galaxy Glasses 智能眼镜搭载了骁龙 AR1 Gen1 芯片，独家与三星 Galaxy 智能手机匹配，并支持谷歌 AI 语音助手 Gemini，交互变得更自然、即时且直观。眼镜无显示屏，但可通过音频输出提供 AI 辅助，内置摄像头还能将视觉信息传输至 Gemini。核心功能包括实时翻译、实时导航、消息摘要生成，以及能够捕捉佩戴者所见内容并直接传输到三星笔记中。通话时，用户还可以免提分享摄像头实时画面。专注当下：该设备可帮助总结长消息、朗读关键信息、支持实时翻译，用户还能通过连接的设备，以简单的语音或手势交互操控使用体验。捕捉场景信息：收到指令后，这款智能眼镜可捕捉用户所见内容，比如白板或会议讨论，在备忘录中整理关键信息，方便后续回顾、分享和跟进。上下文感知辅助：该设备可通过理解用户的当前上下文并关联不同任务中的相关信息，来支持更有价值的后续交互，帮助用户以更少的重复操作继续之前未完成的工作。实时视觉共享：用户可在通话中共享所见内容或记录自身视角，让沟通更即时，同时解放双手。三星 Galaxy Glasses 智能眼镜支持触控镜框进行操控，眼镜也支持手势控制，但需要搭配 Galaxy Watch 9 使用。眼镜单次充电的续航时长最高可达 9 小时，配套的充电盒可额外提供最多 7 次满电充电。该眼镜搭载 Android XR 系统。IT之家注意到，三星还推出了两种镜框。Gentle Monster 款型采用黑色纤细镜框设计，笔直的上镜框搭配柔和圆润的下边缘，主打精致和时尚；Warby Parker 款型的眉线微微上扬，呈现浓郁的棕色调，线条精致百搭，更适合日常佩戴。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/323.htm", "publishedAt": "2026-07-22T14:17:25+00:00"}, {"title": "三星 Galaxy Z8 系列手机现场实拍：三种折叠屏齐聚，首款阔折叠是亮点", "summary": "7 月 22 日，三星电子在伦敦举办了 Galaxy Unpacked 2026 夏季新品发布会，正式推出第八代 Galaxy Z 系列折叠屏产品 ——Galaxy Z8 系列。该系列包含三款机型：定位专业 AI 生产力的大折叠旗舰 Galaxy Z Fold8 Ultra ；主打沉浸内容探索体验的阔折叠 Galaxy Z Fold8，还有主打纤薄便携与个性表达的小折叠 Galaxy Z Flip8，三款产品覆盖了不同用户群体的使用需求。IT之家受邀前往参加三星在国内举办的新品体验会，现在小编第一时间为大家送上三款手机的现场体验区实拍图赏。三星 Galaxy Z Fold8 UltraGalaxy Z Fold8 Ultra 作为系列最新的大折叠旗舰，搭载一块 8.0 英寸 2504 x 2256 分辨率的主屏幕，第二代动态 AMOLED 显示屏，支持 120Hz 自适应刷新率，这块屏幕峰值亮度达到 3000 尼特，支持 Vision Booster 视觉增强技术，配合防反射涂层，户外强光环境下也能保持清晰显示。Z Fold8 Ultra 首次将钛缓震层技术引入折叠屏结构，在实现 Z Fold 系列迄今最大主屏的同时，弱化了屏幕折痕，也提升了结构耐用性。外屏为一块 6.5 英寸 1080 x 2520 分辨率的屏幕，支持 120Hz 自适应刷新率，同样支持 Vision Booster 视觉增强技术 。Galaxy Z Fold8 Ultra 在折叠时机身厚度为 8.9 毫米，展开时厚度则为 4.1 毫米，机身重量则仅为 215g。影像部分搭载 2 亿像素广角主摄与 5000 万像素超广角镜头，全系支持 8K 视频拍摄，搭配 APV 编解码器与电影级 LUT 预设，可满足专业级的内容创作需求。性能层面，该机搭载第五代骁龙 8 至尊版移动平台（for Galaxy），内置 5000mAh 硅碳电池，支持 45W 有线快充与 20W 无线充电，日常使用续航可达 27 小时。配色方面，三星 Galaxy Z Fold8 Ultra 提供岩影灰、云凝白、雅暮紫、松杉绿四种配色。三星 Galaxy Z Fold8三星 Galaxy Z Fold8 是系列首款阔折叠手机，采用 7.6 英寸第二代动态 AMOLED 显示屏，1848 x 2448 分辨率，120Hz 自适应刷新率，支持 Vision Booster 视觉增强技术，展开后为 4:3 的显示比例。折叠状态下的外屏为 10:16 比例，5.5 英寸 1248 x 1972 分辨率屏幕，内外屏结合可适配不同场景下的内容浏览习惯。该机同样配备 3000 尼特峰值亮度的屏幕与防反射技术。折叠状态下，Galaxy Z Fold8 机身厚度为 9.7mm，展开状态下厚度则为 4.5 毫米，机身重量为 201g。影像上采用 5000 万像素广角 + 超广角后置双摄组合，支持双摄录制等创意拍摄功能。机身重量为 Z Fold 系列最轻，内置 4800mAh 电池，支持 45W 有线快充和 15W 无线充电，同样搭载第五代骁龙 8 至尊版平台。配色方面，Galaxy Z Fold8 提供岩影灰、云凝白, 柔薰紫和春野绿四种配色。三星 Galaxy Z Flip8小折叠机型 Galaxy Z Flip8 主打极致便携，机身仅重 180 克，展开厚度 6.1 毫米，折叠状态厚度为 13.1 毫米，是 Z Flip 系列迄今最轻薄的产品。Galaxy Z Flip8 主屏为 6.9 英寸 1080 x 2520 分辨率的屏幕，第二代动态 AMOLED 显示屏，支持 120Hz 自适应刷新率，支持 Vision Booster 视觉增强技术。外屏为 4.1 英寸 Super AMOLED 屏幕，948 x 1048 分辨率，支持 60/120Hz 两档刷新率切换。Galaxy Z Flip8 机身边框采用增强型装甲铝材质，铰链结构同步升级。影像部分配备 5000 万像素后置主摄，像素尺寸 1.0μm，支持 Dual Pixel AF 技术，同时还有 1200 万像素超广角镜头，F2.2 光圈, 像素尺寸: 1.12μm。支持立式自由拍摄与超级稳定水平锁定功能，适配日常自拍与创意拍摄场景。Galaxy Z Flip8 同样搭载第五代骁龙 ®8 至尊版（for Galaxy），采用 4300mAh (典型值) 双电池，支持 25W 有线充电，15W 无线充电。配色方面，Galaxy Z Flip8 提供岩影灰、云凝白，甜莓粉还有清柚绿四种配色。三款机型同框照：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/320.htm", "publishedAt": "2026-07-22T13:48:16+00:00"}, {"title": "三星最轻折叠屏手机 Galaxy Z Flip8 发布，8999 元起", "summary": "IT之家 7 月 22 日消息，三星今天还发布了全新竖向折叠屏手机 Galaxy Z Flip8。新机延续了上一代时尚轻巧的设计风格，但在性能、AI 功能和软件体验等方面进行了全面升级，同时也是三星迄今最轻的折叠屏智能手机。性能方面，美国市场的 Galaxy Z Flip8 搭载 Exynos 2600 处理器，这是全球首款采用 2nm 制程工艺打造的智能手机芯片。三星表示，相比 Galaxy Z Flip 7，新机 CPU 性能提升超过 30%，GPU 性能提升约 50%。国行版搭载第五代骁龙 8 至尊版（for Galaxy）处理器。Galaxy Z Flip8 全系配备 12GB 内存，提供 256GB 和 512GB 两种存储版本。IT之家注意到，新机机身重量仅 180 克，比上一代轻了 8 克。折叠状态下，机身尺寸为 75.4×85.7×13.1 毫米；展开后尺寸为 75.4×166.9×6.1 毫米。此外，新机支持 IP48 级防尘防水。影像方面，Galaxy Z Flip8 配备 5000 万像素主摄和 1200 万像素超广角镜头，内屏采用打孔设计，搭载一颗 1000 万像素前置摄像头。三颗摄像头均支持最高 4K 60fps Super HDR 视频录制，整体硬件规格与 Galaxy Z Flip 7 基本一致。其中，主摄采用 1/1.56 英寸传感器，支持光学防抖（OIS）、双像素相位对焦（Dual Pixel PDAF），光圈为 F1.8，单像素尺寸 1.12 微米，视场角 85°。超广角镜头采用 1/3.2 英寸传感器，光圈 F2.2，单像素尺寸 1.12 微米，视场角 123°。前置摄像头采用 1/3.5 英寸传感器，光圈 F2.2，单像素尺寸同样为 1.12 微米，视场角 85°。三星还为 Galaxy Z Flip8 新增 Camcorder Grip（摄像机握持）功能。开启后，用户可以像使用传统摄像机一样握持折叠后的手机，并在屏幕下半部分直接操作变焦等拍摄控制，提高拍摄舒适度，更方便拍摄动态视频。在 Steady Shot（稳定拍摄）模式下，新机新增 Horizontal Lock（水平锁定）功能，即使手机进行 360 度旋转，也能自动保持画面地平线水平。此外，借助 5000 万像素主摄，用户还可以利用外屏实时预览，在 Flex 模式下拍摄高分辨率自拍和 Vlog。屏幕方面，Galaxy Z Flip8 外侧配备一块 4.1 英寸 Super AMOLED 外屏，分辨率为 948×1048，像素密度 342ppi，支持 60Hz 或 120Hz 刷新率，峰值亮度最高可达 2600 尼特。内屏则升级为 6.9 英寸 Dynamic AMOLED 2X 折叠屏，分辨率 1080×2520，像素密度 400ppi，支持 1Hz 至 120Hz 自适应刷新率，峰值亮度同样达到 2600 尼特。三星表示，新一代折叠屏进一步减轻了折痕，同时屏幕触感也更加接近玻璃。两块屏幕均支持 Vision Booster 显示增强技术。软件方面，Galaxy Z Flip8 出厂预装基于 Android 17 的 One UI 9.0。三星承诺，新机将获得 7 个 Android 大版本升级以及最长 7 年的安全更新支持。新版 One UI 9.0 进一步强化了外屏体验。借助 FlexWindow，用户可以直接在外屏打开应用、使用更多桌面小组件，并查看 Now Brief 信息卡。同时，依托 Gemini Intelligence，用户还能直接在外屏运行更多高级 AI 自动化功能。续航方面，Galaxy Z Flip8 配备一块 4300mAh 电池，支持 25W 有线快充。这是三星首次在智能手机中采用硅碳电池技术。不过，相比提升电池容量，三星此次更侧重于通过新电池技术降低整机重量。连接方面，新机支持 GPS、5G、LTE、Wi-Fi 7、Bluetooth 5.4、NFC 以及 USB 3.2 Type-C 接口，不过并未配备 UWB（超宽带）功能。Galaxy Z Flip8 将于今日起开启预售，256GB | 12GB 售价 8,999 元，512GB | 12GB 售价 10,599 元，抢先预订享 8 月 3 日优先发货。配色方面，新机提供甜莓粉、岩影灰、云凝白三种标准配色，另有一款清柚绿将作为三星官网限定配色独家发售。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/316.htm", "publishedAt": "2026-07-22T13:28:47+00:00"}, {"title": "三星 Galaxy Z Fold8 阔折叠手机发布：全新机身形态，起售价 12999 元", "summary": "IT之家 7 月 22 日消息，三星今天正式发布了 Galaxy Z Fold8，这是该公司六年来首款采用全新机身形态的折叠屏手机。与此前历代 Galaxy Z Fold 相比，新机机身更短、更宽，主打影音娱乐体验。IT之家注意到，Galaxy Z Fold8 配备一块 5.5 英寸外屏和一块 7.6 英寸内折叠屏，两块屏幕均采用 Dynamic AMOLED 2X 面板，支持 1Hz 至 120Hz 自适应刷新率，并兼容 HDR10、HDR10+ 和 HLG 显示标准。其中，内屏峰值亮度最高可达 3000 尼特，同时加入了抗反射涂层，在户外环境下也能获得更好的可视性。外屏采用 10:16 屏幕比例，竖屏状态下更适合观看短视频内容，横屏时则适合观看电影和电视剧。内屏横向比例为 4:3，竖向比例为 3:4，更适合办公、多任务分屏以及视频观看。不过，这款手机并不支持 S Pen 手写笔。三星表示，Galaxy Z Fold8 采用全新的 Flex Titanium 折叠铰链结构，可进一步减少屏幕折痕，同时让开合更加轻松顺滑。新结构也提升了屏幕强度，使其触感更加接近玻璃。三星还重点优化了整机重量，使 Galaxy Z Fold8 成为品牌迄今最轻的书本式折叠屏手机。新机重量仅 201 克，甚至比传统直板旗舰 Galaxy S26 Ultra 还要轻。折叠状态下，Galaxy Z Fold8 的机身尺寸为 123.9×81.9×9.7 毫米；展开后尺寸为 123.9×161.4×4.5 毫米，整机支持 IP48 级防尘防水。影像方面，Galaxy Z Fold8 后置双摄系统，包括一颗支持光学防抖（OIS）、F1.8 光圈的 5000 万像素主摄，以及一颗 5000 万像素超广角镜头（F1.9 光圈）。此外，外屏和内屏各配备一颗 1000 万像素前置摄像头。所有摄像头均支持 4K 60fps HDR 视频录制，后置摄像头还可拍摄 8K 30fps 视频。新加入的 My FanCam 功能能够在拍摄视频时自动保持人物位于画面中央，即使拍摄对象移动，也能持续跟踪构图。核心配置方面，Galaxy Z Fold8 搭载高通骁龙 8 Elite Gen 5 for Galaxy 处理器。256GB 和 512GB 版本配备 12GB 内存，1TB 顶配版则升级至 16GB 内存。尽管机身整体尺寸相比 Galaxy Z Fold 7 更小，但电池容量反而提升至 4800mAh，相比上一代的 4400mAh 有所增加。新机支持 45W 有线快充，官方称 30 分钟即可将电量从 0% 充至 63%；同时支持 20W 无线充电，并兼容 Qi2 Ready 标准。连接方面，Galaxy Z Fold8 支持 GPS、5G、4G LTE、Wi-Fi 7、Bluetooth 6.0、UWB、NFC，以及 USB Type-C 接口（USB 3.2，最高 5Gbps）。此外，新机还配备侧边指纹识别、立体声扬声器，并支持 Dolby Atmos、Quick Share、Samsung DeX 和 Samsung Pay 等功能。软件方面，Galaxy Z Fold8 出厂即搭载 One UI 9.0，也是全球首批预装该系统的智能手机之一。三星承诺，新机将提供 7 个 Android 大版本升级以及最长 7 年的安全更新支持。Galaxy Z Fold8 同时也是三星首批支持谷歌 Gemini Intelligence 驱动的 Advanced Automation（高级自动化）功能的机型之一。借助这一功能，Gemini 可以在后台自动完成多项任务。例如，用户只需输入简单需求，AI 即可自动完成电影票预订、酒店预订等流程，最终只需用户完成付款即可。Galaxy AI 方面，新机升级了 Now Nudge 功能，使其变得更加主动。Now Nudge 可以出现在键盘、通知栏或屏幕底部附近。例如，当好友在聊天软件中发送一个位置时，Now Nudge 会立即弹出“保存到 Google Maps”的选项。点击后，Google 地图将以分屏方式打开，方便用户直接保存位置。定位方面，Galaxy Z Fold8 的硬件配置略低于 Galaxy Z Fold8 Ultra，但其屏幕比例更加适合影音娱乐和内容消费。售价方面，Galaxy Z Fold8 手机的 256GB | 12GB 版国行售价 12999 元，512GB | 12GB 售价 14599 元，1TB | 16GB 售价 17799 元，抢先预订享 8 月 3 日优先发货。配色方面，新机提供柔薰紫、岩影灰、云凝白三种标准配色，另有一款春野绿为三星官方线上商城独家销售。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/314.htm", "publishedAt": "2026-07-22T13:11:14+00:00"}, {"title": "全球首款 AI 智能体手机努比亚 NaviX Ultra 配置曝光：6.78 英寸 144Hz 屏、7100mAh 电池", "summary": "IT之家 7 月 22 日消息，博主 @熊猫很禿然 今日曝光了全球首款 AI 智能体手机努比亚 NaviX Ultra 核心配置。据称，努比亚 NaviX Ultra 将搭载骁龙 8 Elite Gen5 处理器，配备 6.78 英寸 144Hz 1.5K 分辨率直屏，有望是努比亚边框最窄的手机。该机还会内置 7100mAh 电池，提供蓝粉黑白四款配色，前置 5000 万像素镜头、后置 5000 万像素 + 5000 万像素 + 5000 万像素镜头组合（预计为主长广三摄）。博主还透露，该机准备大规模发售。据IT之家此前报道，全球首款 AI 智能体手机努比亚 NaviX Ultra 已在 WAIC 期间正式亮相，该机搭载豆包手机助手，机身侧面配备独立的橙色 AI 按键，支持一键快速唤醒智能体、全场景自然语义理解能力，可自主跨软件串联完成多步骤任务功能。相关阅读：《全球首款 AI 智能体手机努比亚 NaviX Ultra 亮相 WAIC，搭载豆包手机助手》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/311.htm", "publishedAt": "2026-07-22T12:51:25+00:00"}, {"title": "消息称 AMD 与 Anthropic 签署数百亿美元芯片采购协议，并最高向 Anthropic 投资 50 亿美元", "summary": "IT之家 7 月 22 日消息，据华尔街日报消息，AMD 与 Anthropic 达成了一项价值数百亿美元的 AI 服务器协议。根据协议条款，自 2027 年上半年起，Anthropic 将采购最高 2GW（吉瓦）的 AMD 最新一代芯片 Instinct MI450。此外，在达成特定的部署里程碑时（与约定算力部署目标挂钩），AMD 将向 Anthropic 投资最高 50 亿美元（IT之家注：现汇率约合 338.83 亿元人民币），这也是 AMD 对这家人工智能企业的首笔注资。延伸阅读Anthropic 在 2026 年 4 月已被曝出计划采用 AMD 的下一代 Instinct MI450 AI 加速器，以应对行业算力供应短缺并寻求多元化供应链。Anthropic 在 2026 年 4 月也正在评估自研 AI 芯片的可行性，以增强算力掌控能力，这与 OpenAI、Meta 等公司的动向一致。在寻求与 AMD 合作的同时，Anthropic 已与多家科技巨头达成深度合作。例如，在 2026 年 5 月，Anthropic 承诺未来 5 年内向谷歌云支出 2000 亿美元，作为其芯片和云服务协议的一部分。此外，Anthropic 在 2026 年 4 月与谷歌达成协议，谷歌先投资 100 亿美元，未来可能再追加 300 亿美元，并帮助 Anthropic 大幅扩充算力，未来 5 年 Google Cloud 将向其提供 5 吉瓦规模的算力。Anthropic 也与亚马逊达成了长期协议，未来 10 年内将向亚马逊 AWS 采购超 1000 亿美元的算力资源。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/309.htm", "publishedAt": "2026-07-22T12:48:18+00:00"}, {"title": "消息称腾讯整合 Workbuddy 与 QClaw 两款 AI 产品团队", "summary": "IT之家 7 月 22 日消息，据雷峰网消息，7 月 20 日，腾讯发布内部组织调整通知，腾讯 QClaw 产品中心相关业务和部分团队，将调整至云产品六部。QClaw 产品仍将持续运营。QClaw 由腾讯电脑管家团队基于 OpenClaw 打造，今年 3 月开启内测；可微信远程整理文件、执行复杂任务、无需编程基础，适配办公/ 创作/ 开发等多场景。而云产品六部则是腾讯另一款 AI 办公智能体 Workbuddy 产品所属部门。Workbuddy 是腾讯推出的一款全场景 AI 办公智能体桌面工作台，覆盖日常办公、代码开发与设计创意。据IT之家此前报道，7 月 18 日，WorkBuddy 发布独立 App，iOS、安卓及鸿蒙版本同步上线，是首个登陆鸿蒙系统的通用智能体应用。该 App 具备桌面端的大部分能力，并支持手机上远程在电脑端上发起任务。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/286.htm", "publishedAt": "2026-07-22T10:58:21+00:00"}, {"title": "支付宝 xUI -- “阿宝”背后的 Agentic 终端交互引擎｜AICon深圳", "summary": "点击查看原文>", "sourceN 谷歌干了十二年。2007 年入职的时候，她还是个刚毕业的传播助理。后来她成了公司内部最有辨识度的声音——不是写代码的那个声音，是写人心的那个。 每周五下午，谷歌在全球的办公室会同步开一场员工大会，叫 TGIF。拉里·佩奇和谢尔盖·布林在台上回答员工提问，气氛像布道会加科技展加单口喜剧的混合...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475987", "publishedAt": "2026-07-21T07:28:52+00:00"}, {"title": "世界杯冠军刚出炉，我让商汤 U1 Pro 做了一份全景赛况图", "summary": "所有图片都是 one shot#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672547?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-20T10:29:28+00:00"}]}, {"label": "论文研究", "items": [{"title": "为销售更多 GPU，英伟达下场做担保帮 AI 云厂商贷款买芯片", "summary": "IT之家 7 月 22 日消息，今年早些时候，AI 初创公司 Fireworks AI 希望租用价值数亿美元的 AI 算力。与直接采购大规模英伟达 GPU 集群，或向亚马逊、微软等云计算巨头租赁算力不同，Fireworks AI 选择了近年来兴起的 AI 云服务商（Neocloud）——GMI Cloud。这类公司专门面向 AI 业务提供 GPU 算力，通常能够提供更快的 GPU 交付速度、更具竞争力的价格，以及针对 AI 工作负载优化的基础设施。不过，这笔交易遇到了一个难题。为了向 Fireworks AI 提供算力，GMI 必须先从硬件厂商采购英伟达 GPU 服务器。但由于 Fireworks AI 并非投资级企业，银行拒绝为这笔采购提供贷款。GMI 创始人兼首席执行官 Alex Yeh 表示，公司随后将这一问题反馈给了英伟达，并于今年年初开始讨论一种全新的融资模式，他将这一模式形容为一种“保险产品”。根据这一机制，如果 GMI 的客户停止支付费用，英伟达将承担相应风险并介入处理；作为交换，GMI 会将部分收入分成给英伟达。GMI 向《Business Insider》表示，公司计划利用这一融资模式投资 5 亿美元（IT之家注：现汇率约合 33.88 亿元人民币），进一步扩建 AI 基础设施，并称自己是亚洲首批采用这一模式的 AI 云服务商之一。这一模式不仅能帮助 AI 云服务商获得原本难以取得的银行贷款，也能让英伟达能够销售更多 GPU 产品。Alex Yeh 表示，近年来持续上涨的高带宽内存（HBM）等存储器价格，也是这一融资模式能够成立的重要因素之一。Fireworks AI 本月宣布，公司完成了 15 亿美元融资，估值达到 175 亿美元（现汇率约合 1185.92 亿元人民币）。不过，Alex Yeh 表示，截至目前，银行仍普遍将前沿 AI 初创公司视为非投资级客户，虽然他也指出，这种情况正在快速发生变化。帮助英伟达拓展客户群除了 GMI 外，Firmus 和 Sharon AI 等 AI 云服务商也是首批采用英伟达这一新融资模式的企业之一。英伟达于今年 7 月正式公布了这一商业模式。Sharon AI 联合创始人兼首席执行官 James Manning 表示，这意味着公司与英伟达的关系已经从传统的供应商合作，升级为更加长期的战略合作伙伴关系。The Futurum Group 首席技术顾问 David Nicholson 认为，这项策略有助于英伟达进一步扩大客户群，不再过度依赖大型云计算厂商，因为不少云巨头如今都在研发自己的 AI 芯片，与英伟达形成竞争。Circular Technology 全球研究与市场情报主管 Brad Gastwirth 则表示，这一模式十分聪明，但也可能成为投资者眼中的一个“黄色警示信号”。他认为，关键在于英伟达是否能够谨慎筛选合作对象，仅支持少数优质 AI 云服务商，以控制自身承担的财务风险。再次引发“循环融资”质疑这一融资模式也让人联想到英伟达此前与 CoreWeave、OpenAI 等公司的合作关系。在这些合作中，英伟达既是供应商，也是投资方，两种身份同时存在，因此曾遭到外界“循环融资”（Circular Financing）的质疑。AI 云服务商 Eleveight AI 联合创始人兼首席执行官 Arman Aleksanian 表示，外界对“循环融资”的担忧并非毫无道理，但前提是融资支持了并不存在真实需求的 GPU 采购。他说：“我认为，只有当循环融资人为制造了原本不存在的市场需求时，它才是真正危险的。如果这些 GPU 最终都能被真实付费客户持续使用、保持高负载运行，那么融资机制实际上已经完成了它应有的作用。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/205.htm", "publishedAt": "2026-07-22T09:37:59+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "荣耀 MagicOS 10 系统 7 月版本最后一批机型预计今晚 9 点推送升级，覆盖 Magic5/6 等系列", "summary": "IT之家 7 月 22 日消息，荣耀产品维护与升级 @荣耀小芳哥 今日发布推送预告，宣布 MagicOS 10 系统的 7 月更新版本最后一批机型正在做最后的测试冲刺，预计今晚 9 点推送版本。▲ IT之家开箱：荣耀 Magic6 系列图赏本次更新覆盖的机型如下：荣耀 Magic V3、荣耀 Magic Vs3、荣耀 Magic V2 系列、荣耀 Magic Vs2、荣耀 Magic Vs 系列、荣耀 Magic V Flip2、荣耀 Magic V Flip、荣耀 Magic6 系列、荣耀 Magic5 系列、荣耀 400 系列、荣耀 300 系列、荣耀 200 系列、荣耀 100 系列、荣耀 GT、荣耀 90 GT、荣耀 WIN Turbo、荣耀 Power2、荣耀 Power、荣耀 X80i、荣耀 X70 系列、荣耀 X70i、荣耀 X60GTIT之家整理 MagicOS 10 系统的 7 月版本更新内容如下（升级路径：设置 &gt; 系统和更新 &gt; 软件更新 &gt; 右上角三个点 &gt; 升级尝鲜）：丝滑动效最近任务样式 (堆叠模式) 新增支持点击应用启动 / 左右滑动列表 / 连续删除任务等多个场景的并行响应操作，让您的任务管理体验更流畅。优化最近任务样式 (堆叠模式) 回弹效果、滑动体验，交互体验更丝滑。新增支持桌面卡片启动退出连续打断的并行响应操作，让您的桌面操作更随心、更流畅。新增支持桌面滑动过程中点击卡片的并行响应操作，让您的桌面操作更跟手。三方应用内页面转场增加一镜到底效果，从哪儿回哪儿去，转场更丝滑。本次支持 6 个应用，小红书、哔哩哔哩、拼多多、爱奇艺、腾讯视频、闲鱼控制中心长按打开应用转场支持一镜到底效果，转场体验更丝滑。侧边栏点击启动应用到悬浮窗过渡动画支持一镜到底效果，转场过渡更流畅。mini 窗横竖屏旋转时，支持一镜到底效果，转场过渡更流畅。灵动胶囊新增支持滑动交互，支持滑动隐藏胶囊、切换多胶囊显示顺序，隐藏后再次滑动即可快速唤回，让胶囊管理更随心、更高效。新增支持多胶囊场景下自定义堆叠样式，让您的胶囊显示更个性。新增 YOYO 帮记接入灵动胶囊，会议前灵动胶囊推荐开启，会议中灵动胶囊可便捷控制录制状态。优化灵动胶囊展开态下拉悬浮窗动效。优化荣耀分享、耳机连接等部分场景的视觉效果，让您的胶囊体验更具活力与质感。锁屏新增支持 3D 照片锁屏，晃动设备感受身临其境，让您的锁屏界面更具个性与活力。锁屏小组件新增蓝牙耳机电量、世界时钟、计时器、秒表、YOYO 帮记、百度搜索、百度扫一扫、小红书、扇贝单词、番茄 ToDo 等场景，关键功能一键直达，信息呈现更高效。锁屏小组件新增支持在区域内自定义位置，搭配壁纸排布更自由，让您的锁屏界面更具风格。荣耀 AI &amp; YOYOYOYO 新增支持一语微信功能，支持通过语音指令直接发送微信消息或发起音视频通话，无需繁琐操作，让您的沟通更高效，情感传递更便捷。YOYO 智能体版本更新至 90.10.30.063 及以上，微信版本更新至 8.0.72 及以上YOYO 新增漫画故事玩法，一键将照片转化为漫画章节，支持单图或多图生成并自动添加对话框，让生活瞬间化作精彩剧情，每一帧都值得被连载。YOYO 新增 Live 盲盒玩法，一拍、二传、三开盲盒，动态惊喜即刻呈现，让您的朋友圈互动体验全面升级，社交分享更具趣味与吸引力。YOYO 智能体版本更新至 90.10.29.0303D 照片新增 3D 空间效果查看与动态照片转换导出功能，一键赋予静态照片立体动感，沉浸式视觉体验触手可及，让您的珍贵瞬间更有生命力。智慧互联新增远程协助应用，一键连接亲友设备解决用机难题，即时响应与贴心指导触手可及，让您的远程支持 const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
</body>
</html>
