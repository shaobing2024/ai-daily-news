const DATA = {"date": "2026-07-22", "generatedAt": "2026-07-22T08:26:32Z", "attribution": {"source": "中文科技媒体 RSS 聚合"}, "sourceList": ["量子位", "IT之家", "InfoQ 中文", "爱范儿", "开源中国"], "lead": "", "isFallback": false, "sections": [{"label": "模型发布/更新", "items": [{"title": "研究人员利用 OpenAI GPT-5.6 Sol Ultra 模型，挖掘出 WordPress 重大漏洞“wp2shell”", "summary": "IT之家 7 月 22 日消息，网络安全公司 Searchlight Cyber 发文，透露公司借助 OpenAI 的 GPT-5.6 Sol Ultra 模型，仅花费约 10 个小时便发现了 WordPress 中存在的一项重大漏洞，目前相应漏洞已被命名为“wp2shell”，编号为 CVE-2026-63030，CVSS 评分达 9.8 分。IT之家参考报告获悉，此次漏洞挖掘行动源于 Searchlight Cyber 研究员 Adam Kues 对新推出 GPT-5.6 Sol Ultra 进行的能力测试。Adam Kues 要求 GPT-5.6 Sol Ultra 模型在一份已经移除 Git 历史记录、仅保留源代码的 WordPress 系统环境中展开分析，利用 4 个 AI 智能体协同工作 6 小时进行代码审查，目标是从环境中寻找“能够从未认证状态一路触发直至执行远程代码（RCE）”的漏洞利用链。为了避免 AI 模型通过已有资料“作弊”，Adam Kues 特别限制模型不得查看代码变更记录，也禁止联网比对已经修复漏洞的版本，而是要求其完全依靠源码分析发现问题。测试结果显示，GPT-5.6 Sol Ultra 在数小时内便发现了一个未经身份验证即可触发的 SQL 注入漏洞，并在后续约 4 小时内进一步分析出如何利用该漏洞升级为完整的远程代码执行（RCE）攻击方式。整个过程大约消耗了研究人员 ChatGPT 当周 50% 的使用额度，按照每月 200 美元（现汇率约合 1355 元人民币）的订阅方案计算，发现 wp2shell 漏洞的实际成本约为 25 美元（IT之家注：现汇率约合 169.4 元人民币）。此次事件再次显示，随着 AI 代码分析和漏洞挖掘能力快速提升，未来安全研究人员与攻击者都可能利用 AI 大幅降低发现高危漏洞的门槛。对于软件开发者而言，如何在 AI 辅助开发环境下提升代码安全审查能力，也将成为新的安全挑战。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/122.htm", "publishedAt": "2026-07-22T08:18:49+00:00"}, {"title": "成都：推动整车企业加快 L3 级以上智能网联汽车整车研发量产", "summary": "IT之家 7 月 22 日消息，成都市人民政府办公厅今天（22 日）发布《成都市深入实施“人工智能 +”行动方案》，《行动方案》提出，加强通用技术研发，开展融合感知、行驶决策、车辆精准控制等核心关键技术攻关，持续补齐技术短板。聚焦智能网联系统核心环节，重点开发智能座舱、操作系统、车载终端等关键软硬件产品，夯实产业发展支撑。依托人工智能技术深度融入整车全流程研发升级，推动整车企业加快 L3 级以上智能网联汽车整车研发量产。IT之家获悉，具身智能方面，《方案》提出，攻关多模态大模型、空间大模型等关键算法，研发电子皮肤、灵巧手等核心部件产品，发展具身智能机器人整机制造企业。打造具身智能训练场、中试平台、场景验证平台，集成仿真试验、数据集供给等功能。推动智能机器人大规模应用，建立发布机制，推进标杆场景开放，开展供需对接会，加速首发首试首用，推动特色化发展。新能源方面，《方案》提出，鼓励能源领域专业大模型创新，全面增强电网感知、预测和智能调控能力，加快建设智能电网，布局可控核聚变、氢能等细分领域创新平台。支持能源企业开放高价值应用场景，推动新能源车、充换电设施等终端设备参与分布式能源协同。推进减污降碳智能化发展。构建算电协同发展机制，推动算力和电力深度融合。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/092.htm", "publishedAt": "2026-07-22T07:55:36+00:00"}, {"title": "马斯克：SpaceX 的工程数据将被用于训练 Grok 大模型", "summary": "IT之家 7 月 22 日消息，埃隆 · 马斯克当地时间周二表示，SpaceX 将把公司内部的工程数据用于 Grok 下一代大模型的训练。马斯克在 X 平台发文称，SpaceX 积累的大量“世界一流工程数据”将被用于 Grok 的补充训练，但涉及美国武器出口管制法规限制的内容将被排除在外。他提到，此次训练属于所谓的“2T run”，意味着模型规模约为 2 万亿参数，相比目前正在推出的 Grok 4.5，参数量几乎翻倍。马斯克所说的受限制数据主要涉及美国《国际武器贸易条例》（ITAR）管辖范围内的技术资料。该法规限制与国防和航天硬件相关技术数据向外输出。这意味着，与 SpaceX 梅林（Merlin）和猛禽（Raptor）发动机推进系统相关的核心技术，以及火箭制导和控制系统等敏感信息，预计不会用于模型训练。不过，制造工艺、材料科学以及 Starlink（星链）硬件设计等数据则有望纳入训练数据集。今年 6 月，SpaceX 在纳斯达克上市时，便将 Grok 以及 xAI 的 Colossus 超级计算机作为公司 AI 战略的重要组成部分向投资者进行展示。上市几天后，SpaceX 又以全股票交易方式完成了对 AI 编程初创公司 Cursor 的收购，交易规模达到 600 亿美元（IT之家注：现汇率约合 4066.01 亿元人民币）。这笔交易让 xAI 获得了企业级软件分发渠道，同时也能够持续获取真实开发者数据用于模型训练。7 月 8 日发布的 Grok 4.5 已部分采用 Cursor 提供的数据进行训练。马斯克当时表示，Grok 4.5 的整体能力大致可与 Anthropic 的 Opus 4.7 相媲美，但运行速度更快、成本也更低。将 SpaceX 的工程数据用于下一代 AI 模型训练，也符合马斯克一直以来在旗下各家公司推动的数据协同策略。其中，特斯拉提供真实世界驾驶数据和制造经验，X 平台提供海量对话数据，而如今 SpaceX 则将自 2002 年成立以来积累的航空航天工程数据纳入训练体系。马斯克并未公布这款新模型的正式发布时间，外界普遍将其称为 Grok 4.6。他此前透露，这一规模达 2 万亿参数的模型目前已经进入最后训练阶段，预计将在本周完成训练。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/090.htm", "publishedAt": "2026-07-22T07:54:09+00:00"}, {"title": "AI 侵蚀流量：Reddit 重新评估与谷歌合作，路透社等考虑屏蔽爬虫", "summary": "IT之家 7 月 22 日消息，《华尔街日报》当地时间 21 日报道称，随着人工智能搜索逐步侵蚀在线媒体流量，媒体业者正重新考虑与 Google（谷歌）的合作关系。Reddit 此前曾在 2024 年与谷歌达成一项每年 6000 万美元的内容模型训练授权协议，但网民现在正逐步以 AI 搜索替代在 Reddit 论坛翻找内容，导致 Reddit 正在评估是否与谷歌续签这份即将结束的合同。图源：Pexels类似情况也发生在更传统的媒体上：路透社、今日美国考虑阻止谷歌的内容爬取机器人；Politico 员工曾考虑设置注册墙等反自动化流量举措；《经济学人》持续积极讨论退出 AI 搜索的可能性。与此同时，《时代》正在尝试一种新策略：在内容中隐藏普通读者不可见的广告，希望人工智能爬虫机器人能采集到广告内容，帮助投放方触达潜在客户。相关阅读：《互联网史上首次：Cloudflare 称机器人请求流量已超人类》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/087.htm", "publishedAt": "2026-07-22T07:51:34+00:00"}, {"title": "准确率最高 92%：英伟达推出 SVD 服务，可识别 AI 生成视频", "summary": "IT之家 7 月 22 日消息，英伟达昨日（7 月 21 日）发布博文，宣布推出合成视频检测器（Synthetic Video Detector，简称 SVD）服务，识别 AI 生成视频的准确率高达 92%。SVD 服务目前已整合到英伟达推理微服务（NIM）服务中，通过逐帧检查视频，来分辨视频是否由 AI 生成。在技术实现方面，英伟达 SVD 服务将视频拆分为分辨率为 504x504 的裁剪帧，再将这些帧交由 Meta 开发的两个视觉变换器模型 DINOv2 和 DINOv3 处理。系统会为每一帧图像的空间特征给出一个 0 到 1 之间的分数，0 代表完全真实，1 代表完全伪造。最终，通过对所有帧的得分进行平均，SVD 会生成一个百分制评分，用以判定视频的真实性。在性能表现上，SVD 的准确性受视频压缩率影响。基准测试显示，检测未经压缩的视频时，其准确率可高达 92%。在 15% 压缩率下，准确率降至 87%，而在 50% 的压缩率下，SVD 仍然能维持 82% 的准确率。处理速度方面，SVD 作为微服务拥有极低的延迟。在 Nvidia RTX GPU 上处理一段 1080p 视频仅需 22 毫秒，在工作站型号上则需 30 毫秒。IT之家查询该网站，附上相关测试截图如下：官方合成视频示例官方真实视频示例", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/086.htm", "publishedAt": "2026-07-22T07:50:33+00:00"}, {"title": "OpenAI 旗下智能体产品用户总数破千万，较本月初几乎翻倍", "summary": "IT之家 7 月 22 日消息，据彭博社 21 日报道，OpenAI 推出 ChatGPT Work 后，AI 智能体产品需求迅速攀升，为其追赶竞争对手 Anthropic 带来了新动力。目前，Codex 和 ChatGPT Work 的用户总数已经达到 1000 万，较本月早些时候几乎翻倍。Codex 主要用于编程，ChatGPT Work 则覆盖更广泛的工作任务。OpenAI 和 Anthropic 都在加快开发先进 AI 智能体，让 AI 能够代替用户处理更加复杂的任务。Anthropic 此前推出了与 ChatGPT Work 定位相近的 Cowork，希望把在 AI 编程工具领域取得的成功扩展至更多工作场景。OpenAI 于 2022 年底推出 ChatGPT，掀起了生成式 AI 热潮。IT之家从报道中获悉，目前 ChatGPT 每周用户超过 9 亿。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/074.htm", "publishedAt": "2026-07-22T07:40:42+00:00"}, {"title": "日企 Noetra CEO 直言：公司是日本 AI 突围最后的机会", "summary": "IT之家 7 月 22 日消息，据路透社报道，Noetra 是一家由日本政府支持、专注于开发面向物理人工智能（Physical AI）和机器人基础模型的公司。该公司首席执行官丹波弘伸（Hironobu Tamba）近日在接受采访时表示，对于希望提升关键技术自主供应能力的日本来说，Noetra 是日本的“最后机会”。Noetra 在成立第一年便获得了超过 3800 亿日元（IT之家注：现汇率约合 157.99 亿元人民币）的政府资金支持，同时还获得了包括软银、本田和索尼在内的 44 家企业的参与和支持。公司目前正在采购 2.75 万颗英伟达 Rubin AI 芯片，并计划于 2027 年 4 月启动 AI 基础设施建设，预计于 2028 年 6 月正式投入运营。丹波弘伸表示：“我们成功聚集了日本一直从事 AI 研究和开发的人才。”他坦言：“说实话，我认为这可能是我们的最后一次机会。”当前，中美两国正在人工智能领域展开激烈竞争。作为全球工业机器人制造强国，日本希望借助这一项目提升关键技术的自主可控能力，并获得更稳定的先进 AI 技术供应。丹波弘伸同时也是软银高管。他表示，Noetra 将为日本企业提供一个可靠、安全的基础模型平台，企业能够自行管理数据，从而更放心地开展 AI 应用开发。日本政府目前正积极推动多项关键技术项目，其中包括先进芯片代工企业 Rapidus，该公司计划生产全球最先进的半导体芯片。日本政府还提出，到 2040 年将在制造业、造船业、护理等多个领域部署 1000 万台具备人工智能能力的机器人，以推动产业智能化升级。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/066.htm", "publishedAt": "2026-07-22T07:32:36+00:00"}, {"title": "华为 AI 在复杂问题建模、长程推理等取新突破，小艺满分摘得 IMO 2026 金牌", "summary": "IT之家 7 月 22 日消息，华为官方今日宣布，在日前举办的 2026 年国际数学奥林匹克竞赛（IMO 2026）中，华为小艺以满分 42 分摘得 IMO 2026 金牌。华为官方表示，这体现了小艺 Agent 系统在代数、几何、数论与组合数学等领域的综合求解能力，也标志着华为 AI 在复杂问题建模、长程推理、工具协同与严格验证等关键方向已经取得新的突破。IT之家注：小艺是华为公司自主研发的 AI 智慧助手，基于最新的人工智能技术，提供 AI 知识问答、AI 写作、AI 文档阅读、文档助手、编码助手、鸿蒙代码生成等功能。目前小艺已适配网页 / 手机 / 平板 / 手表 / 智慧屏 / 车机 / 家庭中控 / PC / 耳机 / 音箱端使用。今年 6 月，华为小艺 Claw 接入开源盘古 openPangu 2.0 Pro 模型，可重点提升鸿蒙系统级任务执行能力。据介绍，openPangu 2.0 模型更亲和昇腾算力，单卡吞吐率可达其他业界主流开源模型的 2 倍。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/058.htm", "publishedAt": "2026-07-22T07:26:21+00:00"}, {"title": "AI 圈今天最大的瓜：GPT-6 越狱攻击，被 GLM 5.2 揪出了", "summary": "「GPT-6」为了考试作弊，黑进了别人的服务器#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672746?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-22T07:06:04+00:00"}, {"title": "微软被曝正评估将 Kimi K3 接入 Copilot，推理成本年降 6 亿美元", "summary": "IT之家 7 月 22 日消息，The Information 周一报道称，微软正在内部测试月之暗面 Kimi K3 大模型，并评估将部分 Copilot AI 助手推理请求从 OpenAI、Anthropic 模型迁移至 Kimi K3 的可行性。微软内部估算，如果未来将部分 Copilot 请求切换至 Kimi K3，每年最多可能减少约 6 亿美元（IT之家注：现汇率约合 40.66 亿元人民币）的云基础设施成本。不过，微软尚未作出最终模型替换决定。目前微软是 OpenAI 的主要投资方和独家云服务提供商，目前 Copilot 产品大量使用 OpenAI GPT 系列模型。同时，微软近年来也在探索多模型策略，以降低对单一模型供应商的依赖，并优化人工智能服务运行成本。据知情人士透露，微软正在与月之暗面合作测试 Kimi K3。该模型在代码生成、逻辑推理等任务中的表现被认为具有竞争力，同时推理成本低于部分 OpenAI GPT-4 系列和 Anthropic Claude 系列模型。AI 推理成本已经成为大模型商业化落地的重要因素。以 Copilot 等 AI 助手为例，大量用户请求会持续消耗计算资源和电力。因此，对于代码补全、基础问答等非核心复杂任务，采用成本更低的模型可能成为降低运营支出的方式。报道称，微软预计将在未来两个月内完成初步技术验证，并根据测试结果制定后续方案。不过，微软若要实际迁移部分 Copilot 流量，仍面临技术和合规挑战。报道指出，Kimi K3 虽然在部分代码任务中表现较好，但在复杂推理、多轮对话以及安全能力方面，是否能够达到 Copilot 企业用户需求，仍需要大规模测试验证。此外，Copilot 当前架构与 OpenAI API 接口、模型微调工具链存在较深绑定。如果切换至其他模型，微软可能需要调整提示词工程、输出解析以及错误处理等系统组件。由于微软是一家美国科技公司，将部分用户请求交由中国 AI 公司模型处理，还需要考虑不同地区的数据主权要求以及出口管制相关因素。一名前微软高管表示，降低成本的收益需要与用户体验进行权衡，如果模型质量下降导致用户流失，节省的成本可能无法抵消影响。报道指出，微软目前关注 Kimi K3 的重点并非其是否具备最先进能力，而是其在特定场景中的成本效率。这一趋势也反映出大模型市场竞争正在发生变化。随着企业用户更加关注模型部署成本，AI 服务采购正在从单纯追求最高性能转向性能、成本和稳定性的综合平衡。微软此前已经通过 Azure AI 平台接入 Meta Llama、Mistral 等第三方模型。但如果 Copilot 部分核心产品流量采用中国模型供应商方案，仍需要更高层级的决策。报道称，微软 CEO 萨提亚 · 纳德拉（Satya Nadella）近期多次强调成本效率和供应商多样性，这被认为与微软降低 AI 服务成本、减少供应商依赖的方向一致。不过，微软与 OpenAI 之间的独家云合作关系以及长期技术合作并不会因此轻易改变。分析人士认为，即使微软最终采用 Kimi K3，也更可能应用于非核心、低敏感度任务，占 Copilot 总请求量的比例可能有限。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/029.htm", "publishedAt": "2026-07-22T06:50:40+00:00"}, {"title": "消息称字节旗下 PICO 创始人周宏伟将卸任，不影响 PICO 既定战略方向、研发工作和产品计划", "summary": "IT之家 7 月 22 日消息，据智能涌现消息，字节旗下 XR（扩展现实）业务 PICO 近日完成业务负责人调整：由于个人规划原因，创始人周宏伟不再担任 PICO 负责人，李晓凯接任负责人，全面负责 PICO 业务。报道称，此次管理交接不会影响 PICO 既定的战略方向、研发工作和产品计划。今年，PICO 将按计划带来全新的混合现实（MR）产品。字节内部人士表示，公司对 XR 长期价值的判断没有变化，将继续支持 PICO 推进核心技术探索和产品创新。据IT之家此前报道，今年 3 月，字节跳动 PICO-XR 官方预告称，将在今年推出全新旗舰 XR 产品 Project Swan（内部代号）：搭载新一代 MicroOLED 显示屏（像素密度接近 4000PPI，约为智能手机的 9 倍），光学方案能实现平均 40PPD，中心最优区域超 45PPD。相关阅读：《字节跳动 Pico“Project Swan”头显设计曝光：背面头带类似苹果 Vision Pro、正面酷似三星 Galaxy XR》《PICO 马杰思谈“Project Swan”XR 旗舰产品：正处于研发的最后阶段，预计今年全球发售》《字节跳动 PICO OS 6 预告发布，今年还将推出全新 XR 旗舰产品“Project Swan”》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/027.htm", "publishedAt": "2026-07-22T06:44:57+00:00"}, {"title": "消息称 OPPO、vivo 拒绝三星电子 2026Q3 存储报价", "summary": "IT之家 7 月 22 日消息，界面新闻昨日援引行业人士消息称，OPPO 与 vivo 在前不久拒绝了三星电子的 2026 年第 3 季度存储报价。这份报价相较今年 Q1、Q2 的价格涨幅有限。总的来说，智能手机等下游产线制造商开始出现对存储半导体价格的明显抵制情绪，不愿再为屡创新高的存储成本买单。不过从短期来看，即使下游品牌选择放缓存储器库存补充速度，移动端存储半导体供小于求的整体态势并不会发生改变。尤其是在 DRAM 领域，NVIDIA Grace / Vera CPU 等服务器芯片带来了大量的 LPDDR 需求，挤占了原本应被分配至智能手机的产能。另一方面，由于各类 NAND 闪存产品共享底层技术基础，相关产能重分配至 AI 方向也相对容易。相关阅读：《消息称三星电子目标 2026Q3 通用 DRAM 均价环比上涨 20%》《SK 海力士 CEO 郭鲁正：内存行业明年将迎来史上最严峻局势，2030 年以后可能仍然供不应求》《威刚陈立白：现阶段讨论 AI 泡沫言之过早，未来十年最短缺的资源是内存和电力》《超 60% 的 V-NAND 产能给英伟达，三星加速 V9、V10 闪存布局》《TrendForce 预测：NAND 闪存紧缺压力有望 2027H2 缓解》延伸阅读根据IT之家此前报道，自 2025 年下半年起，主要存储芯片制造商已开始削减 NAND 闪存产能以推动价格上涨，同时人工智能大模型应用的发展也导致数据中心对存储芯片的需求激增，进一步加剧了供应紧张。存储芯片是手机的关键组件，其成本在整机中占比通常为 10%-30%，在某些高配置机型中占比可超过 20%。价格的上涨已对终端产品产生传导效应。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/022.htm", "publishedAt": "2026-07-22T06:40:31+00:00"}, {"title": "腾讯发布首个自研创意智能体 Miora", "summary": "腾讯宣布旗下首个创意智能体 Miora (腾讯设计妙境) 已正式全量上线，新用户注册即可获得 1000 积分。 根据介绍，Miora 是一个由多 AI Agent 协作驱动、会记住你创作方式的多模态创意智能体工作室；基于与 WorkBuddy 同源的智能体架构，专为创意领域打造，零门槛使用。 从一份需求开始，Miora 能够理解目标、规划流程，并...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476728", "publishedAt": "2026-07-22T06:37:38+00:00"}, {"title": "地平线、大众汽车深化 AI 合作，L3 级自动驾驶能力最快明年下半年交付", "summary": "IT之家 7 月 22 日消息，地平线与大众汽车集团今天（22 日）宣布，通过 CARIAD 与地平线的合资公司酷睿程 (CARIZON) ，大众汽车集团将进一步深化与地平线在 AI 基座大模型领域的技术合作。根据协议，酷睿程将基于白盒授权模式，依托地平线先进的 AI 基座大模型能力，自主开发并加速构建大众汽车集团中国统一的 AI 驾驶解决方案。IT之家从官方的公告获悉，地平线的 AI 基座大模型将与酷睿程在研的系统级芯片 C7H、以及 GAIA 世界模型数据平台紧密协同，全面赋能大众汽车集团 L3 和 L4 级自动驾驶能力落地，并为未来乘用车和自动驾驶出租车 (Robotaxi) 的应用场景奠定技术底座，同时也将推动量产的全场景高级驾驶辅助方案持续迭代升级。该技术体系将与大众汽车集团首个本土开发的区域控制电子电气架构 ——CEA 架构进行深度融合，可灵活适配多个整车平台并部署于丰富的车型上，在集团面向中国及部分国际市场的产品矩阵中更广泛应用。酷睿程全场景高级驾驶辅助方案业已进入量产阶段，进一步支持城区领航辅助驾驶能力，于今年第三季度起陆续搭载于大众汽车集团在华三家合资企业的七款全新电动化车型，并将自明年起逐步拓展至更广泛的 CEA 序列产品矩阵。按照规划，大众汽车集团 L3 级自动驾驶能力最快将于 2027 年下半年启动交付。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/019.htm", "publishedAt": "2026-07-22T06:23:35+00:00"}, {"title": "DeepSeek-v3 671B 测试：英伟达 Blackwell GB300 刷新 MoE 预训练世界纪录，每 GPU 算力 1648 TFLOPs", "summary": "IT之家 7 月 22 日消息，英伟达昨日（7 月 21 日）发布博文，宣布其 Blackwell GB300 刷新 MoE 预训练的世界纪录，每 GPU 算力达 1648 TFLOPs（每秒万亿次浮点运算）。IT之家注：MoE（混合专家模型）是一种机器学习模型架构。它将大型模型分割为多个更小的“专家”子网络，每次推理或训练时仅激活其中一部分。该架构旨在以更低的计算成本实现更大规模的模型容量，常用于大语言模型以提升效率。模型预训练是指在大规模无标注数据集上，利用自监督学习方法让模型初步掌握通用的语言规律、视觉特征或常识。在最新博文中，英伟达表示：使用 256 块 GPU 预训练 DeepSeek-v3 671B 模型，GB300 NVL72 实现了每 GPU 吞吐 1648 TFLOPs 的全新世界纪录。在相同训练任务上，GB300 NVL72 用更少的 GPU 硬件，达到了相同的性能。英伟达表示在过去 6 个多月时间里，通过模拟超过 25 万种不同配置，为 Blackwell 摸索发现了 38 项重大优化方案，累计进行了 140 万小时的 GPU 优化测试。相比较 2025 年 11 月的预训练测试（1088 TFLOPs）结果，GB300 NVL72 系统性能优化提升 50%。与上一代 GB200 每 GPU 606 TFLOPs 的成绩相比，GB300 实现了约 3 倍的性能跃升。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/018.htm", "publishedAt": "2026-07-22T06:20:55+00:00"}, {"title": "消息称三星考虑按 200 亿欧元估值向 Mistral AI 投资 10 亿欧元", "summary": "IT之家 7 月 22 日消息，英国《金融时报》早些时候报道称，三星正考 const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
