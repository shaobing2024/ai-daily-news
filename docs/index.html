偏好进行调整。”人类驾驶员并不会在所有情况下做出完全相同的选择，但过去的 FSD 更倾向于学习一种统一的驾驶方式。未来，FSD 很可能会针对同一种场景，学习多种不同的处理方式。最明显的例子就是停车。不同人停车习惯完全不同。有些人喜欢倒车入库，有些人习惯车头朝前驶入。显然，不同用户的需求并不一样。未来，FSD 可能会学习这些不同的停车行为。当系统掌握多种停车模式后，它可以观察用户平时的操作习惯，并匹配最接近用户偏好的驾驶模型。这种个性化能力不仅会应用于停车，也会覆盖更多常见驾驶场景，让 FSD 能够适应不同驾驶风格。FSD 自动退出高载客车道、进入普通车流的问题，多年来一直受到车主抱怨。实际上，特斯拉车辆目前已经提供了高载客车辆（HOV）车道偏好设置，用户可以在：“控制 &gt; 导航 &gt; 使用 HOV 车道”中进行调整。用户也可以通过语音指令快速开启或关闭该功能，例如说“打开 HOV 车道”。而近期更新进一步简化了这一设置，将其分为三个选项：“自动（Auto）”会通过车内摄像头判断用户是否满足时间、地点以及乘员数量要求；“是（Yes）”会强制车辆在存在 HOV 车道时使用该车道；“否（No）”则完全禁止车辆进入 HOV 车道。未来，如果 FSD 能够根据用户行为进行调整，那么当驾驶员多次在类似情况下接管方向盘时，系统就可以从这些行为中学习，并在之后采取不同策略。这一方向也延续了马斯克此前透露的信息：未来版本的 FSD 将学习用户的停车习惯，让车辆在日常地点，例如家里、办公室或孩子学校附近，总能停到用户喜欢的位置。最近，特斯拉推出了一个略显“固执”的 FSD 接管反馈菜单。每当驾驶员从 FSD 手中接管车辆时，该菜单都会出现，让用户反馈接管原因。这些反馈数据可能正在帮助特斯拉判断，哪些问题最需要优先解决。通过学习驾驶员为何接管车辆，FSD 可以逐渐减少这些错误行为。目前，停车是导致 FSD 被用户接管的最常见原因之一。因此，马斯克正在暗示的新能力，很可能首先会改善停车体验。预计特斯拉将在今年晚些时候或明年初推出下一代消费者版 FSD 大版本 ——FSD v15。该版本预计将带来约 10 倍规模的模型参数提升，进一步增强自动驾驶能力。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/642.htm", "publishedAt": "2026-07-19T02:36:34+00:00"}, {"title": "安谋科技发起“开源 AIOS 联盟”，合作伙伴包含瑞芯微、紫光展锐、全志等", "summary": "IT之家 7 月 19 日消息，安谋科技在 2026 世界人工智能大会期间宣布发起“开源 AIOS 联盟”，目前已吸引超 20 家生态伙伴入驻，涵盖芯片与 IP、大模型、AI 硬件、具身本体、软件方案、高校、科研等国内 AI 产学研全链路。IT之家从安谋科技公众号了解到，开源 AIOS 系统聚焦 AI 模型能力、传感与运控、AI 任务编排、记忆系统四大技术模块，有望重塑基于感知的生成式交互和具身互动体验，面向新一代 AI 产品。目前，“开源 AIOS 联盟”已有 20 家生态合作伙伴，其中牵头单位包括芯发科技、紫光展锐、瑞芯微、辉羲智能、此芯科技、全志科技等国内领先的芯片厂商，以及面壁智能、RT-Thread、AutoCore 等本土模型及软硬件方案提供商。此外，清华大学智能产业研究院、香港科技大学物理 AI 研究中心等顶尖高校及科研机构也作为学术伙伴同步加入联盟。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/628.htm", "publishedAt": "2026-07-19T01:19:32+00:00"}, {"title": "荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 发布，8 月 Robot Phone 首发内核", "summary": "IT之家 7 月 19 日消息，荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 已在 2026 世界人工智能大会上正式发布。荣耀手机官方昨晚发布了 AgenticOS 的核心亮点一图知。据介绍，荣耀 AgenticOS 系统支持意图驱动、自然交互、主动智能、天生跨端四大特征，拥有行业首个系统级 Agent 架构，支持全局多智能体协同、全场景自适应沉淀和面向全场景智能体的自循环等能力。根据规划，8 月发布的荣耀 Robot Phone 将首发 AgenticOS 内核，而 Q4 发布的荣耀 Magic9 系列手机则会发布 AgenticOS 尝鲜版。据IT之家昨日报道，荣耀 Robot Phone 已正式开启预约，该机搭载第五代骁龙 8 至尊版芯片，其核心创新在于机身顶部集成了一套行业最小的四自由度（4DoF）钛合金机械云台系统。云台系统配备微型电机，体积比主流方案缩小 70%。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/621.htm", "publishedAt": "2026-07-19T00:30:21+00:00"}, {"title": "美国初创公司发布机器人 AI 模型 ACT-2，宣称在陌生家庭叠衣成功率超 99%", "summary": "IT之家 7 月 19 日消息，在家庭机器人竞赛中，最大的难题之一始终是让机器人进入陌生家庭后，依然能够完成各种家务，而无需针对每个家庭重新训练。如今，美国初创公司 Sunday Robotics 宣称，他们已经攻克了这一难关。当地时间周四，总部位于美国旧金山湾区的 Sunday Robotics 发布了新一代机器人 AI 模型 ACT-2，该模型将应用于旗下轮式家庭机器人 Memo。公司表示，在陌生家庭环境中进行测试时，即便面对此前从未专门训练过的衣物，Memo 的叠衣服成功率仍超过 99%。 Sunday Robotics 联合创始人兼 CEO Tony Zhao 在接受 Business Insider 采访时表示：“我认为，这项突破将大幅缩短家庭自主机器人的落地时间，2026 年有望成为这一行业的重要转折点。”长期以来，家庭机器人企业一直难以兼顾可靠性和适应能力。机器人或许能在实验室里完成一项任务，但一旦换到另一个家庭，或者遇到此前没有接触过的物品，就可能无法正常工作。例如，机器人如果只学会折牛仔裤，面对围巾时就可能束手无策。Sunday Robotics 表示，ACT-2 最大的优势就在于，它能够将在一个环境中学到的能力迁移到新的环境，从而避免为每一个家庭重新训练机器人大幅增加成本。今年早些时候，Sunday Robotics 完成了 1.65 亿美元融资，公司估值达到 11.5 亿美元（IT之家注：现汇率约合 78.02 亿元人民币）。与此同时，公司还提出了一套新的机器人行业评估标准，命名为 Solve。Tony Zhao 表示，目前机器人行业大量展示的视频演示都存在一个共同问题：外界往往不知道机器人尝试了多少次才成功，也不知道测试是在什么条件下完成的，因此不同公司的演示很难进行公平比较。他说：“每家公司的机器人、测试环境和测试物体都不同，很难判断行业到底有没有真正取得进步，就像拿苹果和橘子比较一样。”按照 Sunday Robotics 提出的 Solve 标准，机器人公司应明确说明机器人能够完成哪些任务、测试是在什么环境下进行，以及进入新环境后还需要多少额外训练或人工协助。目前，公司认为，稳定完成折叠衣物已经达到了 Memo 的第一个 Solve 能力标准。为了实现这样的可靠性，Sunday Robotics 采用了两阶段训练方式。第一阶段，机器人通过人类示范学习基本动作。公司自主研发了一款带有传感器的数据采集手套，志愿者佩戴手套完成各种日常家务，机器人便能学习这些动作。Tony Zhao 表示，这款手套制造成本约为 200 美元（现汇率约合 1357 元人民币），其结构和传感器布局与 Memo 的机械手几乎一致，因此可以更精准地将人类动作映射到机器人身上。第二阶段，则依靠 Sunday 自建的机器人测试平台不断进行自主练习。机器人利用已有知识不断尝试新任务，并通过不断纠错，在几分钟内快速提升完成任务的能力。Tony Zhao 表示：“Memo 在我们办公室里的表现，几乎可以完全复制到真实家庭环境中。”他透露，过去几个月，公司一直在员工家中以及 Airbnb 民宿中测试 ACT-2，以验证其在陌生环境中的适应能力。Sunday Robotics 成立于 2024 年，由 Tony Zhao 和联合创始人 Cheng Chi 创办。Tony Zhao 当时从斯坦福大学计算机博士项目退学创业，两人在硅谷一间黑客公寓里组建了最初的团队。之所以选择家庭机器人赛道，是因为家庭环境远比工厂更加复杂、凌乱且充满不可预测性。Tony Zhao 认为，如果机器人能够胜任家庭中的各种任务，那么距离实现物理通用人工智能（Physical AGI）—— 也就是能够像人类一样完成各种现实世界任务的 AI，就更近了一步。目前，Sunday Robotics 员工人数已经超过 100 人。公司早期投资人、风险投资机构 Conviction 合伙人 Sarah Guo 曾表示，她之所以投资 Sunday Robotics，是因为创始团队不仅拥有极强的科研能力，更像埃隆 · 马斯克一样，坚定地希望打造真正面向大众消费者的大规模产品，而不仅仅停留在实验室研究。与此同时，越来越多企业正在加速布局家庭机器人市场。由创业孵化器 Y Combinator 投资的 Weave Robotics 计划今年秋季开始在美国加州交付售价 7999 美元（现汇率约合 54270 元人民币）的轮式机器人 Isaac 1，其主要功能之一就是折叠衣物。另一家机器人公司 1X 则计划在同期推出售价约 2 万美元（现汇率约合 13.6 万元人民币）的人形机器人 NEO。特斯拉也正在推进 Optimus 人形机器人进入家庭市场。Sunday Robotics 计划于今年秋季启动 Beta 测试项目，让 Memo 进入部分家庭进行试用，不过 Tony Zhao 并未透露具体参与家庭数量。他表示，Memo 在用户家中将主要依靠自主运行。只有当用户需要帮助时，远程工作人员才会介入，就像 Waymo 自动驾驶汽车在特殊情况下由远程支持团队提供协助一样。不过，与不少机器人公司不同，Sunday Robotics 明确表示，不会利用这些远程协助过程收集用户家中的数据来训练 AI 模型。Tony Zhao 表示：“真正完全自主运行，才是建立用户信任的最好方式。我们并不是想借着远程操作者进入你的家里，偷偷收集数据，再用这些数据提升模型能力。”此前，Sunday Robotics 已展示过上一代模型 ACT-1，能够完成清理餐桌、将餐具放入洗碗机以及制作浓缩咖啡等任务。公司希望，ACT-2 能够让这些能力变得更加稳定可靠，而折叠衣物只是第一步。目前，ACT-2 还在学习吸尘、整理玩具、拉拉链以及制作咖啡等更多家庭任务，不过 Sunday Robotics 坦言，这些功能目前还没有达到足够稳定、可以正式投入使用的水平。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/617.htm", "publishedAt": "2026-07-19T00:06:14+00:00"}, {"title": "分析师：苹果 AI 策略“保守”反而是优势，可降低资本压力并驱动硬件升级", "summary": "IT之家 7 月 19 日消息，据科技媒体 Wccftech 昨天报道，BRI Wealth Management 分析师 Toni Meadows 认为，市场对苹果 AI 战略的看法已经发生改变，他们采取相对保守的策略不仅降低资本支出压力，还能够依托强大的服务业务开辟新收入来源，有望推动更多硬件升级需求。IT之家从原报道获悉，AI 热潮推动一众科技公司高歌猛进，同时也给整个行业带来极大不确定性。而在刻板印象中，苹果似乎并没有跟上 AI 的脚步，其生成式 AI 长期缺乏明显进展。直到最近，该公司才推出 AI Siri 并全面升级 Apple 智能，希望借此弥补不足。Toni Meadows 表示，市场对苹果 AI 策略的看法已经产生变化。过去，该公司因为没有投入巨额资金开发先进 AI 模型而被视为落后者。但如今，苹果反而不需要像其他超大规模云计算公司一样，不断砸下数十亿美元维持 AI 竞争力，因此承受的资本支出压力明显更小。与此同时，苹果的“软硬件一体”策略可以将其 AI 能力整合到各种自家服务中，并进一步促使用户升级设备。其生态系统黏性、硬件产品都有机会实现 AI 商业化，让市场对苹果盈利更具持续性信心，而不是单纯靠 AI 概念炒作。其他分析师也认为，苹果掌握着大量个人数据，一旦 AI Siri 能够更深入地访问这些数据，将有机会创造巨大商业价值。不过考虑到苹果的隐私优先文化，外界预计该公司短期内不会让 Siri 获得更多个人数据，因此苹果未来仍将主要依靠服务、硬件业务推动业绩增长。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/613.htm", "publishedAt": "2026-07-18T23:42:36+00:00"}, {"title": "飞机遇到颠簸时安全带指示灯总是“亮得太晚”？AI 正改变这一切", "summary": "IT之家 7 月 19 日消息，当飞机突然遭遇气流颠簸时，你可能会被猛地从座椅上弹起，不禁疑惑：为什么安全带指示灯还没亮？或者为什么机长总是在飞机已经发生剧烈颠簸后，才打开安全带提示？看起来像是飞行员反应慢了，但实际上，这个决定远比想象中复杂。拥有 40 多年飞行经验的美国航空公司机长 Will Ware 表示，何时开启安全带指示灯，是一个需要综合权衡安全、乘客体验以及客舱运营情况的决定。他说：“我们并不希望整个航程都一直亮着安全带指示灯，那样并不能提供良好的客舱服务体验。”如果过早开启提示灯，空乘人员的餐饮服务等客舱工作会受到影响；但如果开启得太晚，又可能让空乘人员和乘客面临受伤风险。真正困难的地方在于，湍流一直都是航空领域最难预测的现象之一。严重时，它甚至可能把没有系安全带的乘客或空乘人员直接抛向客舱顶部。据IT之家了解，造成湍流的原因很多，包括天气变化以及几乎没有任何预兆就会出现的晴空湍流。飞行员通常会综合参考天气预报、其他飞机的飞行报告、空中交通管制提供的信息以及自身经验来判断前方情况。不过，这些信息往往存在数据不完整、主观性较强或信息传递速度较慢等问题。如今，一些航空公司开始尝试利用 AI 和实时数据分析工具来预测未来的气流状况。Will Ware 正在参与推广的一套系统名为 SkyPath，目前已经被多家航空公司采用。他表示，AI 不会取代飞行员的判断，但确实大大提升了自己预测湍流的信心。SkyPath 会收集已经飞行在空中的飞机上传回的数据，例如飞机 iPad 接收到的天气信息，再结合其他气象数据，通过 AI 建立更加精确的湍流预测模型。目前，美国联合航空、日本航空以及公务航空公司 Silver Air Private Jets 等都在使用这一系统。SkyPath 表示，其 AI 模型能够清洗大量飞行数据，并以约 90% 的准确率预测未来 24 小时内的湍流情况。Ware 举例说：“我的 iPad 会弹出一条提示，告诉我 13 分钟后可能会遇到中度湍流。这样我就可以提前通知空乘人员，要求他们 10 分钟后全部坐下，然后再打开安全带指示灯，希望真正遇到湍流之前，所有人都已经安全坐好了。”他把 SkyPath 比作谷歌地图。就像无数车辆不断上传实时路况数据，最终形成整个道路交通状况一样，每架飞机也都在不断共享自己遇到的湍流信息，让后面的飞机获得更加准确的预测。Ware 表示，这项技术不仅可以提前预警即将出现的颠簸，也能够证明前方空气十分平稳，从而让飞行员更放心地关闭安全带指示灯。他说：“永远不会有一种工具能够百分之百准确告诉我们什么时候一定会发生湍流。很多乘客以为飞机有专门探测湍流的雷达，其实并没有。我们只是把各种信息综合起来，然后尽可能作出最好的判断。”SkyPath 并不是唯一的解决方案。日本全日空也已经部署了一套 AI 湍流预测系统。该公司表示，这套系统利用历史飞行数据和大气数据，预测准确率约为 86%。与此同时，国际航空运输协会（IATA）正与全球近 30 家航空公司合作，通过名为 Turbulence Aware 的平台共享湍流数据，并研究如何进一步整合 AI 技术。目前已有研究表明，这些新工具正在帮助飞行员作出更好的决策。日本航空 2025 年的一项研究发现，这套 AI 工具能够降低飞行员工作负担并提高飞行安全，不过研究也指出，如果东南亚地区更多航空公司加入数据共享，预测效果还会进一步提升。SkyPath 首席执行官 Maya Shpak 表示，公司分析了多家航空公司连续两年的运营数据后发现，即使全球报告的湍流数量总体增加，使用 SkyPath 的航班遭遇中度及以上湍流的次数仍减少了约 50%。此外，公司还分析了 180 起真实湍流事件，结果显示 79% 的事件发生前，系统其实已经掌握了相关湍流数据。这意味着，在大多数情况下，飞行员有机会提前打开安全带指示灯、调整飞行高度或改变航线。近年来，多起事故都说明了突发湍流带来的风险。2024 年，一架新加坡航空客机遭遇剧烈晴空湍流，多名没有系安全带的乘客和空乘人员被抛向机舱顶部，造成数十人受伤，并导致 1 名乘客死亡。事故发生前，安全带指示灯仅在几秒钟前才刚刚亮起。更早一年，一架德国汉莎航空航班在提供餐食过程中突然遭遇剧烈颠簸，导致 7 人住院，当时安全带指示灯并未开启。一些研究人员认为，随着全球气温不断升高，大气环境发生变化，尤其是晴空湍流等特殊类型湍流，未来可能会变得更加频繁。不过，尽管湍流一直是乘客最担心的问题之一，但现代民航客机从未因湍流本身而坠毁。一项来自帮助人们克服飞行恐惧的平台 Phobia Aero 的研究显示，25% 至 30% 的成年人在乘飞机时会感到不同程度的不安，其中 67% 的人认为最大的恐惧来源就是飞机颠簸。Ware 表示，这种害怕完全可以理解，因为人们在飞机上失去了控制感，但对于飞行员来说，湍流更像是汽车行驶在坑坑洼洼的道路上。他举例说，如果把一团揉成球的纸放进一杯果冻里，再不停晃动杯子，纸团虽然会来回碰撞，却不会掉出去，现代飞机在空气中的飞行原理与此类似。像波音 787 这样的现代客机采用柔性长机翼设计，能够在遭遇湍流时弯曲和变形，从而吸收并缓解外力。Maya Shpak 表示，AI 除了提升飞行安全外，也希望缓解乘客的焦虑。她说，不仅机组人员可以提前安排或暂停客舱服务、提前开启安全带指示灯，更重要的是，当乘客能够提前从机长那里知道即将发生什么时，会获得一种重新掌控局面的感觉，从而减轻飞行中的紧张情绪。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/611.htm", "publishedAt": "2026-07-18T23:29:28+00:00"}, {"title": "作家埃格斯受邀给 OpenAI 员工演讲，批评 ChatGPT 正夺走一代人的表达能力", "summary": "IT之家 7 月 19 日消息，去年，OpenAI 首席执行官萨姆 · 奥尔特曼（Sam Altman）曾邀请美国作家戴夫 · 埃格斯（Dave Eggers）为约 200 名 OpenAI 员工发表演讲。据IT之家了解，埃格斯著有大量小说、电影剧本和新闻作品，创办了文学杂志 McSweeney's，还创立了多所学校和多个支持作家及艺术发展的非营利机构。因此，人们原本或许会以为，他会向 OpenAI 员工分享如何保持高产创作，或如何在多个领域取得成功。然而，事实恰恰相反。据英国《金融时报》报道，埃格斯在演讲中毫不客气地批评了 OpenAI。他对员工表示：“ChatGPT 给教育工作者带来的影响是灾难性的。无论这是不是你们的本意，你们都让每一位教师的工作，比两年前变得困难了无数倍。请认真想一想这一点…… 如果学生开始用它来写作，那将是最大的悲剧。他们将永远学不会真正写作，他们自己的声音也会被夺走。他们将失去表达真实想法、讲述自己故事的能力。这无异于让一两代人都陷入沉默。”不过，奥尔特曼很可能早就知道这场演讲不会是一场“友好交流”。埃格斯的畅销小说《The Circle（圆圈）》本身就是对科技行业的一部尖锐讽刺作品，而他此前也曾公开批评 AI 生成的文字，称其不过是“毫无意义的模仿拼凑之作”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/607.htm", "publishedAt": "2026-07-18T23:12:58+00:00"}, {"title": "火速上架！空降即登顶Arena，Kimi K3当日登陆「模型广场」", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/NtfFE25blBHubhNNTmkJ?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T17:14:05+00:00"}, {"title": "英伟达 N1X 首个 Cinebench 2026 跑分曝光：微软 Surface Ultra 工程样机现身，单核成绩接近苹果 M3 Max", "summary": "IT之家 7 月 18 日消息，爆料者 @ExoticSpice101 今日放出了英伟达 N1X 芯片首个 Cinebench 2026 测试数据。测试平台是一台 Surface Ultra 工程样机，该机在测试中获得单核 540 分、多核 5771 分的成绩，单核性能据称“与苹果 M3 Max 相当”。当然，英伟达和微软尚未公布 N1X 的官方性能数据，该数据仅做参考。Cinebench 2026 是 Maxon 面向新一代处理器推出的基准测试工具，主要用于评估 CPU 在渲染等多线程计算任务中的性能表现。由于工程样机可能受到固件、驱动、电源策略以及散热设计影响，最终产品性能仍可能存在变化。N1X 是英伟达与微软推进 Windows on Arm 高性能 PC 生态的重要芯片之一。微软和英伟达已于 2026 年 5 月 31 日公布 RTX Spark 平台，该平台基于 Arm 架构 CPU，并结合英伟达 Blackwell GPU 技术，最高支持 20 个 Arm CPU 核心、6144 个 Blackwell RTX 核心以及最高 128GB 统一内存，目标面向开发者、创作者以及本地 AI 应用场景。微软公布的首款相关设备 Surface Laptop Ultra 也采用 RTX Spark 平台，官方表示该产品将搭载 NVIDIA Blackwell RTX GPU，并支持最高 128GB 统一内存和 CUDA 生态，用于本地 AI 模型运行、3D 渲染以及开发工作。微软此前公布的信息显示，该设备计划于 2026 年晚些时候上市。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/600.htm", "publishedAt": "2026-07-18T15:36:41+00:00"}, {"title": "英伟达 RTX Spark 首批 Win11 Arm 驱动发布：最高 6144 个 Blackwell 核心，N1X PC 预计今秋登场", "summary": "IT之家 7 月 18 日消息，英伟达已经发布了专为 RTX Spark PC 准备的 Windows 11 驱动程序，这意味着距离搭载 N1X 芯片的设备正式上市又近了一步。目前该驱动主要面向开发测试设备，并非普通消费者产品，但其中包含的硬件信息进一步确认了 RTX Spark 平台部分 GPU 配置。英伟达官网出现了一款版本号为 616.00 的 Windows 11 Arm64 原生驱动程序。对安装文件进行分析后发现，其中包含名为“nv_surface_woa.inf”的配置文件。Windows 驱动中的 INF 文件通常用于记录支持设备的硬件信息、设备 ID 以及安装参数，因此可以从中发现相关平台支持情况。该 INF 文件列出了多个英伟达设备 ID，其中包括两款 RTX Spark N1X GPU 配置。其中一款被标记为“NVIDIA RTX Spark N1X”，对应搭载 6144 个 Blackwell RTX 核心的版本；另一款则对应 5120 个 Blackwell RTX 核心版本。此外，文件中还出现了一个未明确命名的“NVIDIA Desktop Device”，外界推测其可能与英伟达及合作伙伴规划中的小型 RTX Spark 桌面设备有关，但具体产品信息尚未公布。驱动文件中还包含“NVIDIA NPU”相关条目，其内部标识采用了英伟达深度学习加速器（DLA）的设备 ID。不过，目前曝光的驱动信息并未透露更多 RTX Spark 平台细节，主要确认了英伟达正在推进 Windows on Arm 生态适配工作。英伟达与微软此前已于 2026 年 5 月 31 日公布 RTX Spark 平台，双方将其定位为面向开发者、创作者和高性能用户的新一代 Windows PC 方案。该平台采用 Arm 架构 CPU，并结合 Blackwell GPU 技术，最高提供 20 个 Arm CPU 核心、6144 个 Blackwell RTX 核心以及最高 128GB 统一内存。微软随后宣布，将针对 RTX Spark 对 Windows 11 进行优化，包括加入 Workload Profile Scheduling（WPS，工作负载配置调度）功能，并调整 Windows 调度器，使系统能够更有效地管理多核心异构架构下的任务分配。微软表示，该优化能够帮助 RTX Spark 设备在不同应用场景下平衡性能和功耗。微软还计划通过 Microsoft Power and Thermal Framework（MPTF，微软电源与温控框架）管理 RTX Spark 平台的性能释放和能耗表现。相关优化主要针对移动设备场景，使笔记本电脑在执行高负载任务时能够根据工作状态动态调整性能策略。首批 RTX Spark 产品预计将在 2026 年秋季开始上市，包括微软 Surface、华硕、戴尔、惠普、联想以及微星等厂商推出的笔记本电脑和小型桌面设备。在此之前，微软已经公布了 Surface Laptop Ultra，该设备采用 NVIDIA RTX Spark 芯片，最高支持 128GB 统一内存，并面向本地 AI 运算、开发和创意工作负载设计。对于 Windows on Arm 生态而言，RTX Spark 的推出也意味着英伟达正式进入高性能 Arm Windows PC 市场。过去 Windows on Arm 设备主要依靠高通骁龙平台，而微软近年来持续完善 Arm 应用兼容环境，包括通过 Prism 模拟技术运行 x64 应用。英伟达方面表示，RTX Spark 将支持现有 Windows 应用和游戏生态，不过具体兼容范围仍需要等待产品上市后的实际测试。不过，目前英伟达尚未公布 RTX Spark 设备的详细售价、最终性能测试数据以及具体上市日期。此次 Windows 11 Arm64 驱动曝光，主要说明相关硬件和软件适配工作正在推进，后续仍需等待更多零售产品信息以及基准测试结果，以进一步确认该平台的实际表现。相关阅读：《惠普 RTX Spark 迷你主机亮相，配备高速 QSFP 网口》《联想、华硕、戴尔、微星旗下 RTX Spark 迷你主机亮相台北电脑展，均配备万兆网口》《微软 Surface Laptop Ultra 详细规格公布：首发英伟达 RTX Spark 芯片，重量不到 2 公斤》《微软为英伟达 RTX Spark 重塑 Win11 底层：改写 CPU 调度、优化 AI 内存负载》《微软发布 Surface RTX Spark Dev Box 开发机：100W TDP、今年晚些时候发售》《英伟达 RTX Spark 芯片 Clang 跑分曝光：比苹果 M5 Pro 慢 6.95%》《英伟达 RTX Spark 芯片细节：10 个 Cortex-X925 加 10 个 Cortex-A725 核心》《首批英伟达 RTX Spark 笔记本名单公布：联想 Yoga Pro 9n、华硕 ProArt P16/P14 等》《首台英伟达 RTX Spark 处理器笔记本：Surface Laptop Ultra 亮相，微软顶级配置》《英伟达 RTX Spark PC 处理器正式发布：联发科合作 20 核 CPU + 英伟达 RTX GPU，首批电脑秋季推出》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/599.htm", "publishedAt": "2026-07-18T15:26:49+00:00"}, {"title": "摩尔线程联合创始人王东：推理市场没有“万能芯片”，而是解决方案的组合", "summary": "IT之家 7 月 18 日消息，据财联社今日报道，GPU 厂商摩尔线程联合创始人、执行总裁王东说，“大模型的发展在国内外都非常迅速，现在头部厂商平均每两个月完成一次前沿基础模型版本迭代，而在模型的调用成本上，我们发现，中国前沿基础模型较国外同等智力水平模型有明显成本优势，中国模型性价比更优，这也恰恰说明模型公司在有限算力的情况下，对如何提升模型效率、价格效率以及训练成本方面做了非常多的工作。”王东指出，推理市场没有“万能芯片”，而是“解决方案”的组合，“推理市场的技术应用门槛相对较低，且场景高度碎片化，不存在任何一家公司能够垄断所有细分应用场景；没有绝对完美的单一硬件，通过灵活的软硬协同，每个模型都能找到最适合它的硬件组合，实现成本与性能的最佳平衡。市场将涌现大量 ISP 公司，为 MaaS 提供商或终端客户提供更具性价比，更灵活的定制化推理服务。”IT之家注意到，“国产 GPU 第一股”摩尔线程于去年 12 月登陆科创板，2026 年半年度业绩预告营业收入区间为 16.5 亿元至 17.5 亿元，同比增长 135.12%-149.37%，营收规模远超上年同期，符合行业对 AI GPU 需求高增长的市场预期。受益于人工智能产业蓬勃发展，市场对全功能 GPU 需求强劲，该公司旗舰产品 MTT S5000 实现规模量产，性能达到国际先进水平，商业化交付稳定。目前，该公司推出 MTT S5000 是专为大模型训练、推理及高性能计算而设计的全功能 GPU 智算卡，基于第四代 MUSA 架构“平湖”打造。其单卡 AI 算力最高可达 1000 TFLOPS，配备 80GB 显存，显存带宽达到 1.6TB/s，卡间互联带宽为 784GB/s，完整支持从 FP8 到 FP64 的全精度计算。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/597.htm", "publishedAt": "2026-07-18T15:06:19+00:00"}, {"title": "印度民营航天新突破：首枚自研轨道火箭维克拉姆-1 号发射成功", "summary": "IT之家 7 月 18 日消息，据路透社今天（18 日）报道，印度航天初创公司 Skyroot Aerospace 成功发射了印度首枚民营轨道运载火箭，这也是印度首枚自主研发的轨道火箭。发射任务不仅是印度私人航天产业的重要里程碑，也将检验印度能否在全球商业发射市场中争取更大份额。维克拉姆-1 号于北京时间 14 时 35 分从斯里哈里科塔的萨蒂什 · 达万航天中心点火升空，执行首次轨道任务“阿加曼任务”，搭载了多项客户载荷和在轨实验设备。升空约 15 分钟后，维克拉姆-1 号顺利把载荷送入 450 公里高的轨道。印度由此成为全球第三个通过私营企业实现轨道发射的国家。Skyroot Aerospace 表示，试飞将全面验证火箭的推进、航电、遥测、制导、导航和控制系统，并为后续商业发射积累数据。Skyroot Aerospace 成立于 2018 年，是印度航天领域开放后涌现的新一代初创企业之一，并已获得多家国际投资机构支持。今年早些时候，其估值达到 10 亿美元（IT之家注：现汇率约合 67.85 亿元人民币），成为印度首家跻身独角兽行列的航天企业。维克拉姆-1 号高约 22 米，最多可把 350 公斤载荷送入近地轨道。火箭采用三级固体燃料设计，轨道调整模块则使用液体燃料，并由 3D 打印发动机提供动力。三级固体燃料结构和 3D 打印发动机均为首次在印度接受飞行检验。火箭搭载了印度及海外机构提供的多项实验载荷和商业载荷，包括技术验证卫星及在轨实验设备。印度政府希望在私营企业的推动下，把本国航天经济规模从目前约 80 亿美元扩大到 2033 年的 440 亿美元（现汇率约合 2985.22 亿元人民币），并在由美国、欧洲和中国企业主导的全球市场中占据更重要的位置。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/596.htm", "publishedAt": "2026-07-18T14:59:54+00:00"}, {"title": "马斯克：Grok 4.6 训练进入最后阶段，2 万亿参数模型下周完成初步训练", "summary": "IT之家 7 月 18 日消息，埃隆 · 马斯克（Elon Musk）今日在 X 上回复网友时透露，xAI 正在训练中的下一代 Grok 4.6 模型参数规模将达到 2 万亿，预计将在下周完成初始训练。马斯克表示，2 万亿参数模型在各方面都优于当前的 1.5 万亿参数版本，同时推理速度和 Token 效率将接近现有的 1.5T 模型（即 Grok 4.5）。马斯克猜测它可能会超过月之暗面最新 Kimi 3。目前，xAI 尚未公布 Grok 4.6 的正式发布时间、训练细节以及完整技术指标。此前，xAI 已推出 Grok 系列多个版本。在参数规模方面，马斯克 2026 年 5 月表示 Grok 基础模型 V9-Medium（1.5T 参数）已经完成训练，后续正在进行微调和强化学习阶段。该模型被认为是 Grok 4.5 的基础版本。如果此次 2T 参数模型最终完成并发布，Grok 的参数规模将进一步提升。大语言模型中的参数数量通常用于衡量模型规模，但实际能力还受到训练数据质量、训练方法、推理架构、计算资源以及后训练优化等因素影响。马斯克想表达的是，xAI 在扩大模型规模的同时，希望维持与上一代模型接近的运行效率。从发展路线来看，xAI 正持续扩大计算资源投入。该公司此前公布，Grok 4 使用了名为 Colossus 的大型 AI 计算集群进行训练，该集群拥有约 20 万块 GPU，用于强化学习和模型训练。与此同时，AI 大模型领域的竞争正在围绕模型规模、推理能力、响应速度以及成本效率展开。OpenAI、谷歌、Anthropic 等企业也在持续推出新一代模型，行业普遍关注如何在提升能力的同时降低推理成本。相关阅读：《马斯克：Grok 4.5 已在 SpaceX 和特斯拉内部测试，性能接近 Opus 模型》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/595.htm", "publishedAt": "2026-07-18T14:56:12+00:00"}, {"title": "京东发布 JoyAI-Talker 实时语音交互模型与 JoyAI-Video-Edit 视频编辑模型", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会暨人工智能全球治理高级别会议（WAIC）昨日在上海世博、张江、西岸“三地四馆”同步启幕。7 月 18 日，京东以“AI 进入物理世界”为核心主题亮相上海世博展览馆，首次系统展示面向物理世界的 JoyAI 模型矩阵。在模型方面，京东推出了 JoyAI-Talker 实时语音交互模型与 JoyAI-Video-Edit 实时视频编辑模型。据京东介绍，JoyAI-Talker 具备低延迟对话、情绪理解、工具调用和记忆等能力，让 AI 从机械执行指令走向理解人的意图和状态。该模型能够通过声纹识别用户身份，结合环境数据理解对话意图。JoyAI-Video-Edit 则支持自定义画面和边预览边修改，让视频编辑更加实时、灵活。该模型将视频能力延伸至流式编辑，用户面对变化中的视频画面，可以直接用自然语言增删物体、替换人物、迁移服装，甚至重构整个场景。IT之家此前报道，今年以来京东已陆续发布 Joy-Image-Edit、JoyAI-Echo、JoyAI-VL-Interaction 等 7 个基础模型。以 JoyAI 基座大模型为核心，京东已形成覆盖语音、图像、视频、实时交互、世界模型和具身智能的基础模型体系。在本次 WAIC 期间，京东还开源了行业最大人类视角数据集 EgoLive，并打造了首个 JoyInside“AI Hom 元", "summary": "IT之家 7 月 19 日消息，如果你期待本田推出一款能够与特斯拉或通用汽车竞争的自动驾驶电动汽车，可能还需要再等一段时间。不过，在另一个规模同样达到数十亿美元的市场，本田已经率先迈出一步。面向园林设备市场，本田最新推出了具备自动驾驶能力的纯电动割草机 ProZision Autonomous ZTR，并已正式开始向经销商发货。这款产品最早于 2023 年以概念机形式亮相。今年 1 月，本田已在位于美国北卡罗来纳州、拥有 40 年历史的动力设备工厂启动量产工作。目前，这款售价 32999 美元（IT之家注：现汇率约合 22.4 万元人民币）的 AI 割草机正陆续进入市场，本田希望借此抢占美国规模约 20 亿美元（现汇率约合 135.78 亿元人民币）的商用割草机市场。ProZision Autonomous 的最大特点是具备自主作业能力。园林工作人员只需驾驶割草机沿着草坪行驶一遍，系统便会自动记录整个作业路线。随后，本田的软件会对路线进行优化，之后割草机便能够自行完成后续作业。为了实现高精度自动驾驶，该设备集成了 GPS 定位、激光雷达（LiDAR）、毫米波雷达以及 360 度视觉传感器等多种感知系统，能够以约 3 厘米的误差精准重复此前学习到的割草路线。本田认为，这款产品推出的时机恰逢其时。随着劳动力市场持续紧张，园林绿化行业正面临越来越严重的用工短缺问题。同时，越来越多商业客户开始要求使用噪音更低、污染更少的设备。目前，美国已有 100 多个城市和县对燃油园林设备实施限制甚至禁用措施，还有更多地区出台了严格的噪音管理规定，迫使园林服务企业加快向电动设备转型。本田表示，ProZision Autonomous 正是为解决劳动力不足和法规变化两大问题而开发。本田动力设备事业部摩托车与动力产品运营总经理加藤实（Minoru Kato）表示：“ProZision Autonomous 的研发初衷，就是帮助园林企业缓解员工老龄化和劳动力短缺带来的压力。未来，本田将继续通过技术创新满足不断变化的市场需求，提升人们的工作和生活品质，同时持续丰富电动化产品阵容，朝着 2050 年实现碳中和目标迈进。”这款割草机提供 54 英寸和 60 英寸两种割草宽度，面向专业园林维护市场。动力方面，其采用 48V 电池系统，搭载 5 台独立无刷电机，能够提供更大的输出扭矩和更长的续航时间，以满足专业用户长时间连续作业的需求，也顺应行业逐步淘汰高噪音、监管日趋严格的燃油发动机的发展趋势。事实上，本田正在全面推动动力设备电动化。美国本田动力运动及产品业务副总裁 Mark Kohls 表示：“技术创新正在改变本田的各类产品，我们最新推出的电池驱动割草机也不例外。本田 ProZision 零转弯半径（Zero-Turn Radius）割草机实现了零排放，可为不同客户、不同作业环境以及各种商业应用提供更具成本效益的草坪维护解决方案。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/627.htm", "publishedAt": "2026-07-19T01:14:04+00:00"}, {"title": "全球市占第一后，普渡在WAIC开始回答机器人下一场战争", "summary": "PuduFM+PuduAgent，一并在不同本体上持续落地，共同构成了普渡机器人的顶层战略「一脑多形」。", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453802.html", "publishedAt": "2026-07-19T01:01:46+00:00"}, {"title": "谷歌安卓系统最新漏洞曝光：Gemini 可绕过锁屏密码发送短信，官方即将修复", "summary": "IT之家 7 月 19 日消息，据科技媒体 GSMArena 昨天报道，谷歌安卓系统存在一项身份验证绕过漏洞，可让攻击者在拥有物理访问权限的情况下，不输入锁屏密码就能通过 Gemini 发送短信或 WhatsApp 消息。IT之家从原报道了解到，该漏洞自今年 5 月以来被人们发现，最初是在 Android 16 系统、Pixel 6a 手机中复现。正常情况下，如果用户禁止 Gemini 访问消息等应用时，有人在锁屏界面要求 Gemini 发送短信，系统会就要求输入 PIN 码验证身份。然而，如果用户这时同时按下“继续”（Continue）和“添加附件”（Add attachment）按钮，系统就会无视输入密码环节直接发送短信。并且攻击者还可以在锁屏界面，重新打开其他应用的访问权限。例如只需要在输入框键入“@WhatsApp”就能触发重新连接 WhatsApp 的提示，同样无需输入密码。虽然这种攻击手段并不能远程实施，但在现实生活中，手机被短暂遗落、被偷的情况并不少见，因此这种漏洞依然具有现实风险。谷歌发言人对此表示，公司已经知悉该漏洞，并计划本周大范围推送修复补丁。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/622.htm", "publishedAt": "2026-07-19T00:35:39+00:00"}, {"title": "博主指控索尼动用社交媒体水军引导舆论，为停售实体光盘政策洗白", "summary": "IT之家 7 月 19 日消息，PlayStation 计划于 2028 年停止生产新的实体游戏光盘，此前曾有报道称，这一决定甚至对索尼内部不少部门都处于保密状态。如今，索尼又陷入了新的争议。IT之家注意到，知名 YouTuber、游戏行业爆料人 Moore's Law Is Dead（简称 MLID）近日声称，索尼可能动用了社交媒体机器人账号（Bot），试图引导舆论，淡化玩家对 PlayStation 全面数字化战略的强烈负面反应。MLID 表示，在相关消息公布后，他几乎找不到真正支持 PlayStation 放弃实体游戏的玩家。即便偶尔看到支持言论，相关账号也显得十分可疑。随后，他重点调查了三个账号，发现它们都存在类似特征：长期几乎没有任何动态，随后突然开始频繁发文，并使用正式、类似企业公关的措辞；它们经常与一些后来已被删除的账号互动，还会互相推荐其他疑似机器人账号，头像则看起来像是由 AI 生成。其中，第一个账号曾公开支持关闭 PS3 和 PS Vita 数字商店，而这一决定当时曾遭到玩家广泛批评。此外，该账号还曾点赞过一条关于电影《奥德赛》的帖子，而就在几天后，失眠组（Insomniac Games）便确认电影放映期间将公开《漫威金刚狼（Marvel's Wolverine）》的宣传片。MLID 认为，这一时间点过于巧合，称其为一项“决定性线索”。第二个账号则沉寂了整整六年，随后突然恢复活跃，并开始以带有明显企业宣传风格的语言称赞 Rockstar Games 和《GTA 6》。此外，该账号的 X（原 Twitter）个人主页还关联了一个几乎没有使用痕迹的 TikTok 账号，看起来像是专门为后续推广而准备的。至于第三个账号，MLID 表示自己对它的怀疑程度最高。该账号在沉默三年后重新活跃，发布的内容涵盖宗教、政治以及游戏等多个话题，还发表过一段不同寻常的言论，称自己已经放弃拥有数字版和实体版游戏的想法。同时，它关注的大量账号如今也都已经被删除。不过，MLID 也强调，这些发现并不能作为确凿证据，他无法证明这些账号是由 PlayStation 雇佣或直接运营的，也不排除这些账号是第三方出于自身目的所创建和运营。截至目前，索尼尚未就上述指控作出公开回应。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/619.htm", "publishedAt": "2026-07-19T00:17:20+00:00"}, {"title": "华为 Pura X Max、智慧屏 S7 Pro 获国标人工智能 L3 等级手机、电视首证", "summary": "IT之家 7 月 19 日消息，华为终端官方昨日宣布，HUAWEI Pura X Max、HUAWEI MateBook Pro、华为智慧屏 S7 Pro 获国标人工智能 L3 等级手机、电脑、电视首证。据IT之家今日早些时候报道，小米手机官方宣布，小米荣获首批《人工智能终端智能化分级》系列国家标准 L3 评级证书。小米表示，L3 级为目前有明确划分标准的最高智能化水平。作为参考，工业和信息化部、国家市场监督管理总局、商务部等部门于今年 5 月联合发布《人工智能终端智能化分级》（GB/Z 177—2026）系列国家标准。该标准将终端智能化水平划分为 L1 响应级、L2 工具级、L3 辅助级和 L4 协同级，智能化水平依次提升。相关阅读：《AI 终端智能化分级国标出炉：L1~L4 等级，涉及手机、电脑、眼镜、电视、耳机等》《小米获首批〈人工智能终端智能化分级〉系列国家标准 L3 评级证书》《华为 MateBook Pro 获国家级人工智能认证 L3 级首证》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/615.htm", "publishedAt": "2026-07-18T23:58:45+00:00"}, {"title": "英伟达 CEO 黄仁勋东京行：敲定国家级 AI 工厂合作，送粉丝红豆糕", "summary": "IT之家 7 月 19 日消息，英伟达 CEO 黄仁勋这次来到东京，不仅为日本科技产业带来了多项 AI 和机器人合作计划，还给现场等候的粉丝送上了红豆糕。当地时间周三，黄仁勋现身东京神田地区一家挂满红灯笼的传统居酒屋，引来大批民众围观，希望一睹这位在日本被亲切称为“皮夹克哥”（日语昵称“kawa-jan”，意为“皮夹克”）的风采。此次日本之行最重要的成果于周四公布。英伟达宣布与 Noetra 公司达成合作。这家由日本政府支持、软银（SoftBank）、NEC、索尼（Sony）和本田（Honda）共同成立的 AI 企业，将与英伟达携手建设一座配备 2.75 万块 GPU 的“AI 工厂（AI Factory）”。该项目被定位为全球首个面向机器人产业的国家级 AI 基础设施，旨在为日本机器人产业提供大规模 AI 算力支持。黄仁勋此行还前往东京秋叶原，参观了一家由世嘉（Sega）旧游戏厅改造而成的场所，并向这家游戏公司表达感谢。他曾表示，上世纪 90 年代，世嘉提供的一笔 500 万美元（IT之家注：现汇率约合 3392.3 万元人民币）合作资金，帮助当时仍处于创业阶段的英伟达渡过了艰难时期。此外，他还出席了英伟达举办的 Build-a-Claw 活动。不过，比起这些公开行程，更受关注的反而是黄仁勋下班后的“美食之旅”。有网友拍到，黄仁勋当晚前往东京连锁居酒屋 Yakiton Sankichi 用餐。这家店以适合下班后小酌闻名。据日本媒体 Diamond Online 报道，黄仁勋品尝了内脏火锅，还点了一份被称为“baka-mori”（字面意思是“傻大份”）的超大份薯条。据彭博社报道，与黄仁勋同桌的还有日本多家科技企业高层，包括铠侠（Kioxia）、东京电子（Tokyo Electron）、信越化学（Shin-Etsu Chemical）、住友电工（Sumitomo Electric）、太阳诱电（Taiyo Yuden）以及味之素（Ajinomoto）的负责人。晚餐结束后，黄仁勋走出餐厅，面对门外等候已久的人群，亲手将日本传统点心红豆糕递到粉丝手中，引发现场欢呼。对于黄仁勋来说，出差时体验当地美食早已成为一种惯例。今年 5 月，在陪同美国总统唐纳德 · 特朗普访问中国后，黄仁勋曾被拍到在北京街头吃炸酱面。当时，他一边品尝一边对围观群众称赞道：“太好吃了。”这些年来，黄仁勋还曾在越南、中国香港和韩国等地被拍到品尝当地街头美食。去年，他与三星和现代汽车高层一起吃韩式炸鸡时，也曾因大量摄影记者突然出现而成为热门话题。如今看来，无论英伟达下一座“AI 工厂”建在哪里，当地餐馆或许都应该提前做好迎接这位“美食家 CEO”的准备。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/614.htm", "publishedAt": "2026-07-18T23:53:49+00:00"}, {"title": "惠普 EliteBook 8 G2a 16 笔记本海外发布：锐龙 AI 400 平台、至高 64GB 内存", "summary": "IT之家 7 月 19 日消息，惠普现已在海外市场推出 EliteBook 8 G2a 16 笔记本，这款产品采用 AMD 锐龙 AI 400 平台，配置 77Wh 八芯电池，最高可选配 64GB 内存和 PCIe Gen 5 固态硬盘。据介绍，这款笔记本最高可选配锐龙 AI 7 450 处理器，机身重量为 1.74kg，对 16 英寸的笔记本来说相对较轻。规格方面，这款笔记本最高可选配 64GB DDR5-5600 MT/s 内存，以及 1TB PCIe Gen5 NVMe 固态硬盘。屏幕分辨率默认为 1920*1200，拥有抗反射涂层、低蓝光技术，最高亮度 400nits，覆盖 100% sRGB 色域。此外，这款笔记本拥有 HDMI 2.1、USB-A 5Gbps、USB-C 10Gbps 以及雷电 4 等接口，AI 5 Pro 440 版本的起售价为 1799 美元（IT之家注：现汇率约合 12205 元人民币），如果选配到 AI7 Pro 450、32GB 内存，价格则来到 5558 美元（现汇率约合 37709 元人民币）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/604.htm", "publishedAt": "2026-07-18T23:02:16+00:00"}, {"title": "小米获首批《人工智能终端智能化分级》系列国家标准 L3 评级证书", "summary": "IT之家 7 月 19 日消息，小米手机官方昨晚宣布，小米荣获首批《人工智能终端智能化分级》系列国家标准 L3 评级证书。小米表示，L3 级为目前有明确划分标准的最高智能化水平。官方海报显示，小米 17 Max 手机获得了国家级人工智能 L3 级认证。据IT之家昨日报道，华为 MateBook Pro 近日也获得了国家级人工智能终端智能化分级 L3 等级首证，成为首批通过该国家级人工智能分级标准认证的终端产品。作为参考，工业和信息化部、国家市场监督管理总局、商务部等部门于今年 5 月联合发布《人工智能终端智能化分级》（GB/Z 177—2026）系列国家标准。该标准将终端智能化水平划分为 L1 响应级、L2 工具级、L3 辅助级和 L4 协同级，智能化水平依次提升。其中，L4 协同级将根据产业发展水平，在后续标准修订中进一步明确和完善。相关阅读：《华为 MateBook Pro 获国家级人工智能认证 L3 级首证》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/603.htm", "publishedAt": "2026-07-18T22:52:56+00:00"}, {"title": "AMD Zen 6 APU 跑分再曝光：单核跑分超越锐龙 AI 9 365 近 35%", "summary": "IT之家 7 月 18 日消息，AMD 下一代 Zen 6 架构移动处理器（代号“Medusa Point”）一款 10 核 20 线程的 ES 工程样品再次出现在 Geekbench 数据库中，跑分成绩再创新高。数据显示，这款处理器的识别信息为“100-000001713-33_N”，测试平台显示为 AMD Plum-MDS1，配备 32GB 内存，运行 Win11 专业版，最终单核成绩 3329 分，多核成绩 16555 分。此前，该工程样品在 Geekbench 中的单核成绩为 3174 分，而最新测试提升至 3329 分，增幅约为 5%；多核成绩则从此前约 15000 分提升至 16555 分，提升幅度接近 9%。按照目前公开测试结果进行对比，这款 10 核处理器的单核性能已经超过采用 Zen 5 架构的 Ryzen AI 9 365 移动处理器。以 Geekbench 平均成绩计算，其单核性能领先幅度接近 35%。不过，由于 Geekbench 测试容易受到系统环境、固件以及状态影响，因此相关成绩只能作为早期性能参考，并不能代表最终零售版本表现。从测试信息来看，该工程样品最高记录频率达 5370MHz，接近 5.4GHz。相比目前 Strix Point 系列移动 APU 的最高频率高出约 300MHz。此前曝光的信息显示，Medusa Point 预计面向笔记本电脑市场，可能采用 AMD 下一代 Zen 6 CPU 架构，并继续集成 AI 加速能力。在多核性能方面，这款 10 核芯片此次获得 16555 分。按照目前曝光的数据，其性能定位已经明显高于采用 Zen 5 架构的 Ryzen AI 300 系列部分型号。目前曝光的工程样品信息显示，Medusa Point 拥有 10 个物理核心和 20 个逻辑线程，并配备 32MB 三级缓存。部分分析认为，其核心配置可能采用混合架构设计，但 AMD 尚未确认具体核心组成。目前，AMD 尚未公布 Medusa Point 的正式发布时间和产品阵容，相关信息仍以工程样品泄露和数据库记录为主。IT之家后续将保持关注。相关阅读：《10 核 AMD Zen 6 APU 样品跑分曝光：单核比 Ryzen AI 9 365 快 29%、多核快 22%》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/598.htm", "publishedAt": "2026-07-18T15:15:55+00:00"}, {"title": "蔚来官宣 NIO Day 2026 将在武汉举行，有望首发最新产品、技术", "summary": "IT之家 7 月 18 日消息，今晚，蔚来官宣 NIO Day 2026 城市申办投票结果出炉，武汉以 178,854,028 票位居三城榜首，成为由蔚来社区用户共同决定的 NIO Day 2026 的举办城市。IT之家注意到，蔚来 NIO Day 今年的申办城市包括：长春、重庆、哈尔滨、济南、南京、青岛、武汉、厦门。最终，哈尔滨、武汉、厦门入围最后投票阶段。目前，蔚来官方暂未公布 NIO Day 2026 的具体举办时间以及活动内容，按照以往惯例，本次活动预计将带来重磅产品发布。自 2017 年以来，NIO Day 已举办九届，IT之家附每一届的主要发布内容如下：2017：首届 NIO Day，北京举办，发布首款车型 —— 旗舰 SUV ES8，以及 NIO Pilot 辅助驾驶系统、NOMI 车载“人工智能”系统、电能服务体系 NIO Power2018：上海举办，发布全新车型 —— 中型 SUV ES6，以及旗舰 SUV ES8 的六座版车型2019：深圳举办，发布旗舰 SUV ES8 改款车型，以及全新车型 —— 轿跑 SUV EC62020：成都举办，发布全新车型 —— 旗舰轿车 ET7，以及第二代换电站、150kWh 固态电池、蔚来全栈智能驾驶技术 NAD2021：苏州举办，发布全新车型 —— 中型轿车 ET5，以及 7kW、11kW 两款直流充电桩2022：合肥举办，发布两款全新车型 —— 中大型轿跑 SUV EC7、旗舰 SUV 全新一代 ES8（第二代），以及第三代换电站2023：西安举办，发布了全新行政旗舰轿车 ET9、640kW 全液冷超快充桩、第四代换电站、蔚来首颗自研智驾芯片“神玑 NX9031”2024：广州举办，ET9 正式上市，新品牌“萤火虫”发布2025：杭州举办，全新 ES8 正式上市，首次调整至秋季举办", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/587.htm", "publishedAt": "2026-07-18T14:12:37+00:00"}, {"title": "滴滴在WAIC分享：AI升级出行体验 好服务连接消费烟火气", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/454003.html", "publishedAt": "2026-07-18T11:04:51+00:00"}, {"title": "AI 智能体算力消耗过快，传统账单风控跟不上速度", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/secM60Za0CNxIYvQO47m?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T09:00:00+00:00"}, {"title": "iOS 27 公测版上手：国行 AI 准备好了，但系统流畅更值得升级", "summary": "有可能成为新一代「钉子户」系统。#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672364?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T06:47:24+00:00"}, {"title": "早报｜苹果上调Apple Music价格/小米SU7虚假碰撞测评博主被判一年八个月/努比亚、阶跃星辰智能体手机亮相WAIC", "summary": "· 智谱 ARR 被曝达到 10 亿美元，半年增长 15 倍 · Shopify CEO：反 AI 编程的人严重高估了人类代码质量 · 影石与荣耀达成影像生态合作，计划年底前进驻 300 家荣耀门店#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672338?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T00:49:59+00:00"}, {"title": "搭载全球首个智能体原生操作系统 Step AOS，STEPX Neo 亮相 2026 WAIC", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/62J9L28365BtFl dAt": "2026-07-16T02:27:12+00:00"}]}, {"label": "论文研究", "items": [{"title": "为防 AI 作弊，澳大利亚高校重新拥抱口试和线下考试", "summary": "IT之家 7 月 19 日消息，随着越来越多大学担忧学生利用 AI 完成作业甚至作弊，澳大利亚高校正加快调整考试和评估方式，以维护学位的公信力。不过，澳大利亚国立大学（ANU）的一名学者认为，当前高校对 AI 的应对已经带有“歇斯底里”的意味；而另一位教授则警告，如果不能恢复教育的严谨性，澳大利亚的“国家智力能力”将被拱手送给美国和中国的科技公司。IT之家注意到，澳大利亚国立大学是积极应对生成式 AI 冲击的高校之一。学校担心，学生不仅可能利用 AI 作弊，还可能因此无法真正掌握课程知识。《2025 年澳大利亚数字包容指数》显示，78.9% 的中学和高校学生已经在使用生成式 AI。为此，澳大利亚国立大学近日向教师和学术人员发布了一份征求意见文件，提出了三种改革方案。其中一种方案是将课程评估划分为“安全（Secure）”和“不安全（Insecure）”两类。“安全评估”意味着几乎不存在学生利用 AI 作弊的可能。另一项方案则要求学生在提交作业时明确说明，哪些环节使用了 AI 工具。一位澳大利亚国立大学教师在接受《卫报》采访时表示，他支持学校加强考试管理，但认为整个高校系统目前的反应过于仓促。他说：“所有学校都在一种恐慌的状态下调整，而教师培训和教学支持资源又严重不足，这让向安全评估模式转型变得异常复杂。”另一位澳大利亚国立大学教师则对学校提出了更严厉的批评。他认为，学校并没有充分征求教师意见，这些改革甚至可能削弱过去几年在教育公平方面取得的成果，尤其会影响残障学生以及需要照顾家庭成员的学生。他说：“这并不是一次真正意义上的征求意见，而是一种条件反射式的回应，甚至可以说是一种歇斯底里的反应。我们现在已经陷入恐慌，而这种恐慌提出的方案，很可能让教育包容性倒退。”这位教师透露，他们所在学院已经赶在第二学期开学前发布了新的考试指导意见，鼓励更多课程恢复线下考试。“距离正式开学不到两周了，学校却要求我们在极短时间内完成大量调整，而且几乎没有任何培训。”澳大利亚国立大学法学院教授、AI 监管研究负责人 Will Bateman 则认为，遏制 AI 在高校中的滥用已经成为一项关系国家竞争力的重要任务。他说：“如果我们不能解决 AI 对教育规范和学术严谨性的侵蚀，那实际上就是把澳大利亚的国家智力能力拱手送给加州和中国的公司。”不过，Bateman 也强调，加强考试安全并不意味着所有考试都必须恢复传统考场模式，而是应该投入更多资源，通过技术手段应对 AI。他说：“应对 AI 并不意味着让所有学生重新回到考场参加笔试，而是需要认真投资建设真正安全的考试设备，确保学生确实掌握了课程内容，同时也让社会相信，我们颁发的学位仍然具有真正的价值。”昆士兰大学（UQ）今年早些时候已经率先实施新的“安全评估”政策，不过学校也因此受到批评。部分课程将面对面的口试安排在夜间甚至周末进行，引发不少学生不满。昆士兰大学教育事务副校长 Kris Ryan 表示，学校早在 2023 年就开始研究如何应对 AI，只是相关改革需要时间才能真正落地。他说：“学校部分教师已经重新采用更传统的考试方式，把它作为安全评估体系的一部分。”Ryan 表示，高校有责任确保毕业生真正具备应有的能力，“我们必须能够问心无愧地告诉社会，我们培养出的毕业生确实拥有我们所重视的知识和能力。”昆士兰大学目前将考试分为“安全评估”和“开放评估（Open Assessment）”。Ryan 表示，“安全评估”并非完全禁止 AI，而是要求学生能够对 AI 给出的答案进行批判性分析，而不是简单照搬结果。对于外界担心考试改革可能影响部分学生，Ryan 表示学校正在与教师和学生共同寻找解决方案。他说，目前已有三个团队同时开展相关工作，包括优化考试安排、设计更加合理的考试形式，以及与学生直接沟通，为有特殊需求的学生提供其他替代方案。墨尔本大学也正在推进“安全评估”改革。该校教育事务副校长 Gregor Kennedy 表示，学校计划增加口试等互动式考试，以应对 AI 带来的挑战。他说：“随着 AI 工具不断普及，学校正在调整评估体系，引入更多安全的考试方式，以确保学术诚信，并能够真正验证学生完成的工作。”Kennedy 表示，未来学校将增加包括互动式口试在内的多种安全评估形式，这些考试可以根据不同学科特点和学生需求进行调整，从而确保毕业生具备应有的知识、技能和学习成果。澳大利亚新成立的高等教育委员会负责人 Barney Glover 表示，他已经看到越来越多高校重新引入口试，以更准确地评估学生的真实能力。不过，他也提醒，各大学必须以负责任的方式决定如何使用 AI，以及如何限制 AI 的使用。尽管 AI 给高等教育带来了不少挑战，但 Glover 相信，澳大利亚“世界一流的高等教育体系最终一定能够适应这一变化”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/625.htm", "publishedAt": "2026-07-19T01:02:56+00:00"}, {"title": "英伟达全球销售体系开启新篇章：微软 26 年老将加盟出任销售负责人", "summary": "IT之家 7 月 19 日消息，英伟达正在开启其全球销售体系的新篇章。今年 6 月，英伟达全球现场运营（Worldwide Field Operations）负责人杰伊 · 普里（Jay Puri）宣布，将在效力公司 21 年后退休，并转任顾问职位。这位身价数十亿美元的高管一直是英伟达 CEO 黄仁勋核心管理团队的重要成员。为了接替普里，英伟达此次罕见地选择了从公司外部引进高管，而不是像以往一样通过内部晋升或启用收购而来的管理人员。对于一向以高管任职时间长、内部培养著称的英伟达来说，这是一项不同寻常的人事安排。微软资深高管尼克 · 帕克（Nick Parker）将于下个月正式加盟英伟达。他在微软工作了 26 年，最近担任微软全球销售与解决方案部门执行副总裁兼首席商务官，负责企业销售业务。据 Business Insider 获悉，在离开微软之前，帕克刚刚接受了一项新的任命，原计划负责领导微软新成立的 Microsoft Frontier Company。该部门规模约为 25 亿美元（IT之家注：现汇率约合 169.61 亿元人民币），汇聚了约 6000 名工程师和行业专家，帮助企业客户推进 AI 项目。知情人士表示，这一职位不仅拥有 CEO 头衔，管理团队规模也比帕克此前负责的业务更大。根据英伟达提交的监管文件，帕克加盟后的薪酬待遇包括价值 4000 万美元（现汇率约合 2.71 亿元人民币）的股票奖励、500 万美元（现汇率约合 3392.3 万元人民币）的签约奖金，以及 100 万美元（现汇率约合 678.5 万元人民币）的年基本薪资。The Futurum Group 首席技术顾问戴维 · 尼科尔森（David Nicholson）表示，此次高管任命向华尔街释放了一个信号：作为当前 AI 芯片市场的领导者，英伟达并没有满足于现有优势，而是已经开始布局下一阶段的增长。在普里的带领下，英伟达全球销售团队见证了公司从一家图形显卡厂商成长为全球 AI 芯片霸主的全过程。而帕克接手后的任务则有所不同。如今，英伟达面临的重点已经不只是销售更多 AI 芯片，而是帮助客户真正将 AI 技术部署到实际业务中。对于一位拥有 26 年微软企业级技术销售经验的高管而言，这正是他的专长。Circular Technology 全球研究与市场情报主管布拉德 · 加斯特沃思（Brad Gastwirth）表示，帕克还拥有与各国政府、云计算服务商以及众多合作伙伴建立的深厚关系，这些资源将成为英伟达未来发展的重要优势。随着英伟达不断向企业软件领域拓展，公司也开始面对一个熟悉的挑战：如何帮助大型、监管严格的企业，从采购 AI 基础设施进一步迈向 AI 的实际部署和应用。Business Insider 此前曾报道称，今年早些时候，英伟达销售团队内部曾讨论过美国银行（Bank of America）在部署英伟达 AI Factory 软件时遇到的困难，这也反映出许多行业在推动 AI 落地过程中面临的共同挑战。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/612.htm", "publishedAt": "2026-07-18T23:38:42+00:00"}, {"title": "Stripe 发布基准测试：AI 智能体可开发集成方案，但校验环节存在短板", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/zVfybMt5i742CqhWYjR4?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T14:15:00+00:00"}, {"title": "Visual Studio Code 1.129 发布", "summary": "Visual Studio Code 1.129 现已发布，此版本新增了专用 agent host、Agents window 中的全新编辑器面板、使用!运行命令的功能以及现代 UI 预览。 The agent host：在专用进程中运行 agent 会话，并从多个窗口连接到它们。 Agents window 中的新编辑器面板（实验性）：在 docked editor 中查看 agent-generated files 和 ...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/471757/vs-code-1-129-released", "publishedAt": "2026-07-16T03:11:53+00:00"}, {"title": "DeepSeek 融资股权变更完成", "summary": "企查查 APP 显示，近日，DeepSeek 关联公司杭州深度求索人工智能基础技术研究有限公司发生工商变更。 新增杭州程砺企业管理咨询合伙企业（有限合伙）、国家人工智能产业投资基金合伙企业（有限合伙）为股东，注册资本增加至 1644.75 万元。 其中，DeepSeek创始人梁文锋退出杭州程砺企业管理咨询合伙企业（有限合伙）股东...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/471741", "publishedAt": "2026-07-15T08:27:41+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "Valve Steam Machine 工程师警告：内存危机“仍在持续恶化”", "summary": "IT之家 7 月 19 日消息，Valve 负责 Steam Machine 的工程师警告称，科技行业持续的内存危机“仍在不断恶化”，消费者如今面对的高昂内存价格，未来可能还会进一步上涨。帮助打造这款新游戏硬件的两位工程师 ——Yazan Aldehayyat 和 Pierre-Loup Griffais，在接受彭博社采访时谈到了 AI 产业如何推高内存价格。他们表示，如果你觉得现在的情况已经够糟了，那么未来几个月可能还会更加严峻。“说实话，情况还在持续恶化。”Aldehayyat 表示，“很多人可能还没有意识到，目前零售市场上看到的价格，其实至少比我们在大宗采购市场观察到的情况滞后了 3 到 6 个月。”Steam Machine 的起售价为 1049 美元（IT之家注：现汇率约合 7117 元人民币），对应的是仅配备 512GB 存储空间的基础版。而售价最高的版本则配备 2TB 存储，并捆绑 Steam Controller 手柄，价格高达 1428 美元（现汇率约合 9688 元人民币）。Aldehayyat 表示，Valve 在 2025 年 11 月正式公布这款设备时，就已经预料到供应链会遇到困难，但实际情况远比预期严重。Griffais 更是表示，Valve 一直在“尽可能生产所有能够制造出来的产品”，但“毫无疑问，内存供应能力限制了我们的产能”。“我们知道采购内存会遇到问题，”Aldehayyat 说，“但问题的严重程度完全超出了我们的预期。”除了 Steam Machine，Valve 在过去这段科技行业动荡时期，也一直难以满足 Steam Deck 的市场需求。Valve 此前还表示，公司“非常希望”让 Steam Machine 的售价更加亲民，但也坦言，短时间内不会降价。事实上，Valve 并不是近几个月唯一对内存危机发出警告的企业。美光（Micron）CEO Sanjay Mehrotra 此前预计，内存短缺状况可能会持续到 2027 年。Epic Games 首席执行官 Tim Sweeney 也在 2025 年底警告称，高端 PC 游戏玩家未来“数年”都将不得不面对居高不下的硬件价格。与此同时，随着索尼和微软逐步推进下一代游戏主机的发布计划，索尼表示，目前仍在评估 PS6 将于何时以及以何种方式正式推出。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/602.htm", "publishedAt": "2026-07-18T22:49:23+00:00"}, {"title": "喊着“爸爸妈妈”的贴心主播反手骗了老人 1000 万，宁夏警方破获特大网络直播养老诈骗案", "summary": "IT之家 7 月 18 日消息，据央视新闻今日报道，宁夏回族自治区中卫市中宁县公安局本月初破获了一起特大网络直播养老诈骗案，截至 7 月 9 日成功抓获犯罪嫌疑人 12 名。至此，一个长期盘踞在网络平台、以老年群体为目标的特大网络直播系列养老诈骗团伙被全链条摧毁。今年 4 月以来，中宁县公安局在工作中发现，有犯罪团伙运营多个直播账号，伪装成“实力雄厚的收藏大企业”，长期针对老年人实施精准诈骗。中宁县公安局网络安全保卫大队民警浦鹏介绍，主播在直播时说话特别亲切，一口一个“爸爸妈妈”，声称所售商品经过“大师开光”，能保平安、旺财运，购买后还可安排专人上门高价回收，冲榜靠前还能拿到百万现金。老年人防备心较弱，容易被这些说辞打动。为营造真实可信的暴富假象，该团伙精心制作了大量虚假素材。他们在直播间展示面额百万元的练功券、AI 伪造的上门回收视频，刻意制造资金雄厚、回收渠道稳定的虚假氛围。同时，反复强调“低价买入、高价回本、上榜返利”等概念，持续诱导老年人下单消费、充值刷礼。中宁县公安局网络安全保卫大队大队长李彦琴表示，该团伙的话术极具针对性，精准拿捏了老年人辨别能力较弱、渴望增收的心理，通过温情称呼拉近距离，用迷信话术和高额回报制造诱惑，层层递进、步步诱导，让老年人在反复洗脑过程中逐渐丧失警惕，持续投入更多资金。经查，该团伙直播间售卖的玉石、纪念币、工艺金条、保健品等商品，均为成本极低的廉价货品，实际售价却高达 299 元至 699 元。IT之家注意到，所有“高价回收”“百万返利”“专属福利”等承诺均为虚假说辞，全程无任何真实兑现案例。整个团伙组织严密，内部有人充当“演员”，还专门邀请供应商工作人员或老板进入直播间烘托气氛、引导老年人。案件线索浮出水面后，中宁县公安局迅速成立专案组。专案组民警一方面全面固定涉案直播间的完整录屏、聊天记录、转账流水等核心电子证据，另一方面梳理涉案货品信息，溯源排查供货源头，摸清完整犯罪供应链。李彦琴介绍称，警方对 120 条直播录屏逐一分析研判，精准梳理出该团伙的作案规律和话术套路，同时通过线下走访多名群众，获取受骗群众经过和受损资金情况，固定了完整证据链条。该团伙作案范围广、涉案人员分散、线上线下交叉作案，侦查难度较大。专案组依托大数据警务实战平台，对涉案账号、作案设备、资金流水、人员活动轨迹开展综合研判，最终锁定团伙核心成员、层级架构、窝点及活动规律。民警辗转多地走访取证，查清了人员分工、作案流程与涉案资产。2026 年 7 月 3 日，专案组开展集中收网，多点同步抓捕。截至 7 月 9 日，中宁警方成功抓获犯罪嫌疑人 12 名。现场查获涉案车辆 4 台、作案手机 26 部、直播道具 10 套、练功券 100 万元、假发 2 套、虚假藏品及保健品 100 余箱。央视指出，该案涉案总价值约 1000 万元，完全针对老年群体。目前，12 名犯罪嫌疑人均已被警方依法采取刑事强制措施，案件正在进一步追赃挽损中。此次侦办实现了从上游货品供应、中游直播行骗到下游资金变现的全链条打击。警方提醒广大老年朋友及家属，不轻信网络直播的虚假暴富承诺，不向陌生账户转账，不盲目充值刷礼，遇到可疑营销、返利骗局及时向家人、社区求助，第一时间拨打报警电话。中宁公安同时郑重警示：所有以“高价回收藏品、上榜返利百万现金”、以迷信话术诱导消费、承诺保本返利、上门高价回收收藏品的直播营销行为，均属于违法犯罪行为。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/591.htm", "publishedAt": "2026-07-18T14:28:07+00:00"}, {"title": "AI 编码实战 | 0 行手写代码，2 天重构 2 万行 Vue 项目", "summary": "文章的核心观点是：AI 辅助开发的关键不在 AI 本身的能力，而在于人为 AI 建立的约束体系 —— 通过 Skills 技能包注入领域知识、AGENTS.md 沉淀项目规范、飞轮效应让错误只犯一次，将模糊目标转化为 AI 可精确执行的高质量指令，从提出需求到代码合入，甚至本篇分享也是 AI 生成。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/vivotech/blog/19722516", "publishedAt": "2026-07-16T08:52:00+00:00"}]}]};

const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.parentNode.removeChild(box); return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top"><span class="dot" style="background:#94a3b8"></span>顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '"><span class="dot" style="background:' + accentVar(i) + '"></span>'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
