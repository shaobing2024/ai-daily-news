const DATA = {"date": "2026-07-22", "generatedAt": "2026-07-21T19:19:45Z", "attribution": {"source": "中文科技媒体 RSS 聚合"}, "sourceList": ["量子位", "IT之家", "InfoQ 中文", "爱范儿", "开源中国"], "lead": "", "isFallback": false, "sections": [{"label": "模型发布/更新", "items": [{"title": "GOAI 世界人工智能开源大赛四大赛道正式发布", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/aBFeKFvlAt7vFfsv7arl?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-21T20:17:22+00:00"}, {"title": "全球首款机器人手机：荣耀 Robot Phone 拍照页面曝光，将支持大师电影模式", "summary": "IT之家 7 月 21 日消息，荣耀 Robot Phone 已正式开启预约，该机搭载第五代骁龙 8 至尊版芯片，其核心创新在于机身顶部集成了一套行业最小的四自由度（4DoF）钛合金机械云台系统。云台系统配备微型电机，体积比主流方案缩小 70%。IT之家注意到，荣耀全球首席营销官关海涛今日晒出了自己的荣耀 Robot Phone 真机，并分享了新机的拍照页面。画面显示，荣耀 Robot Phone 的相机页面设计与荣耀在售的机型有所差异，在“拍照”模式下，原本的快门键调整为了摇杆按钮，预计支持调节云台系统的角度。另外，该机还会提供“大师电影”模式，预计该模式就是与阿莱 ARRI 合作的摄影功能之一。该机预计会在今年 8 月发布，并将首发荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 的内核（AgenticOS 尝鲜版将由荣耀 Magic9 系列手机发布）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/801.htm", "publishedAt": "2026-07-21T15:33:36+00:00"}, {"title": "谷歌发布三款新 AI 模型，含 Gemini 3.6 Flash、3.5 Flash Cyber", "summary": "IT之家 7 月 21 日消息，谷歌今日发布了三款新的人工智能模型，包括性能最强的 Gemini 3.6 Flash，以及专门针对网络安全优化的 Gemini 3.5 Flash Cyber。谷歌希望借此在前沿 AI 模型和网络安全领域与 Anthropic、OpenAI 等竞争对手展开竞争。今年以来，这两家 AI 公司相继推出了能够发现软件安全漏洞的先进模型，在网络安全领域占据了领先地位。根据多项 AI 基准测试排行榜，上一代 Gemini Flash 已经在编程、金融等任务中表现出色。谷歌表示，新发布的 Gemini 3.6 Flash 在能力上进一步提升，同时使用成本也更低。谷歌称，Gemini 3.5 Flash Cyber 能够以比更大规模模型更低的成本发现并修复软件安全漏洞。此次发布的第三款模型 Gemini 3.5 Flash-Lite，则主要面向 AI 智能体（Agent）等应用场景。这类智能体能够自主执行任务，可充当数字个人助理等角色。谷歌 Gemini 团队产品管理高级总监 Tulsee Doshi 表示，这几款新的 Flash 模型旨在实现效率与性能之间的最佳平衡。与此同时，谷歌还在开发旗舰模型 Gemini 3.5 Pro，这将是公司性能最强的 AI 系统。今年 5 月，谷歌曾表示该模型将于 6 月推出，但目前仍未正式发布。谷歌表示，Gemini 3.5 Pro 仍处于测试阶段，一旦准备就绪，将尽快向广大用户开放。自 OpenAI 于 2022 年底推出 ChatGPT 掀起 AI 热潮以来，谷歌一直投入大量资金和资源，希望重新夺回行业领先地位，其 Gemini 系列模型也迅速跻身业内顶尖 AI 工具之列。不过，近几个月来，谷歌在竞争中逐渐受到挑战。Anthropic、OpenAI 陆续推出性能更强的新模型，中国 AI 初创公司月之暗面（Moonshot AI）也发布了具有竞争力的新产品。此外，本月 Facebook 和 Instagram 母公司 Meta 推出的新模型，在多个 AI 排行榜上的表现也已超过 Gemini。网络安全正成为 AI 模型的重要竞争方向。这类模型能够比人工更快地发现软件漏洞并完成修复，但与此同时，也可能被恶意利用，用于挖掘漏洞或发动网络攻击。今年 4 月，Anthropic 发布了专注于网络安全的 AI 模型 Mythos，并称其可能给网络安全行业带来“重大变革”。为了防止该模型落入不法分子手中，Anthropic 仅向少数机构开放，以帮助其提升网络防御能力。随后，该公司又推出了具备类似能力的 Fable 模型，并加入了防止其被用于黑客攻击的安全限制。OpenAI 随后也推出了自己的网络安全模型，初期同样只向少数机构开放，用于加强网络防御，在经过验证后才逐步扩大开放范围。谷歌表示，Gemini 3.5 Flash Cyber 也将采取类似策略。公司称，在测试过程中，该模型对知名开源项目 V8 JavaScript Engine 进行了分析，共发现 55 个问题，其中包括 10 个此前其他 AI 模型从未发现过的安全漏洞。Tulsee Doshi 表示：“该模型将仅向政府机构和可信合作伙伴开放。这将帮助网络安全一线防御人员抢先发现并修复关键漏洞，在漏洞被利用之前完成防护，同时尽可能降低模型被滥用的风险。”谷歌还表示，新发布的 Flash 系列模型价格低于此前产品。与上一代相比，新模型完成相同任务所需的 Token（AI 模型计算资源计量单位）减少了 17%，这意味着开发者可以用更低的成本完成同样的工作。谷歌还称，已开始对 Gemini 4 进行预训练。IT之家注意到，Gemini 3.6 Flash 和 3.5 Flash-Lite 现已在 Gemini 应用中推出，后者还登陆了搜索功能。开发者可通过 Google Antigravity、AI Studio 以及 Android Studio 访问这两款模型。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/795.htm", "publishedAt": "2026-07-21T15:13:06+00:00"}, {"title": "索尼新品发布会定档明晚 22 点，预计推出 FX5 电影摄影机", "summary": "IT之家 7 月 21 日消息，索尼中国今天宣布，电影摄影机系统新品发布会将在 7 月 22 日（明日） 22:00 举行，主题为“光影未来，赋能创作”。 结合 SonyAlpha Rumors 今日爆料，索尼这场发布会将推出 FX5 电影摄影机。IT之家附该机传闻参数如下：1660 万像素全堆栈式 CMOS 传感器；BIONZ XR 2 图像处理器，支持 Alpha 7R VI 同款 AI 自动对焦功能；支持 5K 片门全开（Open Gate）录像；支持 16-bit 机内 RAW 视频录制，格式包含 X-OCN LT/C1/C2；800/4000/12800 三原生 ISO；16 档动态范围；支持伪色显示；支持机身五轴防抖；采用威尼斯电影机风格菜单；没有内置 ND 滤镜、不支持外接 SSD 录制，也不支持拍照；提供可拆卸式寻像器，售价约 799 欧元（现汇率约合 6181 元人民币）；3.5 英寸全翻转显示屏；双 SD / CFExpress Type-A 卡槽；外观延续 FX3 风格；可选配 XLR 手柄，支持 32-bit 浮点音频录制；使用 Alpha 7R VI 同款电池（型号 NP-SA100）；机身重量约 750g。此外，索尼预计还将在明天推出 100-400mm f/5.6-8 长焦全画幅镜头，主打轻巧设计、有黑色版本，支持镜头防抖。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/784.htm", "publishedAt": "2026-07-21T14:22:03+00:00"}, {"title": "DoorDash 如何打造了一款不完全依赖大型语言模型（LLM）的 AI 购物助手", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/QAIQh8E5yNr4i4RAYySz?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-21T14:15:00+00:00"}, {"title": "让 Gemini 帮你填表，谷歌 Chrome 浏览器将升级自动填充功能", "summary": "IT之家 7 月 21 日消息，据科技媒体 Windows Report 昨天报道，谷歌 Chrome Canary 浏览器正在测试“使用 Gemini 填充”功能，允许用户在不离开当前网页的情况下，从 Gmail、Google 照片等应用中调取信息，并自动填写表单。IT之家从原报道了解到，用户可在支持的填充框输入 @@启用该功能，也可以右键选择“随处搜索并填充”。首次使用时，Chrome 会弹出提示，说明该功能由 Gemini 提供支持，可从 Gmail 等谷歌自家应用中查找信息。用户启用该功能时，Chrome 会将当前网页的标题、URL 发送至谷歌服务器。谷歌保证，自动填充表单的信息不会用于训练 AI 模型，也不会由人工审核。目前该功能仍处于 Canary 测试阶段，正式版发布时间暂未公布。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/776.htm", "publishedAt": "2026-07-21T13:37:44+00:00"}, {"title": "微软与法国 AI 企业 Mistral 达成协议，斥资数十亿美元在欧洲建设算力基础设施", "summary": "IT之家 7 月 21 日消息，微软当地时间周二宣布，已与法国人工智能初创公司 Mistral 达成合作协议，将投入数十亿美元建设 Mistral 在欧洲的算力基础设施，同时借助微软的云计算和软件平台，在全球进一步推广 Mistral 的 AI 技术。根据协议，微软 Azure 客户将能够直接使用 Mistral 位于法国的数据中心开发 AI 应用。这不仅将提升微软在欧洲的算力资源，也为金融、政府等受监管行业提供了一个不依赖美国控制基础设施的替代方案。与此同时，Mistral 已将旗下 AI 模型 Medium 3.5 和 OCR 4 接入微软的 AI 开发平台 Foundry，微软 Copilot Studio 也已支持 Medium 3.5 模型。此外，拥有自建数据中心、通过 Azure Local 使用微软服务的企业，也可以部署 Mistral 的开源 AI 模型。这类模型允许企业获得授权后进行自主开发和定制，更灵活地打造符合自身需求的 AI 系统。此次合作凸显出欧洲及其他地区希望减少对美国科技依赖的趋势，以便在未来数字经济和社会发展中掌握更多自主权。同时，这项合作也有助于微软满足市场对开源 AI 模型不断增长的需求。事实上，欧洲推动“AI 主权”的努力已经持续数年。而上个月，美国决定暂停向海外开放旧金山 AI 公司 Anthropic 的两款先进模型，使欧洲对技术自主的需求变得更加迫切。微软总裁布拉德 · 史密斯（Brad Smith）与 Mistral 首席执行官阿瑟 · 门施（Arthur Mensch）在接受路透社采访时表示，双方合作的目标是在保障欧洲 AI 自主性的同时，仍然能够享受到美国软件生态和安全能力带来的优势。史密斯表示：“通过让 Mistral 模型同时运行在 Azure Local 和 Mistral 自己的算力平台上，我们能够把美国和欧洲的技术结合起来，并以一种能够持续、可靠提供服务的方式实现这一目标。”不过，要让欧洲真正摆脱对美国技术的依赖并非易事。当前推动全球 AI 热潮的英伟达 GPU 仍由美国设计，而 Mistral 的数据中心建设同样依赖英伟达芯片。英伟达与微软一样，也是 Mistral 的投资方。史密斯强调，此次公布的合作协议并不包含微软对 Mistral 新增股权投资。对于彭博社此前报道称 Mistral 正洽谈新一轮融资、计划以约 200 亿欧元（IT之家注：现汇率约合 1547.14 亿元人民币）估值融资约 30 亿欧元的消息，门施拒绝置评。总部位于巴黎的 Mistral 被视为欧洲 AI 领域最具代表性的企业之一，也是欧洲在 AI 竞争中的重要希望。目前，公司主要面向制造业、金融服务和国防等领域提供 AI 解决方案，并已获得法国军方订单。不过，与 Anthropic 等美国 AI 公司相比，其估值仍存在明显差距。门施表示，此次合作表明，微软和 Mistral 正在共同努力，缩小欧洲在 AI 基础设施方面与美国之间的差距。Mistral 计划到 2030 年建设总计 1 吉瓦的 AI 算力基础设施。虽然门施没有披露微软此次合作的具体投资金额，但他表示，这项协议证明了 Mistral 当前发展战略的正确性。双方还透露，微软和 Mistral 正在制定联合市场推广计划，进一步扩大双方产品和服务的市场覆盖范围。史密斯表示：“毫无疑问，这项合作将帮助我们两家公司共同实现业务增长。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/773.htm", "publishedAt": "2026-07-21T13:22:37+00:00"}, {"title": "阿里千问 Qwen3.8-Max-Preview 最新版本已上线，前端表现获提升", "summary": "IT之家 7 月 21 日消息，据千问大模型官方消息，Qwen3.8-Max-Preview 最新版本已上线，能力又有提升，前端（WebDev）表现会更好。千问大模型称：“Qwen3.8 仍在每天进化，欢迎大家通过 Token Plan、Qoder、Qoderwork、Qwen Studio 等平台和渠道来体验和测试模型，给我们多提意见，帮助它更好地成长。我们期待一个更强大的正式版 Qwen3.8-Max，开源给所有人。”IT之家注意到，阿里千问 Qwen3.8 预览版模型于 7 月 19 日正式上线，官方当时称“新模型参数 2.4T，正在以‘天’为单位持续进化，可能是除了 Fable 5 外最强大的模型。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/756.htm", "publishedAt": "2026-07-21T11:29:06+00:00"}, {"title": "关海涛官宣荣耀与阿莱 ARRI 成为全球影像战略伙伴", "summary": "IT之家 7 月 21 日消息，荣耀全球首席营销官关海涛今日宣布，荣耀与顶级电影摄影机厂商阿莱 ARRI 成为全球影像战略伙伴。据IT之家此前报道，今年 3 月，荣耀在 MWC 2026 全球发布会上，宣布与顶级电影摄影机厂商 ARRI 阿莱达成战略技术合作。本次合作将率先在全球首款机器人手机 Robot Phone 中落地，旨在融合荣耀的移动影像以及 ARRI 百年底蕴的电影摄影技术。据IT之家此前报道，荣耀 Robot Phone 已正式开启预约，该机搭载第五代骁龙 8 至尊版芯片，其核心创新在于机身顶部集成了一套行业最小的四自由度（4DoF）钛合金机械云台系统。云台系统配备微型电机，体积比主流方案缩小 70%。消息称，该机 200Mp 云台影像是基础，核心机构件、电机、模组全部是荣耀自研和独立定制，整套云台及翻转机构新增了近 100 个零部件。而在内存涨价的大背景下，行业预测 1TB 版本的价格要到 15999 元左右。该机预计会在今年 8 月发布，并将首发荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 的内核（AgenticOS 尝鲜版将由荣耀 Magic9 系列手机发布）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/753.htm", "publishedAt": "2026-07-21T11:16:34+00:00"}, {"title": "“画中画中画”——Qwen Image 3.0 把四层 UI 塞进了一张图", "summary": "阿里巴巴发布了 Qwen Image 3.0，图像生成模型系列的第三代。如果说 1.0 的关键词是\"准\"，2.0 是\"准、多、齐、美、真\"，3.0 只给了一个字——\"实\"。 这个\"实\"体现在三个维度： 内容丰实：支持最大 4.5k token 输入，轻松生成报纸、分镜、试卷等复杂版面。 细节真实：支持 10px 小字精准渲染，毛孔、发丝细节生动还原，逼...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476175/qwen-image-3-0", "publishedAt": "2026-07-21T11:00:05+00:00"}, {"title": "靠 AI 两个月自研 CRM 系统，Curative 创始人认同“SaaS 末日”论", "summary": "IT之家 7 月 21 日消息，据 Business Insider 报道，美国健康保险公司 Curative 创始人兼 CEO 弗雷德 · 特纳（Fred Turner）相信，SaaS（软件即服务）行业正迎来所谓的“SaaSpocalypse（SaaS 末日）”。在播客《20VC with Harry Stebbings》的一次采访中，主持人问他是否认同“SaaS 正在走向衰落”这一观点，特纳直截了当地回答：“认同。”当被问及原因时，他表示：“看看我们正在取消的合同数量就知道了。我们最近刚刚终止了 Salesforce 的合同，因为我们已经用 AI 氛围编程（vibe coding）开发了一套自己的 CRM 系统（内部客户关系管理系统）。”特纳透露，这份 Salesforce 合同每年费用高达 60 万美元（IT之家注：现汇率约合 406.7 万元人民币），而 Curative 仅用了两个月就完成了替代系统的开发。他表示，公司计划在今年削减约 80% 的 SaaS 支出，并将这些预算转投 AI。他的观点正是华尔街在 2026 年初最担心的“SaaS 末日”理论。随着 AI 编程助手能力迅速提升，投资者开始担心，大量原本购买 SaaS 产品的企业会转而借助 AI 自行开发定制软件，而不是继续购买第三方软件服务。受这种担忧影响，Salesforce、Asana、DocuSign、ServiceNow、Adobe 和 Workday 等 SaaS 企业股价一度累计下跌 20% 至 50%。不过，Salesforce CEO 马克 · 贝尼奥夫（Marc Benioff）一直公开反驳这一观点，他表示，公司产品依然保持着“惊人的市场需求”，并特别指出，开发 Claude 模型的大型 AI 公司 Anthropic 至今仍在使用 Salesforce 的服务。贝尼奥夫在今年 2 月财报电话会议上表示：“如果真有所谓的‘SaaS 末日’，它很可能会被‘SaaS-quatch（SaaS 大脚怪）’吞掉，因为随着 AI 智能体的发展，SaaS 产品实际上变得更强大了，仍然有大量企业在使用它们。”Salesforce 发言人也表示，目前仍有约 15 万家企业使用 Salesforce 平台，并强调其产品能够满足医疗行业复杂的监管要求，例如 HIPAA（美国《健康保险可携性和责任法案》）。该发言人表示：“我们的平台始终以可信赖和完善的治理能力为核心。”特纳也承认，用内部系统替代外部 SaaS 并非没有代价。他说，系统维护“绝对是最具挑战性的部分之一”。与此同时，Curative 在 Anthropic 上的支出却快速增长，因为公司不断发现 AI 的新应用场景。特纳表示：“过去六七个月，我们支付给 Anthropic 的费用几乎每个月都增长了 6 倍，从最初每月几万美元，已经增长到现在每月数百万美元。最终，我们肯定需要控制这种增长，否则成本会变得不合理。但问题是，我们总能不断发现新的 AI 应用。”不过，他认为，即使 Anthropic 将价格提高五倍，Curative 的整体投入产出比依然划算。特纳举例称，公司目前拥有一个名为 Gwen 的定制 AI 智能体，专门负责与医生及其他医疗服务提供方谈判合同。他说，在引入 AI 之前，公司完成一份合同的平均成本约为 1500 至 2000 美元（现汇率约合 10167 至 13556 元人民币），而 Gwen 的平均成本仅约 70 美元（现汇率约合 474.5 元人民币）。他说：“我们的思路是，既然已经有了 AI 智能体，那么今年就可以完成去年 10 倍数量的合同。未来我们还希望做到 20 倍。相比完全依赖人工团队，我们能够处理远远更多的业务量。”截至发稿，Curative 尚未回应媒体的置评请求，而 Salesforce 则拒绝发表评论。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/736.htm", "publishedAt": "2026-07-21T10:20:02+00:00"}, {"title": "1500 元的 Codex 键盘卖断货，这小哥反手自己造了一台", "summary": "一起缺货的还有 ChatGPT 篮球#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672648?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-21T09:52:49+00:00"}, {"title": "全链路研发智能体 —— 从 \"体感能用\" 到 \"实际可用\" 的工程实践", "summary": "AI Coding 已改变研发方式，但单点代码生成只占研发工时 10-32%，整体提效有限。本文从我们团队在项目的真实交付复盘出发，提出 Harness 全链路研发智能体：把大模型放进一套可控的研发流程，将需求分析、接口设计、代码生成、自动 CR、单测、冒烟验证、环境部署、问题排查串成带反馈控制的闭环，让 AI 从 \"会写代码\" 升...", 首款产品并未取得市场成功，市场反响远低于预期。后续公司放弃消费级市场战略，创始人兼 CEO Rony Abovitz 离职，随后推出的 Magic Leap 2 则完全转向企业市场。IT之家注意到，Magic Leap 此次转型并非突然发生，根据彭博社早在 2024 年 7 月的报道，Magic Leap 当时便已开始逐步放弃自研整机业务，希望将多年积累的 AR 光学技术商业化，通过授权和供应核心组件寻找新的增长点。如今，随着 AI 智能眼镜成为行业新热点，Magic Leap 希望凭借自身在光波导显示领域积累多年的技术优势，从整机厂商转型为核心零部件供应商，在新一轮 AR 产业竞争中寻找新的发展机会。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/774.htm", "publishedAt": "2026-07-21T13:29:09+00:00"}, {"title": "WAIC重磅成果｜仪电智算云在国家人工智能应用中试基地建设中展现全栈服务能力", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/455998.html", "publishedAt": "2026-07-21T09:15:50+00:00"}, {"title": "Solon TeamAgent 协作协议：从 SEQUENTIAL 到 HIERARCHICAL", "summary": "如果单个智能体是专家，那团队就是组织架构。难点不在“多加几个 Agent”，而在于：下一步谁说话、谁审核、何时停机。 Solon AI 的 TeamAgent 把这件事做成一等公民——协作协议（TeamProtocol）。换协议、保留成员，同一支队伍就能从线性流水线切到主管制层级协作，而不必重写业务逻辑。 本文梳理内置协议、生产环境真正...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475702", "publishedAt": "2026-07-21T02:20:00+00:00"}, {"title": "神州数码发布企业AI流程系统与智算产品，尝试打通应用和算力两端", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/jc1vll7xctqYlopcwIKe?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T19:59:20+00:00"}, {"title": "无问芯穹夏立雪：数字世界与物理世界的所有AI生产力运行，都需要 Agentic Infra", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/AWhEVVgvNquuiKZdRQ0H?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T16:41:21+00:00"}, {"title": "苹果国行 AI 刷屏之外，三星也把端侧大脑交给国产 AI", "summary": "把智能装进手机的秘诀，在于「多、快、好、省」#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672593?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-20T11:40:22+00:00"}, {"title": "Linux 基金会推出 x402 基金会", "summary": "Linux 基金会宣布 x402 基金会正式启动运营，一个新成立的开放治理机构，旨在管理 x402 协议 —— 基于 HTTP 的互联网原生支付开放标准。 x402 协议最初由 Coinbase 开发，将安全支付功能直接嵌入到 Web 交互中，使 AI 智能体、API 和应用程序能够像交换数据一样无缝地发送和接收付款，并支持从传统银行卡到稳定币的各种... const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
