扶持开源 AI 发展，保障算力与公共研发资源供给，区分合法模型蒸馏技术与非法盗用行为，避免过度管制压制创新。依靠开放权重构建多元、普及的 AI 生态，推动人工智能落地各行各业，才能巩固美国技术优势，广泛共享人工智能发展红利。IT之家附译文如下：20 世纪 80 年代，早期开源软件先驱挑战了“只有企业严格控制代码，软件才能进步”的主流认知。这场运动推动构建一个透明的生态系统，让全球开发者能够研究、修改并改进软件。如今，开源社区开发的软件支撑着互联网的大部分运行，也是全球最大科技公司、美国军方及联邦机构开展科研、网络安全等关键任务所依赖系统的底层基础。开源的意义不止于降低软件成本；它构建了一个共享知识底座，几代美国工程师和企业家在此之上建立了自身的技术主权。美国如今在人工智能领域面临类似抉择。评判我们的 AI 领导力，不应以单一前沿模型为标尺，而要看美国能否构建一个强大、开放的生态系统，并渗透至各行各业。这对于在全国范围内创造创新与繁荣机遇至关重要。它要求扩大 AI 可及性、鼓励竞争、构建强健的应用层，并让美国人对其所依赖的技术拥有更大控制权。开源权重模型 —— 任何人都可下载、检视、修改并在自有基础设施上运行的 AI 模型 —— 是这一基础的重要组成部分，因为它们让先进 AI 更易获取、更具适应性、普及范围更广。开源权重扩大了 AI 经济的参与面。初创企业、成熟企业、大学及公共机构无需从零训练模型，也不必为每项任务支付前沿模型的费用，即可基于先进模型进行开发。开源权重让每个组织都能以合理成本为对应任务匹配合适的模型：前沿规模能力留给真正的前沿问题，其余场景则运行高效的专用模型。当 AI 应用扩展至数十亿日常任务时，这种资源配置原则将是 AI 实现经济可持续性的关键。美国赢得 AI 时代的方式，是将其渗透到工厂、医院、农场、课堂和街边商铺的工作流程中。开源权重还能强化竞争，而竞争是确保 AI 收益广泛共享、而非集中于少数人手中的核心。通过允许多个机构构建、适配和部署先进模型，开源权重不仅在模型开发者之间创造竞争，也在云端芯片、应用和服务层面形成竞争。这种竞争激励创新、压低费用，并将 AI 的收益广泛分布于整个经济体系。开源权重还赋予用户更大控制权。各组织在投资 AI 时，都不希望被单一供应商锁定，也不愿丧失长期积累的知识与能力。开源权重模型提供了这一保障：组织可以掌控自有数据，根据自身需求评估和适配模型，并根据业务要求在任意位置部署。当组织借助 AI 创造价值时，开源权重使其能够通过自改进模型、专用能力和积累的知识拥有这份价值，进而推动美国的技术主权与繁荣。诚然，开源权重存在真实且独特的风险。权重一经发布，便脱离原始开发者的控制，修改后的版本也难以追踪或撤回。但应对这一风险的正确方式并非禁止开源权重。在网络安全攻击者使用先进 AI 的世界里，防御方需要获得同等能力的模型，才能检测、模拟和应对新兴威胁。开源模型拓展了防御能力、提升了透明度，并允许多个团队发现并修复漏洞。事实上，开放性可能是实现 AI 安全与保障的最重要路径之一。单纯依赖闭源模型并非本质安全：它们可能被攻破、滥用，或以外部无法察觉的方式失效。将先进 AI 能力集中于少数闭源模型背后，会加剧这一风险 —— 它造成少量单点故障、削弱竞争，并将关键技术交由少数供应商掌控。相比之下，开源权重模型允许广大研究人员和开发者检视其行为、识别漏洞、制定防护措施并持续改进。正如开源软件证明了 \" 透明比隐匿更安全 \"，AI 安全或许有赖于让更多人有能力测试和加固社会所依赖的模型。它支持严格的基准测试与评估、红队测试，以及基于真实可证危害的防护措施，而非默认假设闭源系统更安全。强大的 AI 生态并非必然结果。政策制定者拥有重要的行动窗口，包括：扩大初创企业和研究人员的算力获取渠道；投资共享训练资产（数据集、工具、评估框架）；避免对开源模型施加过早限制而扼杀竞争或将创新驱至海外，以此保持前沿领域的多元性。这些措施还需关注如何通过强健的应用层扩大 AI 在整个经济中的自主化应用。在塑造这一生态系统时，政策制定者应谨慎区分合法的模型开发技术与不当挪用行为。蒸馏（利用一个模型的输出来辅助训练或改进另一模型的做法）是模型改进、评估和验证中广泛使用的技术。它延续了学习、借鉴并改进现有技术的悠久传统 —— 这一传统自开源软件运动兴起以来一直推动着创新。相比之下，非法从闭源模型中攫取价值的行为确实值得关注，但这些问题应通过针对性的法律和商业框架解决，而非对 AI 创新中发挥重要作用的技术进行一刀切限制。AI 时代可以是一个繁荣的时代。做出正确选择，开源权重 AI 就能扩大机遇、强化竞争、延续美国技术领导力、降低风险，并确保这一非凡技术的收益在整个经济中广泛共享。这样的未来值得构建，而美国应引领其建设。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/384.htm", "publishedAt": "2026-07-24T14:09:10+00:00"}, {"title": "蚂蚁集团发布百灵原生混合推理模型 Ling-3.0-flash：124B 总参数量，能力对标上一代旗舰 Ring-2.6-1T", "summary": "IT之家 7 月 24 日消息，蚂蚁集团旗下百灵大模型今日发布百灵新一代原生混合推理模型 Ling-3.0-flash。官方表示，相比上一代 1T 级旗舰思考模型 Ring-2.6-1T，Ling-3.0-flash 的总参数量为 124B（约为 Ring-2.6-1T 的 12.4%），激活参数量仅为 5.1B（约为 Ring-2.6-1T 的 8.1%），却实现了全方位的能力对标甚至超越。据介绍，Ling-3.0-flash 的核心改进体现在如下几个方面：混合线性架构，原生进化：从预训练伊始即采用原生混合线性注意力架构（5:1 交替堆叠 KDA 与 MLA），并升级全新 KDA 细粒度对角门控与 1/64 稀疏 MoE。在 124B 总参数、5.1B 激活参数规模下，实现了长上下文效率、状态记忆与计算成本的协同跃升。极致智能密度，越级挑战：追求“快、省、可落地”的智能密度与智效比极限，在直面更大尺寸竞对 SOTA 及上一代旗舰时实现性能越级。仅需 5.1B 激活参数即可提供卓越的传统推理、指令遵循与长文本能力，全面赋能复杂 Agent 场景的高效落地。Agent 全面进化，长程闭环：围绕真实生产力场景深度打磨，扩展 10,000+ 可交互训练环境，实现 Coding、General 与 Deep Research Agent 任务的全程闭环，做到“能力强、响应快、协同稳”。同时创新接入 SGLang HiCache + Mooncake 分级缓存架构（物理双池、集群共享 L3），使长程交互无需重算，长输入下 TTFT 降低 60% 至 80%+。官方在 OpenRouter 与百灵官方平台同步开放限时免费 API 调用，免费期截至 8 月 3 日 23:00（北京时间），Ling-3.0-flash 模型权重将在免费期结束后正式开源。IT之家附 OpenRouter 体验地址：https://openrouter.ai/inclusionai/ling-3.0-flash:free", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/382.htm", "publishedAt": "2026-07-24T13:57:29+00:00"}, {"title": "印度科技企业 HCLTech 将参与奥里萨邦 1425.7 亿卢比 AI 数据中心建设", "summary": "IT之家 7 月 24 日消息，印度科技企业 HCLTech 今日正式宣布将联手奥里萨邦政府与印度 AI 初创企业 Sarvam 在该邦 Bhubaneswar 即将落成的主权人工智能产业园区共同建设一座 AI 数据中心，项目总投资额 1425.7 亿卢比（IT之家注：现汇率约合 100.04 亿元人民币）。这项投资将结合 HCLTech 的全栈人工智能能力和 Sarvam 的基础模型，为私营和公共部门企业提供特定行业的 AI 应用，助力印度自主人工智能生态系统构建。此外，它还将有助于向基层用户提供多语言 AI 服务。除数据中心外，HCLTech 还将在 Bhubaneswar 建设其全球技术中心。该设施可容纳 5000 名员工，预计 2028 年投运。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/379.htm", "publishedAt": "2026-07-24T13:46:37+00:00"}, {"title": "小米新机入网：备案小米 MiMo、文心一言、DeepSeek、通义千问等多款大模型", "summary": "IT之家 7 月 24 日消息，博主 @数码闲聊站 今日爆料，小米一大波新机入网了，REDMI 两台 100W 新机是常规备案，小米 2608BPX34C 新机备案了一堆大模型。包括：小米大模型、小米澎湃视觉大模型、小米澎湃感知大模型、小米 MiMo 大模型、智谱 AI 大模型、文心一言大模型、云雀 (豆包) 大模型、DeepSeek 大模型、通义千问大模型、混元大模型，估计是澎湃 OS4 新系统。目前尚不清楚这款新机的具体型号以及上市时间，从目前的消息来看，这款新机有望支持多款大模型切换。目前，小米已经推出小爱同学人工智能助手，于 2024 年升级为“超级小爱”，全面搭载于小米生态设备中，是小米“人车家全生态”跨端智联的重要部分。今年 3 月，小米推出基于小米 MiMo 大模型构建的 AI 交互测试产品 Xiaomi miclaw ，也是国内首款手机端 AI 智能体应用。据IT之家今年 5 月报道，小米集团合伙人、总裁、手机部总裁、小米品牌总经理卢伟冰明确表示，miclaw 不会取代小爱同学。未来的话，miclaw 会跟超级小爱合体，就是说会把 miclaw 的能力融入到小爱当中，让小爱变得更加强大。所以用户看到的界面还是超级小爱，但是它的能力会被 miclaw 所赋能。所以它是一个更加聪明、更加能干的超级小爱。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/378.htm", "publishedAt": "2026-07-24T13:29:04+00:00"}, {"title": "宇树发布轮足机器人 As2-W：速度 6m/s、IP54 级防水、空载续航距离超 30km", "summary": "IT之家 7 月 24 日消息，宇树科技今日发布新产品 As2-W 轮足机器人（机器狗），官方称其可以 16kg 持续负重长效作业，空载续航距离超 30km。IT之家从官方宣传视频中获悉，As2-W 可实现 6m/s 高速疾驰，并完成高台俯冲、侧向翻转、腾空转体等动作；具备 IP54 级防水，可踏水穿流。据悉，这款机器人在年初发布的 As2 基础上增加了四个主动轮，结合了轮式移动的速度与效率以及四足结构的越障能力。As2-W 自重约 25kg，负重可达 180kg，视频还显示其搭载预训练 RL 模型 6.0。相关阅读：《宇树发布 Unitree As2“可载人”四足机器人：空载续航超 4 小时，负载 15kg 续航超 13km》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/372.htm", "publishedAt": "2026-07-24T12:41:31+00:00"}, {"title": "中国信通院牵头，多媒体数据编织国际标准在国际电信联盟成功立项", "summary": "IT之家 7 月 24 日消息，中国信通院今日发文称，国际电信联盟第 21 研究组（ITU-T SG21）于 2026 年 7 月 6-17 日在瑞士日内瓦召开全体会议，来自中国、美国、德国、日本、韩国、巴西、瑞士、加拿大、英国等国家和国际组织的百余名代表参加了会议。会议期间，由中国信息通信研究院牵头提出的国际标准项目 ITU-T F.DF-RefFram \"Requirements and reference framework for data fabric system in multimedia\"（《多媒体数据编织系统要求与参考框架》）正式立项。IT之家注意到，随着数字经济与人工智能加速发展，数据资源呈现来源多样化、模态多样化、存储分布化和应用智能化等特征。文本、图像、音频、视频、三维内容、网络遥测数据、业务交互数据以及人工智能训练和推理数据广泛分布于本地系统、云平台、边缘节点、内容平台和合作伙伴环境中。传统以集中汇聚为主的数据管理方式，在跨系统数据发现、异构数据集成、语义统一、访问控制、数据治理和智能供数等方面面临新的挑战。数据编织（Data Fabric）作为“逻辑统一、物理分布”的新型数据管理架构，具有分布式、自动化和智能化的特征。其能够在数据不必全部集中迁移的情况下，实现对多源异构数据的统一发现、理解、访问、集成、治理和服务化供给。该标准拟系统规定多媒体数据编织系统的总体定位、基本概念、参与角色、功能要求、参考框架、功能组件及关键业务流程。该标准的立项有助于推动国际产业界形成对数据编织系统的统一认识，降低不同数据源、平台和服务之间的集成复杂度，提升多模态数据发现、访问、治理和供给效率。该标准将重点解决分布式数据发现、连接、语义管理、服务编排和治理控制等共性技术架构问题，为数据开发利用和人工智能高质量数据供给提供标准化支撑。同时，该标准的立项标志着中国信通院在数据领域标准化研究方面取得积极进展，进一步推动我国数据领域标准化研究在国际上的走深向实。下一步，中国信通院将联合各方推进数据领域标准化研究，推动标准成果与产业实践相结合，加强与有关国际标准化组织的协同，夯实我国在国际标准化工作中的影响力。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/366.htm", "publishedAt": "2026-07-24T11:52:56+00:00"}, {"title": "菲尔兹奖得主邓煜谈 AI：已能帮助数学证明，但不能替代独立思考", "summary": "7 月 24 日，2026 年菲尔兹奖得主、芝加哥大学教授邓煜近日在接受采访时透露，他在数学研究中会使用 AI 辅助工具，GPT 曾帮助解决一个连续几天未能突破的数学特例。邓煜表示，他使用 AI 的感受是“已经让很多研究环节方便了不少”。对于一些基本确定为真的简单结论，他会让 AI 给出证明后再进行检查；AI 有时也能补充他不知道的知识，例如某个组合计数问题所对应的已有结构或标准结论。邓煜透露，在近期一项工作中，有一个主要命题的特殊情形，他连续几天没有解决，GPT 给出了一个非常简单的证明，很快处理了那个特例。虽然该证明无法推广到一般情形，未写入最终论文，但提供了有价值的思路。邓煜表示，AI 即使不能直接完成最终证明，也可能帮助研究者迅速探索局部路线。他期待未来出现一种更成熟的协作方式：人类研究者负责总体框架和核心思路，AI 帮助完成部分技术性推导。但他也强调，对刚进入科研的学生而言，使用时仍要保持判断力，“不能因为 AI 给出了一段看似完整的论证，就跳过独立判断和严格核验这些必要的步骤”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/356.htm", "publishedAt": "2026-07-24T10:38:38+00:00"}, {"title": "亚马逊升级 Alexa+ AI 助手，可完成购物、餐厅预订、叫车等任务", "summary": "IT之家 7 月 24 日消息，亚马逊官方今日宣布升级 Alexa+ AI 助手，Alexa+ 支持自然对话、信息记忆和任务执行，可帮助用户管理日程、总结邮件、生成播客、控制智能家居，并完成购物、餐厅预订、叫车等日常任务。Alexa+ 已从单纯的语音助手升级为一个具备多模态能力（视觉识别、生成式 AI 创作）、超强记忆力，并打通了众多第三方现实服务接口（打车、订餐、家政、票务）的全方位人工智能生活助理。官方表示，只需唤醒一次，即可与 Alexa+ 就像和朋友一样进行多轮自然对话，涵盖几乎任何话题。亚马逊与美联社、路透社等 200 多家顶级新闻机构合作，Alexa+ 可提供实时的个性化新闻摘要。此外，用户无需动手，可直接通过语音叫 Uber（可在屏幕上显示车费和等待时间）、在 OpenTable 预订餐厅，或在 Grubhub 语音点外卖，并随时调整订单。IT之家获悉，Alexa+ 可以记住用户偏好，并在 Echo 音箱、手机 App、车载设备和网页端之间无缝同步对话上下文，同时整合购物、音乐、FireTV 等生态服务，提供个性化推荐和 AI 辅助购物体验。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/338.htm", "publishedAt": "2026-07-24T10:16:28+00:00"}, {"title": "ServiceNow 首席执行官：我家平台设有终止开关，AI 模型不会失控越狱", "summary": "IT之家 7 月 24 日消息，SaaS（软件即服务）企业 ServiceNow 首席执行官 Bill McDermott 表示，该企业的平台设有终止开关，可以阻止失控的 AI 智能体，因此不会发生类似 OpenAI 内部模型逃逸容器并攻击 Hugging Face 基础设施情况；客户使用 ServiceNow 服务时也不会出现此类问题。Bill McDermott 认为人工智能的快速普及正在增强 ServiceNow 的竞争地位，其控制系统为客户一个集中监控、管理、保护日新月异 AI 智能体的平台，帮助客户“从 AI 混乱走向 AI 纪律”。这位首席执行官并不赞同人工智能会对该企业的盈利前景带来负面影响的观点：随着人工智能的普及，对 ServiceNow 软件的需求也将提升。他正看到合同期限的进一步延长。ServiceNow 在 2026Q2 季度实现 38.77 亿美元订阅收入，同比增长 24.5%；剩余履约义务 132 亿美元，同比增长 21%；达成 123 笔价值超过 100 万美元的新合同。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/328.htm", "publishedAt": "2026-07-24T09:48:24+00:00"}, {"title": "Token 调用量涨 6 倍！华为：运力成 AI 算力最大瓶颈，不该执着单芯片制程", "summary": "7 月 24 日下午消息，近日，华为中国政企互联网系统部举办互联网行业媒体沟通会，系统阐述了互联网 AI 算力产业痛点、算存网一体化底座技术方案、昇腾开源生态建设、分层算力落地路径及长期产业生态布局。当前，AI 大模型正式从技术验证阶段迈入规模化商用新阶段，AI Agent 已然成为互联网业务核心增长引擎。但行业智能化升级仍深陷多重困境，底层算力支撑不足、跨场景适配成本高昂、技术开发门槛偏高等难题，持续制约产业智能化转型速度与落地效率。在与新浪科技等媒体沟通中，华为中国政企互联网行业总经理黄健坦言，相较于电器时代循序渐进、适配性较强的产业迭代节奏，当下 AI 领域 Token 用量的爆发式增长，已经远超社会与行业的适配速度，催生了各行业普遍的 AI 转型焦虑。“预计 2027 年至 2030 年间，token 经济将全面影响所有作业行为及工作框架，短短三年内消化如此巨大的转变，给整个行业带来了巨大压力与挑战。”黄健直言。他援引机构数据表示：过去半年内，token 消耗量增长了 6 倍，模型调用次数增加了约 50 至 100 倍。这一增长趋势必将拉动算力服务、数据存储、网络服务等上下游配套需求的上升。在黄健看来，“在算力、存力和运力三者中，运力是目前最突出的瓶颈，与其执着于单芯片制程，不如通过网算存协同一体化将‘高速公路修得更宽’。”据他介绍，“华为已将 NPO 带宽提升八倍以上，Token 产生效率提升五倍。”他进一步介绍道，大模型训练和推理对通信时延与集群互联要求急剧上升，华为依托星河 AI 数据中心网络和昇腾超节点，从硬件、软件、调度、生态四层协同，大幅降低了分布式通信损耗，并通过弹性调度适配业务波峰波谷和多并发场景。回到互联网行业，针对这一行业高并发、高稳定的特殊需求，黄健介绍了华为搭建的三层专属服务体系，覆盖不同规模企业全生命周期交付运维。针对头部互联网大厂，搭建专属服务团队，配备百余人研发与行业复合型工程师，提供贴身管家式服务；面向中小互联网企业，联合生态伙伴提供标准化服务，涵盖前期算力架构规划、网络优化部署，日常 7×24 小时远程和现场运维，同时持续提供开源框架适配、版本迭代配套等服务。据悉，面向互联网与云厂商的等高要求客户群体，华为不仅可提供昇腾超节点技术、灵渠、高可靠等产品，更投入几千人在主流开源软件适配，进行联合创新，支撑好模型进而支撑好业务使用；同时与业界主流开源社区协同，参与开源社区的贡献、治理、路标规划等，并将优质特性上传社区，为开发者提供高效、高品质的算力底座与易用开发工具，大幅降低大模型训推、迁移落地门槛，通过这些努力，华为有信心支撑互联网或大模型厂商的发展。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/320.htm", "publishedAt": "2026-07-24T09:28:19+00:00"}, {"title": "我国成功发射两颗 AI 卫星：一颗能自己管自己，一颗在天上做气象预报", "summary": "IT之家 7 月 24 日消息，力箭一号遥十五运载火箭今日在东风商业航天创新试验区成功发射，以“一箭 5 星”方式将 5 颗卫星送入预定轨道。据央视新闻报道，吉天星 A-04 星是今天成功发射的一颗卫星，它也叫“云尖沐曦号”，这是一颗以人工智能为基本属性的卫星，运行靠 AI 驱动，并采用 AI 设计。这颗卫星主要搭载红外传感器，用于林火等地面异常监测。但它最特别的地方不在于拍什么，而在于它怎么工作。这颗卫星搭载了之江实验室自研的具身智能模型，能“自己管理自己”。不管是卫星自身健康状态的监测，还是单星甚至多星星上任务的自主规划与执行，都能通过该模型在轨自主完成。传统卫星的控制和运行、任务调度，全都要靠人在地面编好指令，然后通过地面站发给卫星，卫星来执行一系列工作。现在人只需要向模型提出需求，它就会自动工作。但真正让这颗卫星更聪明的是，它可以实时上注 AI 大模型。中国工程院院士、之江实验室主任王坚表示：传统卫星制造就是卫星在地面制造完以后，所有东西都固化好了，到天上就是用而已。人工智能模型发展太快了，我们这个模型不是在卫星在地面的时候就把它放上去了，我们是从地面把模型实时上注到天上去，所以我们今天训好的模型，明天就能送到太空去。此外，这颗卫星的部分结构也是由 AI 模型生成的，并使用 3D 打印一体制造，比传统设计组件更少，整体更加轻量化。同样搭载 AI 大模型的还有另一颗卫星 —— 西光贰号 03 星，它也叫“星火传明气象卫星”，这颗卫星搭载了三个 AI 气象模型，任务是变革天气预报的生成方式。传统气象卫星预报天气的流程，是卫星在天上记录下数据后，经过 90 分钟时间传回地面，地面再经过解析、修正，最终发布，时效性相对较低，数据更新较慢，日常预报完全够用，但遇到短时暴雨、大风这样的突发天气，就心有余而力不足了，这种短临预报对时效性要求极高。这颗卫星搭载了三个 AI 模型，每个模型都打通了从数据接收、融合处理到预报生成、产品下传的端到端全链路。卫星在星上直接产出预报结果，只下传轻量化的结论 —— 从观测到预警，实现分钟级响应，未来台风路径预判、城市内涝预警、电网防灾调度，都可能因为星上 AI 预报而变得更准、更快。刚才我们提到的这两颗卫星，都是我国正在建设的三体计算星座创新生态的一员。这两颗卫星，一颗自己管自己，一颗在天上做气象预报。它们的能力指向同一个方向 —— 把人工智能从地面搬到太空。IT之家从报道获悉，三体计算星座是之江实验室发起，全球合作伙伴共同建设的千星规模太空计算基础设施。核心思路是把成百上千颗卫星连成一张网，让“天上的事情在天上干”。按照规划，到 2027 年，三体计算星座将达到 100 颗卫星，到 2032 年将达到 1000 颗。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/300.htm", "publishedAt": "2026-07-24T09:19:08+00:00"}, {"title": "对话腾讯副总裁林松涛：意图正在代替入口，Agent 需要一颗「小脑」", "summary": "大模型是「大脑」，Marvis 想补上「小脑」#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1673039?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-24T07:43:20+00:00"}, {"title": "200 家硅谷初创联名反对白宫政府封禁中国开源 AI 模型", "summary": "\"这对 Anthropic 来说太好了，因为我们所有人都不得不花钱买 Anthropic 的服务。\" 7 月 22 日，近 200 家硅谷初创企业联名致信白宫，呼吁不要切断美国开发者获取中国开源 AI 模型的渠道。Particle 创始人 Suhail Doshi 在接受 POLITICO 采访时把话说得最直白：\"将会有数百家公司瞬间死掉。\" 这封信来自一个刚刚成立的叫\"...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/478417", "publishedAt": "2026-07-24T06:39:45+00:00"}, {"title": "德国黑森林实验室发布 Flux3 多模态模型", "summary": "德国人工智能初创公司黑森林实验室（Black Forest Labs）正式发布多模态基础模型 Flux3。该模型基于Self-Flow架构打造，配备专用的图像、视频、音频及动作编解码器，实现了对物理与数字环境的统一理解与生成。 作为首款支持原生音频生成的模型，Flux3可一次性输出长达20秒的音视频同步片段，并涵盖文本/图像/视频转视频、...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/478329", "publishedAt": "2026-07-24T04:01:10+00:00"}, {"title": "Agent 工程思考：从 ReAct 到 Agent Harness", "summary": "从 ReAct 出发，文章讨论 Agent 工程如何从 “模型循环” 走向 Harness：通过前后端共享的 State Schema、运行事实和 UI 边界，让模型行为变成可交互、可恢复、可控制、可追溯的产品能力。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/vivotech/blog/19726101", "publishedAt": "2026-07-24T03:47:08+00:00"}, {"title": "微软推出两款自研模型：MAI-Im 478278", "publishedAt": "2026-07-24T02:44:59+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "深度对话：AI Agent 真落地，为什么需要 GPU 原生认知数据库？", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/video/WKDVJzq0LF6luzNAGwrP?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-24T17:30:28+00:00"}, {"title": "谷歌签署欧盟 AI 生成内容透明度行为准则，并呼吁避免监管复杂化", "summary": "IT之家 7 月 24 日消息，谷歌宣布签署欧盟《人工智能法案》框架下的《AI 生成内容透明度行为准则》 ，以支持在欧洲市场负责任地使用人工智能。据悉，该准则核心要求主要集中在以下四个方面：机器可读的标识与水印：确保第三方工具或平台能够通过技术手段自动检测并识别该内容是由 AI 生成或修改的；人机交互的明确告知：当 AI 系统直接与人类互动时，必须在设计上保证用户能意识到他们正在与机器对话；深度伪造内容的强制声明：内容发布者必须以显眼的方式声明“深度伪造”内容是 AI 生成或修改的；公共利益相关文本的标注：如果 AI 生成的文本旨在向公众提供涉及“公共利益”的信息（例如新闻报道、政策解读等），必须明确标注该内容为 AI 生成。谷歌表示，这项举措建立在其 2025 年签署的《全球人工智能伙伴关系行为准则》的基础之上，并与该公司采纳并推广 C2PA 内容溯源标准、开发包括 SynthID 在内的 AI 透明度工具的工作重点保持一致。谷歌称将继续推广 SynthID 数字水印技术，帮助用户识别内容生成和编辑方式，并与苹果、ElevenLabs、Kakao、英伟达、OpenAI 等第三方 AI 机构合作，推动整个行业采用基于 SynthID 的可互操作水印工具。IT之家注意到，谷歌同时对监管复杂度上升表示担忧，称在技术解决方案仍在不断演进的当下，增加更多复杂的监管规定，可能会与欧洲追求竞争力及简化流程的目标背道而驰。这还可能适得其反，让那些本该受规则保护的群体感到困惑。如果互联网内容中充斥着各类重叠的 AI 标签和法律声明，人们将更难获取他们真正需要的清晰背景信息。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/393.htm", "publishedAt": "2026-07-24T15:15:13+00:00"}, {"title": "First 超短片，把镜头对准了 AI 够不着的地方", "summary": "如果一切皆可生成，影像的「真实」与「必要」又该被如何重新定义？#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672900?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-23T10:32:34+00:00"}, {"title": "RAG 核心概念与原理：Chunking、Embedding、相似度、HNSW 与多路召回", "summary": "写代码时若提问 \"这个框架的 v2.3 版本 API 怎么用\"，它提供的却是早已淘汰的 v1.x 写法；若询问「公司内部优惠券系统的退款流程是什么」，它会凭空编造一套流程。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/u/5783135/blog/19726047", "publishedAt": "2026-07-23T09:24:36+00:00"}, {"title": "梁文锋四小时投资者交流会：为什么克制是 DeepSeek 最锋利的武器？", "summary": "DeepSeek 近日完成了首轮外部融资，总额超过 500 亿元人民币，投前估值约 3675 亿元。在这场融资前后，梁文锋与投资人进行了一次长达四小时的闭门交流。两周前，零星语录开始在行业内流传；现在，多家媒体拿到了相对完整的会议实录。综合 elsewhere 整理的 52 条语录和腾讯科技披露的 const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
