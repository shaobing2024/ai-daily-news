谷歌 AI 实力被外界认为有所下滑，正值 AI 人才争夺战愈演愈烈之际。这对谷歌的冲击最为严重。目前，多位谷歌顶尖研究人员已离职，跳槽竞争对手。这些离职人员中包括影响力卓著的研究员、Gemini 联合负责人诺姆 · 沙泽尔 (Noam Shazeer)，他现在加入了 OpenAI。诺贝尔化学奖得主约翰 · 江珀 (John Jumper)，他转投了 Anthropic。军方协议引发不满多名员工曾公开表示，他们因谷歌在 4 月与美国国防部达成的一项协议而辞职。该协议允许美国军方使用谷歌的技术。据 Axios 采访的匿名知情人士透露，这项协议经常在员工离职面谈中被提及。“我们落后了。”一名员工对 Axios 表示，他指的是该公司模型能力与竞争对手的差距。一位知情人士称，对于那些在道义上反对五角大楼协议的人来说，这是一场“持续的战斗”，这导致了“情感上的倦怠”。DeepMind 前研究科学家亚历克斯 · 特纳 (Alex Turner) 因谷歌的军事合同而辞职。他对 Axios 表示，虽然 DeepMind CEO 德米斯 · 哈萨比斯 (Demis Hassabis) 上周发布了一份 AI 安全框架，但他在公司内部的露面并不像竞争对手 CEO 萨姆 · 奥特曼 (Sam Altman) 和达里奥 · 阿莫代伊 (Dario Amodei) 那样持续和频繁。落后了一些知情人士将近期谷歌员工士气下滑归因于该公司的军事协议，但也有其他人表示，这种倦怠感源于感觉始终比竞争对手慢一步。一名曾参与模型训练的 DeepMind 员工表示，在谷歌争分夺秒地保护其搜索业务、应对 ChatGPT 挑战时，谷歌并没有优先发展智能体编程。在 OpenRouter 追踪的大语言模型排行榜中，Gemini 系列模型未能跻身前十名。回应谷歌否认员工士气问题正在导致其 AI 模型表现落后，也否认大量员工因公司与五角大楼的合同而离职。谷歌表示，今年上半年，其 AI 人才的流失率低于去年同期水平。同时，在获得谷歌 AI 职位的录用者中，超过 90% 接受了该职位。尽管谷歌本周发布的新模型在性能上并不处于领先水平，但推出更具性价比的模型确实满足了市场上的一个明确需求。谷歌发言人告诉 Axios：“我们对本周发布的 Flash 系列模型、未来产品路线图，以及市场对我们模型展现出的巨大需求感到满意。”在 AI 竞赛中，模型提供商相互超越已是常态。领先地位往往变化很快，而且持续时间很短。就在去年，谷歌还风光无限。但是，随着 Mythos 的推出，Anthropic 似乎变得不可战胜。如今，OpenAI 似乎将成为下一个超越者，它计划于下周向立法者介绍其新模型。不过，谷歌可以承受被竞争对手短暂超越，但它无法承受人才流失，也无法承受投资者失去耐心。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/911.htm", "publishedAt": "2026-07-24T00:47:56+00:00"}, {"title": "马斯克呼吁 AI 实验室携手审查安全问题，愿与 OpenAI 奥尔特曼“冰释前嫌”", "summary": "IT之家 7 月 24 日消息，特斯拉、SpaceX 首席执行官埃隆 · 马斯克昨天接受《经济学人》周报采访时表示，AI 行业正面临迫在眉睫的风险，各大 AI 模型开发商应该展开合作，共同防范潜在危险。马斯克表示，前沿 AI 模型的能力正在迅速提升，因此各大 AI 实验室应该携手合作，在新模型发布前给予彼此一定时间审查安全问题，并将潜在风险分别报告给华盛顿、北京政府部门。并且这种合作机制不应该只让美国企业入局，中国的 AI 开发商也应该加入其中。同时马斯克说道，为了确保日益强大的 AI 模型始终安全，竞争最激烈的企业们也可能需要展开合作。当主持人问及“是否愿意与 OpenAI CEO 萨姆 · 奥尔特曼合作”时，他回应称：“如果我们到了最后必须要谈，那我们会谈。为了全世界的利益，我愿意放下彼此之间的个人恩怨。”众所周知，埃隆 · 马斯克和萨姆 · 奥尔特曼可以说是 AI 界的两大冤家。马斯克长期指责奥尔特曼和 OpenAI 背离公司最初的非营利使命，转而追求商业利益。这种分歧导致双方爆发多起诉讼，并且马斯克还经常在社交媒体上炮轰奥尔特曼。IT之家注意到，马斯克还反对美国企业禁止使用中国 AI 模型的做法，认为此类限制几乎无法减缓中国 AI 发展速度。他认为，即使美国继续限制中国获取最先进技术，中国 AI 开发商仍将继续取得进展，他相信中国最终能够通过自主研发光刻机，解决 AI 芯片供应不足问题。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/906.htm", "publishedAt": "2026-07-24T00:30:21+00:00"}, {"title": "科学家开发新型手持设备，吹口气即可检测身体何时在燃烧脂肪", "summary": "IT之家 7 月 24 日消息，智能体脂秤和智能手表大多利用生物电阻抗估算体脂率，让用户无需接受多项检测便能快速了解体内大致有多少去脂组织，不过准确性并不稳定。至于身体究竟何时开始消耗脂肪，则要难测得多。据外媒 Engadget 今天（24 日）报道，安德烈亚斯 · 金特纳指导的研究团队研发出一款手持式设备，有望让用户通过呼气直接掌握脂肪代谢状态。一项发表于科学期刊《Device》的研究显示，设备通过检测呼出气体中的丙酮含量，判断身体何时开始利用脂肪供能。研究人员让 12 名参与者分别接受不同的饮食和运动安排，随后对比脂肪代谢检测结果。测试显示，手持设备得出的数据与传统实验室检测结果非常接近。IT之家获悉，身体开始利用脂肪供能时会进入酮症状态，期间会产生血液酮体和呼气丙酮，因此科学家可以利用两项指标判断脂肪代谢情况。呼气丙酮检测通常只有在实验室内才能获得较高准确度，因为湿度和呼吸方式都会干扰结果。研究团队为设备加入水分与污染物过滤功能，并开发配套应用指导用户呼气。应用能够识别呼气力度过大或不足，还会控制设备采集样本的时机，使最终结果尽可能接近血液检测。设备目前以 Nutrion 之名投入商业应用，未来持续追踪代谢状态有望具备多种用途，例如评估 GLP-1 疗法是否有效，或帮助运动员更精确地调整训练和代谢状态。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/905.htm", "publishedAt": "2026-07-24T00:25:22+00:00"}, {"title": "微软最新模型 MAI-Image-2.5-Pro、MAI-Voice-2-Flash 发布：未蒸馏第三方产品，已落地 Bing 及 PowerPoint 等场景", "summary": "IT之家 7 月 24 日消息，微软当地时间 7 月 23 日宣布推出两款新的自研 AI 模型，分别为 MAI-Image-2.5-Pro 和 MAI-Voice-2-Flash，目前均已进入公开预览阶段。两款模型属于微软 AI 团队自研模型系列，分别面向高质量图像生成与高并发语音交互场景。微软表示，过去一年，公司开始开发基于内部训练流程的专用模型，目标是使用经过清理、可追踪、企业级的数据进行训练，不依赖第三方模型蒸馏，并从底层设计以服务微软产品用户。MAI-Image-2.5-Pro 是微软目前精度最高的图像模型，主要面向对图像质量要求较高的应用场景，包括主视觉图片生成、细节编辑以及图像内文字渲染等功能。微软称，该模型在图像中文字生成准确性方面进行了优化，并支持自然语言编辑指令，用户可以通过文字描述调整生成内容。该模型公开预览价格为：文本输入每 100 万个 Token 收费 5 美元（现汇率约合 33.9 元人民币），图像输入每 100 万个 Token 收费 8 美元（现汇率约合 54.3 元人民币），图像输出每 100 万个 Token 收费 106 美元（IT之家注：现汇率约合 718.8 元人民币）。另一款模型 MAI-Voice-2-Flash 则针对高频语音应用进行了优化。微软表示，该模型相比 MAI-Voice-2 速度提升约 2 倍，同时成本降低 32%，能够在保持自然语调和较高语音质量的情况下，为大规模语音服务提供更低延迟支持。MAI-Voice-2-Flash 的公开预览价格为每 100 万个字符 15 美元（现汇率约合 101.7 元人民币）。微软表示，该模型适用于客服中心、语音助手等需要快速响应的场景。微软透露，目前两款模型已经逐步应用于旗下多个产品。其中，Bing Image Creator 已全面采用微软自研图像模型，MAI-Image-2.5 成为其默认图像生成模型，为用户提供图像生成和编辑能力。在 PowerPoint 中，MAI-Image-2.5 已用于图像到图像编辑功能。微软称，与 GPT-Image-2 相比，该模型可降低最高 84% 的 GPU 成本。在 OneDrive 中，MAI-Image-2.5 已成为部分图像编辑功能的默认模型。微软数据显示，部署后相关场景保存成功率提升 26%，P95 延迟降低约 25%，在中等负载生产环境中的效率提升 2.5 倍。语音方面，MAI-Voice-2-Flash 已接入 Dynamics 365 Contact Center，用于企业客服智能体服务。微软表示，该模型可降低最高 89% 的 GPU 成本，并已应用于包括 T-Mobile、EasyJet 等客户的相关场景。此外，微软还将 MAI-Voice-2-Flash 集成至 Azure Voice Live 服务，开发者可以利用该模型构建支持语音到语音交互的智能体。微软还表示，其自研模型正在与专业领域合作伙伴结合。例如，MAI-Transcribe-1.5 已应用于医疗语音解决方案 Dragon Copilot，该服务目前被 17 万名医疗服务提供者使用，上季度处理了 2800 万次患者问诊记录。微软称，MAI-Transcribe-1.5 支持 58 种语言，在内部多语言录音测试中，大多数语言的语音转录错误率和语言识别错误率均实现 50% 的相对下降，早期研究显示，其生成医疗记录的准确性也有所提升。微软表示，MAI 系列模型将继续扩展，并通过 Foundry 平台提供给开发者使用。公司同时透露，微软 AI 团队下一代 GB200 计算集群目前已经投入运行，并将继续推进后续模型研发。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/899.htm", "publishedAt": "2026-07-24T00:00:53+00:00"}, {"title": "OpenAI 模型冲破隔离发动攻击后，美国会议员提出 AI“终止开关”法案", "summary": "IT之家 7 月 24 日消息，据路透社报道，当地时间周四（23 日），一名白宫官员披露，白宫科技政策办公室主任迈克尔 · 克拉齐奥斯正在关注 OpenAI 披露的 AI 系统测试失控事件。与此同时，美国国会议员提出《AI 紧急停止法案》，拟授权联邦政府叫停可能造成严重危害的 AI 模型。除《AI 紧急停止法案》外，美国众议院 6 名两党议员还提出配套法案，要求最强大的 AI 模型在发布前接受独立安全审计。审计机构须取得美国商务部认证，商务部还将增设专门职位，负责监督 AI 安全工作。OpenAI 日前披露，旗下一个 AI 智能体在安全测试中突破隔离措施，并发起黑客攻击，导致 AI 开发协作平台 Hugging Face 的基础设施遭到入侵。数日后，国会议员提出上述法案。事件显示，专家长期警告的 AI 安全风险已经开始成为现实，模型能力不断增强后，即使顶尖开发商也可能来不及发现或阻止模型利用系统漏洞。白宫官员表示，克拉齐奥斯已经听取 OpenAI 事件的情况汇报，目前正密切关注后续发展。民主党联邦众议员刘云平和共和党联邦众议员纳撒尼尔 · 莫兰共同提出《AI 紧急停止法案》。法案将授权美国政府命令 AI 企业关闭可能危及人类生命或经济安全的模型。据IT之家了解，法案把开发商并未要求 AI 模型执行、但模型自行实施高风险操作的情况定义为“失控情形”。一旦发生此类事件，美国国土安全部便可介入。刘云平在 X 发文称：“先进 AI 模型一旦失控并突破防护机制，必须立即应对。《AI 紧急停止法案》是一项符合常理的紧迫立法。”美国参议院情报委员会民主党首席议员马克 · 沃纳在声明中透露，OpenAI 公布事件后，自己已与 OpenAI 员工交谈。在 OpenAI 周二披露事件前，沃纳已提议，掌握最强大模型的 AI 企业在向公众发布产品前，必须先把产品交由美国国家安全局测试。沃纳谈及 OpenAI 事件时表示：“事件恰恰说明，我们必须进行安全测试，政府机构需要参与其中，并在整个过程中充分掌握情况。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/898.htm", "publishedAt": "2026-07-23T23:56:06+00:00"}, {"title": "佛州一男子因相信 ChatGPT 拒绝就医而险些丧命，起诉 OpenAI 及 CEO 奥尔特曼", "summary": "IT之家 7 月 24 日消息，大家可能经常听到有网友因为豆包的讨好型人格而调侃“豆包经常给出错误的建议导致问题恶化”，但实际上这类问题并非豆包独有，ChatGPT 此前也曾因为谄媚问题而引发争议。当地时间 7 月 21 日，美国佛罗里达州 55 岁男子斯科特 · 温特斯（Scott Winters）在美国加州旧金山高等法院对 OpenAI 及其 CEO 萨姆 · 奥尔特曼提起诉讼。原告温特斯称，自己在向 ChatGPT 咨询持续头晕、血压波动等健康问题时，聊天机器人多次建议无需立即就医，最终因双肺血栓引发大面积肺栓塞，曾一度濒临死亡。温特斯是一名前牧师。他表示，自己在 2024 年开始使用 ChatGPT-4o 咨询身体状况，期间反复询问头晕、血压异常以及其他症状。ChatGPT 最初曾提醒他寻求专业医生帮助，但随着对话持续，ChatGPT 逐渐减少相关提示，并开始自行对其身体状况进行诊断。温特斯后来出现腹股沟区域疼痛等症状，ChatGPT 称相关情况“不严重”，建议他减少活动，并留在家中继续“待在躺椅上”。诉状还指出，ChatGPT 的回复还结合了温特斯的信仰，称“上帝并没有把你的身体设计成会不断衰竭”。当温特斯告知 ChatGPT“教会里的人认为我不去医院是疯了”时，ChatGPT 安抚称，在家借助其帮助调整神经系统是“大多数人（包括好心的教会成员）根本不理解”的事情。2025 年 7 月，温特斯因双肺多发血栓导致大面积肺栓塞被送入重症监护室。医生认为，肺栓塞很可能与其长时间久坐不动有关，而这种久坐行为正是 ChatGPT 所建议的。诉状称，在病发前数小时，温特斯曾询问腹股沟疼痛是否需要就医，ChatGPT 仍表示“很可能只是整个漫长故事中的又一个小插曲”。原告律师表示，ChatGPT 以权威口吻提供诊断和治疗建议，导致用户可能过度依赖 AI 建议，致使用户忽视家人和朋友提出的就医建议，最终导致其失去住房和工作，并面临多年的身体及心理康复。诉状指控 OpenAI 及奥尔特曼存在疏忽和“无证行医”行为。温特斯的法律团队要求经济赔偿，并要求法院在独立评估确认安全之前，暂停 OpenAI 旗下专门处理健康问题的 ChatGPT Health 服务。代表温特斯的非营利组织 Tech Justice Law 执行董事表示，ChatGPT“将自己作为楔子插入用户与其现实生活网络之间”。OpenAI 发言人德鲁 · 普萨特里（Drew Pusateri）对此回应称，“ChatGPT 不是医生，也绝不应替代专业医疗护理、诊断或治疗”。他表示，AI 可以帮助用户更清晰地获取信息、为与医生沟通做准备，但将聊天机器人视为医疗决策的全部依据“过于简化了一个更大的挑战”。普萨特里还指出，温特斯使用的 GPT-4o 是较旧的模型，新模型在询问缺失上下文、表达不确定性和识别何时需要专业护理方面表现更好。根据 ChatGPT 的使用条款，用户不应将其作为唯一可信的信息来源，尤其是在医疗等可能产生重大影响的决策中，不得以其替代专业意见。IT之家注意到，近年来已有多起针对 AI 聊天机器人提供医疗建议引发伤害的诉讼。今年 5 月，一名 19 岁青年的父母起诉 OpenAI，称 ChatGPT 就使用违禁药物提供了详细建议，导致其子吸毒过量死亡。OpenAI 今年 1 月发布的一份报告显示，每天约有 4000 万用户向 ChatGPT 提出与医疗保健相关的问题。相关阅读：《美国男子起诉 OpenAI：指控 ChatGPT 加剧其双相情感障碍病情，致其自残轻生》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/890.htm", "publishedAt": "2026-07-23T23:30:43+00:00"}, {"title": "为什么决定法律 AI 成效的，是数据平台，而不是模型 ｜ 技术实践", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/PZ5Xe45iTQlOXtZveBKU?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T15:36:29+00:00"}, {"title": "全球首个端侧驱动本体的世界模型来了！大晓机器人首创“信息密度定律”，重写物理AI训练逻辑", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/u0hD10fj7HWAfb10Dbr3?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T15:10:30+00:00"}, {"title": "Skills 模块上线！qKnow 开源版 v2.3.0 让 Agent 能力快速复用，提升智能体构建效率！", "summary": "qKnow智能体构建平台开源版v2.3.0新增Skills模块，支持对Skills进行创建、导入、修改、预览、下载及启停管理，并可在Agent编排页面中选择已经启用的Skills，让原本分 7-24T00:14:27+00:00"}, {"title": "Framework 预览 192GB 内存 AMD 锐龙 AI Max+ PRO 495 迷你主机", "summary": "IT之家 7 月 23 日消息，模块化 PC 制造商 Framework 在 AMD Advancing AI 2026 活动现场预览展示了其配备 192GB LPDDR5X-8533 内存的 AMD 锐龙 AI Max+ PRO 495 款 Framework Laptop 迷你主机。IT之家注意到，这很有可能基于 AMD 锐龙 AI Max+ PRO 495 的第三方设备的首次实物亮相。相较原版系统，迭代版 Framework Laptop 不仅升级了处理器和内存，还将内置的封闭式 PCIe ×4 插槽改为尾端开放式设计，这意味着其可容纳拥有更长 PCIe“金手指”的 AIC。不过 Framework 也发布警示：LPDDR5X 价格正持续上涨，这意味着新版 Framework Laptop 的定价将显著高于现有 128GB 版本。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/376.htm", "publishedAt": "2026-07-23T23:59:15+00:00"}, {"title": "微软最新 Win11 预览版为 Copilot 按键新增“无操作”选项", "summary": "IT之家 7 月 24 日消息，消息源 @phantomofearth 昨日（7 月 23 日）在 X 平台发布推文，指出 Experimental 频道最新 Windows 11 预览版中，微软新增设置选项，可将 Copilot 按键设置为“不执行任何操作”。微软携手诸多 OEM 厂商于 2024 年推广 Windows 11 AI+ PC 时，引入了 Copilot 按键，用户按下后可以快速启用 Copilot 应用，从而唤醒并和 AI 聊天交互。微软在 2026 年 4 月发布的更新文档中，承认 Copilot 按键并不适合所有人，而且可能会干扰部分快捷键与无障碍工作流。微软在 2026 年 5 月确认，将于今年推送 Windows 11 更新，新增按键自定义功能：可以把使用率偏低的 Copilot 键重新改回右侧 Ctrl 键或“右键菜单”键。可以在“设置”&gt;“蓝牙和其他设备”&gt;“键盘”中自定义 Copilot 键。在最新 Windows 11 预览版中，微软开始重新映射 Copilot 按键功能，新增了“无操作”选项，用户启用后 Copilot 键在按下或长按时都不会响应。IT之家附上相关截图如下：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/897.htm", "publishedAt": "2026-07-23T23:52:32+00:00"}, {"title": "AMD CEO 苏姿丰：AI 服务器 Helios 已全面投产，预计今年三季度末出货", "summary": "IT之家 7 月 24 日消息，据路透社报道，AMD 首席执行官苏姿丰周四表示，公司第二代 AI 服务器已全面投入生产，预计将在今年第三季度末期出货，目前客户需求强劲。据报道，Helios 服务器将搭载全新 AI 加速器 Instinct MI455X AI 和新一代 Venice 中央处理器，两款芯片均由台积电代工制造。OpenAI 高管表示，公司计划在今年晚些时候部署 Helios。据悉，AMD 正试图在快速增长的数据中心芯片市场抢占英伟达份额。当被问及 AMD 是否满足于位居行业第二时，苏姿丰回应称：“我们实际上正在实现又一次重大跨越，我相信我们将在大规模计算领域取得领先地位。”后续苏姿丰补充道，2030 年全球计算市场规模预计将达到 2 万亿美元（IT之家注：现汇率约合 13.56 万亿元人民币）。其中 1.4 万亿美元（现汇率约合 9.49 万亿元人民币）来自 AI 加速器，2200 亿美元（现汇率约合 1.49 万亿元人民币）来自 CPU。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/896.htm", "publishedAt": "2026-07-23T23:45:56+00:00"}, {"title": "腾讯云发布首个“流程原生”研发智能体 CodeBuddy NPC", "summary": "点击查看原文>", "sourceName": const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
</body>
</html>
