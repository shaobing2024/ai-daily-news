const DATA = {"date": "2026-07-24", "generatedAt": "2026-07-23T19:14:32Z", "attribution": {"source": "中文科技媒体 RSS 聚合"}, "sourceList": ["量子位", "IT之家", "InfoQ 中文", "爱范儿", "开源中国"], "lead": "", "isFallback": false, "sections": [{"label": "模型发布/更新", "items": [{"title": "AMD 苏姿丰称 AI 改变每个行业，发布 MI455x 加速器和 EPYC Venice CPU", "summary": "IT之家 7 月 24 日消息，今天（7 月 24 日）在美国旧金山召开的年度盛会 Advancing AI 2026 上，AMD 董事会主席及首席执行官苏姿丰发表主题演讲，并发布了新一代 AI 数据中心硬件。在硬件方面，本次活动聚焦数据中心 AI 产品，苏姿丰表示 AI 正在改变每一个行业。我们非常早地看到，计算需求每年持续增长 5 倍，模型越来越好，我们看到了更好的能力。我们现在正在获得专业化的模型。今年是推理超越训练需求的第一个年份，因为目前有 60% 的计算资源用于推理，而非训练。苏姿丰表示智能体 AI（Agentic AI）正在带来一次巨大的飞跃。你给它一个问题，它会一直工作直到问题解决。这极大地推动了需求的增长，并且还在加速，甚至变得越来越难以预测。到 2030 年，AI 加速器市场将达到 1.4 万亿美元。这相当于今天整个半导体市场的规模。AMD 看到 CPU TAM 增长如此之快，以至于连 AMD 都低估了这一预测。到 2030 年，仅 CPU 市场将增长到 2200 亿美元。计算栈的每一个部分都将被 AI 加速。AMD 规划了公司的三大核心战略支柱：计算领导力、开放平台和无处不在的 AI。苏姿丰表示在服务器 CPU 收入中，AMD 份额已达到 46%，且预计这一比例还将更高。前沿 AI 的发展需要的远不止简单的 CPU。它需要 CPU、GPU、网络等，全部集成在一个易于部署、易于维护且非常可靠的解决方案中。这就是 Helios 的用武之地。AMD 展示了 Instinct MI455X ，其定制模块中集成了 GPU、内存、电源传输、冷板、系统管理等。拥有 3200 亿个晶体管，基于 TSMC 的 3 纳米和 2 纳米工艺制造。采用小芯片（chiplets）设计，配备 432 GB 的 HBM4。AMD 声称与 NVIDIA \"Vera Rubin\" 相比，性能高出 15%，带宽更高，推理性能更强。Helios 已正式进入全面生产阶段。第四季度将开始发货。领先的 AI 实验室是首批客户。在本次活动中，苏姿丰邀请 Anthropic 联合创始人兼首席计算官 Tom Brown 上台。AMD 构建大型计算集群，客户充分利用这些资源。Anthropic 将部署多达 2 GW 的 Helios。Tom 表示：“Helios 是一款令人惊叹的机器。”模型在 AMD 平台上表现出色。Claude AI 的团队正在进行更多的硬件工程工作，这为未来与 AMD 的合作提供了绝佳的机会。苏姿丰表示，这是多年合作的开始。AMD 和 Anthropic 将更紧密地合作，以帮助扩大在线 GPU 的规模，安全性也至关重要。AMD 对比了 MI355x 和 MI455x，指出 MI455x 具备高并行性、更高的吞吐量，以及使用 Helios 可达到 34 倍的吞吐量，Tokens 成本降低至 18 分之一。苏姿丰还邀请 OpenAI 的基础设施主管 Sachin Katti 登台。Katti 表示：“我们已迫不及待地需要它 [指 Helios 机架]”，OpenAI 总是需要更多的计算能力，是首批押注 AMD 的 AI 实验室之一。在 CPU 方面，AMD 苏姿丰展示了 EPYC “Venice” CPU，该处理器基于 2nm 工艺打造，针对智能体 AI 设计，构建了 3020 亿个晶体管。每个插槽最高可达 512 个线程，256 个核心。Venice 不是单个芯片，而是一个完整的芯片系列。Venice-HF 拥有 128 个核心，最高 5 GHz，搭载于 Helios 中。Venice Dense 为每个 CPU 提供 256 个核心 / 512 个线程。AMD 的“Verano”将提供更高效的低功耗内存和更快的互联结构。Venice-X 也将提供 3D V-Cache 版本。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/867.htm", "publishedAt": "2026-07-23T17:20:48+00:00"}, {"title": "为什么决定法律 AI 成效的，是数据平台，而不是模型 ｜ 技术实践", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/PZ5Xe45iTQlOXtZveBKU?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T15:36:29+00:00"}, {"title": "全球首个端侧驱动本体的世界模型来了！大晓机器人首创“信息密度定律”，重写物理AI训练逻辑", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/u0hD10fj7HWAfb10Dbr3?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T15:10:30+00:00"}, {"title": "华为小艺获 11.6.6.300 版本升级，鸿蒙“龙虾”小艺 Claw 接入 Kimi K3 旗舰模型", "summary": "IT之家 7 月 23 日消息，华为小艺 App 今日迎来了 11.6.6.300 (110606300) 版本升级，更新日志显示，小艺 Claw 接入了 Kimi K3 旗舰模型。IT之家附华为小艺此次更新内容如下：1、小艺 Claw：接入 Kimi K3 旗舰模型，多个模型自由选择，体验全面升级快来试试吧。2、小艺深度解题：AI 互动讲解新增图文并茂讲解，讲解更直观。3、小艺翻译：同声传译支持实时摘要和总结摘要，省心又高效。据IT之家此前报道，今年 7 月 16 日，Kimi &nbsp;K3 正式上线，其是 Kimi 迄今能力最强的模型，拥有 2.8 万亿参数，100 万 Tokens 上下文，主要面向长程编程与端到端知识工作。官方介绍称 Kimi K3 基于 Kimi 混合线性注意力机制（Kimi Delta Attention）和注意力残差（Attention Residuals）技术构建，原生支持视觉理解，并拥有 100 万 Tokens 上下文窗口，面向软件工程、知识工作和深度推理等前沿智能场景而设计。另外，华为鸿蒙“龙虾”小艺 Claw 支持开箱即用，可一键唤醒；支持自我学习、深度记忆，可不断进化；支持多端协同，可与鸿蒙多设备互动，如便捷管理手机的日程、备忘录等；支持端云协同，拥有鸿蒙系统级安全加固。小艺 Claw 还获得了信通院首个终端厂商权威安全认证，成为首个获国家级智库认证的终端厂商 Claw 类智能体。目前，HarmonyOS 5.0 及以上机型均可使用小艺 Claw，只需要将小艺 App 升级至 11.6.4.300 及以上版本即可。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/861.htm", "publishedAt": "2026-07-23T14:56:45+00:00"}, {"title": "微信鸿蒙版 App 获 8.0.19.44 版本尝鲜升级，AI 助手小微（测试版）灰度中", "summary": "IT之家 7 月 23 日消息，微信鸿蒙版 App 已在华为应用市场（App Gallery）开启了 8.0.19.44 (8393516) 版本尝鲜升级（如果未抢到尝鲜版本，须等待官方“补货”），测试时间为 2026/7/23-2026/8/22。和往常一样，本次更新的说明依旧为“修复了一些已知问题”，具体更新内容仍在探索中，不过微信 AI 助手“小微”已灰度上线，可通过文字或语音对话操作微信原生功能。IT之家整理微信鸿蒙版 App 的 8.0.19 版本的更新内容如下：微信相机录制视频时支持切换前后摄像头；通过朋友验证时新增添加电话选项；收藏的聊天记录支持转存为笔记；通过群聊添加群成员时支持快捷使用对方昵称和群昵称进行备注；设置状态支持选择不超过 15 秒的视频或 GIF 动图作为背景；灰度朋友圈发送之后删除支持重新编辑功能；灰度发现-视频号-搜索-搜索结果新增视频分类；灰度设置-消息通知新增提示音和铃声；灰度聊天界面发送实况照片；灰度朋友圈图片和视频点开查看界面长按支持收藏功能；灰度搜索-网络搜索-搜索指定内容-表情功能；灰度搜索页面新增语音搜索“按住说出你的问题”按钮、AI 搜索入口、带图搜索和附件搜索；灰度设置-通用-翻译新增自动翻译聊天中收到的消息开关；灰度微信 AI 助手“小微”（测试版）；听一听设置新增 AI 写歌模型选择，该功能需用户此前灰度到音乐状态功能；听一听创建新歌单新增选择公开 / 话题类型；视频号支持推荐给好友；视频号评论区不包含话题的评论长按新增投诉选项；聊天界面双击文字消息支持放大显示；聊天中的井号内容支持跳转到搜一搜；表情管理新增整套表情添加记录；微信内容转发给朋友时新增转发到企业微信；微信游戏界面重构，游戏战报 / 周报卡片支持显示；好友 / 企业微信联系人名片支持显示性别；元宝由联系人态变更为 AI，相关功能由联系人态变更至微信功能态，支持鸿蒙端开启与元宝聊天；朋友圈分享内容支持显示公众号 / 服务号 / 视频号 / 第三方应用来源；朋友圈支持好友状态显示和主页朋友状态显示；公众号信息流-看一看界面改为卡片式展示；他人分享的笔记收藏后支持转存为笔记；系统分享到微信时新增分享到朋友圈；平板分栏支持位置记忆；平板支持连接实体键盘时使用 Ctrl+Enter 快捷键发送消息；小店与卡包新增签到补贴；搜索表情时全部表情分类下新增合成表情展示；支付设置新增注销微信支付；修复了一些已知问题。大家在IT之家微信号回复“微信”两字，即可获取当前最新官方内部版微信下载。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/857.htm", "publishedAt": "2026-07-23T14:21:11+00:00"}, {"title": "AMD 即将推出新一代 AI 基础设施，与英伟达正面交锋", "summary": "IT之家 7 月 23 日消息，AMD 将于当地时间周四在旧金山市中心的一场活动上发布一系列人工智能硬件产品，与英伟达展开正面竞争。AMD 正试图在快速增长的数据中心芯片市场抢占更多份额，尤其是 AI 推理计算领域。所谓推理计算，是指用户向 ChatGPT 等聊天机器人发出请求后，系统进行数据处理和生成回答所需的计算过程。预计 AMD 将在此次活动上展示多款数据中心硬件，其中包括公司首款服务器机架产品 Helios。AMD 将其定位为英伟达同类产品的竞争对手，而英伟达今年正在推出第二代相关产品。此外，AMD 还预计将正式发布面向数据中心的 Venice 中央处理器（CPU）。本周，英伟达也公布了大量关于 Vera CPU 的技术细节，试图证明这款芯片与 Rubin 图形处理器（GPU）搭配后，能够在相同电力消耗下，最大限度提升 AI 智能体（AI Agent）的计算能力。据路透社记者现场观察，周三在旧金山 Moscone West 会展中心，数百名企业高管和工程师参加了技术演讲，并在展区进行了交流。AMD 在展会上展示了 Helios 数据中心机架，其展位周围还有云计算服务商 Vultr 和 TensorWave 等企业，两家公司均运营着采用 AMD 硬件的数据中心。AMD 周三还宣布，计划从 2027 年上半年开始，向 AI 公司 Anthropic 供应总规模最高达 2 吉瓦算力的 Instinct MI450 AI 芯片。双方达成的协议还包括 AMD 对 Anthropic 最高 50 亿美元（IT之家注：现汇率约合 339.08 亿元人民币）的投资。去年 10 月，AMD 还宣布与 OpenAI 达成一项多年合作协议。根据协议，这项合作有望为 AMD 带来每年数百亿美元的收入，同时 OpenAI 还将获得购买 AMD 最多约 10% 股份的选择权。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/847.htm", "publishedAt": "2026-07-23T13:55:58+00:00"}, {"title": "华为计算模组首次亮相 WAIC 2026 世界人工智能大会", "summary": "IT之家 7 月 23 日消息，在 WAIC 2026 世界人工智能大会上，华为首次完整展示全系列计算模组产品，包括网卡、SSD、DPU、RAID 卡四大系列产品。800G SP560 系列 AI 网卡国内首发 800GE AI 网卡，支持 10 万级节点超大规模组网，主机侧支持灵衢 +PCIe 双总线，SP560 系列在网络带宽、主机带宽和报文处理能力方面都得到了大幅提升。同时数控分离下数据面直通 GPU / NPU 内存，降低通信时延；GPU 直驱，集合通信任务聚合下发，缩短消息处理时间；协议可编程，提升 RDMA 网络利用率，充分释放网络潜能。破解“存储墙”的 KVU 方案AI 驱动数据中心 SSD 向大带宽、高性能演进，通过“以存代算”模式实现算力成本优化，凭借低时延、高带宽、大容量 SSD 承载 KV Cache 缓存，将热数据从内存下沉，成为产业趋势。华为首发 KVU 依托灵衢协议带来的大带宽、自带 CPU 计算资源，提供高性能读写能力。KVU 在性能上顺序读达 40GB/s，业界领先，随机读达 500 万 IOPS，写时延 10μs；KV Cache 分层缓存场景下使用 KVU 方案，提升 NPU 利用率，降低首 token 时延，加速了 AI 训推场景的读写效率。计算模组整体亮相华为计算模组以“通算 + 智算”双引擎为核心，构建覆盖网络与存储模组产品：标准网卡：SP230 系列 25GE~200GE 端口速率，高包率、高安全、高能效、低时延，“3 高 1 低”，各项规格全面领先；AI 网卡：AI 训练、推理场景，800G SP560 系列 AI 网卡、灵活可编程、超大规模万卡互联构建 10 万级节点间通信。通过集合通信卸载到网卡、GPU Direct RDMA 通信降时延，400GE 大带宽接口互联等优势特性，使能训理场景加速；SSD：覆盖 SATA / SAS / NVMe SSD 全系列、全规格，性能稳定，行业全场景使用；DPU：提供算力卸载、数据加速、安全隔离等关键能力，头部互联网、运营商、金融客户已规模应用；RAID：在银行、电力等行业，数据库、分布式存储、大数据等主力场景全面规模应用。据IT之家此前报道，华为昇腾 950 超节点还获得了 2026 世界人工智能大会最高荣誉 SAIL 奖。据介绍，SAIL 奖全称为卓越人工智能引领者奖，是世界人工智能大会（WAIC）的最高荣誉，也是人工智能领域最具权威性与国际影响力的标志性奖项之一。相关阅读：《华为昇腾 950 超节点荣获 2026 世界人工智能大会最高荣誉 SAIL 奖》《华为昇腾 950 超节点真机首次公开亮相，昇腾 384 超节点已商用落地 750 多套》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/842.htm", "publishedAt": "2026-07-23T13:23:44+00:00"}, {"title": "我国脑机接口领域迎重要突破，千人同步脑电采集技术发布", "summary": "IT之家 7 月 23 日消息，脑机接口是全球未来产业的重要赛道。据央视财经今日报道，7 月 22 日下午，我国科研团队发布一款新型脑电信号采集装置，在全球范围内首次实现跨地域上千人同步脑电信号采集，使得神经大模型训练与脑机接口通用技术研发迈出关键一步。据介绍，此次发布的一款脑电信号采集装置，能够支持多人同步捕捉脑神经信号。过去脑机接口相关实验大多只是小范围测试，现在有了这项技术，科学家就有能力批量收集普通人的脑电信号并进行解读。而实现千人级跨地域同步采集，需要核心攻克了两大技术难关，IT之家附如下：一是在设备小型化的同时保障信号采集精度；二是克服网络延迟影响，实现多设备、多地域间的毫秒级时间精准对齐，确保不同脑电信号可以统一分析。专家表示，脑电数据匮乏一直是制约脑机接口基础模型发展的核心瓶颈。与积累了数千年的语言语料不同，现代脑电研究仅有百年历史，可用于大模型训练的高质量真实脑电数据存量极低。此次千人同步采集单场即可积累上千小时的真实脑电数据，为快速构建脑电数据底座提供了可行路径。未来，规模化脑电采集技术将持续沉淀数据，用于训练神经基础模型。这也意味着，AI 的学习素材将不再局限于文字、图片、视频等间接信息，而是可以直接通过神经信号理解人类的认知状态。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/841.htm", "publishedAt": "2026-07-23T13:12:58+00:00"}, {"title": "Anthropic 首席经济学家：短期内 AI 不会取代大量工作岗位", "summary": "IT之家 7 月 23 日消息，Anthropic 首席经济学家彼得 · 麦克罗里（Peter McCrory）表示，目前人工智能尚未取代大量工作岗位，因为与完全替代人类相比，AI 与人类协作的效果更好。而美国亿万富翁马克 · 库班（Mark Cuban）则认为，这种情况可能永远都不会改变。麦克罗里周三在 X 平台发文称，从目前掌握的情况来看，“人工智能迄今尚未导致失业率出现明显上升”，即便是在那些最容易受到 AI 自动化冲击的职业中，也没有出现显著变化。作为打造顶级大语言模型之一 Claude Fable 5 的人工智能公司 Anthropic 的经济学负责人，麦克罗里表示，目前 AI 表现出“偏向高技能人才”和“增强劳动能力”的特征，也就是说，专业能力越强的人越能发挥 AI 的价值，而 AI 更多是在帮助人们提高工作效率，而不是取代他们。他指出，AI 在许多领域仍无法独立完成工作。例如，Claude 目前无法胜任的一些任务，往往需要人与人之间的协调合作、面对面的交流，或是与现实物理世界互动，而这些能力目前仍只有人类具备。不过，麦克罗里也提醒，随着 AI 模型不断进步，人类专业知识的重要性可能会逐渐下降。但他预计，至少在未来一年内，AI 不会对整体失业率造成实质性影响。针对 Box 首席执行官亚伦 · 莱维（Aaron Levie）转发并评论麦克罗里的文章，科技企业家、前《创智赢家》（Shark Tank）投资人马克 · 库班也在 X 平台发表了自己的看法。库班认为，人类至少在两个方面仍然明显优于 AI。“AI 模型并不知道自己行为会带来什么后果，而人知道什么事情会让自己丢掉工作。”他说，“AI 模型获取信息存在延迟，而人类能够理解眼前正在发生的事情。”库班表示，这两项能力“AI 在很长、很长、很长时间内都无法具备，甚至可能永远无法拥有”。他指出，这些能力“对于企业的每一个商业决策都至关重要”，尤其是在判断现场氛围、揣摩他人反应等方面，也就是人们常说的“读懂现场”。“如果把 AI 带来的生产力，与人类实时判断和决策能力结合起来，就能让双方的价值实现最大化。”库班写道。他还表示，企业管理者需要思考如何充分发挥这种“人机协作”的优势，因为这不仅能够推动企业发展，还会成为重要的竞争优势。库班曾在互联网泡沫时期，以近 60 亿美元（IT之家注：现汇率约合 406.89 亿元人民币）的价格将自己的网络广播公司出售给雅虎。近期，他曾警告称，随着能源效率不断提高，科技行业当前疯狂建设 AI 基础设施，未来可能导致算力过剩。他甚至调侃说，那些被淘汰的数据中心最后可能会被改造成“匹克球球场”。尽管如此，库班仍多次强调，企业必须积极拥抱 AI，否则将失去竞争力。他曾在去年 2 月的一场大学活动中表示：“未来世界只会剩下两类公司：一类是善于利用 AI 的公司，另一类则会被前者淘汰。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/838.htm", "publishedAt": "2026-07-23T13:07:09+00:00"}, {"title": "智谱：开源意味着模型可以被自主部署、随时调用，并真正掌握在使用者手中", "summary": "IT之家 7 月 23 日消息，北京智谱华章科技股份有限公司官方微博今日发文谈及了“闭源的矛与开源的盾”这一话题。智谱官方分享了一起案例：近日，一次前沿模型安全评测演变成真实安全事件。OpenAI 披露，GPT‑5.6 Sol 及一款尚未发布的模型突破隔离环境，进入 Hugging Face 的生产基础设施。事件发生后，Hugging Face 的安全团队在对攻击日志进行紧急取证和溯源分析时发现，商业闭源大模型会拒绝处理包含真实攻击载荷和敏感凭据的日志分析请求。面对超过 17,000 条攻击事件记录，Hugging Face 选择在自有基础设施上运行 GLM‑5.2，完成关键取证与安全分析，将原本可能需要数天的工作压缩到数小时，同时确保攻击数据和敏感凭据始终留在自己的环境中。智谱官方表示，此次事件更加确信 GLM‑5.2 开源的价值：开源不只是开放权重，更意味着模型可以被自主部署、随时调用，并真正掌握在使用者手中。据IT之家此前报道，智谱于今年 6 月 17 日宣布上线并开源 GLM-5.2。在全球百万用户参与盲测的前端开发评估系统 Code Arena 上，GLM-5.2 取得全球可用模型第一的表现。智谱官方表示，GLM-5.2 专为长程任务能力而生，特色包括：Solid 1M 上下文：稳定支撑长程任务，多个长程任务基准表明 GLM-5.2 的表现介于 Claude Opus 4.7 与 4.8 之间，是排名最高的开源模型。更强体感，更实用的 Coding 能力：在主流编程基准上，GLM-5.2 保持开源 SOTA，与 Claude Opus 4.8 处于可比区间。极致 Infra 优化，Day 0 运行在国产算力平台：在 1M 上下文长度下，将单位 token 的 FLOPs 降低至 2.9 倍；已在 Day 0 完成与华为昇腾、平头哥、摩尔线程、寒武纪、昆仑芯、沐曦、海光、壁仞等国产算力平台的推理适配；预计下半年昇腾 950 超节点上市后，也将成为 GLM-5.2 强劲的算力底座。相关阅读：《智谱开源 GLM-5.2 模型：1M 无损上下文，Code Arena 上全球可用模型第一》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/837.htm", "publishedAt": "2026-07-23T13:04:27+00:00"}, {"title": "东风奕派 M8 上市：首批搭载华为乾崑智驾 ADS 5 Pro，限时权益价 16.58 万元起", "summary": "IT之家 7 月 23 日消息，东风奕派 M8 新能源 SUV 今晚上市，首批搭载华为乾崑智驾 ADS 5 Pro，提供纯电、增程双动力版本，售价 17.98 万元起，限时权益价 16.58 万元起。纯电版600 Max 乾崑版官方指导价 21.98 万元，限时权益价 20.58 万元600 Pro 乾崑版官方指导价 19.98 万元，限时权益价 18.58 万元增程版300 Max 乾崑版官方指导价 21.38 万元，限时权益价 19.98 万元300 Pro 乾崑版官方指导价 19.38 万元，限时权益价 17.98 万元300 Core 乾崑版官方指导价 17.98 万元，限时权益价 16.58 万元IT之家从发布会获悉，该车采用烟霞紫、远黛蓝、凝霜白、月光银、玄岫黑五种车色搭配杏白、曦橙、砚棕三种内饰色，长宽高为 5020/1975/1733mm，轴距为 3025mm。座舱方面，该车采用三排六座布局，行业首批搭载鸿蒙座舱 HarmonySpace 5.2，16.1 英寸 3K 华为车载智慧屏配合 MoLA 混合大模型 Agent 架构，覆盖语音导航、语音控车、车载问答、新闻百科、媒体五大智慧 Agent；同级唯一搭载 HUAWEI SOUND 音响系统，7.1.4 声道 21 扬声器配 DDS 涡轮重低音与调音魔方；此外还同步配备乾崑车云、乾崑车控、鲸鳍通信共同补齐智能生态。此外，该车还搭载同级唯一双头等舱座椅、同级最大 50 英寸 AR-HUD、双视界大屏、-6° 至 50°C 双门双向智能冷暖箱。智驾方面，奕派 M8 交付即搭载华为乾崑智驾 ADS 5 Pro ，27 个智能感知硬件形成 360° 无死角环视。华为乾崑舱内激光视觉 Limera 可在 115m 外探测异形障碍物，基于 WEWA 2.0 架构，实现高速、城市、园区全链路 NCA 与全场景智能泊车，循迹倒车最远支持 120m。动力方面，奕派 M8 提供纯电、增程动力，搭载东风奕派联合宁德时代打造奕派金盾电池。纯电版基于 800V 碳化硅高压平台，峰值充电电流 480A，电量从 30% 充到 80% 仅需 15.5 分钟，CLTC 纯电续航 600km；增程版支持 4C 超快充，电量从 30% 充至 80% 仅需 14.3 分钟，CLTC 纯电续航 300km、综合续航 1281km。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/835.htm", "publishedAt": "2026-07-23T12:52:59+00:00"}, {"title": "蔚来乐道 Coconut / Coconut+ 椰子 3.1.0 版本推送：升级人机共驾模式、高德地图巡航红绿灯显示等", "summary": "IT之家 7 月 23 日消息，蔚来旗下乐道汽车今日宣布，Coconut 椰子 3.1.0、Coconut+ 椰子 3.1.0 版本已开启推送。乐道面向超 17 万全量用户推送重磅版本更新，升级覆盖智能辅助驾驶、智能座舱、智能底盘等功能域。IT之家整理如下：乐道 OSD 端到端模型全面升级换道更积极、变道更顺畅。转向更丝滑、加减速更平缓。全面提升驾驶体验与舒适性。全场景领航辅助再升级智能辅助驾驶模型直接控制方向盘与加减速踏板，全面提升全场景领航辅助驾驶的变道能力，可根据车流情况更积极地进行加减速博弈变道、空位寻找变道。在路口通行时，对车流避让与动态选道能力优化，全面提升通过路口成功率。人机共驾模式使用智能车道巡航和全场景领航辅助时，可通过控制方向盘进入人机共驾状态控制车辆，停止控制方向盘后，系统立即无感衔接控制车辆。偏侧泊入车位选择智能泊车辅助支持偏左、居中、偏右的车位内偏好选择，更贴近真实停车需求，便利上下车、防止“开门杀”。OSD 行程总结，支持一键分享乐道汽车 App 展示对应辅助驾驶旅程中「零重刹」「零介入」旅程次数和「智能泊车辅助」使用次数展示，并支持分享。需配合乐道汽车 App 升级至 2.5.0 及以上版本使用。NIO Radio 拥有专属声音社区 爱范儿", "sourceUrl": "https://www.ifanr.com/1672515?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-20T07:31:53+00:00"}]}, {"label": "产品发布/更新", "items": [{"title": "苏姿丰：在服务器 CPU 营收方面，AMD 份额已达到 46%", "summary": "IT之家 7 月 24 日消息，今天（7 月 24 日）在美国旧金山召开的年度盛会 Advancing AI 2026 上，AMD 董事会主席及首席执行官苏姿丰发表主题演讲，透露在数据中心 CPU 市场营收中的比重，AMD 公司份额达到 46%。苏姿丰在演讲中透露，伴随着智能体 AI 在推理过程中更加依赖 CPU 编排调度，在可以预见的未来，该数字会不断攀升。IT之家注：CPU 在数据中心服务器中充当系统编排器。GPU 负责进行矩阵计算和处理与 AI 相关的请求，但 CPU 负责调度操作并管理 GPU 和 HBM 之间的数据流。此外苏姿丰还预估到 2030 年，与计算相关的潜在市场规模（TAM）将扩大到 2 万亿美元（IT之家注：现汇率约合 13.56 万亿元人民币），并认为随着 CPU 在 AI 智能体工作负载中的调度作用日益凸显，AMD 公司的市场份额将继续增长。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/874.htm", "publishedAt": "2026-07-23T18:45:12+00:00"}, {"title": "AMD 展示最强 AI 加速器 MI455X：台积电 2nm 工艺、3200 亿晶体管、432GB HBM4", "summary": "IT之家 7 月 24 日消息，今天（7 月 24 日）在美国旧金山召开的年度盛会 Advancing AI 2026 上，AMD 董事会主席及首席执行官苏姿丰发表主题演讲，并公布了下一代 AI 加速器 Instinct MI455X 的更多细节。工艺方面，Instinct MI455X GPU 拥有 3200 亿个晶体管，采用先进封装技术构建。其设计包含 4 个加速器复合芯粒（XCD），通过混合键合（hybrid bonding）堆叠在 Fabric 与缓存芯粒（FCD）之上。而 2 个 FCD 均使用台积电的 CoWoS-L 技术封装，并连接 6 个 HBM4 堆和 2 个 I/O Die。IT之家附上相关图片如下：全新 Helios 机架级架构首次将 72 个 MI455X GPU 的显存整合进一个统一的相干域，这是 AMD 对标英伟达 NVL72 的关键一步。结合 CDNA 5 中改进的张量数据搬运单元与新增的多播读取支持，AMD 专注于提升芯片数据移动效率。苏姿丰表示通过这种 chiplet 设计，AMD 公司在 XCD 上使用台积电最先进的 2N GAA（环绕栅极）打造，而最有效地提升功耗和性能；而 FCD 和 I/O Die 部分采用台积电的 N3P 工艺制造。CDNA 5 架构方面，AMD 现在将 CDNA 5 加速器复杂芯片（Accelerator Complex Die）的基本构建单元称为“工作组处理器”（Work Group Processor），不再叫“计算单元”（Compute Unit）。MI455X 的 WGPs 数量与前代 MI355X 一致，维持在 256 个。架构的关键变革之一是波前（wavefront）宽度从 64 位调整至 32 位，AMD 称此举旨在改善指令延迟与寄存器压力，并提升与不同 AI tensor tile 交互的灵活性。CDNA 5 的片上缓存层级也经过深度重构，不再使用前代大容量无限缓存，转而配备每 FCD 96MB、总计 192MB 的共享 L2 缓存。计算性能方面，MI455X 的理论峰值算力大幅提升。针对低精度推理格式，其 OCP MXFP4 性能可达 40.26 PFLOPS，理论上比前代 MI355X 快 4 倍。Row 0 - Cell 0Instinct MI355XInstinct MI455XNvidia RubinNVFP4 (稠密)----35 PFOCP MXFP410 PF40.26 PF--OCP MXFP610 PF20.13 PF17.5 PFOCP MXFP810 PF20.13 PF17.5 PFMatrix FP16/BF162.5 PF5.03 PF4 PFVector FP16157.3 TF315 TF--Matrix FP32157.3 TF315 TF400 TFVector FP32157.3 TF315 TF130 TF与英伟达 Rubin 对比，其 FP32 性能为 315 TFLOPS，在部分场景下明显高于英伟达的 Rubin。AMD 还改进了超越数学单元，其吞吐量比 CDNA 4 翻倍，能加速 softmax 等关键 AI 函数。内存系统是本代产品的显著优势。MI455X 总计配备 12 堆栈 HBM4，提供 432GB 容量与 23.3 TB/s 带宽。这远超英伟达本周详述的首款 Rubin GPU 配置，后者初代规格为 288GB HBM4 与最高 22 TB/s 带宽。在 72-GPU 的 Helios 机架规模下，AMD 方案可聚合 31.1 TB 显存，较英伟达 Vera Rubin 的 20.7 TB 总容量高出 50%。全新 Helios 机架级架构首次将 72 个 MI455X GPU 的显存整合进一个统一的相干域，这是 AMD 对标英伟达 NVL72 的关键一步。结合 CDNA 5 中改进的张量数据搬运单元与新增的多播读取支持，AMD 专注于提升芯片数据移动效率。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/873.htm", "publishedAt": "2026-07-23T18:29:44+00:00"}, {"title": "AMD 发布第六代 EPYC Venice CPU：台积电 2nm 工艺，256 核心、2030 亿晶体管、5GHz+ 频率", "summary": "IT之家 7 月 24 日消息，今天（7 月 24 日）在美国旧金山召开的年度盛会 Advancing AI 2026 上，AMD 公司董事会主席及首席执行官苏姿丰发表主题演讲，介绍了 AMD 第六代 EPYC Venice CPU。工艺方面，这款旗舰服务器 CPU 率先采用台积电 2nm 工艺量产，集成 2030 亿个晶体管，其中计算芯粒（compute chiplet）采用 2nm 工艺，而 I/O Die 部分采用 6nm 工艺。IT之家注：台积电的 2nm 工艺最大的亮点，在于从 FinFET 过渡到 GAA（纳米片晶体管），在相同功耗下性能提升 10-15%，在相同性能下功耗降低 25-30%，晶体管密度最高可提升 15%。其中第一款旗舰处理器为 EPYC 9006 “SP7”服务器 CPU，拥有 256 个“Zen 6”核心、512 个线程、最高 1.6 TB/s 的带宽以及支持高达 64 Gbps AIC 速度的 PCIe Gen6。该芯片设计目标是在 96 个工作核心下实现高达 5.0 GHz 的极高频率。第二款 SP8 Venice \"EPYC 9006\" 芯片专为具有 8 至 128 核配置的主流服务器设计。该芯片将支持 8 通道 DDR5，支持每个通道 2 个 DIMM，提供 128 条 PCIe Gen 6.0 通道，并可在 1P 和 2P 解决方案中灵活部署。对比自身前代 EPYC Turin 系列，新品亦展现出显著的代际提升。EPYC Venice 每瓦特智能体处理能力为前代的 1.7 倍，每瓦性能提升 1.4 倍，每秒处理令牌数（tokens/s）则提高至 1.8 倍。代理式 CPU 服务器“沙箱”中，AMD 声称其每瓦性能可达 Arm 架构 CPU（如 NVIDIA 的 Vera）的 2.8 倍，在通用 CPU 服务器中，每瓦性能可达 3.3 倍。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/872.htm", "publishedAt": "2026-07-23T18:08:26+00:00"}, {"title": "腾讯云发布首个“流程原生”研发智能体 CodeBuddy NPC", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/w6DHDb3QUYPLC1vaU8z1?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T18:01:13+00:00"}, {"title": "和 AMD 合作推进 AI 推理硬件利好，Cerebras Systems 今日股价盘中上涨 11%", "summary": "IT之家 7 月 24 日消息，AMD 和 Cerebras Systems （CBRS）于本周三宣布建立技术合作伙伴关系，受该利好消息影响，Cerebras Systems 股价今天盘中上涨 11%。根据双方公告内容，AMD 和 Cerebras Systems 将联合开发 AI 推理解决方案，整合 AMD 全新的 Helios 机架级解决方案与 Cerebras 的晶圆级引擎（该引擎搭载了该公司的大型 AI 芯片）。该组合产品将集成在一个单一的推理工作流中，其中 AMD Helios 将提供一个高性能、可扩展的吞吐量引擎，用于处理超高吞吐量、提示和大型上下文窗口。Cerebras 将提供超快速、超低延迟的内存带宽密集型 token 生成能力。Cerebras 计划在其自有数据中心部署 AMD Helios 系统，该联合解决方案预计将于 2026 年下半年首先通过 Cerebras Cloud 推出。在云端部署之后，该方案将更广泛地开放。Cerebras 首席执行官 Andrew Feldman 在介绍了一些大客户时表示：“在 Cerebras，我们构建着世界上最大、最快的芯片。”他补充道：“人工智能已经从一种新奇事物转变为有用，在某些领域，甚至是一种必需品。当它成为必需品时，人们希望快速使用它。我们看到一个合作机会，可以让我们在超低延迟领域扩大我们的足迹…… 这真是太了不起了。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/870.htm", "publishedAt": "2026-07-23T17:48:43+00:00"}, {"title": "Agent 越能干，安全越难做？", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/video/G0R3FyRBpfeSsa2QqJIr?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T17:08:05+00:00"}, {"title": "医疗与生命科学领导者必须回答的 10 个 Agentic AI 关键问题 ｜ 技术实践", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/06XxocxibFHWsL53PPFc?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T16:20:00+00:00"}, {"title": "马斯克：特斯拉 AI 投资越快越好，不怕部分资金浪费", "summary": "IT之家 7 月 23 日消息，特斯拉首席执行官埃隆 · 马斯克表示，公司应该在人工智能（AI）领域投入更多资金，即便其中一部分资金最终被浪费。随着马斯克不断加码 AI 投资，特斯拉今年第二季度资本支出同比大增 142%，达到 58 亿美元（IT之家注：现汇率约合 393.33 亿元人民币）。在周四财报发布后的分析师电话会议上，马斯克表示，他已经要求公司高管继续加快投资节奏。“我们的资本支出应该尽可能快地推进，在不过度浪费的前提下，能花多快就花多快。我们并不是追求极高的资本使用效率，因为那样反而会拖慢发展速度。”马斯克说道。目前，特斯拉正大举投资建设 Cybercab 自动驾驶出租车和 Optimus 人形机器人的新生产线及工厂。由于利润未达到市场预期，特斯拉第二季度录得 11 亿美元自由现金流净流出，这是自 2024 年以来该公司首次出现自由现金流为负，公司股价也在盘前交易中下跌。公司高管向投资者表示，AI 相关支出未来仍将持续增长，预计特斯拉今年全年资本支出将超过 250 亿美元（现汇率约合 1695.38 亿元人民币）。特斯拉首席财务官瓦伊巴夫 · 塔内贾（Vaibhav Taneja）在财报电话会上表示，公司正寻求获得新的债务融资额度，以具备最高 300 亿美元（现汇率约合 2034.46 亿元人民币）的借款能力。他预计，未来 2 至 3 年，随着新太阳能电池板工厂建设、AI 算力持续扩充，以及特斯拉与 SpaceX 联合打造的大型“Terafab”半导体工厂正式开工，公司资本支出还将进一步提升。与此同时，为了在日益激烈的 AI 竞赛中保持竞争力，其他科技巨头也在大举烧钱。谷歌母公司 Alphabet 周三公布的第二季度财报显示，公司自由现金流净流出接近 60 亿美元，并将全年资本支出预期上调至最高 2050 亿美元（现汇率约合 1.39 万亿元人民币）。值得一提的是，就在一年前，马斯克曾借助美国政府效率部（DOGE）猛烈抨击政府存在大量低效和浪费的支出，此后他也一直批评政府开支容易出现滥用和浪费。不过，马斯克周三向投资者表示，特斯拉的资本支出效率“高得惊人”，因为公司正在同时投资大量能够创造长期价值的生产性资产，包括工厂和基础设施。“我认为，这可能是美国自第二次世界大战以来最快的一次工业扩张。”马斯克说。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/828.htm", "publishedAt": "2026-07-23T12:14:39+00:00"}, {"title": "从入鸿蒙到 AI Native：系统与 AI 融合下的应用智能化跃迁｜AICon深圳", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/Ti4HDYkZAlbNmEFFYp24?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T10:00:00+00:00"}, {"title": "谷歌联合多家企业发布 Agentic Resource Discovery 规范，为 AI Agent 建立统一资源发现机制", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/9sEaQuLww0wAu016qH5R?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T09:48:46+00:00"}, {"title": "腾讯云发布云端智能体 CodeBuddy NPC", "summary": "腾讯云宣布正式发布云端智能体 CodeBuddy NPC。开发者只需派发一个任务，CodeBuddy NPC 即可自主完成方案规划、代码开发、提交 PR、执行测试，并根据 CI 结果持续修改，直到交付可验收的成果。 官方研发 NPC 经过持续优化，首轮 Token 消耗已从早期 2 万多个降低至约 2000，降幅超过 90%。 与主要运行在本地、辅助编写代...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/477664", "publishedAt": "2026-07-23T07:25:15+00:00"}, {"title": "Visual Studio Code 1.130 发布", "summary": "Visual Studio Code 1.130 版本现已发布。此版本带来了 Agent Host 方面的改进、Agent 窗口中更快的审阅工作流程、更佳的聊天可见性以及更智能的终端链接处理。 The agent host：在专用进程中运行会话，可以从多个 VS Code 窗口连接到该进程。 Agents 窗口改进（预览）：通过紧凑的 diffs、文件级统计信息和跨框架的工作...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/477461/vs-code-1-130-released", "publishedAt": "2026-07-23T03:03:49+00:00"}, {"title": "驱动 Agentic Enterprise：让企业上下文转化为可治理的 Agentic 行动 ｜ 技术趋势", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/shzCr5FsOcHUyBc8CEsj?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-22T18:44:59+00:00"}, {"title": "苹果国行 AI 刷屏之外，三星也把端侧大脑交给国产 AI", "summary": "把智能装进手机的秘诀，在于「多、快、好、省」#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "s  核心，主频超 5GHz", "summary": "IT之家 7 月 24 日消息，今天（7 月 24 日）在美国旧金山召开的年度盛会 Advancing AI 2026 上，AMD 公司确认针对高性能计算和人工智能工作负载，将于 2027 年发布 EPYC Verano 和 3D V-Cache 增强型 Venice-X CPU。IT之家援引博文介绍，EPYC Venice-X 计划明年部署在微软 Azure HXv2 实例中，内部集成 176 个“Zen 6”架构核心与 342 个线程，运行频率可超过 5GHz。借助位于 Zen 6 核心下方的 3D V-Cache 堆栈技术，每核心可寻址的缓存容量较前代提升 50%，从而提供更强的技术计算与 HPC 能力。EPYC Verano 则被定义为专为 AI 智能体打造的处理器。它的关键突破在于成为 AMD 首款支持全新 SOCAMM2 内存形态的 CPU。SOCAMM2 是一种紧凑型内存解决方案，目前主要发挥 LPDDR5X DRAM 模块的高带宽、高容量及高能效优势，以帮助技术供应商最大化内存密度。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/871.htm", "publishedAt": "2026-07-23T17:57:37+00:00"}, {"title": "英伟达 Jetson 芯片将登陆月球，驱动月面机器人自主运行", "summary": "IT之家 7 月 23 日消息，英伟达正努力将旗下 GPU 部署到更多场景，而该公司的最新目标，已经瞄准了月球。致力于太空基础设施机器人研发的初创公司 Lunar Outpost 当地时间周四宣布，其即将执行月球任务的月球车将采用英伟达 Jetson 芯片来控制激光雷达（LiDAR）系统。如果任务顺利完成，这将有望成为首款登陆月球表面的 GPU。Lunar Outpost 首席执行官贾斯汀 · 赛勒斯（Justin Cyrus）表示：“我们正在将英伟达 Jetson 平台与我们现有、拥有更多航天飞行经验的计算平台进行比较，评估各自的优缺点。我们的目标是在这些极端环境中，尽可能采用性能更强、由 GPU 驱动的计算系统。”为了重返月球，NASA 正通过商业月球载荷服务（CLPS）计划资助私营企业探索月球表面，并希望最快于 2028 年再次将宇航员送上月球。该计划借鉴了 NASA 与 SpaceX 的合作模式，要求科技公司开发能够搭载科学仪器登陆月球的飞行器，以研究月球地形，并寻找水等具有科学价值和商业开发潜力的资源。不久前，英伟达还宣布与 Firefly Aerospace 达成合作。后者是首家成功实现机器人月球软着陆的私营公司。根据合作协议，英伟达 Jetson 平台将部署在环月运行的卫星上，对拍摄的月球图像进行本地处理。这颗卫星不仅将帮助科学家绘制更精确的月球地图，还将监测月球表面不断增加的机器人活动。Lunar Outpost 下一辆月球车将搭载在月球探测公司 Intuitive Machines 制造的着陆器上。这辆月球车将携带多种传感器进入环月轨道难以观测的陨石坑及其他复杂区域执行探测任务。再下一次任务则计划前往月球表面的赖纳伽马（Reiner Gamma）区域，该地区存在一种长期困扰科学家的神秘磁异常现象。上述两项任务均计划于今年年底前搭乘 SpaceX 的猎鹰 9 号（Falcon 9）火箭发射升空。相比 Blackwell 和 Vera Rubin 等广为人知的 AI 计算平台，英伟达 Jetson 系列并没有那么高的知名度，但它已成为众多实体 AI 系统的重要组成部分。Jetson 平台采用小型化、低功耗设计，可让机器人在本地处理各类传感器数据，更快理解周围环境并作出反应。赛勒斯表示：“五年前，我们的自主控制系统主要依赖确定性算法，而现在已经发展为确定性算法与实体 AI 相结合的架构，这非常有趣。我们目前仍然同时运行两套系统，而我们的工作就是不断探索，实体 AI 能够在哪些环节接入我们的系统，实现过去无法做到的能力。”不过，在太空环境中使用 GPU 并非易事。现阶段，大多数航天 GPU 部署在近地轨道，受到地球磁场的保护，能够一定程度抵御宇宙辐射和剧烈温差。而月球则直接暴露在宇宙辐射环境中，昼夜温差极大，对电子设备提出了更严苛的要求。赛勒斯表示：“整个系统必须能够熬过漫长的月夜，而且还必须在极低功耗条件下正常工作。”如果能够成功让这些芯片在月球环境中稳定运行，Lunar Outpost 希望未来的月球车能够拥有更强的自主能力，更快完成环境感知、数据处理和决策。NASA 希望未来能够在月球建立长期有人驻留基地，而在此之前，大量自主机器人系统将承担基础建设和繁重作业，为人类登陆铺平道路。赛勒斯表示：“Lunar Outpost 目前正在思考的是，如何从探索月球迈向长期驻留，真正建设一座月球基地。我们相信，将确定性算法与实体 AI 结合起来，才能真正实现人类在太空的可持续驻留，建立一支能够承担各类任务的机器人劳动力。”未来几年，Lunar Outpost 计划陆续向月球发射多款小型自主月球车，同时还将推出一款名为 Pegasus 的大型月球车，用于搭载宇航员执行任务。据IT之家了解，Pegasus 原计划搭乘亚马逊创始人杰夫 · 贝索斯旗下蓝色起源（Blue Origin）研发的重型火箭前往月球，但这款火箭今年夏天在测试过程中发生异常，目前尚不清楚何时能够恢复发射。赛勒斯表示：“从发射场的进展来看，他们确实取得了相当不错的成果。我无法代表蓝色起源或 NASA 说明发射台修复和发射时间表，但根据我们目前获得的信息，双方仍然朝着 2028 年的目标推进。”这意味着，无论是建设未来的太空数据中心，还是部署大规模月球机器人集群，如今都在等待同一件事 —— 一枚运载能力更强的大型火箭。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/866.htm", "publishedAt": "2026-07-23T15:15:56+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "马斯克：值得承担致命 AI 风险，AI 最有可能带来全民富足", "summary": "IT之家 7 月 23 日消息，埃隆 · 马斯克表示，人类或许不该为人工智能踩下刹车，即便有能力这么做。在接受《经济学人》总编辑赞妮 · 明顿 · 贝德斯（Zanny Minton Beddoes）采访时，这位世界首富表示，AI 和机器人失控并酿成灾难的风险“并非为零”，但他已经接受了继续推动 AI 发展的现实。“我的哲学结论是往好的方面看。”马斯克说，“我看不到有什么办法能够真正阻止人工智能和机器人发展的巨大势头。”他表示：“有时候我甚至会想，即便真的有一个‘停止按钮’，我们可能也不应该按下它，因为最有可能出现的结果，是为所有人带来前所未有的富足。”马斯克预测，人工智能将在“大约五年内”超越全人类智慧总和，届时，除非遭遇“全球核战争”这样的重大灾难，否则世界将进入一个“令人惊叹的富足时代”，人们几乎可以拥有自己能想到的一切。IT之家注意到，长期以来，马斯克一边警告 AI 可能带来灾难，一边又不断描绘其光明前景，而近年来，他的预测明显变得更加乐观。早在 2014 年，他曾将研发人工智能比作“召唤恶魔”；2018 年在 SXSW 大会上，他警告称“AI 比核武器危险得多”；直到 2025 年 3 月，他仍认为“杀手机器人消灭人类”的概率高达 10% 至 20%。不过，马斯克近来的言论则更加偏向乌托邦式的未来。今年 1 月，他表示，未来“为退休存钱将变得毫无意义”；本月，他又预测，AI 和机器人将让工作变成可选项，并创造出“全民高收入”社会。不过，《大空头》投资人迈克尔 · 伯里（Michael Burry）对此评价称，这一说法“并不成立”。在《经济学人》的采访中，当被问及是否已经认为 AI 崛起不可避免时，马斯克回答说：“我的理念就是享受这段旅程。”他表示，人工智能和机器人正处于一种“不可逆转的发展进程”中，即使他想阻止，也无能为力。当主持人问他是否仍坚持“AI 发生灾难性失控的概率为 10% 至 20%”这一判断，并进一步追问，如果火箭有同样的爆炸概率，他是否还会乘坐自己制造的火箭时，马斯克回答：“会。但假设你对此无能为力，那么我们唯一能做的，就是尽可能降低坏结果发生的概率。”马斯克还表示，人类不太可能在未来十年继续掌控人工智能。“如果我认为自己能够控制一个远比我聪明得多的超级智能 AI，那只是一种自负。”他说。他认为，人类真正应该做的，是确保 AI 拥有正确的价值观，关心人类，希望人类幸福和繁荣。马斯克透露，在谷歌 DeepMind 首席执行官戴密斯 · 哈萨比斯（Demis Hassabis）本月早些时候发表有关 AI 监管的博客之前，两人曾进行过交流。他还建议哈萨比斯，全球领先 AI 公司的负责人应定期举行电话会议，共同讨论 AI 安全和网络安全问题。“我认为，这样竞争对手之间也能相互监督、相互制衡。”马斯克表示。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/832.htm", "publishedAt": "2026-07-23T12:33:49+00:00"}, {"title": "红果短剧将启动专项治理，整治“高频 AI 脸”", "summary": "IT之家 7 月 23 日消息，红果短剧昨日发布《关于规范 AI 剧角色创作的公告》，从角色差异化、版权合规两个维度明确创作标准，降低“高频 AI 脸”使用率。IT之家注意到，相应《规范》明确规定，一部剧的主要角色应具备清晰的形象区分度，鼓励打造有记忆点、高辨识度的角色，并要求创作者丰富人物形象设计，避免不同剧集、不同角色使用高度相似的形象，防止用户审美疲劳。在版权合规层面，《规范》则提出了三条明确要求：未经授权，不得使用他人作品中具有独创性的角色、服装、造型、道具等设计；不得盗用他人享有著作权的写真、美术等作品；使用受版权保护的内容，需提前取得合法授权。同时，《规范》还透露，平台近期将启动专项治理行动，重点整治“高频 AI 脸”复用、内容同质化及素材违规三类问题，并倡议 AI 短剧创作者对创作内容开展自查，对存在问题的剧集及时采取修改、替换等整改措施。事实上，红果短剧近期已经提高了部分 AI 剧的准入门槛。7 月 21 日，红果短剧在短剧创作者中心发布公告，对都市情感、破局成长、家庭温情、都市逆袭等品类 AI 仿真人剧提升内容准入门槛，从画面衔接、人物形象、表情变化、音画同步等方面提出更高要求。对于未达到质量标准的内容，平台将建议版权方完成优化后重新上传，以保障作品上线后的播放效果与用户观看体验。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/822.htm", "publishedAt": "2026-07-23T11:47:19+00:00"}, {"title": "智能体政策新闻相关背景和简要解读", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/457787.html", "publishedAt": "2026-07-23T11:08:31+00:00"}, {"title": "First 超短片，把镜头对准了 AI 够不着的地方", "summary": "如果一切皆可生成，影像的「真实」与「必要」又该被如何重新定义？#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672900?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-23T10:32:34+00:00"}, {"title": "RAG 核心概念与原理：Chunking、Embedding、相似度、HNSW 与多路召回", "summary": "写代码时若提问 \"这个框架的 v2.3 版本 API 怎么用\"，它提供的却是早已淘汰的 v1.x 写法；若询问「公司内部优惠券系统的退款流程是什么」，它会凭空编造一套流程。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/u/5783135/blog/19726047", "publishedAt": "2026-07-23T09:24:36+00:00"}, {"title": "WAIC最狠展台打爆工业「深水区」！它石智航首发具身原生大脑AWE 3.5，具身Scaling全面释放", "summary": "一台机器人的「多任务实战」", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/457469.html", "publishedAt": "2026-07-23T03:28:24+00:00"}, {"title": "梁文锋四小时投资者交流会：为什么克制是 DeepSeek 最锋利的武器？", "summary": "DeepSeek 近日完成了首轮外部融资，总额超过 500 亿元人民币，投前估值约 3675 亿元。在这场融资前后，梁文锋与投资人进行了一次长达四小时的闭门交流。两周前，零星语录开始在行业内流传；现在，多家媒体拿到了相对完整的会议实录。综合 elsewhere 整理的 52 条语录和腾讯科技披露的 118 个回答，梁文锋几乎回应了外界对...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina. const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
