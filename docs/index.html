全世界的 AI 应用百花齐放，大家从以前的有问必答的聊天助手类产品开始走向使命必达。”林松涛表示：“使用 Agent 产品，当效率的瓶颈从获取信息开始转向完成任务和真正交付结果，AI 就不再仅仅是一个云端为你调动的工具，而是真要走向主动协同的终端智能伙伴。当然终端的形式不一定，可能是 PC、手机，甚至具身智能。”林松涛现场表示：“模型的差距正在缩小，但是工程的差距在拉开。现在主流模型推理的差距其实是越做越广，但能不能把它转化为企业生产力，转化为个人和组织的效率，是大家热议的案例。”他指出：“模型更多决定 AI 上限，而工程决定下限，用户会因为一个好的功能来用你，但用户如果能持续的来使用和信任你，一定决定于工作的下限。”他还表示：“一个好用的 AI，它并不只是可以做得更快，应该还让人有更多时间去思考，让人回归创造。从个人到工作到企业，从助手到团队到组织，希望 AI 可以真正成为每个人都能使用，每个组织都能协同的普惠的生产工具。”IT之家注意到，2026 世界人工智能大会暨人工智能全球治理高级别会议，于 7 月 17 日至 20 日在上海举办。本届大会在展览规模、首发新品数量、论坛场次等方面均创下历届新高。今年大会场地全面拓展，形成世博、张江、西岸“三地四馆”的全新布局，展览面积首次突破 10 万平方米。本届大会由上千家参展企业将带来 3000 余项前沿展品，超 300 款人工智能新产品将在大会全球首发。同时，大会将举办 140 余场论坛，邀请 1400 多名中外行业专家同台交流。区别于往年，今年新增学术板块，首次举办高水平人工智能国际学术会议，还专门开辟青年创新赛事专区，学术、产业、创业、投融资一站式打通，不管是业内专家还是青年开发者，都能在这里找到交流对接渠道。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/568.htm", "publishedAt": "2026-07-18T11:42:44+00:00"}, {"title": "国内首款苹果 MFi 认证开放式 AI 耳机：网易有道 OpenPods 亮相 WAIC，耳机盒可独立录音翻译", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会暨人工智能全球治理高级别会议（WAIC）7 月 17 日在上海世博、张江、西岸“三地四馆”同步开幕。网易在此次大会上集中展示了多项自研人工智能成果，覆盖工业具身智能、企业数字化服务、数字生活等领域。其中，网易有道携升级的“子曰”大模型 4.0 及全栈 AI Agent 应用矩阵亮相，并在 WAIC 现场首次公开展出 AI 会议耳机 Youdao OpenPods。据网易介绍，这是国内首款苹果 MFi 认证开放式 AI 耳机，定位为面向商务办公与跨语言沟通场景的智能设备，能力覆盖录音、转写、总结、翻译全链路。在翻译功能方面，OpenPods 支持英语、日语、西班牙语等十余种语种的实时互译。其同传功能覆盖通话与线上会议两大场景，翻译质量据称达到专业八级水平。产品还配备了音色克隆技术 —— 翻译结果可用使用者本人的音色输出，对方听到的效果仿佛使用者在亲口说外语。在录音转写方面，OpenPods 支持访谈、通话、会议等场景的实时录音，识别准确率达 98%，可自动生成带发言人区分的结构化纪要，提取待办事项并同步输出思维导图。这款耳机还配备双高精度麦克风、骨传导拾音与智能降噪。产品获得了苹果 MFi 认证，是国内首款获得该认证的开放式 AI 耳机。对 iOS 用户而言，锁屏状态下一键即可调起录音与翻译功能。此外，OpenPods 的一个显著特点是首次将耳机盒打造为可独立运行的录音与翻译终端。无需打开手机，耳机盒内置的麦克风与扬声器即可直接完成面对面的双语对话。该产品采用开放式佩戴设计，单耳仅重 7.0 克，配合耳机舱可实现 24 小时综合续航。据网易有道方面介绍，这款耳机已正式量产，预计今年 8 月份正式发布；有道官方还表示 OpenPods 未来将出海。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/567.htm", "publishedAt": "2026-07-18T11:22:37+00:00"}, {"title": "社交平台 Soul 推出 AI 智能硬件 B Soul：提供智能交互与定制化语音体验，预计 8 月逐步量产销售", "summary": "IT之家 7 月 18 日消息，在 2026 世界人工智能大会上，社交平台 Soul 推出了 AI 硬件“B Soul”。官方表示，通过将 SoulX（Soul 推出的多模态交互大模型）的语音交互、情感表达等核心能力融入可随身携带的智能终端“B Soul”，让 AI 陪伴从手机屏幕内走向真实物理空间。B Soul 提供了智能交互与定制化语音体验，并能够实现随时唤醒、自然交流和持续陪伴。据介绍，与 AI 硬件 B Soul 配套推出的，还包括了 App、小程序。软硬件将共同承载用户的 AI 角色、长期记忆、情绪关系与个性内容：其中 App 负责关系养成、记忆沉淀和内容运营；硬件设备让陪伴可携带、可展示、可触发、可回应。IT之家获悉，B Soul 很快将正式上市，预计在今年 8 月逐步量产销售。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/563.htm", "publishedAt": "2026-07-18T10:52:24+00:00"}, {"title": "商汤科技发布日日新 U1 Pro 图片创作模型：最高 8K 原生分辨率输出，宣称告别“AI 味”", "summary": "IT之家 7 月 18 日消息，商汤科技今日发布日日新 SenseNova U1 Pro 图片创作模型，官方宣称可通过内生的图文交错思维链创作出内容准确、设计精美、生产可用的图片素材，效果比肩海外顶尖模型。该模型正式版本预计将于今年 8 月上线并同步推出 API 服务。IT之家从官方新闻稿获悉，SenseNova U1 Pro 有以下 4 个核心交付能力：专业设计美感，告别“AI 味”：图像生成从“细节逼真”推进到“专业设计美感”的全新阶段，直接实现专业交付品质；原生 8K 超清输出：最高可支持 8K 原生分辨率输出，画幅放大后，文字、线条、图标和模块关系仍然清晰稳定，经得起印刷、展览级细节检验。▲ 受限于上传规格，画质有所压缩图文与细节控制：大幅加强了图文信息整合分析能力。在极高信息密度下，U1 Pro 仍能维持整体版式与内容表达，文字渲染出错率极低。长程 Agentic 闭环思维：内生支持长程图文交错思维，能够围绕复杂目标进行数十轮的 Agentic Generation Loop（智能体生成循环）。在最新版本中，进一步实现了整体风格与局部文本的同步精准可控编辑，让交付结果可被持续修改与使用。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/562.htm", "publishedAt": "2026-07-18T10:30:25+00:00"}, {"title": "为什么 AI Agent 拿到数据却不会推理？可观测对象图语义层的设计与开源实践｜AICon深圳", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/KPd6YwU0Y1iCMGMakSmE?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T10:00:00+00:00"}, {"title": "机器人“眼睛”升级，思特威联合地瓜机器人推出 1:1 方形视觉传感器", "summary": "IT之家 7 月 18 日消息，7 月 18 日，国产 CMOS 图像传感器供应商思特威宣布，与地瓜机器人正式达成战略合作。根据合作协议，双方将围绕思特威机器视觉系列 CMOS 图像传感器产品迭代、地瓜机器人 S600 平台接口标准化定义以及“感知 + 计算”一体化方案系统级性能优化等层面，建立长效研发协同机制，开展联合技术攻关，全面提升具身智能设备全场景下的图像捕捉与复杂光照环境下的感知能力。同时，双方将携手搭建产业创新平台、拓展行业生态，推动上下游产业链资源整合，助力具身智能产业进阶发展。此次合作中，双方将基于地瓜旭日 S600 平台，深度适配思特威的 1.2MP/1.5MP/4MP 三款 1:1 方形全局快门图像传感器，从芯片定义阶段即面向机器人场景量身定制，打造完整的系统级方案。三款 CIS 产品支持 1080×1080 至 1944×1944 分辨率，帧率覆盖 80fps 至 130fps，全面覆盖从高动态到高分辨率的多元视觉需求，为不同形态的具身智能设备提供灵活的感知方案选择。在强光、昏暗等各类复杂光线环境下，全局快门 CIS 的高感度、高动态范围、超高帧率、低噪声等优势特性，可为人形机器人、四足仿生机器人等具身智能设备实现 V-SLAM、主动避障、物体抓取、人机交互等环境感知与自主决策提供核心视觉支撑。IT之家注意到，地瓜机器人旭日 S600 拥有 560 TOPS 端侧算力，在单芯片内可同时承载 VLA、VLM、大语言模型、环境感知、运动控制的并发运行。基于这一平台能力，双方联合定制的 1:1 方形全局快门 CIS，其视觉数据将在旭日 S600 上实时完成预处理、特征提取与模型推理，形成从“光信号输入”到“决策指令输出”的完整闭环。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/529.htm", "publishedAt": "2026-07-18T09:47:26+00:00"}, {"title": "消息称月之暗面 Kimi 已通知投资者调整公司架构，有望最快 6 个月内赴港上市", "summary": "IT之家 7 月 18 日消息，据投资界今日消息，Kimi 已通知投资者调整公司架构，筹备赴港 IPO，最快可能 6 个月内就能完成港股上市。月之暗面本周发布了 Kimi K3 模型，原生支持视觉理解，并拥有 100 万 token 上下文窗口；是首个达到 2.8 万亿参数规模的开源模型。完整模型权重将于 2026 年 7 月 27 日前发布。IT之家注意到，Kimi K3 在 Frontend Code Arena 榜单（测试前端代码生成能力）上超过了 Claude Fable 5 和 GPT-5.6 Sol。7 月 17 日，美股三大指数全线下行，纳指、标普 500 指数均跌超 1%，美国多家主流媒体将原因归结为 Kimi K3 模型发布，称市场正关注 K3 对全球大模型竞争格局及科技企业估值的后续影响。Kimi 官方则表示，虽然 Kimi K3 的整体表现仍落后于最强的闭源模型 Claude Fable 5 和 GPT-5.6 Sol，但在整套评测中展现出前沿水平的能力，并稳定超过了其他所有模型。相关阅读：《Kimi K3 展示“AI 为 AI 设计芯片”能力：2 天完成构建、优化、验证》《Kimi 最强模型：K3 登场，Frontend Code Arena 跑分力压 Claude Fable 5 登顶》《Kimi 迄今最强旗舰模型“K3”上线，支持最高 1M 上下文》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/527.htm", "publishedAt": "2026-07-18T09:35:43+00:00"}, {"title": "蔚来神玑首次独立参展世界人工智能大会，NX9031X 等芯片亮相", "summary": "IT之家 7 月 18 日消息，7 月 17 日，2026 世界人工智能大会正式开幕，蔚来芯片子公司安徽神玑技术有限公司首次独立参展。除了展出「神玑 NX9031」芯片和车载域控外，还在会展期间推出「睿动」具身智能开发平台、分布式智能体平台等 AI 新产品。蔚来官方介绍称，神玑公司致力于打造 AGI 时代最好的芯片及解决方案平台，是范围覆盖自动驾驶、具身智能、Agent 推理等领域的全域全场景芯片公司。目前，神玑公司已形成由 NX9031X、NX9031U、NX9031C 等多颗芯片构成的完整产品序列，全面覆盖智能辅助驾驶、具身智能、Agent 推理三大前沿 AI 赛道。其中，高档 NX9031X 芯片用于智能辅助驾驶，成功部署蔚来品牌、乐道品牌全系车型，累计发货超过 30 万颗。本次发布的「睿动」具身智能开发平台搭载中档 NX9031U 芯片，5nm 车规工艺，可用来运行机器人大脑感知和自主规划所需的各种复杂模型。IT之家注意到，2024 年 7 月，蔚来宣布旗下全球首颗车规 5nm 高性能智驾芯片“蔚来神玑 NX9031”流片成功，这标志着蔚来已实现硬件芯片 / 底层软件自主设计。据介绍，这款芯片拥有超过 500 亿颗晶体管，采用 32 核心 CPU 架构，内置 LPDDR5x 8533Mbps 速率 RAM，可实现“高动态范围高性能 ISP”，拥有 6.5 G Pixel / s 像素处理能力，处理延时小于 5ms。今年 4 月，蔚来创始人、董事长、CEO 李斌也在活动中谈到自研智驾芯片的话题。他当时表示，如果从蔚来内部的管理报表角度来看的话，其实替公司已经省了很多钱了。蔚来在前几年一直都用英伟达芯片，高峰的时候一年要买 3 亿美金（IT之家注：现汇率约合 20.35 亿元人民币）的英伟达芯片。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/524.htm", "publishedAt": "2026-07-18T09:15:50+00:00"}, {"title": "中兴发布业内同规格尺寸下最轻人形机器人产品“中兴星仔”：高 1.6 米，自重 30 余千克", "summary": "IT之家 7 月 18 日消息，在 2026 世界人工智能大会暨人工智能全球治理高级别会议期间，中兴通讯发布了星系列人形机器人及具身智能解决方案。轻量化全尺寸人形机器人“中兴星仔”作为商业服务场景主力机型，身高 1.6 米、自重 30 余千克，是当前业内同规格尺寸下最轻人形产品。官方表示，“中兴星仔”整机采用腱绳驱动轻量化架构，全身搭载柔性晶格皮肤，标配高度仿生拟人步态；内置智能避障安全系统，稳定适配人流密集的开放式公共场景。面向工业制造领域，中兴通讯推出了人形机器人产品“中兴星旺”和“中兴星擎”：重载通用轮式机器人“中兴星旺”负载 30 千克以上，现已落地先进制造、电力巡检等场景；重载通用双足机器人“中兴星擎”标配高精密灵活躯干，拥有“星旺”同款负载能力与 6 小时续航。IT之家获悉，“星擎”、“星旺”预载大量工业操作技能。无需长时间训练即可快速适配全新工序。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/521.htm", "publishedAt": "2026-07-18T09:08:25+00:00"}, {"title": "华硕 a 豆 11 口电竞扩展坞发售：10Gbps 速率 + 千兆网口，支持 HDMI+DP 三屏异显", "summary": "IT之家 7 月 18 日消息，华硕京东自营店新上架了一款华硕 a 豆扩展坞，号称 11 口电竞旗舰款，升级 USB 3.2 实现 10Gbps 传输速率，支持 DP / HDMI 高刷三屏异显，最高可输出 8K 30Hz 以及 4K 120Hz 画面，京东价 &nbsp;329 元，活动抢购价 &nbsp;299 元。京东华硕（ASUS）a 豆旗舰款 Type-C 扩展坞 USB 分线器 10G 千兆网卡 HDMI 转换器 USB 扩展器 SD / TF 读卡器 PD100W 拓展坞 HC112299 元直达链接这款产品外观采用银灰色铝合金外壳，采用高导热系数铝合金外壳，经过阳极氧化工艺处理，可帮助设备快速散热；自带编织数据线，整体尺寸约 116 * 48 * 15 mm，净重约 81g，可轻松放入包内携带。视频输出方面，它支持 HDMI+DP 三屏异显，可同时输出三路视频信号，支持同屏 / 分屏模式，兼容 Windows 和 Mac OS 系统。其中，DP 接口采用 DP 1.4 协议，最高支持 8K@30Hz 输出，HDMI 接口最高支持 4K 120Hz，DP 接口最高可实现 1080P 240Hz 输出。数据传输方面，这款扩展坞采用了 USB 3.2 接口，理论传输速率可达 10Gbps，1GB 文件约 1 秒即可完成传输，大文件拷贝效率相较于 USB 2.0 提升约 20 倍。它还内置千兆网口，可自适应 10/100/1000Mbps 网速，连接有线网络更稳定无延迟。这款扩展坞带有 SD / TF 双卡槽，支持同时读取两张存储卡，可帮助相机用户快速同步照片、视频。此外，它还保留了 3.5mm 独立音频接口，可外接耳机、音响。充电方面，它自带 PD 100W 充电输入接口，支持 PD 3.0 快充协议，可以在拓展接口的同时为笔记本电脑充电，约 1.5 小时即可充满 13 英寸 MacBook Air。数据线采用 PP 纱棉网编织包裹，具备耐磨损、耐弯折、抗拉扯的特性，更经久耐用。它还支持即插即用，兼容 Windows / macOS / Linux / Android 等主流操作系统，不需要额外安装驱动。IT之家附详细参数如下：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/520.htm", "publishedAt": "2026-07-18T09:04:56+00:00"}, {"title": "豆包视频通话背后，火山引擎重构 Agent 时代多模态传输底座", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/GICIrEsTJwEgGsDYFvCM?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T08:54:38+00:00"}, {"title": "此芯发布“桌面级 AI 超算”AGX Station：基于 P1，支持多形态算力卡", "summary": "IT之家 7 月 18 日消息，此芯 (CIX) 昨日在上海发布了其 AGX Agentic Compute 智能体计算战略，并推出“桌面级 AI 超算”硬件 AGX Station 以及全栈智能体算力产品系列。此芯的 AGX Agentic Compute 战略聚焦智能体专用 CPU、实现端边云全域协同、布局软硬件全链路，以自研 Arm SoC 为核心，打造覆盖端、边、云全场景的全域算力底座，实现“一芯驱动全场景 AGI”。这一战略的硬件实现即为 AGX Station。该“桌面级 AI 超算”基于此芯 P1 处理器，采用模组化、可扩展开放式硬件架构，支持 M.2、MXM、PCIe 等多种形态算力卡，集成 2×10G RDMA、USB、HDMI 等丰富接口。其三维仅 150×150×60 (mm)，支持 160TOPS 至 320TOPS 的算力扩展，可实现 70B 至 150B 参数规模大模型的原生推理。与硬件配套的是操作系统软件 Agentic OS。这是一款专为智能体设计的操作系统，基于多智能体分布式架构，实现计算资源动态调度与异构设备统一管理；同时以模型即服务（MaaS）能力聚合智谱 AI、Kimi、Qwen、文心一言等国内外主流大模型；提供标准化 API 与全栈开发工具链。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/502.htm", "publishedAt": "2026-07-18T08:25:11+00:00"}, {"title": "世界排名第一韩国棋手申真谞挑战围棋 AI KataGo，受让两子首局告负", "summary": "IT之家 7 月 18 日消息，据韩联社报道，世界排名第一的韩国棋手申真谞 7 月 17 日挑战围棋 AI KataGo，首局在 245 手投子认负。当天的对弈以申真谞受让两子（IT之家注：先在棋盘上放置两颗子）的方式进行，其执黑先行。申真谞保留用时 5 小时，1 次 30 秒读秒。KataGo 不限时，每手 20 秒读秒。KataGo 在开局不利的情况下一开始就选择了非常规走法，第一手落在星位，第二手选择右上角三路高挂，展现打破常规的布局。随着战局的深入，KataGo 凭借强大的运算能力占据上风，最终申真谞投子认输。在 AlphaGo 和李世乭人机大战十周年之际，韩国棋院主办此次人机大赛。本次对抗无论胜负均下满三局，申真谞还将于 19 日、21 日与 KataGo 对弈。2016 年，李世乭在首尔以 1 比 4 不敌 AlphaGo，但在第四局留下了载入史册的一胜；2017 年，柯洁在乌镇以 0 比 3 告负。此后，AI 从人类的挑战者变成职业棋手日常研究和训练的老师。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/495.htm", "publishedAt": "2026-07-18T08:16:54+00:00"}, {"title": "我国首个全国产十万卡 AI 超集群，曙光 8000 上线首周实现满载运行", "summary": "IT之家 7 月 18 日消息，今日，2026 世界人工智能大会（WAIC）期间，获评大会“镇馆之宝”的中国首个全国产十万卡 AI 超集群 —— 曙光 8000（登峰）公布最新运行数据：正式上线首周即实现满载运行，目前日均处理作业数突破 15 万个，单日处理作业峰值超过 50 万个。截至目前，曙光 8000 已完成近千项超智融合应用适配，覆盖大模型训练、高通量推理、科学计算等多个万卡级规模场景。上线后快速满载，反映出科研机构、企业和开发者对超大规模、高质量算力的现实需求正在加速释放，也表明十万卡级算力已开始持续承接更加广泛的科研和产业任务。▲ 集群节点热力分布图据官方介绍，满载运行并不意味着资源拥堵。依托智能调度引擎、数据亲和性算法和多元融合调度策略等动态资源管理机制，曙光 8000 能够根据任务类型、数据位置和资源状态进行智能分流和按需调配。面对百万级用户并发请求，系统在高负载状态下仍可保持运行畅通，实现“高负载不拥堵、多任务不排队”，持续支撑“四个面向”“四极”等重大战略任务，以及大模型训练和高通量推理等复杂应用。曙光 8000 采用全球首创的高密度机柜结构，单个计算单元算力密度较其他超节点提升 20 倍，在有限空间内实现更高算力部署；自研 scaleFabric 类 IB 原生 RDMA 高速互连技术，实现十万卡规模稳定互连。与此同时，IO500 生产型双料第一的 ParaStor 分布式存储、全球领先的浸没式相变液冷等关键技术协同工作，共同保障海量数据高效流转、系统长期稳定运行。据IT之家此前报道，中科曙光 7 月 10 日宣布中国首个全国产十万卡 AI 超集群“曙光 8000（登峰）”正式落成，并接入国家超算互联网，标志着 AI 基础设施建设开始从万卡级迈向十万卡级部署阶段。7 月 17 日，IT之家前往 2026 世界人工智能大会现场，拍到了“曙光 8000（登峰）”真机。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/491.htm", "publishedAt": "2026-07-18T07:52:24+00:00"}, {"title": "国家地方共建人形机器人创新中心中试公共服务平台启用，每年可产整机 2000 台", "summary": "IT之家 7 月 18 日消息，据央视新闻今天（18 日）报道，国家地方共建人形机器人创新中心中试公共服务平台正式启用。该平台坐落于上海浦东张江机器人谷，构建研发试制、精密装配、全项测试、仓储交付一体化中试闭环，具备年产 2000 台整机、2000 套核心精密组件能力，将为浦东具身智能产业提供从研发到量产的关键支撑，有效降低研发建线成本，沉淀标准工艺与实测数据，助力长三角相关产业集群化发展。延伸阅读国家地方共建人形机器人创新中心（国地中心）于 2024 年 5 月在上海揭牌，是人形机器人领域的国家首个公共平台。该中心此前已在上海浦东启用了全国首个异构人形机器人训练场，首期可部署超 100 台异构人形机器人进行训练。国地中心还曾发布全球首个“一脑多能”、“一脑多机”的通用具身智能平台“慧思开物”，并预告将发布里程碑式的通用具身智能平台“格物”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/482.htm", "publishedAt": "2026-07-18T07:28:12+00:00"}, {"title": "Patreon 与 Cloudflare 联手，在平台禁止 AI 训练爬虫", "summary": "IT之家 7 月 18 日消息，创意内容分享与变现平台 Patreon 昨日宣布与技术合作伙伴 Cloudflare 合作，在该平台上完全禁止为人工智能模型训练搜集资料的爬虫机器人，同时继续允许增加创作者曝光度的搜索引擎爬虫爬取内容。Patreon 平台上的创作者通常采用付费与免费结合的内容结构。Patreon 的付费墙已很好地防止付费内容被人工智能公司无偿使用；而在创作者在 Patreon 上发布的免费媒体内容逐步增长的背景下，新机制则进一步完善了立体防护。根据 Patreon 的早期测试，各个人工智能训练爬虫每周尝试访问 Patreon 的次数从数千次骤降至零次。相关阅读：《Cloudflare 推出 Precursor：一键导入，持续检测是否为机器人流量》《Cloudflare 细化网络爬虫屏蔽管理，将默认禁止 AI 代理与训练爬虫访问广告页面》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/479.htm", "publishedAt": "2026-07-18T07:20:41+00:00"}, {"title": "后摩智能携 M50 Inside 终端亮相 WAIC 2026，支撑端侧 AI 算力与终端创新", "summary": "本地大模型规模化商用破局", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453705.html", "publishedAt": "2026-07-18T07:20:19+00:00"}, {"title": "荣耀 CEO 李健：AI 的演进必将脱离冰冷的工具属性，全面迈向伙伴型类人生命体", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会今天在上海举行。据新浪科技消息，荣耀 CEO 李健在物理世界新范式论坛中发表演讲，称 AI 未来将脱离“工具”属性。李健表示，AI 的演进必将脱离冰冷的工具属性，从操作系统到具身交互，全面迈向伙伴型的类人生命体，重构人与物理世界的关系。这就是人工智能时代的价值锚点。他对此指出：“因此，我们将 MagicOS 升维成行业首个伙伴型、多模态智能体操作系统。让智能不再被禁锢在冰冷的屏幕与代码之中，而是成为触手可及的真实陪伴。”IT之家注意到，荣耀首台机器人 Robot Phone 今天已在全渠道展开预约，该机搭载第五代骁龙 8 至尊版芯片，正面配备一块 1.5K 分辨率的四等边直屏。顶部集成行业最小的四自由度（4DoF）钛合金机械云台，配备 2 亿像素 4D 云台主摄 / 长焦以及 5000 万像素超广角，拥有 ARRI 影像加持。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/476.htm", "publishedAt": "2026-07-18T07:02:32+00:00"}, {"title": "腾讯 WorkBuddy 正式版 App 发布，安卓 / iOS / 鸿蒙三端同步上线", "summary": "IT之家 7 月 18 日消息，腾讯今天宣布，WorkBuddy 正式版 App 现已发布，安卓、iOS、鸿蒙三端同步上线，是首个登陆鸿蒙系统的通用智能体应用。IT之家从 WorkBuddy 公众号了解到，这款 App 不仅具备桌面端的大部分能力，还支持在手机上远程向电脑端发起任务。鸿蒙版体验与 iOS、Android 端完全一致，提供两种执行模式：连接电脑：直连本地设备，调用桌面端完整能力。云端工作：具备桌面端主要能力，开箱即用，支持 Skills、专家与专家团、自动化定时任务、产物下载与分享、项目管理等，并通过资料库打通腾讯文档、ima 知识库。此外，这款应用还支持文字输入、语音口述、拍照上传、本地文件导入，以及腾讯文档、ima 一键导入等多种多模态方式。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/468.htm", "publishedAt": "2026-07-18T06:47:43+00:00"}, {"title": "6 台机器人拼长城、首款智能体手机首秀：阶跃把 AI 塞进了现实世界｜WAIC 2026", "summary": "大模型的下一站，是走出屏幕，自己动手#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672344?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T04:01:07+00:00"}, {"title": "WAIC 2026 | 混元Hy3大模型首秀，腾讯上线AI技能支付体系", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/FeWLPKLYDjWko8rJjxKq?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T21:01:17+00:00"}, {"title": "GOAI 世界人工智能开源大赛官网上线，全球报名正式开启", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/r3sAtSl97Gx5CuZHXOdi?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T19:11:20+00:00"}, {"title": "Kimi K3 全面解读：2.8 万亿参数、48 小时造芯片、以及一个正在被开源模型追上的 AI 竞争格局", "summary": "7 月 17 日凌晨，月之暗面发布了 Kimi K3。 数字可以快速过一遍：2.8 万亿参数，MoE 架构，896 个 expert 每次激活 16 个，100 万 token 上下文窗口，原生多模态，完整权重 7 月 27 日前放出——将成为全球首个开源的 3 万亿级别模型。 但数字说完了，故事才刚开始。 一个 90 后创始人，半年融了 60 亿美元 在讲模型之前...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/472928", "publishedAt": "2026-07-17T11:14:44+00:00"}, {"title": "✨ NocoBase 2.2-beta 发布：开源无代码 / 低代码平台 NocoBas 车型，应用“方鼎美学”设计语言，搭载 Coffee Pilot 3 高阶智驾辅助系统，限时权益价 21.48 万元起：Hi4 1.5T Max 五座版：预售价 21.98 万元，限时权益价 21.48 万元起Hi4 1.5T Pro 六座版：预售价 21.98 万元，限时权益价 21.48 万元起Hi4 1.5T Max 六座版：预售价 22.98 万元，限时权益价 22.48 万元起Hi4 1.5T Ultra 六座版：预售价 23.98 万元，限时权益价 23.48 万元起IT之家获悉，车身尺寸根据布局分为两个版本，五座版长宽高为 5138/2050/1970mm，六座版车长增加至 5299mm，宽高保持一致，全系轴距统一为 3000mm。动力方面，长城 H10 搭载 1.5T 发动机 + 双电机组成的 Hi4 混动系统，1.5T 发动机最大功率为 123kW，最大扭矩为 243N·m，电机最大功率为 100kW（前）、220kW（后），系统最大功率为 440kW，并配备四挡混动专用变速箱。电池方面，车辆配备 42.8kWh 电池组，CLTC 纯电续航为 232km、227km，最高综合续航 1404km，15 分钟快充 30-80%。内饰方面，该车配备 10.25 英寸全液晶仪表 +15.6 英寸中控屏 +29 英寸 SR-HUD；还配备 17.3 英寸后排娱乐屏，Coffee AI Sound 音响系统提供 21 扬声器 +7.1.4.2 声道布局 + 支持杜比全景声，峰值功率 1560W。空间方面，五座版车型后备厢容积 815L，二排放倒后可扩展至 1885L 超大容积，六座版车型容积 316L，三排座椅放倒后可拓展至 1056L 超大容量，全车共提供 42 处储物空间。智能驾驶辅助方面，长城 H10 搭载 Coffee Pilot 3 高阶智驾辅助系统，全系标配激光雷达，全车 27 颗智能驾驶传感器。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/573.htm", "publishedAt": "2026-07-18T12:12:58+00:00"}, {"title": "蓝思智能与上纬新材合作建万台级产线，全球首个可变形个人机器人启元 T1 即将量产", "summary": "IT之家 7 月 18 日消息，7 月 18 日，2026 世界人工智能大会期间，蓝思科技子公司蓝思智能机器人 (长沙) 有限公司与上纬新材正式签约，达成首期规划万台级机器人的产线合作。此次与上纬新材合作，双方将围绕机器人精密零部件加工、关节模组生产、整机组装等智造环节开展深度协同，稳步推进机器人产能落地与量产交付工作。本次合作聚焦的启元 Q1 与启元 T1，是上纬新材在具身智能领域的核心产品。启元 Q1 主打人形个人机器人，启元 T1 融合四足稳定与轮式高效，适应室内外复杂地形。IT之家注意到，上纬新材 7 月 14 日官宣，全球首个可变形个人机器人 —— 启元 T1 正式登场。据介绍，上纬新材启元 T1 支持双足站立，也能四足行走；支持柔性力控，自然牵手；支持静谧移动，主打灵活安全；支持主动交互、长期记忆、外语教学、图形化编程；支持生活备忘，定时提醒；声纹识别，声源定位。另外，启元 T1 还支持一句话点餐、游戏互动、拍摄模板更多技能拓展，并支持二次开发。基于行业首创的 Transformer 跨形态一体架构，启元 T1 实现了一个本体 + 两种形态的自由切换，同时还提供智能跟随、复杂路况自适应、物品托载、蓝牙音箱、相机联动（可拍希区柯克变焦和环绕运镜）等功能。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/566.htm", "publishedAt": "2026-07-18T11:18:53+00:00"}, {"title": "滴滴在WAIC分享：AI升级出行体验 好服务连接消费烟火气", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/454003.html", "publishedAt": "2026-07-18T11:04:51+00:00"}, {"title": "RoboSense 发布第二代全固态数字化激光雷达 E2，可无缝嵌入机器人头部、腕部", "summary": "IT之家 7 月 18 日消息，在 2026 世界人工智能大会上，RoboSense 速腾聚创发布首款基于自研超大面阵 SPAD-SoC“孔雀”芯片打造的第二代高精度超广角全固态数字化激光雷达 E2。据介绍，E2 整机体积缩小 60%，重量减少 40%；可无缝嵌入机器人头部、腕部及各类高集成设备；采用内置式双镜头设计，平整无凸起，更小地露出表面，使部署更美观的同时也更不易剐蹭。官方表示，仅需一颗 E2，机器人便可覆盖正前方以及两侧沿边的障碍物，快速获取完整的空间环境与操作姿态信息。IT之家获悉，E2 搭载新一代 SPAD-SoC“孔雀”，采用 28nm 制程，实现 640×480 VGA 级分辨率，采用第二代 3D 堆叠工艺，单颗芯片即可完成数字信号的接收和处理。此外，E2 采用全固态扫描架构，内部无任何运动部件，实现更长寿命、更高集成、更易量产。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/546.htm", "publishedAt": "2026-07-18T10:07:54+00:00"}, {"title": "2022 年《GTA 6》大规模泄密案最新进展：少年黑客 Arion Kurtaj 转至普通监狱等待 11 月重审，游戏同月发售", "summary": "IT 之家 7 月 18 日消息，据英国广播公司（BBC）7 月 16 日报道，曾因泄露《侠盗猎车手 VI》（Grand Theft Auto VI，简称 GTA 6）内部资料而受到关注的黑客 Arion Kurtaj，已经从英国一所安全医疗机构转移至普通监狱，目前正在等待 2026 年 11 月进行的重新审判。Kurtaj 此前因被认定不具备接受普通刑事审判的能力，被英国法院裁定无限期留置于安全医疗设施中。此次转移意味着相关部门认为其目前可能具备重新面对刑事程序的条件，但具体原因尚未公开。这起案件源于 2022 年 9 月发生的 GTA 6 大规模泄露事件。当时，超过 90 段游戏测试视频和截图被发布至 GTAForums 游戏社区，内容来自尚未正式公布的《GTA 6》内部版本。泄露者随后被确认是当时年仅 18 岁的 Arion Kurtaj，他还曾声称参与了此前发生的 Uber 网络攻击事件。英国伦敦市警察厅在联邦调查局（FBI）和英国国家网络犯罪部门（NCCU）的协助下，于泄露事件发生数天后逮捕 Kurtaj。调查人员指控其对 Uber 系统造成约 300 万美元（IT 之家注：现汇率约合 2035.4 万元人民币）损失，并非法获取约 5000 名 Revolut 用户的信息。此外，Kurtaj 还与另一名 17 岁少年被指控在 2021 年 7 月至 11 月期间攻击英国电信集团 BT Group 及旗下移动运营商 EE，并索要 400 万美元（现汇率约合 2713.8 万元人民币）赎金。两人同时被认为与英伟达遭遇的网络攻击事件有关。公开报道显示，Kurtaj 曾是黑客组织 Lapsus$ 成员之一。该组织此前被英国及美国执法机构关联至多起针对大型科技企业的攻击事件，包括英伟达、微软、三星、育碧以及 Okta 等公司的网络安全事件。Lapsus$ 的攻击方式涉及社会工程攻击、账号认证漏洞利用以及内部人员相关风险。2023 年 7 月，英国精神健康专家对 Kurtaj 进行了评估，并认定其由于“严重自闭症”等因素，不适合接受传统刑事审判。因此，陪审团在相关程序中只能判断其是否实施了被指控行为，而不能直接作出有罪或无罪判决。英国法院随后根据精神健康评估结果，于 2023 年 12 月决定将 Kurtaj 无限期送入安全医疗机构，除非医生认为其不再构成风险，否则不会结束该措施。评估报告指出，Kurtaj 当时仍表示希望尽快重新参与网络犯罪活动，并认为其再次实施相关行为的动机较强。案件受到关注的另一个原因，是 Kurtaj 在警方监管期间再次成功攻击 Rockstar Games。当时，他因此前涉及英伟达攻击事件处于警方保护状态，并被安排居住在英国一家酒店。尽管警方没收了其笔记本电脑，Kurtaj 仍利用酒店房间内提供的 Amazon Fire TV Stick、电视设备以及后来购买的手机、键盘和鼠标，进入 Rockstar 内部 Slack 系统，并威胁如果公司不通过 Telegram 联系他，将公开泄露游戏源代码。这次攻击发生后，Rockstar Games 确认 GTA 6 正在开发中，相关泄露内容也成为游戏正式公布前最大规模的信息外泄事件之一。据 Joe Tidy 透露，Kurtaj 目前已经离开安全医院并进入普通监狱，等待 2026 年 11 月重新审判。不过，英国警方和相关机构尚未公布更多案件细节，包括重新审判涉及的具体罪名、程序安排以及可能面临的刑罚。值得注意的是，其重新审判时间与《GTA 6》发售时间处于同一个月份。Rockstar Games 已确认该游戏将于 2026 年 11 月 19 日发售，首发登陆 PS5 和 Xbox Series X|S，PC 版本尚未确认。Kurtaj 案件后续将成为英国司法体系处理网络犯罪案件时的重要关注案例之一，尤其涉及犯罪责任认定、精神健康评估以及高风险网络攻击人员监管等问题。随着 2026 年 11 月重新审判临近，法院可能进一步公布有关案件的新信息。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/532.htm", "publishedAt": "2026-07-18T09:57:58+00:00"}, {"title": "吉利银河 TT Ultra 车型 7 月 21 日预售，配备激光雷达 + 双电机四驱", "summary": "IT之家 7 月 18 日消息，吉利银河 TT Ultra 版将于 7 月 21 日开启预售，吉利银河 TT 定位为纯电动中大型车，Ultra 版车型将配备激光雷达和高阶智驾辅助系统，动力采用了前后双电机四驱，并拥有 boost 模式。IT之家注意到，吉利银河 TT 全系采用 800V 高压平台，提供单 / 双电机的两驱和四驱，峰值功率分别是 245 和 425 千瓦。另外标配宁德时代的磷酸铁锂电池，CLTC 工况下的续航有 540、640、650 和 725 公里四种。内饰方面，吉利银河 TT 配备了三幅式圆形方向盘，新增有一枚红色运动按键。主驾还配有胶囊型仪表屏和 HUD 抬头显示。值得一提的是，中控空调出风口处配备了一块钟表（图片显示像实体钟表）。新车定位“全新 C 级 AI 纯电轿车”，搭载有激光雷达和电动尾翼。车身尺寸方面，新车的长宽高分别为 4999mm、1919mm、1479mm，轴距 2920mm，定位中大型纯电轿车。吉利银河 TT Ultra 全球竞速版此前已经亮相，提供特罗姆瑟 · 峡湾蓝配色，搭配专属熏黑运动 LOGO、熏黑运动轮毂、波尔多 · 醇红内饰。此外，该车还号称配备大面积真碳纤维，包括前后保险杠、外后视镜等。此外，银河 TT Ultra 全球竞速版还采用 GEA Evo 原生新能源架构，搭载“满配驾控五件套”（双叉臂 + 五连杆 + 预瞄魔毯 + CCD + 液压衬套）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/526.htm", "publishedAt": "2026-07-18T09:31:03+00:00"}, {"title": "AI 智能体算力消耗过快，传统账单风控跟不上速度", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/secM60Za0CNxIYvQO47m?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-18T09:00:00+00:00"}, {"title": "硅谷预言家凯文 · 凯利现身 WAIC：未来个人智能体将比你更了解自己", "summary": "IT之家 7 月 18 日消息，7 月 17 日-7 月 20 日，2026 世界人工智能大会暨人工智能全球治理高级别会议在上海举办。美国著名专栏作家、互联网专家与未来学家凯文 · 凯利在荣耀“物理世界新范式论坛”上发表演讲。谈及 AI 智能体发展趋势时，凯文表示：“我们以后将会有个人智能体，多个智能体加在一起可以做很多事。它们可以是以摄像头或手持形式作为载体，始终保持在线非常重要。因为随着时间的流逝，这些智能体将会更多地了解你，甚至会比你自己更了解你。”IT之家注：凯文 · 凯利（Kevin Kelly）是《连线》杂志的第一任主编，曾任著名的《全球概览》（乔布斯最喜爱的杂志）编辑和出版人，并于 1984 年发起了首届黑客大会（Hackers Conference）。其文章常见于《纽约时报》《经济学人》《时代》周刊，《科学》杂志等权威媒体。他被人们誉为“硅谷精神之父”及“科技预言帝”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/492.htm", "publishedAt": "2026-07-18T07:59:01+00:00"}, {"title": "傅利叶发布首款轮式双臂机器人 GRW：三种手随便换、能扛起 16 公斤重物", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会近日在上海召开。傅利叶昨天在大会上推出首款轮式双臂机器人 GRW，主打仓储物流、工业制造、康养照护等高负载人机协同场景。据介绍，这款机器人归属辅助型交互类别，采用创新的“长臂窄肩”设计，全身尺寸达 720*618*1160-1650 mm，体重约 160 kg，机身肩宽仅 585 mm，机身主体覆盖 29 个自由度（IT之家注：不含末端），可灵活穿行于室内过道、办公空间、仓储通道及制造工位等狭窄作业空间。同时，这款机器人最高可扛起 16 公斤的重物，拥有 2 米级超大作业空间及灵活移动能力，模块化末端设计支持更换夹持器、吸盘及灵巧手等 3 种“手”（执行工具），确保一机多用。此外，该产品支持断电抱闸、防倾倒保护及异常快速响应，在紧急情况下能有效保障人员与设备安全。兼容热插拔换电，续航时间可达 4 小时，适用 FOCUS 集控系统，配备完整软件工具链，无需复杂开发即可实现快速部署与高效运维。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/489.htm", "publishedAt": "2026-07-18T07:40:47+00:00"}, {"title": "中国电信：将适度超前建设算力基础设施，目前已建数据中心超 900 个、总电力容量近 8GW", "summary": "IT之家 7 月 18 日消息，据科创板日报报道，2026 世界人工智能大会期间，中国电信董事长柯瑞文在演讲中表示，目前“息壤”（中国电信自主研发的全国一体化智算服务平台与算力分发网络核心枢纽）智算平台纳管算力已超过 100EFLOPS。IT之家获悉，中国电信将适度超前建设算力基础设施。目前已建数据中心超 900 个，总电力容量近 8GW，是全国最大的 AIDC（人工智能数据中心）服务商。中国电信将加大国产算力规划与布局，围绕重点城市强化边缘算力池部署，提升单节点算力规模与服务能力；将加快打造弹性敏捷的算力互联网络。此外，中国电信将建设“新八纵八横”骨干光缆网，加快推进传输链路向 800G 演进；深化千兆光网普及与 5G-A 部署。探索超大容量、OCS 全光组网算内网络建设，支持超大规模集群，提升训推算效；将持续加大海缆资源投入，为人工智能的国际合作提供“海陆互备、内外协同、安全可靠”的网络基础。相关阅读：《中国电信副总经理栾晓维：推动从传统流量经营向 Token 经营转型》《中国电信 2026 年第一季度净利润 73.50 亿元，同比下降 17.08%》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/474.htm", "publishedAt": "2026-07-18T07:00:13+00:00"}, {"title": "iOS 27 公测版上手：国行 AI 准备好了，但系统流畅更值得升级", "summary": "有可能成为新一代「钉子户」系统。#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672364?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T06:47:24+00:00"}, {"title": "早报｜苹果上调Apple Music价格/小米SU7虚假碰撞测评博主被判一年八个月/努比亚、阶跃星辰智能体手机亮相WAIC", "summary": "· 智谱 ARR 被曝达到 10 亿美元，半年增长 15 倍 · Shopify CEO：反 AI 编程的人严重高估了人类代码质量 · 影石与荣耀达成影像生态合作，计划年底前进驻 300 家荣耀门店#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672338?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T00:49:59+00:00"}, {"title": "搭载全球首个智能体原生操作系统 Step AOS，STEPX Neo 亮相 2026 WAIC", "summary": "点击查 title": "TinyEngine 2.11 版本发布：AI 进一步融入画布，Vue 工程可一键转 DSL", "summary": "升级重点放在了三个方向上：更智能的开发体验、更顺滑的资产导入能力，以及更完整的设计器物料生态。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/u/6769809/blog/19722277", "publishedAt": "2026-07-16T02:27:12+00:00"}]}, {"label": "论文研究", "items": [{"title": "高文院士 WAIC 2026 发言：中国算力网第一阶段已完成 70%，全面落地或需二十年", "summary": "IT之家 7 月 18 日消息，7 月 17 日至 20 日，2026 世界人工智能大会暨人工智能全球治理高级别会议（WAIC）在上海举行，联动世博、张江、西岸三地四馆同步开展，共计 1100 余家企业参展，近 4486 项展品亮相，349 款产品全球首发，规模创历年新高。今日，大会“未来计算 · 未来算力”专题论坛在上海世博中心举行。鹏城实验室主任、中国工程院院士高文在论坛上阐述了中国算力网发展的三个阶段。高文表示，第一阶段是算力资源汇聚。目前该阶段任务已完成 70%，全国 70% 的算力资源已纳入实时更新的统一数据库，该数据库提供给国家数据局使用，可实时展示各算力中心的运行状态等信息。国家数据局此前披露，全国一体化算力网监测调度平台已将全国约七成智能计算算力纳入监测覆盖范围。截至 2026 年 3 月，我国智能算力总规模已达 1882 EFlops（IT之家注：每秒百亿亿次浮点运算），在用算力中心标准机架达 1445 万架，超过 70 条算力大通道已建成。算力网已于 2026 年 4 月被正式纳入国家“六张网”战略性基础设施阵列。第二阶段是在算力汇聚的基础上，面向特定用户群体开展协同运算，如在部分厂商内部或友商之间进行，暂不对普通公众开放。这一阶段预计还需五年左右推进。高文此前在 2025 年大湾区交易所科技大会上介绍，第二阶段“算力任务可调度”类似于电网的智能调度，能够根据成本、位置和需求，将计算任务自动分配到最合适的算力中心。待第二阶段的运营模式成熟、配套的计费和管理体系到位后，算力网才会面向社会开放，进入第三阶段。第三阶段“计算任务可协同”是终极理想 —— 用户无感知地使用全国算力，系统能自动协调多方资源、无缝切换。高文指出，第三阶段的全面落地并非三五年即可实现，可能需要十几年、二十年的时间。中国算力网的建设愿景是“让用户像用电一样方便地使用算力”。在本次大会期间，高文院士团队还将在“先进计算网络与算电协同论坛”上研究论证算力中心从传统“能耗大户”转型为“电网友好型节点”的可行性，核心突破点在于实现算力调度与电力调度时序的实时联动。此外，7 月 18 日下午的“未来计算 · 未来算力”论坛上，上海太空算力产业标杆项目“星枢计划”首发星座也正式对外发布。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/576.htm", "publishedAt": "2026-07-18T12:35:22+00:00"}, {"title": "上海发布太空算力星座工程“星枢计划”，商业运营阶段将完成千星部署", "summary": "IT之家 7 月 18 日消息，7 月 18 日下午，在 2026 世界人工智能大会“未来计算未来算力”专题论坛上，上海标志性太空数字基建工程“星枢计划”首发星座正式对外发布。此举标志着国内首个面向商业化运营的天基智能算力网络，正式从顶层设计迈入在轨验证与场景落地的工程化实施阶段。“星枢计划”寓意“星空的核心、算力总枢纽”，是上海重点布局的太空算力产业标杆项目，项目定位为上海市旗舰级太空算力星座工程。本次发布的首发星座，由 1 颗中心算力主星、1 颗伏羲气象星和 1 颗即时遥感星构成。三颗卫星通过星间激光链路实现数据贯通，在轨构成一个完整的闭环算力业务验证单元。其中，首发星座主星在硬件层面实现了多项面向工程化应用的国产技术突破：算力芯片国产化：搭载定制航天级 GPU 芯片，单星实现 32P 超高在轨算力输出，填补了国内卫星大规模原位实时计算的技术空白；具身智能在轨运维：首次在算力卫星上引入具身智能系统，可在轨自主完成 GPU 算力载荷的模块化重组与状态调整，降低对地面测控的依赖；高效能源供给方案：采用高效光伏电池与钙钛矿叠层复合发电技术，整星发电功率达 15kW，在光电转换效率和成本控制上均优于传统星载方案，为持续高功耗算力提供能源保障；三级协同散热体系：集成主动微通道液冷、超轻被动隔热复合材料与可展开式辐射散热器，解决了星载高性能 GPU 长效稳定运行的热控难题，系国内首个经工程验证的星载 GPU 热控成套方案；高速激光互联能力：突破 400Gbps 星间 / 星地光通信链路，结合光学相控阵接收技术，为星簇内部及星地之间的算力互连提供大带宽、高可靠的通信通道。IT之家附“星枢计划”规划如下：工程验证阶段发射 2 颗算力星 + 12 颗边缘计算星商业部署阶段发射 50 颗算力星 + 100 颗边缘计算星商业运营阶段完成千星部署，其中中心算力卫星 800 颗、边缘计算卫星 200 颗", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/530.htm", "publishedAt": "2026-07-18T09:48:31+00:00"}, {"title": "联想拯救者 Y900 系列平板推送 7 月升级：新增游戏助手 AI 游戏伙伴、CAJ Viewer PC 版应用等", "summary": "IT之家 7 月 18 日消息，联想 AI 平板拯救者 Y900 系列今日开启七月全新版本推送，版本号 2.0.10.101。IT之家整理如下：新增游戏助手 AI 游戏伙伴，随时语音检索攻略新增 CAJ Viewer PC 版应用，支持 CAJ 格式论文阅读新增图库调用天禧 AI 慧眼修图功能AI 声纹猎手支持三角洲行动王者荣耀新增支持游戏插帧课程表支持一键导入日历，高效管理学习安排新增图库支持一键跳转剪映专业版，快速启动剪辑优化系统更新界面显示样式优化桌面图标显示样式优化大文件夹动画效果优化非标充电兼容性优化系统稳定性IT之家注意到，联想拯救者 Y900 平板 11 英寸版本于今年 6 月首销，首发优惠价 2699 元起。该机正面配备一块 11.1 英寸 3840x2560 分辨率 144Hz 面板（峰值亮度 1100 尼特），匹配 8MP 自拍摄像头；平板后置 13MP 主摄，机身搭载联发科天玑 9500s 处理器，至高可选 12GB LPDDR5X RAM 和 512GB UFS 4.1 存储空间，内置 11000mAh 电池（支持 68W 充电）。作为联想天禧 AI 一体多端全场景新品家族的核心成员，拯救者 Y900 系列全系列支持天禧 AI，可识别自然语言指令、规划出行路径，还能深度理解用户使用习惯逐步进化。同时产品拥有 PC 级专属应用生态，支持多窗电脑模式，出厂预装 PC 级剪映专业版，还搭载独家 AI 慧眼修图功能，用户可通过语音指令完成修图操作，降低移动端创作门槛。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/517.htm", "publishedAt": "2026-07-18T08:51:37+00:00"}, {"title": "Stripe 发布基准测试：AI 智能体可开发集成方案，但校验环节存在短板", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/zVfybMt5i742CqhWYjR4?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T14:15:00+00:00"}, {"title": "Visual Studio Code 1.129 发布", "summary": "Visual Studio Code 1.129 现已发布，此版本新增了专用 agent host、Agents window 中的全新编辑器面板、使用!运行命令的功能以及现代 UI 预览。 The agent host：在专用进程中运行 agent 会话，并从多个窗口连接到它们。 Agents window 中的新编辑器面板（实验性）：在 docked editor 中查看 agent-generated files 和 ...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/471757/vs-code-1-129-released", "publishedAt": "2026-07-16T03:11:53+00:00"}, {"title": "DeepSeek 融资股权变更完成", "summary": "企查查 APP 显示，近日，DeepSeek 关联公司杭州深度求索人工智能基础技术研究有限公司发生工商变更。 新增杭州程砺企业管理咨询合伙企业（有限合伙）、国家人工智能产业投资基金合伙企业（有限合伙）为股东，注册资本增加至 1644.75 万元。 其中，DeepSeek创始人梁文锋退出杭州程砺企业管理咨询合伙企业（有限合伙）股东...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/471741", "publishedAt": "2026-07-15T08:27:41+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "荣耀 CEO 李健：AI 的本质是增强人而非替代人", "summary": "IT之家 7 月 18 日消息，据新浪财经今日报道，7 月 17 日至 20 日，2026 世界人工智能大会暨人工智能全球治理高级别会议在上海举行。在荣耀“物理世界新范式论坛”上，荣耀 CEO 李健表示，AI 的本质是增强人而非替代人。李健描绘了 AI 增强人类的终极场景：未来，一个人将带领一个由海量智能体设备组成的矩阵，将边端云的群体智慧转化为个体的无限潜能。无论人的意图如何瞬息万变，这个智能体矩阵都能瞬间响应并进行有机重构，化作无处不在的智能服务。李健认为，在智能时代，欲望的外化即是“人的意图”。李健强调，意图的主权永远掌握在人类手中，产品的进化方向必须由人的真实需求来决定。AI 绝不是替用户做决定，而是帮助用户降低“能做什么”的技术门槛，让人类能够更自由地表达和实现意图。IT之家注意到，李健指出，AI 本身没有善恶，其表现完全取决于人类赋予的价值观定义与规则。荣耀的最终目标是让每一个人都能拥有并肩成长的智能伙伴集群。AI 的到来不仅不会剥夺人类的思考能力，反而将促使人的创造力与判断力迎来前所未有的爆发。延伸阅读2025 年 3 月，荣耀新任 CEO 李健在 MWC 2025 上发布了“阿尔法战略”，宣布公司将从智能手机制造商向全球 AI 终端生态公司转型，并计划未来 5 年投入 100 亿美元建设 AI 设备生态。李健在 MWC 2026 前夕提出了 Augmented Human Intelligence（AHI）理念，其核心是让 AI 兼具智能度（IQ）与生命感（EQ），以增强人类在变化世界中的适应、进化与享受当下的能力，实现人与 AI 共生。2025 年 10 月，荣耀在发布 Magic8 系列时预告了 AI 概念版 Robot Phone，并将其定位为对“AI 手机终极形态”的探索，旨在让设备从“工具”变为“有感知、会协同的生活伙伴”。该产品计划在 MWC 2026 上正式亮相。在 2026 年 7 月 18 日的同一场世界人工智能大会上，李健还发表了关于 AI 将脱离冰冷工具属性、迈向伙伴型类人生命体的观点，并宣布荣耀首台机器人 Robot Phone 已开启全渠道预约。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/488.htm", "publishedAt": "2026-07-18T07:40:21+00:00"}, {"title": "SQL Server 2016 宣告退役，微软承认其仍被“大量部署”", "summary": "IT之家 7 月 18 日消息，微软于当地时间 7 月 17 日发布博客，回顾了刚刚结束扩展支持服务的 SQL Server 2016。这款数据库产品自发布以来已运行超过 10 年。微软表示，该产品目前仍在企业环境中“大规模部署”，因此此次生命周期结束可能会影响部分仍依赖该版本数据库系统的组织。IT之家注：微软 SQL Server 2016 于 2016 年 6 月 1 日正式发布，于 2021 年 7 月 13 日结束主流支持，并在 2026 年 7 月 14 日结束扩展支持，完整生命周期超过 10 年。随着扩展支持结束，微软将不再为 SQL Server 2016 提供常规功能更新、安全更新、非安全修复以及官方技术支持。微软指出，SQL Server 2016 是该系列的重要版本之一，引入了多项至今仍被企业使用的功能，包括 Query Store（查询存储）、Always Encrypted（始终加密）、原生 JSON 支持、Stretch Database（拉伸数据库），以及安全性和性能方面的改进。由于稳定性和性能表现，该版本长期作为关系数据库管理系统（RDBMS）平台，被用于企业资源规划（ERP）、计费系统、医疗业务系统、制造业应用以及各种定制化业务软件。不过，SQL Server 2016 结束支持并不意味着服务器会立即崩溃。微软表示，现有数据库实例和依赖它运行的应用程序仍可继续使用，但由于后续不会再获得安全补丁和漏洞修复，企业面临的安全风险会随时间增加。此外，部分行业监管要求也可能涉及软件是否仍处于官方支持周期内。针对仍在使用 SQL Server 2016 的企业，微软建议优先评估升级方案，包括迁移至 SQL Server 2022 或 SQL Server 2025。微软表示，新版本提供持续支持、安全增强以及新的数据平台能力，其中 SQL Server 2025 还加入了 AI 相关能力。另一种选择是迁移至云服务。企业可以将数据库迁移到 Microsoft Azure 上的 Azure SQL Managed Instance，该服务能够提供较高的 SQL Server 兼容性，并支持自动补丁更新、高可用性和自动备份等能力。对于希望减少应用程序改动的企业，也可以选择将现有数据库迁移至 Azure 虚拟机中的 SQL Server 环境。如果企业暂时无法完成迁移，微软还提供 Extended Security Updates（ESU，扩展安全更新）计划。购买该服务后，SQL Server 2016 可以额外获得最多三年的关键安全更新。不过微软强调，ESU 主要用于为企业争取迁移时间，并不建议作为长期运行方案。微软客户工程师在官方博客中表示，SQL Server 2016 结束支持后，企业迁移过程中应提前进行环境评估，以识别可能影响升级的因素，包括已弃用功能、应用兼容性问题、关联服务器依赖、SQL Agent 作业、CLR 集成以及旧版 SSIS、SSRS 工作负载等。微软建议企业在迁移前使用相关工具进行数据库评估和迁移规划，包括 Data Migration Assistant（DMA）、SQLPackage、Azure Database Migration Service 等，以帮助发现潜在问题并制定迁移路径。微软方面表示，数据库本身通常并不是迁移过程中最复杂的部分，应用程序依赖关系、停机时间要求以及业务连续性需求往往会影响最终方案选择。目前，仍运行 SQL Server 2016 的企业可以根据自身情况选择升级至新版本、迁移到 Azure 服务，或通过 ESU 延长安全支持周期。微软提醒，企业应尽早完成环境评估并制定现代化数据平台规划，以降低旧版本数据库持续运行带来的风险。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/473.htm", "publishedAt": "2026-07-18T06:59:39+00:00"}, {"title": "从GPU到Token：英伟达Vera Rubin如何重构下一代AI工厂", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/s8EpYCpdF3YiSkSbYfGG?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T10:09:25+00:00"}, {"title": "AI 编码实战 | 0 行手写代码，2 天重构 2 万行 Vue 项目", "summary": "文章的核心观点是：AI 辅助开发的关键不在 AI 本身的能力，而在于人为 AI 建立的约束体系 —— 通过 Skills 技能包注入领域知识、AGENTS.md 沉淀项目规范、飞轮效应让错误只犯一次，将模糊目标转化为 AI 可精确执行的高质量指令，从提出需求到代码合入，甚至本篇分享也是 AI 生成。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/vivotech/blog/19722516", "publishedAt": "2026-07-16T08:52:00+00:00"}]}]};

const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="昨天";
  else if(dayDiff===-1) prefix="明天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.parentNode.removeChild(box); return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top"><span class="dot" style="background:#94a3b8"></span>顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '"><span class="dot" style="background:' + accentVar(i) + '"></span>'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
</body>
</html>
