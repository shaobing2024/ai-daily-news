const DATA = {"date": "2026-07-20", "generatedAt": "2026-07-20T14:02:31Z", "attribution": {"source": "中文科技媒体 RSS 聚合"}, "sourceList": ["量子位", "IT之家", "InfoQ 中文", "爱范儿", "开源中国"], "lead": "", "isFallback": false, "sections": [{"label": "模型发布/更新", "items": [{"title": "国产GPU分水岭时刻：当别家还在卷参数，摩尔线程早已训练出了世界模型", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/01aguG1Yrgxl0bpmfZps?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T19:51:30+00:00"}, {"title": "研究：AI 会削弱人类批判性思维，降低人们说“我不知道”的意愿", "summary": "IT之家 7 月 20 日消息，2026 年，AI 依然会出现“幻觉”（hallucination），并且经常给出错误答案。然而，法国和意大利多所大学的研究人员发现，获得 AI 建议后，人类的批判性思维能力可能会受到削弱，使人们更容易自信地复述 AI 提供的错误信息。“对于人类来说，能够说‘我不知道’这一能力非常重要，因为这代表我们意识到了自身知识的局限。”米兰比可卡大学副教授 Valerio Capraro 在接受采访时表示，“但如今借助 AI，我们几乎可以轻松获得任何问题的答案。因此，我们想知道，这是否会影响人类承认‘我不知道’、暂缓判断的能力。”Capraro 与 École Normale Supérieure（法国高等师范学院）的 Chiara Marcoccia，以及罗马第一大学（Sapienza University of Rome）的 Walter Quattrociocchi 共同开展了一项研究，试图了解 AI 如何影响人们承认自己无知的意愿。论文标题直接揭示了研究结论：《AI 建议会降低人们说“我不知道”的意愿，即使 AI 给出的建议是错误的且准确性是被鼓励的》。AI 建议让人更少承认“不知道”Capraro 表示，他和团队设计了一组大型语言模型通常无法正确回答的问题。据IT之家了解，在实验中，他们要求参与者回答一些关于电影视觉细节的问题，例如《我爱贝克汉姆》（Bend It Like Beckham）中球队球衣的颜色，或者电影《高速路上一只猫》（Like a Cat on a Highway）中 Monica 驾驶的车辆类型。研究人员预计，这类细节通常不会出现在大多数 AI 模型的训练数据中，而实验所使用的模型（Step 3.5 Flash）也确实经常无法回答这些问题。他们还测试了目前较新的前沿模型，包括 GPT-5.5、Claude Sonnet 4.6 和 Gemini 3.5 Flash。这些模型虽然在车辆问题上表现不佳，但经常能够正确回答其他细节问题。研究人员选择 Step 3.5 Flash 的原因是，该模型在实验中通常会给出错误答案，这可以避免有人认为参与者只是合理地把判断权交给了一个可靠工具。“我们将参与者分成两组。”Capraro 解释道，“一组需要在没有 AI 建议的情况下回答问题，另一组则可以向 AI 请求帮助。结果发现，在没有 AI 的情况下，有 44% 的人选择回答‘我不知道’，也就是暂缓判断。而在可以获得 AI 建议后，只有 3% 的人这么做。也就是说，人们暂停判断的能力几乎崩溃了。”AI 降低准确率，却提高自信程度Capraro 表示，更令人意外的是，当 AI 提供帮助时，参与者的回答准确率也明显下降。换句话说，人们开始更加相信 AI 的答案，而不是自己的判断。“在没有 AI 的情况下，有 27% 的人给出了正确答案。”他说，“但在获得 AI 建议后，只有 9% 的人回答正确。因此，一些原本可能答对的人，在询问 AI 后反而得到了错误答案。”与此同时，AI 建议还显著提高了人们对自身答案的信心。Capraro 表示，在没有 AI 帮助时，参与者认为自己正确的比例约为 30%；而在使用 AI 后，这一比例上升到了 76%。也就是说，即使 AI 存在幻觉问题，人们依然会相信它提供的信息。“简单来说，人们的表现变得更差 —— 准确率只有原来的三分之一，但他们的自信程度却提高了一倍。”Capraro 说道。金钱激励能改善情况，但效果有限研究人员还进行了另一项实验，引入金钱奖励机制，希望鼓励参与者更加谨慎地判断。结果显示，金钱激励确实带来了一定改善。选择暂缓判断、承认“不知道”的比例从 3% 提升到了 8%；回答正确的比例也从 9% 提升到了 16%。不过，这两个数字仍然明显低于没有 AI 时的水平 —— 分别为 44% 和 27%。虽然研究人员选择的是电影细节类问题，但他们认为，这一发现可以推广到其他领域。Capraro 表示，他认为这一问题需要通过社会层面的 AI 素养教育和教育政策来解决。“当然，模型提供商也应该努力改善这一问题，但我认为双方的利益并不完全一致。”他说，“更有希望的解决方式，可能是在教育层面进行干预。”Capraro 特别担心 AI 对儿童成长带来的影响。“成年人已经通过过去的学习经历培养了一定的批判性思维能力。”他说，“但对于那些从出生起就伴随着这些系统成长的孩子来说，风险在于，他们甚至可能无法真正学会最基本的批判性思考能力。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/222.htm", "publishedAt": "2026-07-20T12:29:11+00:00"}, {"title": "消息称荣耀 Robot Phone 形态有专利友商难跟进，行业预测 1TB 版价格在 15999 元左右", "summary": "IT之家 7 月 20 日消息，博主 @数码闲聊站 今日发文谈及了荣耀 Robot Phone 手机。他透露，该机 200Mp 云台影像是基础，核心机构件、电机、模组全部是荣耀自研和独立定制，整套云台及翻转机构新增了近 100 个零部件。其中定制了 4 个电机，内部动力采用了特殊多极充磁工艺，直径最小的仅 6mm。核心结构件为了可靠性全部使用了钛合金材质，材料及加工成本比常规铝合金摆臂多 3 倍。并且装配流程极为复杂，涉及 60 多道步骤。博主称，在内存涨价的大背景下，行业预测 1TB 版本的价格要到 15999 元左右。有网友询问友商是否会跟进推出该形态的手机，博主回复称：“不是想跟就能跟的，这个形态荣耀有专利。”据IT之家此前报道，荣耀 Robot Phone 已正式开启预约，该机搭载第五代骁龙 8 至尊版芯片，其核心创新在于机身顶部集成了一套行业最小的四自由度（4DoF）钛合金机械云台系统。云台系统配备微型电机，体积比主流方案缩小 70%。该机预计会在今年 8 月发布，并将首发荣耀新一代伙伴型多模态智能体操作系统 AgenticOS 的内核（AgenticOS 尝鲜版将由荣耀 Magic9 系列手机发布）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/221.htm", "publishedAt": "2026-07-20T12:23:37+00:00"}, {"title": "优派“VA2450-HDJ”23.8 英寸显示器发售：1080P 144Hz 内置电源，799 元", "summary": "IT之家 7 月 20 日消息，优派旗下“VA2450-HDJ”23.8 英寸显示器目前已在京东发售，该机主打 1080P 144Hz，定价为 799 元。京东优派“VA2450-HDJ”23.8 英寸显示器 799 元直达链接该机配备一块 1920x1080 分辨率 IPS LCD 面板，显示器亮度 400 尼特，静态对比度 1500:1，MPRT 响应速度 1ms，支持 8-Bit（6-Bit + FRC）色彩。该机采用内置电源，显示器支架支持俯仰，支持 VESA 100x100mm 壁挂，提供了 1 个 VGA、1 个 HDMI 1.4、1 个 DP 接口，IT之家附显示器参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/217.htm", "publishedAt": "2026-07-20T12:06:54+00:00"}, {"title": "OpenAI 高管批 Kimi K3 开源，硅谷多方驳斥其观点", "summary": "IT之家 7 月 20 日消息，据 Business Insider 报道，每隔一段时间，就会有一家中国企业发布新的 AI 模型，然后引发美国人的恐慌。上周，中国 AI 公司月之暗面（Moonshot AI）发布 Kimi K3 模型后，这种情况再次出现。该模型在多项重要基准测试中取得亮眼成绩。从各方面来看，Kimi K3 的能力已经接近部分领先的美国 AI 模型，但成本却低得多。这一新模型再次引发了美国对于中国正在缩小与美国 AI 差距的担忧。一些人甚至指责中国企业是在利用 Anthropic、OpenAI 和 Google 已完成的研究成果训练自己的模型。如今，中美 AI 竞争的核心矛盾越来越集中在两种截然不同的发展路线：中国企业正在积极拥抱开源或开放权重模型，而美国企业大多仍坚持封闭模式。所谓开放权重模型，是指开发者可以查看模型参数，并根据自身需求进行修改、定制和部署。开源还是闭源，AI 行业爆发激烈争论上周末，在 OpenAI 一名高管针对 Kimi K3 发布长篇评论后，X 平台上围绕 AI 开源与闭源模式展开了激烈讨论。IT之家注意到，OpenAI 新任战略负责人 Dean Ball 曾担任美国总统唐纳德 · 特朗普的 AI 高级顾问。他在 X 上写道：“考虑到潜在风险，我个人很惊讶中国政府仍然允许如此强大的模型进行开源。”他认为，开源模型可能具有“减速主义”倾向，因为它们会“抑制 AI 资本支出”。不过，真正引发大量讨论的是他的另一番言论。Ball 写道：“我猜测，特朗普政府最终会意识到，在这一领域最好的策略，是围绕中国开放权重模型的使用制造大量监管风险。”他的观点是，通过监管流程制造恐惧、不确定性和怀疑，也就是业内常说的“FUD”，可能会让大多数美国企业避免采用开放模型。随后，Ball 解释称，这只是他的预测，并非政策建议。他表示，自己支持开源模式，直到 AI 发展到过于危险的阶段，而那将是一个“令人悲伤的日子”。他的言论迅速引发广泛回应。一些批评者认为，通过制造监管混乱来保护美国 AI 实验室，很像“监管俘获”（regulatory capture）—— 即负责监管某个行业的政府机构，最终制定出有利于该行业企业发展的规则，而这些规则往往受到行业内部人士的影响。OpenAI 和 Anthropic 坚持闭源路线Anthropic 和 OpenAI 一直认为，它们的模型能力过于强大，不适合开放。两家公司认为，如果完全开放模型，任何人都可能利用这些工具实现各种目的，而缺少有效监管。相比之下，封闭系统能够让开发者对模型拥有更强控制力，包括安全机制、访问权限以及商业定价。这两家 AI 公司也曾警告，中国推出的开放权重模型可能对国家安全以及自身商业利益构成威胁。风险投资人 David Sacks 曾担任特朗普政府首任 AI 和加密货币负责人，并于今年 3 月转任总统科技顾问委员会联合主席。他批评“利用监管不确定性作为武器”的做法，称其“完全不可接受”。Sacks 在回应 Ball 的帖子时写道：“我们正处于 AI 政策的关键转折点。领先的闭源实验室已经在 AI 模型收入方面形成双头垄断，现在它们希望政府消灭自己的开源竞争对手。”他所说的“双头垄断”，指的是 OpenAI 和 Anthropic。Sacks 表示：“它们已经亮出了自己的底牌。现在，是时候让硅谷其他力量 —— 绝大多数仍然重视开放竞争的人 —— 也表达自己的立场。”支持开源者：开放才是 AI 的未来Sacks 的“All-In”播客联合主持人、风险投资人 Chamath Palihapitiya 也表达了类似观点。他在 X 上写道：“未来属于开源。我们需要拥抱它，然后继续前进。”知名软件工程师、企业家 Suhail Doshi 则表示，美国 AI 实验室训练自己的产品时，使用的是“全人类的数据，却没有支付一分钱”。他写道：“任何以‘模型蒸馏’为理由，试图推动禁止开放权重模型的游说或立法，都是完全胡扯。这实际上是在阻碍未来美国创新。”不过，并非所有人都认同这一观点。Citrini Research 分析师、X 平台用户 Jukan 反驳了 Ball 关于“中国 AI 将占据主导地位”的担忧。他认为，开源模型并不会自动让企业获得市场优势。Jukan 以中国 AI 公司 DeepSeek 为例表示，该公司的竞争力来自自身运营效率，而不仅仅是开源框架。他说，DeepSeek 之所以能够保持较低的 Token 成本，是因为其内部运营方式更高效，而不是单纯依靠开源。Jukan 写道：“中国企业可能缺乏足够的计算能力，无法独自满足所有推理需求，但它们并不是在亏本销售，也不是无法收回训练成本。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/215.htm", "publishedAt": "2026-07-20T11:56:50+00:00"}, {"title": "闪迪推出 CZB 系列 USB-C 闪存盘：提供 64-256G 可选、读速达 250MB/s，129.9 元起", "summary": "IT之家 7 月 20 日消息，闪迪现已在京东上架 CZB 系列 USB-C 闪存盘，提供 64GB-256GB 可选，读取速度达 250MB/s，定价为 129.9 元起，IT之家整理价格如下：64GB：129.9 元128GB：199 元256GB：349 元京东闪迪 CZB 系列 USB-C 闪存盘 129.9 元起直达链接系列产品使用黑色壳体，配备钥匙环孔，整体重量约 6g，采用 USB-C 接口（为 USB 3.2 Gen 1 5Gbps 速率），读取速度达 250MB/s。IT之家附产品参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/214.htm", "publishedAt": "2026-07-20T11:46:30+00:00"}, {"title": "OpenAI 正重获二级市场投资者青睐，Anthropic 仍是最热门标的", "summary": "IT之家 7 月 20 日消息，今年大部分时间里，投资者几乎对 Anthropic 趋之若鹜，而对 OpenAI 的兴趣相对冷淡。但如今局势正在发生变化：虽然 Anthropic 依然是市场中最受青睐的公司，但随着 OpenAI 发布备受好评的新模型，并凭借 AI 编程智能体 Codex 取得成功，公司正在迎来投资需求的大幅回升。“过去一个月，市场对 OpenAI 的兴趣明显重新升温。”专注于投资 IPO 前企业二级股份的 Practical Venture Capital 创始人兼管理合伙人 Dave McClure 表示。由于 Anthropic 和 OpenAI 目前都尚未上市，绝大多数投资者只能通过二级市场购买股份，也就是从员工或早期投资者手中购买已发行股票。由于这一市场高度分散，流动性较低，因此市场上的估值通常只是估算值，并不像公开上市公司的股价那样持续实时交易。McClure 表示：“第一季度，OpenAI 面临大量负面消息，包括增长速度放缓、高管生病或离职、Anthropic 迅猛赶超，以及与埃隆 · 马斯克的诉讼问题。这些因素导致第二季度初投资者对 OpenAI 二级市场股票的需求大幅下降。”不过，根据专注于私人股票交易的商业银行 Rainmaker Securities CEO Glen Anderson 的说法，Anthropic 目前仍然占据主导地位，每出现两个求购 OpenAI 股票的买家，就有五个买家在追逐 Anthropic 股票。他表示：“一个月前，我们看到市场对 OpenAI 的需求非常有限。现在，Anthropic 依然拥有极高的投资热度，但你已经开始看到 OpenAI 的股票被更频繁地竞价购买。”OpenAI 没有回应媒体的置评请求。新模型带来投资者信心回归Business Insider 采访的多名二级市场交易人士表示，OpenAI 最新推出的模型以及 AI 编程智能体 Codex，让投资者在此前数月 Anthropic 占据市场主导之后，重新开始关注 OpenAI。今年 6 月，OpenAI 首次展示了旗舰模型 GPT-5.6 Sol，并在本月进一步扩大推出范围，同时发布 GPT-5.6 Terra 和成本更低的 GPT-5.6 Luna。独立测试机构的评测显示，GPT-5.6 Sol 已经处于行业领先水平附近，不过目前仍落后于 Claude 最新的 Mythos 和 Fable 模型。“投资者正在重新回到 OpenAI。”面向 IPO 前科技公司的交易平台 Augment 联合创始人 Adam Crawley 表示。为后期创业公司提供投资渠道的 Neostellar 总裁兼 CEO Mark Klein 表示，OpenAI 一名高管上周透露，公司旗下两款主要企业级平台已经累计达到 900 万活跃用户，这让他感到鼓舞。这两款产品分别是 Codex—— 一款面向复杂软件工程和编程任务的 AI 智能体，以及新推出的云端 AI 助手 ChatGPT Work，后者能够执行多步骤的专业工作流程。Klein 表示：“这种增长速度值得关注，因为它说明代 AI 智能体正在从最初面向开发者的应用场景，扩展到更广泛的专业工作流程中。更广泛来看，OpenAI 似乎正在努力将持续提升的模型能力转化为长期稳定的使用需求，覆盖编程、研究以及知识型工作等领域。”OpenAI 股票如今反而更便宜直到今年之前，Anthropic 一直被认为是更具投资价值的选择，其股票价格长期明显低于 OpenAI。但如今情况发生逆转，一些交易人士表示，购买估值相对较低的 OpenAI 股票，已经成为投资者对冲 Anthropic 持仓风险的一种方式。Business Insider 上周报道称，Anthropic 在二级市场上的估值已经飙升至 1.2 万亿美元（IT之家注：现汇率约合 8.14 万亿元人民币）。根据二级交易平台 Caplight 的数据，OpenAI 当前估值约为 9330 亿美元（现汇率约合 6.33 万亿元人民币），过去三个月上涨了 20%。上周，OpenAI CEO 萨姆 · 奥尔特曼（Sam Altman）公开承认，公司近期表现并不理想，同时暗示未来将迎来重大复苏。他在 X 平台上写道：“过去 12 个月并不是我们表现最好的时期，这主要是我的责任。但接下来 12 个月将会成为我们迄今为止最好的 12 个月。”就在奥尔特曼发表这番言论的同一天，中国 AI 初创公司月之暗面（Moonshot AI）发布了 Kimi K3 模型。该公司表示，Kimi K3 是全球最大的开放权重 AI 系统之一。McClure 认为，OpenAI 仍然面临巨大压力。他说：“来自中国 AI 公司以及开源社区竞争者的压力仍在持续，这些竞争很可能会影响 OpenAI 的增长速度和利润率。因此，OpenAI 未来仍然面临一座需要攀登的高山。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/213.htm", "publishedAt": "2026-07-20T11:40:14+00:00"}, {"title": "阿里云发布轻量应用服务器“智能体专用型实例”：2 亿 Token 包月活动价 262.5 元 / 月", "summary": "IT之家 7 月 20 日消息，今日，阿里云推出轻量应用服务器智能体专用型实例，将 vCPU、内存、云盘、200Mbps 峰值带宽（免流量费）与大模型 Tokens（1 亿至 32 亿不等）打包为预付费套餐，为用户提供一站式 AI Agent 运行环境。目前已在北京、上海、广州等 12 个地域上线，未来将支持更多国内及海外地域。IT之家从官方介绍获悉，针对用户以往需分别采购云服务器、申请 API Key、配置公网 IP 及带宽的割裂链路，阿里云重构产品架构，将 vCPU、内存、云盘、200Mbps 峰值带宽（免流量费）与大模型 Tokens（1 亿至 32 亿不等）封装为一款全新的“Agent 原生云服务器”，通过预付费套餐打包，让用户以极低附加成本同时获得充足 Tokens 额度与计算、存储、网络、面向 Agent 的操作系统等资源。同时，控制台可一键部署 OpenClaw、Hermes 等个人助理与 Dify、MaxKB 等企业级平台。匹配大多数 agent 开发者需求的入门级 2 核 2g+2 亿 Token 规格，包月购买（5 折）相比分开购买云服务器与 Token，在 AI Coding 场景每月可省 18%，内容生成等高消耗场景每月可省 68%。智能体专用型实例搭载的 Alibaba Cloud Linux 4 Agentic 版（ANOLISA）是阿里云面向 Agent 场景推出的全新操作系统，可以显著降低 Token 浪费（主流场景节省 30%），优化 Agent 运行表现（主流 Bench 分数提升 10%、Agent 执行时长降低 30%、冷启动时长降低 20%），具有全链路守护 Agent 运行安全（三层纵深防御架构）、工作区快照恢复等功能，专为 Agent 长期稳定运行而设计。该款新实例提供从 2 核 0.5G+1 亿 Tokens 到 16 核 64G+32 亿 Tokens 共 9 款阶梯规格，并无缝对接阿里云完整生态。其中三档套餐享专属优惠，覆盖个人开发者到中小企业。Agent 应用开发包：2 核 2G，2 亿 Token / 月，包月活动价 262.5 元 / 月（5 折），包季活动价 236.25 元 / 月（4.5 折）Agent 应用生产包：2 核 4G，4 亿 Token / 月，包月活动价 515 元 / 月（5 折），包季活动价 463.5 元 / 月（4.5 折）Agent 应用规模包：4 核 8G，8 亿 Token / 月，包月活动价 1160 元 / 月（5 折），包季活动价 1044 元 / 月（4.5 折）", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/212.htm", "publishedAt": "2026-07-20T11:37:21+00:00"}, {"title": "AI 大模型周榜：国产 Kimi K3 首次杀入综合榜 Top 10，登顶前端开发榜", "summary": "IT之家 7 月 20 日消息，Arena（arena. 能出现小幅变动，值得关注后续国产模型能否在更多细分榜单拿下榜首位置。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/196.htm", "publishedAt": "2026-07-20T10:38:43+00:00"}, {"title": "不同模型厂同一家Agentic Infra，AGI时代的地基终于浮出水面", "summary": "大模型时代的共同选择", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/455805.html", "publishedAt": "2026-07-20T10:33:23+00:00"}, {"title": "奇瑞风云 A9“长续航智美纯电轿跑”将于 7 月 25 日上市，预售价 11.59 万元起", "summary": "IT之家 7 月 20 日消息，奇瑞宣布旗下“长续航智美纯电轿跑”风云 A9 车型将于 7 月 25 日上市，该车预售价为 11.59-13.59 万元，CLTC 纯电续航达 655km。奇瑞风云 A9 轿车提供海棠红、山烟紫、云粉米、雪岭白、玄武灰、鸣沙翠、墨石黑七种车色和夜幕紫黑、云雾紫灰两种内饰颜色，采用 8 层流光复合车漆，拥有 B 级尺寸，并支持 1.6m 大床模式。该车搭载 AI 灵犀智舱 2.0，辅以 3nm 座舱芯片（53.7TOPS NPU 算力 + 280K CPU 算力 + 4TFLOPS GPU 算力），支持 AI 伯牙之音 23 扬（7.1.4.2 三维全景声 + 1080W 峰值功率）、实时在线语音大模型、深海静谧座舱（20-20000Hz 全频段降噪）等功能。风云 A9 还支持猎鹰辅助驾驶，采用 1 颗激光雷达 + 3 颗毫米波雷达 + 11 颗高性能摄像头 + 12 颗新型超声波雷达 + 1 颗高性能智驾芯片的配置组合，支持城市 NOA、高速 NOA、泊车场景等辅助驾驶功能。规格方面，该车尺寸为 4836×1896×1489mm、轴距 2900mm，车辆采用单电机，最大功率 178kW，最大扭矩 275N·m，CLTC 纯电续航里程 655km，30%-80% 充电时间 20 分钟。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/204.htm", "publishedAt": "2026-07-20T10:29:14+00:00"}, {"title": "天文学家警告：人造的“土星环”式卫星群可能很快就会布满天空", "summary": "IT之家 7 月 20 日消息，如果未来人类真的按照计划发射数百万颗数据中心卫星以及数万面太空反射镜，那么夜空中可能会出现一道明亮的“土星环”。这一光环会在日落后和日出前的数小时内划过天际，其亮度将超过所有恒星和行星，甚至可能比满月还耀眼，而且从地球任何位置都能看到。英国伯明翰大学航天学教授 Hugh Lewis 告诉 Space.com，为了容纳目前提出的大规模轨道数据中心星座，唯一可行的方法可能是在地球昼夜交界线附近的轨道区域，将大量卫星层层堆叠排列，最终形成一个环绕地球的人造“土星环”。这条卫星环将在夜空中呈现为一条明亮的光带，亮度远超普通恒星和行星，甚至可能超过满月。Lewis 表示：“如果你在晚上抬头看天空，它们会全部处于同一个轨道平面上，彼此距离非常近，并且朝着同一个方向移动。它们对夜空造成的影响将是灾难性的。”几年前，这样的设想还像是科幻小说中的情节。但自去年轨道数据中心热潮兴起以来，这个曾经看似不切实际的想法正在逐渐成为现实。据IT之家了解，包括 SpaceX、Starcloud、Cowboy Space、Orbital 以及 Blue Origin 在内的多家公司，已经向美国联邦通信委员会（FCC）申请许可证，计划合计发射超过 100 万颗数据中心卫星。除了这些项目之外，总部位于加州的 Reflect Orbital 还计划向太空发射 5 万面轨道反射镜，将阳光反射到地面的太阳能电站。今年 7 月 10 日，Reflect Orbital 获得 FCC 批准，可以发射首颗测试卫星 —— 一颗名为 Eärendil-1 的验证卫星。该卫星尺寸为 60×60 英尺（约 18×18 米），预计将在今年年底前发射。数据中心卫星和太空镜可能形成巨大光带Lewis 解释称，为了获得持续不断的阳光，这些轨道数据中心和反射镜必须运行在同一个轨道平面上。这个轨道平面会沿着地球晨昏线运行，也就是白天和黑夜的分界线，并让卫星经过地球南北两极。Lewis 表示：“轨道数据中心和 Reflect Orbital 都依赖运营商所谓的‘太空中 24 小时阳光’。想实现这一点，就必须处于特定轨道，也就是沿着黎明和黄昏线运行的轨道。这与 Starlink 巨型星座不同，后者分布在整个地球周围。”加拿大萨斯喀彻温省里贾纳大学天文学家 Samantha Lawler 也认同 Lewis 的观点。Lawler 和同事通过计算机模拟，分析了多个拟议中的数据中心卫星星座可能造成的影响，其中包括 SpaceX 的 Starmind、Blue Origin 的 Project Sunrise，以及 Cowboy Space 提出的 Stampede 星座。模拟结果显示，从地球表面看到的这些卫星，不仅亮度会超过可见恒星，数量也会超过恒星。Lawler 解释称，由于地球不断在晨昏轨道下方旋转，这条“土星环”卫星带每天会两次划过天空：一次是在傍晚 6 点至 8 点之间，另一次是在黎明前。她表示：“这条环会每天晚上在同一时间经过头顶。这意味着它在冬季造成的影响会比夏季更加严重。”Lawler 提醒，目前这些模拟主要基于公开数据，可能无法完全反映未来卫星的实际技术参数，而且相关研究尚未经过同行评审。不过，她补充说，即使这条卫星环已经落到地平线以下，它散射出的光线仍会继续让天空变亮，时间最长可达两个小时，就像太阳落山后仍会继续照亮天空一样。Lawler 表示：“这会让我们使用公共资金建设的望远镜效率大幅下降。相同成本下，我们能够开展的科学研究会减少很多，包括寻找危险近地小行星在内的许多重要研究项目都将受到严重影响。”全球任何地方都无法躲避这条“人造土星环”模拟显示，部分卫星星座 —— 尤其是 Blue Origin 的 Project Sunrise，还可能采用额外轨道倾角，使其在主“土星环”之外形成类似 X 形的卫星轨迹。Lawler 表示：“如果你靠近赤道，清晨和日落之后，你几乎会看到一个由移动卫星组成的 X 形结构从天空中升起。在更北的地区，人们可能看到两条独立的光带。其中一条会在早晨出现，另一条则会随着太阳落山出现。”这条“土星环”的实际亮度将取决于其中卫星的具体数量。但研究人员警告称，Reflect Orbital 的每一面太空镜预计至少会达到金星级别的亮度，而金星是夜空中除满月之外最亮的天体。欧洲南方天文台此前的一项研究指出，如果 Reflect Orbital 部署 5 万面太空镜，夜空亮度可能增加最多 300%，导致全球最昂贵的天文望远镜几乎失去作用。天文学家、暗夜保护倡导者 John Barentine 称：“人类已经从根本上改变了宇宙环境，如今地球已经成为一个被卫星和太空垃圾包围的人造‘环状行星’。但像 Reflect Orbital 这样的项目，会把这些原本大多不可见的轨道环变成明亮的反光轨迹。我们面对的不再只是零散的移动亮点，而是一条永久存在的人造‘土星环’，它会直接穿过全球天文学研究最关键的暮光观测窗口。”企业认为太空数据中心具有巨大优势从商业角度来看，这些项目在纸面上似乎确实具有吸引力。地面数据中心需要占用大量土地，需要消耗巨量水资源进行冷却，会增加电网压力，并产生温室气体排放。而在太空中，散热和电力获取理论上都不再是问题。Reflect Orbital 则希望通过向夜间地面提供阳光，提高太阳能电站和农业设施的产量，同时为建筑工地提供免费的可持续照明，并帮助灾害区域进行搜救。该公司表示，他们正在努力降低对天文学研究的影响，并计划与科学界合作。Reflect Orbital 发言人在邮件中表示：“我们发展的每一个阶段都由数据驱动 —— 测试、测量、倾听并不断调整。我们正在积极委托独立第三方机构研究这项技术可能带来的影响。”然而，接受采访的天文学家几乎一致认为，Reflect Orbital 的卫星星座与天文学研究无法共存。Lawler 表示：“如果我们在轨道上部署反射镜，天文学就结束了。”FCC 认为天文学影响不属于监管范围美国天文学会（AAS）已经发表声明，批评 FCC 批准 Reflect Orbital 测试卫星发射许可的决定。AAS 表示：“Reflect Orbital 提出的卫星计划，将阳光反射回夜晚的地球，可能会对我们的成员以及所有依赖黑暗夜空的人造成重大伤害。”该组织指出，潜在影响包括损坏敏感天文望远镜设备、对飞行员和驾驶员造成瞬间强光干扰，以及正如 Reflect Orbital 自己提交给 FCC 的文件中提到的那样，可能导致通过中型望远镜观察的人出现永久性眼部损伤。过去，天文学家曾赞扬 SpaceX 通过深色涂层和遮光装置降低 Starlink 卫星反光能力的努力。但 Lawler 表示，这些措施已经被 SpaceX 不断扩大卫星规模的做法抵消。第一代 Starlink 卫星重量约为 570 磅（260 千克），而最新一代卫星重量已经超过 4400 磅（2000 千克）。Lawler 说：“他们确实投入了大量工作让卫星变暗，但与此同时，他们也让卫星变得更大，并放入更低轨道，这导致它们变得更加明亮。现在，即使肉眼也能看到 Starlink 卫星。它们非常明显，而且遍布整个天空。”在 FCC 关于批准 Reflect Orbital 任务许可证的文件中，该机构表示：“对光学天文学造成的影响不属于 FCC 的审查和授权范围。”FCC 写道：“委员会现有规则并未涉及保护光学天文学，因此我们拒绝在委员会职权范围内解释相关担忧。”然而，天文学家指出，在美国以及全球范围内，没有其他监管机构能够负责美国企业卫星发射许可，并评估其对夜空和更广泛环境造成的影响。Lawler 表示：“FCC 是唯一监管美国卫星发射的机构。但如果 FCC 说这不是他们的问题，那么这到底是谁的问题？”AAS 在声明中呼吁 FCC “考虑卫星应用场景带来的全部影响”。该组织表示：“在没有其他许可机构能够纳入这些因素的情况下，我们认为 FCC 必须考虑卫星用途可能造成的所有影响。”英国皇家天文学会执行主任 Robert Massey 也表示：“这是一个非常糟糕的先例，它可能为未来几年内部署多达 5 万颗卫星的完整星座打开大门。FCC 批准这一项目令人非常失望。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/202.htm", "publishedAt": "2026-07-20T10:24:40+00:00"}, {"title": "联想问天全球首款 RISC-V 服务器亮相 WAIC 2026，搭载蓝芯 LX500 处理器", "summary": "IT之家 7 月 20 日消息，在上海举办的 2026 世界人工智能大会（WAIC）上，联想展示了全球首款搭载蓝芯 LX500 处理器的 2U 机架式服务器 —— 联想问天 WR5219 G5，这是联想首次公开展示基于开源架构的服务器产品。IT之家获悉，联想问天 WR5219 G5 搭载服务器级 RISC-V 处理器 —— 蓝芯 LX500，该 CPU 采用 48 核异构架构，搭配高速 PCIe 5.0 通道、新一代 DDR5 高速内存。据介绍，该服务器提供了多种存储、I/O 和内存选项。用户可以按需选择驱动器类型；硬件性能全面适配 AI 推理、虚拟化部署、科学计算、大数据分析、软件定义算力等现代化 IT 核心负载。联想表示，在生态层面，联想深度适配本土算力生态，打造安全兼容的算力底座。构建全面兼容的 xPU 生态，既适配国际主流芯片架构，也对国产 CPU、GPU 进行深度适配优化。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/200.htm", "publishedAt": "2026-07-20T10:22:36+00:00"}, {"title": "QCY 推出 N20 Pro 金标版 TWS 耳机：13mm 动圈、50dB 降噪，129 元", "summary": "IT之家 7 月 20 日消息，QCY 现已在京东上架 N20 Pro 金标版入耳式降噪耳机，该耳机采用 13mm 动圈、支持 50dB 降噪，定价为 129 元。该耳机提供皓月白、午夜黑两种配色，耳机本体 4.6g，配备 13mm 动圈，支持 360 度全景空间音效、50dB 降噪及 6 麦克风 ENC 通话降噪，支持 0.06s 低延迟模式及三设备同连模式，耳机在搭配充电盒的情况下至高拥有 40 小时续航。IT之家附产品参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/199.htm", "publishedAt": "2026-07-20T10:20:13+00:00"}, {"title": "AOC 推出“Q27G4SM”27 英寸显示器：2K 340Hz QD-Mini LED，1799 元", "summary": "IT之家 7 月 20 日消息，AOC 现已在京东上架一款型号为“Q27G4SM”的 27 英寸显示器，该机主打 2K 340Hz QD-Mini LED，定价为 1799 元。该机配备一块 2560x1440 分辨率 340Hz 刷新率 QD-Mini LED 背光 1152 分区 Fast VA 面板，显示器 HDR 峰值亮度 1200 尼特，对比度 1000:1，GtG 响应速度 1ms，显示器支持 10-Bit 色彩，覆盖 100% sRGB 和 99% DCI-P3 色域。该机支架支持倾斜 / 旋转 / 升降，显示器本体支持 VESA 100x100mm 壁挂，提供 2 个 HDMI 2.1、1 个 DP 1.4、1 个 3.5mm 音频接口。IT之家附显示器参数：京东 AOC“Q27G4SM”显示器 1799 元直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/197.htm", "publishedAt": "2026-07-20T10:15:11+00:00"}, {"title": "2026 世界人工智能大会闭幕：351 款产品全球首发，预计达成超 200 亿元意向采购金额", "summary": "IT之家 7 月 20 日消息，据央视财经报道，今天，2026 世界人工智能大会（WAIC 2026）暨人工智能全球治理高级别会议在上海闭幕。本届大会展览面积 10 万平方米，展品总数 4486 项，351 款产品全球首发。接待全球重要采购团组 177 个，预计达成意向采购金额约 203.6 亿元，同比增长约 25%。区别于往年，今年新增学术板块，首次举办高水平人工智能国际学术会议，还专门开辟青年创新赛事专区，学术、产业、创业、投融资一站式打通，不管是业内专家还是青年开发者，都能在这里找到交流对接渠道。今年，大会首次创办高水平人工智能国际学术会议“WAIC Academic”，由图灵奖得主、中外院士领衔，覆盖全球多个国家和地区，致力于打造人工智能领域的顶级学术交流平台。大会开幕前夕，WAIC 2026“十大镇馆之宝”正式揭晓，涵盖智能体手机、智能机器人、国产算力集群、AI 眼镜及行业智能体等多个领域，IT之家附名单如下：曙光 8000-全国产十万卡 AI 超集群基于蚂蚁灵波跨本体具身大模型的机器人智慧药房远征 A3 Ultra百度搭子讯飞 AI 眼镜“大瓦特 · 云睿”配电网规划智能体大模型原生智能体手机 STEPX Neo真武 M890 × 磐久 AL128 超节点MatwingsVenus （晓鹜）：对话式蛋白质设计智能体中兴 OEX 超节点", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/174.htm", "publishedAt": "2026-07-20T09:46:47+00:00"}, {"title": "Qwen-Audio-3.0-TTS 发布", "summary": "通义实验室宣布正式发布 Qwen-Audio-3.0-TTS 实时语音合成模型。本次更新主要集中在：更广的语言覆盖、更自然的指令控制、更精细的标签控制，以及在参考音频不清晰时的鲁棒性。 本次发布包含两个版本： Flash：面向实时交互，首包延迟在 300ms 左右。 Plus：面向高质量生成，在自然度和音色还原度上表现更佳。 Qwen-Aud...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/475224", "publishedAt": "2026-07-20T09:31:20+00:00"}, {"title": "VGN 推出蜻蜓 F1 V5 系列鼠标：双 8K 回报率，199 元起", "summary": "IT之家 7 月 20 日消息，VGN 官方今日宣布推出蜻蜓 F1 V5 系列鼠标，将于 7 月 28 日 20:00 发售，售价 199 元起：蜻蜓 F1 V5 Ultra：199 元蜻蜓 F1 V5 Turbo：269 元蜻蜓 F1 V5 Turbo+：299 元其中，Ultra 版重约 53±2g、电池 800mAh，Turbo 和 Turbo+ 重约 56±2g、电池 500mAh 支持快充。三款型号尺寸均为 121.5×63.7×37.8mm；支持 2.4G、蓝牙、有线三模连接，支持双 8K 回报率（2.4G 和有线）。Ultra 和 Turbo 版采用 PAW 3950Extreme 传感器，Turbo+ 版本则采用 PAW 3955Extreme 传感器。IT之家附这款鼠标参数如下：京东 VGN 蜻蜓 F1 V5 Ultra 白色 199 元直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/164.htm", "publishedAt": "2026-07-20T09:28:25+00:00"}, {"title": " 何单一的基础设施方案都已无法完全支撑。为满足这一需求，微软正不断升级 Azure 的基础设施，包括采用 AMD 最先进的 AI 与高性能计算解决方案来扩充其 AI 计算集群。微软宣布，将 AMD 最新的 Helios AI 平台与下一代 EPYC 数据中心处理器引入 Azure。IT之家获悉，这些底层技术将驱动三款即将推出的 Azure 服务：用于数据处理的 HDv2 虚拟机；用于电子设计自动化 (EDA) 的 HXv2 虚拟机；用于 AI 推理工作负载的 ND MI455X v7 虚拟机。延伸阅读AMD 首个机架级 AI 平台 Helios 于 2026 年 6 月在台北国际电脑展上首次公开展示。其核心配置包括第 6 代 EPYC Venice 处理器与 Instinct MI455X 加速器，计划于 2026 年内供货。AMD Helios 平台可搭载最多 256 核的 EPYC Venice 处理器，并集成 72 颗 Instinct MI455X 加速器，总计配备 31TB HBM4 显存，理论 FP4 稠密精度算力可达 2900 PFLOPS。微软此前已推出自研云端 AI 芯片 Azure Maia 100，并计划在数据中心部署，同时宣布将扩大与 AMD 等芯片巨头的合作，在 Azure 中加入 AMD MI300X 加速虚拟机以处理 AI 工作负载。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/235.htm", "publishedAt": "2026-07-20T13:28:15+00:00"}, {"title": "威刚陈立白：现阶段讨论 AI 泡沫言之过早，未来十年最短缺的资源是内存和电力", "summary": "IT之家 7 月 20 日消息，据台媒工商时报消息，威刚董事长陈立白表示，现阶段讨论 AI 泡沫言之过早，“2030 年以后，再来讨论 AI 泡沫究竟会在 2040 年还是 2050 年发生”，目前全球 AI 算力、内存及电力需求，仍远高于市场想象。市场担忧云端服务商算力投资速度快于实际需求，甚至 Meta 开始对外出租部分运算资源。对此陈立白认为，不能因此推论 AI 需求不如预期。未来 AI 应用将全面扩展至企业对企业（B2B）、政府市场（B2G）、消费市场（B2C）及 B2B2C 等不同商业模式，算力需求规模将持续放大。IT之家注意到，对于三星电子、SK 海力士及美光扩产，陈立白称三大原厂经历过去多次经济周期后，只会采取理性、审慎的扩产策略，不太可能重演无序大幅扩产。他认为，未来十年全球最短缺的两项资源，将是内存和电力（尤其是绿电）。相关阅读：《威刚预警：2026 年 Q3 内存将涨价 20%-30%，闪存将涨价 35%-40%》《威刚 2026Q1 税后净利润同比增长 17 倍，单季超越去年总和》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/223.htm", "publishedAt": "2026-07-20T12:31:55+00:00"}, {"title": "苹果国行 AI 刷屏之外，三星也把端侧大脑交给国产 AI", "summary": "把智能装进手机的秘诀，在于「多、快、好、省」#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672593?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-20T11:40:22+00:00"}, {"title": "Grab构建安全的智能体AI工作负载平台", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/yQb5j83sxQhXB1EDJrS1?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T11:09:00+00:00"}, {"title": "Agent 会执行，但谁来帮它记住过去？", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/artic 会", "summary": "IT之家 7 月 20 日消息，市场监管总局办公厅今日印发《推动平台企业赋能个体工商户发展行动方案》的通知。主要目标是：2027 年年底前，滚动形成“五个一批”工作成果，即推出一批精准“滴灌”、直达快享的帮扶举措，培育一批特色鲜明、转型发展的优质商户，定制一批“解渴”管用、生动务实的培训课程，搭建一批数字赋能、有形有感的应用场景，选树一批创新融合、可学可鉴的典型案例，探索构建平台企业赋能个体工商户发展的长效实践路径，进一步降低个体工商户数字化转型成本，优化发展环境，提升可持续增收能力。《方案》提到，鼓励平台企业简化经营者入驻流程，优化智能辅助功能，缩短填报和审核时间。支持平台企业采取有效激励措施，鼓励、督促平台内自然人网店依法办理个体工商户等经营主体登记。拓展电子营业执照应用场景，提升平台企业验证入驻经营主体营业执照的审核效率。支持平台企业结合自身经营特点和优势，为新入驻个体工商户提供更多曝光机会。鼓励平台企业将扶持举措、获取方法等基础性内容纳入新入驻经营主体培训。引导平台企业为新入驻个体工商户提供让利服务，合理降低佣金、抽成、会员费、技术服务费、信息服务费、营销推广费等费用，减轻个体工商户运营初期成本压力。落实《网络交易平台收费行为合规指南》，规范和引导平台企业收费行为。聚焦个体工商户平台经营特点，加强广告宣传、食品安全、知识产权保护、税费申报缴纳等方面政策培训，引导个体工商户守法合规经营。办好“个体网大讲堂”系列活动，不断丰富培训内容，积极扩大活动参与度和影响力。支持平台企业参与标准化工作，加快直播电商等新产业新业态标准的研究制定，引导规范平台企业和平台内经营者的生产经营活动。鼓励平台企业加大对平台内个体工商户培训力度，强化经营指导，帮助个体工商户了解掌握市场行情动态、电商运营策略、数字化工具使用等方面技巧知识，为个体工商户成长提供专业化、体系化指引。发挥质量基础设施“一站式”服务效能，在计量、标准、认证认可、检验检测等方面加大支持力度，助力个体工商户持续提升产品和服务质量，赢得市场竞争主动。鼓励平台企业运用大数据、人工智能等技术帮助个体工商户精准定位客群，在选址选品、产品素材制作、运营数据分析、智能客服等方面推出更多轻量化、低成本数字化运营工具，帮助个体工商户突破经验盲区，规避经营风险，提升经营效率。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/170.htm", "publishedAt": "2026-07-20T09:38:34+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "GMI Cloud联合InfoQ、10+企业重磅发布《中国AI产业核心要素出海发展白皮书》，汇聚 AI 产业共识，盘点出海方法论", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/cm9JyEjFfV4toUJabQ80?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T14:30:40+00:00"}, {"title": "企业 AI：方法论易得，交付力难求", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/PVEe5yav0IC8MygcVeOM?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-20T11:32:56+00:00"}, {"title": "斥资 5.87 亿美元，Netflix 收购本 · 阿弗莱克创办的 AI 初创公司 InterPositive", "summary": "IT之家 7 月 20 日消息，Netflix 在最新提交的监管文件中披露，公司支付 5.87 亿美元（IT之家注：现汇率约合 39.8 亿元人民币）现金，收购了由演员兼导演本 · 阿弗莱克（Ben Affleck）共同创办的人工智能初创公司 InterPositive。今年 3 月，Netflix 曾宣布这项收购。当时，Affleck 在声明中表示，他希望“保护人类创造力的力量”。据 Affleck 介绍，InterPositive 开发的 AI 工具主要用于帮助电影制作人员改善后期制作流程，尤其是在解决一些“现实拍摄过程中遇到的问题”方面发挥作用，例如补拍缺失镜头、替换背景以及修正错误的灯光效果等。在收购宣布时，Netflix 表示，InterPositive 的整个团队都将加入 Netflix，Affleck 则会以高级顾问身份参与工作。不过，当时 Netflix 并未公布这笔交易的具体金额。在最近一次财报中，Netflix 还表示，目前已经有约 300 部影视作品使用了生成式人工智能技术。随着 AI 工具逐渐进入影视制作流程，Netflix 正在探索如何利用人工智能提升制作效率，同时降低部分后期制作环节的成本。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/175.htm", "publishedAt": "2026-07-20T09:49:05+00:00"}, {"title": "Mac 用户称 OpenAI Codex 导致电脑卡顿，关闭应用后也无法恢复", "summary": "IT之家 7 月 20 日消息，就在 OpenAI 宣布解决了一个会疯狂消耗开发者 SSD 寿命的日志写入漏洞几周后，Mac 用户再次反馈，Codex 桌面应用依然在“折磨”他们的硬件。而这一次，问题不仅仅表现为大量磁盘写入。IT之家注意到，近日 Reddit 的 r/codex 社区出现一篇帖子，并在周末获得超过 400 个赞。发帖用户表示，在 Mac 上运行 Codex 应用后，整个系统会出现明显卡顿，即使关闭应用，卡顿现象仍然持续，唯有彻底重启电脑才能有效解决。值得注意的是，该用户强调，这种性能下降并不是由常见的 CPU 或内存占用过高导致的。而当他让 Codex 自己分析问题时，AI 智能体反而将原因归结为自身存在“过度 I/O 操作”和图形处理负载过高。Reddit 上另一篇帖子也证实了多个用户出现的相同情况，不过严重程度似乎因设备而异。这场争议最早可以追溯到今年 6 月。当时 GitHub issue #28224 揭露，Codex 的本地诊断日志记录器存在严重问题，它会以最高级别的 TRACE 日志模式运行，并将大量数据写入位于 ~/.codex/ logs_2.sqlite 的 SQLite 数据库，同时完全忽略 RUST_LOG 环境变量设置。Apache Flink PMC 成员 Rui Fan 曾对这一问题进行测算。他表示：“运行大约 21 天后，主 SSD 已经写入约 37 TB 数据。”按照这一速度推算，一年写入量将达到约 640 TB，足以在不到 12 个月内消耗掉普通消费级 SSD 的全部写入寿命保修额度。针对这一问题，OpenAI 在 6 月 22 日发布的 0.142.0 版本中加入了两项修复。根据问题报告者自己的测试，新版本将日志写入量降低了约 85%，同时 OpenAI 还计划在 0.143.0 版本中加入第三项修复。随后，该漏洞被官方关闭。然而，问题似乎并没有真正结束。仅两天后提交的后续报告（issue #29876）显示，一台搭载 M4 芯片的 MacBook Air 在 Codex 基本处于空闲状态时，仍然保持约每分钟 207 MB 的写入速度，同时 code_sign_clone 缓存文件夹膨胀到了 12 GB。对于采用焊接式存储芯片的现代 MacBook 来说，这类 SSD 磨损是不可逆的，因为用户无法直接更换存储设备。持续性的系统卡顿可能来自另一个独立问题。GitHub 上仍未关闭的 issue #25719 显示，自 6 月 1 日以来，Codex 桌面应用可能会反复触发 macOS 自带的 Gatekeeper 守护进程异常运行。具体表现为，系统进程 syspolicyd 在启动 Codex 后 CPU 占用飙升至 125%～200%，内存使用量甚至超过 8 GB。由于 syspolicyd 是 macOS 中负责验证应用安全性的系统进程，它会检查用户打开的各种程序。如果该进程进入异常状态，即使 Codex 和相关辅助进程已经退出，整个系统依然可能持续受到影响。这一现象与 Reddit 用户描述的情况高度吻合：Codex 关闭后电脑仍然卡顿，只有重启才能恢复。报告者还确认，Codex 内置的“Computer Use”辅助程序本身已经完成正确签名和公证，这意味着问题可能出在应用反复启动或重新验证自身组件的方式上。据称，即使用户在配置文件中关闭相关功能，这种行为仍可能发生。目前尚未出现明确的 SSD 彻底损坏案例，但持续性的写入磨损确实存在，并且会不断累积。Mac 和 Linux 用户可以通过 smartctl-a/dev/ nvme0n1 命令（可通过 Homebrew 安装 smartmontools）查看 SSD 的累计写入量；Windows 用户则可以使用 CrystalDiskInfo 查看“Total Host Writes（总主机写入量）”数据。用户应升级到最新 Codex 版本，以获得 0.142.x 系列中的日志写入修复。如果发现写入量仍然异常，社区目前仍推荐一种临时解决方案：将 ~/.codex/logs_2.sqlite 符号链接到基于内存的存储路径，让大量日志写入不会直接触碰 SSD 闪存。在 OpenAI 解决 Codex 与 macOS syspolicyd 之间的兼容问题之前，如果用户遇到关闭 Codex 后系统仍然卡顿的情况，最有效的方法可能是直接退出应用并重启电脑，而不是继续等待异常的 Gatekeeper 进程自行恢复。截至目前，OpenAI 尚未针对这些最新反馈公开发表评论。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/979/146.htm", "publishedAt": "2026-07-20T09:08:45+00:00"}, {"title": "当人人都有 AI，品味为什么更加重要？", "summary": "6 月，我们在上海的源创会，大家分享了很多 AI 相关的创新。 那场之后我们一直在想，代码正在变得越来越充裕，而品味依旧稀缺；工具正在变得越来越强大，而人与人之间真正的差异，似乎开始回到那些无法被复制的东西——品味、判断，以及你相信什么值得被创造。 所以，7 月 25 日，源创会到北京。 围绕主题 「Taste Drive...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/474841", "publishedAt": "2026-07-20T02:18:27+00:00"}, {"title": "AI 编码实战 | 0 行手写代码，2 天重构 2 万行 Vue 项目", "summary": "文章的核心观点是：AI 辅助开发的关键不在 AI 本身的能力，而在于人为 AI 建立的约束体系 —— 通过 Skills 技能包注入领域知识、AGENTS.md 沉淀项目规范、飞轮效应让错误只犯一次，将模糊目标转化为 AI 可精确执行的高质量指令，从提出需求到代码合入，甚至本篇分享也是 AI 生成。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/vivotech/blog/19722516", "publishedAt": "2026-07-16T08:52:00+00:00"}]}]};

const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
