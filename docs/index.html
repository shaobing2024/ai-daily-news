ceUrl": "https://www.qbitai.com/2026/07/453705.html", "publishedAt": "2026-07-18T07:20:19+00:00"}, {"title": "荣耀 CEO 李健：AI 的演进必将脱离冰冷的工具属性，全面迈向伙伴型类人生命体", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会今天在上海举行。据新浪科技消息，荣耀 CEO 李健在物理世界新范式论坛中发表演讲，称 AI 未来将脱离“工具”属性。李健表示，AI 的演进必将脱离冰冷的工具属性，从操作系统到具身交互，全面迈向伙伴型的类人生命体，重构人与物理世界的关系。这就是人工智能时代的价值锚点。他对此指出：“因此，我们将 MagicOS 升维成行业首个伙伴型、多模态智能体操作系统。让智能不再被禁锢在冰冷的屏幕与代码之中，而是成为触手可及的真实陪伴。”IT之家注意到，荣耀首台机器人 Robot Phone 今天已在全渠道展开预约，该机搭载第五代骁龙 8 至尊版芯片，正面配备一块 1.5K 分辨率的四等边直屏。顶部集成行业最小的四自由度（4DoF）钛合金机械云台，配备 2 亿像素 4D 云台主摄 / 长焦以及 5000 万像素超广角，拥有 ARRI 影像加持。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/476.htm", "publishedAt": "2026-07-18T07:02:32+00:00"}, {"title": "腾讯 WorkBuddy 正式版 App 发布，安卓 / iOS / 鸿蒙三端同步上线", "summary": "IT之家 7 月 18 日消息，腾讯今天宣布，WorkBuddy 正式版 App 现已发布，安卓、iOS、鸿蒙三端同步上线，是首个登陆鸿蒙系统的通用智能体应用。IT之家从 WorkBuddy 公众号了解到，这款 App 不仅具备桌面端的大部分能力，还支持在手机上远程向电脑端发起任务。鸿蒙版体验与 iOS、Android 端完全一致，提供两种执行模式：连接电脑：直连本地设备，调用桌面端完整能力。云端工作：具备桌面端主要能力，开箱即用，支持 Skills、专家与专家团、自动化定时任务、产物下载与分享、项目管理等，并通过资料库打通腾讯文档、ima 知识库。此外，这款应用还支持文字输入、语音口述、拍照上传、本地文件导入，以及腾讯文档、ima 一键导入等多种多模态方式。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/468.htm", "publishedAt": "2026-07-18T06:47:43+00:00"}, {"title": "京东首个 AI Home 亮相：台灯能帮孩子解题，厨房能帮你记住口味", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会（WAIC）期间，京东首次系统展示面向物理世界的 JoyAI 模型矩阵，开源行业最大人类视角数据集，并打造首个 JoyInside“AI Home”。根据介绍，京东 AI Home 覆盖客厅、厨房、学习区和卧室。孩子遇到难题，AI 投影台灯可以通过无屏漫反射投影进行扫题批改和实时答疑；在客厅随口说一句“口渴”，智能茶吧机会主动确认水温并出水；厨房设备可以记住一家人的口味和饮食禁忌，分步骤引导烹饪；入睡后，智能床垫持续捕捉呼吸、体动等睡眠体征，形成周、月度睡眠报告。IT之家获悉，电视、灯具、毛绒玩具和陪伴机器人等设备也不再各自为战，而是围绕家庭成员的真实需求协同服务。根据介绍，JoyInside 不是简单给硬件加上语音问答，而是为不同设备植入“AI 大脑”，让硬件成为懂情绪、懂意图、能主动服务的生活伙伴。京东展示的“AI 进入物理世界”的完整路径，包括数据提供真实世界经验，模型负责理解和决策，终端与场景承接行动和服务；京东云 AI 基础设施则为模型训练、部署和规模化应用提供工程支撑。目前，JoyInside 已与近 200 家家电家居、机器人、健康、玩具等领域品牌合作，今年将接入超 1000 万台硬件设备，让 JoyAI 从云端进入终端，从一项模型能力变成真实可感的家庭服务。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/466.htm", "publishedAt": "2026-07-18T06:44:43+00:00"}, {"title": "阿里平头哥真武 AI 芯片累计出货超 56 万片，开源 T-Head SAIL 软件栈", "summary": "IT之家 7 月 18 日消息，阿里平头哥半导体官方宣布，平头哥自研 AI 软件栈 T-Head SAIL 正式开源。T-Head SAIL 是平头哥为真武系列 AI 芯片打造的软件栈，拥有自主知识产权、全面兼容主流 AI 生态。官方表示，截至今年 4 月，真武 AI 芯片已累计出货 56 万片，服务 20 多个行业 400 多家客户。真武 AI 芯片及 T-Head SAIL 软件栈已在阿里云及多家头部客户的真实生产环境中历经深度打磨，扛过大规模流量、复杂场景以及严苛 SLA 的多重考验。据介绍，从底层驱动到上层工具，T-Head SAIL 软件栈由五层完整的技术栈组成（Driver 与 Runtime 层、编程语言层、编译器层、高性能库层、开发者工具层）。T-Head SAIL 兼容主流 AI 生态，主流模型即开即用，算子库完整对标，主流编程模型高度兼容。T-Head SAIL 已全面适配 PyTorch、TensorFlow、vLLM、SGLang 等 260 余个主流训练与推理框架，开发者获取源码后即可直接编译运行，无需额外适配。目前主流 AI 推理框架，T-Head SAIL 平均适配时间 &lt; 7 天，开发者无需额外适配和调优，即可使用前沿最新的算子、特性与优化手段。平头哥开发者社区网站现已同步上线，包含 T-Head SAIL 全栈技术文档，提供 SDK 软件包、内核驱动、性能分析和调试工具下载。IT之家附链接：https://developer.t-head.cn/home", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/465.htm", "publishedAt": "2026-07-18T06:44:41+00:00"}, {"title": "B站“猫娘计划”亮相 WAIC 2026：支持自主导入模型，可理解桌面内容主动发起对话", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会暨人工智能全球治理高级别会议今天在上海举行。现场，哔哩哔哩展示了开源 AI 数字生命生态计划“猫娘计划”。据介绍，猫娘计划 Project N.E.K.O.的核心产品为一款主动式、原生全模态 AI 伙伴驱动器 N.E.K.O.，具备全天候、不间断的环境感知、智能体能力与具身情感引擎。目前该项目在 GitHub 的 Star 数已突破 2K，Steam 用户过万。同时，Project N.E.K.O.的前端渲染层全面支持 Live2D 与 VRM 双引擎，用户可以自由导入自己喜爱的二次元角色、原创角色和各种虚拟主播模型，系统内置细腻的物理反馈引擎，角色的发丝会随着动作自然飘动，目光会始终跟随着用户的鼠标轨迹。该产品还拥有视觉多模态大模型技术，可理解电脑屏幕的内容。并在架构上采用了前端 UI、AgentAI 大脑、Memory 记忆系统相互独立的分离式设计。用户可以将所有核心数据完全保留在本地，把数字生命的所有权和控制权掌握在自己手中。 IT之家注意到，猫娘计划 - N.E.K.O.已经在 Steam 平台上架，目前处于抢鲜体验状态（商店页链接：https://store.steampowered.com/app/4099310/__NEKO/）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/464.htm", "publishedAt": "2026-07-18T06:34:59+00:00"}, {"title": "荣耀李健 WAIC 宣布 Robot Phone 开启预约：搭载 Agentic OS，8 月份发布", "summary": "IT之家 7 月 18 日消息，7 月 18 日，在 2026 世界人工智能大会（WAIC 2026）期间，荣耀举办了主题为“从数字屏幕到具身智能 —— 物理世界新范式”的分论坛。在本次论坛上，荣耀终端股份有限公司 CEO 李健正式官宣，全球首台机器人手机 Robot Phone 面向全渠道开启预约。作为具身智能时代的“新物种”，荣耀 Robot Phone 搭载了第五代骁龙 8 至尊版芯片，正面配备一块 1.5K 分辨率的四等边直屏，并支持最高 120W 有线快充，其机身顶部集成了一套行业最小的四自由度（4DoF）钛合金机械云台，体积较主流方案缩小 70%，支持 360° 物体追踪与智能运镜。影像方面，该机后置由 2 亿像素 4D 云台主摄 / 长焦以及 5000 万像素超广角组成的旗舰三摄系统，并与电影工业巨头 ARRI（阿莱）深度合作，引入了专业级 Log-C 编码与 LUT 调色，可实现高度自主的电影级运镜拍摄。在系统层面，荣耀在论坛上正式将 MagicOS 升维成行业首个伙伴型多模态智能体操作系统 Agentic OS。在生态构建上，荣耀联合阿里，充分结合端侧与云侧的价值，共同研发并定义了下一代 Magic 智能体大模型矩阵。相较于传统以被动执行指令为主的操作系统，Agentic OS 更加关注智能体对用户意图的理解以及复杂任务的协同处理。据悉，Robot Phone 计划于 2026 年第三季度上市。值得一提的是，荣耀在会上还提出了“一主多专、三脑（端）协同”的全新智能体架构。在这一架构下，一个随身的主智能体，将作为最懂你的伙伴，动态协同起海量的智能终端，生态的万千垂域，以及云端的超级大脑，将曾经的设备孤岛、服务孤岛和数据孤岛，质变为有机的智能体矩阵。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/462.htm", "publishedAt": "2026-07-18T06:30:45+00:00"}, {"title": "防 AI 爬取字体 Decoy Font 问世，灵感源于玛丽莲 · 梦露和爱因斯坦混合照", "summary": "IT之家 7 月 18 日消息，Mixfont 于 7 月 15 日发布博文，宣布推出 TTF 格式的 Decoy Font 字体，通过叠加 2 层不同空间频率信息，让 AI 无法正确读取文字。TTF（TrueType 字体）格式是一种常见的可安装数字字体文件格式，可在操作系统、设计软件、办公软件和网页相关流程中调用。用户安装后，能够像普通字体一样输入和排版文本。Decoy Font 字体基于混合图像（hybrid images）技术构建，该技术其中最著名的例子，是将阿尔伯特 · 爱因斯坦和玛丽莲 · 梦露的图像混合在一起。Decoy Font 基于相同理念打造，主要防止用户的文字内容被 AI 爬取。Mixfont 称，多数 AI 系统读取图像文本时，主要依赖近距离像素信息，因此在输入图像进入大语言模型后，模型更容易优先读取轮廓更清晰的前景文字；而人在稍远距离观察时，更容易识别实际隐藏信息。该公司工程师 Eric Lu 表示，每个真实的字母都隐藏在一个诱饵字母后面，这样 AI 就很难读出真正的消息。IT之家附上相关截图如下：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/461.htm", "publishedAt": "2026-07-18T06:29:42+00:00"}, {"title": "沐曦股份发布 AI 超节点新品曦景 S600：支持单机柜 64 卡高密度部署，可灵活扩展至万卡级别", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会（WAIC 2026）今天在上海举行，沐曦股份在大会期间正式发布新一代 AI 超节点新品曦景 S600。IT之家从沐曦股份公众号了解到，曦景 S600 是面向大模型训练、推理及智算中心建设打造的系统级算力产品，可实现单机柜 64 卡高密度部署，通过柜内全互连架构，大幅降低数据交互时延，提升大模型并行计算效率，并灵活支持 EP、TP 等多维并行策略，全面覆盖大模型训练和推理场景。扩展能力方面，曦景 S600 支持柜内高速互连和柜间横向扩展，集群规模可灵活扩展至万卡级别，满足大型智算中心建设需求，为 AI 基础设施提供更具效率的国产算力底座。整机柜一体化交付模式有效缩短部署周期，计算节点与交换节点采用 0 线缆直连设计，进一步降低建设和运维成本。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/460.htm", "publishedAt": "2026-07-18T06:16:35+00:00"}, {"title": "消息称全球最大 AI 聚合平台 OpenRouter 获多家科技巨头收购意向，估值或高于 13 亿美元", "summary": "IT之家 7 月 18 日消息，据《The Information》今日报道，全球最大的 AI 大模型 API 聚合平台 OpenRouter 已收到多家大型科技公司的潜在收购意向，估值或高于其今年 5 月 B 轮融资后的 13 亿美元（IT之家注：现汇率约合 88.2 亿元人民币）。据报道，OpenRouter 平台聚合超 400 款 AI 大模型，坐拥 800 万用户，每月处理约 100 万亿个 Token，截至 2026 年初，年化收入已达到约 5000 万美元（现汇率约合 3.39 亿元人民币）。两个月前，OpenRouter 刚完成由 Alphabet 成长基金 CapitalG 领投的 1.13 亿美元（现汇率约合 7.67 亿元人民币）B 轮融资，投后估值约 13 亿美元，相比去年 6 月的 A 轮融资后 5.47 亿美元（现汇率约合 37.11 亿元人民币）估值增长超一倍。不过IT之家需要指出的是，目前该消息仍停留在传闻阶段，截至发稿，OpenRouter 暂未回应。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/453.htm", "publishedAt": "2026-07-18T05:40:50+00:00"}, {"title": "AI 智能体引爆“词元经济”，我国日均 Token 调用量 2 年增长超 1000 倍", "summary": "IT之家 7 月 18 日消息，@央视财经 今天（7 月 18 日）发布微博，预告在 7 月 19 日 21 点 30 分播出的《中国经济大讲堂》节目中，中国信息通信研究院副院长魏亮表示截至 2026 年 3 月，我国日均 Token 调用量飙升到 140 万亿，较 2024 年年初（约 1000 亿）增长超过 1000 倍。IT之家注：国家统计局副局长毛盛勇已于今年 4 月公布上述数据，称截至今年 3 月，日均 Token 调用量突破 140 万亿，比上年末增长超 40%。而在明晚的节目中，中国信息通信研究院副院长魏亮将带来更深入的洞察。@央视财经 在微博中指出：智能体正在催生一种全新的经济形态，即“Token 经济”。Token 中文叫词元，是大模型处理信息和计量模型调用成本的重要单位。它的增长速度是产业发展最直观的晴雨表。智能体时代，一个用户指令可能触发多轮模型调用和资源消耗，直接带动人工智能算力需求爆发。随着智能体规模化应用，围绕 Token 计量、调度、定价和交易的一系列新模式正在形成。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/450.htm", "publishedAt": "2026-07-18T05:28:13+00:00"}, {"title": "华为 MateBook Pro 获国家级人工智能认证 L3 级首证", "summary": "IT之家 7 月 18 日消息，近日，华为 MateBook Pro 获得国家级人工智能终端智能化分级 L3 等级首证，成为首批通过该国家级人工智能分级标准认证的终端产品。据IT之家相关报道，工业和信息化部、国家市场监督管理总局、商务部等部门于今年 5 月联合发布《人工智能终端智能化分级》（GB/Z 177—2026）系列国家标准。该标准将终端智能化水平划分为 L1 响应级、L2 工具级、L3 辅助级和 L4 协同级，智能化水平依次提升。其中，L4 协同级将根据产业发展水平，在后续标准修订中进一步明确和完善。华为 MateBook Pro 是华为首款搭载原生 HarmonyOS 5 的 PC 产品，于 2025 年 6 月正式开售。该产品配有小艺智慧按键，AI 功能融合华为盘古和 DeepSeek 大模型，支持鸿蒙生态互融‏‏，为用户在办公、学习等场景提供智能化体验。同年 10 月 22 日发布的 HarmonyOS 6 为鸿蒙电脑进一步引入鸿蒙智能体框架，智慧办公体验迎来升级。系统新增小艺深度研究、智慧文件管理以及手机电脑碰一碰等功能。今年 5 月，华为 MateBook Pro 迎 HarmonyOS 6.1 版本升级，新增沉浸光感视效等新特性。硬件方面，MateBook Pro 配备 14.2 英寸 3.1K 柔性 OLED 云晰柔光屏，整机重量约 970 克；同时采用华为云隼架构与泡沫铜 VC 散热系统，支持 40W 性能释放。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/446.htm", "publishedAt": "2026-07-18T04:30:18+00:00"}, {"title": "6 台机器人拼长城、首款智能体手机首秀：阶跃把 AI 塞进了现实世界｜WAIC 2026", "summary": "大模型的下一站，是走出屏幕，自己动手#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672344?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T04:01:07+00:00"}, {"title": "Claude Fable 5 入驻 AI 订阅计划，网友称限额 50% 还不如用 Kimi K3", "summary": "IT之家 7 月 18 日消息，@claudeai 官方 X 账号今天（7 月 18 日）发布推文，宣布将于 7 月 20 日开始，Max 和 Team Premium 订阅用户可以使用 Claude Fable 5 模型，限额为 50%。而 Pro 和 Team Standard 订阅用户后续将继续通过用量积分方式调用 Claude Fable 5，不过官方一次性赠送价值 100 美元积分。Anthropic 官方表示 Claude Fable 5 模型上线后用户需求较高，后续会根据服务器负载等情况，分阶段将其推广到现有订阅体系中。IT之家查询该推文下方评论，用户负面评价偏多：不过也有用户表示支持：在推文下方评论，称 Kimi K3 模型每月 39 美元挺有吸引力的，而且实际使用体验可能比 Claude Fable 5 这 50% 限额更好用。相关阅读：《Anthropic 收紧 Claude Fable 5 最强模型，7 月 7 日从订阅中移除改为 AI 用量计费》延伸阅读Claude Fable 5 是 Anthropic 于 2026 年 6 月 10 日推出的面向普通用户的最强 Claude 模型，在软件工程、知识工作、视觉、科学研究等领域展现出卓越性能。该模型在 2026 年 6 月 30 日解除出口管制后于 7 月 1 日重新上线，但随后用户反馈其存在“降智”情况，且因安全护栏严苛，频繁回退到 Opus 4.8 模型。根据 Anthropic 于 2026 年 7 月 3 日公布的原计划，Fable 5 本应在 2026 年 7 月 7 日后从 Pro、Max、Team 和部分 Enterprise 订阅中移除，改为基于使用量积分的计费模式。此后，Anthropic 曾将 Claude Fable 5 的限时推广活动从原计划的 2026 年 7 月 12 日延长至 7 月 19 日，所有付费套餐用户在此期间可继续使用。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/440.htm", "publishedAt": "2026-07-18T03:55:46+00:00"}, {"title": "首款专为智能眼镜打造的原生 AI 系统：乐奇 YodaOS 亮相 WAIC 2026", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会今天在上海举行，据《科创板日报》今天报道，乐奇 Rokid 已在现场推出全球首款专为智能眼镜打造的原生 AI 操作系统 YodaOS。据介绍，YodaOS 以图形化沉浸式交互替代传统单一文字输出，拥有行程自动记录、定时主动提醒等新增功能，是全球首款支持 AIUI 的 AI 操作系统。值得注意的是，乐奇 AI 眼镜也在 WAIC 2026 亮相。结合IT之家此前报道，该产品采用空间 + AI 双摄设计，支持电致变色、6DoF 自由度、58° FoV 视野、5 麦克风阵列，计算端搭载骁龙至尊空间计算平台，采用 3nm 制程工艺，适配端侧大模型与虚幻引擎 5。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/439.htm", "publishedAt": "2026-07-18T03:51:02+00:00"}, {"title": "国家能源局：将加快构建新型能源体系，赋能 AI 发展", "summary": "IT之家 7 月 18 日消息，据央视新闻报道，2026 世界人工智能大会昨天（7 月 17 日）在上海开幕，在“人工智能与能源双向赋能”分论坛上，国家能源局负责人透露，我国将加快构建新型能源体系，为人工智能发展插上绿色翅膀。据了解，“十五五”时期，推理负荷将超过以往的训练负荷，成为算力的主要消耗。时延敏感、负荷波动大、需求集中等特征，要求算电协同从“空间协同”转向算力负荷与新型电力系统的“多维协同”，必须统筹推进智能算力、大模型、语料资源等核心要素一体化布局。国家能源局党组书记、局长王宏志表示，全社会用电量中，每十度电就有近四度是绿电。绿电供应量足质优，推动绿色算力从理念走向实践，从实验室走进应用场景，让每一度电都物尽其用，让每一个 Token 都与绿同行。IT之家从数据中获悉，目前，算力产业已经成为拉动全社会用电增长的新引擎。2025 年我国算力设施用电量达 1700 亿千瓦时，同比增长约 30%，占全社会用电量比重约为 1.6%，预计到 2030 年占比将达到 6%。截至今年 6 月底，中国累计发电装机突破 40 亿千瓦大关，其中可再生能源装机超过 24 亿千瓦，继续稳居全球第一。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/416.htm", "publishedAt": "2026-07-18T03:29:51+00:00"}, {"title": "荣耀 Robot Phone 正式开启预约", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会暨人工智能全球治理高级别会议（WAIC）正在进行，今天上午，荣耀 Robot Phone 已正式开启预约，预约购机可总价值 3500 元的多重惊喜好礼，包含终身 YOYO AI 会员 SVIP、1 年期云台无忧换、新机礼包、全套配件，还支持 24 期分期免息、至高 2000 元以旧换新补贴等。不久前，李健发布的海报显示，这款机型提供两种配色方案。此前，荣耀线下门店已于 7 月 15 日开放该机型的预约通道，提前预定可享受专属权益。荣耀 Robot Phone 首次亮相于 2026 年 3 月在西班牙巴塞罗那举行的世界移动通信大会（MWC 2026）。彼时，荣耀 CEO 李健在发布会上表示，“手机不该只是一个有着触摸屏的‘无趣黑色方块’。我们决定赋予它大脑和手脚”。该产品被定义为荣耀“阿尔法战略”落地以来的第一个“新物种”，融合了具身智能交互与旗舰影像两大 AI 核心能力。这款产品的核心创新在于机身顶部集成了一套行业最小的四自由度（4DoF）钛合金机械云台系统。日常使用时，机械臂完全收纳于机身内部，保持手机完整一体外观；启用时一键弹出，仅需 0.8 秒即可完成展开，支持 360° 旋转追踪以及 90°、180° 智能运镜。防抖性能达到 CIPA 5.5 级标准，步行抖动补偿率达 96%。该云台系统配备微型电机，体积比主流方案缩小 70%。影像配置方面，荣耀 Robot Phone 后置三摄方案包括一颗 2 亿像素 F1.6 光圈、等效 23 毫米的 4D 云台主摄，一颗 5000 万像素超广角镜头，以及一颗 2 亿像素潜望式长焦镜头。该机是荣耀与好莱坞电影工业巨头 ARRI（阿莱）达成战略合作后的首款落地产品，首次将阿莱 Log-C 编码和 LUT 调色文件引入移动端。据官方介绍，专业影视的 C-Log、LUTs 全部可用，摄影师和导演常用的锁焦、锁白平衡、锁 AE 和运镜数据均可下放至手机。此外，相机支持 AI 物体追踪、AI 视频剪辑与智能拍摄，可实时感知与补偿以确保画面稳定。硬件配置方面，荣耀 Robot Phone 搭载第五代骁龙 8 至尊版芯片，配备一块 6.3 至 6.4 英寸的 1.5K 分辨率四等边直屏。该机内置端侧大模型 YOYO，具备情感感知能力，能够主动识别用户的情绪状态、使用习惯及当前所处环境。IT之家此前报道，型号为“APH-AN00”的荣耀 Robot Phone 已通过 3C 认证，配备支持最大 120W 快充的开关电源适配器，由深圳荣耀智能机器有限公司生产。此前爆料显示，荣耀 Robot Phone 预计将于 2026 年 8 月正式发布。荣耀 CEO 李健也确认该机将在 2026 年第三季度上市。另有消息称，荣耀 Robot Phone 与 Magic9 系列将分开发布，前者定档 8 月，后者暂定 10 月登场。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/394.htm", "publishedAt": "2026-07-18T03:11:26+00:00"}, {"title": "Mario Kart Wii 静态重编译游戏下月登陆 PC：支持 4K 输出，200 多条赛道", "summary": "IT之家 7 月 18 日消息，科技媒体 Tom's Hardware 昨日（7 月 17 日）发布博文，报道称开发者 @patchzyy 发布最新视频，展示借助 AI 打造的 Mario Kart Wiicompiled 项目，是“首个 Wii 静态重编译”游戏。 IT之家注：静态重编译（Static Recompilation）是指没有依赖模拟器逐步解释或动态翻译，把旧平台游戏的二进制机器码转换为另一平台可执行的原生代码。典型应用场景是把主机游戏迁移到 PC，以降低模拟开销，并获得更高分辨率、更高帧率或更稳定的运行表现。基于项目公开说明，开发者目前已放出演示视频，测试版预计于下月推出。该项目最高支持 4K 分辨率，并提供无限制帧率，已确认兼容社区模组 Retro Rewind，这意味着重编译版本可访问 200 多条赛道。当前版本仍有资源层面的限制，该媒体称这次静态重编译暂未使用 4K 纹理、高清纹理或高清角色模型。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/393.htm", "publishedAt": "2026-07-18T03:11:19+00:00"}, {"title": "台积电：A14 制程过去三个月进展迅速，手机、AI 等领域客户兴趣强烈", "summary": "IT之家 7 月 18 日消息，据外媒 Tom's Hardware 当地时间 17 日报道，台积电本周在财报电话会上表示，A14（1.4 纳米级）制程过去三个月取得快速进展，成熟速度明显领先于 N2 开发至相同阶段时的表现。台积电 CEO 魏哲家还透露，智能手机、AI 和高性能计算领域的客户均对 A14 展现出强烈兴趣，并已积极投入设计工作。“A14 技术开发正按计划顺利推进。内部类产品测试载具的器件性能已经接近目标水平的 90%，256Mb SRAM 良率也接近 90%。”A14 预计于 2028 年下半年投入量产，性能与良率近几个月均有显著提升。今年 4 月，A14 已经达到超过 85% 的目标晶体管性能，256Mb SRAM 良率则超过 80%。大约三个月后，两项数据双双逼近 90%，器件性能提高约 5 个百分点，SRAM 良率提升近 10 个百分点。N2 在相同开发阶段的表现明显较慢。2023 年 4 月，N2 达到超过 80% 的目标器件性能，但 256Mb SRAM 测试芯片良率仅超过 50%。直到 2024 年 4 月，N2 才实现超过 90% 的目标器件性能和超过 80% 的 SRAM 良率。不同制程的开发进度不能完全横向比较，但现有数据仍表明，A14 的成熟速度大幅领先于 N2。差异或与台积电逐渐掌握全环绕栅极（GAA）纳米片晶体管有关。N2 是台积电首项采用 GAA 纳米片晶体管的制程，2023 年开发 N2 时，台积电仍缺乏生产经验。A14 则采用第二代 GAA 器件，可以充分利用 N2 开发及扩大产能过程中积累的晶体管设计、制程优化和制造经验。消息称台积电已经解决 A14 与 N2 中的大量良率瓶颈。不过，256Mb SRAM 取得较高良率，只能证明高度重复的测试结构拥有较低缺陷密度和良好制程均匀性，不能直接说明商用处理器也能达到相同的功能良率和参数良率。IT之家从报道中获悉，A14 距离预计量产时间仍有约两年半，器件性能和 256Mb SRAM 良率却都已接近 90%，整体进度远超同期 N2。只要客户设计及时完成，台积电便可能提前启动 A14 大批量生产，或在量产初期实现高于通常水平的功能良率和参数良率。魏哲家表示，客户正加快 A14 芯片设计，争取提前完成流片，释放出积极信号。“我们看到智能手机、AI 和高性能计算客户均表现出强烈兴趣，并积极参与开发。客户的新设计流片工作正在推进，进度也快于计划。”A14 结合台积电第二代 GAA 纳米片晶体管和全新标准单元架构，目标是同时提高性能、能效与晶体管密度。与 N2 相比，在功耗和晶体管数量相同的情况下，A14 性能预计提高 10% 至 15%；在运行频率和设计复杂度相同的情况下，功耗预计降低 25% 至 30%。混合设计的晶体管密度预计提高约 20%，逻辑设计则可提高 23%。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/387.htm", "publishedAt": "2026-07-18T03:00:05+00:00"}, {"title": "PPIO发布智能模型网关，打造面向Agent时代的智能Token工厂", "summary": "万亿Token调用量验证", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453467.html", "publishedAt": "2026-07-17T22:32:47+00:00"}, {"title": "WAIC 2026 | 混元Hy3大模型首秀，腾讯上线AI技能支付体系", "summary": "点击查看原文>", "sourceName , {"title": "中国电信：将适度超前建设算力基础设施，目前已建数据中心超 900 个、总电力容量近 8GW", "summary": "IT之家 7 月 18 日消息，据科创板日报报道，2026 世界人工智能大会期间，中国电信董事长柯瑞文在演讲中表示，目前“息壤”（中国电信自主研发的全国一体化智算服务平台与算力分发网络核心枢纽）智算平台纳管算力已超过 100EFLOPS。IT之家获悉，中国电信将适度超前建设算力基础设施。目前已建数据中心超 900 个，总电力容量近 8GW，是全国最大的 AIDC（人工智能数据中心）服务商。中国电信将加大国产算力规划与布局，围绕重点城市强化边缘算力池部署，提升单节点算力规模与服务能力；将加快打造弹性敏捷的算力互联网络。此外，中国电信将建设“新八纵八横”骨干光缆网，加快推进传输链路向 800G 演进；深化千兆光网普及与 5G-A 部署。探索超大容量、OCS 全光组网算内网络建设，支持超大规模集群，提升训推算效；将持续加大海缆资源投入，为人工智能的国际合作提供“海陆互备、内外协同、安全可靠”的网络基础。相关阅读：《中国电信副总经理栾晓维：推动从传统流量经营向 Token 经营转型》《中国电信 2026 年第一季度净利润 73.50 亿元，同比下降 17.08%》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/474.htm", "publishedAt": "2026-07-18T07:00:13+00:00"}, {"title": "iOS 27 公测版上手：国行 AI 准备好了，但系统流畅更值得升级", "summary": "有可能成为新一代「钉子户」系统。#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672364?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T06:47:24+00:00"}, {"title": "商汤科技董事长徐立：优秀的 AI 产品不应制造依赖，而是助力人类成长", "summary": "IT之家 7 月 18 日消息，在昨天（17 日）开幕的 2026 世界人工智能大会上，商汤科技董事长徐立发表演讲称，很多人担心人们会对 AI 工具产生依赖。但一款优秀的 AI 产品，不应当制造依赖，而是助力人的成长，解锁个体全新的可能性。若使用者借助 AI 实现自我能力提升，这样的产品才具备长期价值。徐立呼吁，必须让 AI 在安全边界的守护之下发展。安全的理念也包括产品理念：不做替代，而是增强；不做依赖，而是让个人成长。他认为，AI 能力边界的持续拓宽，背后则隐藏一套核心逻辑：增强、放大每个人的能力，催生更多发展可能，而非以替代人类为目标。IT之家从演讲中获悉，徐立提到很多人会担心部分岗位会消失，并坦言自己确实认为如此：一些偏流程化、两端都是系统的岗位，一定会被 AI 所优化。但与此同时，AI 拓展的边界会催生大量全新的职业、公司形态与组织形态。世界经济论坛数据显示，到 2030 年可能会减少 9200 万个岗位，但同时会创造 1.7 亿个新岗位。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/459.htm", "publishedAt": "2026-07-18T06:10:09+00:00"}, {"title": "三星 One UI 9 版 My FanCam 曝光：AI 智能追踪视频拍摄主体", "summary": "IT之家 7 月 18 日消息，科技媒体 Android Authority 昨日（7 月 17 日）发布博文，分享了一张 One UI 9 内测版截图，展示了名为 My FanCam 的 AI 功能，可以识别视频主体，并在成片基础上自动调整画面构图。 IT之家援引博文介绍，该功能依赖 Galaxy AI，本次截图测试源于搭载 One UI 9 的 Galaxy S25+ 手机，启用后可以智能追踪视频拍摄主体，并在拍摄完成后自动重新构图，确保被摄对象始终处于画面中心。有别于三星相机现有的 Auto Track（自动追踪，主要在视频录制过程中追踪已选主体）功能，My FanCam 更偏向于后期处理，在用户完成拍摄视频后，再从成片中选择主体，由系统持续追踪并重新居中构图。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/458.htm", "publishedAt": "2026-07-18T06:08:39+00:00"}, {"title": "极摩客更新 Strix Halo 迷你主机 EVO-X2：128GB 内存、1TB 硬盘，3499 美元", "summary": "IT之家 7 月 18 日消息，极摩客现已在海外推出新版 EVO-X2 迷你主机，新机的核心配置没有改变，仍然搭载 AMD Strix Halo 平台和 128GB 内存，不过硬盘由原本 2TB 减配为 1TB。据介绍，这款迷你主机最初发布于 2025 年 4 月，搭载锐龙 AI Max+ 395 处理器，配置 128GB LPDDR5X 内存和 1TB 固态硬盘。配备双 2.5GbE 有线网卡和支持 Wi-Fi 7 和蓝牙 5.4 的 RZ717 无线网卡。EVO-X2 外部 I/O 端口配置如下：正面：开关键、性能模式切换键、SD 读卡器、1 个 USB-C 40Gbps、2 个 USB-A 10Gbps、音频插孔；反面：2 个 USB-A 480Mbps、1 个 HDMI 2.1、1 个 DP 1.4、1 个 USB-C 40Gbps、1 个 USB-A 10Gbps、1 个 2.5GbE RJ45、耳机插孔、供电接口、安全锁孔。极摩客 EVO-X2 三维尺寸为 193×185.8×77 (mm)，采用双风扇三热管“北冰洋”散热，支持 140W 峰值性能释放，前后均具有矩阵式透光开孔。目前，这款迷你主机在极摩客官网的售价是 3499 美元（IT之家注：现汇率约合 23739 元人民币），相比此前的 128GB+2TB 版本便宜 150 美元（现汇率约合 1018 元人民币）。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/423.htm", "publishedAt": "2026-07-18T03:35:17+00:00"}, {"title": "英伟达 NVIDIA App 升级 11.0.8：支持 ShadowPlay 240 FPS 录制视频", "summary": "IT之家 7 月 18 日消息，英伟达昨日（7 月 17 日）更新 NVIDIA App 应用，升级至最新 11.0.8.299 版本，面向 GeForce RTX 50 系列和 RTX 40 系列显卡，带来了 240 FPS 的 ShadowPlay 录制功能。IT之家附上更新日志内容如下：最新更新：ShadowPlay 240 FPS 录制视频NVIDIA App 现可为 GeForce RTX50 和 40 系列 GPU 提供 240FPSShadowPlay 录制支持，为竞技游戏玩家和创作者提供超流畅、高分辨率的源视频片段。通过 AIt+Z&gt;“设置”&gt;“视频截取”进行配置控制面板更新新增功能：可让用户将任务栏限制在单个显示器上，还支持窗口最大化至三联屏整体画面。玩家可通过系统 &gt; 显示器 &gt; Surround 进行设置。新增游戏支持 DLSS 优设，具体包括：‘83活性物质（Active Matter）Bus Bound“克苏鲁：恐怖深渊（Cthulhu: The Cosmic Abyss）”“反抗黎明（Dawn of Defiance）”“遥遥西土（Far Far West）”INDUSTRIA 2“魔御：STAR DIVE（MONGIL: STAR DIVE）”“神探杰克鼠（MOUSE: P.I. For Hire）”“异环（NTE: Neverness to Everness）”“识质存在（PRAGMATA）”SamsonScreamer“忆蚀（Subliminal）”“突袭 5（Sudden Strike 5）”Twinmotion“风启之旅（Windrose）”新增游戏支持优化设置，具体包括：“孤山独影（Cairn）”“红色沙漠（Crimson Desert）”“死亡搁浅 2：冥滩之上（DEATH STRANDING 2: ON THE BEACH）”“失落星船：马拉松（Marathon）”“怪物猎人物语 3：命运双龙（Monster Hunter Stories 3: Twisted Reflection）”“仁王 3（Nioh 3）”“识质存在（PRAGMATA）”“检疫区：最后一站（Quarantine Zone: The Last Check）”“生化危机：安魂曲（Resident Evil Requiem）”“七大罪：起源（The Seven Deadly Sins: Origin）”“风启之旅（Windrose）”修复的 Bug：修复了游戏标题包含特殊字符时 Shadowplay 录制失败的问题多项稳定性修复，提升应用程序整体可靠性", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/389.htm", "publishedAt": "2026-07-18T03:03:40+00:00"}, {"title": "B站成WAIC官方AI科技视频平台，月均超1.9亿用户消费AI内容", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453530.html", "publishedAt": "2026-07-18T03:01:18+00:00"}, {"title": "东方算芯首次展出全球首颗软件定义近存计算 3D AI 芯片 DF1000，算力可达 520 TFLOPS", "summary": "IT之家 7 月 18 日消息，2026 世界人工智能大会（WAIC 2026）今天在上海举行。东方算芯在会上首次展出全球首颗软件定义近存计算 3D AI 芯片 ——DF1000，并荣获 2026 SAIL 奖（卓越人工智能引领者奖）。据介绍，DF1000 依托全国产供应链打造，通过空间并行与时分复用设计提升硬件利用率，算力可达 520 TFLOPS。采用 3D 混合键合技术实现晶圆级堆叠，有效提升访存带宽，降低供应链依赖，拥有自主编程框架和软件生态，可为 AI 产业提供稳定的国产算力底座。同时，该产品以“软件定义＋3D 堆叠近存计算”的东方范式，破解了中国高端算力芯片发展面临的三大核心瓶颈。通过软件定义芯片技术实现软硬件解耦与动态重构，在 14nm 工艺节点下实现 520TFLOPS@BF16 的算力。IT之家查询公开资料获悉，上海东方算芯科技有限公司成立于 2024 年 5 月 20 日，总部设于上海张江，在北京、南京、西安、成都、苏州、深圳等设有分部，目前团队规模超 500 人。东方算芯宣称依托自主原创的软件定义芯片、近存计算两大核心技术，基于全国产化供应链体系，研发打造了高性能、高能效、高灵活性的大算力芯片产品，搭建自主可控的生态系统。公司产品包括软件定义超高性能近存计算芯片、基础软件与应用软件、高性能服务器和大规模集群系统解决方案等。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/368.htm", "publishedAt": "2026-07-18T02:39:54+00:00"}, {"title": "早报｜苹果上调Apple Music价格/小米SU7虚假碰撞测评博主被判一年八个月/努比亚、阶跃星辰智能体手机亮相WAIC", "summary": "· 智谱 ARR 被曝达到 10 亿美元，半年增长 15 倍 · Shopify CEO：反 AI 编程的人严重高估了人类代码质量 · 影石与荣耀达成影像生态合作，计划年底前进驻 300 家荣耀门店#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672338?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-18T00:49:59+00:00"}, {"title": "搭载全球首个智能体原生操作系统 Step AOS，STEPX Neo 亮相 2026 WAIC", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/62J9L28365BtFlSFxVjE?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T22:03:09+00:00"}, {"title": "亚马逊云科技推出 Claude 应用网关：面向 Claude Code 与 Claude Desktop 的自托管控制平面", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.i Edge Institute 把科技、科学、文化和社会领域的从业者聚集到临时社区，让参与者共同生活并尝试各种实验项目。苏富比表示，善款将用于提供奖学金、项目资助和驻留机会。黄仁勋与 Edge Institute 究竟有何联系，拍卖是否由黄仁勋本人提议，目前都没有明确答案。黄仁勋曾在 2023 年 10 月 18 日的鸿海科技日穿过这件拍卖夹克，夹克上的签名也通过 James Spence Authentication 鉴定，品牌则是奢侈男装品牌 Tom Ford。苏富比表示：“不只是一件夹克，更是‘最早信仰者’的制服，象征着黄仁勋的领导风格，体现了真诚、创造力、坚持、勇气和喜悦。”时尚专家确认，黄仁勋经常穿 Tom Ford，部分夹克单件售价超过 1 万美元（IT之家注：现汇率约合 67846 元人民币）。男装时尚顾问公司 New York Fashion Geek 创始人兼老板雷金纳德 · 弗格森此前称：“黄仁勋穿 Tom Ford 早就轻车熟路了，衣橱里有很多 Tom Ford，而且没有一件便宜。黄仁勋已经找准了适合自己的风格，并且一直坚持。我怀疑黄仁勋门外根本没有摩托车，黑色夹克倒是很衬他的灰发。”黄仁勋 2024 年接受惠普采访时坦言，黑色皮夹克并非自己的主意。“我很乐意让妻子和女儿替我搭配衣服。”黄仁勋的发言人此前还向《纽约时报》表示，黄仁勋穿黑色皮夹克“至少已有 20 年”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/365.htm", "publishedAt": "2026-07-18T02:23:59+00:00"}, {"title": "Stripe 发布基准测试：AI 智能体可开发集成方案，但校验环节存在短板", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/zVfybMt5i742CqhWYjR4?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T14:15:00+00:00"}, {"title": "Visual Studio Code 1.129 发布", "summary": "Visual Studio Code 1.129 现已发布，此版本新增了专用 agent host、Agents window 中的全新编辑器面板、使用!运行命令的功能以及现代 UI 预览。 The agent host：在专用进程中运行 agent 会话，并从多个窗口连接到它们。 Agents window 中的新编辑器面板（实验性）：在 docked editor 中查看 agent-generated files 和 ...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/471757/vs-code-1-129-released", "publishedAt": "2026-07-16T03:11:53+00:00"}, {"title": "DeepSeek 融资股权变更完成", "summary": "企查查 APP 显示，近日，DeepSeek 关联公司杭州深度求索人工智能基础技术研究有限公司发生工商变更。 新增杭州程砺企业管理咨询合伙企业（有限合伙）、国家人工智能产业投资基金合伙企业（有限合伙）为股东，注册资本增加至 1644.75 万元。 其中，DeepSeek创始人梁文锋退出杭州程砺企业管理咨询合伙企业（有限合伙）股东...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/471741", "publishedAt": "2026-07-15T08:27:41+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "荣耀 CEO 李健：AI 的本质是增强人而非替代人", "summary": "IT之家 7 月 18 日消息，据新浪财经今日报道，7 月 17 日至 20 日，2026 世界人工智能大会暨人工智能全球治理高级别会议在上海举行。在荣耀“物理世界新范式论坛”上，荣耀 CEO 李健表示，AI 的本质是增强人而非替代人。李健描绘了 AI 增强人类的终极场景：未来，一个人将带领一个由海量智能体设备组成的矩阵，将边端云的群体智慧转化为个体的无限潜能。无论人的意图如何瞬息万变，这个智能体矩阵都能瞬间响应并进行有机重构，化作无处不在的智能服务。李健认为，在智能时代，欲望的外化即是“人的意图”。李健强调，意图的主权永远掌握在人类手中，产品的进化方向必须由人的真实需求来决定。AI 绝不是替用户做决定，而是帮助用户降低“能做什么”的技术门槛，让人类能够更自由地表达和实现意图。IT之家注意到，李健指出，AI 本身没有善恶，其表现完全取决于人类赋予的价值观定义与规则。荣耀的最终目标是让每一个人都能拥有并肩成长的智能伙伴集群。AI 的到来不仅不会剥夺人类的思考能力，反而将促使人的创造力与判断力迎来前所未有的爆发。延伸阅读2025 年 3 月，荣耀新任 CEO 李健在 MWC 2025 上发布了“阿尔法战略”，宣布公司将从智能手机制造商向全球 AI 终端生态公司转型，并计划未来 5 年投入 100 亿美元建设 AI 设备生态。李健在 MWC 2026 前夕提出了 Augmented Human Intelligence（AHI）理念，其核心是让 AI 兼具智能度（IQ）与生命感（EQ），以增强人类在变化世界中的适应、进化与享受当下的能力，实现人与 AI 共生。2025 年 10 月，荣耀在发布 Magic8 系列时预告了 AI 概念版 Robot Phone，并将其定位为对“AI 手机终极形态”的探索，旨在让设备从“工具”变为“有感知、会协同的生活伙伴”。该产品计划在 MWC 2026 上正式亮相。在 2026 年 7 月 18 日的同一场世界人工智能大会上，李健还发表了关于 AI 将脱离冰冷工具属性、迈向伙伴型类人生命体的观点，并宣布荣耀首台机器人 Robot Phone 已开启全渠道预约。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/488.htm", "publishedAt": "2026-07-18T07:40:21+00:00"}, {"title": "SQL Server 2016 宣告退役，微软承认其仍被“大量部署”", "summary": "IT之家 7 月 18 日消息，微软于当地时间 7 月 17 日发布博客，回顾了刚刚结束扩展支持服务的 SQL Server 2016。这款数据库产品自发布以来已运行超过 10 年。微软表示，该产品目前仍在企业环境中“大规模部署”，因此此次生命周期结束可能会影响部分仍依赖该版本数据库系统的组织。IT之家注：微软 SQL Server 2016 于 2016 年 6 月 1 日正式发布，于 2021 年 7 月 13 日结束主流支持，并在 2026 年 7 月 14 日结束扩展支持，完整生命周期超过 10 年。随着扩展支持结束，微软将不再为 SQL Server 2016 提供常规功能更新、安全更新、非安全修复以及官方技术支持。微软指出，SQL Server 2016 是该系列的重要版本之一，引入了多项至今仍被企业使用的功能，包括 Query Store（查询存储）、Always Encrypted（始终加密）、原生 JSON 支持、Stretch Database（拉伸数据库），以及安全性和性能方面的改进。由于稳定性和性能表现，该版本长期作为关系数据库管理系统（RDBMS）平台，被用于企业资源规划（ERP）、计费系统、医疗业务系统、制造业应用以及各种定制化业务软件。不过，SQL Server 2016 结束支持并不意味着服务器会立即崩溃。微软表示，现有数据库实例和依赖它运行的应用程序仍可继续使用，但由于后续不会再获得安全补丁和漏洞修复，企业面临的安全风险会随时间增加。此外，部分行业监管要求也可能涉及软件是否仍处于官方支持周期内。针对仍在使用 SQL Server 2016 的企业，微软建议优先评估升级方案，包括迁移至 SQL Server 2022 或 SQL Server 2025。微软表示，新版本提供持续支持、安全增强以及新的数据平台能力，其中 SQL Server 2025 还加入了 AI 相关能力。另一种选择是迁移至云服务。企业可以将数据库迁移到 Microsoft Azure 上的 Azure SQL Managed Instance，该服务能够提供较高的 SQL Server 兼容性，并支持自动补丁更新、高可用性和自动备份等能力。对于希望减少应用程序改动的企业，也可以选择将现有数据库迁移至 Azure 虚拟机中的 SQL Server 环境。如果企业暂时无法完成迁移，微软还提供 Extended Security Updates（ESU，扩展安全更新）计划。购买该服务后，SQL Server 2016 可以额外获得最多三年的关键安全更新。不过微软强调，ESU 主要用于为企业争取迁移时间，并不建议作为长期运行方案。微软客户工程师在官方博客中表示，SQL Server 2016 结束支持后，企业迁移过程中应提前进行环境评估，以识别可能影响升级的因素，包括已弃用功能、应用兼容性问题、关联服务器依赖、SQL Agent 作业、CLR 集成以及旧版 SSIS、SSRS 工作负载等。微软建议企业在迁移前使用相关工具进行数据库评估和迁移规划，包括 Data Migration Assistant（DMA）、SQLPackage、Azure Database Migration Service 等，以帮助发现潜在问题并制定迁移路径。微软方面表示，数据库本身通常并不是迁移过程中最复杂的部分，应用程序依赖关系、停机时间要求以及业务连续性需求往往会影响最终方案选择。目前，仍运行 SQL Server 2016 的企业可以根据自身情况选择升级至新版本、迁移到 Azure 服务，或通过 ESU 延长安全支持周期。微软提醒，企业应尽早完成环境评估并制定现代化数据平台规划，以降低旧版本数据库持续运行带来的风险。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/473.htm", "publishedAt": "2026-07-18T06:59:39+00:00"}, {"title": "Meta 员工要求法院阻止公司裁员，但遭法官驳回", "summary": "IT之家 7 月 18 日消息，据路透社今天（18 日）报道，美国加州奥克兰联邦地区法官威廉 · 奥里克驳回了 Meta 旗下 26 名员工的申请。26 名员工要求法院在仲裁结束前阻止 Meta 解雇他们，并指控 Meta 利用 AI 系统筛选裁员对象，身有残疾或请过医疗假的员工因此遭到针对。奥里克在书面命令中提到，员工提出的法律主张将由非公开仲裁审理，在仲裁作出实体裁决前，法院不会阻止 Meta 从 7 月 22 日起推进裁员。他认为，员工未能证明失去工作会造成法院签发紧急禁令所要求的“不可弥补损害”。原告律师在联合声明中表示，奥里克虽然驳回申请，但也承认诉讼对 Meta 的做法提出了“严重问题”。法院明确表示，可能根据双方就裁员过程中是否使用 AI 以及如何使用 AI 所提供的任何补充证据，重新考虑裁决。据IT之家了解，今年 5 月，Meta 通知近 8000 名员工裁员的消息，人数占全球员工总数约 10%。诉讼称，Meta 利用 AI 工具衡量员工生产力和 AI token 使用量，并据此筛选裁员岗位。因患病或照顾家人而缺勤的员工因此处于不利地位。原告还称，Meta 的绩效评估部分取决于员工采用 AI 的程度。原告要求奥里克签发临时限制令，在仲裁审理期间禁止 Meta 完成裁员。持续时间更长的初步禁令申请仍待裁决。当地时间周五，奥里克暗示，掌握更多裁员细节后，可能重新考虑目前的决定。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/455.htm", "publishedAt": "2026-07-18T05:55:13+00:00"}, {"title": "英特尔前 CEO 基辛格反思：当年确实看不上英伟达 GPU", "summary": "IT之家 7 月 18 日消息，英特尔前 CEO 帕特 · 基辛格（Patrick Gelsinger）前天出席 All-In Podcast 播客时承认，英特尔主导整个行业时，公司曾对英伟达的 GPU 产品不屑一顾。访谈一开始，基辛格就开门见山地批评了英特尔当年的资本配置策略，指出公司在他回归前的五六年里，向股东发放了 1000 亿美元（IT之家注：现汇率约合 6784.58 亿元人民币）股息，而不是将资金投入制造业务。他对此说道：“在我回归之前的五六年里，英特尔向股东返还了 1000 亿美元。如果当时这些钱能出现在资产负债表上，那该有多好。我接手公司时，英特尔已经有十年没建新晶圆厂了。怎么可能不建工厂？怎么可能不采购光刻机？”不过从财务角度看，建工厂、采购 EUV 的短期经济回报未必理想，因此只有真正懂技术的人，才能明白这些投资的重要性。谈到伟大的企业家如何长期积累时，基辛格回忆起英特尔当年对英伟达的态度。他说：“那个年代，黄仁勋确实只是打造高性能计算设备。在英特尔 CPU 最辉煌的时候，我们确实瞧不起他的产品。我们觉得那不过就是 GPU，只是游戏发烧友会用的东西。”不过事情后来出现转机，基辛格继续说道：“之后英伟达开始围绕 GPU，构建 CUDA、SIMT 等真正的软件栈，这些东西一点一点变得越来越成熟。这种长期改进产品的模式和乔布斯颇为相似。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/364.htm", "publishedAt": "2026-07-18T02:22:44+00:00"}, {"title": "从GPU到Token：英伟达Vera Rubin如何重构下一代AI工厂", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/s8EpYCpdF3YiSkSbYfGG?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T10:09:25+00:00"}, {"title": "AI 编码实战 | 0 行手写代码，2 天重构 2 万行 Vue 项目", "summary": "文章的核心观点是：AI 辅助开发的关键不在 AI 本身的能力，而在于人为 AI 建立的约束体系 —— 通过 Skills 技能包注入领域知识、AGENTS.md 沉淀项目规范、飞轮效应让错误只犯一次，将模糊目标转化为 AI 可精确执行的高质量指令，从提出需求到代码合入，甚至本篇分享也是 AI 生成。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/vivotech/blog/19722516", "publishedAt": "2026-07-16T08:52:00+00:00"}]}]};

const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="昨天";
  else if(dayDiff===-1) prefix="明天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.parentNode.removeChild(box); return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top"><span class="dot" style="background:#94a3b8"></span>顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '"><span class="dot" style="background:' + accentVar(i) + '"></span>'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
</body>
</html>
