rok 4.5）。对此，月之暗面于微博公开 @马斯克 并喊话道：“欢迎加入 2 万亿 + 俱乐部”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/400.htm", "publishedAt": "2026-07-23T01:53:28+00:00"}, {"title": "太初元碁携手上海人工智能实验室举办AI4S和新型模型架构算子优化赛", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/457356.html", "publishedAt": "2026-07-23T01:43:44+00:00"}, {"title": "Geekbench 7 CPU 跑分工具现身，首批成绩出炉", "summary": "IT之家 7 月 23 日消息，据IT之家小伙伴反馈，Geekbench 7 CPU 跑分工具已悄悄现身，目前已有多个 Geekbench 7 跑分信息上传到平台，最早上传时间为 7 月 21 日。不过，目前 Geekbench 官网提供的各平台软件依然是 Geekbench 6。有博主表示，Geekbench 7 测试下 M5 MacBook Pro CPU 多核跑分相比 Geekbench 6 更高，但单核跑分更低。Geekbench 官方并没有发布官宣博客，不过IT之家获取到一份关于 Geekbench 7 的介绍文档：Geekbench 7 CPU 基准评分用于通过包括数据压缩、图像处理、机器学习和代码编译在内的工作负载来评估和优化 CPU 和内存性能。这些工作负载的性能对于各种最终用户应用都很重要，包括网页浏览器、图像编辑器和开发者工具。Geekbench 7 的分数是以 2500 分为基准校准的（这是搭载 AMD Ryzen 7 7700 处理器的联想拯救者的分数）。分数越高越好，分数翻倍意味着性能翻倍。生产力工作负载生产力工作负载衡量你的 CPU 在处理日常关键操作时的表现，包括数据压缩、图像压缩、网页浏览和二维图形。文件压缩：文件压缩工作负载使用不同的压缩格式对大量文件进行压缩和解压缩。它模拟了用户和软件应用程序压缩文件以减少数据和带宽的使用情况（例如发送电子邮件时压缩照片和文件）。文件压缩工作负载使用三种不同的压缩格式（LZ4、zlib 和 Zstandard）对三种不同的档案进行压缩和解压（一个包含源代码，一个包含目标代码，一个包含文本文件）。它还使用 SHA1（安全哈希算法 1）函数验证这些文件。导航：导航工作负载用于在一系列位置之间生成路线，并在地图上绘制这些路线。它模拟了用户从离线导航应用（例如离线谷歌地图）请求路线的使用场景。这个工作负载使用迪杰斯特拉算法在两张 OpenStreetMap 地图上计算 24 条不同的路线 —— 一张是小城市（安大略省滑铁卢），另一张是大城市（安大略省多伦多）。HTML5 浏览器：HTML5 浏览器工作负载使用网页浏览器来渲染网页。它模拟用户使用浏览器（比如 Google Chrome 或 Apple Safari）浏览网页的场景。这个工作负载使用无头浏览器打开、解析、布局并渲染来自八个基于流行网站（如 Ars Technica、Instagram 和 Wikipedia）的网页的内容。PDF 查看器：PDF 查看器工作负载使用 PDFium（Google Chrome 的 PDF 渲染器）打开复杂的 PDF（便携文档格式）文件。它模拟了用户打开和查看不同复杂度 PDF 的使用场景。这个工作负载会渲染六个不同复杂度的 PDF，包括美国国家公园管理局的公园地图、一份技术文档和一篇学术摘要。照片库：照片库工作负载会根据照片中包含的物体对照片进行分类和标记。照片库工作负载模拟导入、整理和基于检测到的物体为照片打标签的过程。这让用户可以在像 Adobe Lightroom、Apple Photos 和 Google Photos 这样的照片库应用中按关键词搜索照片。该工作负载可以导入 JPEG、JPEG-XL 和 DNG 格式的图片，生成缩略图，并使用机器学习（使用 MobileNetV1 SSD 模型）为照片打标签，同时将生成的元数据和标签存储在 SQLite 数据库中。开发者工作负载开发者工作负载衡量你的 CPU 在处理典型开发者任务时的表现，比如处理文本文件、编译代码和压缩资源。Clang：Clang 工作负载使用 Clang 编译器来编译 Lua 解释器，这是一种流行的开源语言解释器。它模拟了开发人员构建代码的使用场景，以及普通用户在他们的系统上可能遇到的即时编译（比如 Java 脚本的 JIT 编译和 GPU 驱动中着色语言的编译）。文本处理：文本处理工作负载加载多个文件，使用正则表达式解析内容，将元数据存储在 SQLite 数据库中，最后将内容导出到一个不同的格式。它模拟典型的文本处理任务，这些任务操作、分析和转换数据，以便重新格式化用于发布并获取见解。这个工作负载使用 Python 3.13 作为解释器，并将 190 个 Markdown 文件转换为 HTML。资产压缩：资产压缩工作负载使用流行的压缩编解码器来压缩纹理和几何资产。它模拟了游戏开发者使用的内容压缩管道。这个工作负载使用 ASTC 和 BC7 编解码器压缩六个纹理资产，并使用 Draco 库压缩四个几何资产。图像编辑图像编辑工作负载衡量你的 CPU 处理简单和复杂图像编辑任务的能力。HDR：HDR 工作负载将标准动态范围（SDR）照片混合在一起，生成一张比任何单独 SDR 照片更丰富多彩、更生动的高动态范围（HDR）照片。它模拟了现代智能手机相机应用（如 Google 相机和苹果相机）中的标准 HDR 功能。这个工作负载会从六张 16MP 的 SDR 照片生成一张 16MP 的 HDR 图像。照片编辑器：照片编辑器工作负载会对照片进行一系列编辑操作，比如裁剪、颜色调整和修饰。它模仿了照片编辑应用（如 Adobe Photoshop 或 Apple Photos）中的编辑功能。这个工作负载会对十张照片应用不同的效果，其中包括颜色和色调校正（如亮度、色阶、饱和度）、风格化滤镜（如棕褐色、灰度、色相变化）、几何调整（如旋转、裁剪、缩放）以及叠加合成效果（如边框、晕影）。图像合成图像合成工作负载衡量你的 CPU 在处理内容创建任务时的表现，包括图像渲染和图像处理。光线追踪：光线追踪是一种渲染技术，用于通过模拟光线与虚拟场景中物体的相互作用来生成逼真的图像。它模拟了 3D 渲染软件（如 Blender、Maxon Cinema 4D 和 Chaos Corona）中使用的渲染过程。光线追踪工作负载使用 Blender Cycles 渲染器和 Intel Embree 库从虚拟场景生成逼真的图像。运动结构：重建（Structure from Motion）工作负载会使用同一场景的二维图像，并估算出在两张图像中都可见点的三维坐标。运动结构重建是一种通过多张二维图像生成三维几何结构的技术。增强现实（AR）系统会使用像运动结构重建这样的技术来理解现实世界的场景，并将计算机生成的图形融入这些场景中。该运动结构重建工作负载会使用同一场景的九张二维图像，并估算出在两张图像中都可见点的三维坐标。模拟模拟工作负载衡量你的 CPU 处理物理模拟任务的能力。游戏物理：游戏物理工作负载在 3D 环境中模拟刚体物理，包括碰撞。游戏物理使用 Jolt 物理引擎，这个引擎被用于多款热门电子游戏中。媒体工作负载媒体工作负载衡量你的 CPU 处理常见媒体编码、解码和处理的能力。媒体工作负载模拟像视频会议和在线视频流这样的应用。视频编码器：视频编码器工作负载模拟了视频会议应用中的屏幕共享功能，使用 AOM 库和 AV1 视频编解码器对静态截图进行编码，同时生成程序化的光标移动。它模拟了用户在视频通话中共享屏幕的使用场景（例如 Zoom 和 Microsoft Teams）。音频编码器：音频编码器工作负载将音频数据（包括音乐和语音）编码为压缩音频格式。它模拟了应用将音频压缩以便存储或流式传输的使用场景（例如录制和分享语音备忘录或播客）。音频编码器工作负载使用 Opus 压缩编解码器来压缩两分钟的音频数据。视频解码器：视频解码器工作负载将视频解码、音频解码、音频重采样和语音识别整合到一个工作负载中。它模拟用户在观看视频时启用自动字幕的使用场景（例如 YouTube 的自动生成字幕）。视频解码器工作负载使用 AV1 视频编码、Opus 音频编码和 Whisper 语音识别模型实现。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/390.htm", "publishedAt": "2026-07-23T01:32:28+00:00"}, {"title": "不只有芯片交易与投资承诺：AMD 将在内部应用 Anthropic Claude", "summary": "IT之家 7 月 23 日消息，AMD 与 Anthropic 当地时间昨日宣布了一份多层次的战略合作。这一关系不仅覆盖了 2GW 的 Instinct MI450 系列 GPU 部署和 50 亿美元的战略股权投资承诺，也深入到了工程层面。根据公告，两家企业将启动一项为期多年的工程合作，利用 Claude 加速 AMD 软件开发。具体而言，双方团队将使用 Claude 优化 AMD Instinct GPU 的工作负载，并加速 ROCm 软件的开发。AMD 还将在其工程和产品开发团队中广泛采用 Claude。AMD 董事长兼首席执行官苏姿丰表示：我们非常高兴能够深化与 Anthropic 的合作，并以 GW 级规模部署 AMD Helios。此次合作将 Anthropic 在前沿人工智能领域的领先地位与 AMD 高性能计算的强大实力相结合。我们将携手加速人工智能的大规模应用，并将 Helios 打造成为下一代人工智能基础设施的重要平台。Anthropic 联合创始人兼首席计算官 Tom Brown 表示：获取计算资源对于保持 Claude 的领先地位并满足客户需求至关重要。通过与 AMD 在整个技术栈上开展合作，我们能够确保所需的计算能力，并对其进行优化，以用于 Claude 的训练和服务。在各种不同的硬件上运行，使我们能够将合适的工作负载映射到合适的硬件上。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/382.htm", "publishedAt": "2026-07-23T01:12:56+00:00"}, {"title": "Acrab 发布边缘 AI 终端 SoC GΞLIX 1，支持 100B 模型本地运行", "summary": "IT之家 7 月 23 日消息，初创企业 Acrab 昨日正式发布了其首款芯片：面向边缘 AI 终端设备的 GΞLIX 1 SoC。这一芯片基于 5nm 制程工艺，支持 100B 参数规模模型本地运行。GΞLIX 1 采用异构设计，提供了 20 核 Arm CPU、3TFLOPS GPU、NPU 和其它一系列音视频引擎，AI 算力 650TOPS。其拥有 8MB 的大型 L1 缓存，共享 L2 缓存带宽 768GB/s，此外还拥有 256-bit 8533MT/s 的 LPDDR5X 共享内存。Acrab 表示其在 GΞLIX 1 上通过矢量硬件加速了注意力机制，并通过针对预填充的优化降低了首 Token（词元）用时：在配备 40k KV 缓存和 10k Token 输入的 Gemma 26B A4B 配置下，GΞLIX 1 可实现 1416.8 Token/s 的预填充速率，是苹果 M4 Pro Mac Mini 的 7.5 倍。除芯片本身外，Acrab 还为 GΞLIX 1 提供了丰富的软件堆栈和智能体参考设计，并基于其打造了第一方终端设备 Agent Box。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/380.htm", "publishedAt": "2026-07-23T01:05:36+00:00"}, {"title": "亚马逊 AGI 部门启动裁员，此前已有多名高管陆续出走", "summary": "IT之家 7 月 23 日消息，据路透社报道，当地时间周三（22 日），亚马逊宣布在通用人工智能（AGI）部门启动裁员。继 1 月大规模削减人手后，亚马逊近期又进行了多轮规模较小的裁员。通用人工智能目前仍是一种设想中的 AI 系统，目标是让 AI 拥有超越人类的智能，并能自主学习、成长和运行。多家头部 AI 企业都在开发类似技术，希望借此解决高度复杂的问题。亚马逊发言人在回应路透社询问时表示：“我们已经开发大型 AI 模型多年，这项工作仍是亚马逊最重要的任务之一。我们正在把资源进一步集中到对客户最重要的项目上，以更快推进真正关键的工作。聚焦重点也意味着必须作出艰难决定，包括取消 AGI 部门部分团队的一些岗位。”亚马逊负责 AGI 业务的高管罗希特 · 普拉萨德于去年年底离职，AGI 实验室负责人大卫 · 卢安也于 2 月离开。去年 12 月，亚马逊把 AGI 业务并入高级副总裁彼得 · 德桑蒂斯领导的更大部门，芯片研发和量子计算同样由德桑蒂斯负责。亚马逊 AGI 数据服务副总裁阿迪布 · 沙纳、AGI 信息副总裁维沙尔 · 夏尔马旗下团队的部分员工在网络论坛发帖称，自己受到裁员影响。目前尚无法确定本轮裁员涉及多少人。据IT之家了解，亚马逊今年 1 月曾在全球范围内裁员 16000 人。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/379.htm", "publishedAt": "2026-07-23T01:03:57+00:00"}, {"title": "梁文锋 4 小时投资人会议内容曝光：DeepSeek 不追求成为下一个字节或腾讯，克制、开源与低成本是实现 AGI 的核心策略", "summary": "IT之家 7 月 23 日消息，近日，有关 DeepSeek 创始人梁文锋此前一次长达 4 小时的投资人会议内容在业内流传。elsewhere 昨日放出了此次会议的整理实录。在此次会议中，梁文锋围绕 DeepSeek 的发展方向、AGI（通用人工智能）路线、开源策略、商业化规划以及 AI 行业竞争等话题进行了交流。从公开整理的内容来看，梁文锋多次强调“克制”这一理念。他表示，DeepSeek 当前并非以商业收益最大化为目标，而是希望通过减少非核心业务投入，提高实现 AGI 的可能性。梁文锋认为，产品并不是 DeepSeek 当前的主线，而是通往 AGI 路上的阶段性成果。他表示，企业不需要投入过多资源做 C 端、B 端产品，“站在一个技术高位上做相对低一级别的技术，是降维打击”。对于业务方向，梁文锋称，DeepSeek 不会重点投入 3D 生成、视频生成以及世界模型等方向。他认为，多模态能力对于产品和普通用户很重要，但只是 AI 系统中的一个组件，并非智能发展的核心路线。梁文锋表示，当前 AI 最重要的发展方向之一是 Coding Agent。在中国市场环境下，更合理的选择是集中力量发展通用 Agent，而金融、医疗等垂直领域 Agent 的优先级相对较低。在 AGI 路线方面，梁文锋认为，当前 AI 最大的缺失并非能力，而是持续学习能力。他表示，人类可以持续积累经验，但目前 AI 需要输入完整上下文才能完成任务，这限制了 AI 替代人类工作的能力。他认为，下一代模型需要具备持续学习能力。DeepSeek 的长期目标是实现 AGI，如果将发展路线比作爬楼梯，去年解决的问题是 CoT（IT之家注：Chain-of-Thought，思维链），今年重点是 Agent，而 Agent 之后需要解决持续学习问题。梁文锋表示，当 AI 具备持续学习能力后，可能进入一个渐进式突破阶段，即模型能够完成更多人类工作，并帮助自身研发更先进的人工智能系统，实现“AI 加速 AI 研究”。他认为，这之后才可能进一步发展到具身智能。在商业模式方面，梁文锋表示，DeepSeek 只希望获得合理利润，而不是追求利润最大化。他提到，DeepSeek 曾因模型需求过高而设置较高价格，随后将价格降低至原来的四分之一，团队成员对此感到高兴。梁文锋认为，低成本并非单纯的商业策略，而是模型架构优化带来的结果。更低的成本能够让企业在算力有限的情况下训练更大规模模型，而不是单纯依靠增加计算资源。关于开源策略，梁文锋表示，开源是 DeepSeek 的重要战略。他认为，开源虽然意味着让渡部分利益，但能够增强员工成就感、提升组织凝聚力，同时也有助于整个 AI 生态发展。梁文锋称，DeepSeek 开源模型与内部使用模型保持一致，不会向外发布性能较低版本。他表示，公司并不担心其他企业部署 DeepSeek 模型进行竞争，因为并非所有企业都具备持续投入大模型研发的能力。对于中美 AI 竞争，梁文锋认为，双方差距主要体现在资源方面，而不是人才。他表示，中国 AI 人才储备并不缺乏，当前差距更多来自算力资源投入。梁文锋表示，未来希望改变中美 AI 竞争叙事，通过更高的计算效率，用更少的算力缩短差距。他认为，模型竞争最终会体现在成本、时间和用户体验三个方面，其中成本最为关键。谈及行业竞争，梁文锋认为，国内大模型企业数量较多，资源较为分散，未来行业一定会经历整合。他表示，如果企业只获取合理利润，市场可能并不需要大量公司同时投入基础模型研发。对于成为下一代超级应用的可能性，梁文锋表示，DeepSeek 并不希望成为“下一个字节”或“下一个腾讯”。他认为，当前争夺 C 端流量或 To B 收入并不是公司最关注的问题，内部重点仍是 AGI 技术路线和突破。梁文锋还提到，DeepSeek 2025 年春节期间受到广泛关注并不在公司原本规划中，公司此前并没有以市场爆发作为主要目标。在组织管理方面，梁文锋表示，保持团队稳定性是 DeepSeek 当前最重要的事情之一。他认为，稳定的研发团队是实现长期目标的基础。他介绍，DeepSeek 的组织方式结合自上而下的任务安排和自下而上的探索机制。员工部分时间用于完成公司重点方向，另一部分时间可以自主研究感兴趣的技术问题。梁文锋表示，DeepSeek 通常不会要求员工长期加班，因为 AI 研究需要相对宽松的环境，同时公司也保持高度聚焦，不会试图快速补齐所有产品功能。他强调，DeepSeek 成立初期并不是为了资本市场或获得巨额财富，而是希望推动一件对人类有价值的事情。他认为，愿景不是写在墙上的口号，而是体现在企业实际行动中。梁文锋最后表示，AI 领域潜在价值巨大，只要实现 AGI，即使只获得其中一部分商业价值，也会非常可观。因此，减少短期利益追求、保持克制，反而可能提高实现长期目标的概率。相关阅读：《消息称 DeepSeek 正在自研 AI 芯片：面向推理场景，减少依赖英伟达、华为》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/367.htm", "publishedAt": "2026-07-23T00:12:29+00:00"}, {"title": "马斯克 SpaceXAI 正计划在得州建设大型 AI 数据中心，对标孟菲斯算力集群", "summary": "IT之家 7 月 23 日消息，随着收购 xAI 后进一步加码 AI 领域，SpaceX 正加大对算力基础设施的投入，同时继续推进其太空计算数据中心计划。据 The Information 昨日报道，SpaceX 正准备建设大规模地面数据中心，以扩大其自身算力。SpaceX 在筹备 IPO 时，曾将自身定位为具备建设计算设施能力的数据中心企业，并提出未来在太空部署计算基础设施的设想。SpaceX 此前还公布了名为 AI1 的“AI 卫星”计划。该卫星最高可提供 150 千瓦计算负载能力，相关设备将在 SpaceX 位于得州的新 Gigasat 工厂生产。今年 2 月，SpaceX 收购埃隆 · 马斯克旗下人工智能初创公司 xAI 后，双方业务进一步整合，新成立的 SpaceXAI 开始同时涉足航天、卫星互联网以及 AI 软件和算力服务领域。目前，SpaceXAI 运营位于美国田纳西州的 Colossus 数据中心，并拥有数十万颗英伟达最新 AI GPU 资源。该公司还与 Anthropic、谷歌以及 Reflection AI 等人工智能企业达成算力供应协议。其中，SpaceXAI 与谷歌达成的合作协议包括向谷歌提供约 11 万颗 GPU 算力资源，合作期限持续至 2029 年。据报道，该协议每月可为 SpaceXAI 带来约 9.2 亿美元（IT之家注：现汇率约合 62.35 亿元人民币）收入。与此同时，Anthropic 可使用 Colossus 1 数据中心的全部算力资源。The Information 报道称，SpaceXAI 正考虑进一步扩大数据中心规模，并计划在公司总部所在地得州建设新的大型数据中心。目前，该公司已经考察多个建设地点，并考虑从零开始建设多个设施。知情人士称，SpaceXAI 希望在得州建设的数据中心规模达到或超过其位于田纳西州的算力设施。SpaceXAI 扩大地面算力布局之际，公司股票市场表现面临压力。今年完成首次公开募股后，SpaceX 受到市场关注。投资银行摩根士丹利此前发布报告称，未来轨道计算可能具备成本优势。摩根士丹利预测，到 2031 年，SpaceX 在轨计算成本可能达到每瓦 6.5 美元，低于采用英伟达 Blackwell AI 芯片的地面数据中心约每瓦 6.8 美元的成本。除了地面数据中心外，SpaceX 仍在推进太空 AI 计算基础设施计划。随着星舰持续测试，SpaceX 已向美国联邦通信委员会（FCC）申请批准部署最多 100 万颗具备轨道计算能力的卫星。SpaceX 计划利用太空中的太阳能资源，为 AI 计算提供持续算力支持，以应对人工智能模型训练和推理不断增长的计算需求。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/362.htm", "publishedAt": "2026-07-22T23:34:08+00:00"}, {"title": "“Gemini，谁啊？”谷歌前沿 AI 模型迟迟未发布，竞争对手“群嘲”", "summary": "IT之家 7 月 23 日消息，据《商业内幕》今天（23 日）报道，在 AI 竞赛中，王座向来坐不稳，谷歌便是例证。Gemini 3 取得成功后，谷歌在 2025 年年底占据了有利位置，但到了本周，领先优势已经开始动摇。谷歌推出了三款速度更快、成本效益更高的模型，下一款前沿模型 Gemini 3.5 Pro 却仍在推迟状态。新模型能否在等待期间稳住用户和投资者，仍是未知数。部分竞争对手也开始借机嘲讽谷歌。Meta 首席 AI 官汪滔在 X 上看到一份模型排行榜后写道：“Gemini，谁啊？”该榜单把 Meta 的 Spark 模型排在谷歌本周推出的一款模型之上。OpenAI 技术人员蒂博 · 索蒂奥也疑似加入嘲讽行列。谷歌的洛根 · 基尔帕特里克在 X 上宣布，下一款重要里程碑模型 Gemini 4 已经开始预训练，索蒂奥回复道：“也希望有一天能训练完！”谷歌的延期之所以格外引人注目，是因为 OpenAI 和 Anthropic 最近几周都推出了新款顶级模型。雷蒙德詹姆斯分析师乔希 · 贝克本周发布报告称，Gemini 3.5 Pro 推迟发布，已经让外界对谷歌的印象从领跑者变成追赶者，并认为局面只是各家 AI 实验室快速变化带来的结果。与此同时，谷歌近几个季度的业务表现依然稳健。AI 技术进步为谷歌搜索、YouTube、谷歌云等业务带来了强劲增长势头。在 Token 成本不断增加的背景下，谷歌还押注速度更快、成本效益更高的模型能够成为制胜策略。IT之家从报道中获悉，也有部分用户认可谷歌对高效模型的重视。Clearfork Intelligence 创始人凯尔 · 沃克在 X 上写道：“谷歌经常因智能体编程落后而在 X 上受到批评，但 Gemini 3.5 Flash 长期以来一直是我进行智能体文档提取时的日常主力工具。在我看来，智能体文档提取是大语言模型最具价值的应用场景之一。”Moor Insights &amp; Strategy 分析师安舍尔 · 萨格在 X 上写道：“我很喜欢 Gemini，可能喜欢得有点过头，但 3.5 Pro 还没推出就开始为 Gemini 4 造势，确实有点奇怪。”他认为，谷歌为 Gemini 4 造势，相当于承认已经有了更好的产品，但当前 AI 行业近乎狂热的发展速度未必能带来真正有意义的改进。“我只是觉得，谷歌规模大得多，运作方式与竞争对手略有不同。现在断言任何一方出局都为时过早。”相关阅读：《谷歌发布三款新 AI 模型，含 Gemini 3.6 Flash、3.5 Flash Cyber》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/360.htm", "publishedAt": "2026-07-22T23:25:14+00:00"}, {"title": "OpenAI 总裁布罗克曼：Kimi K3 无疑相当不错，但我们仍有“巨大优势”", "summary": "IT之家 7 月 23 日消息，据彭博社今天（23 日）报道，OpenAI 总裁兼联合创始人格雷格 · 布罗克曼承认，月之暗面推出的 Kimi K3 已经具备相当强的竞争力，但至于月之暗面是否利用了 OpenAI 的技术成果来提升模型能力，自己尚无法确定。布罗克曼接受采访时评价几天前发布的 Kimi K3：“模型确实相当不错，毫无疑问。”不过，目前判断月之暗面是否通过“蒸馏”手段，获取 OpenAI 模型的输出结果并用于训练 Kimi K3，还为时过早。“我们一直都在监测此类行为。”据IT之家了解，月之暗面上周发布了开放权重模型 Kimi K3，并称其综合能力超过除 Anthropic Claude Fable 5 和 OpenAI GPT-5.6 之外的所有竞争对手。Kimi K3 迅速引发市场震动，也颠覆了外界长期以来对美国在全球 AI 竞争中大幅领先中国的固有判断。布罗克曼表示，部分估算认为，中国在 AI 模型开发方面可能只落后美国 4 个月，其他专家甚至认为中美之间的差距更小。随着价格更低的中国模型迅速普及，中美模型之间的能力差距不断缩小，OpenAI 和 Anthropic 的商业模式也面临更多不确定性。两家公司都在筹备上市，并努力提高来自客户的收入。布罗克曼强调，OpenAI 较早投入大量计算资源，又拥有多年 AI 研究积累，因此仍对竞争对手保持“巨大优势”。“多年来，我们一直在深入研究如何打造更高效的模型，让模型能够完成预定目标。”布罗克曼还表示，Kimi 等开放权重模型并非免费产品，认为开放权重等于免费是一种“误解”。“这些模型依然规模庞大，需要大量算力才能运行，而算力的成本并不低。真正的竞争在于，谁能打造效率最高、智能水平最强，并在单项任务上提供最佳性价比的模型。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/356.htm", "publishedAt": "2026-07-22T23:11:17+00:00"}, {"title": "苹果 Apple Store 应用有望上线“AI 购物助手”，辅助用户挑选商品", "summary": "IT之家 7 月 23 日消息，科技媒体 AppleInsider 昨日（7 月 22 日）发布博文，报道称基于 Apple Store 应用中新版隐私策略，苹果公司有望近期推出名为“虚拟购物助手”的 AI 导购助手。在新版隐私策略内容中，苹果公司详细说明“虚拟购物助手”的数据处理规则。苹果将收集并存储用户的账户信息、设备标识符、运营商信息、聊天信息，以及在用户启用时收集位置数据。IT之家援引博文介绍，在隐私边界上，苹果公司强调，本次收集的信息，仅用于个性化聊天体验、提供相关回复，并在用户选择加入后，用于改进该助手。在数据共享方面，苹果指出会将部分聊天内容共享给合作伙伴，但明确共享前会清除其中的个人标识信息。而且苹果严苛限制合作伙伴处理信息方式，仅支持合作伙伴使用此信息来帮助苹果提供对话式回复。苹果还将保存聊天记录副本，用于用户回看、商业分析，以及在用户选择加入后用于改善助手体验。偏好方面，用户可在 App 内的“账户 &gt; 设置”路径下，通过点击“聊天改进”开关控制其聊天数据是否被用于改进模型。值得注意的是，政策中提及的“合作伙伴”身份尚不明确，其是否为第三方 AI 工具仍有待观察。此前，苹果已在 Apple Support 应用中推出类似的 AI 助手，允许用户在“Ask”标签页下依据官方文档提问。政策内容中并未涉及“虚拟购物助手”的功能介绍，该媒体认为基于所收集的设备列表等数据推测，它可能帮助用户查找兼容配件，或通过对话机制辅助选购设备与配置。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/351.htm", "publishedAt": "2026-07-22T22:44:44+00:00"}, {"title": "谷歌 2026 财年第二财季归母净利润 1121.07 亿美元，同比增长 298%", "summary": "IT之家 7 月 23 日消息，谷歌今日发布 2026 财年（2026 年 1 月～2026 年 12 月）第二财季（2026 年 4 月～2026 年 6 月）报告：营业总收入：1197.96 亿美元，同比增长 24.00%毛利：738.53 亿美元，同比增长 28.69%毛利率：61.65%，同比增长 2.14 个百分点归母净利润：1121.07 亿美元，同比增长 298.00%经营现金流：390.69 亿美元，同比增长 40.80%自由现金流：-58.55 亿美元基本每股收益：9.23 美元，同比增长 296.14%稀释每股收益：9.11 美元，同比增长 294.00%资产负债率：30.53%AI 解读本次 2026 财年第二财季营收 1197.96 亿美元，高于市场一致预期的 1172 亿美元，业绩大幅超出机构预期。财报亮点汇总核心业务全线高增，Google Cloud 收入同比大涨 82%，达到 247.68 亿美元，由企业 AI 解决方案与 AI 基础设施需求驱动，增长动能显著加速。整体营业收入实现 12 个季度的双位数同比增长，本季度同比提升 24%，Constant Currency 口径同比增长 23%，基本面韧性强劲。营业利润率从 32% 扩张 2 个百分点至 34%，归母净利润同比大幅增长 298%，主要来自权益证券的未实现净收益 980 亿美元拉动。AI 产品落地进度超预期，Gemini Enterprise 已被近 90% 的财富 100 强企业使用，Gemini 模型每分钟可处理 220 亿 API 令牌，月活用户达到 9.5 亿。后续业务规划与资本动作本季度完成约 496 亿美元股权融资、203 亿美元高级无抵押票据发行，募集资金将主要用于 AI 基础设施扩容与全球算力布局，支撑 AI 业务长期投入。董事会宣布季度现金派息，A/B 系列强制可转换优先股每股派息 12.15 美元，A/B/C 类普通股每股派息 0.22 美元，开启常态化分红机制。风险提示：本文内容由 AI 自动分析生成，仅供参考，不代表IT之家观点。如有出入请以证监会指定上市公司信息披露平台为准。本文内容不构成投资建议，如有投资者据此操作，风险自担，IT之家对此不承担任何责任。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/347.htm", "publishedAt": "2026-07-22T20:07:37+00:00"}, {"title": "OpenAI承认为了偷答案，GPT-5.6 Sol 一路“杀进”生产系统：AI自主攻击时代真的来了", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/P8G7TAsIP0rkeFFLxAf0?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-22T17:46:50+00:00"}, { 拥有约 12 家制造合作伙伴，有能力实现每日生产 1000 个 Vera 机架的产能目标。基于日产能 1000 个机架估算，该业务单季度收入潜力至少可达 6300 亿美元。Vera Rubin 机架是英伟达围绕其自研 Vera CPU 和下一代 GPU 构建的集成式计算平台机架，被称为“AI 工厂”的基础构建单元，专为满足大规模 Agentic AI（智能体 AI）负载而设计。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/403.htm", "publishedAt": "2026-07-23T02:07:03+00:00"}, {"title": "NVIDIA 发布 610.82 显卡热修复驱动，解决《光环：战役进化》稳定性问题", "summary": "IT之家 7 月 23 日消息，NVIDIA（英伟达）当地时间 22 日发布了基于 Game Ready Driver 610.74 的 610.82 版本 GeForce 热修复显示驱动程序。这一版本解决了两款游戏中的问题：GeForce RTX 50 系列显卡在使用此前的 610.xx 驱动时在《光环：战役进化》中稳定性不佳；长时间以 DirectX 12 API 运行《流放之路 2》后可能会出现间歇性长卡顿。参考（含驱动程序下载链接）https://nvidia.custhelp.com/app/answers/detail/a_id/5870", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/389.htm", "publishedAt": "2026-07-23T01:23:30+00:00"}, {"title": "马斯克 Q2 电话会议两大焦点：感谢美光内存保供，回避特斯拉与 SpaceXAI 合并传闻", "summary": "北京时间 7 月 23 日，特斯拉今天发布了 2026 年第二季度财报。随后，特斯拉 CEO 埃隆 · 马斯克 (Elon Musk)、CFO 瓦布哈维 · 塔内贾 (Vaibhav Taneja) 出席了电话会议，回答了分析师的提问。以下是特斯拉第二季度财报和电话会议要点：—— 总营收为 282.36 亿美元，较上年同期的 224.96 亿美元增长 26%；归属于特斯拉普通股股东的净利润为 11.14 亿美元，较上年同期的 11.72 亿美元下降 5%。—— 特斯拉自动驾驶出租车 Cybercab 已在得州超级工厂投产。—— 在上季度买入了 20 亿美元的 SpaceX 股权后，特斯拉获得了大约 10 亿美元的未实现收益。—— 马斯克表示，今年将是“资本支出巨大的一年”，但没有给出具体金额。—— 与 FSD 一样，马斯克将 Optimus 的生产描述为一场艰苦的攻坚战，“这将是特斯拉有史以来最难扩大生产规模的产品，因为机器人身上的每一个部件都是全新的”。—— 马斯克称，将很快公布超级工厂 Terafab 的选址。—— 特斯拉 CFO 塔内贾表示，特斯拉正处于一个“大型投资周期”，并指出本季度自由现金流为负，原因是“资本支出环比增长了一倍多”，同时重申今年资本支出将超过 250 亿美元。特斯拉的自由现金流预计将持续为负，直到 2029 年。—— 马斯克特别感谢美光，称该公司为特斯拉分配了内存供应，包括未来几年的供应安排。目前，内存市场供应紧张。马斯克补充称，美光分配给特斯拉的内存芯片供应非常可观，而且价格条件合理。在当前内存芯片价格因供应紧张而处于高位的情况下，这一点尤其值得注意。—— 对于特斯拉与 SpaceX 合并的问题，马斯克表示，财报电话会议不是他可以讨论公司合并事宜的地方。—— 马斯克表示，特斯拉正计划为几乎所有配备摄像头的车辆升级下一代人工智能硬件。—— 马斯克称，将星链接入特斯拉自动驾驶出租车是必要的，以确保乘客在出行过程中始终保持稳定的蜂窝网络连接。—— 截至发稿，特斯拉股价盘后下跌 4%。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/364.htm", "publishedAt": "2026-07-22T23:53:18+00:00"}, {"title": "驱动 Agentic Enterprise：让企业上下文转化为可治理的 Agentic 行动 ｜ 技术趋势", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article l": "https://www.oschina.net/news/475987", "publishedAt": "2026-07-21T07:28:52+00:00"}, {"title": "世界杯冠军刚出炉，我让商汤 U1 Pro 做了一份全景赛况图", "summary": "所有图片都是 one shot#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672547?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-20T10:29:28+00:00"}]}, {"label": "论文研究", "items": [{"title": "AI 算力需求爆发：高端 PCB 供不应求，价格暴涨 300%", "summary": "IT之家 7 月 23 日消息，据央视财经昨日报道，受 AI 算力需求爆发带动，高端印制电路板（PCB）今年以来持续供不应求，价格大幅走高，部分 PCB 价格涨幅已超过三到四倍。PCB 是电子产品中不可或缺的核心基础件，被称为“电子产品之母”。目前，多家 PCB 生产企业的高端 PCB 生产车间均处于满负荷生产状态。有主板生产企业负责人表示，近期收到来自不同供货商的多份 PCB 涨价函，部分 PCB 价格涨幅已超过三到四倍。由于生产成本增加，其销售的主板产品价格也被动上调。据介绍，本轮 PCB 涨价主要源于 AI 算力基础设施需求的集中释放。AI 服务器所用 PCB 的层数远高于传统服务器，可达 30 层以上，高端产品达 70 至 100 层。广东远图未来科技有限公司副总裁周才庆表示，PCB 是 AI 算力基础设施中不可或缺且不可替代的核心硬件载体，贯穿 AI 服务器整机运行的全流程。图源：Pexels行业数据显示，2026 年全球 AI 服务器出货量预计突破 200 万台，同比增长 55%，直接拉动高端 PCB 需求增长超 110%。单台 AI 服务器所用 PCB 的价值量接近普通服务器的 10 倍。目前头部 PCB 厂商的订单已经锁定到 2027 年。高端 PCB 对生产工艺和原材料品质要求严苛，其核心基材为覆铜板。当前高端覆铜板同样供不应求，价格持续走高，进一步推升了 PCB 的生产成本。IT之家注：覆铜板（CCL）是 PCB 的核心原材料，AI 服务器所用高频高速覆铜板的价格可达普通 FR-4 覆铜板的 7 至 15 倍。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/355.htm", "publishedAt": "2026-07-22T23:10:42+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "海南：全面禁止 AI 自动开方、虚假问诊、事后补方等违规行为", "summary": "IT之家 7 月 23 日消息，海南省药品监督管理局 21 日发布《关于全面规范处方药零售管理的若干措施的通知》。为从严整治处方药零售行业顽疾，对标落实《处方药网络零售合规指南》等系列政策文件要求，《若干措施》应运而生。IT之家获悉，《若干措施》强化处方来源管理，严格处方审核责任。其中明确，处方药必须凭执业医师合规处方销售，全面禁止 AI 自动开方、虚假问诊、事后补方等违规行为，严禁药店委托使用存在“虚假问诊”“ AI 代开方”等违规行为的互联网医院开具处方。规范群众无处方购药的问诊开方渠道，明确实名问诊、真实诊疗的核心要求，从源头杜绝无效处方、虚假处方流入零售环节。其中提出，严格落实执业药师处方审核主体责任，明确处方审核标准，建立“医师开具 + 药师审核”双重核验机制，明令禁止未经审核售药、先售药后补方等违规操作，彻底扭转“先药后方”行业乱象。《若干措施》划定互联网售药监管红线，落实销售全流程管控。要求合作互联网医院必须具备合法执业资质，严格执行“首诊禁开方”硬性规定，严禁与存在问诊开方违规记录的机构合作，规范线上处方流转渠道。明确处方药销售凭证、发票开具、实名登记、追溯扫码上传等硬性要求，严格落实药品“一物一码、物码同追”追溯制度，严厉打击篡改系统数据、隐匿销售记录等逃避监管行为，实现处方药全链条可追溯、可监管。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/399.htm", "publishedAt": "2026-07-23T01:53:26+00:00"}, {"title": "马斯克宣布将用 AI 拍摄《奥德赛》长篇电影：全白人班底以确保符合史实，且忠于荷马艺术", "summary": "IT之家 7 月 23 日消息，埃隆 · 马斯克昨日在 X 上回复网友时表示，他准备用自家 AI 视频生成工具 Grok Imagine 在 2026 年底前制作一部完整的古希腊史诗《奥德赛》题材长篇电影。马斯克表示，这部电影将“符合史实，并忠于荷马的艺术作品”。他同时还转发了一段由 AI 生成的视频，展示了多个受《奥德赛》启发的场景。不过，马斯克并未公布该项目的具体制作方式、影片时长等信息，也没有说明 Grok Imagine 将如何在长篇电影中维持人物形象、剧情发展以及视觉风格的一致性。《奥德赛》是古希腊诗人荷马创作的史诗作品之一，讲述特洛伊战争英雄奥德修斯在战争结束后返回家乡伊萨卡的漫长旅程。该作品被认为是西方文学的重要源头之一。马斯克此前曾多次公开批评克里斯托弗 · 诺兰执导的真人电影《奥德赛》，尤其是对影片选角的批评，他曾公开反对露皮塔 · 尼永奥出演海伦一角，并对影片中的其他部分选角决定提出质疑。诺兰执导的《奥德赛》目前已经取得初步商业成功。据娱乐行业媒体报道，该片上映首周末全球票房约为 2.64 亿美元（IT之家注：现汇率约合 17.9 亿元人民币）。目前，马斯克尚未公布 Grok Imagine 制作该 AI 长片电影的更多细节，包括是否会完全由生成式 AI 完成，或是否会结合传统电影制作流程。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/391.htm", "publishedAt": "2026-07-23T01:37:04+00:00"}, {"title": "他维护了“如何编写不可维护代码”作者遗留下来的代码", "summary": "如果你的代码活了三十年还没死，最后被一个陌生人修好了，你会怎么想？ 这件事上周发生在了 Roedy Green 身上。不过他已经没法知道了，因为其本人已在 2023 年去世。 但这件事值得大家看一看。 事情起因是一个叫 lexvalo 的开发者想把自己做的 AI 应用 RiverScript 提交到一些老牌的桌面软件目录站。他很快发现了一个早已...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476776", "publishedAt": "2026-07-22T07:25:30+00:00"}, {"title": "如何在 Elasticsearch 中使用 BBQ 将 Jina v5 嵌入缩小 29 倍而不损失召回率", "summary": "一项动手测试，对 Elasticsearch 中的 BBQ 与 float32 向量索引进行了比较，测量了五种语言下的内存占用、磁盘占用以及 recall@10。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/u/3343882/blog/19725387", "publishedAt": "2026-07-22T03:23:52+00:00"}, {"title": "拒绝苹果、放弃留美：杨植麟和梁文锋的选择不止是个人的", "summary": "7 月 18 日，卡内基梅隆大学教授 Russ Salakhutdinov 在 X 上发了一条帖子，24 小时内被浏览了 134 万次。 起因是一个叫 @signulll 的用户问了一个看似简单的问题：Kimi 创始人杨植麟在 CMU 拿了 PhD，为什么不留在美国？ Salakhutdinov 是杨植麟的博士导师，也是苹果前 AI 总监。他的回复直接撕开了多年来围绕「中国 AI...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476129", "publishedAt": "2026-07-21T09:49:36+00:00"}]}]};

function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")

}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
</body>
</html>
