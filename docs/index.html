0:00"}, {"title": "再来两周：腾讯混元大模型 Hy3 限免活动延长至 8 月 5 日", "summary": "IT之家 7 月 20 日消息，腾讯公关总监张军今天在微博表示，混元大模型 Hy3 的两周限免活动接近尾声，公司收到不少用户“再来两周”的强烈呼声。为此，腾讯公司决定针对 WorkBuddy 和 CodeBuddy 用户，将 Hy3 限时免费活动延长至 8 月 5 日。据IT之家了解，腾讯混元 Hy3 模型于 7 月 6 日发布开源。Hy3 是一个快慢思考融合的模型，采用 MoE 架构，总参数 295B，激活参数 21B，最大支持 256K 上下文长度。据介绍，Hy3 基于 preview 版本进一步提升了后训练数据的质量和多样性，扩大了 RL 算力规模，在推理、智能体、长上下文等任务上显著进步，取得了比肩国内外更大尺寸旗舰模型（参数规模往往是 Hy3 的 2～5 倍）的效果。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/865.htm", "publishedAt": "2026-07-20T02:19:19+00:00"}, {"title": "把 256 张 GPU 变成一台计算机：摩尔线程 MTT C256 超节点亮相 WAIC 2026", "summary": "IT之家 7 月 20 日消息，2026 世界人工智能大会（WAIC）已于 7 月 17 日在上海揭幕。摩尔线程以“词元时代万物智能”为主题参展，系统展示了“模型训练工厂、词元生产工厂、智能体生产工厂”三大 AI 工厂。值得一提的是，摩尔线程还在本次大会上首次公开展示了 MTT C256 超节点。据介绍，在智算中心向超大规模演进的过程中，传统的网络架构面临着多层网络带来的带宽损耗与高延迟痛点。摩尔线程通过创新架构首创了一层 Scale-up 网络，将 256 张 GPU 聚合为一台数据中心级超级计算机。另外，MTT C256 超节点采用计算与交换一体化的高密设计，具备三大核心优势：极致互联：突破业界普遍的一层网络 64 卡限制，MTT C256 首次在一层 Scale-up 网络中实现 256 卡全互联。这使得卡间通信延迟被压缩至亚微秒级，带宽利用率显著提升，为大模型分布式并行策略的优化提供了更广阔的空间。高密度部署：单机柜 GPU 密度领先行业，仅通过两个标准机柜即可实现 256 卡的一层 Scale-up 极速互联，在大幅提高智算中心 GPU 部署密度的同时，有效节省了机房空间。生态与工程兼容：采用 2U 节点设计，完美兼容现有的智算软硬件生态，支持集群从万卡向十万卡级平滑扩展。IT之家注意到，摩尔线程还在现场展示了多项“国芯训国模”成果：万亿参数 MoE 模型训练：依托万卡级夸娥智算集群与夸娥 AI 训练套件（KUAE Training Suite），摩尔线程完成了从零起步的 MoE-236B 基础模型的完整训练链路，其训练语料高达 25T+。在超大规模部署下，集群有效训练时长占比超过 90%，其训练损失曲线与国际主流计算卡高度一致。多维世界模型原生训练：支撑了北京大学 EvoPhys 团队首个全球 5D 世界模型 EvoPhys-World 的全栈原生训练，全程由 MUSA 软件栈提供底层支撑，验证了系统在复杂视觉生成与物理模拟任务中的扩展性。具身智能大脑训练：依托北京智源研究院 FlagOS-Robo 框架，双方基于摩尔线程 MTT S5000 千卡集群，完成了通用具身大脑模型 RoboBrain 2.5 的全流程训练，验证了国产算力集群在具身智能训练场景中的高效可用性。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/856.htm", "publishedAt": "2026-07-20T02:02:59+00:00"}, {"title": ":trophy: 腾讯 APIJSON 8.2 :rocket: StarRocks 🧠 AI Skills, MCP", "summary": "腾讯 APIJSON 是一种专为 API 而生的 JSON 网络传输协议 以及 基于这套协议实现的 ORM 库。 为各种增删改查提供了完全自动化的万能 API，零代码实时满足千变万化的各种新增和变更需求。 能大幅降低开发和沟通成本，简化开发流程，缩短开发周期。适合中小型前后端分离的项目。 自 2016 年 11 月开源 9 年多来发展迅速，目...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/474824", "publishedAt": "2026-07-20T02:01:49+00:00"}, {"title": "DataBuff v0.1.4 发布 · 7 大 AI 运维能力", "summary": "DataBuff 是一款面向云原生与微服务场景的开源 AI Native OpenTelemetry APM，采用 OTLP 标准接入、Apache Doris 统一存储、Web Platform 提供拓扑 / Trace / 指标与多 Agent 排障能力。项目已在 OSCHINA 软件库收录，软件主页：https://www.oschina.net/p/databuff 今天，DataBuff 正式发布 v0.1.4（2026-07-19）。相对...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/474811/databuff-0-1-4-released", "publishedAt": "2026-07-20T01:34:15+00:00"}, {"title": "爱芯元智揭晓元曦系列大算力产品，A 系列 AI 推理卡算力超 1000TOPS", "summary": "IT之家 7 月 20 日消息，爱芯元智 (AXERA) 在 WAIC 2026 上揭晓了其全新元曦系列大算力产品线。该产品线品专攻机房集群、多路视频分析、私有化知识库等高并发高负载场景，基于其自研爱芯通元混合精度 NPU 架构。其中 A 系列 AI 推理卡拥有搭载超 1000TOPS 的推理算力，同时能提供超大显存与超高显存带宽。该新品与已规模化落地的 M.2 算力卡、标准化核心模组形成边缘算力矩阵，实现企业 AI 规模化落地的降本、提效、合规。爱芯元智还带来了其具身智能大脑控制器。该产品拥有 1500TOPS 算力与约 2 倍行业领先的带宽，开发生态系统支持自定义算子开发，原生兼容世界模型、VLA，能够为通用机器人打造出一套高性能、高安全、高灵活的智能计算中枢。此外还有与大脑控制器配套的视觉感知芯片 AX8910。这一产品目前已实现规模化落地，成功搭载至多家行业头部方案商双目相机产品，并广泛适配各类商用、服务型机器人终端。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/841.htm", "publishedAt": "2026-07-20T01:33:16+00:00"}, {"title": "消息称鸿蒙智行问界 M8 改款车型将启小订，升级内容非常多", "summary": "IT之家 7 月 20 日消息，据博主 @爱叨叨的Steven 透露，鸿蒙智行问界 M8 改款车型将开启小订。博主表示，升级内容非常多。据IT之家此前报道，工信部发布第 409 批《道路机动车辆生产企业及产品公告》新产品公示，问界 M8 新车完成申报，包括三款车型，分别是问界 M8 增程磷酸铁锂版、问界 M8 增程三元锂版和问界 M8 纯电版。三款车型车身尺寸保持一致，长宽高均为 5190 / 1999 / 1795mm，轴距 3105mm，提供 5 座、6 座版本可选，最高车速同为 200km/h。三元锂增程版动力参数与磷酸铁锂版本保持一致，WLTC 燃料消耗量为 0.18 L/100km、 0.22 L/100km。问界 M8 纯电版整备质量 2745 / 2820kg，总质量 3270kg，同样采用前后双电机布局，前电机额定功率 62kW、峰值功率 160kW，后电机额定功率 73kW、峰值功率 227kW。三款问界 M8 车型均允许外接充电，可选装轮辋造型、侧脚踏板、ETC 车载装置，同样配备汽车事件数据记录系统（EDR），ABS 系统控制器均由博世汽车部件（苏州）有限公司提供。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/826.htm", "publishedAt": "2026-07-20T00:18:46+00:00"}, {"title": "月之暗面 Kimi：暂停 C 端新用户订阅，保障已订阅用户的全部权益不受影响", "summary": "IT之家 7 月 19 日消息，月之暗面 Kimi 今日发布公告，为了保障已有订阅用户的体验，决定即日起，暂停 C 端新用户订阅，将已有算力全部投入于服务已订阅用户，保障已订阅用户的全部权益不受影响。IT之家附原文如下：致 Kimi 用户：关于算力紧缺与会员暂停开放的说明尊敬的 Kimi 用户：自 KimiK3 发布以来，我们收获了远超预期的支持，但也面临始料未及的算力挑战。过去 48 小时，用户请求量已大幅超出我们的预估，并且逼近现有集群的承载极限。为了保障已有订阅用户的体验，我们决定即日起，暂停 C 端新用户订阅，将已有算力全部投入于服务已订阅用户，保障已订阅用户的全部权益不受影响。同时，我们已在全速推进算力扩容。随着新算力陆续到位，我们将逐步开放更多订阅名额直至全面恢复正常订阅。对于后续新订阅用户，我们将拆分 Kimi 主权益 (包含 KimiWeb，Kimi App，Kimi Work) 和 Kimi Code 权益，以方便更精准匹配算力，保障用户体验。我们向满怀期待、却没能获得期待中体验的朋友郑重道歉，也对给予我们理解和包容的朋友深表谢意。Kimi 团队2026 年 7 月 19 日月之暗面于 7 月 16 日上线推出 Kimi K3 模型，是 Kimi 迄今能力最强的模型，拥有 2.8 万亿参数，100 万 Tokens 上下文，主要面向长程编程与端到端知识工作。价格方面，基于 Kimi 开放平台公示的信息，Kimi K3 模型（调用名称为 kimi-k3）采用按量计费标准：每 100 万 Tokens 输入费用为 2 元（缓存命中）每 100 万 Tokens 输入费用为 20 元（缓存未命中）每 100 万 Tokens 输出费用为 100 元Kimi 总裁张予彤昨日（7 月 18 日）在朋友圈表示，该模型拥有 2.8 万亿参数，并将于近日开放权重。数据显示，在 7 月 17 日 K3 发布节点，年化收入（ARR）从平缓波动区间陡然冲高，创下历史最大单日增幅。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/808.htm", "publishedAt": "2026-07-19T15:08:04+00:00"}, {"title": "微星更新电竞显示器阵容：27 英寸 2K 320Hz“MAG 274QPF X32”、31.5 英寸 2K 180Hz 曲面“MAG 325CQPF E18”", "summary": "IT之家 7 月 19 日消息，微星宣布更新 MAG 系列显示器产品线，推出“MAG 274QPF X32”和“MAG 325CQPF E18”两款电竞显示器，IT之家整理参数如下：MAG 274QPF X32该机配备一块 27 英寸 2560x1440 分辨率 320Hz Rapid IPS 面板，GtG 响应速度 0.5ms，SDR / HDR 亮度分别为 300/400 尼特，典型对比度为 1000:1，显示器支持 10-Bit 色彩（8-Bit + FRC），覆盖 95% Adobe RGB、97% DCI-P3 色域。该机支架支持升降 / 倾斜 / 俯仰 / 旋转，显示器本体支持 VESA 100x100mm 壁挂，配备了一个 DisplayPort 1.4a 接口、两个 HDMI 2.1 接口、以及一个 3.5mm 耳机接口。MAG 325CQPF E18该机配备一块 31.5 英寸 2560x1440 分辨率 180Hz Rapid VA 面板，曲率为 1000R，GtG 响应速度 0.5ms，SDR 亮度为 300 尼特，典型对比度为 1000:1，显示器支持 10-Bit 色彩（8-Bit + FRC），覆盖 85% Adobe RGB、85% DCI-P3 色域。该机支架支持升降 / 俯仰 / 旋转，显示器本体支持 VESA 100x100mm 壁挂，配备了一个 DisplayPort 1.4a 接口、两个 HDMI 2.0b 接口、以及一个 3.5mm 耳机接口。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/804.htm", "publishedAt": "2026-07-19T14:23:47+00:00"}, {"title": "千里科技在 WAIC 公布多项进展：阶跃 Step AOS 将应用于汽车，年底推 ASD 5.0", "summary": "IT之家 7 月 19 日消息，在 2026 世界人工智能大会（WAIC 2026）举办期间，千里科技公布多项项目进展。千里科技公布了未来 ASD 4.1 版本技术预览，聚焦三项突破：其一，实现零断点的全场景 D2D 通行 —— 从地库到地面、从城区到乡镇，一键导航直达；其二，依托物理 AI 大模型，深度语义理解带来识别能力的全面升级，对小动物、特殊车辆及需特别关注人群采取更优交互策略；其三，舱驾深度融合，语音直接控车，车辆主动理解意图并执行。千里科技进一步透露，计划于年底推出的 ASD 5.0 版本。在操作系统层面，阶跃星辰日前发布智能体原生操作系统 Step AOS，千里科技同步宣布将其应用于汽车领域。Step AOS 具备记忆、决策与执行、安全三大核心特征，将模型能力与终端能力深度打通，能将包括汽车在内的硬件与原有系统的全部能力，转化为智能体可直接调用的算力、可理解的数据和可调用的资源，用户只需表达任务意图，全链路由智能体自主完成。IT之家注意到，本次 WAIC，千里科技联合吉利、阶跃星辰共同研发的汽车“超级智能体”—— 超级 Eva 亮相阶跃展台，该超级智能体以阶跃星辰最新发布的 Agentic 模型 Step 3.7 Flash 为核心执行大脑。千里科技联合阶跃星辰共同研发的超级智能体，具备类人自然交互、多语种支持能力，可将用户提出的模糊出行需求自动转化为导航路径规划，并打通智驾全程。同时，在通用交互、出行场景打通的基础上，新增视觉交互模块，支持本地生活服务调用，可自动唤起对应小程序完成点单订票等操作。据悉，这款搭载在极氪 8X 上的汽车智能体已于今年 3 月上线，后续还将逐步拓展至其他合作品牌的适配车型。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/803.htm", "publishedAt": "2026-07-19T14:18:48+00:00"}, {"title": "HKC 猎鹰“27U165A”27 英寸显示器发售：4K 165Hz/1080P 320Hz 双模，1899 元", "summary": "IT之家 7 月 19 日消息，HKC 旗下猎鹰“27U165A”27 英寸双模显示器将于明天 0 点在京东开启首销，定价 1899 元，部分地区国补后到手价低至 1599 元。这款显示器支持 4K 165Hz / 1080P 320Hz 双模切换，搭载了一块 27 英寸 Fast IPS 电竞面板，通过 VESA HDR 400 认证，色域覆盖 95% DCI-P3，色准 ΔE≤2。HKC 猎鹰 27U165A 配备 1 个 DP 2.1 接口（ 54Gbps 带宽）+ 2 个 HDMI 2.1 接口；配备人体工学支架，支持 100mm 升降、-5°~20° 俯仰调节、±90° 垂直旋转；底座采用六边形小巧设计，占地面积更小。IT之家附详细参数如下：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/800.htm", "publishedAt": "2026-07-19T14:00:14+00:00"}, {"title": "总部设上海，世界人工智能合作组织未来将鼓励共建开源生态", "summary": "IT之家 7 月 19 日消息，据央视新闻今日报道，《关于成立世界人工智能合作组织的协定》签署仪式 16 日在上海举行，来自亚洲、非洲、拉美和欧洲的 29 个国家现场签署协定，成为创始成员国。记者从有关方面获悉，这标志着中方倡导推动成立世界人工智能合作组织取得重要阶段性进展。下阶段，中方将会同合作组织创始成员国推动组织尽早启动运转。未来合作组织将重点开展三方面工作。一是把加强人工智能能力建设国际合作作为优先事项，通过政策交流、技术合作、人员培训、联合研究等方式，促进人工智能技术和服务的可及性，持续释放智能红利，确保发展中国家在新一轮智能浪潮中平等受益。二是在开展沟通对话、建立政策共识、分享最佳实践的基础上，切实发挥供需对接平台作用，推动各国优势资源深度融合互补，结合各国国情推进“人工智能 +”行动，加强科技和产业合作，鼓励共建开源生态，打造一批接地气、可触达的务实合作成果。三是致力于坚定捍卫联合国宪章宗旨和原则，支持更好地发挥联合国作用，落实《全球数字契约》和联合国可持续发展目标，在人工智能领域推动构建公正合理的全球治理体系。据了解，16 日签署的协定包括组织宗旨、基本原则、职能、组织架构、决策程序、成员资格等具体内容，为组织正式成立和后续运转奠定坚实政治共识和法律基础。合作组织是国际交流合作平台，加入合作组织不影响各国与第三方开展合作，也不会给各国人工智能发展带来不必要的约束和限制。合作组织成员国将秉持主权平等、相互尊重、协商共建原则，未来将与联合国等国际和区域组织探讨合作，共同推动人工智能向善普惠发展。IT之家注意到，2025 年 7 月 26 日，中国政府倡议成立世界人工智能合作组织。这是中方坚持践行多边主义、推动共商共建共享全球治理的重要举措，也是中方响应全球南方呼声、助力弥合数字和智能鸿沟、促进人工智能向善普惠发展的实际行动。值得一提的是，世界人工智能合作组织总部设在中国上海。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/797.htm", "publishedAt": "2026-07-19T13:50:45+00:00"}, {"title": "面壁智能发布端侧模型 MiniCPM5-2B，AA-Index 榜单 4B 以下性能第一", "summary": "IT之家 7 月 19 日消息，面壁智能今日联合 OpenBMB 在 2026 世界人工智能大会上发布了最新端侧模型 MiniCPM5-2B，并完成多款芯片适配。官方表示，在最新的 Artificial Analysis（AA）榜单评测中，MiniCPM5-2B 以 17 分的成绩占据榜首，取得了全球 4B 以下模型的最高得分。据介绍，MiniCPM5-2B 模型原生支持混合思考，可在快速响应与深度推理之间灵活切换，同时提供 512K 超长上下文窗口，单次可处理整本长篇小说或数十万行代码。能力维度覆盖通用知识、数学与代码推理、复杂指令遵循、多语言理解与生成、长文本处理、工具调用及深度搜索，形成当前 4B 以下最为完整的任务覆盖。MiniCPM5-2B 原生具备工具调用、深度搜索和代码生成等智能体核心能力。训练阶段先后执行 200B 规模的 Agent Midtraining、百万条高质量轨迹的 Agent SFT 以及可扩展的 Agent RL 对齐优化，确保智能体行为稳定可靠。这一设计使得模型可直接作为端侧智能体基座，为手机、PC、智能座舱等设备上的本地化 AI 助手构建提供支撑。IT之家获悉，面壁智能已完成对 AMD、英特尔、联发科、高通（按英文首字母排序）等全球主流芯片厂商的端侧模型适配。此外，MiniCPM5-2B 联合众智 FlagOS 社区，完成了 9 款芯片的 Day0 适配；覆盖华为昇腾、海光、昆仑芯、沐曦、摩尔线程、平头哥、清微智能、天数智芯、英伟达，并延伸至 ARM 端侧平台。官方表示，在不久的将来，MiniCPM5-2B 将正式开源，开发者可通过 Hugging Face、魔搭等平台获取模型权重，同时可获取针对各芯片平台的适配镜像与部署指南。相关阅读：《面壁智能开源 MiniCPM5-1B：在 AA-Index 上超越所有 2B 参数以下模型，能跑在手机、浏览器上》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/796.htm", "publishedAt": "2026-07-19T13:40:52+00:00"}, {"title": "先办牌照再造车，央视曝光非标电动车黑灰产链条", "summary": "IT之家 7 月 19 日消息，据央视新闻今日报道，去年 9 月，电动自行车安全技术新国标正式落地实施。新国标通过防篡改等多重硬件设计，从源头上最大限度限制了车辆违规改装和提速，目的是减少交通意外事故的发生。然而近期，记者接到线索，部分电动自行车专卖店、生产企业依然在暗中违规生产、销售超出国家标准的电动自行车。报道称，浙江台州是我国电动自行车核心生产基地之一，这里聚集了四十多家制造企业，各种品牌专卖店随处可见。在台州的一家绿佳电动自行车专卖店，记者发现，一辆辆外观崭新、仪表盘显示里程为“零公里”的新车却摆放在二手电动车区域，进行公开销售。浙江省台州市绿佳电动自行车某专卖店销售人员介绍，去年把车都上好了牌照，车子都是新的。每辆车都有牌照了，所以是二手车。记者还走访了爱玛、钻豹等多家电动自行车品牌专卖店，发现这种将“零公里”新车挂牌作为“二手车”销售的情况，在当地并非个别现象。多位销售人员透露，赶在新国标实施前，各家专卖店利用各种渠道搜集到的身份证信息，提前办理了大量电动自行车车牌。记者在一家钻豹专卖店调查时发现，电动自行车的产品合格证上，赫然注明的生产日期是今年 3 月 17 日。然而，该车车牌早在去年就已经办理完毕。也就是说，在车辆实际生产之前，它就已经拥有了车牌。原来，这些所谓的二手车很多不是“库存积压车”，而是经销商和生产厂家约定，先制作出电动自行车的车架号、合格证，然后再按需生产的新车。记者在这家钻豹专卖店调查时发现，这辆电动自行车暗藏着三个速度挡位。记者发现，这辆电动车虽然时速可以达到 50 公里以上，但仪表盘上始终显示为 25 公里每小时。销售人员透露，这些车辆在业内被称为“非标车”。速度、电压、重量等技术参数均不符合现行新国标，出厂时就预留了改装“后门”。记者发现，这些所谓“二手车”的价格反而比同厂同款、合乎国标要求的新车还要贵了 400 多元。记者先后对浙江台州三十多家电动自行车专卖店调查发现，绿佳、钻豹等主流品牌普遍存在限速超标、超重以及其他改装等问题。在浙江台州一家钻豹专卖店，一位消费者花 2000 多元钱购买了一辆“零公里二手车”，记者记录了整个办理牌照的过程。销售人员介绍，这辆电动自行车时速能够达到 50 公里、电压可以同时兼容 48 伏、60 伏和 72 伏，但他们仍可以通过一些“特殊”的办法，正常上牌、过户。按照国家标准，使用铅酸蓄电池的电动自行车整车质量不得超过 63 公斤。记者看到，销售人员登记核验时使用的并不是消费者购买的车辆，而是换了一辆颜色、款式相同的车辆，推到地秤上进行核验。记者发现，这辆用来核验的车，只有 4 块电池，没有尾架尾箱等配件，秤上显示为 62 公斤，完全符合核验要求。销售人员介绍，实际上消费者购买的这辆车使用的是 5 块电池，电压可以达到 60 伏，还包含尾箱尾架等配件。通过以上操作，这辆原本禁止上路的超标电动自行车堂而皇之地完成了档案录入，顺利卖给消费者。提前做出车架号、合格证，办理电动自行车牌照，再根据市场需要安排生产超出国家标准的电动自行车，这种逆向操作给行业监管埋下极大的隐患。那么，超出标准的电动自行车究竟是怎样制造出来的？记者对浙江台州的电动自行车生产企业展开调查。记者随后来到浙江钻豹电动车股份有限公司，这家企业年产电动车超 100 万辆，全国门店达 6300 多家。记者调查发现，这家大型车企生产的不少电动自行车，时速都达到 50 公里以上，行业内把这种车型称作“外卖车”。名为电动自行车，核心配置却与电动摩托车几乎一样。出于安全考量，国家标准严格限定电动自行车标称电压不得超过 48 伏，目的是从硬件层面限制整车动力输出，限制车速，减少安全隐患。但当地不少车企普遍推出 48 伏、60 伏、72 伏通用车型，业内俗称“三通”。记者调查发现，这家企业目前还在生产“非标”电动自行车。据了解，60 伏、72 伏车型已经属于电动轻便摩托车和电动摩托车范畴。由于电机功率与转速更大，车辆行驶速度更快，必须按机动车进行管理，驾驶人必须持机动车驾照才能上路行驶。记者随后又来到浙江台州的另外一家电动自行车企业 —— 绿佳车业科技股份有限公司，这家企业电动自行车年销量约 200 万辆，位列行业前十强。然而，记者调查发现，虽然“非标车”早已被禁止生产销售，但他们仍能接到“非标车”订单。调查中记者发现，一些非标车所使用的较高功率的电机均来自当地知名的电机制造企业。这家企业相关负责人介绍，适配 60 伏、72 伏的高压电机成了不少电动自行车产品的标配。据业内人士透露，电机是动力核心，控制器则是速度开关。记者随后走访了当地多家控制器生产厂家，发现他们都是根据电动自行车企业的需求，专门生产可破解限速的产品。IT之家注意到，《电动自行车安全技术规范》（GB 17761—2024）自 2025 年 9 月 1 日正式实施。2025 年 9 月 1 日起，不得生产、出厂不符合新国标要求、未依据新国标取得 CCC 认证的电动自行车。本次发布的新标准主要从以下几方面进行了修改和完善：一是强化了非金属材料防火阻燃要求，针对弹性软垫材料、纺织品、皮革、电气回路导线等不同类别非金属部件分别规定了防火阻燃指标。二是明确了电动自行车使用塑料的总质量不应超过整车质量的 5.5%。三是增加了电动机低速运行转矩、空载反电动势、电感值差异系数的要求。四是完善了电池组、控制器、限速器的防篡改要求，增加了 6 类防篡改检查方法示例。五是提升了制动性能要求，减小了车辆最大制动距离。六是将使用铅酸蓄电池的电动自行车整车质量上限由 55kg 提升到 63 kg。七是新增了企业质量保证能力和产品一致性要求，明确了生产企业应具有与电动自行车整车产能相匹配的整车及车架等主要零部件的生产能力、检测能力和质量控制能力。八是要求电动自行车具备北斗定位，通信与动态安全监测功能，其中对于除城市物流、商业租赁等经营性用途之外的电动自行车，在销售时可由消费者选择是否保留北斗定位模块。九是不再强制要求所有车型均安装脚踏骑行装置，改为由生产企业根据车型的实际需要设计和安装。十是明确了电动自行车鼓励安装后视镜。十一是要求生产企业明确电动自行车的建议使用年限，并在铭牌、产品合格证上进行标注。根据相关规定，2025 年 8 月 31 日及之前按照旧标准生产的车辆 3 个月的销售过渡期，允许销售至 2025 年 11 月 30 日；2025 年 12 月 1 日之后，所有销售的电动自行车产品均必须符合新标准规定。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/795.htm", "publishedAt": "2026-07-19T13:28:58+00:00"}, {"title": "重力星球推出瓦 75 LITE 夜隐电竞磁轴键盘，422 元", "summary": "IT之家 7 月 19 日消息，重力星球瓦 75 LITE 夜隐电竞磁轴键盘今晚正式开售，售价 422 元。这款键盘采用镂空骨骼设计，为单模有线键盘；全键支持 8K 扫描率、单键支持 64K 扫描率，输入延迟 0.25ms；搭载星磁轴，号称专为电竞实战调校，RT 精度 0.01mm。这款键盘拥有 16 种 RGB 动态灯效、约 1600 万色全彩 RGB 灯光；采用铝定位板、PORON 夹心棉、IXPE 棉轴下垫、PCB、PORON 底棉、硅胶底棉等多层填充。IT之家附详细参数如下：京东重力星球瓦 75 LITE 夜隐磁轴键盘 422 元直达链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/794.htm", "publishedAt": "2026-07-19T13:28:09+00:00"}, {"title": "国内首台水下布料刮平一体化整平设备投入使用", "summary": "IT之家 7 月 19 日消息，据中国水运报消息，由中交二航局自主研发的国内首台水下布料刮平一体化整平设备在广东深汕特别合作区小漠国际物流港防波堤一期工程投入使用，标志着我国基床整平装备正从大型整平船、自升式平台向轻量化、模块化的一体化水下整平设备转型。深汕特别合作区小漠国际物流港防波堤一期工程是国内在建最长单体沉箱直立式防波堤，总长近 3.7 公里，需完成约 70 万立方米抛石作业，水下基床整平面积超过 10 万平方米。基床表面平整度直接决定沉箱安装精度与稳定性，是防波堤施工的关键工序。IT之家从报道获悉，传统人工整平工艺需吊机辅助、潜水员水下作业，存在操作繁琐、耗时长、安全风险高等问题。同时，项目地处开敞涌浪海域，平均波高 1 米以上，台风、强对流、寒潮等极端天气频发，施工窗口严重受限。此次小漠港项目投用的水下整平设备总长 28.3 米、总宽 12.3 米，重约 48 吨，配备四台液压油缸支腿、高精度倾角仪及基于实时动态载波相位差分技术的水下测量装置。设备通过输料螺旋将石料均匀铺满，再由行走小车底部刮刀将碎石垫层刮平；配套专属数智化操控平台，预设施工基准参数与自动化作业路径，整平设备入水后即可全自动行走、精准刮平作业面，其工效相较于传统人工作业实现翻倍提升，施工允许作业波高提升 60%。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/790.htm", "publishedAt": "2026-07-19T13:06:43+00:00"}, {"title": "艾湃电竞推出新款 MST 系列白金全模组电源：提供 850/1200W 版本，639 元起", "summary": "IT之家 7 月 19 日消息，艾湃电竞现已在京东上架新款 MST 系列白金全模组电源，目前在售 850W 和 1200W 版本，定价为 639 元起，IT之家整理价格信息：850W 黑色：639 元850W 白色：659 元1200W 黑色：879 元1200W 白色：899 元京东艾湃电竞 MST 系列白金全模组电源 639 元起直达链接系列电源取得 80 PLUS 白金认证，配备 12V-2x6PCIe 接口，符合标准英特尔 ATX 3.1 与 PCIe 5.1 电源设计规范，电源整体使用“LLC 谐振 + DC - DC 设计”，采用全日系电容，匹配 120mm 双滚珠轴承风扇。系列电源附带扁平线材，提供风扇智能 ECO 模式开关，提供过功率保护（OPP）、过压保护（OVP）、欠压保护（UVP）、过电流保护（OCP）、过温保护（OTP）、短路保护（SCP），提供 10 年质保。IT之家附产品参数：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/784.htm", "publishedAt": "2026-07-19T12:30:31+00:00"}, {"title": "从大模型到 AI 执行系统：构建企业级可控 Agent 体系｜AICon深圳", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/eTGhBWBHXum6AuVU45Ab?utm_source=rss&amp;utm_medium=article", "publishedAt": 条。该车尺寸为 5118 (5185)×2050×1898mm、轴距 3040mm。申报信息显示，神行者 8 有望推出 Pro、Max、Max+ 等多个配置版本。在智能座舱与智能驾驶领域，神行者 8 由 FREELANDER 神行者联合华为、宁德时代、高通三方深度协同开发，全系搭载高通骁龙 8397 车规级芯片。据官方数据，该芯片相较上一代 8295 平台，CPU 算力提升 3 倍，GPU 算力提升近 3 倍，NPU 算力更是实现 12 倍跃升。IT之家注意到，智能驾驶方面，新车全系标配华为乾崑智驾 ADS 4.1 系统，并支持向下一代系统升级。感知硬件层面，神行者 8 也配备了 896 线激光雷达。这款定位高端越野的新能源 SUV 预计将于 2026 年下半年正式投放市场。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/895.htm", "publishedAt": "2026-07-20T02:29:47+00:00"}, {"title": "保护关键数据资产免受域外影响：空中客车授予 Scaleway 主权云合同", "summary": "IT之家 7 月 20 日消息，欧洲云与人工智能服务供应商 Scaleway 当地时间 16 日表示，空中客车 (Airbus) 选择其为公司主权云服务供应商。Scaleway 将为空中客车那些对治理、韧性和法律保护提出最高级别要求的工作负载提供云基础设施，并支持特定企业应用程序的现代化、人工智能化改造。与此同时，非欧盟服务供应商仍是空中客车多云架构的一部分。Scaleway 将提供一个基于欧洲基础设施与开放技术、具有无缝互操作性的可信自主云平台，为飞机设计、工程、制造和企业运营等关键业务应用提供支持，加强空客对其知识产权和工业数据的保护。空中客车数字业务执行副总裁 Catherine Jestin 表示：此次合作标志着我们在履行对欧洲数字主权的更广泛承诺方面迈出了重要一步。通过整合一个值得信赖的高性能云环境，保护我们的关键数据资产免受外国域外法律的侵害，我们确保了我们的数字基础设施能够与航空航天领域的创新保持同步，同时维持我们工业运营的控制力和韧性。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/851.htm", "publishedAt": "2026-07-20T01:50:12+00:00"}, {"title": "鸿海首度夺下 SpaceX AI 服务器代工订单，总价高达 520 亿美元", "summary": "IT之家 7 月 20 日消息，据中国台湾地区媒体《经济日报》今天报道，鸿海首度夺下 SpaceX AI 服务器代工订单。据悉，SpaceX CEO 埃隆 · 马斯克计划新建超 1.3 万个机柜的英伟达 GB300 服务器，以单机柜 400 万美元（IT之家注：现汇率约合 2712.4 万元人民币）估算，其价值高达 520 亿美元（现汇率约合 3526.07 亿元人民币）。截至 2026 年 5 月，SpaceX 的 Colossus 1 数据中心已部署超 22 万颗英伟达 GPU，包括 H100、H200 以及约 3 万颗 GB200 AI 加速器。而 Colossus 2 数据中心目前已拥有超 55 万颗 GPU，主要由英伟达 GB200 及 GB300 组成。此外，鸿海预计将于今年四季度向 SpaceX 交付 AI 服务器。鸿海也凭借这笔订单，成功打破戴尔、超微长期垄断 AI 服务器局面。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/843.htm", "publishedAt": "2026-07-20T01:34:49+00:00"}, {"title": "全球首款半人马机器人在上海问世", "summary": "IT之家 7 月 20 日消息，在上周末的 2026 世界人工智能大会（WAIC）现场，润科具能发布了全球首款半人马机器人。姓名：“半人马”轮足复合机器人定位：自主巡检、消防应急抢险，针对特定场景深度定制的特种“选手”核心技能：轮式速度 + 足式高通过性，具备全地形高效移动能力平均负载达 100-120kg，极限静态负载可达 210kg，远超传统四足机器人平台扩展性极强，可统一嫁接双臂、灵巧手、多维力传感器等上半身形态使用场景：炼钢、矿山、野外、应急救援以及太空等人类不宜去的特种场景润科具能介绍称，它的上半身保留了双臂的自由度，可以像人一样抓取、拧转、操作工具；下半身则采用四轮足构型，融合了轮式的速度与足式的高通过性。在平地可以快速行进，而对于上下坡、台阶、崎岖山路、冰雪等路面都能稳稳通过。半人马机器人搭载了自主研发的端到端环境感知系统，融合激光雷达、双目视觉与深度相机，实时构建对周围环境的全域理解。它能够精准识别高温管线、阀门仪表、障碍物及人员，判断其位置与状态，自主规划路径、避障绕行、锁定作业目标，实现从感知到决策的无缝闭环。这套系统还将在持续作业中不断进化。在负载能力上，它的平均负载达 100-120kg，极限静态负载可达 210kg，足以扛起各类工具与设备。它既能自主巡检、侦察、监测，发现问题后还能通过远程遥操直接上手处置 —— 清理障碍、关闭阀门、搬运物资、检修设备，统统不在话下。整体系统按照防爆等级设计，能够胜任炼钢高温场景、油田长程巡检、核工业辐射区作业，以及消防应急抢险。IT之家注：上海润科具能科技有限公司成立于 2025 年，由润阳科技与傅利叶共同持股，总部位于上海张江机器人谷，为特种场景提供机器人解决方案。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/833.htm", "publishedAt": "2026-07-20T00:54:37+00:00"}, {"title": ":fire::fire:Skyeye 云零代码智能制造系统 - v3.19.13 发布", "summary": "Skyeye 云智能制造，智能制造一体化，采用 SpringBoot+ UNI-APP + Ant Design Vue 的零代码平台开发模式。包含 100 多种电子流程，CRM、PM、ERP、MES、ADM、OA、EHR、AI、项目、商城、财务、多班次考勤、薪资、招聘、云售后、论坛、问卷、报表设计、工作流、Saas 等功能。打造全网首套零代码、功能最全的智能制造行业供应...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/474789", "publishedAt": "2026-07-20T00:50:54+00:00"}, {"title": "消息称苹果天才吧测试“Live Notes”系统，可记录直营店员工与顾客之间的对话", "summary": "IT之家 7 月 20 日消息，据彭博社记者马克 · 古尔曼昨日爆料，苹果正在部分直营店的天才吧（Genius Bar）系统测试“Live Notes”系统，可利用人工智能记录员工与顾客之间的服务对话。▲ 图源：苹果IT之家从原报道获悉，这套系统允许 Apple Store 员工“使用 AI 工具记录服务过程，并将他们与顾客的对话进行转录和总结”。随后，这些对话记录将保存到苹果内网的天才吧系统。据悉，苹果推出这套系统的目的是让员工将更多精力放在服务客户上，而不是在服务时忙于低头记笔记。不过古尔曼透露，部分 Apple Store 员工对这项服务表达担忧：“他们担心这些录音未来可能会用于指导员工，甚至成为绩效考核的一部分。据苹果所述，该系统本身无法保存录音，管理人员也无法查看对话内容。员工在将转录文本和摘要保存在内网之前，可以对两者进行编辑。”截至目前，苹果并未强制使用这套系统。目前尚不清楚，苹果是否会将该系统推广至更多直营店、或是在未来强制使用。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/820.htm", "publishedAt": "2026-07-19T23:19:07+00:00"}, {"title": "深空矩阵发布“星环计划”，第一阶段目标部署约 210 颗卫星", "summary": "IT之家 7 月 19 日消息，深空矩阵在 2026 世界人工智能大会上，发布面向太空 AI 算力产业化落地的系统性星座方案“星环计划”。官方公众号显示，深空矩阵位于北京，致力于构建超大规模星群协同的太空 AI 算力基础设施。深空矩阵创始人兼 CEO 张伟杰表示，AI 竞争最终会落到算力竞争。而随着大规模 AI 智能体落地，传统地面算力体系将面临电力、土地、建设周期、散热、网络与基础设施承载能力的多重约束。因此，算力上天已经不再只是前沿想象，而是 AI 智能体时代必须被严肃对待的产业刚需。官方表示，星环计划第一阶段目标，是以约 210 颗卫星构建低轨遥算一体化验证星座，后续扩容后可将全球覆盖率提升至约 99.8%，并实现 5-10 分钟区域准重访，满足重点区域高频动态监测和动态目标跟踪需求。IT之家获悉，在轨道体系设计上，所有卫星统一采用 450 公里核心轨道高度，以提升产业适配性，并实现对 500 至 800 公里主流商用遥感卫星作业范围的兼容覆盖。官方公布了五步的演进路径，将经历从验证星座、互联协同、节点成环到算力扩容的连续过程，未来可拓展至数千至数万颗卫星规模：建设先期通遥算（通信、遥感、算力）规模化验证星座实现跨层卫星算力互联协同通过智算卫星持续发射补充，让太空算力节点逐步组网成环推动智算轨道星环逐步扩展，太空智能算力持续扩容形成晨昏算力轨道协同覆盖", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/806.htm", "publishedAt": "2026-07-19T14:44:50+00:00"}, {"title": "科幻 Roguelike 卡牌游戏《穿雾列车》登陆 Steam，首发价 44.25 元", "summary": "IT之家 7 月 19 日消息，由 Mad Cookies Studio 开发、独立游戏发行商 Hooded Horse 发行的科幻类 Rogue 卡牌构筑游戏《穿雾列车（Fogpiercer）》今日正式登陆 Steam 平台。IT之家附游戏商品页（https://store.steampowered.com/app/3219010/_Fogpiercer/?l=schinese&amp;cc=cn）。本作国区原价 59 元，目前 25% 折扣，折后价为 44.25 元，首发优惠截止至 7 月 31 日；同时官方还提供捆绑包优惠，购买对应捆绑包可享额外折扣。游戏支持简体中文界面与字幕，同时提供 Steam 成就、云存档、集换式卡牌等功能，完整支持控制器操作。致命的迷雾压城而来，人们的未来就掌握在你的手中了！组装属于你的火车，选择铺路火车头，在强盗肆虐的世界里，铺设未来轨道，与此同时还要投身火爆的回合制战术战斗，强力协同作用、绝佳的战略位置、亦步亦趋的连锁反应都是决胜的关键。《穿雾列车》是一款科幻题材类 Rogue 回合制卡牌构筑游戏，核心玩法围绕回合制战术战斗展开：玩家需要策划牌组，从各式火车头、车厢还有司机中率领远征队伍，不同选择会带来不同卡牌，影响轮次选项跟能力，收集资源更新或购买额外车厢，为牌组带来更多战术工具。战斗方面主打高速回合制战术，玩家需要巧妙安排车厢位置，制造连锁爆炸才能在迷雾中杀出重围，还可以部署诱敌、夺控敌方载具等多种战术手段，对抗各有特色的敌人。灵感方面，本作灵感来源包括《FTL: Faster Than Light》等经典游戏，同时增添了自身特色，玩家需要在严酷的迷雾环境中维持资源并击退袭击。最低配置：需要 64 位处理器和操作系统，Windows 10 (64-bit) 系统，Intel Core i5-4670 处理器或 AMD FX-8300，4 GB 内存，NVIDIA GTX 960 (4 GB) 显卡或 AMD RX 570 (4 GB)，DIRECTX 版本 12，存储空间需要 2 GB 可用空间。推荐配置：需要 64 位处理器和操作系统，Windows 10 (64-bit) 系统，Intel Core i5-7700K 处理器或 AMD Ryzen 5 1500X，8 GB 内存，NVIDIA GTX 1060 (6 GB) 显卡或 AMD RX 5500 XT (8 GB)，DIRECTX 版本 12，存储空间需要 2 GB 可用空间。游戏图赏：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/326.htm", "publishedAt": "2026-07-19T14:34:22+00:00"}, {"title": "腾讯云发布ADP 4.0海外版：集成Google Workspace、Jira，定位AgentOps全生命周期管理", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/r6m3xASYYfM81h9dNBRE?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-19T08:01:41+00:00"}, {"title": "AI 智能体算力消耗过快，传统账单风控跟不上速度", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/secM60Za0CNxIYvQO47m? 体系 —— 通过 Skills 技能包注入领域知识、AGENTS.md 沉淀项目规范、飞轮效应让错误只犯一次，将模糊目标转化为 AI 可精确执行的高质量指令，从提出需求到代码合入，甚至本篇分享也是 AI 生成。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/vivotech/blog/19722516", "publishedAt": "2026-07-16T08:52:00+00:00"}]}]};

const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.parentNode.removeChild(box); return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top"><span class="dot" style="background:#94a3b8"></span>顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '"><span class="dot" style="background:' + accentVar(i) + '"></span>'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
