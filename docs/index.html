 "summary": "IT之家 7 月 18 日消息，据《华尔街日报》昨日援引知情人士消息，埃隆 · 马斯克旗下 SpaceX 正与美国五角大楼洽谈，计划向其提供价值数十亿美元的数据中心算力，以运行 AI 大模型。如果这一协议最终达成，SpaceX 与美国国防部之间的合作关系将进一步深化。该公司目前与美国国防部在火箭发射、导弹跟踪等领域保持着重要合作关系。据悉，SpaceX 员工还在内部讨论中，设想与 CoreWeave、Neocloud 等公司竞争，拟通过更低价格向 AI 客户出售算力争夺市场。与许多大型机构一样，美国国防部也在寻求更多云计算资源，以支援其情报机构和 AI 应用。亚马逊曾于去年年底表示，公司旗下 AWS 云计算服务将最高投资 500 亿美元（IT之家注：现汇率约合 3390.17 亿元人民币），为美国政府机构提供 AI 超算基础设施。不过，SpaceX 与五角大楼的洽谈仍在进行中，上述协议可能无法达成。截至发稿，双方并未立即回复置评请求。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/333.htm", "publishedAt": "2026-07-17T23:12:16+00:00"}, {"title": "PPIO发布智能模型网关，打造面向Agent时代的智能Token工厂", "summary": "万亿Token调用量验证", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453467.html", "publishedAt": "2026-07-17T22:32:47+00:00"}, {"title": "WAIC 2026 | 混元Hy3大模型首秀，腾讯上线AI技能支付体系", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/FeWLPKLYDjWko8rJjxKq?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T21:01:17+00:00"}, {"title": "GOAI 世界人工智能开源大赛官网上线，全球报名正式开启", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/r3sAtSl97Gx5CuZHXOdi?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T19:11:20+00:00"}, {"title": "给AI发工号、定岗位、做绩效，数字员工终于能落地了", "summary": "面壁智能开源StaffDeck", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453245.html", "publishedAt": "2026-07-17T16:40:47+00:00"}, {"title": "消息称索尼 FX5 电影摄影机有 16 档动态范围，海外售价 5399 欧元", "summary": "IT之家 7 月 17 日消息，据 Sony Alpha Rumors 今日爆料，索尼 FX5 电影摄影机的三档基础 ISO 分别是 800、4000 和 12800，拥有 16 档的动态范围。消息称这台电影摄影机将于 7 月 22 日发布，欧洲市场单机身售价 5399 欧元（IT之家注：现汇率约合 41898 元人民币），搭配 XLR 手柄售价 5999 欧元（现汇率约合 46554 元人民币）。IT之家附这款新品目前曝光的主要参数如下：1660 万像素全堆栈式传感器搭载 BIONZ XR2 图像处理器，内置 AI 自动对焦，与 A7R VI 类似支持 5K 3:2 Open Gate 视频录制支持 X-OCN LT/C1/C2 格式的 16 bit RAW 视频录制支持机身防抖（机身防抖功能可能为可拆卸设计）Venice（威尼斯）电影机菜单风格无内置 ND、不支持固态硬盘外录、无拍照模式提供新型外置可拆卸电子取景器，欧洲售价 799 欧元（现汇率约合 6200 元人民币）3.5 英寸全向翻转屏双卡槽，支持双 SD 或 CFexpress Type A 存储卡机身造型类似 FX3，但略微加厚可选配支持 32 位浮点音频的 XLR 手柄", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/318.htm", "publishedAt": "2026-07-17T15:19:11+00:00"}, {"title": "国家超算互联网招募科学智能体开发者，可享受全国首个十万卡 AI 超集群算力", "summary": "IT之家 7 月 17 日消息，7 月 17 日，在 2026 世界人工智能大会（WAIC）上，国家超算互联网发布了科学计算智能体生态共创与开发者招募合作计划（以下简称“智能体共创计划”）。该计划为期半年，通过面向高校科研院所、个人开发者及企业研发团队招募智能体、科研垂类模型、MCP 工具、Skill 等成果或合作意向，构建以国产超智融合算力为底座的开放协同科学智能生态体系。据介绍，加入“智能体共创计划”的个人与机构，可享受基于全国首个十万卡 AI 超集群提供的算力、数据、工具全栈配套支撑。同时，项目配备现金 + 词元的多元化激励政策，并依托超算互联网全域生态与市场资源获得重点推广，助力成果快速落地商业应用。其中，表现优异的个人开发者，更可解锁平台直通、校园招聘免试等专属绿色通道权益。目前超算互联网平台已汇聚 1.6 万余项内容组件，包含超万项技能、5000 余项 MCP 工具、1000 余个知识库及 350 余个智能体，并搭配低代码开发环境，支持用户结合自身需求，快速搭建专属智能体。同时，平台搭载多智能体协作框架，可实现各行业智能体高效联动，覆盖问题分类、任务规划、分工执行、智能报告生成等全流程环节。IT之家注意到，今日，由中科曙光打造的中国首个全国产 10 万卡 AI 超集群“曙光 8000（登峰）”在 WAIC 2026 中真机亮相，并入选大会“镇馆之宝”。作为参考，曙光 8000（登峰）采用“超智融合”技术路线，面向高精度科学计算与低精度智能计算的复合需求，支持 FP64 到 INT8 全精度，可覆盖科学计算、大模型训练、AI 推理、工业仿真等场景。参考报名链接", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/307.htm", "publishedAt": "2026-07-17T14:03:59+00:00"}, {"title": "类似 Anthropic Mythos 模型：消息称微软正开发 AI 漏洞检测工具，最快 7 月发布", "summary": "IT之家 7 月 17 日消息，据 The Information 报道，微软正在开发一款基于 AI 的漏洞检测工具，类似于 Anthropic 的 Mythos 模型。知情人士透露，这款产品名为“感知项目”（Project Perception），这是一款全新的安全产品，旨在借助 AI 帮助企业识别并修复软件漏洞。该产品最快可能于本月发布，预计将整合来自微软、OpenAI 和 Anthropic 的 AI 模型，使其能在有效控制运营成本的同时，处理各种不同的安全任务。与依赖单一 AI 模型的安全工具不同，消息称“感知项目”将采用一种被称为“模型路由” (model router) 的技术。该系统会在分配工作负载之前，先评估并决定哪一个 AI 模型最适合处理特定的任务。该平台能够在不同模型之间灵活切换，从而完成代码分析、安全弱点识别以及自动生成修复方案等工作。该策略的另一目的是降低成本。Anthropic 专注于网络安全的 AI 模型 Mythos 凭借其先进的漏洞挖掘能力备受业界瞩目，但普遍认为其大规模部署的成本过于高昂。IT之家获悉，微软希望通过在多个模型间分发请求，而非仅仅依赖单一模型，从而以更低的价格向客户提供同等水平的安全能力。据悉，“感知项目”是微软新任安全主管海耶特 · 加洛（Hayete Gallot）领导下的首批重大项目之一，她于今年 2 月正式接掌该部门。自上任以来，加洛对微软的安全业务进行了架构重组，将重心进一步向 AI 驱动的产品倾斜，同时削减了对传统产品的投资。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/292.htm", "publishedAt": "2026-07-17T12:38:17+00:00"}, {"title": "抖音严打 AI 虚假灾害画面，发布防汛期涉灾信息治理公告", "summary": "IT之家 7 月 17 日消息，抖音黑板报今日发布公告，7 月 16 日起，我国正式进入“七下八上”防汛关键期，相关灾情进展和防汛动态持续受到广泛关注。在防汛避险的关键阶段，真实、准确、及时的信息不仅关系群众科学避险和应急处置，也有助于减少谣言传播带来的误导和恐慌。平台巡查发现，随着社会关注度持续攀升，近期借涉灾热点散布不实信息、博取流量的行为明显增多，部分账号通过翻炒旧闻、移花接木编造灾情，或是利用 AI 生成虚假灾害画面等手段传播不良内容，既误导公众认知，也严重干扰权威信息发布传播。抖音表示将持续加强防汛期间涉灾信息治理，对公众高度关注的热点事件及时开展事实核验，并通过求真卡、视频底部求真提示条、辟谣榜等方式提供更多权威信息参考；同时持续加强对编造灾情、伪造官方通知、恶意制造社会恐慌、借灾情博取流量等违法违规及不当内容的治理。以下为部分涉灾谣言典型案例：典型案例一：旧闻旧视频冒充最新灾情部分账号将往年洪涝、台风等历史灾害视频重新包装，配以“最新现场”“当地实拍”等文案进行传播，误导公众认为系当前灾情。例如，有账号将往年洪水淹没交通指示牌的视频包装为今年汛情视频进行传播。此类内容画面信息较少、识别难度高，平台依托 AI 技术核心能力，综合解析画面内容、账号历史传播轨迹等多维度数据开展风险智能识别，同步联动人工复核、权威信息交叉比对机制，实现违规内容快速精准处置。典型案例二：利用 AI 生成或加工灾害画面部分账号借助 AI 生成图片、视频或对真实画面进行加工，虚构受灾现场、夸大灾情，增加公众辨别难度。针对这类新型谣言，平台持续迭代 AI 识别技术，深度运用画面解析、多模态综合研判等核心能力，强化虚假灾害画面的前置识别与主动挖掘效能。近期，平台发现并处置了虚构龙卷风破坏效果的 AI 生成视频，避免不实信息进一步传播。典型案例三：编造、伪造官方通知和灾害预警信息假借政府部门、气象部门等名义，编造泄洪通知、停课通知、停水停电通知、台风预警等内容，容易引发公众恐慌。例如，近期网络流传“13 号台风白海豚、14 号台风鲸鱼将于 7 月 19 日生成”等不实信息。平台在专项巡查中主动发现相关传播内容，并结合气象部门权威信息完成真伪校验核验，核实存在虚假后即时落地处置。典型案例四：夸大灾情、虚构人员伤亡和救援情况通过杜撰灾情进展、虚构伤亡数字、编造救援信息等方式吸引关注、博取流量，对公众造成误导。针对此类信息，平台主动对接权威媒体、主管部门交叉核实情况，确认内容失实后快速处置，同时上报谣言线索。IT之家注意到，截至 7 月 17 日，抖音平台累计核验典型涉灾谣言 71 起，处置相关谣言内容 1.9 万余条，清理评论区谣言 1.6 万余条，对 20 个违规账号进行处罚。同时，抖音已上线 39 则求真卡，视频底部求真条累计曝光超 11.9 亿次。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/291.htm", "publishedAt": "2026-07-17T12:37:04+00:00"}, {"title": "OpenAI 奥尔特曼调侃 Anthropic 最新广告：我还以为这是讽刺短片", "summary": "IT之家 7 月 17 日消息，7 月 10 日，Anthropic 推出了一支围绕 AI 未来影响的宣传短片，并宣布启动名为“Hard Questions”的项目，试图收集公众对于 AI 技术发展的疑问、担忧以及期待。不过，这支广告一经发布便在网络上引发反响，部分网友认为其画面和主题带有明显的“反乌托邦”色彩，而 OpenAI CEO 山姆・奥尔特曼（Sam Altman）也对此进行了调侃，“我还以为这是什么讽刺作品呢”，他还表示自己特意看了一眼该账号是否为仿冒账号。这支广告时长 90 秒，于当周周末（2026 年 7 月 11 日至 12 日）世界杯四分之一决赛阿根廷对阵瑞士的比赛期间面向全球观众播出。广告以一段夜间房屋燃烧的影像开场，随后切换至一系列静态画面：人群被面部识别系统监控、一名露宿街头的流浪者、墓地中成排的墓碑，以及一群疑似在矿井中开采智能手机原材料的工人。伴随这些画面的是一段旁白，由不同人物的声音提出一系列问题，包括“AI 能够被信任吗？”“如果我们需要踩刹车，谁会来踩？”片尾以“问题艰难，但仍蕴存希望”的标语收尾，整体基调偏向悲观与警示。据 Anthropic 介绍，广告中所有提问均来自公司与全球超过 12 万人交流后收集的真实声音，涵盖人们对 AI 在就业、创造力、安全及科学进步等方面影响的关切。Anthropic 在这部短片中表示，随着 AI 技术快速发展，公众对于 AI 带来的影响存在大量疑问，包括 AI 是否会改变就业结构、是否能够推动科学研究、如何确保技术安全，以及大规模数据中心建设可能对社区产生哪些影响等。Anthropic 希望通过该项目了解不同群体对于 AI 的看法，并公开追踪这些问题的后续回应。广告上线后，视频评论区出现了较大分歧。一些观看者认为，短片展示的灾难场景、技术风险以及社会变化画面过于压抑，并将其描述为“反乌托邦式营销”。也有用户认为，Anthropic 选择公开讨论 AI 风险和社会影响，能够引发更多关于技术发展的交流。部分评论则集中关注广告最后的“保持思考”标语，认为这与当前 AI 工具可能降低部分思考负担的现实形成了反差。部分人指出，Anthropic 此番采用的营销策略并不新鲜 —— 一个品牌主动指出并承认整个行业造成的问题，然后通过展示自身对这些问题的理解，证明自己是最有能力避免或解决这些问题的企业。事实上，Anthropic 一直试图将自己塑造成 AI 企业中更具道德感的一方。IT之家注意到，2026 年 2 月超级碗期间，Anthropic 曾推出一组讽刺 OpenAI 在 ChatGPT 中引入广告的系列广告，获得了营销行业广泛好评，并最终在 2026 戛纳国际创意节摘得影视类全场大奖。除广告片外，Anthropic 还同步上线了“Hard Questions”专题网站，邀请公众提交关于 AI 的最棘手问题，并承诺公开追踪和报告公司在回应这些问题方面所采取的具体行动。Anthropic CEO 达里奥 · 阿莫代伊（Dario Amodei）曾在美国参议院作证时表示，若无安全保障，先进 AI“可能对人类构成威胁 —— 即存在性风险”。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/290.htm", "publishedAt": "2026-07-17T12:29:08+00:00"}, {"title": "强脑科技全球首发脑控机器人训练平台，10 分钟解锁意念控制", "summary": "IT之家 7 月 17 日消息，在今日举行 2026 年世界人工智能大会上，BrainCo 强脑科技正式发布全球首个面向脑控机器人科研与开发场景的一体化、图形化、一站式的 AI 科研平台 ——BrainCo 脑控机器人训练平台。IT之家从官方介绍获悉，这套平台将脑电采集、实验范式、神经解码、控制映射和机器人执行整合进统一的软件流程，降低脑机接口与机器人融合研究的系统搭建门槛，研发人员即便没有脑机接口相关背景，也可以在 10 分钟内解锁“意念”控制机器人。1、脑控机器人训练平台的工作原理人在产生动作意图时，大脑会发出微弱的脑电信号。脑控机器人的工作原理，是通过传感器采集与特定任务相关的脑电信号，并利用算法识别其中的意图相关模式，再将识别结果转换为机器人控制系统可执行的指令，驱动机器人完成相应动作。简单来说，就是在人脑与机器人之间建立一条信息通路，让人的意图能够直接转化为机器动作，无需依赖按键、遥控器、手柄、语音等传统交互方式。2、脑控机器人 AI 科研平台，实现复杂研发流程一体化强脑科技此次发布的脑控机器人 AI 科研平台，把过去需要多学科背景、较长周期才能完成的实验流程整合为一套标准化平台。平台由脑电传感系统、软件平台和机器人执行端三部分构成。脑电传感系统负责脑电信号的采集，兼容多种电极类型，支持多通道、高采样率的数据采集，并可通过无线方式实时传输。软件平台承担信号处理和机器人控制的核心工作，内置了脑机接口实验范式流程和神经解码算法，研发人员不需要从零搭建底层算法，只需要在软件平台上完成配置，就能实现从信号采集到控制输出的全流程操作，这也是能“10 分钟上手”的原因。机器人执行端目前已经支持接入多类第三方机器人和设备，包括人形机器人、机械臂、机器狗等，同时平台也在持续接入新的机器人型号，研发人员可以根据自己的研究方向选择合适的机器人本体进行实验。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/289.htm", "publishedAt": "2026-07-17T12:27:53+00:00"}, {"title": "腾讯 Robotics X 实验室新一代示范性机器人“小六”首次公开亮相，系“小五”迭代之作", "summary": "IT之家 7 月 17 日消息，2026 世界人工智能大会暨人工智能全球治理高级别会议（WAIC）今日在上海世博、张江、西岸“三地四馆”同步启幕。本届大会主题为“智能伙伴共创未来”，展览总面积首次突破 10 万平方米，1100 余家企业参展，超 300 款产品全球首发。当日上午，腾讯 Robotics X 实验室自研的新一代示范性机器人 ——“小六”在大会现场首次公开亮相。“小六”是腾讯 Robotics X 实验室于 2024 年 9 月发布的第五代机器人“小五”的迭代升级之作。“小五”定位为人居环境机器人，采用四腿轮足复合设计，兼具足式机器人的越障能力与轮式机器人的运行效率，并配备大面积触觉皮肤、多指灵巧手以及安全人机物理交互等多项自研技术。腾讯 Robotics X 实验室曾展示“小五”在养老院实验场景中完成给老人取快递、抱老人起床等任务。作为“小五”的继任者，“小六”延续了与人安全相处、动作拟人化的设计方向，并采用了键绳传动技术。IT之家注：腾讯 Robotics X 实验室成立于 2018 年，隶属于腾讯技术工程事业群（TEG），与腾讯 AI Lab 并列为公司 AI 产业的双基础支撑部门。实验室由张正友担任主任及首席科学家。此前，该实验室已推出四足机器人 Max、轮腿机器人 Ollie、人居环境机器人“小五”以及三指 / 五指灵巧手 TRX-Hand、机械臂 TRX-Arm 等成果。在本届 WAIC 期间，腾讯 Robotics X 实验室还联合越疆科技，以越疆 X-Trainer 平台为工业级真机基准平台，在全球头部化妆品制造企业的真实产线工位上完成了腾讯 VLA 模型的训练与部署，任务成功率超过 95%。2026 世界人工智能大会将持续至 7 月 20 日。“小六”的具体技术参数、功能演示及后续商业化规划，目前腾讯方面尚未进一步披露。相关阅读：《腾讯 Robotics X 实验室推出其第五代机器人，可在真实人居环境中完成行走、搬运物体等动作》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/282.htm", "publishedAt": "2026-07-17T11:52:24+00:00"}, {"title": "Kimi K3 全面解读：2.8 万亿参数、48 小时造芯片、以及一个正在被开源模型追上的 AI 竞争格局", "summary": "7 月 17 日凌晨，月之暗面发布了 Kimi K3。 数字可以快速过一遍：2.8 万亿参数，MoE 架构，896 个 expert 每次激活 16 个，100 万 token 上下文窗口，原生多模态，完整权重 7 月 27 日前放出——将成为全球首个开源的 3 万亿级别模型。 但数字说完了，故事才刚开始。 一个 90 后创始人，半年融了 60 亿美元 在讲模型之前...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/472928", "publishedAt": "2026-07-17T11:14:44+00:00"}, {"title": "苹果与 OpenAI 法律战升级：约 40 名前员工收到苹果律师函", "summary": "IT之家 7 月 17 日消息，据《金融时报》今日报道，苹果已向目前就职于 OpenAI 的约 40 名前苹果员工发出法律警告，要求他们保存可能与此案相关的文件和通信记录。此举是苹果上周对 OpenAI 提起商业秘密诉讼后的最新动作，表明苹果认为涉嫌泄密的范围可能超出最初诉状中列出的个人。2026 年 7 月 10 日，苹果公司向美国加州北区联邦地区法院提交了一份长达 41 页的诉状，正式起诉 OpenAI 及两名前苹果员工 ——OpenAI 首席硬件官 Tang Tan 和前苹果系统电气工程师 Chang Liu。苹果在诉状中指控 OpenAI 策划了一场系统性的“挖角”行动，通过招募苹果前员工获取未发布产品、零部件和供应商关系等高级商业机密，以加速其消费级 AI 硬件设备的研发。根据诉状内容，Tang Tan 在苹果任职长达 24 年，曾担任 iPhone 和 Apple Watch 产品设计负责人，离职后出任 OpenAI 首席硬件官。Chang Liu 则于 2026 年 1 月离开苹果后加入 OpenAI 硬件团队。苹果指控 Tan 在 OpenAI 面试过程中使用机密项目代号向求职者打探苹果未发布产品的信息，而 Liu 则在离职后保留了苹果配发的笔记本电脑，并利用身份验证漏洞在 2026 年 1 月多次未经授权访问苹果内部网络，下载了数十份机密文件，包括技术演示文稿和未发布产品的规格说明。苹果称，Liu 在发现仍能访问公司网络后，曾给一位同事发短信写下“LOL”（类似于“笑死了”）。苹果在诉状中表示，目前已有超过 400 名苹果前员工在 OpenAI 工作。苹果在 2026 年 2 月曾致函 OpenAI，要求对方说明防范措施、调查情况与补救安排，但 OpenAI“从未回应”。据 NBC 新闻调查，2026 年 2 月 23 日 17 时 53 分，苹果外部律师 Gabriel Gross 将首封邮件发给 OpenAI 总法律顾问 Che Chang，主题为“OpenAI 前苹果员工保留非公开、机密和专有信息”，并附上 PDF 信函和三份附件。13 分钟后，Gross 在同一邮件链中发送第二封邮件，称“感谢刚才的电话”并表示将与苹果沟通后再联系，但事实上双方并未通过电话 —— 这封邮件本应发给另一位姓 Wang 的前苹果员工。次日早晨 Gross 发邮件致歉，承认误将邮件发给了 Chang。OpenAI 发言人 Drew Pusateri 表示，Chang 据此认为误会已澄清，因此未再回复。除上述往来外，OpenAI 没有记录显示苹果律师在起诉前还有后续接触。苹果在诉状中写道：“这只是冰山一角。苹果无法看到 OpenAI 紧闭的大门背后发生了什么，在那里，这种不当行为已被领导层正常化并成为典范。”苹果称 OpenAI“尚处于萌芽阶段的硬件业务，如今建立在最不稳固的基础之上，因非法依赖盗用的商业秘密而从核心开始腐朽”。苹果正寻求法院发布禁令，要求 OpenAI 在开发 AI 硬件设备过程中停止使用任何苹果信息。苹果还要求 OpenAI 归还所有商业秘密与机密信息的副本，并追究 Tang Tan 和 Chang Liu 违反劳动合同的责任。此外，苹果还在寻求经济赔偿。OpenAI 发言人回应称，“没有发现任何证据表明这项投诉具有依据”。OpenAI 则表示，“我们对其他公司的商业秘密不感兴趣，我们仍专注于打造赋能全球人民的创新技术”。两家公司的关系在 2024 年曾一度密切 —— 当时苹果与 OpenAI 达成合作，将 ChatGPT 整合进 iPhone 系统。但此后双方关系逐渐降温：OpenAI 于 2025 年以约 65 亿美元（IT之家注：现汇率约合 440.72 亿元人民币）收购了苹果前设计总监 Jony Ive 创立的硬件公司 io Products；苹果则决定在新版 Siri 中用谷歌 Gemini 模型取代 ChatGPT。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/277.htm", "publishedAt": "2026-07-17T11:10:01+00:00"}, {"title": "✨ NocoBase 2.2-beta 发布：开源无代码 / 低代码平台 NocoBase", "summary": "原文链接：https://www.nocobase.com/cn/blog/2.2.0-beta 这是一次围绕 V2 体验的重要升级。这个版本带来了 多工作区、新移动端、新评论区块，同时继续提升 AI 知识库和工作流能力。对正在使用 V2 的团队来说，更值得关注的是全新的 /v/ 分支——它会作为面向 V2 的独立前端入口，承接后续的功能演进。 新特性 新增 /v/ ...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/472911", "publishedAt": "2026-07-17T10:32:54+00:00"}, {"title": "上海制造，AI入魂：央国企率先“重用”大模型，自动化设备被换下", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453084.html", "publishedAt": "2026-07-17T10:17:23+00:00"}, {"title": "面壁智能开源企业数字员工平台 StaffDeck", "summary": "面壁智能联合东北大学-面壁智能数据智能联合实验室、清华大学 THUNLP 实验室、OpenBMB 与 AI9Stars 开源了数字员工全流程构建与管理平台 StaffDeck。 根据介绍，StaffDeck 不只让 AI 承接重复性沟通与标准化任务，更试图将分散在人员、文档和业务系统中的知识、方法与流程，转化为 可维护、可复用、可持续优化的组织能力...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/472705", "publishedAt": "2026-07-17T07:13:12+00:00"}, {"title": "杭州市民政局准予设立杭州市开源人工智能基金会", "summary": "杭州市民政局正式签发准予行政许可决定书（杭民社许准字〔2026〕成第J-001号），批准设立杭州市开源人 歌 DeepMind 联合创始人兼 CEO 德米斯 · 哈萨比斯表示，AI 虽然正在重塑科技行业的职业路径，但 STEM（IT之家注：科学、技术、工程、数学）学位并不会因此失去价值。哈萨比斯认为，掌握软件和计算机科学的基础知识，能够帮助人们更有效地使用 AI。“STEM 和计算机科学仍然必须认真学习。未来的编程可以理解为转向层级更高的编程语言。”哈萨比斯于 2010 年联合创办 DeepMind，谷歌于 2014 年完成收购。哈萨比斯指出，编程语言经历了从机器码到 C 语言、再到 Python 的演变，未来甚至可能直接使用英语。“系统架构设计和软件工程最佳实践依然不可或缺。真正深入理解技术的人，使用 AI 工具的效率可能达到缺乏技术基础者的 10 倍。”哈萨比斯还认为，AI 时代同样需要伦理学和社会科学。“哲学、经济学等人文学科发挥作用的时刻已经到来。面对即将进入的新世界，我们确实离不开上述学科。”被誉为“AI 教父”的杰弗里 · 辛顿去年 12 月接受采访时强调，计算机科学学位的意义远不只是培养编程能力。“只达到合格中级程序员水平的人，显然很难长期依靠编程谋生，因为 AI 已经能够完成相应的工作了。但计算机科学学位带来的价值远远超过写代码，因此我认为，计算机科学学位在未来相当长一段时间内仍然有用。”AffirmCEO 马克斯 · 列夫琴也表示，扎实的计算机科学基础能够帮助开发者分辨优质代码和“垃圾代码”。“编程也讲究品位与优雅。至少对身为程序员的我而言，两者非常重要。没有坚实的计算机科学基础，我甚至无法参与有关代码质量的讨论。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/332.htm", "publishedAt": "2026-07-17T23:11:53+00:00"}, {"title": "搭载全球首个智能体原生操作系统 Step AOS，STEPX Neo 亮相 2026 WAIC", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/62J9L28365BtFlSFxVjE?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T22:03:09+00:00"}, {"title": "亚马逊云科技推出 Claude 应用网关：面向 Claude Code 与 Claude Desktop 的自托管控制平面", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/j59f7KU3djH4Ex4YhqxF?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T17:00:00+00:00"}, {"title": "WAIC 2026 | 如果Agent有性格，你的智能伙伴会是什么样的？", "summary": "北电数智带来AI赋能民生的真实答卷", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453217.html", "publishedAt": "2026-07-17T11:34:02+00:00"}, {"title": "WAIC 2026商汤大装置发布算电协同Agent，单位电力成本Token产出提升80%", "summary": "", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/453211.html", "publishedAt": "2026-07-17T11:00:47+00:00"}, {"title": "智元联合京东物流发布精灵 G2 Max 人形机器人，首次在真实仓储作业生产场景中部署落地", "summary": "IT之家 7 月 17 日消息，2026 世界人工智能大会（WAIC）今日在上海开幕。京东物流与智元联合推出新一代安规级重载具身机器人 —— 精灵 G2 Max，并宣布该产品将应用于京东物流智狼仓，这是人形机器人首次在真实的仓储作业生产场景中部署落地。官方表示，当前智能仓库多个环节已引入机器人和智能设备。但在许多货物入库场景，还需人工逐一将货物搬下、分拣、码放整齐，再送入仓库中。弯腰、搬举 朱拜尔（20 岁）在青少年时期发动网络攻击，导致伦敦交通局系统大面积瘫痪，两人均被判处 5 年 6 个月监禁。两人已于 6 月承认在 2024 年入侵伦敦交通局。检方形容两人痴迷电脑、性格孤僻，并称他们以网络犯罪团伙 Scattered Spider 成员身份实施攻击。网络攻击导致伦敦交通局的在线服务连续数月无法正常运行，数百万人的个人数据遭窃，全部 27000 名员工还必须到现场重置密码。伍尔维奇刑事法院获悉，两人甚至在网上直播了长达 16 小时的攻击过程。英国国家打击犯罪局表示，越来越多英国年轻人参与黑客活动，已经成为国家网络安全面临的最大威胁之一。2024 年 8 月 31 日 17 时，两人侵入伦敦交通局系统。当时弗劳尔斯 17 岁，朱拜尔 18 岁。两人在 Telegram 上的聊天记录显示，他们曾炫耀已经进入牡蛎卡用户数据库。两人随后在名单中查找伦敦名人的个人资料，并试图进一步获取银行账户信息。弗劳尔斯后来开玩笑说：“Scattered Spider 正在伦敦地铁上织网。”据了解，Scattered Spider 还被指参与数十起网络攻击，玛莎百货和 Co-op 等零售企业都曾成为目标。过去两年，英国、美国、西班牙和芬兰均有年轻男子和未成年男孩因参与 Scattered Spider 的攻击而被捕。两人特意选择在周六晚上发动攻击，希望避开工作人员的监控，最终窃取数百万名乘客的数据。遭窃数据库仍在犯罪团体之间传播，最多包含 1000 万名伦敦交通局乘客的资料。两人并非通过复杂技术直接突破系统，而是欺骗了一名电话技术支持人员。他们冒充伦敦交通局员工，并说服技术支持人员为被冒充员工重置密码。英国国家打击犯罪局发现入侵后通知伦敦交通局，伦敦交通局随即开始封堵黑客，但数百万人的资料已经落入两人手中。伦敦交通局表示，信息技术团队通过强制所有员工退出系统，并最终切断系统与互联网的连接，才阻止攻击进一步扩大，否则伦敦公共交通服务可能出现大范围中断。攻击导致 148 套技术系统无法使用，多项服务严重受阻，其中包括供残疾人和弱势居民使用的 Dial-a-Ride 预约用车服务。伦敦交通局估计，网络攻击带来的经济影响达到 2900 万英镑（IT之家注：现汇率约合 2.65 亿元人民币），收入损失另有约 1000 万英镑（现汇率约合 9122 万元人民币）。法院获悉，两人在现实生活中几乎没有朋友，大部分时间都在无人监管的情况下独自上网。特纳大法官量刑时表示，两人犯罪时年龄较小，并且都被诊断为自闭症，因此决定把上述情况作为减轻刑罚的因素。弗劳尔斯极少出门，平时大多待在卧室里使用电脑。2023 年 10 月刚满 16 岁后不久，他便因轻微网络犯罪被勒令停止违法行为。警方最终于 2024 年 9 月以涉嫌攻击伦敦交通局为由将弗劳尔斯逮捕。逮捕画面显示，弗劳尔斯被带走时仍在发笑。调查人员实施搜捕时，还当场发现弗劳尔斯正在入侵两家美国医疗服务机构。聊天记录显示，弗劳尔斯甚至拿“攻击可能害死一名依靠生命支持设备维生的 90 岁老人”开玩笑。弗劳尔斯最终承认了涉及两家美国医疗服务机构以及伦敦交通局攻击的罪名。警方还从弗劳尔斯手中查获价值约 100 万英镑的加密货币。警方表示，尽管弗劳尔斯和朱拜尔据称通过盗窃或勒索获得了价值数百万英镑的加密货币，但两人可能更在意网络犯罪圈中的名声，而不是金钱。朱拜尔也早已受到警方关注。法院获悉，朱拜尔是家中独子，父母从孟加拉国移居伦敦并从事护理工作，在他 10 岁时送给他第一台笔记本电脑。朱拜尔随后自学编程，13 岁时已经开始在网上与罪犯接触。朱拜尔于 2021 年 2 月首次被捕，当时只有 14 岁。2023 年，仍属未成年人的朱拜尔因参与 Lapsus$ 网络犯罪团伙的黑客活动，被判处青少年改造令。Lapsus$ 曾攻击英伟达和英国电信等大型企业。由于朱拜尔当时未满 18 岁，媒体依法不得公开他的身份。朱拜尔此前已经有 22 项涉及黑客活动、诈骗和骚扰的定罪记录。辩护团队称，朱拜尔性格孤独并有自杀倾向，实际上是受到了年长网络罪犯的引诱和操控。美国也因朱拜尔涉嫌攻击 47 名境内受害者而对他发出通缉。有关案件据称令受害者向朱拜尔及其同伙支付了 1.15 亿美元（现汇率约合 7.8 亿元人民币）赎金。朱拜尔后来成为英语网络犯罪圈 The Com 中颇具知名度的黑客。不过，朱拜尔与其他黑客发生内讧后，个人资料和照片遭竞争对手公开。部分视频还显示朱拜尔疑似被人劫持和殴打，但也有人怀疑，绑架和殴打场面由朱拜尔自导自演。法院还获悉，两人在狱中等待审判期间都曾私藏违禁手机。从手机中恢复的消息显示，两人即使身处监狱，仍在讨论并策划未来的网络攻击。宣判后，英国国家打击犯罪局副局长兼国家网络犯罪部门负责人保罗 · 福斯特表示，案件凸显英国本土年轻黑客带来的严峻挑战。“网络世界可能让年轻人接触到家门之外的有害影响和犯罪群体。家长、照护者、教育工作者、科技企业、执法部门乃至整个社会，都有责任保护年轻人的网络安全。”福斯特称，一系列逮捕行动已经令 Scattered Spider“受到严重削弱和破坏”，但网络安全分析师艾莉森 · 尼克松认为，判刑和逮捕很难阻止更多年轻男孩参与网络犯罪。尼克松表示：“政策制定者必须把问题当成暴力青少年帮派问题处理。帮派文化把破坏社会奉为荣耀，并追求对受害者造成最大程度的伤害。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/349.htm", "publishedAt": "2026-07-18T00:37:17+00:00"}, {"title": "微软 2026 款 Surface Laptop 证明：8GB 内存难以满足 Win11 需求，日常使用多次卡顿", "summary": "IT之家 7 月 17 日消息，据 Neowin 及 The Verge 今日报道，微软自家 2026 款 13 英寸 Surface Laptop 无意中证明了 Windows 11 的最低系统要求毫无意义。这款起售价 949 美元（IT之家注：现汇率约合 6435 元人民币）的入门级产品，搭载高通骁龙 X Plus 八核处理器与 256GB 固态硬盘，而 8GB LPDDR5X 内存才是整机性能最明显的瓶颈所在。The Verge 指出，该机型的外部设计与 2025 款保持一致，键盘手感、触控板、1080p 摄像头及续航表现（轻松达到 10 小时）均得到延续。问题在于内部配置的倒退：2025 款 13 英寸 Surface Laptop 起售价为 899 美元，配备 16GB 内存与 512GB 存储；2026 年 4 月，受内存成本上涨影响，微软将该配置价格上调至 1199 美元。而此次推出的 949 美元新机型，价格高于去年同系列，内存却减半至 8GB，存储空间也缩减为 256GB。然而，微软 Copilot+ PC 的硬件标准明确要求至少 16GB 内存 —— 这意味着这款 8GB Surface Laptop 无法运行 Windows 11 的端侧 AI 功能。在实际使用测试中，The Verge 的评测人员发现 8GB 内存已经无法满足日常多任务需求。任务管理器的性能数据显示，这款笔记本可用内存约为 7.6GB，而日常使用中占用率几乎始终维持在 6.7GB 左右。在一次 Microsoft Teams 通话中（使用桌面应用而非浏览器），当主持人播放一段短视频时，整台笔记本直接卡住了数秒。此时评测人员仅打开了约 10 个 Chrome 标签页、Slack 和 Signal—— 并非极端的多任务负载，且所有参与者均未开启摄像头。而且类似的短暂卡顿每天都会出现数次。测试发现，2026 款 Surface Laptop 刚完成重启、仅加载最低限度启动项的情况下，Windows 11 自身已占用 4.2GB 内存。作为参照，Windows 11 官方标称的最低内存需求仅为 4GB—— 这意味着 8GB 机型在开机后留给应用程序的余量极为有限。据 TrendForce 数据，2026 年第三季度传统 DRAM 合约价格预计环比上涨 13% 至 18%——2026 年台北国际电脑展上已有多款 Windows 笔记本将起跳内存下调至 8GB。戴尔 XPS 13 起价 699 美元、宏碁 Swift Air 14 起价 699 美元均采用 8GB 起步配置。联想集团则在 ISC 2026 上发出警告，称 DRAM 和 NAND 价格已进入结构性上涨周期，可能持续至 2030 年。面对这一趋势，微软于 2026 年 6 月悄然更新了 Surface 设备官方购买指南，将 8GB 内存描述为“适合日常使用，如浏览、流媒体、学校作业和生产力应用”，而且微软还在同一份指南中指出，16GB 或更大内存才是“让笔记本电脑感觉更经得起未来考验的更安全选择”。相关阅读：《微软承认 8GB 内存足以满足 Win11 日常需求，但 16GB 才能解锁 Copilot+ 功能》《12988 元起，微软第 12 代 Surface Pro、第 8 代 Surface Laptop 国行发售》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/321.htm", "publishedAt": "2026-07-17T15:47:48+00:00"}, {"title": "消息称字节新一代豆包手机备货数十万台，AI 不再直接操作头部应用", "summary": "IT之家 7 月 17 日消息，据晚点 LatePost 消息，新一代豆包手机调整了与阿里、腾讯等各家超级应用的合作方式，将不会在用户授权后读取屏幕，模拟点击、像人一样操作应用（所谓 GUI 技术）。只有这些应用自行提供 MCP 服务，开放部分数据、允许操控，豆包手机才能接入 MCP。目前，豆包手机助手团队也在与各头部应用厂商谈判，争取对方开放可被 AI 调用的接口或服务能力。此外，一位接近豆包手机人士表示，新一代豆包手机的备货量从此前的 3 万台提升到了数十万台，“手机不可能永远只停留在技术实验阶段，最终还是得卖出去。”据IT之家此前报道，2025 年 12 月，字节跳动与努比亚联手推出型号为努比亚 M153 的豆包手机工程样机，定价 3499 元。其中，AI 操作手机功能可根据用户指令在多款应用间自动跳转，帮助用户完成各种任务。但各家超级应用很快封禁了豆包手机 AI 功能，让它实际上无法使用 AI 操控。豆包随后主动下线了相关场景的操作能力。相关阅读：《“豆包助手”手机出现微信被动下线问题，双方回应》《豆包手机助手回应争议：不会代替用户进行相关授权和敏感操作，未云端存储用户屏幕数据、不存在任何黑客行为》《豆包手机助手澄清技术误解：产品使用系统原生截屏接口，无法截屏银行键盘等受保护内容》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/312.htm", "publishedAt": "2026-07-17T14:33:22+00:00"}, {"title": "Stripe 发布基准测试：AI 智能体可开发集成方案，但校验环节存在短板", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/zVfybMt5i742CqhWYjR4?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-17T14:15:00+00:00"}, {"title": "苹果逆袭成科技避风港、市值短暂反超英伟达，时隔 3 个月重返全球第一", "summary": "IT之家 7 月 17 日消息，当地时间 7 月 17 日，美股开盘后前 5 分钟内，英伟达股价闪跌，约北京时间 21:33 左右被砸到 4.86 万亿美元（现汇率约合 32.95 万亿元人民币）上下。同一时段，苹果市值强势上涨，市值升至约 4.88 万亿美元（IT之家注：现汇率约合 33.09 万亿元人民币），与英伟达完成了历史性的交叉。这意味着苹果时隔 3 个月再次重返全球市值第一的宝座。但若是剔除盘中的短暂换位，苹果上一次真正稳固、常态化地统治全球市值第一，要追溯到 2025 年 4 月份（自 2025 年 6 月超越微软以来，英伟达一直是全球市值最高的公司。同年 10 月，它成为首家市值突破 5 万亿美元的公司）。两家公司在市值榜首的争夺已持续数周。2026 年 7 月初，两者差距在某些交易日已缩小至约 200 亿美元。7 月 3 日，受 iPhone 产品线扩大的相关报道推动，苹果股价单日上涨近 5%，而英伟达同期则面临半导体板块整体走软带来的抛售压力。进入 7 月 17 日，苹果股价盘中持稳，市值接近 4.9 万亿美元；英伟达跌幅一度超过 3%，市值跌至约 4.84 万亿美元。英伟达自 2025 年 6 月超越微软后一直稳居全球市值榜首。2025 年 10 月，英伟达成为全球首家市值突破 5 万亿美元的上市公司；同月，苹果市值首次突破 4 万亿美元。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/305.htm", "publishedAt": "2026-07-17T13:44:21+00:00"}, {"title": "人工智能终端智能化分级首批测试结果公布，涉及手机、电脑、眼镜、电视、汽车座舱等", "summary": "IT之家 7 月 17 日消息，工业和信息化部、国家市场监督管理总局、商务部等部门于 5 月 8 日联合发布《人工智能终端智能化分级》（GB/Z 177—2026）系列国家标准（下称《标准》）。据介绍，终端智能化的分级体系，从 L1 响应级、L2 工具级、L3 辅助级到 L4 协同级，智能化水平依次提高，终端更“聪明”。其中，L4 协同级将根据产业发展水平，在后续修订中进一步明确和完善。中国计算机行业协会人工智 e、谷歌 Play 商店下架 13 款“AI 脱衣”App", "summary": "IT之家 7 月 18 日消息，据科技媒体 9To5Mac 昨天报道，苹果和谷歌公司再次因 App Store、Google Play 应用商店存在所谓“AI 脱衣”App 受到批评。IT之家从原报道获悉，美国旧金山市检察官办公室近期对两家应用商店发起调查，结果发现 App Store 有 8 款违规应用、Google Play 存在 5 款。这些应用大多宣称自己只是“换脸”工具，而用户下载打开后却可以解锁深度伪造色情功能。其中，一款下载量超过 100 万的应用官网展示了十多种 AI 风格图片，另一款应用则宣称可以生成“免费且无审查”的视频。旧金山市检察官 David Chiu 已向苹果和谷歌公司发出停止侵权函，要求两家公司立即在自家应用商店中下架这 13 款 App。Chiu 在信中指出，苹果和谷歌一直从这些有害技术获利，两家公司很可能通过这些“AI 脱衣”应用收取的分成费用赚取数百万美元。谷歌发言人对此表示，公司会对违反政策的应用采取下架等处置措施。而苹果公司则是在后续发表了完整声明：App Store 从设计之初就是为用户提供一个安全、值得信赖的平台。我们始终严格禁止生成、传播或浏览色情内容的应用存在于 App Store。‘脱衣’应用违反了《App Store 审核指南》，我们一直主动拒绝大量同类应用上架。目前，我们已经移除 3 款涉事应用，其对应的开发者账号也正在终止。另外我们也在联系 4 款应用的开发者，要求他们立即整改违规问题，否则将被下架。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/337.htm", "publishedAt": "2026-07-17T23:30:30+00:00"}, {"title": "GDDR7 显存太贵：RTX 50 SUPER 被曝已交付 AIB，但英伟达要求暂缓发售", "summary": "IT之家 7 月 17 日消息，据 VideoCardz 今日报道，英伟达已向至少一家 AIB 板卡合作伙伴交付了 GeForce RTX 50 SUPER 系列 GPU，但却又通知对方暂缓发售。消息人士确认 RTX 50 SUPER 显卡已物理交付到合作伙伴手中，说明产品的开发工作已基本完成。不过，英伟达迄今未向合作伙伴提供新的发布时间表。据称，此次暂缓发售的直接原因是 GDDR7 显存颗粒太贵。目前，单颗 3GB GDDR7 芯片的采购成本在 60 至 70 美元（IT之家注：现汇率约合 406.8 至 474.6 元人民币）之间，而之前采用的 2GB GDDR7 芯片的成本约为 20 美元。这意味着 3GB 芯片虽然容量仅提升 50%，价格却提升 200% 以上。对于采用六颗或八颗显存芯片的显卡而言，仅显存一项就可能增加数百美元的成本。据 VideoCardz 报道，英伟达已准备了 GeForce RTX 5080 SUPER、RTX 5070 Ti SUPER 和 RTX 5070 SUPER 三款产品。这三款显卡均计划采用 3GB GDDR7 颗粒，在不改变显存位宽和颗粒数量的前提下实现显存容量升级。IT之家此前曾报道，电源厂商海韵官网的功率计算器中已出现这三款显卡的 TDP 数据：RTX 5080 SUPER 为 415W、RTX 5070 Ti SUPER 为 350W、RTX 5070 SUPER 为 275W。显存方面，RTX 5080 SUPER 和 RTX 5070 Ti SUPER 预计配备 24GB GDDR7，RTX 5070 SUPER 则升级至 18GB。另据超能网报道，面向入门级市场的 RTX 5050 9GB 同样因 3GB GDDR7 价格问题被搁置 —— 该型号原本计划采用三颗 3GB GDDR7 颗粒，相关项目大概率已被暂停或取消。作为替代方案，英伟达此前恢复了 RTX 3060 12GB 的生产和供应。同德与耕升已在本月推出了新款 RTX 3060 12GB 显卡，与 2021 年首发建议零售价一致。当前 DRAM 市场整体处于供应紧张状态。NVIDIA 创始人黄仁勋此前曾表示，2026 年游戏显卡供应短缺的主要原因是 GDDR7 显存不足，DRAM 生产商将大部分产能转向了利润更高的 AI 领域用存储。在此背景下，英伟达要在消费级市场大规模采购价格高昂的 3GB GDDR7 颗粒，面临不小的成本压力。虽然三星、SK 海力士和美光均已建立 3GB GDDR7 模块的生产线，但短期内价格能否回落仍是未知数。关于 RTX 50 SUPER 系列的最终发布时间，目前仍存在较大不确定性。外界曾普遍预期该系列会在 2026 年 1 月的 CES 上亮相，但英伟达在展会前明确表示不会发布新显卡。此后有报道称该系列推迟至 2026 年第三季度，但亦有供应链消息指出最快可能要到 2027 年初。目前 NVIDIA 尚未向 AIC 合作伙伴提供新的发布日期。相关阅读：《海韵官网已录入英伟达 RTX 50 SUPER 系列显卡，TDP 数据曝光》《消息称英伟达 GeForce RTX 50 系列显卡 SUPER 版本最快 2027 年初推出》《曝英伟达重启 GeForce RTX 50 SUPER 显卡计划，包含 12GB 版 60 级产品》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/308.htm", "publishedAt": "2026-07-17T14:06:12+00:00"}, {"title": "美国向韩国施压：提议分享三星、SK 海力士“超额利润”，主张“美企大量采购应获分成”", "summary": "IT之家 7 月 17 日消息，据《韩国时报》今日报道，美国方面曾在与韩国政府官员会面时提出，希望获得韩国半导体企业在 AI 芯片热潮中获得的部分“超额利润”。一名了解相关情况的产业界人士称，美国提出这一要求的理由是，美国企业大量采购韩国芯片产品，对三星电子和 SK 海力士的业绩增长作出了贡献，因此美方认为自身也应获得一定收益分配。报道称，美国贸易代表办公室（USTR）副贸易代表里克 · 斯威策（Rick Switzer）在上个月的一次会谈中向韩国贸易部长吕翰九表达了这一观点。消息人士表示，斯威策认为，如果韩国国内为韩国芯片企业提供配套服务的合作企业能够分享部分利润，那么美国相关企业也应具备类似资格。一名韩国政府高级官员也向《韩国时报》证实，美方曾提出类似主张，但未透露更多细节。该媒体随后多次联系美国贸易代表办公室、美国商务部以及美国财政部进行确认，但截至报道发布时未获得回应。韩国贸易、工业和资源部相关官员则表示，并不了解这一情况，也无法对此发表评论。韩国贸易部门官员表示，韩国企业已经根据去年关税相关谈判期间举行的商业圆桌会议安排，公布了相关投资计划，并且多年来持续进行了大规模投入。该官员称，韩国政府的基本立场是，产业相关事项应基于商业合理性和相关原则推进，目前对于半导体领域所谓利润分配问题，并没有掌握的信息。此次消息传出之际，韩国半导体出口正受 AI 基础设施建设需求推动持续增长。根据韩国政府公布的数据，今年上半年韩国半导体出口额达到 1924.3 亿美元（IT之家注：现汇率约合 1.3 万亿元人民币），同比增长 162.5%，去年同期为 733.1 亿美元。其中，对美国出口额达到 264 亿美元，同比增长 91.3%。今年 6 月，韩国半导体出口额同比增长 199.2%，达到 448.2 亿美元（现汇率约合 3038.95 亿元人民币），创下单月新高；其中对美国出口额达到 64.9 亿美元（现汇率约合 440.04 亿元人民币），同比增长 377.2%，去年同期为 13.6 亿美元。三星电子和 SK 海力士作为全球主要存储芯片供应商，受 AI 服务器、高带宽内存（HBM）等市场需求增长影响，相关业务规模持续扩大。两家公司近年来均加大了先进半导体领域投资。目前，美国政府公开推动韩国芯片企业合作的重点仍主要集中在扩大美国本土半导体制造能力，而非利润分配问题。美国商务部长霍华德 · 卢特尼克（Howard Lutnick）此前公开呼吁三星电子和 SK 海力士在美国建设存储芯片工厂，以配合美国推动半导体供应链本土化的政策方向。三星电子和 SK 海力士此前已经公布了美国投资计划。其中，三星正在美国得克萨斯州推进半导体相关投资，SK 海力士也宣布将在美国建设先进封装等相关设施。不过，目前两家公司尚未公布在美国建设先进 DRAM 或 NAND 闪存晶圆制造工厂的计划。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/978/285.htm", "publishedAt": "2026-07-17T12:06:44+00:00"}, {"title": "飞牛 fnOS 现已支持第 3~5 世代 Raspberry Pi 树莓派单板计算机", "summary": "IT之家 7 月 17 日消息，NAS 操作系统开发方飞牛 fnOS 官方今日宣布，其面向 Arm 指令集的系统版本新增对第 3~5 世代树莓派（IT之家注：含 Raspberry Pi 3B / 3B+ / 3A+ / 4B / 5）的支持。这意味着 fnOS 正式与 const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="昨天";
  else if(dayDiff===-1) prefix="明天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.parentNode.removeChild(box); return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top"><span class="dot" style="background:#94a3b8"></span>顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '"><span class="dot" style="background:' + accentVar(i) + '"></span>'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
