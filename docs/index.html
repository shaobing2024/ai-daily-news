号运载火箭的第 15 次飞行，也是力箭系列运载火箭第 16 次发射。截至目前，力箭一号运载火箭已成功将 110 颗卫星送入太空，入轨载荷总质量超 16 吨，是国内唯一实现发射卫星总数超百颗的民商火箭型号。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/173.htm", "publishedAt": "2026-07-24T07:35:19+00:00"}, {"title": "Runway Media Router 上线：根据场景切换 AI 模型，帮你省 Token", "summary": "IT之家 7 月 24 日消息，Runway 公司昨日（7 月 23 日）发布博文，宣布推出 Runway Media Router，在生成图像、视频、音频时根据使用场景灵活切换所用 AI 模型。Runway 将模型选择标准归纳为 3 项：质量、处理速度、成本。系统可依据单次请求的优先级自动切换模型，减少开发者逐一比较模型以及切换模型负担。IT之家附上相关截图如下：Runway 将模型调用场景分为高速生成、低速但高质量、质量中等但成本较低 3 种，针对用户实际使用场景自动切换，例如用于创意验证的视频生成更重速度，而成片环节更重质量。Runway Media Router 目前已在开发者平台 Runway Dev 上线，支持生成图片、视频和音频类型，可以调用 Seedance、GPT Image 2 和 ElevenLabs 等多家公司模型。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/144.htm", "publishedAt": "2026-07-24T07:00:01+00:00"}, {"title": "阿里开源 0.8B 文档解析模型 OvisOCR2，端到端模型首次超越流水线方法", "summary": "IT之家 7 月 24 日消息，今日，阿里云开源发布文档解析模型 OvisOCR2。该模型以 96.58 的综合得分刷新 OmniDocBench v1.6 榜单纪录，成为首个超越流水线方法并登顶该榜单的端到端模型，官方称“这是文档解析领域迎来技术路线的重要突破”。端到端模型首次超越流水线方法IT之家从官方公告获悉，文档解析是大模型落地的关键基础设施，企业知识库、RAG 检索、智能问答等场景均需将 PDF、扫描件等非结构化文档转化为结构化文本。此前该领域由“流水线方法”主导，通常由版面分析模型和内容识别模型两部分组成，前者负责识别文档布局，后者负责文字、公式、表格等内容的识别，最后拼接输出。这种方式虽成熟，但存在维护成本高、误差累积、部署复杂等固有瓶颈。OvisOCR2 采用端到端技术路线：输入一张文档图像，模型在一次生成中输出符合自然阅读顺序的 Markdown 表示，覆盖文本、公式、表格和视觉区域。过去需要多个模型协作完成的工作，现在由一个模型一步到位。在 OmniDocBench v1.6 上以 96.58 分登顶，首次证明端到端模型可超越流水线方法。小参数大能力，0.8B 实现 SOTAOvisOCR2 由 Qwen3.5-0.8B 后训练得到。团队构建了真实文档与合成文档互补的数据引擎体系，合成文档专门补充表格与公式交织、多栏版式、长输出等复杂场景。训练方案融合监督微调（SFT）、强化学习（RL）、在线策略蒸馏（OPD）和模型融合四阶段流程，形成多阶段递进式的训练流程，充分释放紧凑模型的潜力。▲ OvisOCR2 数据引擎体系项目已开源发布，无缝融入千问生态OvisOCR2 以 Apache 2.0 许可证开源，兼容 vLLM 等主流推理框架，与 Qwen3.5 推理生态衔接，开发者无需额外适配即可集成。模型获取方式Hugging Face魔搭技术报告", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/138.htm", "publishedAt": "2026-07-24T06:48:19+00:00"}, {"title": "FLUX 3 多模态 AI 模型登场：支持单次生成 20 秒多样化视频", "summary": "IT之家 7 月 24 日消息，Black Forest Labs 昨日（7 月 23 日）发布博文，宣布以 Early Access 方式，上线推出 Flux 3 多模态基础模型，采用统一架构联合学习图像、视频和音频。在训练方面，IT之家援引博文介绍，该模型基于 Self-Flow（自监督流匹配）学习框架扩展，同步训练视频、图像和音频，在 FLUX.1 和 FLUX.2 系列基础上，扩大至多模态生成与理解任务。FLUX 3 可在单次生成中输出最长 20 秒的视频，并附带原生音频。官方表示该模型支持文生视频、图生视频、视频生视频、输入视频与音频续写、关键帧转视频、多语言对话，以及多镜头串联。性能方面，在带声音的 10 秒、720p 视频人工评测方面，结果显示，FLUX 3 对比 Grok Imagine Video 的胜率为 69%，对比 Seedance 2.0 的胜率为 52%，对比 Gemini Omni Flash 的胜率也为 52%。在机器人方向，Black Forest Labs 正与 Mimic Robotics 合作，研究将 FLUX 3 用作机器人行为预测模型。图像能力方面，官方称 FLUX 3 可完成图像生成与编辑，覆盖多种风格、宽高比和分辨率。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/137.htm", "publishedAt": "2026-07-24T06:48:04+00:00"}, {"title": "200 家硅谷初创联名反对白宫政府封禁中国开源 AI 模型", "summary": "\"这对 Anthropic 来说太好了，因为我们所有人都不得不花钱买 Anthropic 的服务。\" 7 月 22 日，近 200 家硅谷初创企业联名致信白宫，呼吁不要切断美国开发者获取中国开源 AI 模型的渠道。Particle 创始人 Suhail Doshi 在接受 POLITICO 采访时把话说得最直白：\"将会有数百家公司瞬间死掉。\" 这封信来自一个刚刚成立的叫\"...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/478417", "publishedAt": "2026-07-24T06:39:45+00:00"}, {"title": "消息称小鹏人形机器人正小批量试生产，量产产线进入最后联调阶段", "summary": "7 月 24 日下午消息，新浪科技独家获悉，小鹏人形机器人已在广州工厂正式开启小批量试生产，同时量产产线进入最后联调阶段，量产冲刺正式进入倒计时。此前，小鹏集团内部召开机器人量产动员大会，明确了关键时间节点：2026 年实现人形机器人量产，预计 2027 年起将陆续进驻全球小鹏门店及商业场景，承担导购、讲解等服务。据悉，小鹏机器人业务整合集团在硬件、AI 大模型、供应链及营销等模块能力，并将汽车业务积累的软硬件协同研发、智能制造与全球化渠道经验，系统性地复用于机器人领域，加速高阶人形机器人的量产与商业化进程。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/130.htm", "publishedAt": "2026-07-24T06:38:26+00:00"}, {"title": "超 GPT-5.6 Sol：月之暗面 Kimi K3 模型 AI 智能体知识工作跑分仅次于 Claude Fable 5", "summary": "IT之家 7 月 24 日消息，Artificial Analysis 于 7 月 22 日更新 AI 智能体知识工作基准 AA-Briefcase，显示 Kimi K3 模型斩获 1543 分，超过 GPT-5.6 Sol（1501 分），仅次于 Claude Fable 5 模型（1574 分）。IT之家注：AA-Briefcase 是独立 AI 评测机构 Artificial Analysis 于 2026 年 6 月推出的全新前沿 AI 智能体（Agent）知识工作基准测试。它专为评估 AI 在处理长周期、高复杂度真实业务中的表现而设计，模拟企业中真实且混乱的办公环境，测试数据科学、产品管理、企业战略等场景，处理海量碎片化上下文（包括 25000+ 条 Slack 消息、3500+ 封电子邮件、会议纪要和财务报表等），并要求生成 Excel 财务模型、董事会汇报 PPT 等实际的商务交付物。根据最新跑分结果显示，Kimi K3 模型在 AA-Briefcase 上的跑分达到 1543 分，仅次于 Claude Fable 5（1574 分），超过 GPT-5.6 Sol (最高 1501)、Claude Sonnet 5 (最高 1388) 和 Claude Opus 4.8 (最高 1347)。相比较而言 Kimi K2.6 模型在榜单上的成绩为 816 分。延伸阅读Kimi K3 模型由月之暗面（Moonshot AI）于 2026 年 7 月 16 日正式上线，是其迄今为止最强的旗舰模型，拥有 2.8 万亿参数和 100 万 Tokens 的上下文窗口，尤其擅长编程、游戏 / 3D 与知识类任务。在编程能力方面，Kimi K3 在 Frontend Code Arena 基准测试中曾以 1679 分超越 Claude Fable 5 登顶，在品牌营销、数据分析等七个前端领域中的六个位居第一。Kimi K3 模型采用按量计费，每 100 万 Tokens 的输入费用在缓存命中时为 2 元，未命中时为 20 元，输出费用为 100 元。近期有报道称，微软正在内部测试 Kimi K3 模型，并评估将其部分接入 Copilot AI 助手的可行性，以降低推理成本。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/126.htm", "publishedAt": "2026-07-24T06:33:12+00:00"}, {"title": "腾讯混元大语言模型和多模态团队合并，统一由姚顺雨管理", "summary": "IT之家 7 月 24 日消息，据新浪科技今日报道，腾讯宣布混元多模态模型部门与大语言模型部门合并，成立基础模型部，统一由腾讯首席 AI 科学家姚顺雨管理，以进一步提升模型研发和协同效率，探索全模态模型的智能上限。以大语言模型为基础，腾讯混元构建了图像、视频、语音、3D 生成模型等完整的模型矩阵。据介绍，7 月正式上线的大语言模型 Hy3，展现出显著强于同尺寸模型且比肩参数规模 2-5 倍的旗舰模型的智能水平，已在 WorkBuddy / CodeBuddy、元宝、Marvis、ima 等多个业务接入，API 已在腾讯云 TokenHub 以及多个海外平台上线。发布一周后，Hy3 总调用量较上一代模型（Hy2）增长超 68 倍，WorkBuddy 自选模型的用户中，选择 Hy3 的占比达到 60%。混元多模态模型也在持续进化。4 月发布并开源的混元 3D 世界模型 2.0（Hy World 2.0）能够根据文字、图片、视频等不同类型输入，自动生成、重建和模拟 3D 世界，同时支持多格式 3D 资产导出，能与现有的游戏工作流无缝对接，快速生成游戏地图和关卡原型。混元 3D 系列模型的社区下载量超过 300 万。混元图像模型 3.0 在 LMArena 榜单上居国内开源模型第一。IT之家注：姚顺雨本科毕业于清华大学姚班，获普林斯顿大学计算机科学博士学位，2024 年加入 OpenAI 并参与智能体产品 operator 与 deep research 开发 。其研究聚焦语言智能体与现实世界交互，提出 ReAct 方法首创“推理 — 行动”结合的智能体范式，被学术界与工业界广泛采纳。2025 年 12 月，腾讯升级大模型研发架构，新成立 AI Infra 部、AI Data 部、数据计算平台部，全面强化其大模型的研发体系与核心能力。姚顺雨（Vinces Yao）出任“CEO / 总裁办公室”首席 AI 科学家，向腾讯总裁刘炽平汇报；同时兼任 AI Infra 部、大语言模型部负责人，向技术工程事业群总裁卢山汇报。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/981/121.htm", "publishedAt": "2026-07-24T06:19:25+00:00"}, {"title": "Claude Code 已整合 Rust 重构版 Bun，在 Linux 平台启动速度快 10%", "summary": "IT之家 7 月 24 日消息，开发者西蒙 · 威利森（Simon Willison）于 7 月 19 日在其个人博客中指出，6 月 17 日发布的 Claude Code v2.1.181 版已整合 Rust 语言重构的 Bun，在 Linux 平台上启动速度快 10%。Bun 是用于执行 JavaScript 和 TypeScript 程序的 Runtime，Claude Code 虽以独立可执行文件形式分发，但其程序底层使用 Bun 作为运行环境。IT之家曾于 7 月 11 日报道，开发者贾里德 · 萨姆纳（Jarred Sumner）宣布在 Claude Fable 5 模型的帮助下，耗时 11 天、耗费 16.5 万美元，已重构 JavaScript 运行时 Bun，从 Zig 完全重写为 Rust 语言。威利森在检查 Claude Code 可执行文件后发现，其中出现“Bun v1.4.0”字样，以及大 const ACCENTS = ["--c1","--c2","--c3","--c4","--c5"];
function accentVar(i){ return "var(" + ACCENTS[i % ACCENTS.length] + ")"; }

// 完整 HTML 转义（文本内容与属性通用）
function esc(s){
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
</body>
</html>
