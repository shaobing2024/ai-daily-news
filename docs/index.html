const DATA = {"date": "2026-07-23", "generatedAt": "2026-07-23T08:27:35Z", "attribution": {"source": "中文科技媒体 RSS 聚合"}, "sourceList": ["量子位", "IT之家", "InfoQ 中文", "爱范儿", "开源中国"], "lead": "", "isFallback": false, "sections": [{"label": "模型发布/更新", "items": [{"title": "为什么决定法律 AI 成效的，是数据平台，而不是模型 ｜ 技术实践", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/PZ5Xe45iTQlOXtZveBKU?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T15:36:29+00:00"}, {"title": "全球首个端侧驱动本体的世界模型来了！大晓机器人首创“信息密度定律”，重写物理AI训练逻辑", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/u0hD10fj7HWAfb10Dbr3?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-23T15:10:30+00:00"}, {"title": "阿里云灵骏真武 M890 适配 Qwen3.8，成国内首个成功运行超 2 万亿参数大模型的超节点", "summary": "IT之家 7 月 23 日消息，今日，阿里云宣布灵骏真武 M890 超节点实例已成功适配 Qwen3.8，并上线阿里云百炼平台提供模型推理服务，这是国内首个成功运行超 2 万亿参数大模型的超节点。据介绍，Qwen3.8 是阿里最新旗舰模型，参数规模高达 2.4 万亿，跑通这一规模的模型需要将参数分散到几十张甚至上百张高速互联的 GPU 卡，让万亿参数“跑得又稳又快”。然而，普通 AI 集群因通信带宽的局限，无法满足高吞吐、低延迟、高并发的需求。IT之家注意到，真武 M890 是平头哥新一代训推一体 AI 芯片，原生支持 FP32 到 FP4 等多种数据精度，可应用于高精度训练、低精度和超低精度推理的全场景。灵骏真武 M890 超节点实例通过 ICN Switch 1.0 互联芯片，让 64 张真武 M890 实现了 800GB/s 的高速互联，显存规模达到 9TB，单实例即可支撑大规模 2 万亿参数 MoE 模型的专家并行需求。此外，阿里还从芯片到云平台层面实现了与 Qwen 模型的全链路优化，不仅可以丝滑跑通 Qwen3.8，还能显著提升推理效率、降低推理成本。实测数据显示，通过算子优化和软硬件架构协同，该超节点实例在 Agentic 推理场景中最多可实现 1.5 倍的推理性能提升。相关阅读：《阿里云发布灵骏真武 M890 超节点实例，单台可承载十万亿参数级 MoE 大模型推理》《阿里千问 Qwen3.8 预览版模型上线：2.4T 参数量，宣称“可能是除了 Fable 5 外最强大的模型”》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/677.htm", "publishedAt": "2026-07-23T08:13:21+00:00"}, {"title": "我国首个全自主可控智能钻井系统在川投用，整体时效提升 20%", "summary": "IT之家 7 月 23 日消息，据中国石油报今日报道，7 月 20 日，记者从川庆钻探公司获悉，我国首个全自主可控智能钻井系统 —— 启能 ·IDOS 智能钻井系统在四川成功投用，通过“换脑”升级成功改造 12 台传统钻机，助力钻井作业效率显著提升。据介绍，川庆钻探在业界率先启动“332 工程”，即优选 30 个井场试点推广智能钻井系统，确保实现单井提速 20% 等目标。这个自研系统具备智能钻井、智能划眼、一键关井、远程坐岗等功能，在保证施工安全的同时提升了效率。在人员优化上，系统通过智能体和岗位整合，泥浆工、经管员、生活管理员等岗位员工经过培训转岗至设备巡检、远程监控等新设的岗位，或补充到其他缺员井队，盘活了人力资源。在作业效率上，系统如同给钻机加装了“智慧大脑”。在 70346 队司钻房，司钻罗悄然轻点屏幕，钻机便自动进行钻进作业。“过去寻找最优施工参数，我要反复探索几十分钟。现在系统自动控制设备执行后五六分钟就弄好，钻速最快能提高 20%。”系统的智能定向功能深度兼容国内外主流 MWD / LWD 数据接口，覆盖滑动钻进与旋转导向两大核心工艺。系统融合实时算法的一键起下钻功能，使单趟起钻平均完成的立柱数由 15 至 18 柱增加到 19 至 21 柱，相当于多提出 3 到 9 根钻杆，整体时效提升 20%。基于此，试验井创下区块施工周期最短纪录，较最优指标缩短 8.7%。安全方面，钻头一接触易卡地层，智能划眼功能便毫秒级自动调整扭矩和摩阻，稳稳控制住“过提过放”风险。司钻面板上红色的“一键关井”按钮格外醒目，一旦出现溢流等紧急情况，系统可实现秒级预警并自动执行关井。按规划，2026 年至 2027 年间，川庆钻探将完成 30 台钻机的智能升级，逐步实现全链条智能化。IT之家注意到，目前钻井作业已经逐步向智能化方向发展。去年 5 月，我国首套具有自主知识产权的智能钻井系统 ——“长龙号”智能钻井系统正式投入使用，操作人员仅需轻点屏幕，即可完成全流程作业。系统通过覆盖全井场的智能传感网络，每秒可采集 150 组数据，其智能决策平台每 5 秒生成最优钻井参数，使钻头能够自动“追着油层走”，大大提高了钻井效率。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/665.htm", "publishedAt": "2026-07-23T08:07:12+00:00"}, {"title": "皮查伊驳斥谷歌 AI 落后论调，透露 Gemini 4 将近乎按月迭代", "summary": "IT之家 7 月 23 日消息，Alphabet 首席执行官桑达尔 · 皮查伊（Sundar Pichai）在今日举行的财报电话会议上，为谷歌的 AI 战略进行了有力辩护，回应外界对于公司因旗舰模型延期发布以及在 AI 编程领域落后于竞争对手的担忧。由于原定于今年 6 月发布的 Gemini 3.5 Pro 至今仍未正式推出，投资者的不安情绪持续升温。这款模型原本被视为谷歌提升 AI 编程能力和 AI 智能体（AI Agent）能力的重要产品，而这两个方向正是当前 AI 行业竞争最激烈的领域。Gemini 3.5 Pro 的延期进一步加剧了市场担忧。随着 OpenAI、Anthropic 以及多家中国 AI 企业不断加快模型发布节奏，不少投资者开始质疑谷歌是否正在失去竞争优势。在财报电话会上，面对分析师有关谷歌前沿 AI 模型竞争力的提问，皮查伊罕见地采取了较为强硬的回应态度。针对摩根大通分析师 Doug Anmuth 提出的“Gemini 是否仍具备行业领先竞争力，以及谷歌模型发布速度为何较慢”的问题，皮查伊表示：“我们的模型一直处于行业前沿。在很多方面，我们依然保持领先。当然，我们也承认某些领域还有提升空间，例如 AI 编程以及智能体编程（Agentic Coding）就是其中之一。”相比解释 Gemini 3.5 Pro 延期的原因，皮查伊更多强调了 Gemini Flash 系列的重要性。他表示，Gemini Flash 是谷歌价格更低、速度更快的“主力模型”，目前已广泛应用于网络安全、智能客服、数据分析以及企业软件等多个场景。皮查伊特别提到，本周刚刚发布的 Gemini 3.6 Flash，相比上一代产品，在一项 AI 编程基准测试中的成绩提升了 10 分以上，同时使用的 Token 数量更少，运行效率进一步提高。此外，谷歌周二还发布了 Gemini 3.5 Flash-Lite 以及专门面向网络安全场景的 Gemini 3.5 Flash Cyber 模型，而 Gemini 3.5 Pro 目前仍处于合作伙伴测试阶段。谈及下一代产品时，皮查伊表示：“当谷歌发布 Gemini 4 时，我相信大家会感到满意。”他将 Gemini 4 形容为“一项极具雄心的计划”，并透露谷歌正在训练一款规模更大的模型，希望在发布后能够重新跻身行业最前沿。皮查伊强调，公司仍“非常坚定、非常有信心”在人工智能领域保持领先地位。随后，巴克莱分析师 Ross Sandler 也对谷歌模型发布节奏提出质疑。对此，皮查伊透露，Gemini 4 系列未来的更新计划将接近“每月发布一次新模型”的节奏。皮查伊此次高调回应，也反映出谷歌当前面临的一个重要挑战：如何让投资者不再仅盯着一款旗舰模型的延期，而是看到谷歌已经建立起覆盖云计算基础设施、自研 AI 芯片以及贯穿旗下产品和服务的 Gemini 模型生态。当天，谷歌再次交出亮眼的云业务成绩单。公司云计算业务同比增长 82%，远高于市场平均预期的 64%。不过，华尔街目前更加关注的是，随着 AI 基础设施投资不断攀升，谷歌是否能够重新夺回 AI 编程和前沿推理模型领域的领先地位。Alphabet 同时宣布，将资本支出计划再提高 150 亿美元，最新预计资本开支总额将达到 1950 亿至 2050 亿美元（IT之家注：现汇率约合 1.32 万亿至 1.39 万亿元人民币）。受多重因素影响，Alphabet 股价在盘后交易中一度下跌超过 3%。Gemini 旗舰模型持续延期，加上近期多位高管相继离职，使公司股价自今年 4 月底以来累计下跌约 9%。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/653.htm", "publishedAt": "2026-07-23T07:55:09+00:00"}, {"title": "微软 Excel 负责人：Copilot 将把电子表格转变为 AI 决策平台", "summary": "IT之家 7 月 23 日消息，微软 Excel 负责人布莱恩 · 琼斯（Brian Jones）本周通过 X 平台表示，Excel 正从一个电子表格工具演变为人工智能驱动的商业决策平台。名为 Everett 的网友向琼斯询问 Excel 和 AI 之间的长期关系，以及 Excel 是否正在“从电子表格工具演变为一个业务推理平台，用户只需用自然语言描述一个问题，Excel 就能自动构建模型、分析和洞察。”对此琼斯表示认同 Everett 的观点：Everett，是的，这正是我们的愿景。问题是，上述愿景在实际落地场景下遇到一些挑战。一方面，是部分用户无法有效利用平台和工具；另一方面有时分析本身非常复杂，所以需要很长时间。因此，我们的观点是 Copilot 会让您更轻松地使用 Excel，我希望随着时间推移，会有越来越多的人认可这个观点。有时候你使用 Excel 需要多个步骤，即便你知道如何使用 Excel，调用 Copilot AI 能为您节省时间，并更快地让您得到正确的洞察。Excel 不仅仅是表格工具，它一直是那个终极的决策工具，这也是人们期待 AI 的方向。我们看到的演变是 AI 和 Excel 在协同工作方面变得越来越紧密，用户可将 Excel 视为处理从数据输入到逻辑推理全链路的统一界面。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/649.htm", "publishedAt": "2026-07-23T07:44:51+00:00"}, {"title": "北京现代艾尼氪 V 车型将于 9 月正式上市：溜背式造型设计、号称为中国用户量身定制", "summary": "IT之家 7 月 23 日消息，在 7 月 21 日至 7 月 23 日举行的 2026 中国汽车论坛上，北京现代汽车有限公司总经理李凤刚表示艾尼氪 V 将于 9 月正式上市，并表示公司今年将推出三款新车。据介绍，艾尼氪 V 设计均由现代中国设计中心全程主导，为中国用户量身定制，并反向输出全球。车辆提供赛博金、次元紫、伽马绿、磁力灰、光子白（素色漆）、光子白（哑光漆）、流光银、夜刃黑等 8 款颜色。整体采用极其前卫的轿跑溜背式造型，车身比例呈现低重心、宽体化的视觉效果。其车侧采用无框式车门，车尾为次元星轨尾灯样式。座舱方面，新车车内配备星云环抱式内饰设计，27 英寸超薄 4K 超大屏，星云光影氛围灯，赛博之眼 HUD。车辆深度融合 Momenta、高通 8295 芯片、宁德时代、文心大模型、火山引擎。规格方面，这款车型长宽高分别为 4900/1890/1470mm，轴距为 2900mm，基于 E-GMP 纯电平台打造，支持纯电 / 增程双动力，具备 800V 快充。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/635.htm", "publishedAt": "2026-07-23T07:16:39+00:00"}, {"title": "腾讯云发布云端智能体 CodeBuddy NPC：直接交付，不费 Token", "summary": "IT之家 7 月 23 日消息，今日，腾讯云正式发布云端智能体 CodeBuddy NPC。据介绍，开发者只需派发一个任务，CodeBuddy NPC 即可自主完成方案规划、代码开发、提交 PR、执行测试，并根据 CI 结果持续修改，直到交付可验收的成果。IT之家附官方详细介绍如下：作为腾讯云代码助手 CodeBuddy 面向企业研发流程推出的新一代智能体，NPC 依托腾讯云研发平台 CNB，可以直接利用代码仓库、Issue、PR、CI / CD 等研发上下文，在现有研发流程中持续推进任务，无需开发者反复复制需求、代码和报错日志。一批开箱即用的官方研发 NPC 已在 CNB 等待召唤，同时支持多个 NPC 组队构建 NPC Team，协同完成复杂研发任务。官方研发 NPC 经过持续优化，首轮 Token 消耗已从早期 2 万多个降低至约 2000，降幅超过 90%。NPC 有研发记忆，像 @同事一样协作与主要运行在本地、辅助编写代码的 AI 编程工具不同，CodeBuddy NPC 不再停留在代码编辑器，而是直接进入研发流程，在代码仓库、Issue、PR、CI / CD 等环节持续工作。开发者可以像 @一位同事一样，在 Issue 中直接 @NPC。收到任务后，它会自动读取研发流程中的各种上下文：Issue 是需求记忆，记录任务、背景与目标；代码仓库是工程记忆，承载项目结构、依赖关系与演进历史；PR 是变更记忆，沉淀方案、代码与评审反馈；CI 是质量记忆，记录构建结果、失败原因与修复过程。这些研发资产，不再只是开发者的工作记录，也成为 NPC 的原生工作上下文。有了这些“研发记忆”，NPC 可以持续完成研发任务，而不是一次性生成代码。开发网站自动读取需求和项目代码，完成开发、提交 PR，并生成预览环境。自主解决代码冲突自动处理代码合并冲突，修改后重新提交。自动修复 CICI 失败后自动定位问题、修复代码并重新执行，直到通过质量门禁。组建 NPC Team，完成复杂研发任务除了独立完成任务，CodeBuddy NPC 还支持多个 NPC 按照不同角色协同工作。我们使用一支 NPC Team，全程零人工干预，完成了一款游戏从需求拆解到最终验证的全流程开发。项目经理 NPC 负责需求拆解与任务分配；剧本、美术、配乐、配音等 NPC 分别完成内容创作；资产整合 NPC 汇总代码与素材；代码评审 NPC 和测试 NPC 完成最终验证。(NPC 自己安排自己干活)整个过程都在云端完成，任务、代码、素材和测试结果持续沉淀在同一个项目中，一个 NPC 的输出可以直接成为下一个 NPC 的输入。企业还可以通过 Role、Skill、SOP 和 Team，编排属于自己的 NPC Team，让产品、开发、测试等不同角色的 NPC 分工协作，完成复杂研发任务，比如定义一个“猿芳”。干活靠谱不费 Token，企业可灵活调度模型一次 Agent 执行任务，通常需要经历多轮模型调用。由于首轮系统提示词和工具描述会在后续调用中持续复用，首轮 Token 越小，多轮执行的整体成本就越低。腾讯云持续优化提示词、工具调用、CLI 输出和 Cache 命中率，将官方 CodeBuddy NPC 首轮 Token 消耗从早期 2 万多个降低至约 2000，降幅超过 90%，显著降低了复杂研发任务的整体 Token 开销。企业还可以根据任务复杂度灵活配置模型策略。简单任务调用低成本模型，复杂研发任务调用能力更强的模型，多模态任务则可在云端运行相应模型，实现性能与成本的平衡。依托腾讯云研发平台 CNB，企业无需改造现有工具链，可继续使用 Git、构建、发布、TAPD 等研发工具，在原有流程中直接向 NPC 派发任务。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/633.htm", "publishedAt": "2026-07-23T07:14:21+00:00"}, {"title": "代码暗示，特斯拉 App 已开始为 Optimus 人形机器人上线做准备", "summary": "IT之家 7 月 23 日消息，最新代码显示，特斯拉已经开始在手机 App 中为 Optimus 人形机器人的推出做准备。埃隆 · 马斯克此前曾表示，Optimus 将成为“有史以来销量最高的产品”，如今，特斯拉正逐步完善与其相关的软件支持。据 Tesla App Updates 发现，特斯拉手机 App 中首次出现了多项与 Optimus 项目相关的代码，主要包括以下几项新功能。首先，特斯拉正在开发一套专门面向机器人的蓝牙低功耗（BLE）身份认证机制。不过，这项功能并不仅限于 Optimus，也可能适用于 Robotaxi。由于 Robotaxi 是特斯拉的自动驾驶网约车平台，因此系统未来可能也会将这些车辆归类为“机器人”设备。简单来说，用户可以像将手机设置为特斯拉汽车钥匙一样，将手机添加到特斯拉机器人设备的授权白名单中。无论是 Optimus、Robotaxi，还是未来其他机器人产品，只有经过授权的设备才能与其通信和控制。这一机制将进一步提升设备安全性，有助于防范未经授权的访问以及一些基础层面的安全威胁。此外，App 代码还显示，特斯拉正在开发一套适用于家庭场景的数据采集功能，可视为 Optimus 在家庭环境中的“神经网络”数据来源。未来，当 Optimus 在家中执行任务时，App 将弹出专门页面征求用户授权，允许采集视频数据和空间环境数据。机器人执行的各种家务任务，例如吸尘、洗碗、擦拭灰尘等，都可能被记录，用于优化其智能模型。与此同时，系统还将提供一套完善的状态提醒功能，可实时监测机器人的运行情况，包括电量不足、机械故障等各种异常状态，并向用户发送提醒。IT之家注意到，除了与 Optimus 有关的内容外，此次 App 更新中的大部分代码仍与特斯拉 2026 年夏季更新有关，包括新功能所需的图片资源、自定义车身贴膜功能的预览，以及其他即将推出的新特性。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/629.htm", "publishedAt": "2026-07-23T07:08:36+00:00"}, {"title": "消息称 Claude 语音模式将支持调用 Opus 和 Sonnet AI 模型", "summary": "IT之家 7 月 23 日消息，科技媒体 testingcatalog 昨日（7 月 22 日）发布博文，报道称 Anthropic 有望本周升级 Claude 语音模式，支持调用 Opus 和 Sonnet 更强模型。Claude 的语音模式支持用户和 AI 完整的语音对话，用户无需输入提示并阅读书面回复，可以和 Claude 交谈并听取其回复，目前统一调用 &nbsp;Claude Haiku 4.5 模型运行。而最新消息称 Anthropic 有望本周提供新的选择器，让用户切换 Opus、Sonnet 和 Haiku 三种模型，旁边设有控制“思考”层级的设置。公司旗下的 Mythos 级模型 Claude Fable 暂未出现在语音选项中。IT之家附上相关截图如下：", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/624.htm", "publishedAt": "2026-07-23T06:55:11+00:00"}, {"title": "Kimi 叫停新订阅后，如何用上 K3｜实测避坑", "summary": "同一个模型，进入不同的壳，就不再是同一个「设计师」，这中间是 harness 的差异#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672800?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026-07-23T06:43:19+00:00"}, {"title": "超越π0，中国团队用1B参数模型登顶具身智能榜单", "summary": "具身智能正在从「参数竞赛」进入「架构竞赛」。", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/457537.html", "publishedAt": "2026-07-23T06:36:08+00:00"}, {"title": "Solon AI：Tool 与 Talent 怎么选？从函数到领域专家", "summary": "多数 Agent 教程停在工具层：给模型一个函数 Schema，指望它会正确调用。这对 get_time、hash_string 够用；一旦模型跳过知识库检索就直接开工单，或把几十上百个 API 全塞进上下文，就会崩。 Solon AI 把 Tool 留作执行单元，再提供 Talent（才能） 作为产品单元：工具 + SOP + 激活规则。可以先这样记： Tool ≈ 函数 ...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/477562", "publishedAt": "2026-07-23T05:34:15+00:00"}, {"title": "OpenAI 为数据中心争取社区支持：承诺不推高电费、用水量极低，还送 Codex 额度", "summary": "IT之家 7 月 23 日消息，据《商业内幕》今天（23 日）报道，OpenAI 正为佐治亚州一座大型数据中心争取社区支持，希望避免 AI 基础设施项目在美国各地引发的反对浪潮。OpenAI 公布了名为 Project Camellia 的新计划，准备在萨凡纳郊外的埃芬汉姆县乡村地区建设一座数据中心园区。项目投资额至少为 200 亿美元（IT之家注：现汇率约合 1356.3 亿元人民币），占地约 567 公顷，用电需求达到 3.2 吉瓦。OpenAI 表示，项目团队已与州及地方官员、社区领袖、学校和其他各方沟通并听取意见，后续还将举行公众说明会。“我们认为，尽早与社区接触才是建立信任的正确方式。项目仍处于开发初期，基础设施、建设阶段安排、设计、融资和运营模式等方面还有大量工作要完成。”埃芬汉姆县委员杰米 · 德洛奇声明称，团队已经提出了尖锐问题，并确认项目用水量很少，不会增加本县居民的能源成本，还能带来新的税收收入以支持学校，并为当地企业创造更多机会。OpenAI 已与佐治亚电力公司签订供电合同，约 567 公顷的园区将在 2028 年至 2032 年分阶段获得电力供应。OpenAI 同时公布四项承诺，重点回应电费上涨、用水量和社区影响等争议。上述问题正是其他地区反对数据中心建设的主要原因。OpenAI 承诺，项目不会推高当地居民的电费，园区采用的闭环水系统也能把用水量降至“极低”水平。“佐治亚州家庭不会为项目买单，我们将全额承担供电所需的基础设施和电力服务费用。”园区还将成为首批能够在用电高峰主动降低耗电量的数据中心之一，避免住宅用户受到供电压力影响。OpenAI 计划在项目整个运营周期内向社区提供 8000 万美元（现汇率约合 5.43 亿元人民币）回馈资金，并为符合条件的佐治亚州大学、社区学院和技术学校学生提供总额最高 7100 万美元（现汇率约合 4.81 亿元人民币）的 Codex 使用额度，每名符合条件的学生都可通过 ChatGPT 账户领取价值 100 美元的 Codex 使用额度。一家独立机构将每年审计 OpenAI 履行承诺的情况，并向公众公布审计结果。园区全面建成后，预计将带来数千个建设岗位和超过 1000 个长期运营岗位。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/575.htm", "publishedAt": "2026-07-23T04:13:17+00:00"}, {"title": "黄仁勋为中国 AI 模型站台：“优秀的开源模型就应该被使用”", "summary": "美国财政部长贝森特几小时前刚在 Fox Business 上威胁要制裁中国 AI 模型，英伟达 CEO 黄仁勋就在德克萨斯州把桌子掀了。 \"这些中国模型非常优秀。优秀的开源模型就应该被使用。\"黄仁勋在 Axios 的专访中说。美国公司\"绝对应该\"可以使用它们。 这不是一次普通的采访。黄仁勋选的时间点、说的每一句话，都在跟华盛顿过去一...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/477499", "publishedAt": "2026-07-23T03:46:25+00:00"}, {"title": "MatrixOne Git4Data 技术详解（八）・AI 训练实践篇", "summary": "从这一篇开始，我们进入 AI 训练的场景。AI 训练是 Git4Data 这套能力非常核心的应用场景 —— 训练过程中的数据组织、管理、变更和协作都非常频繁，MatrixOne 内建的这套能力在这里非常实用。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/u/5472636/blog/19725829", "publishedAt": "2026-07-23T03:18:41+00:00"}, {"title": "OpenAI 的人为失误如何导致了针对 Hugging Face 的 AI 驱动黑客攻击", "summary": "OpenAI 的一款模型在日前的一场测试中失控，为了通过作弊取得更高的测试分数，通过一次完全由 AI 驱动的攻击入侵了 AI 数据集平台 Hugging Face 的系统。 但据一些网络安全专家称，这次前所未有的 AI 驱动型安全漏洞的核心其实是一个非常人为的错误：OpenAI 未能正确配置其所谓的“高度隔离的环境”，导致本应完全与互联...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/ne e.com/0/980/645.htm", "publishedAt": "2026-07-23T07:36:34+00:00"}, {"title": "腾讯云发布云端智能体 CodeBuddy NPC", "summary": "腾讯云宣布正式发布云端智能体 CodeBuddy NPC。开发者只需派发一个任务，CodeBuddy NPC 即可自主完成方案规划、代码开发、提交 PR、执行测试，并根据 CI 结果持续修改，直到交付可验收的成果。 官方研发 NPC 经过持续优化，首轮 Token 消耗已从早期 2 万多个降低至约 2000，降幅超过 90%。 与主要运行在本地、辅助编写代...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/477664", "publishedAt": "2026-07-23T07:25:15+00:00"}, {"title": "给“AI”发身份证，国内首个智能体互联标准体系发布", "summary": "IT之家 7 月 23 日消息，据央视新闻今日报道，《人工智能 智能体互联》系列国家标准应用推进专题会议近日在北京中关村展示中心召开。现场发布 GB/Z185-2026 七项指导性国家标准，这是国内首个覆盖智能体全生命周期的互联标准体系，为全域 AI 协同搭建统一底层规则环球网。据介绍，当前 AI 智能体正从单纯的“能对话”向“善执行”转变。然而，由于缺乏统一规范，不同厂商的智能体往往互不兼容，身份难以溯源，跨域协作受阻，形成了“智能孤岛”。本次发布的 GB/Z185-2026 系列标准完整规范总体架构、智能体身份码、身份管理、能力描述、跨域发现、协同交互、工具调用七大核心环节，破解长期以来不同厂商智能体互不兼容、身份可信缺失、跨域协作壁垒突出等行业痛点，打通了智能体全流程运行的底层规则。七大核心环节中，智能体身份码是核心落地载体。现场举办智能体身份码首批发放仪式，累计完成 2000 余个重点行业智能体身份码发放，为每一个智能体赋予唯一可追溯“数字身份证”，构建可信互联底层信任体系。该体系是目前全球首套系统性的智能体互联标准体系，英文翻译版已在 2026 世界人工智能大会人工智能国际标准化论坛公开，后续还将推出俄语、阿拉伯语等版本，联动东盟等地区推进全球推广，为全球人工智能治理贡献“中国方案”。据IT之家此前报道，6 月 26 日，国家市场监督管理总局在京召开智能体互联标准化专题新闻发布会，宣布《人工智能 智能体互联》系列国家标准正式获批发布，旨在解决当前智能体产业中通信接口不统一、身份管理缺失及协同交互规则混乱等突出问题，火山引擎、小米、快手、联想等区内企业深度参与了本次标准编制。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/622.htm", "publishedAt": "2026-07-23T06:51:26+00:00"}, {"title": "业绩远低于华尔街预期，IBM 坚持认为 AI 时代大型机业务依旧良好", "summary": "IT之家 7 月 23 日消息，IBM 今年第二季度营收 172 亿美元（IT之家注：现汇率约合 1166.42 亿元人民币），毛利润为 99 亿美元（现汇率约合 671.37 亿元人民币），毛利率接近 58%，净利润为 22 亿美元（现汇率约合 149.19 亿元人民币），但多项数据仍远低于华尔街预期。据外媒 TechCrunch 今天（23 日）报道，IBM CEO 阿尔温德 · 克里希纳和 CFO 吉姆 · 卡瓦诺试图向投资者解释，低迷表现为何只是暂时现象：季度低迷只是短期波动，业务很快就会回到正常轨道。两人表示，原本计划在本季度购买新大型主机的客户中，有“数十家”临时推迟采购。客户数量看似不多，但每套大型主机的价格可达数十万美元甚至数百万美元，维护合同和配套软件还会额外贡献数百万美元收入。克里希纳解释，部分客户没有取消硬件采购，而是把预算改用于其他设备。数据中心设备和 PC 价格上涨 15% 至 30%，客户只能优先填补成本飙升造成的预算缺口。“面对如此剧烈的价格上涨，客户决定把预算转向成本涨幅最高的领域。”曾经推动 IBM 股价上涨的 AI 热潮，最终也成为拖累大型主机业务的原因。不过，克里希纳承诺，推迟采购的客户最终仍会购买新大型主机并签订软件合同，部分客户已经在本季度完成采购。“我们没有看到客户放弃大型主机平台的迹象。”此次，由于实际业绩与预期之间的差距过大，克里希纳和董事会甚至罕见地提前向投资者发出预警，承认财报表现比预期更差。克里希纳上周发布“致投资者信”公布初步业绩，并警告核心“基础设施”业务收入表现惨淡，利润率也将承压。消息公布后，IBM 股价立即暴跌 25%，创下有史以来最大单日跌幅。随后，IBM 下调全年增长预期，意味着季度失利还将拖累今年余下时间。最大问题来自长期充当利润支柱的大型主机业务，收入同比下降 42%。大型主机销量下滑还会连带打击软件收入。据悉，IBM 每卖出 1 美元的大型主机硬件，通常可以带来 3 美元的软件收入。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/602.htm", "publishedAt": "2026-07-23T06:00:37+00:00"}, {"title": "AI 投资热潮推动：LSEG 报告 2026 上半年全球企业债券发行 3.68 万亿美元创新高", "summary": "IT之家 7 月 23 日消息，根据伦敦证券交易所集团（LSEG）公布的最新数据，在 AI 融资热潮推动下，2026 年上半年（1~6 月）全球企业债券发行量达 3.68 万亿美元（IT之家注：现汇率约合 24.96 万亿元人民币），同比增长约 10%，刷新历年上半年发行纪录。该报告指出 2026 年上半年发行数量为 10408 笔，同比下降 12%，表明单笔融资规模正在扩大。报告称全球企业通过股票和可转换债券等其他工具募集约 4700 亿美元，为半年期历史次高，仅次于 2021 年。大规模债券发行集中于美国市场，其全球发行数量占比逾 30%。其中规模最大的一笔是亚马逊 3 月份完成的 368 亿美元发行，同期配售欧元计价债券，二者合计融资 540 亿美元，资金预计投向云计算与 AI 数据中心。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/580.htm", "publishedAt": "2026-07-23T04:50:34+00:00"}, {"title": "Visual Studio Code 1.130 发布", "summary": "Visual Studio Code 1.130 版本现已发布。此版本带来了 Agent Host 方面的改进、Agent 窗口中更快的审阅工作流程、更佳的聊天可见性以及更智能的终端链接处理。 The agent host：在专用进程中运行会话，可以从多个 VS Code 窗口连接到该进程。 Agents 窗口改进（预览）：通过紧凑的 diffs、文件级统计信息和跨框架的工作...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/477461/vs-code-1-130-released", "publishedAt": "2026-07-23T03:03:49+00:00"}, {"title": "驱动 Agentic Enterprise：让企业上下文转化为可治理的 Agentic 行动 ｜ 技术趋势", "summary": "点击查看原文>", "sourceName": "InfoQ 中文", "sourceUrl": "https://www.infoq.cn/article/shzCr5FsOcHUyBc8CEsj?utm_source=rss&amp;utm_medium=article", "publishedAt": "2026-07-22T18:44:59+00:00"}, {"title": "美图拿出1亿元，面向全行业寻找AI影像Builder", "summary": "美图产品挑战赛（Meitu Hatch Catch）火热报名中", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/457223.html", "publishedAt": "2026-07-22T17:35:44+00:00"}, {"title": "苹果国行 AI 刷屏之外，三星也把端侧大脑交给国产 AI", "summary": "把智能装进手机的秘诀，在于「多、快、好、省」#欢迎关注爱范儿官方微信公众号：爱范儿（微信号：ifanr），更多精彩内容第一时间为您奉上。", "sourceName": "爱范儿", "sourceUrl": "https://www.ifanr.com/1672593?utm_source=rss&amp;utm_medium=rss&amp;utm_campaign=", "publishedAt": "2026 ium=rss&amp;utm_campaign=", "publishedAt": "2026-07-20T10:29:28+00:00"}]}, {"label": "论文研究", "items": [{"title": "英伟达向美国海军研究生院捐赠 GB300 超算，系美军首次部署其最先进 AI 服务器", "summary": "IT之家 7 月 23 日消息，英伟达（Nvidia）与美国海军研究生院（Naval Postgraduate School，NPS）当地时间周三宣布，英伟达已向与该校相关的一家非营利机构捐赠了一套搭载最新 AI 芯片的超级计算机。美国海军研究生院由美国海军运营，提供计算机科学、航空航天工程等多个学科的硕士和博士课程，重点培养这些技术在军事领域的应用能力。此次英伟达向与该校关联的非营利机构海军研究生院基金会（NPS Foundation）捐赠了一套基于 GB300“Grace Blackwell”服务器打造的超级计算机。这也是英伟达目前最先进的 AI 计算平台。IT之家注意到，英伟达和海军研究生院均未披露这套系统的具体规模，但确认其已部署在位于美国加利福尼亚州蒙特雷的海军研究生院校园内。美国印太司令部司令塞缪尔 ·J· 帕帕罗上将（Adm. Samuel J. Paparo）与英伟达首席执行官黄仁勋（Jensen Huang）计划共同出席活动，正式宣布该系统投入使用。虽然美国能源部正在建设的新一代政府超级计算机也将采用英伟达 Blackwell 芯片，但此次捐赠是美军首次直接使用英伟达最先进的服务器。黄仁勋在声明中表示：“人工智能将成为美国国防体系的重要支柱。”帕帕罗上将表示：“在推进技术现代化的同时，我们也必须更新培养未来领导者的方式。拥有先进的计算能力，将帮助海军研究生院的师生更深入地理解这些技术带来的机遇，以及随之而来的责任。”人工智能的一大优势在于，能够比传统计算机仿真技术更快地处理复杂且快速变化的问题。海军研究生院首席信息官特伦顿 · 汉考克（Trenton Hancock）表示：“在这套系统正式投入使用初期，我们需要谨慎管理计算资源需求。但更重要的是，它将赋予我们研究更加复杂、更贴近现实世界问题的能力，尤其是那些与海军现役舰队每天面临挑战高度相似的课题。”", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/675.htm", "publishedAt": "2026-07-23T08:12:49+00:00"}, {"title": "字节跳动启动 Seed STEM 科学家计划，邀请 100 位学者推动 AI 加速科学发现", "summary": "IT之家 7 月 23 日消息，字节跳动今日宣布 Seed STEM 科学家计划正式启动，邀请 100 位前沿科学领域的优秀学者，围绕真实科研问题展开合作，推动 AI 加速科学发现，进一步突破智能的边界与上限。IT之家注意到，字节跳动此前启动了 Seed Edge 研究计划，专注于探索未知的智能边界和长期重要课题。今天，Edge 团队正式发起 Seed STEM 科学家计划。具体要求如下：在前沿科学领域有深刻的学术积累和透彻的学科理解对 AI 加速科学发现有强烈的兴趣和坚定的信念，并能清晰判断 AI 在本领域学科中的应用价值和现有的能力边界日常科研工作中深度使用 AI 作为生产力工具，可熟练编程者优先在 STEM 相关领域已获得或正在攻读博士学位，或具有同等研究水平参与 STEM 科学家计划，将获得：充足的算力资源，共同进行更大规模的前沿研究与专业 AI 研究团队紧密协作，推动更具创造性的科研探索业界极具竞争力的薪酬回报，充分认可你的科研价值和贡献参与方式：字节提供以下两种参与方式，邀请学者来到办公现场，与 Seed 团队紧密协作，首期计划约持续 6 个月。科学家顾问：STEM 相关领域，在学术机构任职的学者或行业资深专家博士实习生：STEM 相关领域，对 AI 探索前沿问题抱有极大兴趣的在读博士同学申请材料：Seed STEM 科学家计划申请表一段简短说明，你在工作中如何使用 AI个人简历，含 1-2 篇代表作申请截止时间 2026 年 9 月 30 日，工作地点位于北京市海淀区▲ Seed STEM 科学家计划申请表参考 Seed STEM 科学家计划申请表", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/634.htm", "publishedAt": "2026-07-23T07:14:41+00:00"}, {"title": "阿尔法战略开启 508 天后的又一转变，李健详解荣耀全新品牌图形标识及主张", "summary": "IT之家 7 月 23 日消息，今天下午，荣耀终端股份有限公司 CEO 李健通过微博正式揭晓了荣耀全新品牌图形标识「荣耀之环」和荣耀全新品牌主张「敢想，敢不同」。IT之家注意到，李健刚刚发文，详细介绍了荣耀全新品牌图形标识及主张背后的故事，并发布了首支宣传视频。今天，我们正式发布荣耀全新的品牌图形标识 「荣耀之环」，以及全新品牌主张「敢想，敢不同」。508 天前，荣耀阿尔法战略正式开启，我们踏上了新的 AI 终端生态转型之旅，508 天来，凭借大胆的想象与死磕到底的努力，我们打造了荣耀 Robot Phone，让智能体手机从二维数字屏幕迈向三维物理世界，成为充满生命感的智能伙伴；我们在具身智能领域展开前沿探索，打造了荣耀机器人闪电和元气仔，不仅在赛道上超越人类半马世界纪录，也将落地更多的物理场景，成为新的增长曲线；我们还与阿莱展开影像战略合作，将电影级影像技术、色彩科学推向移动影像领域，我们也结识了更多的伙伴，在 WSBK、F3 方程式和青少年足球赛场上与我们同频共振。“不接受所谓的完美，不等待世界的答案。” 508 天不短也不长，却已足够孕育出一个新的自己，“冲破千篇一律的圆，走出独一无二的路。”508 天的旅程未完待续，而荣耀，属于每一个敢想敢不同的你。据IT之家此前报道，去年 3 月，荣耀在 2025 年世界移动通信大会（MWC）上发布了其全新人工智能战略 ——“荣耀阿尔法战略”，宣布荣耀将从智能手机制造商向全球 AI 终端生态公司全面转型。荣耀新任 CEO 李健宣布，未来 5 年荣耀将投入 100 亿美元，与全球合作伙伴共建 AI 设备生态。去年 11 月，荣耀 CEO 李健出席世界互联网大会乌镇峰会并透露阿尔法战略最新进展，称战略已取得实质性进展：Magic8 系列等产品持续推进“打造智慧手机”目标；2026 年荣耀将推出集成 AI 手机、具身智能与高清摄像的 Robot Phone；后续荣耀还将成立阿尔法实验室。", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/627.htm", "publishedAt": "2026-07-23T07:01:35+00:00"}, {"title": "一人薅羊毛导致全县被电商拉黑：男子用 AI 生成烂果图骗取 1.6 万元水果“仅退款”并转售牟利，获刑一年", "summary": "IT之家 7 月 23 日消息，据央视新闻昨日报道，湖南衡山县人民法院近日审结了一起利用 AI 软件伪造水果腐烂图片、骗取电商平台“仅退款”的案件。据介绍，当地居民谭某某在 2025 年 10 月至 2026 年 1 月期间，频繁下单购买榴莲、车厘子等高价水果，收货后通过 AI 修图软件伪造水果变质、发霉的图片，以商品存在质量问题为由申请“仅退款不退货”。由于谭某某的行为，当时多个电商平台将衡山县列为高风险地区，该县居民一度无法在平台上购买榴莲和车厘子。2026 年 1 月，涉事电商平台向衡山县公安局报案。据衡山县公安局民警赵思祺介绍，平台通过大数据监测发现多笔仅退款订单的收货地址均在同一处。警方接报后，依托电子数据勘验、IP 轨迹追踪、数据交叉比对等手段展开排查，精准锁定嫌疑人为当地居民谭某某并将其抓获。警方在其住所查获 75 部用于作案的手机，并完整提取了 AI 造假及资金流转记录等证据。经审讯，谭某某对犯罪事实供认不讳。据警方介绍，谭某某在成功获得退款后并未退回货物，而是将实际完好无损的水果通过闲鱼、朋友圈或线下渠道低价卖出变现。法院经审理查明，谭某某在四个月内累计下单 100 余笔，非法获取 60 个单果重量在 9~10 斤的金枕榴莲，以及五箱 5 斤装的超大果车厘子。经衡山县价格认证中心鉴定，涉案总价值 16000 余元。衡山县人民法院刑事审判庭法官旷雯文介绍称，法院判决前谭某某已全额退赃，单就本案情节量刑区间原在六个月至九个月，也可适用缓刑。但谭某某 2024 年曾因犯诈骗罪被判处有期徒刑，此次犯罪系累犯，依法应当从重处罚。最终，法院以诈骗罪判处谭某某有期徒刑一年，并处罚金人民币 5000 元。旷雯文法官表示：累犯一般不适用缓刑，考虑到其前罪才犯不久且同为诈骗罪，说明反思不够、再犯罪风险较大。北京市西城区人民法院法官宋健指出，如果有人恶意利用仅退款机制对商家实施诈骗，民事赔偿主要是赔偿商户的实际损失；若因恶意退款导致商户经营受限、商品下架甚至声誉受损，商户也可依法提起损害赔偿主张。法官建议，电商平台应加强规则治理和技术防控，完善异常订单预警、虚假图片识别、人工复核及申诉纠错机制；对于高风险订单，平台应及时启动人工审核，不能简单交由算法决定，也不能将经营风险全部转嫁给商户。IT之家注：“仅退款”本是电商平台为简化消费者维权流程而设立的机制，消费者在遭遇货不对板或严重质量问题时可通过此方式快速获得救济。商家在日常经营中应注重留存发货、验货及沟通凭证，对可疑售后索赔坚决核验实物。相关阅读：《2.36 万元货物被电商“仅退款”？1688 商家坐 18 小时火车跨省维权》《AI 假图“仅退款”成风：商家叫苦不迭，国家反诈中心“AI 鉴定师”进入实战阶段》《敲诈 900 多家网店，买家恶意下单 2700 多次被判刑一年六个月》《男子利用电商“仅退款”规则恶意下单敲诈 900 余家网店：流水高达 1030 万元，获刑一年六个月》《某商家半年内被同一人“仅退款”225 个包裹：涉案超 5 万元，已刑事立案》《买家网购苹果手机仅退款不退货遭商家维权，法官调解后支付货款》", "sourceName": "IT之家", "sourceUrl": "https://www.ithome.com/0/980/578.htm", "publishedAt": "2026-07-23T04:31:03+00:00"}]}, {"label": "技巧与观点", "items": [{"title": "WAIC最狠展台打爆工业「深水区」！它石智航首发具身原生大脑AWE 3.5，具身Scaling全面释放", "summary": "一台机器人的「多任务实战」", "sourceName": "量子位", "sourceUrl": "https://www.qbitai.com/2026/07/457469.html", "publishedAt": "2026-07-23T03:28:24+00:00"}, {"title": "梁文锋四小时投资者交流会：为什么克制是 DeepSeek 最锋利的武器？", "summary": "DeepSeek 近日完成了首轮外部融资，总额超过 500 亿元人民币，投前估值约 3675 亿元。在这场融资前后，梁文锋与投资人进行了一次长达四小时的闭门交流。两周前，零星语录开始在行业内流传；现在，多家媒体拿到了相对完整的会议实录。综合 elsewhere 整理的 52 条语录和腾讯科技披露的 118 个回答，梁文锋几乎回应了外界对...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/477445", "publishedAt": "2026-07-23T02:42:56+00:00"}, {"title": "他维护了“如何编写不可维护代码”作者遗留下来的代码", "summary": "如果你的代码活了三十年还没死，最后被一个陌生人修好了，你会怎么想？ 这件事上周发生在了 Roedy Green 身上。不过他已经没法知道了，因为其本人已在 2023 年去世。 但这件事值得大家看一看。 事情起因是一个叫 lexvalo 的开发者想把自己做的 AI 应用 RiverScript 提交到一些老牌的桌面软件目录站。他很快发现了一个早已...", "sourceName": "开源中国", "sourceUrl": "https://www.oschina.net/news/476776", "publishedAt": "2026-07-22T07:25:30+00:00"}, {"title": "如何在 Elasticsearch 中使用 BBQ 将 Jina v5 嵌入缩小 29 倍而不损失召回率", "summary": "一项动手测试，对 Elasticsearch 中的 BBQ 与 float32 向量索引进行了比较，测量了五种语言下的内存占用、磁盘占用以及 recall@10。", "sourceName": "开源中国", "sourceUrl": "https://my.oschina.net/u/3343882/blog/19725387", "publishedAt": "2026-07-22T03:23:52+00:00"}, {"title": "拒绝苹果、放弃留美：杨植麟和梁文锋的选择不止是个人的", "summary": "7 月 18 日，卡内基梅隆大学教授 Russ Salakhutdinov 在 X 上发了一条帖子，24 小时内被浏览了 134 万次。 起因是一个叫 @signulll 的用户问了一个看似简单的问题：Kimi 创始人杨植麟在 CMU 拿了 PhD，为什么不留在美国？ Salakhutdinov 是杨植麟的博士导师，也是苹果前 AI 总监。他的回复直接撕开了多年来围绕「中国 AI...", "sourceNa // 北京时间人话格式；默认相对“报告日期”(DATA.date) 计算 今天/昨天
function fmtBeijing(iso, withDay){
  if(!iso) return "时间未公布";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "时间未公布";
  const bj = new Date(d.getTime() + 8*3600*1000);
  const Y=bj.getUTCFullYear(), M=bj.getUTCMonth()+1, D=bj.getUTCDate();
  const h=bj.getUTCHours(), m=String(bj.getUTCMinutes()).padStart(2,'0');
  // 防源 pubDate 标到未来（如 InfoQ 把当天新闻统一标 18:00 北京），显示未来时间不合理
  const nowBJ = new Date(Date.now() + 8*3600*1000);
  if(bj.getTime() > nowBJ.getTime()){
    return withDay===false ? (h+":"+m) : "刚刚";
  }
  if(withDay===false) return h+":"+m;
  const p=(DATA.date||"").split("-");
  const rY=+p[0], rM=+p[1], rD=+p[2];
  const dayDiff=Math.round((Date.UTC(Y,M-1,D)-Date.UTC(rY,rM-1,rD))/86400000);
  let prefix;
  if(dayDiff===0) prefix="今天";
  else if(dayDiff===1) prefix="明天";
  else if(dayDiff===-1) prefix="昨天";
  else prefix=(M+"月"+D+"日");
  return prefix+" "+h+":"+m;
}

function clip(s, max){
  const arr = Array.from(s || "");
  if(arr.length<=max) return s || "";
  return arr.slice(0,max).join("")+"…";
}

const WEEK = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
function renderHero(){
  const dateStr = DATA.date;
  const p = dateStr.split("-");
  const Y=+p[0], M=+p[1], D=+p[2];
  const wd = WEEK[new Date(Y, M-1, D).getDay()];
  const dateEl = document.getElementById("heroDate");
  if(dateEl){
    let txt = Y + "年" + M + "月" + D + "日 · " + wd;
    if(DATA.generatedAt){
      txt += " · 生成于北京时间 " + fmtBeijing(DATA.generatedAt, false);
    }
    if(DATA.isFallback) txt += ' <span class="badge-fallback">当日未生成 · 回退最近一期</span>';
    dateEl.innerHTML = txt;
  }
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statSec").textContent = DATA.sections.length;
}

function renderLead(){
  const box = document.getElementById("leadBox");
  if(!DATA.lead){ box.style.display = 'none'; return; }
  box.innerHTML = '<span class="lead-tag">今日导语</span>' + esc(DATA.lead);
}

function renderNav(){
  const nav = document.getElementById("nav");
  let html = '<a href="#top">顶部</a>';
  DATA.sections.forEach(function(s,i){
    html += '<a href="#sec-' + i + '">'
      + s.label + '<span class="cnt">' + s.items.length + '</span></a>';
  });
  nav.innerHTML = html;
}

const CLOCK = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function renderCards(){
  const main = document.getElementById("main");
  let counter = 0;
  let html = "";
  DATA.sections.forEach(function(s,i){
    const accent = accentVar(i);
    html += '<section class="section" id="sec-' + i + '">'
      + '<div class="section-head"><span class="bar" style="background:' + accent + '"></span>'
      + '<h2>' + s.label + '</h2><span class="count">' + s.items.length + ' 条</span></div>'
      + '<div class="grid">';
    s.items.forEach(function(it){
      counter++;
      const url = it.sourceUrl || "#";
      const src = it.sourceName || "来源";
      const time = fmtBeijing(it.publishedAt);
      const sumHtml = it.summary
        ? '<p class="summary" title="' + esc(it.summary) + '">' + esc(clip(it.summary, 60)) + '</p>'
        : '';
      html += '<article class="card" style="--accent:' + accent + '">'
        + '<div class="top">'
        + '<span class="badge">' + counter + '</span>'
        + '<span class="chip" title="' + esc(src) + '">' + esc(src) + '</span>'
        + '</div>'
        + '<h3><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a></h3>'
        + sumHtml
        + '<div class="foot">'
        + '<span class="time">' + CLOCK + time + '</span>'
        + '<a class="link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">阅读原文 →</a>'
        + '</div>'
        + '</article>';
    });
    html += '</div></section>';
  });
  main.innerHTML = html;
}

function renderFoot(){
  const total = DATA.sections.reduce(function(a,s){return a+s.items.length;},0);
  const sl = (DATA.sourceList || []).map(function(s){return esc(s);}).join("、");
  document.getElementById("footNote").innerHTML =
    '本页共 <strong>' + total + '</strong> 条 · 数据来源：' + (sl || "中文科技媒体 RSS") + '<br>'
    + '时间均以北京时间展示，点击卡片标题或「阅读原文」跳转原出处。';
}

renderHero();
renderLead();
renderNav();
renderCards();
renderFoot();
</script>
</body>
</html>
